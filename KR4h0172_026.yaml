body:
  text: 傅亮喜雨賦唯二儀之順動數有積而時偏墊襄陵於唐籍戚雲漢於周篇匪叔葉之或遘在盛王其固然伊元嘉之初載肇休明於此年懿玉燭之方熙慍積陽之獨愆涸源泉於井谷委嘉穎於中田嗟我皇之翼翼悵臨朝而輟娛踵沖謙於禹湯協至誠於在余且東作之未晏庶雨露之夙濡遵縣子之徙廛尤魯侯之焚巫祗桑林之六禱修季宰之再雩誠在幽其必貫感何遠而不孚聆晨鸛於高垤候宵畢於天隅發曾雲於觸石晦重陽於八區春霆殷以遠響興雨霈而載塗灑豐浸於中疇覃餘潤於嘉蔬殷嗇人於菑畝衍將繁於中衢嗣良頌於多稌兆嘉夢於維漁矧具臣之逢運又均休而等虞陶曲成於暮稔念歸駕於董疏藝文類聚二初學記二九月九日登陵囂館賦歲九旻之暮月肅晨駕而北逝度回壑以停轅凌孤館而遠憩何物慘而節哀又雲悠而風厲悴緑蘩於寒渚隕豐灌於荒澨玩中原之芬菊惜蘭圃之凋蕙旌竹柏之徑心謝梧楸之零脆爾乃流眄平隰落日還皋於感具盈在物周騷聆離鵾之棲響泝鳴林之瀏飆彼遊子之苦傷每寤歎於我勞矧集悲而鍾苦疚寸心其如忉眇天末以遙瞪怨故鄉之阻遼藝文類聚四初學記四登龍岡賦靜潛處以永念聊駕言以寫憂蒙旭露而夙軫稅余轡於龍丘南臨平隰西際荒疇比宇連甍幽榛四周眺江都之廣澨究川陸之回修羡翔羽之嬉林樂緑蘋之在流乘清漪以泛濫翳稠枚而命仇信遂生之有所何怵迫於人尤藝文類聚六征思賦逢休明之餘祐託菲薄於末暉既致戎於皇幄亦被已於宰闈傷鵜梁以載揚詠伐檀而屢思和風翕以首節零雨鬱而四漾津雲曖以合體墳衍杳其無封羡歸飛之能矯樂湍流之自東想和鑾之北徂企雲旗之西舉灑三川之積塵廓二崤之重岨覿高掌於華陽聆鳴鳳於洛浦藝文類聚五十九感物賦并序余以暮秋之月述職內禁夜清務隙遊目藝苑於時風霜初戒蟄類尚繁飛蛾翔羽翩翾滿室赴軒幌集明燭者必以燋滅為度雖則微物矜懷者久之退感莊生異鵲之事與彼同迷而忘反鑒之道此先師所以鄙智及齊客所以難目論也悵然有懷感物興思遂賦之云爾在西城之暮晷肅皇命於禁中聆蜻蛚於前廡鑒朗月於房櫳風蕭瑟以陵幌霜溰溰而被墉憐鳴蜩之應節惜落景之懷東嗟勞人之萃感何夕永而慮充眇今古以遐念若循環之無終詠倚相之遺矩希董生之方融鑽光燈而散袠溫聖哲之遺蹤墳素杳以難暨九流紛其異封領三百於無邪貫五千於有宗考舊聞於前史訪心跡於汙隆豈夷阻之在運將全喪之由躬遊翰林之彪炳嘉美手於良工辭存麗而去穢旨既雅而能通雖源流之深浩且揚榷而發蒙習習飛蚋飄飄纖蠅緣幌求隙望爓思陵糜蘭膏而無悔赴朗燭而未懲瞻前軌之既覆忘改轍於後乘匪微物之足悼悵永念而拊膺彼人道之為貴參二儀而比靈稟清曠以授氣修緣督而為經照安危於心術鏡纖兆於未形有狥末而捨本或耽欲而忘生碎隨侯於微爵捐所重而要輕矧昆蟲之所昧在智士而猶嬰悟雕陵於莊氏幾鑒濁而迷清仰前修之懿軌知吾跡之未并雖宋元之外占曷在豫之克明豈知反之徒爾喟投翰以增情宋書傅亮傳芙蓉賦考庶卉之珍麗實總美於芙蕖潛幽泉以育藕披翠蓮而挺敷泛輕荷以冒沼列紅葩而曜除徼旭露以滋采靡朝風而肆芳表麗觀於中沚播郁烈於蘭堂在龍見而萌秀於火中而結房豈呈芬於芷蕙將越味於沙棠詠三閭之披服美蘭佩而荷裳伊玄匠之有瞻悅嘉卉於中渠既暉映於丹墀亦納芳於綺疏藝文類聚八十二初學記二十七立學詔古之建國教學為先弘風訓世莫尚於此發蒙啓滯咸必由之故爰自盛王迄於近代莫不敦崇學藝修建庠序自昔多故戎馬在郊旍旗卷舒日不暇給遂令學校荒廢講誦蔑聞軍旅日陳俎豆藏器訓誘之風將墜于地後生大懼於牆面故老竊歎於子襟此國風所以永思小雅所以懷古今王略遠屆華域載清仰風之士日月以冀便宜博延胄子陶獎童蒙選備儒官弘振國學主者考詳舊典以時施行宋書武帝紀下藝文類聚三十八以為傅亮作策加宋公九錫文朕以寡昧仰纘洪基夷羿乘釁蕩覆王室越在南鄙遷於九江宗祀絶饗人神無位提挈群凶寄命江滸則我祖宗之烈奄墜於地七百之祚翦焉既傾若涉淵海罔知攸濟天未絶晉誕育英輔振厥弛維再造區宇興亡繼絶俾昏作明元勳至德朕實賴焉今將授公典策其敬聽朕命乃者桓玄肆僭滔天泯夏拔本塞源傾倒六位庶僚俯眉四方莫恤公精貫朝日氣凌霄漢奮其靈武大殲群慝剋復皇邑奉歆神祇此公之大節始于勤王者也授律群后泝流長騖薄伐崢嶸獻捷南郢大憝折首群逆畢夷三光旋采舊物反正此又公之功也出藩入輔弘茲保弼阜財利用繁殖生民編戶歲滋疆宇日啓導德明刑四境有截此又公之功也鮮卑負衆僭盜三齊狼噬冀青虔劉沂岱介恃遐阻仍為邊毒公搜乘秣駟敻入遠疆衝櫓四臨萬雉俱潰竊號之虜顯戮司寇拓土三千申威龍漠此又公之功也盧循妖凶伺隙五嶺乘虛肆逆侵覆江豫旍拂寰內矢及王城朝野喪沮莫有固志家獻徙卜之計國議遷都之規公乘轅南濟義形於色嶷然內湛視險若夷攄略運奇英謨不世狡寇窮衄喪旗宵遁俾我畿甸拯於將墜此又公之功也追奔逐北揚旍江濆偏旅浮海指日遄至番禺之功俘級萬數左里之捷魚潰鳥散元凶遠迸傳首萬里海南肅清荒服來款此又公之功也劉毅叛渙負釁西夏凌上罔主志肆姦暴附麗協黨扇蕩王畿公御軌以刑消之不日倉兕電泝神兵風掃罪人斯得荊衡清晏此又公之功也譙縱怙亂寇竊一隅王化阻閡三巴淪溺公指命偏師授以良圖凌波浮湍致屆井絡僭豎伏鑕梁岷草偃此又公之功也馬休魯宗阻兵內侮驅率二方連旗稱亂公投袂星言研其上略江津之師勢踰風電回斾沔川實繁震懾二叛奔迸荊雍來蘇玄澤浸育溫風潛被此又公之功也永嘉不競四夷擅華五都幅裂山陵幽辱祖宗懷沒世之憤遺民有匪風之思公遠齊伊宰納隍之仁近同小白滅亡之恥鞠旅陳師赫然大號分命群帥北狥司兗許鄭風靡鞏洛載清僞牧逆藩交臂請罪百年榛穢一朝掃滌此又公之功也公有康宇內之勳重之以明德爰初發迹則奇謨冠世電擊彊妖則鋒無前對聿寧東畿大造黔首若乃草昧經綸化融於歲計扶危靜亂道固於苞桑辨方正位納之軌度蠲削煩苛較若畫一淳風美化盈塞區宇是以絶域獻琛遐夷納賮王略所宣九服率從雖文命之東漸西被咎繇之邁于種德何以尚茲朕聞先王之宰世也庸勳尊賢建侯胙土褒以寵章崇其徽物所以協輔皇家永隆藩屏故曲阜光啓遂荒徐宅營丘表海四履有聞其在襄王亦賴匡霸又命晉文備物光錫惟公道冠前烈勳高振古而殊典未加朕甚懵焉今進授相國以徐州之彭城沛蘭陵下邳淮陽山陽廣陵兗州之高平魯泰山十郡封公為宋公錫茲玄土苴以白茅爰定爾居用建冢社昔晉鄭啓藩入作卿士周邵保傅出總二南內外之重公實兼之今命使持節兼太尉尚書左僕射晉寧縣五等男湛授相國印綬宋公璽紱使持節兼司空散騎常侍尚書陽遂鄉侯泰授宋公茅土金虎符第一至第五左竹使符第一至第十左相國位無不總禮絶朝班居常之名宜與事革其以相國總百揆去録尚書之號上送所假節侍中貂蟬中外都督太傅太尉印綬豫章公印策進揚州刺史為牧領征西將軍司豫北徐雍四州刺史如故公紀綱禮度萬國是式秉介蹈方罔有遷志是以錫公大輅戎輅各一玄牡二駟公抑末敦本務農重積采蘩實殷稼穡惟阜是用錫公袞冕之服赤舄副焉公間邪納正移風改俗陶鈞品物如樂之和是用錫公軒縣之樂六佾之舞公宣美王化導揚休風華夷企踵遠人胥萃是用錫公朱戶以居公官方任能網羅幽滯九皋辭野髦士盈朝是用錫公納陛以登公當軸處中率下以義式遏寇讎清除苛慝是用錫公虎賁之士三百人公明罰恤刑庶獄詳允放命干紀罔有攸縱是用錫公鈇鉞各一公龍驤鳳矯咫尺八絃括囊四海折衝無外是用錫公彤弓一彤矢百盧弓十盧矢千公溫恭孝思致虔禋祀忠肅之志儀刑萬方是用錫公秬鬯一卣圭瓚副焉宋國置丞相以下一遵舊儀欽哉其祗服往命茂對天休𥳑恤庶邦敬敷顯德以終我高祖之嘉命宋書武帝紀中南史宋本紀一藝文類聚五十三以為傅亮作為宋公修復前漢諸陵教夫信陵之墳守衛無曠展季之壟樵採有刑彼匹夫懷道列國陪隸猶見禮異世取貴鄰邦漢高撥亂反正大造區宇道拯橫流功高百代盛德之烈義在不泯藝文類聚四十為宋公修楚元王墓教綱紀夫褒賢崇德千載彌光尊本敬始義隆自遠楚元王積仁基德啓藩斯境素風道業作範後昆本支之祚實隆鄙宗遺芳餘烈奮乎百世而丘封翳然墳塋莫翦感遠存往慨然永懷夫愛人懷樹甘棠且猶勿翦追甄墟墓信陵尚或不泯況瓜瓞所興開元自本者乎可蠲復近墓五家長給灑掃便可施行文選又藝文類聚四十御覽五百六十為宋公修張良廟教綱紀夫盛德不泯義存祀典微管之歎撫事彌深張子房道亞黃中照鄰殆庶風雲玄感蔚為帝師夷項定漢大拯橫流固已參軌伊望冠德如仁若乃神交圯上道契商洛顯默之際窅然難究淵流浩漾莫測其端矣塗次舊沛佇駕留城靈廟荒頓遺像陳昧撫事懷人永歎實深過大梁者或佇想於夷門游九原者亦流連於隨會擬之若人亦足以云可改構棟宇修飾丹青蘋蘩行潦以時致薦抒懷古之情存不刊之烈主者施行文選又宋書武帝紀中為宋公至洛陽謁五陵表臣裕言近振旅河湄揚旍西邁將屆舊京威懷司雍河流遄疾道阻且長加以伊洛榛蕪津塗久廢伐木通徑淹引時月始以今月十二日次故洛水浮橋山川無改城闕為墟宮廟隳頓鍾虡空列觀宇之餘鞠為禾黍廛里蕭條雞犬罕音感舊永懷痛心在目以其月十五日奉謁五陵墳塋幽淪百年荒翳天衢開泰情禮獲申故老掩涕三軍悽感瞻拜之日憤慨交集行河南太守毛修之等既開翦荊棘繕修毀垣職司既備蕃衛如舊伏惟聖懷遠慕兼慰不勝下情謹遣傳詔殿中中郎臣某奉表以聞文選加贈劉前軍表臣聞崇賢旌善王教所先念功𥳑勞義深追遠故司勳秉策在勤必記德之休明沒而彌著故尚書左僕射前將軍臣穆之爰自布衣協佐義始內竭謀猷外勤庶政密勿軍國心力俱盡及登庸朝右尹司京畿敷讚百揆翼新大猷頃戎車遠役居中作捍撫寧之勳實洽朝野識量局致棟幹之器也方宣讚盛化緝隆聖世志績未究遠邇悼心皇恩褒述班同三事榮哀既備寵靈已泰為宋公求加贈劉前軍表臣伏思尋自義熙草創艱患未弭外虞既殷內難亦薦時屯世故靡有寧歲臣以寡劣負荷國重實賴穆之匡翼之益豈惟讜言嘉謀溢于民聽若乃忠規密謨潛慮帷幕造膝詭辭莫見其際事隔於皇朝功隱於視聽者不可勝記所以陳力一紀遂克有成出征入輔幸不辱命微夫人之左右未有寧濟其事者矣履謙居寡守之彌固每議及封爵輒深自抑絶所以勳高當年而茅土弗及撫事永念胡寧可昧謂宜加贈正司追甄土宇俾忠貞之烈不泯於身後大賚所及永秩於善人臣契闊屯夷旋觀終始金蘭之分義深情感是以獻其乃懷布之朝聽所啓上合請付外詳議文選又宋書劉穆之傳南史十五為劉毅軍敗自解表遂令犬羊內侮兵纏紫極聖朝肝膽社稷幾殆稽之典刑罪不容宥賴天祚有底冢宰靈武長蛇翦毒醜類宵遁今畿甸告寧四封有截臣元釁大責既積朝野桑榆之效又無與立而聖恩含宥弛其徽墨偏私之譏既彰民聽況可重荷嶽牧之任復當推轂之重藝文類聚五十四讓尚書僕射表自皇基肇創豫班策勛纖善微績未聞朝野百揆治樞總二殷要誠非庸臣所宜叨擬臣聞權衡既懸錙銖靡遁厲駑習驥終莫之近敗駕傷錦備之前誥必將上增國垢下招私黷藝文類聚四十八為尚書八座奏封諸皇弟皇子臣聞懿親廣樹聖王所先明德竝建古之休典所以維城皇代盤石帝基內衛畿服外綏四海者也第某皇弟皇子等神姿穎哲大成俱茂地均魯衛德兼庸賢顯進徽號啓建疆宇弘道作屏光翰邦家竝可封郡王藝文類聚五十一與蔡廓書揚州自應著刺史服耳然謂坐起班次應在朝堂諸官上不應依官次坐下足下試更尋之詩序云王姬下嫁於諸侯衣服禮秩不係其夫下王后一等推王姬下王后一等則皇子居然在王公之上陸士衡起居注式乾殿集諸皇子悉在三司上今鈔疏如別又海西即位赦文太宰武陵王第一撫軍將軍會稽王第二大司馬第三大司馬位既最高又都督中外而次在二王之下豈非下皇子邪此文今具在也永和中蔡公為司徒𥳑文為撫軍開府對録朝政蔡為正司不應反在儀同之下而於時位次相王在前蔡公次之耳諸例甚多不能復具疏揚州反乃居卿君之下恐此失禮宜改之邪宋書蔡廓傳與沈林子書班爵酬勳歷代常典封賞之發𥳑自帝心主上委寄之懷實參休咎誠心所期同國榮戚政復是卿諸人共弘建內外爾足下雖存挹退豈得獨為君子邪宋書自序與謝晦書薄代河朔事猶未已朝野之慮憂懼者多宋書謝晦傳朝士多諫北征上當遣外監萬幼宗往相咨訪同上文殊師利菩薩讚在昔龍種今也童真乘化游方罔識厥津高會維那研微盡神發揮幽賾道達天人初學記二十三彌勒菩薩讚時無竝后道不二司龍潛兜率按轡候時翳翳長夜懷而慕思思樂朗旦屬想靈期初學記二十三演慎論大道有言慎終如始則無敗事矣易曰括囊無咎慎不害也又曰籍之用茅何咎之有慎之至也文王小心大雅詠其多福仲由好勇馮河貽其苦針虞書箸慎身之譽周廟銘陛坐之側因斯以談所以保身全德其莫尚於慎乎夫四道好謙三材忌滿祥萃虛室鬼瞰高屋豐屋有蔀家之災鼎食無百年之貴然而狥欲厚生者忽而不戒知進忘退者曾莫之懲前車已摧後鑾不息乘危以庶安行險而徼幸於是有顛墜覆亡之禍殘生夭命之釁其故何哉流溺忘反而以身輕於物也故昔之君子同名爵於香餌故傾危不及思憂患而豫防則針石無用洪流壅於涓涓合拱挫於纖蘖介焉是式色斯而舉悟高鳥以風逝鑑醴酒而投紱夫豈敝著而後謀通患結而後思復云爾而已哉故詩曰慎爾侯度用戒不虞言防萌也夫單以營內喪表張以治外失中齊秦有守一之敗偏恃無兼濟之功冰炭滌於心胸巖牆絶於四體夫然故形神偕全表裏寧一營魄內澄百骸外固邪氣不能襲憂患不能及然可以語至而言極矣夫以嵇子之抗心希古絶羈獨放五難之根既拔立生之道無纍人患殆乎盡矣徒以忽防於鍾呂肆言於禹湯禍機發於豪端逸翮鎩於垂舉觀夫貽書良友則匹厚味於甘鴆闕八字其懼患也若無轡而乘奔其慎禍也猶履冰而臨谷或振褐高棲揭竿獨往或保約違豐安于卑位故漆園外楚忌在龜犧商洛遐遁畏此駟馬平仲辭邑殷鑒於崔慶張臨挹滿灼戒乎桑霍若君子覽茲二塗則賢鄙之分既明全喪之實又顯非知之難慎之惟艱慎也者言行之樞管乎夫據圖揮刃愚夫弗為臨淵登峭莫不惴栗何則害交故慮篤患切而懼深故詩曰不敢暴虎不敢馮河慎微之謂也故庖子涉族怵然為戒差之一毫斃猶如此況乎觸害犯機自投死地禍福之具內充外斥陵九折於卭泛衝波於呂梁傾側成於俄頃性命哀而莫救嗚呼嗚呼故語有之曰誠能慎之福之根也曰是何傷禍之門爾言慎而已矣宋書傅亮傳司徒劉穆之碑公諱穆之字道和彭城人也公膺陶鈞之秀範該生民之上操三變肇於弱容九德充於初迪文明在中柔順暢於事業敬以直內義讓洽於州黨時元凶竄遁擁據荊沔乘輿播幸越蹈九江公率先群后電發川湄獎懷本之衆勵思奮之士柏謙籍纍葉之資徐覆忸驟勝之鋒習亂之徒若蝟毛而起內懷根本之虞外通首尾之勢公靈武獨運奇謨內湛鞠旅陳衆視險若夷飛雲西泝則水截鯨鯢乘轅東指則陸殪長蛇回纍棊之危成維山之固豐功茂勳大造於王室淳風懿化永結於荊南銘曰二儀發揮川嶽協靈外恢溫雅內鏡文明懷仁履順蘊義居貞煌煌袞衣禮亦隆止翼翼素心亮終如始夷情升降一色慍喜訓儉於物復禮於己藝文類聚四十七侍中王公碑體亞黃中道及微管元勳盛德光于晉載于時運距無妄陵夷有漸至於兵纏象魏壘結四郊公以民望晉朝居疑閒之際懷方履順處艱以貞顛沛不能回其操彊禦無以蕩其守鑠矣公侯乘和挺生識深冬潭文豔春榮爰初素履好是沖默亦既端委振風育德藝文類聚四十八故安成太守傅府君銘爰自漢季以及晉朝高名遠德係軌于時貞風亮節流聲纍葉君承世德之芳流蕩二象之淑靈含章蘊粹佩蘭藉蕙韋帶飯蔬朝不及夕不以棲遲改其閒不以隱約回其操楊生所為久幽而不改隨和之德者其斯之謂歟棲心古烈擬踵前修淹流孔老宛然內求于言中倫庸行歸周神之聽之匪明匪幽藝文類聚五十
