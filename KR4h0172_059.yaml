body:
  text: 闕名奏請議王子出後告廟臨軒朗先嗣營陽告廟臨軒檢繼體為後舊不告廟臨軒下禮官議正宋書禮志四大明元年六月詔以前太子步兵校尉祗男歆紹南豐王朗有司奏奏請議南郊值雨今月六日南郊輿駕親奉至時或雨魏世值雨高堂隆謂應更用後辛晉時既出遇雨顧和亦云宜更告徐禪云晉武之世或用丙或用己或用庚使禮官議正并詳若得遷日應更告廟與不宋書禮志三大明二年正月有司奏又見通典四十二奏請議皇后為父服期故右光祿大夫王偃喪依格皇后服期心喪三年應再周來二月晦檢元嘉十九年舊事武康公主出適二十五月心制終盡從禮即吉昔國哀再周孝建二年二月其月末諸公主心制終則應從吉於時猶心禫素衣二十七月乃除二事不同宋書禮志二大明二年正月有司奏奏請議殷祭無事於章后廟皇代殷祭無事於章后廟高堂隆議魏文思后依周薑嫄廟禘祫及徐邈答晉宣太后殷薦舊事使禮官議正宋書禮志四大明二年二月有司奏奏余齊民孝行收賢旌善萬代無殊心至自天古今豈異齊民至性由中情非外感淳情凝至深心天徹跪訊遺旨一慟殞亡雖迹異參柴而誠均丘趙方今聖務彪被移革華夏實乃風淳以禮治本惟孝靈祥歸應其道先彰齊民越自氓隸行貫生品旌閭表墓允出在茲宋書余齊民傳大明二年有司奏奏請議太子妃建旒斬莫日建旒與不若建旒應幾旒及畫龍升降云何又用幾翣南齊書禮志下大明二年太子妃薨建九旒有司又議奏請議太子妃靈還在道設祭穆妃卒哭後靈還在道遇朔望當須設祭不南齊書禮志下有司奏奏請議停祭來七月十五日嘗祠太廟章皇太后廟輿駕親奉而乘輿辭廟親戎太子合親祠與不且今月二十四日第八皇女夭案禮宮中有故三月不舉祭皇太子入住上宮於事有疑下禮官議正宋書禮志四大明三年六月有司奏奏請議廟祠有故遷日四時廟祠吉日已定遇雨及舉哀舊停親奉以有司行事先下使禮官博議於禮為得遷日與不宋書禮志四大明三年十一月有司奏奏南郊親奉儀注南郊親奉儀注皇帝初著平天冠火龍黼黻之服還變通天冠絳紗袍廟祀親奉舊儀皇帝初服與郊不異而還變著黑介幘單衣即事乖體謂宜同郊還亦變通天冠絳紗袍又舊儀乘金根車今五路既備依禮玉路以祀亦宜改金根車為玉路宋書禮志五大明四年正月有司奏奏上封禪儀注臣聞崇號建極必觀俗以樹教正位居體必採世以立言是以重代列聖咸由厥道玄勳上烈融章未分鳴光委緒歇而罔臧若其顯諡略騰軌則系綴聲采徵略聞聽爰洎姬漢風流尚存遺芬餘榮綿映紀緯雖年絶世祀代革精華可得騰金綵奏玉潤鏤迹以燻今鐫德以麗遠而四望埋禋歌之禮日觀弛修封之容豈非神明之業難崇功基之迹易泯自茲以降訖於季末莫不欲英弘徽位詳固洪聲豈徒深默修文淵幽馭世而已諒以縢非虛奏書匪妄埋擊雨恕神淳廕復樹安得紫壇肅祗竹宮載佇散火投郊流星奔座寶緯初基厭靈命曆德振弛維功濟淪象玄浸紛流華液幽潤規存永馭思詳樹遠太祖文皇帝以啓遘泰運景望震凝采樂調風集禮宣度祖宗相映軌迹重暉聖上韞籙蕃河佇翔衡漢金波掩照華耀停明運動時來躍飛風舉澄氛海岱開景中區歇神還靈穨天重耀儲正凝位於兼明袞嶽蕃華於元列故以祥映昌基繫發篆素重以班朝特典飾令詳儀纂綜淪蕪搜騰委逸奏玉郊宮禋圭玄時景集天廟脈壤祥農節至昕陽川丘夙禮網威巡表綏中甸史流其詠民挹其風於是涵迹視陰振聲威響歷代之渠沈闕望內安侯之長賢王入侍殊生詭氣奉俗還鄉羽族卉儀懷音革狀邊帛絶書歡光弛燭天岱發靈宗河開寶崇丘淪鼎振采泗淵雲皇王嶽摛藻闕漢并角即音棲翔禁籞袞甲霜味翾舞川肆榮泉流鏡後昭河源故以波沸外關雲蒸內澤若其雪趾青毳玄文朱綵日月郊甸擇木弄音重以榮露騰軒蕭雲掩閣鎬穎孳萌移華淵禁山輿佇衡雲鶼竦翼海鰈泳流江茅吐蔭校書之列仰筆以飾辭濟代之蕃獻邑以待禮豈非神協氣昌物瑞雲照蒱軒龜軫闕泉淳芳太宰江夏王臣義恭咀道遵英抽奇麗古該潤圖史施詳閟載表以功懋往初德耀炎昊升文中岱登牒天關耀冠榮名摛振聲號而道謙稱首禮以虛挹將使玄祇缺觀幽瑞乖期梁甫無盛德之容介丘靡升聞之響加窮泉之野獻八代之駟交木之鄉奠絶金之楛肅靈重表珍符兼貺伏惟陛下謨詳淵載衍屬休章依徵聖靈潤色聲業諏辰稽古肅齊警列儒僚展采禮官相儀懸蕤動音洪鍾竦節陽路整衛正途清禁於是績環珮端玉藻鳴鳳佇律騰駕流文間綵比象之容昭明紀數之服徽焯天陳容藻神行翠蓋懷陰羽華列照乃詔聯事掌祭賓客贊儀金支宿縣鏞石潤響命五神以相列闢九關以集靈警衛兵而開雲先雨祗以灑路霞凝生闕煙起成宮臺冠丹光壇浮素靄爾乃臨中壇備盛禮天降祥錫壽固皇根谷動神音山傳稱響然後辨年問老陳詩觀俗歸薦告神奉遺清廟光美之盛彰乎萬古淵祥之烈溢乎無窮豈不盛歟臣等生接昌辰肅懋明世束教管聞未足言道且章志湮微代往淪絶拘採遺文辨明訓誥簉訪鄒魯草縢書堙玉之禮具竦石繩金之儀和芝潤瑛鐫璽乾封懼弗軌屬上徽燀當王則謹奉儀注以聞宋書禮志三大明元年十一月江夏王義恭表請封禪四年四月辛亥有司奏詔停此奏奏竟陵王誕罪狀臣聞神極尊明大儀所以貞觀皇天峻邈玄化所以幽宣故能經緯氓俗大庇黔首庶道被八紘不遺疏賤之賞威格天區豈漏親貴之罰此不刊之鴻則古今之恆訓謹案元嘉之末天綱崩褫人神哀憤含生喪氣司空竟陵王誕義兼臣子任居藩維進不能泣血提戈忘身徇節退不能閉關拒險焚符斬使遂至拜受偽爵欣承榮寵沈淪姦逆肆於昏放以妻故司空臣湛之女誅亡餘類單舟遄遣披猖千里事哀行路賊忍無親莫此為甚故山陰傅僧祐誠亮國朝義均休戚重門峻衛不能拒折簡之使巖險千里不能庇匹夫之身乃更助虐馮凶抽兵勒刃遂使頓仆牢穽死不旋踵妻子播流庭筵莫立見之者流涕聞之者含歎及神鋒首路欃槍東指風捲四嶽電掃三江誕猶持疑兩端陰規進退陛下頻遣書檄告警殷勤方改姦圖末乃奉順分遣弱旅永塞符文宴安所蒞身不越境悖禮忘情不顧物議彎弧躍馬務是畋遊致奔牛有崩碎之陳新亭無獨克之術假威義鋭乞命皇旅竟有何勞而論功伐既祅祲廓清大明升曜幽顯宅心遠邇雲集誕忽星行之悲違開泰之慶遲回顧望淹踰旬朔逆黨陳叔兒等泉寶巨億資貨不資誕收籍所得不歸天府辭稱天軍實入私室又太官東傳舊有獻御喪亂既平猶加斷遏珍羞庶品回充私膳於號諱之辰遽甘滋之品當維新之始絶苞苴之貢忠孝兩忘敬愛俱盡乃徵引巫史潛考圖緯自謂體應符相富貴可期悖意醜言不可勝載遂復遙諷朝廷占求官爵侮蔑宗室詆毀公卿不義不昵人道將盡荷任神州方懷姦慝每窺向宸御妄生規幸多樹淫祀顯肆祅詛遂在石頭潛修法物傳警稱蹕擬則天行皆已駭暴觀聽彰布朝野昔內難甫寧珍瑋散佚有御刀利刃擅價諸夏天府禁器歷代所珍誕密購賞頓藏私室賊義宣初平餘黨逃命誕含縱罔忌私竊招納名工納巧悉匿私第又引義宣故將裘興為已腹心事既彰露猶執欺罔公文面啓矯稱舊隸加以營于制館僭擬天居引石徵材專擅興發驅迫士族役同輿皂殫木土之姿窮吞并之勢故會稽宣長公主受遇二祖禮級尊崇臣湛之亡身徇國追榮典軍誕以廣托宅宇地妨藝植輒逼遺孤頓相驅徙遂令神主宵遷改卜委巷宗戚含傷行路掩涕又緣溪兩道積代通衢誕拓宇開垣擅斷其一致使徑塗擁隔川陸阻礙神怒民恕毒遍幽顯故丞相臨川烈武王臣道規名德茂親勳光常策異禮殊榮受自先旨者嗣王臣義慶受任西夏靈寢暫移先帝親枉鑾輿拜辭路左恩冠終古事絶常班誕又以廟居宅前固請毀換詔旨不許怨懟彌極有靦面目豺狼為性規牧江都希廣兵力天德尚弘甫申所請仍謂應往東府宜為中台貪冒無厭人莫與比雖聖慈全救每垂容納而虐戾不悛姦詖彌甚受命還鎮猜怨愈深忠規正諫必加鴆毒諂瀆膚躁是與比周又矯稱符敕設榜開募事發辭寢委罪自下及録事徐靈壽以常署受坐將就囚執舀韓近恭中護軍遣吏夏嗣伯密相屬請求寬桎梏且王僧達臨刑之啓事高闍即戮之辭皆稱潛驛往來遙相要契醜聲穢問宣著遐邇含識能言孰不憤歎又獲吳郡民劉成豫章民陳談之建康民陳文紹等並如欣狀則姦情猜志歲月增積昔周德初升公旦有流言之釁魯道方泰季子斷逵泉之誅近則淮厲覆車於前義康襲軌於後變發柴奇禍成范謝亦皆以義奪親情為憲屈況乃上悖天經下誣政道結釁於無妄之辰希幸於文明之日皇穹所不覆厚土所不容夫無禮之誡臣子所宜服膺干紀之刑有國所應慎守臣等參議宜下有司絶誕屬籍削爵土收付廷尉法獄治罪諸所連坐別下考論伏願遠尋宗周之重近監興亡之由割恩棄私俯順群議則卜世靈根於茲克固鴻勳盛烈永永無窮陛下如復隱忍未垂三思則覆皇基於七百擠生民於塗炭此臣等所以夙夜危懼不敢避鈇鉞之誅者也宋書竟陵王誕傳大明四年上乃使有司奏不許有司固請貶爵為侯奏立明堂伏尋明堂辟雍制無定文經記參差傳説乖舛名儒通哲各事所見或以為名異實同或以為名實皆異自漢暨晉莫之能辨周書云清廟明堂路寢同制鄭玄注禮義生於斯諸儒又云明堂在國之陽丙己之地三里之內至於室宇堂個戶牖達向世代湮緬難得該詳晉侍中裴頠西都碩學考詳前載未能制定以為尊祖配天其義明著廟宇之制理據未分直可為殿以崇嚴祀其餘雜碎一皆除之參詳鄭玄之注差有準據裴頠之奏竊謂可安國學之南地實丙己爽塏平畼足以營建其牆宇規範宜擬則太廟唯十有二間以應一期之數依漢汶上圖儀設五帝位太祖文皇帝對饗祭皇天上帝雖為差降至於三載恭祀理不容異自郊徂宮亦宜共日禮記郊以特牲詩稱明堂羊牛吉蠲雖同質文殊典且郊有燔柴堂無禋燎則鼎俎彝簋一依廟禮班行百司搜材簡工權置起部尚書將作大匠量物商程剋今秋繕立宋書禮志三大明五年四月有司奏又通典四十四奏請議郊配用牛數南郊祭用三牛廟四時祠六室用二牛明堂肇建祠五帝太祖文皇帝配未詳祭用幾牛宋書禮志三大明五年九月有司奏奏請議太子妃喪徹樂皇太子妃薨至尊皇后並服大功九月皇太后小功五月未詳二御何當得鼓吹及樂宋書禮志二大明五年閏九月有司奏奏定法駕鹵簿漢儀注大駕鹵簿公卿奉引大將軍參乘太僕卿御法駕侍中參乘奉車郎御晉氏江左大駕未立故郊祀用法駕宗廟以小駕至於儀服二駕不異拜陵御服單衣幘百官陪從朱衣而已亦謂之小駕名實乖舛考尋前記大駕上陵北郊周禮宗廟於昊天有降宜以大駕郊祀法駕祠廟小駕上陵如為從序今改祠廟為法駕鹵簿其軍幢多少臨時配之至尊乘玉路以金路象路革路木路小輦輪御軺衣書等車為副其餘並如常儀宋書禮志五大明六年八月有司奏奏定皇太子乘輅秦改周輅創制金根漢魏因循其形莫改而金玉二輅雕飾略同造次瞻覩殆無差別若賜於東儲在禮嫌重非所以崇峻陛級表示等威今皇太子宜乘象輅碧旗九葉進不斥尊退不逼下酌時沿古於禮為中隋書禮儀志五大明六年初備五輅有司奏奏沙門當拜王者臣聞邃宇凝居非期宏峻拳跪槃伏豈止敬恭將以昭張四維締制八寓故雖儒法枝派名墨條分至於崇親嚴上厥繇靡爽惟浮圖為教逖自龍堆反經提傳訓遐事遠練生瑩識恆俗稱難宗旨緬邈微言淪隔拘文蔽道在末彌扇遂乃陵越典度偃倨尊戚失隨方之眇迹迷製化之淵義夫佛法以謙儉自牧忠虔為道不輕比丘遭道人斯拜目連桑門遇長則禮寧有屈膝四輩而簡禮二親稽顙耆臘而直體萬乘者哉故咸康創議元興載述而事屈偏黨道挫餘分今鴻源遙洗群流仰鏡九仙賮寶百神聳職而畿輦之內舍弗臣之氓陛席之間延抗禮之客懼非所以澄一風範詳示景則者也臣等參議以為沙門接見皆當盡虔禮敬之容依其本制則朝徽有序乘方兼遂矣宋書天竺迦毗黎國傳大明六年九月世祖使有司奏詔可又見高僧傳八釋僧遠又見沙門不拜俗事二奏請議晉陵王廟祭故晉陵孝王子雲未有嗣安廟後三日國臣從權制除釋朔望周忌應還臨與不祭之日誰為主宋書禮志四大明六年十月有司奏奏藏冰季冬之月冰壯之時凌室長率山虞及輿隸取冰於深山窮谷涸陰沍寒之處以納於凌陰務令周密無泄其氣先以黑牡秬黍祭司寒於凌室之北仲春之月春分之日以黑羔秬黍祭司寒啓冰室先薦寢廟二廟夏祠用鑑盛冰室一鑑以禦溫氣蠅蚋三御殿及太官膳羞並以鑑供冰自春分至立秋有臣妾喪詔贈祕器自立夏至立秋不限稱數以周喪事繕制夷盤隨冰借給凌室在樂遊苑內置長一人保舉吏二人宋書禮志二大明六年詔立凌室藏冰有司奏又見通典五十五奏講武薦牲鑾輿巡搜江左講武校獵獲肉先薦太廟章太后廟并設醢酒公卿行事及獻妃陰室室長行事宋書禮志四大明七年二月有司奏奏請議宣貴妃祭新安王服宣貴妃齊衰周十三月練十二月縞十五月禫心喪三年未詳宣貴妃立廟應在何時入廟之日當先有祔為但即入新廟而已若是大祥未及禫中入廟者遇四時便得祭不又新安王在心制中得親奉祭不宋書禮志四通典四十七大明七年三月有司奏奏請議晉陵國廟祭晉陵國制孝王廟依廬陵平王等國例一歲五祭二國以王且有衡陽王服今年內不祠尋國未有嗣王三卿主祭應同無服者之例與不宋書禮志四通典五十二大明七年十二月有司奏奏請議齊敬王立廟故齊敬王子羽將來立後未詳便應作主立廟為須有後之日未立廟者為於何處祭祀宋書禮志四通典五十二大明八年正月有司奏
