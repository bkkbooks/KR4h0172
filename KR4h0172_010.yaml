body:
  text: 後廢帝即位遣大使巡使詔夫興王經制實先民隱方求廣教刑於四維朕以煢眇夙膺寶厤永言民政未接聽覽眷言乃顧無忘鑒寐可遣大使分行四方觀採風謠問其疾苦有咈民法不便俗者悉各條奏若守宰威恩可紀廉勤允著依事騰聞如獄訟誣枉職事紕繆惰公存私害民私已者無或隱昧廣納芻輿之議博求獻藝之規巡省之道務令精洽深簡行識俾若朕親覽焉宋書後廢帝紀廣薦舉詔夫寢夢期賢往誥垂美物色求良前書稱盛朕以沖昧嗣膺寶業思仰述聖猷勉弘政道興言多士常想得人可普下牧守廣加搜採其有孝友聞族義讓光閭或匿名屠釣隱身耕牧足以整厲澆風夫益淳化者凡厥一善咸無遺逸虛輪佇帛俟聞嘉薦宋書後廢帝紀詔蔡景玄景玄表如此故散騎常侍中書監左光祿大夫開府儀同三司樂安縣開國伯興宗忠恪立朝謀猷宣著往屬時難勳亮帷幄錫珪分壤實允通誥而懇誠慊訴備彰存沒廉概素情有絜聲軌景玄固陳先志良以惻然雖彝典宜全而哀款難奪可特申不瞑之請永矜克讓之風宋書蔡興宗傳興宗遣令薄葬奏還封爵追贈後授子景玄固辭不受又奏還封表疏十餘上見許詔云大赦詔夫緩法昭恩裁恩茂典蠲憲貸眚訓俗彝義朕臨馭宸樞夤制氓寓式存寬簡思孚矜惠今開元肆宥萬品惟新凡茲流斥宜均弘洗自元年以前貽罪徙放者悉聽還本土宋書後廢帝紀申土斷詔分方正俗著自虞冊川谷異制煥乎姬典故井遂有辨閭伍無雜用能七教克宣八政斯序雖緜代殊軌沿革異儀或民懷遷俗或國尚興徙漢陽列燕代之豪關西熾楚之族竝通籍新邑即居成舊洎金行委御禮樂南移中州黎庶襁負揚越聖武造運道一閎區貽長世之規申土斷之制而夷險相因盈晦遞襲歲饉凋流戎役惰散違鄉寓境漸至繁積宜式遵鴻以為永憲庶阜俗昌民反風定保夷胥山之險澄瀚海之波括河圖於九服振玉軔於五都矣宋書後廢帝紀因旱下詔省刑比亢序愆度留熏燿晷有傷秋稼方貽民瘼朕以眇疚未弘政道囹圄尚繁枉滯猶積夕厲晨矜每側於懷尚書令可與執法以下就訊眾獄使冤訟洗遂困獘昭蘇頒下州郡咸令無壅宋書後廢帝紀又見袁粲傳亢序作元序夕厲晨矜作晨競夕厲困獘作瘐獘蠲改湘江二州徵課詔國賦氓稅蓋有恆品往屬戎難務先軍實徵課之宜或乘昔準湘江二州糧運偏積調役既繁庶徒彌擾因循權政容有未革民單違舊令役非公限者竝即蠲改具條以聞宋書後廢帝紀恤劉勔詔夫義實天經忠惟人則篆素流采金石宣煇自非識洞情靈理感生極豈有捐驅衛主舍命匡朝者哉故持節鎮軍將軍守尚書右僕射中領軍鄱陽縣開國侯勔思懷亮粹體業淹明弘勳樹績譽洽華野綢繆顧託契闊屯夷方倚謀猷翌康帝道逆蕃扇禍逼擾京甸援桴誓旅奉律行師身與事滅名隨操遠朕用傷悼震慟於厥心昔王允秉誠卞壼峻節均風往德歸茂先軌泉途就永冤逝無追思崇徽策式光惇史可贈散騎常侍司空本官侯如故諡曰忠昭公宋書劉勔傳通淹滯詔頃列爵敘勳銓榮酬義條流積廣又各淹闕歲往事留理至逋壅在所參差多違甄飭賞未均洽每疚厥心可悉依舊準竝下注職宋書後廢帝紀禁侈費詔頃國賦多騫公儲罕給近治戎雖淺而軍費已多廩藏虛罄難用馭遠宜矯革淫長務在節儉其供奉服御悉就減撤雕文靡麗廢而勿修凡諸游費一皆禁斷外可詳為科格宋書後廢帝紀敦素約昭頃民俗滋獘國度未殷歲時屢騫編戶不給且邊虞尚警傜費彌繁永言夕惕寢興增疚思弘豐耗之制以敦約素之風庶偫蓄拯民以康治道大官珍膳御府麗服諸所供擬一皆減徹可詳為其格務從簡衷宋書後廢帝紀別敕李安民九江須防邊備宜重今有此授以增鄢郢之勢無所致辭也南齊書李安民傳稱太后令殺豫章王子尚子尚頑凶極悖行乖天理楚玉婬亂縱慝義絕人經竝可於第賜盡宋書豫章王子尚傳楚玉山陰公主也約損詔露臺息搆義光漢德雉裘焚制事隆晉道故以檢奢軌化敦儉馭俗頃甸服未靜師旅連年委蓄屢空勞蔽莫偃而丹雘之飭靡耗難訾寶賂之費徵賦靡計今車服儀制實宜約損使徽章有序勿得侈溢可罷省御府二署凡工麗雕鐫傷風毀治一皆禁斷庶永昭憲則弘茲始政宋書順帝紀求賢才詔昔聖王既沒淳風已衰龜書永湮龍圖長祕故三代之末德刑相擾世淪物競道陂人諛然猶士比轂奇才接軫朕襲運金樞纂靈瑤極負扆巡政日晏忘疲永言興替望古盈慮姬夏典載猶傳緗帙漢魏餘文布在方冊故元封興茂才之制地節刱獨行之品振維務本存乎得人今可宣下州郡搜揚幽仄標采鄉邑隨名薦上朕將親覽甄其茂異庶野無遺彥永激遐芬宋書順帝紀授爵楊文度等詔茂常有章實昭國度疇庸斯炳載宣史冊督北秦州諸軍事寍朔將軍平羌校尉北秦州刺史武都王文度門乘輝寵世榮邊邑忠果既亮才勁兼彰龍驤將軍楊文弘肅協成規躬提桴鼓申稜百頃席捲蘭皋功烈之美竝足嘉歎宜膺爵授以酬勳緒文度可使持都督北秦雍二州諸軍事征西將軍刺史校尉悉如故文弘將軍略陽太守宋書氐胡傳詔諡王敬弘夫塗祕蘭幽貞芳載越微猷沈遠懋禮彌昭故侍中左光祿大夫開府儀同三司敬弘神韻沖簡識寓標峻德敷象魏道藹丘園高挹榮冕凝心塵外清光粹範振俗淳風兼以累朝延賞聲華在詠而嘉篆闕文猷策韜裏尚想遙芬興懷寢寤便可詳定輝諡式旌追典宋書王敬弘傳答齊王劾黃回詔黃回擢自凡豎夙負疵釁貰以憲綱收其搏噬雖勤累著而屠懷干紀新亭背叛投拜寇場異規既扇廟律幾殆幸得張敬兒提戈直奮元惡受戮及景素結逆履霜歲久乃密通音譯潛送器杖氛沴克霽狡謀方顯每存容掩冀能悛革故褎茅升爵均榮勳寵凶詖有本險慝滋深搆誘敬兒志相攻陷悖圖未遂狼戾彌甚近軍次郢鎮劫逼府主兼挾私計多所徵索主局咨疑便加捶楚專肆暴慢罔顧彝則膺牧西蕃徽賁惟厚曾不知感猶懷忿怨李安民述任河濟星管未周貪據䘳要若祈回奪黯謁弗已叨侈無度遂請求御輿僭擬私飾又招萃賊黨初不啟聞傷風蠹化莫此之甚宜明繩裁肅正刑書便收付廷尉依法窮治宋書黃回傳齊王以黃回終為禍亂上表詔荅詔荅王僧虔僧虔表如此夫鐘鼓既陳雅頌斯辨所以憓感人祗化動翔泳頃自金籥弛韻羽佾未凝正俗移風良在茲日昔阮咸清識王度昭奇樂緒增脩異世同功矣便可付外遵詳宋書樂志一昇明二年尚書令王僧虔上表并遺令孝皇背世五十餘年古不祔葬且漢世帝后陵皆異處今可於塋域之內別為一壙孝皇陵墳本用素門之禮與王者制度奢儉不同婦人禮有所從可一遵往式宋書孝懿蕭皇后傳廢少帝為滎陽王令王室不造天禍未悔先帝創業弗永棄世登遐義符長嗣屬當天位不謂窮凶極悖一至於此大行在殯宇內哀惶幸災肆於悖詞喜容表於在戚至乃徵召樂府鳩集伶官優倡管弦靡不備奏珍羞甘膳有加平日採擇媵御產子就宮靦然無怍醜聲四達及懿后崩背重加天罰親與左右執紼歌呼推排梓宮抃掌笑謔殿省備聞加復日夜媟狎群小慢戲興造千計費用萬端帑藏空虛人力殫盡刑罰苛虐幽囚日增居帝王之位好皁隸之役處萬乘之尊悅廝養之事親執鞭撲敺擊無辜以為笑樂穿池築觀朝成暮毀徵發工匠疲極兆民遠近歎嗟人神怨怒社稷將墜豈可復嗣守洪業君臨萬邦今廢為滎陽王一依漢昌邑晉海西故事奉迎鎮西將軍宜都王義隆入篡皇統宋書少帝紀景平二年五月徐羨之等稱皇太后令廢帝為滎陽王暴前廢帝罪令司徒領護軍八座子業雖曰嫡長少稟凶毒不仁不孝著自髫齔孝武棄世屬當辰厤自梓宮在殯喜容靦然天罰重離歡恣滋甚逼以內外維持忍虐未露而凶慘難抑一旦肆禍遂縱戮上宰殄害輔臣子鸞兄弟先帝鍾愛含怨既往枉加屠酷昶茂親作扞橫相徵討新蔡公主逼離夫族幽置深宮詭云夢殞襄事甫爾喪禮頓釋昏酣長夜庶事傾遺朝賢舊勳棄若遺土管絃不輟珍羞備膳詈辱祖考以為戲謔行游莫止淫縱無度肆宴園陵規圖發掘誅翦無辜籍略婦女建樹偽豎莫知誰息拜嬪立后慶過恆典宗室密戚遇若婢僕鞭捶陵曳無復尊卑南平一門特鍾其酷反天滅理顯暴萬端苛罰酷令終無紀極夏桀殷辛未足以譬闔朝業業人不自保百姓遑遑手足靡厝行穢禽獸罪盈三千高祖之業將泯七廟之享幾絕吾老疾沈篤每規禍鴆憂煎漏刻氣命無幾開闢以降所未嘗聞遠近思奮大室而九衛將軍湘東王體自太祖天縱英聖文皇鍾愛寵冠列藩吾早識神睿特兼常禮潛運宏規義士投袂獨夫既殞懸首白旗社稷再興宗祏未固人鬼屬心大命允集且勳德高邈大業攸歸宜遵漢晉篡承皇極主者詳舊典以時奉行未亡人餘年不幸嬰此百艱永尋情事雖存若殞當復奈何當復奈何宋書前廢帝紀問沈攸之令久勞於外宜還京輦然任寄之重換代殊為未易還止之宜一以相委宋書沈攸之傳元徽二年群公稱皇太后令遣中使問攸之斥後廢帝令衛將軍領軍中書監八座昱以冢嫡嗣登皇統庶其體識日弘社稷有寄豈意窮凶極悖自幼而長善無細而不違惡有大而必蹈前後訓誘常加隱蔽險戾難移日月滋甚棄冠毀冕長襲戎衣犬馬是狎鷹隼是愛皁歷軒殿之中韝緤宸扆之側至乃單騎遠郊獨宿深野手揮矛鋋躬行刳斮白刃為弄器斬害為恆務捨交戟之衛委天畢之儀趨步闤闠酣歌罏肆宵遊忘返宴寢營舍奪人子女掠人財物方筴所不書振古所未聞沈勃儒士孫超功臣幼文兄弟竝豫勳效四人無罪一朝同戮飛鏃鼓劍孩稚無遺屠裂肝腸以為戲謔投骸江流以為懽笑又淫貴無度帑藏空竭橫賦闕河專充別蓄黔庶嗷嗷厝生無所吾與其所生每厲以義方遂謀鴆毒將騁凶忿沈憂假日慮不終朝自昔辛癸爰及幽厲方之於此未譬萬分民怨既深神怒已積七廟阽危四海褫氣廢昏立明前代令範況迺滅義反道天人所棄舋深牧野理絕桐宮故密令蕭領軍潛運明略幽顯協規普天同泰驃騎大將軍安成王體自太宗天挺淹叡風神凝遠德映在田地隆親茂皇厤攸歸億兆係心含生屬望宜光奉祖宗臨享萬國便依舊典以時奉行未亡人追往傷懷永言感絕宋書後廢帝紀葬後廢帝令昱窮凶極暴自取灰滅雖曰罪招能無傷悼棄同品庶顧所不忍可特追封蒼梧郡王葬丹陽秣陵縣郊壇西宋書後廢帝紀請還子嗣本屬表故東平沖王休倩託荄璿極岐嶷夙表降年弗永遺胤莫傳孝武皇帝敕妾子臣子嗣出繼為後既承國祀方奉烝薦庶覃遐慶式延於遠而妾顏訓養非恩撫導乖理情闕引進義違負螟昔世祖平日詭申慈愛崩背未幾真性便發猶逼畏崇憲少欲藏掩自茲以後專縱嚴酷實顯布宗戚宣灼宮闈用傷人倫爰惻行路妾天屬冥至感切實深伏願乾渥廣臨曲垂照賜復改命還依本屬則妾母子雖隕之辰猶生之年宋書東平王子嗣傳子嗣繼東平沖王休倩休倩母顏性理嚴酷泰始二年子嗣所生母景寍園昭容謝上表許之
