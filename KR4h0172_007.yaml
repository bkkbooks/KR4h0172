body:
  text: 前廢帝即位詔朕以眇身夙紹洪業敬御天威欽對靈命仰遵凝緒日鑒前圖實可以拱默守成詒風長世而寶位告始萬寓改屬惟德弗明昧於大道思宣睿範引茲簡恤可具詢執事詳訪民隱凡曲令密文繁而作治關市僦稅事施一時而姦吏舞文妄興威福加以氣緯舛玄偏頗滋甚宜其寬傜輕憲以救民切御府諸署事不須廣雕文篆刻無施於今悉宜并省以酬氓願藩王貿貨壹皆禁斷外便具條以聞宋書前廢帝紀下江夏王等詔總錄之典著自前代孝建始年雖蹔并省而因革有宜理存濟務朕煢獨在躬未涉政道百揆庶務允歸尊德太宰江夏王義恭新除中書監太尉地居宗重受遺阿衡實深憑倚用康庶績可錄尚書事本官監太宰王如故侍中驃騎大將軍南兗州刺史巴東郡開國公新除尚書令元景同稟顧誓翼輔皇家贊業宣風緊公是賴可即本號開府儀同三司領兵置佐一依舊準領丹陽尹侍中領公如故宋書江夏王義恭傳荅江夏王詔太宰表如此公緣情遣遠覽以增慨昔淮楚推恩胙流支胤抑法弘親古今成準便以公表付外依旨奉行故泉陵侯允橫罹凶虐可特為置後宋書彭城王義康傳義恭請還義康屬籍詔荅荅義陽王昶詔征北表如此省以慨然誕及妻女竝可以庶人禮葬并置守衛宋書竟陵王誕傳大明初誕以謀反誅至是昶請葬誕詔荅荅江夏王劾蔡興宗詔太宰表如此省以憮然朕恭承洪緒思弘前烈而在朝倰競驅扇成風將何以式揚先德克隆至化公體國情深保釐攸託便可付外詳議宋書蔡興宗傳荅柳元景劾蔡興宗詔興宗首亂朝典允當明憲以其昔經近侍未忍盡法可令思愆遠封愍孫竊評自已委咎物議可以子領職宋書蔡興宗傳義恭復使尚書柳元景奏興宗與尚書袁愍孫論選事請各罪責詔荅下袁顗等詔宗社多故釁因冢司景命未淪神祚再乂自非忠謀密契豈伊剋殄侍中祭酒領前軍將軍新除吏部尚書顗游擊將軍頒著作郎兼尚書左丞徐爰誠心內款參聞嘉策匡贊之效實監朕懷宜甄茅社以獎義概覬可封新隆縣子爰可封吳平縣子食邑各五百戶宋書袁顗傳求才詔昔凝神佇逸磻溪讚道湛慮思才傅巖毗化朕位御三極風澄萬寓資鈇電斷正卯斯戮思所以仰宣遺烈俯弘景祚每結夢庖鼎瞻言板築有劬日吳無忘昧旦可甄訪郡國招騁閭部其有孝性忠節幽居遯棲信誠義行廉正表俗文敏博識幹事治民務加旌舉隨才引擢庶官克順彝倫攸敘敘主者精加詳括稱朕意焉宋書前廢帝紀手詔晉安王子勛何邁殺我立汝汝自計孰若孝武邪可自為其所宋書晉安王子勖傳封譚金等詔屯騎校尉南清河太守譚金彊弩將軍童太壹車騎中兵參軍沈攸之誠略沈果忠幹勇鷙消蕩氛翳首制鯨凶宜裂河山以酬勳義金可封平都縣男太壹宜陽縣男攸之東興縣男食邑各三百戶金遷驍騎將軍增邑百戶宋書宗越傳前廢帝誅群公金等竝為之用帝下詔敕晉安王子勛聞汝與何邁謀共廢我汝自量體氣何如孝武尋當遣使送藥與汝魏書劉彧傳先是子業敕其弟子勖案此即宋書所載之手詔史家紀錄互異耳姑竝載之敕巢尚之吾篡承洪基君臨萬國推心勳舊著於遐邇不謂戴法興恃遇負恩專作威福冒憲黷貨號令自由積釁累愆遂至於此卿等忠勤在事吾乃具悉但道路之言異同糾紛非惟人情駭愕亦玄象違度委付之旨良失本懷吾今自親覽萬機留心庶事卿等宜竭誠盡力以副所期宋書戴法興傳廢帝即位法興遷越騎校尉頗以直言忤上於是賜死敕尚之荅有司請崇憲太后居外詔朕備丁艱罰蚤嬰孤苦特蒙崇憲太后聖訓撫育昔在蕃閫常奉藥膳中迫凶威抱懷莫遂今泰運初啟情典獲申方欲親奉晨昏盡歡閨禁不得如所奏宋書文帝路淑媛傳上為太后撫養及即阼有司請居外宮詔荅與建安王休仁詔人既不比數西方公汝便為諸王之長宋書廬江王禕傳禕住西州故謂之西方公也又見南史十四追恤新安王子鸞詔夫紓冤申痛雖往必追緣情惻愛感事彌遠故使持節都督南徐州諸軍事撫軍將軍南徐州刺史新安王子鸞夙表成器蚤延殊寵方樹美業克光蕃維而凶心肆忌奄羅橫禍興吾永傷有兼常懷宜旍天秀以雪沈魂可贈使持節侍中都督南徐兗二州諸軍事司徒南徐州刺史王如故第十二皇女第二皇子子師俱嬰謬酷有增酸悼皇女可贈縣公主子師復先封為南海王竝加徽諡宋書始平王子鸞傳又詔哀枉追遠仁道所弘興滅繼絕盛典斯貴朕務古思治恩禮必敷異族猶敦況在近戚故新除使持節中都督南徐兗二州諸軍事司徒南徐州刺史新安王子鸞年雖沖弱性識早茂鍾茲世祖冠寵列蕃值景和凶虐橫羅酷禍國胤無主冤祀莫寄尋念痛悼夙軫於懷可以建平王景素息延年為嗣追改子鸞封為始平王食邑千戶同上下顏㚟詔延之昔師訓朕躬情契兼款前記室參軍濟陽太守㚟伏勤蕃朝綢繆恩舊可為中書侍郎宋書顏延之傳恤顏師伯詔故散騎常侍僕射領丹陽尹平都縣子師伯昔逢代運豫班榮賞遭罹厄會隕命淫刑宗嗣殄絕良用矜悼但其心瀆貨宜貶贈典可紹封社以慰冤魂諡曰荒子宋書顏師伯傳遣使巡省詔朕戡亂寍民屬膺景祚鴻制初造革道惟新而國故頻罹仁澤偏壅每寤疚心罔識攸濟巡方問俗弘政所先可分遣大使廣求民瘼攷守宰之良採衡閭之善若獄犴淹枉傷民害教者具以事聞鰥寡孤獨癃殘六疾不能自存者郡縣優量賑給貞婦孝子高行力田許悉條奏務詢輿誦廣納嘉謀每盡皇華之旨俾若朕親覽焉宋書明帝紀節省詔皇室多故縻費滋廣且久歲不登公私歉獘方刻意從儉弘濟時艱政道未孚慨愧兼積太官供膳可詳所減撤尚方御府雕文篆刻無益之物一皆蠲省務存簡約以稱朕心宋書明帝紀崇憲太后喪下詔朕幼集荼蓼夙憑德訓龕虣定業實資仁範恩著屯夷有兼常幕夫禮沿情施義循事立可特齊衰三月以申追仰之心宋書文帝淑媛傳與沈文秀詔皇帝前問督青州徐州之東莞東安二郡諸軍事建威將軍青州刺史朕去歲撥亂功振普天於卿一門特有殊澤卿得延命至今誰之力邪何故背國負恩遠同逆豎今天下已定四方寍壹卿獨守窮城何所歸奉且卿百口在都兼有墳墓想情非木石猶或顧懷故指遣文炳具相宣示凡諸逆節親為戎首一不加罪文炳所具卿獨何人而能自立便可遠率部曲同到軍門別詔有司一無所問如其不爾國有常刑非惟戮及弟息亦當夷卿墳壟既以謝齊土百姓亦以勞將士之心故有今詔宋書沈文秀傳上遣文秀弟文炳詔文秀三年二月文秀歸命請罪宣示東軍詔朕方務德簡刑使四罪不相及助順同逆者一以所從為斷卿等當深達此懷勿以親戚為慮也宋書孔覬傳時將士多是東人父兄子弟皆己附逆上因送軍普加宣示矍於是大悅手詔譬袁顗卿歷觀古今嶮之與彊何嘗可恃自朕踐阼塗路梗塞卿無由奉表未經為臣今追蹤竇融猶未晚也宋書袁覬傳太宗使覬舊門生徐碩奉手詔譬顗追贈范道興等詔前鎮軍參軍督護范道興朕之舊隸經從北藩徒役南畿遭離命會抱恩固節受害群凶言念純誠良可憫愴可贈員外散騎侍郎南城令鮑法度後軍典籤馮次民永新令應生新建令軍延寶上饒令黃難等違逆識順同被誅滅言念既往宜在追榮可贈生奉朝請法度南臺御史次民延寶難竝員外將軍宋書鄧琬傳前軍典籤范道興志不同逆為鄧琬所誅其餘奉順見害者竝為上所愍詔云追復戴法興封爵詔故越騎校尉吳昌縣開國男戴法興昔從孝武誠懃左右入定社稷預誓河山及出侍東儲竭盡心力嬰害凶悖朕甚愍之可追復削注還其封爵宋書戴法興傳停戴法興孫襲封詔法興小人專權豪恣雖虐主所害義由國討不宜復貪人之封封爵可停宋書戴法興傳有司奏以法興孫靈珍襲封又詔以王景文兼中書令詔王言之職總司清要中將軍丹楊尹王景文夙尚弘簡情度淹粹忠規茂績實宣國道宜兼管內樞以重其任可中書令初學記十一引泰始起居注二年詔云云凡兩條又見御覽二百二十案宋書明帝紀景文傳皆不言兼中書令當是漏落也以楊僧嗣為北秦州刺史詔僧嗣遠守西疆世篤忠款宜加旌顯以甄義概可冠軍將軍北秦州刺史武都王太守如故宋書氏胡傳徙松滋侯子房詔不虞之釁著自終古情為法屈聖達是遵朕埽穢定傾再全寶業遠惟鴻基猥當負荷思弘治道務盡敦睦而妖豎遘扇安造異圖自西南阻兵東夏侵斥都邸群凶密相脣齒路休之兄弟專作謀主規興禍亂令舍人嚴龍覘覦宮省以羽林出討宿衛單罄侯隙伺間將謀竊發劉祗在蕃規相應援通言北寇引令過淮頃休範濟江潛欲拒捍賴卜祚靈長姦回弗逞陰慝已露宜盡憲辟實以方難未夷曲加遵養今王化帖泰宜辨忠邪涓流不壅燎火難滅便可委之有司肅正刑典松滋侯子房等淪陷逆徒協同醜悖遂與籤師群小潛通南釁連結祗等還圖朕躬唯咎戾已彰在法無宥猶子之情良所未忍可廢為庶人徙付遠郡宋書松滋侯子房傳崇儉約詔治崇簡易化疾繁侈遠關隆替明著軌迹者也朕拯斯墜運屬此屯極仍之以凋耗因之以師旅而識昧前王務艱昔代俾夫舊賦既繁為費彌廣鑒寐萬務每思弘革方欲緩繇優調愛民為先有司詳加寬惠更立科品其方物職貢各順土宜出獻納頁敬依時令凡諸蠹俗妨民之事趣未違本之業雕華靡麗奇器異技竝嚴加裁斷務歸要實左右尚方御府諸署供御制造咸存儉約庶淳風至教微遵太古阜財興讓少敦季俗宋書明帝紀求賢才詔矢機詢政立教之攸本舉賢騁逸弘化之所基故負鼎進策殷代以康釋釣作輔周祚斯乂朕甫承大業訓道未敷雖側席忠規佇夢巖築而良圖莫薦奇士弗聞永鑒通古無忘宵寐今藩隅克晏敷化維始屢懷存治實望箴闕王公卿尹群僚庶官其有嘉謀直獻匡俗濟時咸切事陳奏無或依隱若乃林澤貞栖丘園耿潔博洽古今敦崇孝讓四方在任可明書搜揚具即以聞隨就褎立宋書明帝紀郊祀詔朕載新寶命仍離多難戎車遄駕經略務殷禋告雖備弗獲親禮今九服既康百祀咸秩宜聿遵前典郊謁上帝宋書禮志三赦宥諸藩詔近眾藩稱亂多染舋科或誠係本朝事緣逼迫混同沈錮良以悵然夫天道尚仁德刑竝用雷霆時至雲雨必解朕眷言靜念思弘風澤凡應禁削皆從原蕩其文武堪能隨才銓用宋書明帝紀下沈勃詔沈勃琴書藝業口有美稱而輕躁耽酒幼多罪愆比奢過度妓女數十聲酣放縱無復劑限自恃吳興土豪比門義故脅說士庶告索無已又輒聽募將委役還私託注病叛遂有數百周旋門生競受財貨少者至萬多者千金攷計贓物二百餘萬便宜明罰敕法以正典刑故光祿大夫演之昔受深遇忠績在朝尋遠矜懷能無弘律可徙勃西垂令思愆悔宋書沈演之傳責羊希詔希卑門寒士累世無聞輕薄多舋備彰歷職徒以清刻一介擢授嶺南千上逞欲求訴不已可降號橫野將軍宋書羊玄保傳禁非時品物詔古者衡虞置制蝝蚳不收川澤產育登器進御所以繁阜民財養遂生德頃商販逐末競早爭新拆未實之果收豪家之利籠飛膳之翼為戲童之資豈所以還風尚本損華務實宜脩道布仁以革斯蠹自今鱗介羽毛肴核眾品非時月可采器味所須可一皆禁斷嚴為科制宋書明帝紀大赦詔法網之用期世而行寬惠之道因時而布況朕尚德戡亂依仁馭俗宜每就弘簡以隆至治而頻罹兵革繇賦未休軍民巧偽興事甚多蹈刑入憲諒非一科至乃假名戎伍竊爵私庭因戰散亡託懼逃役且往諸淪逼雖經累宥逋竄之黨猶為實繁宵言永懷良兼矜疚思所以重播至澤覃被區宇可大赦天下宋書明帝紀江夏王義恭等陪祭詔皇基崇建屯剝維難弘啟熙載底績忠果故從饗世祀勒勳宗彝世祖寍亂定業實資翼亮故使持節侍中都督中外諸軍事丞相領太尉中書監錄尚書事江夏交獻王義恭故使持節侍中都督南豫江豫三州軍事太尉南豫州刺史巴東郡開國忠列公元景故侍中司空始興郡開國襄公慶之故持節征西將軍雍州刺史洮陽縣開國肅侯愨或體道沖玄燮化康世或盡誠致效庚難龕逆宜式遵國典陪祭廟庭宋書江夏王義恭傳徙徐爰詔夫事君無禮教道弗容訕上衒已人倫所棄太中大夫徐爰拔迹廝猥推斥饕逢遂官參時望門伍豪族遷位轉榮莫非超荷而諂側輕險與性自俱利口讒妄自少及長奉公在事釐豪蔑聞初無愧滿常有闚進先朝嘗以芻輩之中粗有學解故得漸蒙驅策出入兩宮太初偽立盡心佞事義師已震方得南奔及孝武居統唯極諂諛附會承旨專恣厥性致使治政苛縱興造乖法損德害民皆由此豎景和悖險深相贊協苟取偷存罔顧節義任算設數取合人主㩻嶇姦矯所志必從故歷事七廟白首全貴自以體含德厚識鑑機先迷塗遂深罔知革悟朕撥亂反正勳濟天下靈祗助順群逆必夷況爰恩養而無輸效遂內挾異心著於形迹陽愚杜口罔所陳聞惰事緩文庶申詭略當今朝列賢彥國無佞邪而秉心弗純累蠹時政以其自告之辰用賜歸老之職榮禮優崇寍非饕過不謂潛怨斥外進競不已勤言託意觸遇斯發小人之情雖所先照猶許其當改未忍加法遂恃朕仁弘必永容貸昨因觴宴肆意譏毀謂制詔所為皆資傍說又宰輔無斷朝要非才恃老興舊慢累斯甚比邊難未靜安眾以惠戎略是務政網從簡故得使此小物乘寬自縱乃合投畀豺虎以清王猷但朽顇將盡不足窮法可特原罪徙付交州宋書徐爰傳又詔八議緩罪舊在一條五刑所抵耆必加貸徐爰前後釁迹理無可申廢棄海埵實允國憲但蚤蒙朕識曲矜愚朽既經大宥思沾殊渥可特除廣州統內郡宋書徐爰傳爰秉權日久上昔在藩素所不說及景和世屈辱卑約爰禮敬甚簡益銜之至是詔徙交州既行又詔詔沈攸之卿春中求伐彭城吾恐軍士疲勞且去冬奔散人心未宜復用不許卿所啟今便不肯為吾行邪卿若不行便可使吳喜獨去宋書沈攸之傳太宗復令攸之進違彭城攸之以清泗既乾糧運不繼固執以為非宜往反者七上大怒詔攸之攸之懼乃奉旨進軍行至遲墟土悔追軍令反下詔封王景文等夫良圖宣國賞崇彝命殊績顯朝策勤王府安南將軍江州刺史景文風度淹粹理懷清畼體兼望實誠備夷岨寶厤方啟密贊義機妖徒干紀預毗廟略宜登茅社永傳厥祚朕澄氛寍樞實資多士疏爵疇庸實膺徽列尚書右僕射領衛尉興宗識懷詳正思局通敏吏部尚書領太子左衛率淵器情閑茂風業韶遠竝謀參軍政績亮時艱拓宇開邑實允勳典景文可封江安縣侯食邑八百戶興宗可始昌縣伯淵可南城縣伯食邑五百戶宋書王景文傳太宗翦除暴主又平四方欲引朝望以佐大業乃下詔
