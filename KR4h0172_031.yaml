body:
  text: 謝靈運山居賦有序並自注古巢居穴處曰巖棲棟宇居山曰山居在林野曰丘園在郊郭曰城傍四者不同可以理推言心也黃屋實不殊於汾陽即事也山居良有異乎市廛抱疾就間順從性情敢率所樂而以作賦楊子雲云詩人之賦麗以則文體宜兼以成其美今所賦既非京都宮觀遊獵聲色之盛而敘山野草木水石穀稼之事才乏昔人心放俗外詠於文則可勉而就之求麗邈以遠矣覽者廢張左之豔辭尋臺皓之深意去飾取素儻值其心耳意實言表而書不盡遺迹索意託之有賞其辭曰謝子臥疾山頂覽古人遺書與其意合悠然而笑曰夫道可重故物為輕理宜存故事斯忘古今不能革質文咸其常合宮非縉雲之館衢室豈放勛之堂邁深心於鼎湖送高情於汾陽嗟文成之卻粒願追松以遠遊嘉陶朱之鼓棹乃語種以免憂判身名之有辨權榮素其無留孰如牽犬之路既寡聽鶴之塗何由哉理以相得為適古人遺書與其意合所以為笑孫權亦謂周瑜公瑾與孤意合夫能重道則輕物存理則忘事古今質文可謂不同而此處不異縉雲放勛不以天居為所樂故合宮衢室皆非淹留鼎湖汾陽乃是所居之文成張良卻粒棄人間事從赤松子遊陶朱范蠡臨去之際亦語文種云云謂二賢既權榮素故身名有判也牽犬李斯之歎聽鶴陸機領成都衆大敗後云思聞華亭鶴唳不可復得若夫巢穴以風露貽患則大壯以棟宇袪弊宮室以瑤琁致美則白賁以丘園殊世惟上託於巖壑幸兼善而罔滯雖非市朝而寒暑均和雖是築構而飾朴兩逝易云上古穴居野處後世聖人易之以宮室上棟下宇以蔽風雨蓋取諸大壯琁堂自是素故曰白賁最是上爻也此堂世異矣謂巖壑道深於丘園而不為巢穴斯免拘滯得暑寒之適雖是築構無妨非朝市云云昔仲長願言流水高山應璩作書邙阜洛川勢有偏側地闕周員銅陵之奧卓氏充釽槻之端金谷之麗石子致音徽之觀徒形域之薈蔚惜事異於栖盤至若鳳叢二臺雲夢青丘漳渠淇園橘林長洲雖千乘之珍苑孰嘉遁之所遊且山川之未備亦何議於兼求仲長子云欲使居有良田廣宅在高山流水之畔溝池自環竹木周布場囿在前果園在後應璩與程文信書云故求道田在關之西南臨洛水北據邙山託崇岫以為宅因茂林以為蔭謂二家山居不得周員之美楊雄蜀都賦云銅陵衍卓王孫採山鑄銅故漢書貨殖傳云卓氏之臨卭公擅山川楊雄方言梁益之間裁木為器曰釽裂帛為衣曰槻金谷石季倫之別廬在河南界有山川林木池沼水碓其鎮下邳時過遊賦詩一代盛集謂二地雖珍麗然制作非栖盤之意也鳳臺秦穆公時秦女所居以致蕭史叢臺趙之崇館張衡謂趙築叢臺於前楚建章華於後楚之雲夢大中山居長飲賦楚靈王遊雲夢之中息於荊臺之上前方淮之水左洞庭之波右顧彭蠡之濤南望巫山之阿遂造章華之臺亦見諸史淮南青丘齊之海外皆獵所司馬相如云秋田乎青丘倣徨乎海外漳渠史起為魏文侯所起溉水之所淇園衛之竹園在淇水之澳詩人所載橘林蜀之園林楊子雲蜀都賦亦云橘林左太沖謂戶有橘柚之園長洲吳之苑囿左亦謂長洲之茂苑因江海洲渚以為苑囿故特表此園之珍靜千乘宴嬉之所非幽人憩止之鄉且山川亦不能兼茂隨地勢所遇耳覽明達之撫運乘機緘而理默指歲暮而歸休詠宏徽於刊勒狹三閭之喪江矜望諸之去國選自然之神麗盡高棲之意得余祖車騎建大功淮肥江左得免橫流之禍後及太傅既薨遠圖已輟於是便求解駕東歸以避君側之亂廢興隱顯當是賢達之心故選神麗之所以申高棲之志經始山川實基於此仰前哲之遺訓俯性情之所便奉微軀以宴息保自事以乘間愧班生之夙悟慚尚子之晚研年與疾而偕來志乘拙而俱旋謝平生於知遊棲清曠於山川謂經始此山遺訓於後也性情各有所便山居是其宜也易云向晦入宴息莊周云自事其心此二是其所處班嗣本不染世故曰夙悟尚平未能去纍故曰晚研想遲二人更以年衰疾至志寡求拙曰乘并可山居日與知遊別故曰謝平生就山川故曰棲清曠其居也左湖右江往渚還汀面山背阜東阻西傾抱含吸吐款跨紆縈綿聯邪亘側直齊平枚乘曰左江右湖其樂無有此吳客說楚公子之詞當謂江都之野彼雖有江湖而乏山巖此憶江湖左右與之同而山嶽形勢池城所無也往渚還汀謂四面有水面山背阜亦謂東西有山便是四水之裏也抱含吸吐謂中央復有川款跨紆縈謂邊背相連帶迂回處謂之邪亘平正處謂之側直近東則上田下湖西溪南谷石堟石滂閔硎黃竹決飛泉於百仞森高薄於千麓寫長源於遠江派深毖於近瀆上田在下湖之水口名為田口下湖在田之下下處竝有名山川西溪南谷分流谷鄣水畎入田口西溪水出始寧縣西谷鄣是近山之最高峰者西溪便是山之背入西溪之裏得石堟以石為阻故謂為堟石滂在西溪之東從縣南入九里兩面峻峭數十丈水自上飛下比至外溪封墱十數里皆飛流迅激左右巖壁緑竹閔硎在石滂之東溪逶迤下注良田黃竹與其連南界莆中也近南則會以雙流縈以三洲表裏回游離合山川崿崩飛於東峭槃傍薄於西阡拂青林而激波揮白沙而生漣雙流謂剡江及小江此二水同會於山南便合流注下三洲在二水之口排沙積岸成此洲漲表裏離合是其貌狀也崿者謂回江岑在其山居之南界有石跳出將崩江中行者莫不駭栗槃者是縣故治之所在江之東西用槃石竟渚竝帶青林而連白沙也近西則楊賓接峰唐皇連縱室壁帶溪曾孤臨江竹緣浦以被緑石照澗而映紅月隱山而成陰木鳴柯以起風楊中元賓竝小江之近處與山相椄也唐皇便從北出室石室在小江口南岸壁小江北岸竝在楊中之下壁高四十丈色赤故曰照㵎而映紅曾山之西孤山之南王子所經始竝臨江皆被以緑竹山高月隱便謂為陰鳥集柯鳴便謂為風也近北則二巫結湖兩𣇘通沼橫石判盡休周分表引修隄之逶迤吐泉流之浩溔山𡼠下而回澤瀨石上而開道大小巫湖中隔一山外𣇘周回在圻西北邊浦出江竝是美處義熙中王穆之居大巫湖經始處所猶在兩𣇘皆長溪外𣇘出山之後四五里許裏𣇘亦隔一山出新堟橫山野舍之北面常石野舍之西北巫湖舊唐故曰修隄長溪甚遠故曰泉流常石磯低而水曲故曰山𡼠下而回澤裏𣇘漫石數里水從上過故曰瀨石上而開道休山東北周里山在休之南竝是北邊遠東則天台桐柏方石太平二韭四明五奧三菁表神異於緯牒驗感應於慶靈淩石橋之莓苔越楢溪之紆縈天台桐柏七縣餘地南帶海二韭四明五奧皆相連接奇地所無高於五嶽便是海中三山之流韭以菜為名四明方石四面自然開窗也五奧者曇濟道人蔡氏郗氏謝氏陳氏各有一奧皆相掎角竝是奇地三菁太平之北太平天台之始方石直上萬丈下有長溪亦是縉雲之流云此諸山竝見圖緯神仙所居往來要徑石橋過楢溪人跡之艱不復過此也遠南則松針棲雞唐嵫漫石崒嵊對嶺孟分隔入極浦而邅回迷不知其所適上嶔崎而蒙籠下深沈而澆激棲雞在保口之上別浦入其中周回甚深四山之裏松針在棲雞之上緣江唐嵫入太平水路上有瀑布數百丈漫石在唐嵫下郗景興經始精舍亦是名山之流崒嵊與分界去山八十里故曰遠南前嶺鳥道正當五十里高左右所無就下地形高乃當不稱遠望山甚奇謂白爍尖者最高下有良田王敬弘經始精舍曇濟道人住孟山名曰孟埭芋薯之疁田清溪秀竹回開巨石有趣之極此中多諸浦㵎傍依茂林迷不知所通嶔崎深沈處處皆然不但一處遠西則遠北則長江永歸巨海延納崑漲緬曠島嶼綢沓山縱橫以布護水回沈而縈浥信荒極之綿眇究風波之睽合江從山北流窮上虞界謂之三江口便是大海老子謂海為百谷王以其善處下也海人謂孤山為崑薄洲有山謂之島嶼即洲也漲者沙始起將欲成嶼縱橫無常於一處回沈相縈擾也大荒東極故為荒極風波不恆為睽合也徒觀其南術之生𡼠成衍岸測深相渚知淺洪濤滿則曾石沒清瀾減則沈沙顯及風興濤作水勢奔壯于歲春秋在月朔望湯湯驚波滔滔駭浪電激雷崩飛流灑漾凌絶壁而起岑橫中流而連薄始迅轉而騰天終倒底而見壑此楚二心醉於吳客河靈懷慚於海若南術是其臨江舊宅門前對江三轉曾山路窮四江對岸西面常石此二山之閒西南角岸孤山此二山皆是狹處故曰生𡼠勇門以南上便大閬故曰成衍岸高測深渚下知淺也江中有孤石沈沙隨水增減春秋朔望是其盛時故枚乘云楚太子有疾吳客問之舉秋濤之美得以瘳病太子國之儲二故曰楚二河靈河伯居河所謂河靈慚於海若事見莊周秋水篇爾其舊居曩宅今園枌槿尚援基井具存曲術周乎前後直陌矗其東西豈伊臨溪而滂沼乃抱阜而帶山考封域之靈異實茲境之最然葺駢梁於巖麓棲孤棟於江源敞南戶以對遠嶺闢東窗以矚近田田連岡而盈疇嶺枕水而通阡葺室在宅裏山之東麓東窗矚田兼見江山之美三間故謂之駢梁門前一棟枕𡼠上存江之嶺南對江上遠嶺此二館屬望殆無優劣也阡陌縱橫塍埒交經導渠引流脈散溝并蔚蔚豐秫苾苾香粳送夏蚤秀迎秋晚成兼有陵陸麻麥粟菽候時覘節遞藝遞孰供粒食與漿飲謝工商與衡牧生何待於多資理取足於滿腹許由云偃鼠飲河不過滿腹謂人生食足則歡有餘何待多須邪工商衡牧似多須者若少私寡欲充命則足但非田無以立耳自園之田自田之湖泛濫川上緬邈水區濬潭㵎而窈窕除菰洲之紆餘毖溫泉於春流馳寒波而秋徂風生浪於蘭渚日倒景於椒塗飛漸榭於中沚取水月之歡娛旦延陰而物清夕棲芬而氣敷顧情交之永絶覬雲客之暫如此皆湖中之美但患言不盡意萬不寫一耳諸㵎出源入湖故曰濬潭㵎㵎長是以窈窕除菰以作洲言所以紆餘也水草則萍藻薀菼雚蒲芹蓀兼菰蘋蘩蕝荇菱蓮雖備物之偕美獨扶渠之華鮮播緑葉之鬱茂含紅敷之繽翻怨清香之難留矜盛容之易闌必充給而後搴豈蕙草之空殘卷叩弦之逸曲感江南之哀歎秦箏倡而溯游往唐上奏而舊愛還搴出離騷叩弦是采菱歌江南是相和曲云江南采蓮秦箏倡蒹茄篇唐上奏蒲生詩皆感物致賦魚藻蘋蘩荇亦有詩人之詠不復具敘本草所載山澤不一靁桐是別和緩是悉參核六根五華九實二冬竝稱而殊性三建異形而同出水香送秋而擢蒨林蘭近雪而揚猗卷柏萬代而不殞伏苓千歲而方知映紅葩於緑蒂茂素蕤於紫枝既住年而增靈亦驅妖而斥疵本草所出藥處於今不復依隨土所生耳此境出藥甚多靁公桐君古之采藥醫緩古之良工故曰別悉參核者雙核桃杏仁也六根者苟七根五茄根葛根野葛根根也五華者堇華芫華檖華菊華旋覆華也九實者連前實槐實柏實兔絲實女貞實蛇床實蔓荊實蓼實黃實也二冬者天門麥門冬三建者附子天雄烏頭水香蘭草林蘭支子卷柏伏苓竝皆仙物凡此衆藥事悉見於神農其竹則二箭殊葉四苦齊味水石別谷巨細各彙既修竦而便娟亦蕭森而蓊蔚露夕沾而悽陰風朝振而清氣捎玄雲以拂杪臨碧潭而挺翠蔑上林與淇澳驗東南之所遺企山陽之游踐遲鸞鷖之棲託憶崑園之悲調慨伶倫之哀籥衛女行而思歸詠楚客放而防露作二箭一者苦箭大葉一者笄箭細葉四苦青苦白苦紫苦黃苦水竹依水生甚細密吳中以為宅援石竹本科叢大以充屋榱巨者竿挺之屬細者無箐之流也修竦便娟蕭森蓊蔚皆竹貌也上林關中之禁苑淇澳衛地之竹園方此皆不如東南會稽之竹箭唯此地最富焉山陽竹林之游鸞鷖棲食之所崑山之竹任為笛黃帝時伶倫斬其厚均者吹之為黃鍾之宮衛女思歸作竹竿之詩楚人放逐東方朔感江潭而作七諫其木則松柏檀櫟楩楠桐榆檿柘榖棟楸梓柳樗剛柔性異貞脆質殊卑高沃塉各隨所如幹合抱以隱岑杪千仞而排虛夌岡上而喬竦蔭㵎下而扶疏沿長谷以傾柯欑積石以插衢華映水而增光氣結風而回敷當嚴徑而蔥倩承和煦而芬腴送墜葉於秋晏遲含萼於春初皆木之類選其美者載之山脊曰岡岡上㵎下長谷積石各隨其方離騷云青春受謝白日昭只詩云萼不韡韡也植物既載動類亦繁飛泳騁透胡可根源觀貌相音備列山川寒燠順節隨宜匪敦草木竹植物魚鳥獸動物獸有數種有騰者有走者走者騁騰者透謂種類既繁不可根源但觀其貌狀相其音聲則知山川之好興節隨宜自然之數非可敦戒也魚則𩽇鱧鮒鱮鱒鯢鰱鯿魴鮪鯊鱖鱨鯉鯔鱣輯采雜色錦爛雲鮮唼藻戲浪泛符流淵或鼓鰓而湍躍或掉尾而波旋鱸鮆乘時以入浦鱤𩷰沿瀨以出泉𩽇音優鱧音禮鮒音附鱮音敘鱒音寸袞反鯢音睨鰱音連鯿音毖仙反魴音房鮪音痏鯊音沙鱖音居綴反鱨音上羊反鯔音比之反鱣音竹仚反皆說文字林音詩云錦衾有爛故云錦爛鱸鮆乘時魚鱤音感𩷰音迅皆出溪中石上恆以為玩鳥則鵾鴻鶂鵠鶖鷺鴇𪂼雞鵲繡質鶷鸐綬章晨鳧朝集時鷮山梁海鳥違風朔禽避涼荑生歸北霜降客南接響雲漢侶宿江潭聆清哇以下聽載王子而上參薄回涉以辨翰映明壑而自耽鵾音昆鴻音洪鶂音溢左傳云六鶂退飛字如此鵠音下竺反鶖音秋鷺音路鴇音保𪂼音相唐公之馬與此鳥色同故謂為𪂼音相雞鵲鶷鸐見張茂先博物志鸐音翟亦雉之美者此四鳥竝美采質鳧音符野鴨也常待晨而飛鷮音己消反長尾雉也論語云山梁雌雉時哉時哉海鳥爰居臧文仲不知其鳥以為神也事見左傳朔禽雁也寒月轉往衡陽禮記霜始降雁來賓歲莫云雁北向政是陽初生時荑生歸北霜降客南山雞映水自玩其羽儀者山上則猿𤟤貍獾犴獌猰𤟣山下則熊羆豺虎羱鹿麇麖擲飛枝於窮崖踔空絶於深硎蹲谷底而長嘯攀木杪而哀鳴猿音袁𤟤音魂貍音力之反獾音火丸反犴音五懸反獌音曼似獾而長狼之屬一曰貙猰音安黠反𤟣音弋生反貍之黃黑者一曰似豺音在皆反羱音元野羊大角麇音鬼珉反麖音京能踔擲虎長嘯猿哀鳴鳴聲可玩緡綸不投罝羅不披磻弋靡用蹄筌誰施鑑虎狼之有仁傷遂欲之無崖顧弱齡而涉道悟好生之咸宜率所由以及物諒不遠之在斯撫鷗䱔而悅豫杜機心於林池八種皆是魚獵之具自少不殺至乎白首故在山中而此歡永廢莊周云虎狼仁獸豈不父子相親世云虎狼暴虐者政以其如禽獸而人物不自悟其毒害而言虎狼可疾之甚苟其遂欲豈復崖限自弱齡奉法故得免殺生之事苟此悟萬物好生之理易云不遠復無祇悔庶乘此得以入道莊周云海人有機心鷗鳥舞而不下今無害彼之心各悅豫於林池也敬承聖誥恭窺前經山野昭曠聚落羶腥故大慈之弘誓拯群物之淪傾豈寓地而空言必有貸以善成欽鹿野之華苑羡靈鷲之名山企堅固之貞林希菴羅之芳園雖粹容之緬邈謂哀音之恆存建招提於幽峰冀振錫之息肩庶鐙王之贈席想香積之惠餐事在微而思通理匪絶而可溫賈誼弔屈云恭承嘉惠敬承亦此之流聚落是墟邑謂歌哭諍訟有諸喧譁不及山野為僧居止也經教欲令在山中皆有成文老子云善貸且善成此道惠物也鹿苑說四真諦處靈鷲山說般若法華處堅固林說泥洹處菴羅園說不思議處今旁林藝園制苑倣佛在昔依然託想雖粹容緬邈哀音若存也招提謂僧不能常住者可持作坐處也所謂息肩鐙王香積事出維摩經論語云溫故知新理既不絶更宜復溫則可待為己之日用也爰初經略杖策孤征入㵎水涉登嶺山行陵頂不息窮泉不停櫛風沐雨犯露乘星研其淺思罄其短規非龜非筮擇良選奇翦榛開徑尋石覓崖四山周回雙流逶迤面南嶺建經臺倚北阜築講堂傍危峰立禪室臨浚流列僧房對百年之喬木納萬代之芬芳抱終古之泉源美膏液之清長謝麗塔於郊郭殊世間於城傍欣見素以抱朴果甘露於道場云初經略躬自履行備諸苦辛也罄其淺短無假於龜筮貧者既不以麗為美所以即安茅茨而已是以謝郊郭而殊城傍然清虛寂寞實是得道之所也苦節之僧明發懷抱事紹人徒心通世表是遊是憩倚石構草寒暑有移至業莫矯觀三世以其夢撫六度以取道乘恬知以寂泊含和理之窈窕指東山以冥期實西方之潛兆雖一日以千載猶恨相遇之不早謂曇隆法流二法師也二公辭恩愛棄妻子輕舉入山外緣都絶魚肉不入口糞掃必在體物見之絶歎而法師處之夷然詩人西發不勝造道者其亦如此往石門瀑布中路高棲之游昔告離之始期生東山沒存西方相遇之欣實以一日為千載猶慨恨不早賤物重己棄世希靈駭彼促年愛是長生冀浮丘之誘接望安期之招迎甘松桂之苦味夷皮褐以頽形羡蟬蛻之匪日撫雲倪其若驚陵名山而屢憩過巖室而披情雖未階於至道且緬絶於世纓指松菌而興言良未齊於殤彭此一章敘仙學者雖未及佛道之高然出於世表矣浮丘公是王子喬師安期先生是馬明生師二事出列仙傳洞真經云今學仙者亦明師以自發悟故不辭苦味頽形也莊周云和以天倪倪者崖也數經歷名山遇余巖室披露其情性且獲長生方之松菌殤彭邈然有間也山作水役不以一牧資待各徒隨節競逐陟嶺刊木除榛伐竹抽筍自篁擲篛于谷楊勝所拮秋冬𦽌獲野有蔓草獵涉櫻薁亦醞山清介爾景福苦以朮成甘以𢸙熟慕椹高林剝芨巖椒掘蒨陽崖擲𢹛陰摽晝見搴茅宵見索綯芟菰翦蒲以薦以茭既泥既埏品收不一其灰其炭咸各有律六月採蜜八月撲栗備物為繁略載靡悉此一章謂是山作及水役採拾諸事也然漁獵之事皆不載楊楊桃也山閒謂之木子𦽌音覆字出字林詩人云六月食鬱及薁獵涉字出爾雅朮朮酒味苦𢸙𢸙酒味甘竝至美兼以療病𢸙治癰核朮治痰冷椹音甚味似菰菜而勝刊木而作之謂之慕芨音及採以為紙蒨音倩採以為泄𢹛音鮮採以為飲採蜜撲栗各隨其月也若乃南北兩居水通陸阻觀風瞻雲方知厥所兩居謂南北兩處各有居止峰崿阻絶水道通耳觀風瞻雲然後方知其處所南山則夾渠二田周嶺三苑九泉別㵎五谷異巘群峰參差出其閒連岫復陸成其坂衆流溉灌以環近諸堤擁抑以接遠遠堤兼陌近流開湍淩阜泛波水往步還還回往匝枉渚員巒呈美表趣胡可勝單抗北頂以葺館瞰南峰以啓軒羅曾崖於戶裏列鏡瀾於窗前因丹霞以赬楣附碧雲以翠椽視奔星之俯馳顧飛埃之未牽鵾鴻翻翥而莫及何但燕雀之翩翾氿泉傍出潺湲於東檐桀壁對跱硿礲於西霤修竹葳蕤以翳薈灌木森沈以蒙茂蘿蔓延以攀援花芬薰而媚秀日月投光於柯間風露披清於嵔岫夏涼寒燠隨時取適階基回互橑櫺乘隔此焉卜寢玩水弄石邇即回眺終歲罔斁傷美物之遂化怨浮齡之如借眇遁逸於人群長寄心於雲霓南山是開創卜居之處也從江樓步路跨越山嶺綿亘田野或升或降當三里許塗路所經見也則喬木茂竹緣畛彌阜橫波疏石側道飛流以為寓目之美觀及至所居之處自西山開道迄于東山二里有餘南悉連嶺疊鄣青翠相接雲烟霄路殆無倪際從徑入谷凡有三口方壁西南石門世稱南有池東南皆別載其事緣路初入行於竹徑半路闊以竹渠㵎既入東南傍山渠展轉幽奇異處同美路北東西路因山為鄣正北狹處踐湖為池南山相對皆有崖巖東北枕壑下則清川如鏡傾柯盤石被隩映渚西巖帶林去潭可二十丈許葺基構宇在巖林之中水衛石階開窗對山仰眺曾峰俯鏡濬壑去巖半嶺復有一樓迥望周眺既得遠趣還顧西館望對窗戶緣崖下者密竹蒙徑從北直南悉是竹園東西百丈南北百五十五丈北倚近峰南眺遠嶺四山周回溪㵎交過水石林竹之美巖岫嵔曲之好備盡之矣刊翦開築此焉居處細趣密玩非可具記故較言大勢耳越山列其表側傍緬雲霓為異觀也因以小湖鄰於其隈衆流所湊萬泉所回氿濫異形首毖終肥別有山水路邈緬歸氿濫肥毖皆是泉名事見於詩云此萬泉所湊各有形勢求歸其路乃界北山棧道傾虧蹬閣連卷復有水徑繚繞回圓瀰瀰平湖泓泓澄淵孤岸竦秀長洲芉綿既瞻既眺曠矣悠然及其二川合流異源同口赴隘入險俱會山首瀨排沙以積丘峰倚渚以起阜石傾瀾而捎巖木映波而結藪徑南漘以橫前轉北崖而掩後隱叢灌故悉晨暮託星宿以知左右往反經過自非巖澗便是水徑洲島相對皆有趣也山川㵎石州岸草木既摽異於前章亦列同於後牘山匪砠而是岵川有清而無濁石傍林而插巖泉協㵎而下谷淵轉渚而散芳岸靡沙而映竹草迎冬而結葩樹淩霜而振緑向陽則在寒而納煦面陰則當暑而含雪連岡則積嶺以隱嶙舉峰則群竦以𡽱𡾲浮泉飛流以寫空沈波潛溢於洞穴凡此皆異所而咸善殊節而俱悅土山戴石曰砠山有林曰岵此章謂山川衆美亦不必有故總敘其最居山之後事亦皆有尋求也春秋有待朝夕須資既耕以飯亦桑貿衣藝菜當肴採藥救頽自外何事順性靡違法音晨聽放生夕歸研書賞理敷文奏懷凡厥意謂揚較以揮且列於言誠特此推謂寒待綿纊暑待絺綌朝夕餐飲設此諸業以待之藥以療病又在其外事之相推自不得不然至於聽講放生研書敷文皆其所好韓非有揚較班固亦云揚較古今其義一也左思曰為左右揚較而陳之北山二園南山三苑百果備列乍近乍遠羅行布株迎早候晚猗蔚溪㵎森疏崖巘杏壇㮈園橘林栗圃桃李多品梨棗殊所枇杷林檎帶谷映渚椹梅流芬於回巒椑柿被實於長浦莊周云漁父見孔子杏壇之上維摩詰經㮈樹園楊雄蜀都賦云橘林左太沖亦云戶有橘柚之園桃李所植甚多棗梨事出北河濟之間淮潁諸處故云殊所也畦町所藝含蕊藉芳蓼蕺葼薺葑菲蘇薑緑葵眷節以懷露白薤感時而負霜寒蔥摽蒨以陵陰春藿吐苕以近陽葑菲見詩柏舟中管子曰北伐山戎得寒蔥庾闡云寒蔥挺園灌蔬自供不待外求者也弱質難恆頽齡易喪撫鬢生悲視顏自傷承清府之有術冀在衰之可壯尋名山之奇藥越靈波而憩轅採石上之地黃摘竹下之天門托曾嶺之細辛拔幽㵎之溪蓀訪鍾乳於洞穴訊丹陽於紅泉此皆住年之藥即近山之所出有采拾欲以消病也安居二時冬夏三月遠僧有來近衆無闕法鼓朗響頌偈清發散華霏蕤流香飛越析曠劫之微言說像法之遺旨乘此心之一豪濟彼生之萬理啓善趣於南倡歸清暢於北機非獨愜於豫情諒僉感於君子山中兮清寂群紛兮自絶周聽兮匪多得理兮俱悅寒風兮搔屑面陽兮常熱炎光兮隆熾對陰兮霜雪愒曾臺兮陟雲根坐㵎下兮越風穴在茲城而諧賞傳古今之不滅衆僧冬夏二時坐謂之安居輒九十日衆遠近聚萃法鼓頌偈華香四種是齊講之事析說是齊講之議乘此之心可濟彼之生南倡者都講北機者法師山中靜寂實是講說之處兼有林木可隨寒暑恆得清和以為適也好生之篤以我而觀懼命之盡吝景之歡分一往之仁心拔萬族之險難招驚魂於殆化收危形於將闌漾水性於江流吸雲物於天端覩騰翰之頏頡視鼓鰓之往還馳騁者儻能狂愈猜害者或可理攀云物皆好生但以我而觀便可知彼之情吝景懼命是好生事也能放生者但有一往之仁心便可拔萬族之險難水性雲物各尋其生老子云馳騁田獵令人心發狂猜害者恆以忍害為心見放生之理或可得悟也哲人不存懷抱誰質糟粕猶在啓縢剖袠見柱下之經二覩濠上之篇七承未散之全朴救己穨於道術嗟夫六藝以宣聖教九流以判賢徒國史以載前紀家傳以申世模篇章以陳美刺論難以核有無兵技醫日龜策筮夢之法風角冢宅算數律曆之書或平生之所流覽竝於今而棄諸驗前識之喪道抱一德而不渝莊周云輪扁語齊桓公公之所讀書聖人之糟粕縢者金縢之流也柱下老子濠上莊子二七是篇數也云此二書最有理過此以往皆是聖人之教獨往者所棄伊昔齠齔實愛斯文援紙握管會性通神詩以言志賦以敷陳針銘誄頌咸各有倫爰暨山棲彌歷年紀幸多暇日自求諸己研精靜慮貞觀厥美懷秋成章含笑奏理謂少好文章及山棲以來別緣既闌尋慮文詠以盡暇日之適便可得通神會性以永終朝若乃乘攝持之告評養達之篇畏絶迹之不遠懼行地之多艱均上皇之自昔忌下衰之在旃投吾心於高人落賓名於聖賢廣滅景於崆峒許遁音於箕山愚假駒以表谷涓隱巖以搴芳萊庇蒙以織畚皓棲商而頤志卿寢茂而敷詞鄭別谷而永逝梁去霸而之會高居唐而胥宇臺依崖而穴墀咸自得以窮年眇貞思於所遺老子云善攝生者莊子云謂之不善持生又云養生有無崖達生者不務生之所無奈何絶迹上皇下衰賓名義亦皆出莊周廣成子在崆峒之上黃帝之師也許由隱於箕山堯以天下讓而不取愚公居于駒阜齊桓公逐鹿入山見之涓子隱於宕山好餌朮告伯陽琴心三篇庚桑楚得老子之道居嵔礨之山楚狂接輿楚王聞其賢使使者聘之於是遂游諸名山在蜀峨眉山上徐無鬼巖棲魏侯勞之問先生苦山林矣乃肯見寡人無鬼問君絀嗜欲屏好惡則耳目察矣常采芧栗老萊子耕於蒙山之陽著書十五篇言道家之事織畚為業四皓避秦亂入商洛深山漢祖召不能出司馬長卿高才而處世不樂預公卿大事遂與弟子別於山阿終身不反梁伯鸞隱霸陵山中耕織以自娛後復入會稽山臺孝威居武安山下依崖為土室采藥自給高文通居西唐山從容自娛也暨其窈窕幽深寂漠虛遠事與情乖理與形反既耳目之靡端豈足迹之所踐蘊終古於三季俟通明於五眼權近慮以停筆抑淺知而絶𥳑謂此既非人跡所求更待三明五通然後可踐履耳故停筆絶𥳑不復多云冀夫賞音悟夫此旨也宋書謝靈運傳藝文類聚六十四江妃賦招魂定情洛神清思覃曩日之敷陳盡古來之妍媚矧今日之逢逆邁前世之靈異小腰微骨朱衣皓齒綿視騰采靡膚膩理姿非定容服無常度兩宜歡顰俱適華素于時升月隱山落日映嶼收霞斂色回飆拂渚每馳情於晨暮矧良遇之莫敘投明瑱以申贈覬色授而魂與嗟佳人之眇遇眺霄際而告語懼展愛之未期抑傾念而暫佇天台二娥宮亭雙媛青袿神接紫衣形見或飄翰凌煙或潛泳浮海萬里俄頃寸陰未改事雖假於雲物心常得於無待況分岫湘岸延情蒼陰隔山川之表裏判天地之浮沈承嘉約于往昔寧更二於在今儻借訪於交甫知斯言之可諶蘭音未吐紅顏若暉留眄光溢動袂芳菲散雲轡之絡驛案靈輜而徘徊建羽旌而逶迤奏清管之依微慮一別之長絶眇天末而永違藝文類聚七十九初學記十九御覽三百八十一
