body:
  text: 武帝答江夏王義恭詔昔二王兩謝俱至崇禮自今三臺五省悉同此例宋書長沙王道憐傳道憐孫祗字彥期大明中為中書郎太宰江夏王義恭領中書監服親不得相臨表求解職世祖詔親蠶詔朕卜祥大昕測辰拂羽爰詔六宮親蠶川室皇太后降鑾從御佇蹕觀禮緣籧既具玄紞方修庶儀發椒闈化動中縣妃主以下可量加班錫宋書孝武文穆王皇后傳大明四年后率六宮躬桑於西郊皇太后觀禮下詔答有司上封禪儀注詔天生神物昔王稱愧況在寡德敢當鴻貺今文軌未一可停此奏宋書禮志三恤都邑詔都邑節氣未調癘疫猶衆言念民瘼情有矜傷可遣使存問并給醫藥其死亡者隨宜恤贍宋書孝武紀罪周朗詔朗悖禮利口宜令翦戮微物不足亂典刑特鎖付邊郡宋書周郎傳大明四年上憾郎使有司奏其居喪無禮請加收治乃下詔於是傳送寧州於道殺之厲兵赦罪詔昔人稱人道何先於兵為首雖淹紀勿用忘之必危朕以聽覽餘間因時講事坐作有儀進退無爽軍幢以下普量班錫頃化弗能孚而民未知禁逭役違調起觸刑網凡諸逃亡在今昧爽以前悉皆原赦已滯囹圄者釋還本役其逋負在大明三年以前一賜原停自此以還鰥貧疾老詳所申減伐蠻之家蠲租稅之半近藉改新制在所承用殊謬實多可普更符下聽以今為始若先已犯制亦同蕩然宋書孝武紀寬南徐兗二州租詔南徐兗二州去歲水潦傷年民多困窶逋租未入者可申至秋登宋書孝武紀宗祀詔昔文德在周明堂崇祀高烈惟漢汶邑斯尊所以職祭罔愆氣令斯正鴻名稱首濟世飛聲朕皇考太祖文皇帝功耀洞元聖靈昭俗內穆四門仁濟群品外薄八荒威憺殊俗南腦徑越西髓剛戎裁禮興稼穡之根張樂協四氣之紀匡飾墳序引無題之外旌延寶臣盡盛德之範訓深劭農政高刑措萬物棣通百神薦祉動協天度下沿地德故精緯上靈動殖下瑞諸侯軌道河溓海夷朕仰憑洪烈入子萬姓皇天降祜迄將一紀思奉揚休德永播無窮便可詳考姬典經始明堂宗祀先靈式配上帝誠敬克展幽顯咸秩惟懷永遠感幕崩心宋書禮志三振賜水災詔雨水猥降街衢泛濫可遣使巡行窮斃之家賜以薪粟宋書孝武紀興學詔自靈命初基聖圖重遠參正樂職感神明之應崇殖禮囿奮至德之光聲實同和文以均節化調其俗物性其情故臨經式奠煥乎炳發道喪世屯學落年永獄訟微衰息之術百姓忘退素之方今息警夷嶂恬波河渚棧山航海鄉風慕義化民成俗茲時篤矣來歲可修葺庠序旌延國胄宋書孝武紀詳檢畿內詔王畿內奉京師外表衆夏民殷務廣宜思簡惠可遣尚書就加詳檢并與守宰平治庶獄其有疑滯具以狀聞宋書孝武紀追崇外家詔昔漢道既靈博平輝絶魏國方安嘉憲啓策皆因心所弘酌典沿誥亡外祖親王夫人柔德淑範光啓坤載屬內位闕正攝饋閨庭儀被芳闈聞宣戚里永言感遠思追榮秩宜式傍鴻則敬登徽序宋書文帝袁皇后傳夫人文帝袁皇后所生母也世祖下詔乃追贈豫章郡新淦縣平樂鄉君原孫棘兄弟詔棘薩氓隸節行可甄特原罪州加辭命并賜許帛二十匹宋書孫棘傳大明五年發三五丁棘弟薩應充行坐違期依刺軍法棘詣郡乞以身代薩又辭應受戮棘妻敨又寄語屬棘君當門戶豈可委罪小郎太守張岱依事表上世祖詔經王弘墓下詔故侍中中書監太保録尚書事揚州刺史華容文昭公弘德猷光劭鑒識明遠故散騎常侍左光祿大夫太子詹事豫章文侯曇首夙尚恬素理心貞正並綢繆先眷契闊屯夷內亮王道外流微譽以國圖令勛民思茂惠朕薄巡都外瞻覽墳塋永言想慨良深於懷便可遣使致祭墓所宋書王弘傳經殷景仁墓下詔司空文成公景仁德量淹正風識明允徽績忠謨夙達先照惠政茂譽實留民屬近瞻丘墳感往興悼可遣使致祭宋書殷景仁傳詔劉延孫舊京樹親由來常準卿前出所有別議今此防久弭當以還授小兒宋書劉延孫傳又南史十七益封諸王詔昔韓衛異姓宗周之明憲三封殊級往晉之令典唯皇家創典盡弘斯義朕應天命光宅四海思所以憲章前式崇建懿親永垂畫一著於甲令諸弟國封並可增益千戶宋書廬江王褘傳給外家塋戶詔趙蕭臧光祿袁敬公平樂郡君墓先未給塋戶加世數已遠胤嗣衰陵外戚尊屬不宜使墳塋蕪穢可各給蠻戶三以供灑掃宋書文帝皇后傳與劉秀之詔今以蕭惠開為憲司冀當稱職但一往眼額已自殊有所震宋書蕭惠開傳惠開徙御史中丞世祖與劉秀之詔又見南史十八御覽二百二十六贈劉延孫司徒詔故侍中尚書左僕射領護軍將軍東昌縣國侯延孫風局簡正體識沈明綢繆心膂自蕃升朝契闊唯舊幾將二紀靈業中圮則首贊出圖義令既舉則任均蕭寇器允棟幹勳實佐時及纍司馬兩官出內尹牧惠政茂課著自民聽忠謨令節簡乎朕心方燮和台階永毗國道奄至薨殞震慟兼深考終定典宜盡哀敬可贈司徒給班劍二十人侍中僕射侯如故宋書劉延孫傳又詔故司徒文穆公延孫居身寡約家素貧虛每念清美良深悽歎葬送資調固當闕乏可賜錢三十萬米千斛同上定國史詔項籍聖公編録二漢前史已有成列桓玄傳宜在宋典餘如爰議宋書徐爰傳爰議國史宜以義熙元年為斷下倭王世子興詔倭王世子興奕世載忠作蕃外海稟化寧境恭修貢職新嗣邊業宜授爵號可安東將軍倭國王宋書倭國傳春搜詔春搜之禮著自周令講事之語書於魯史所以昭宣德度示民軌則今歲稔氣榮中外寧晏當因農隙葺是舊章可克日於玄湖大閲水師并巡江右講武校獵宋書孝武紀禮南嶽詔江漢楚望咸秩周禮禮九疑於盛唐祀蓬萊於渤海皆前載流訓列聖遺式霍山是曰南嶽實維國鎮韞靈呈瑞肇光宋道朕駐蹕於野有事岐陽瞻睇風雲徘徊以想可遣使尊祭宋書孝武紀時車駕巡南豫南兗二州下詔巡行大赦詔朕受天慶命十一年於茲矣憑七廟之靈獲上帝之力禮橫四海威震八荒方巡三湘而奠衡嶽次九河而檢云岱今恢覽功成省風畿表觀民六合搜校長洲騰沙飛礫平嶽蕩海鼖晉合序鐃鉦協節獻鬯如禮饁獸傾郊敬舉王公之觴廣納士民之壽八風循通卿雲叢聚盡天慶瑞率宇竭歡思散大極之泉以福無方之外可大赦天下行幸所經無出今歲租布其述租餘債勿復收賜民爵一級女子百戶牛酒刺守邑宰及民夫從搜者普加洽賚宋書孝武紀加恩歷陽郡詔朕弱年操製出牧司雍承政宣風荐歷年紀國步中阻治戎江甸難夷情義實繫於懷今或練搜訓旅涉茲境閭故邑耆舊在目罕存年世未遠殲亡太半撫迹惟事傾慨兼者太宗燕故晉陽洽恩世祖流仁濟畿畼澤永言往猷思廣前賚可蠲歷陽郡租輸三年遣使巡忍問民疾苦鰥寡孤老六疾不能自存者厚賜粟帛高年加以羊酒几凡一介之善隨才銓貫前國名臣及府州佐吏量所沾錫人身已往施及子孫宋書孝武紀禁專殺詔自非臨軍戰陳一不得專殺其罪甚重辟者皆如舊先上須報有司嚴加聽察犯者以殺人罪論宋書孝武紀嚴軍興詔自今刺史守宰動民興軍皆須手詔施行惟邊隅外警及姦釁內發變起倉卒者不從此例宋書孝武紀禁占川澤詔前詔江海田池與民共利歷歲未久浸以弛替名山大川往往占固有司嚴加檢糾申明舊制宋書孝武紀省刑詔昔匹婦含怨山燋北鄙孀妻哀慟臺傾東國良以誠之所動在微必著感之所震雖厚必崩朕臨察九野志深待旦弗能使爛然成章各如其節遂令炎精損和陽偏不施歲云不稔咎實朕由大官供膳宜從貶撤近道刑獄當親料省其王畿內及神州所統可遣尚書與所在共訊畿外諸州委之制史并議省律令思存利民其考謫貿襲在大明七年以前一切勿治尤斃之家開倉賑給宋書孝武紀殖麥詔近炎精亢序苗稼多傷今二麥未晚甘澤頻降可不東境郡勤課墾殖尤斃之家量貨麥種宋書孝武紀巡行詔昔周王驥迹實窮四溟漢帝鸞軫夙遍五嶽是皆所以上對幽靈下理民土自天昌替馭臨宮創圖禮代天鬱世貿興毀皇家造宋日月重光璇璣得序五星順命而戎車歲動陳詩義闕朕聿含五光奄一天下思盡寶戒之規以塞謀危之路當沿時省方觀察風俗外詳考舊典以副側席之懷宋書孝武紀巡南豫州詔朕妄幸所經先見百年者及孤寡老疾並賜粟帛獄繫刑罪並親聽訟其士庶或怨鬱危滯受抑吏司或隱約潔立負擯州里皆聽進朕前面自陳訴若忠信孝義力田殖穀一介之能一藝之美悉加旌賞雖秋澤頻降而夏旱嬰斃可即開行倉並加賑賜宋書孝武紀又詔賞慶刑威奄國彝軌黜幽升明闢寓恆憲故採言聆風式觀侈質貶爵加地於是乎在今類帝宜社親巡江甸因覲嶽守躬求民瘼思弘明試之典以申考績之義行幸所經蒞民之職功宣於聽即加甄賞若廢務亂民隨愆議罰主者詳察以聞宋書孝武紀下鄧琬詔故光祿勳前征虜長史鄧胤之體局沈隱纍任著績朕昔當藩重首先佐務心力款盡弗忘於懷往歲息璩凶悖自取誅翦沿恩及琬特免釁戮今可擢為給事黃門侍郎以旌胤之宿誠宋書鄧琬傳車駕幸歷陽追思在藩之舊下詔下高句驪王高璉詔使持節散騎常侍督平營二州諸軍事征東大將軍高句驪王樂浪公璉世事忠義作藩海外誠係本朝志翦殘險通譯沙表克宣王猷宜加褎進以旌純節可車騎大將軍開府儀同三司持節常侍都督王公如故宋書高句驪傳恤東境詔東境去歲不稔宜廣商貨遠近販鬻米粟者可停道中雜稅其以仗自防悉勿禁宋書孝武紀南史宋本紀二恤東使詔去歲東境偏旱田畝失收使命來者多至乏絶或下窮流穴頓伏街巷朕甚閔之可出倉米付建康秣陵二縣隨宜贍恤若溫拯不時以至捐棄者嚴加糾劾宋書孝武紀授蕭惠開詔惠開前在憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞宋書蕭惠開傳又見御覽二百二十六恤劉秀之詔秀之識局明遠才應通畼誠著蕃朝績宣纍嶽往歲臣逆交構首義萬里及職司端尹贊戎兩宮嘉謀徽譽實彰朝野漢南法繁民嗛屬佇良牧故暫輟心膂外弘風規出未踰期德庇西服詳考古烈旅觀終始淳心忠概無以尚茲方式亮皇猷入衛根本奄至薨逝震動於朕心生榮之典未窮寵數哀終之禮宜盡崇飾兼屐謙守約封社弗廣興言悼往益增痛恨可贈侍中司空持節都督刺史校尉如故并增封邑為千戶諡為忠成公宋書劉秀之傳詔顧寶先敕違糾慢憲司之職若理有不公自當更有釐正而頃劾無輕重輒致私絶此風難長主者嚴為其科寶先蓋依附世準不足問宋書顧琛傳琛為左丞荀萬秋所劾及寶先為郎萬秋猶在職自陳不拜世祖詔聽行幹杖詔自頃幹僮多不祗給主可量聽行杖宋書沈演之傳先是五官省官所給幹僮不得雜役太祖世坐以免官者前後百人統輕役過差有司奏免世祖詔云云自此得行幹杖答王玄謨詔梁山風塵初不介意君臣之際過足相保聊復為笑伸卿眉頭宋書王玄謨傳民間訛言玄謨欲反玄謨馳啓帝知其虛遣主書吳喜撫慰之又答南史王玄謨傳作玄謨啓明白之曰七十老公反欲何求聊復為笑想足以伸卿眉頭耳天闕詔梁山天表象魏以旌圖形仍以二山為立關故曰天門御覽四十六輿地志博望梁山東西隔江相對如門相去數里謂之天門引宋孝武詔置古帝王守冢戶詔先代帝王因時創業君人建國禮尊南面而曆運推移年代久遠丘壟殘毀樵牧相趍塋兆堙蕪封樹莫辨自古以來帝王陵墓可隨近十戶蠲其役以供守視御覽五百六十答盧江王禕詔婚禮不舉樂且敬淵等孤苦倍非宜也巡幸賑恤詔夫足踐目見實遵天命尚怨踰深氓俗未同其化自遠幽隱不得其所故降省風俗躬撫黎元初學記十三巡狩省風俗詔朕聿合五邑奄一天下當沿時省方觀察風俗外詳考舊典以副側席之懷也初學記十三賜沈慶之卿辛勤匪殊歡宴宜等且觴酌之賜宜以大夫為先也戒薛安都賊若可及便盡力殄之若度已回可過河耀威而反宋書嶭安都傳戒沈慶之卿為統任當令處分有方何蒙楯城下身受矢石邪脫有傷挫為損不小宋書沈慶之傳答劉懷珍邊維須才未宜陳請南齊書劉懷珍傳大明二年以破虜功拜建武將軍樂陵河間二郡太守明年啓求還孝武答答子業書不長進此是一條耳聞汝比素業都懈怠狷戾日甚何以頑固乃爾邪宋書前廢帝紀世祖西巡子業啓參承起居書迹不謹上詰讓之子業啓事陳謝上又答又見南史宋本紀二臨徐兗二州搜揚教徐方地兼梁楚秀士攸出兗土樂頌所流風禮自古豈不異人比肩鴻才世及或疏散山林不聞進達或栖息閭閻懷寶待耀孝性義門明經善政者所在搜揚舉進咸用名聞藝文類聚五十三在藩上白雉表白體表素彩儀稟識自擾陶氣仁風練色淳露不蘄一飲之逸不資三逸之勤藝文類聚九十建平王宏冠表臣駿言建平王宏筮辰協吉撰禮備容資此成德允被休典初學記十四廣陵王誕冠表臣駿言北中郎南徐州刺史廣陵王臣誕年禮既平擇休申冠順辨有成服美任典初學記十四巡幸舊宮頌惟皇敬眷永慕徐京列裝青野動輅丹庭榮和首律景澤開年林烔發色川郊列泉沿泝遙衍登陟回懸踐域負外即宮臨山思甲陵寢歡結枌都眇懷沛濟勤念宛吾納壽遺老設飲先居堂序朝秀充廷集閭藝文類聚六十二芳春琴堂橘連理頌列訪神祕詳觀端策通柯竦秀實靈所錫離條別幹淹一榮戚道被遐夷承我正歷藝文類聚八十六洞井贊絳紀山瑞紫志川靈金膏溢曜玉樹含英端巖育泉挹祥吐禎彪彬仙牒揮翕詭經藝文類聚七十八清暑殿甍嘉禾贊維殷粵周有穗表禎祥乎合矣超瑞高甍非原非澤乃瑞乃靈庶藉天貺廣茲化清藝文類聚八十五梨花贊沃瘠異壞舒慘殊時惟氣在春具物合滋嘉樹之生於彼山基開榮布采不離塵緇藝文類聚八十六孤桐贊珍無隱德産有必甄資此孤幹獻枝楚山梢星雲界衍葉炎廛名列貢寶器贊虞絃藝文類聚八十八景陽樓慶雲贊非煙非雲曳紫流光縣華曜藻奄鬱臺堂粵豫休明震乎珍祥積慶有文靈貺無疆藝文類聚九十八祀大一牛鼎銘維甲午八月丙寅帝若稽古肇作宋器審厥像作牛鼎格于位室從用饗億寧神休惟帝時保萬世其永賴宋溍説友咸淳臨安志十三故侍中司徒建平王宏墓志含榮幼耀應和早慧俳徊天人優遊經藝鴻沴才流皇根中絶體孝盡性懷追孝烈反我宸居毀網更結管機凝務端朝贊契召輝才融士穎風折祕路長陰昭塗永滅藝文類聚四十八祈晴文幽明失序就陰則滯連雨霖霪注而不替潤既違時澤而非惠幸輟霖而吐景權停雲而斂翳照鸞輅於天郊光龍旗於田際耒耨得施黍稷獲藝增高廩於嘉年登十千於茲歲藝文類聚二初學記二
