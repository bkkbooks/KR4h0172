body:
  text: 賀道期太廟送神議樂以迎來哀以送往祭統迎牲而不迎尸詩云鐘鼓送尸鄭云尸神像也與今儀注不迎而後送若合符契宋書禮志四元嘉六年博賀道期議渾天記昔記天體者有三渾儀莫知其始書以齊七政蓋渾體也二曰宣夜夏殷法也三曰周髀當周髀之所造非周家之術也近世復有四術一曰方天與於王充二曰軒天起於姚信三曰穹天由於虞喜皆以臆斷浮説不足觀也惟渾天之事徵驗不疑御覽二奏鑄象造寺宜加裁檢劍化被於中國已歷四代形象塔寺所在千數進可以繫心退足以招勸而自頃以來情敬浮末不以精誠為至更以奢競為重舊宇穨弛曾莫之修而各務造新以相姱尚甲第顯宅於茲殆盡材竹銅綵糜損無極無關神祇有纍人事違中越制宜加裁檢不為之防流遁未息請自今以後有欲鑄銅像者悉詣臺自聞興造答寺精舍皆先詣在所二千石通辭郡依事列言本州須許報然後就功其有輒造寺舍者皆依不承用詔書律銅宅林苑悉沒入官宋書天竺迦黎國傳元嘉十二年丹陽尹蕭摩之奏詔可又見廣弘明集六上言李元德等政績宣威將軍陳南頓二郡太守李元德清勤均平姦盜止息彭城內史魏恭子廉恪修慎在公忘私安約守儉久而彌回前宋縣令成浦治政寬濟遺詠在民前鮦陽令李熙國在事有方民思其政故山桑令何道自少清廉白首彌厲應加褎賚以勸於後宋書江秉之傳元嘉初遣大使巡行四方兼散騎常侍孔默之王歆之等上言又見南史七十阮長之傳不云孔默之但作王歆之等之字叔道河東猗氏人晉南蠻校尉愆期會孫官至左戶尚書光祿大夫刑法議君子小人既雜為符伍不得不以相檢為義士庶雖殊而理有聞察譬百司居上所以下不必躬親而後同坐是故犯違之日理自關今罪其養子典計者蓋義存戮僕如此則無奴之室豈得晏安但既云復士宜令輸贖常盜四十匹主守五匹降死補兵雖大存寬惠以紓民命然官及二千石及失節士大夫時有犯者罪乃可戮恐不可以補兵也謂此制可施小人士人自還用舊律宋書王弘傳獄中上書囚小人猖狂識無遠概徒徇意氣之小感不料逆順之大方與第二弟休先首為姦謀干犯國憲齏膾脯醢無補尤戾陛下大明含弘量苞天海録其一介之節猥垂優逮之詔恩非望始沒有遺榮終古以來未有斯比夫盜馬絶纓之臣懷璧投書之士其行至賤其過至微由識不世之恩以盡軀命之報卒能立功齊魏致勳秦楚囚雖身陷禍逆名節俱喪然少也慷慨竊慕烈士之遺風但墜崖之木事絶升躋覆盤之水理乖收汲方當身膏鐵鉞詒誡方來若使魂而有靈結草無遠然區區丹抱不負夙心貪及視息少得申畼自惟性愛群書心解數術智之所周力之所至莫不窮覽究其幽微考論既往誠多審驗謹略陳所知條牒如故別狀願且勿遺棄存之中書若囚死之後或可追存庶九泉之下少塞釁責宋書范蔚宗傳諭衆檄夫休否相乘道無恆泰狂狡肆逆明哲是殛故小白有一匡之勳重耳有翼戴之德自景平肇始皇室多故大行皇帝天誕英姿聰明睿哲拔自藩國嗣位統天憂勞萬幾垂心庶務是以邦內安逸四海同風而比年以來姦豎亂政刑罰乖淫陰陽違舛致使舋起蕭牆危禍萊集賊臣趙伯符積怨含毒遂縱姦凶肆兵犯蹕禍流儲宰崇樹非類傾墜皇基罪百浞豷過十玄莽開闢以來末聞斯比率土叨心華夷泣血咸懷亡身之誠同思糜軀之報湛之曄與行中領軍蕭思話行護軍將軍臧質行左衛將軍孔熙先建威將軍孔休先忠貫白日誠著幽顯義痛其心事傷其目投命奮戈萬殞莫顧即日斬伯符首及其黨與雖豺狼即戮王道維新而普天無主群萌莫繼彭城王體自高祖聖明在躬德格天地勳溢區宇世路威夷勿用南服龍潛鳳棲於茲六稔蒼生飢德億兆渴化豈唯東征有鴟梟之歌陝西有勿翦之思哉靈祇告徵祥之應讖記表帝者之符上答天心下愜民望正位辰極非王而誰今遣行護軍將軍臧質等齎皇帝璽綬星馳奉迎百官備禮駱驛繼進並命群帥鎮戍有常若干撓義徒有犯無貸昔年使反湛之奉賜手敕逆誡禍亂預覩斯萌令宣示朝賢共拯危溺無斷謀事失於後機遂使躬濫酷大變奄集哀恨崩裂撫心摧哽不知何地可以厝身輒督厲尪頓死而後已宋書范蔚宗傳孔熙先謀反使弟休先為檄文刑法議士人犯盜贓不及棄市者刑竟自在贓汙淫盜之目清議終身經赦不原當之者足以塞愆聞之者足以鑒誡若復雷同群小謫以兵役愚謂為苦符伍雖比屋鄰居至於士庶之際實自天隔舍藏之罪無以相關奴客與符伍交接有所藏蔽可以得知是以罪及奴容自是客身犯愆非代郎主受罪也如其無奴則不應坐宋書王弘傳太廟送神議在始不迎明在廟也卒事而送節孝思也若不送而辭是舍親也辭而後送是遣神也故孝不忍違其親又不忍遣神是以史送神以成蒸嘗之義宋書禮志四元嘉六年博士江邃議上表請議讀秋令服色謹案晉博士曹弘之議立秋御讀令上應緗幘遂改用素相承至今臣淺學管見竊有惟疑伏尋禮記月令王者四時之服止見駕蒼龍載赤旗衣白衣服黑玉季夏則黃文極於此無白冠則某履某舄也且幘又非古服出自後代上附於冠下不屬衣冠固不革而幘豈容異色愚謂應恆與冠同色不宜隨節變綵土令在近謹以上聞如或可採乞付外詳議宋書禮志二元嘉六年六駙馬都尉請徐道娛上表殷祠蒸祀議祠部下十月三日殷祠十二日蒸祀謹案禘祫之禮三年一五年再公羊所謂五年再殷祭也在四時之間周禮所謂凡四時之間祀也蓋歷歲節月無定天子諸侯先後弗同禮稱天子祫嘗諸侯蒸祫有田則祭無田則薦鄭注天子先祫然後時祭諸侯先時祭然後祫有田者既祭又薦新祭以首時薦以仲月然則大祭四祀其月各異天子以孟月殷仲月蒸諸侯孟月嘗仲月祫也春秋僖公八年秋七月禘文公二年八月大事於太廟穀梁傳曰著祫嘗也昭公十五年二月有事於武宮左傳曰禮也又周禮仲冬享蒸月令季杰嘗稻晉春蒸曲沃齊十月嘗太公此並孟仲區別不共之明文矣凡祭必先卜日用丁已如不從進卜遠日卜未吉豈容二事推期而往理尤可知尋殷蒸祀重祭薦禮輕輕尚異月重寧反同且祭不欲數數則瀆今隔旬頻享恐於禮為煩自經緯墳誥都無一月兩獻先儒舊説皆云殊朔晉代相承未審其原國事之重莫大乎祀愚管膚淺竊以惟疑請詳告下議宋書禮志四元嘉六年九月太學博士徐道娛上議寢不報又見通典五十太廟送神儀伏見太廟蒸嘗儀注皇帝行事畢出便坐三公已上獻太祝送神於門然後至尊拜百官贊拜乃退謹尋清廟之道所以肅安神也禮曰廟者貌也神靈所憑依也事亡如存若常在也既不應有送神之文自陳豆薦俎車駕至止並弗奉迎夫不迎而送送而後辭暗短之情實用未達案時人私祠誠皆迎送由於無廟庶感降來格因心立意非王者之禮也儀禮雖太祝迎尸於門此乃延尸之儀豈是敬神之典恐於禮有疑謹以議上宋書禮志四元嘉六年太學博士徐道娛上議春祠不用雌雞議案禮孟春之月是月也犧牲無用牝如此是春月不用雌爾秋冬無禁雄雞斷尾自可是春月宋書禮志四元嘉十年十三月太祝令徐閏刺署典雞何以用雌博士徐道娛等議又議凡宗祀牲牝不一前惟月令不用牝者蓋明在春必雄秋冬可雌非以山林同宗廟也四牲不改在雞偏異相承來久義或有由誠非末學所能詳究求詳議告報如所稱令同上刺署典送雌雞宗廟社稷祠祀薦五牲牛羊豕雞並用雄其一種市買由來送雌竊惟周景王時賓起見雄雞自斷其尾曰雞憚犧不祥今何以用雌求下禮官詳正勒太學依禮詳據宋書禮志四元嘉十年十二月薦關康之康之業履恆貞操勗清固行信閭黨譽延邦邑棲志希古操不可渝宜加徵聘以潔風軌宋書關康之傳世祖即位遣大使陸子真巡行天下使反薦康之不見省奏劾蔡興宗臣義恭表詔書如右攝曹辨核尚書袁愍孫牒此月十七日詣僕射顏師伯語次因及尚書蔡興宗有書固辭今授仍出疏見公乃者數紙不意悉何所道緣此因及朝士當今聖世不可使人以為少今牒數之朝廷處之實得所臣等亦自謂得分常多在門袁愍孫無或措多而愚意欲啓更量出內之宜芻蕘管見願在聞徹選令史宣傳密事故因附上聞亦外人言此今薛慶先列今月十八日往尚書袁愍孫論選事愍孫云昨詣顏僕射出蔡尚書疏見示言辭甚苦又云所得亦少主上踐祚始爾朝士有此人不多物議謂應美用乃更恨少使咨事便啓録公又謝莊闕時未老其疾以轉差今居此任復為非宜謂宜中書令才望為允又孔覬南士之美所歷已多近頻授即復回改於理為屈門下無人此是名選又張永人地可論其去歲愆戾非為深罪依其望復門下一人張淹替忝南下預因休戚雖屢經愆黜事亦已久謂應祕書監帶授興宗手迹數紙文翰炳然事證明白不假核辨愍孫任居官人職掌銓裁若有未久則宜顯言而私加許與自相選署託云物論終成虛詭隱末出端還為矛楯臣聞九官成讓虞風垂則誹主怨時漢罪夙斷況義為身發言謗朝序亂辟害政混穢大猷紛紜彰謬上延詔旨不有霜準軌憲斯淪請解興宗新附官須事御收付廷尉法獄治罪免愍孫所居官宋書蔡興宗傳義恭上表劾興宗因使尚書令柳元景奏詔興宗思愆遠封愍孫以子領職墾起湖田議富戶溫房無假遷業窮身寒室必應徙居葺宇疏皋産粒無待資公則公未易充課私則私卒難具生計既完畬功自息宜募亡叛通恤及與樂田者其往經創須粗修立然後赴居宋書孔靖傳大明初尚書令柳元景右僕射劉秀之尚書王瓚之顧覬之顏師伯嗣湘東王議與朝士書國禍冤深凶人肆逆民神崩憤若無天地南中郎親率義師翦討元惡司徒臧冠軍並同大舉舳艫千里購賞之利備之元景不武忝在行間總勒精勇先鋒道路勢乘上流衆兼百倍諸賢奕世忠義身為國良皆受遇先朝荷榮日久而拘逼寇廷莫由申效想聞今問悲慶兼常大行屆道廓清惟始企遲面對展雪哀情宋書柳元景傳世祖入討元凶元景與朝士書令軍中鼓繁氣易衰叫數力易竭但各銜枚疾戰一聽吾營鼓音宋書柳元景傳討臧質等檄夫革道應運基命之洪符嗣業興邦紹曆之明算自非瑞積神衷德充民極孰能升臨寶位景屬天居大宋啓期理高中世皇根帝業永流無疆夷陂遞來遘茲凶難國禍冤深人綱鬱滅主上聖略聰武孝感通神義變草木哀動精緯躬幸南郢親掃大逆道援橫流德模靈造三光重照七廟載興臧質少負庛釁衣冠不齒昧利誣天著於觸事受任述職不以宣效為心專方蒞民惟以侵剝為務官自賄至族以貨傾是以康周陀覆命屠宗冤達蒼昊郭伯西門遺出自皂隸寵越州朝往蒞東守鬻爵三千率卒西討竊俘取黜荷恩彭泗貪虐以逞坑戮邊氓忽若草芥傾竭倉庾割沒軍糧作牧漢南公盜府蓄矯易文簿專行欺妄及受命北伐憚役緩期師出有辰顧懷私愛匹馬棄衆宵行獨返遂復攜嬪擁姬淫宴軍幕孔范之變顯於逆辭匹此諸釁皆彰著於憲簡振曝於觀聽去歲義舉雖豫誠款而淹留西楚私相崇戴奉書致命形於心迹新亭之捷大難已夷凶命假存懸在晷刻廣莫之軍曾無遺矢重關自開偽衆已潰質猶復盤桓衢巷後騎陳師勞不足甄定於朝議而虐張功伐扇動怨辭自謂斯舉勳莫己若初踐殿守忘犬馬之情奔趣帑藏頓傾天府山海弘量苞荒藏疾録其一介之心掩其不逞之釁遂爵首元等職班盛級優榮溢寵莫與為疇自恣醜薄罔知涯涘干謁陳聞曾無紀極請樂窮太子之英求器盡官府之選徐司空匪躬王室遭罹凶禍質與之少長親交兼常曾無撫孤之仁惟聞陵侮之酷尺田寸寶靡有孑遺及受命南徂臨路滋甚逼奪妻嬪略市金帛怨動京邑醜聞都鄙棄逐舊故委蔑忠勤魯尚期尹周之徒心腹所倚泣訴於御筵袁同連子敬之疇爪牙所杖一逝而不反雖上旨頻煩屢求勞牒質但稱伐在己不逮僚隸託咎朝廷歸罪有司國士解心有識莫附何文敬趨走厮養天性愚狡質迷其姦諂置懷委杖遂外擅威刑內遊房室質生與釁俱不可詳究擢髮數罪曾何足言丞相威重位尊任居分陝宗國倚賴實兼恆情而不及謙沖之塗弗見逆順之訓蔽同郤至理乖范變遂乃遠忽世紀近受欺構杖納姦疏還謀社稷日者宴安上流坐觀成敗示遣疲卒衆裁三千戎馬不供軍糧靡獻皇朝直以親秩之重酬寵兼極近漸別子禮越常均苟識無所守功弗由己必為義不全終於敗德今茲放命恨心於本推諸昔歲迹是誠非矣且家國夷險情事異常豫是臣子孰不是赴而玩寇忘哀曾無奔拽面蕃十稔惠政蔑聞重贓深掠縱欲己甚姬妾百房尼僧千計敗道傷俗悖亂人神民怨盈塗國謗彌歲又賊劭未禽凶威猶強將毀其私墳戮其諸子圖成駭機垂賴義舉捷期云速不日告平釋怨毒之心解倒懸之急論恩敘德造育為重援人自助棄人快讒怙亂疑功未聞其比僕以不肖過蒙榮私荷佩升越光絶倫伍家本北邊志存慷慨常甘投生以徇艱棘惟恩思難激氣衝襟故以眺三湘而永慨望九江而遐憤若使身死國康誓在殞命況仰稟聖略俯鞠義徒萬全之形愚夫所照夫薛竟陵控率突騎陸道步馳檀右衛申右率垣遊擊整勒鋭師飛輪構路王豫州方舟繕甲久已前驅僕訓卒利兵淩波電進沈鎮軍蕭安南接舳連旌首尾風合驃騎竟陵王懿親令譽問望攸歸大司馬江夏王道略明遠徵猷茂世並旄鉞臨塗雲驅齊引群兵競邁祕駕徐啓八鑾搖響五牛舒旆千乘雷動萬軸雲回騰威發號星流漢轉以上臨下易於轉員加以三謀協從七緯告慶幽顯同心昭然易覩諸君或世荷恩幸或身聞教義當知君臣大節誓不可犯寇屨至誨難用倒設履安奉順聲泰事全孰與附逆居危身害名醜慈親垂白受戮弱子嬰孩就誅所以有詔遲回未震雷霆者正諸君身拘寇手或懷乃心吉凶由人無謂為遠今而不變後悔何及授檄之日心馳賊庭宋書臧質傳與王弘書僕聞軌物設教必隨制宜世代盈虛亦與之消息夫勢之所處非親不居是以周之宗盟異姓為後權軸之要任歸二南斯前代之明暮當今之顯轍明公位極台鼎四海具瞻劬勞夙夜義同吐握而總録百揆兼牧畿甸功實盛大莫之與儔天道福謙宜存挹損驃騎彭城王道德昭備上之懿弟宗本歸源所應推先宜出據列蕃齊光魯衛明公高枕論道變理陰陽則天下和平災害不作福慶與大宋升降享年與松喬齊久名重萬代豈不美歟宋書王弘傳春祠不用雌雞議尋月令孟春命祀山林川澤犧牲無用牝若如太學議春祠三牲以下便應一時俱改以從月令何以偏在一雞重更勒太學議答宋書禮志四元嘉十年十二月太祝令徐閏刺署典雞何以用雌博士徐道娛等議春月不用雌秋冬無禁太常丞司馬操議答何承天書論次孫宜持重有孫見存而以疏親為後則不通既不得立疏豈可遂無持重者此孫豈不得服三年邪嫡不傳重傳重非嫡自施親服卑無關孫為祖也通典八十八何承天答江氏問次孫宜持重與裴松之書裴答書言不宜持重又與司馬操書言其事操云難荀伯子為人後為所後父服論為人後者盡禮於彼而致降於此所以全受重之道成若子之義豈以真假殊其事早晚異其制哉豈不以父子之名定於受命之辰加崇之恩起於辭親之日大義昭然無厭奪之變而使情節伸而有餘歲月屈於不足未知輕重將欲何附論云甲死甲兒持服已練甲兒死甲弟乙方以其子景後之景無緣為伯持周服畢復更制二十五月服難曰景以甲練後方來後甲彼喪雖殺我重自始更制遠月於義何傷且昔以旁尊服不踰齊今為其子禮窮於制事乖義異深淺殊絶豈宜相蒙共為三年若是大功小功之親本服已訖乃為之後亦可計本服之月以充再周之限若無服之親今為甲嗣其義云何論云甲婦無緣持三周服又不合先景降服難曰甲婦女二周終訖何事三周吉凶有期何必顧景亦猶自遠之兄始及袒免其居室之弟久已笙歌豈得同一論云或疑甲垂除景出後景應服斬旬日而除意謂延待服除而出後耳難曰景以禮而行不及甲始喪蓋由事趣且夫堂階絶構喪位無王行路悽愴骨肉悼心既為置後宜及三年之內情事有寄豈得持疑以俟吉視再周之徒過哉論曰甲死婦女持服再周弟乙二子遠還以長子景後甲景弟丁為伯父追稅服周而景以後出之故更居綅縞旬日而除舛錯淺深不復是過難曰乙之子景今來後甲既不可與弟丁同稅周服又不可暫居綅縞旬日而除則景於甲之喪終闕徵服親為甲子而反不如丁有周月之制處之於三年之地而絶之於一日之哀待吉之義於此為躓論曰甲婦女無緣避此凶居別居吉宅又不可婦女歌於內繼子哭於外難曰甲婦復衰麻去身號咷輟響然素服嫠居與代長戚夫何圖於吉宅何務於謳歌通典九十七
