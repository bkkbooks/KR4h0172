body:
  text: 謝莊為北中郎新安王拜司徒章不惟震施罔匱鴻慶方稠燮調之重遂臻非據智小謀大周家興規少陽微暄有鑒前史辨其動植布其安擾以倡九牧阜成王教豈臣眇末所能克荷藝文類聚四十七章又為北中郎謝兼司徒章臣聞燮理陰陽寅亮天地弗惟其官無人則闕司徒掌敷五典職擾兆民豈悟乾靈罔遺光渥方闡不次之任殊絕藩岳豈可權尸三事假備六符慚震周廻顧步交悸藝文類聚四十七初學記十一御覽二百八慶皇太子元服上至尊表伏惟皇太子殿下明兩承乾元良作貳抗法遷身英華自遠樂以修中禮以治外三善克懋德成教尊今日吉辰顯加元服對靈祇之望儔上庠之歡率天罄世莫不載躍藝文類聚十六初學記十皇太子元服上皇太后表離景承宸樞光陪極毓問東華飛英上序樂正歌風司成頌德清明神鏡溫文在躬練日𥳑辰顯備元服懋三王之教燭少陽之重藝文類聚十六初學記十為東海王讓司空表臣側觀前載與窺洪典三事之授惟帝其難臣乘少籍長久分踰涯量出滿入泰每究榮光不悟乾燭方遠義路同遺下參弘化上尸燮理自非德仞具瞻聲堪民詠未有妄臻此澤空集茲靈藝文類聚四十七讓吏部尚書表招才琴釣之上取士歌牧之中終能克夷景命榮懷萬宇豈容先私首曲近有經過且不習冠制趙客興鑒未閒統馭鄭臣有規匪痗身譏藝文類聚四十八上搜才表臣聞功照千里非特燭車之珍德柔鄰國豈徒祕璧之貴故詩稱殄悴誓述榮懷用能道臻無積化至恭已伏惟陛下膺慶集圖締㝢開縣夕爽選政昃旦調風采言厮輿觀謠仄遠斯實辰階告平頌聲方製臣竊惟隆陂所漸治亂之由何嘗不興資得才替因失士故楚書以善人為寶虞典以則哲為難進選之軌既弛中代登造之律未闡當今必欲崇本康務庇民濟俗匪更惉懘奚取九成夫才生於時古今豈貳士出於世屯泰焉殊升厤中陽英賢起於徐沛受籙白水茂異出於荊宛寍二都智之所產七隩才之所集實遇與不遇用與不用耳今大道方亨萬務俟德而九服之曠九流之艱提鈞懸衡委之選部一人之鑒易限而天下之才難原以易限之鑒鏡難原之才使國罔遺授野無滯器其可得乎昔公叔與僎同升管仲取臣於盜趙文非私親疏嗣祁奚豈諂讎比子茹茅以彙作範前經舉爾所知式昭往牒且自古任薦賞罰弘明成子舉三哲而身致魏輔應侯任二士而己捐秦相臼季稱冀缺而疇以田采張勃進陳湯而坐以褫爵此先事之盛準亦後王之彝鑒如臣愚見宜普命大臣各舉所知以付尚書依分銓用若任得其才舉主延賞有不稱職宜及其坐重者免黜輕者左遷被舉之身加以禁錮年數多少隨愆議制若犯大辟則任者刑論又政平訟理莫先親民親民之要寔歸守宰故黃霸治潁川累稔杜畿居河東歷載或就加恩秩或入崇輝寵今莅民之職自非公私必應代換者宜遵六年之制進獲章明庸墮退得民不勤擾如此則下無浮謬之愆上靡棄能之累考績之風載泰槱薪之歌克昌臣生屬亨路身漸鴻猷遂得奉詔左右陳愚於側敢露芻言懼氛恆典宋書謝莊傳又南史二十通典十四讓中書令表伏惟陛下登馭震維臨齊璿政澤與風翔恩從雲動臣聞璧門天邃鳳沼神深絲綸王言出納帝命自非望允當時譽宣庠塾未有謬垂曲寵空席茲榮在於年壯猶不可勉況今綿痼百志俱淪藝文類聚四十八初學記十一御覽二百二十謝賜貂裘表臣莊言主衣黃達宣敕賜臣貂裘匭發衽開玄華有曜靡毫柔毳黯鑑自凝固以綵越綴翬光逾緝燕臣聞嚬笑不妄韓裳勿假績以昭庸楚纊爰逮臣歡抃自歌而同委衿之澤勤勞未報而叨解裘之寵空荷榮施徒賁微軀承殊恩必識服以淪生銘悅之情罔知所寘臣受假無由躬拜謹遣表初學記二十六為八座太宰江夏王表請封禪江淮鄗上之使結軌於璧門西鶼北采之譯相望於道路初學記十三為尚書八座奏封皇子郡王臣聞桐珪睦親書河汾之策賜帶懷賢敬東平之祚諒以訓經終始義洽垣墉第某皇弟等器彩明敏令識穎悟並宜憲章前典光啟祚宇作屏王室式雍帝載臣等參議可封郡王藝文類聚五十一為尚書八座奏改封郡長公主臣聞爵厚懿戚國之恆典景祚既新禮與時渥永興等七公主可封郡長公主藝文類聚五十一申言節儉詔書事詔云貴戚競利興貨廛肆者悉皆禁制此實允愜民聽其中若有犯違則應依制裁糾若廢法申恩便為令有所屈此處分伏願深思無緣明詔既下而聲實乖爽臣愚謂大臣在祿位者尤不宜與民爭利不審可得在此詔不拔葵去織實宜深弘宋書謝莊傳奏改定刑獄臣聞明慎用刑厥存姬典哀矜折獄實暉呂命罪疑從輕既前王之格範寍失弗經亦列聖之恆訓用能化致升平道臻恭己逮漢文傷不辜之罰除相坐之令孝宣倍深文之吏立鞫訊之法當是時也號令刑存陛下踐位親臨聽訟億兆相賀以為無冤民矣而比囹圄未虛頌聲尚缺臣竊謂五聽之慈弗宣於宰物三宥之澤未洽於民謠頃年軍旅餘弊劫掠猶繁監司封獲多非其實或規免身咎不慮國患楚對之下鮮不誣濫身遭鈇鑕之誅家嬰孥戮之痛比伍同閈莫不及罪是則一人罰謬坐者數十昔齊女告天臨淄臺殞孝婦冤戮東海愆陽此皆符變靈祗初感景緯臣近兼訊見重囚八人旋觀其初死有餘罪詳察其理實竝無辜恐此不少誠可怵惕也舊官長竟囚畢郡遣督郵案驗仍就施刑督郵賤吏非能異於官長有案驗之名而無研究之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覈辯必收聲吞釁然後就戮若二千石不能決乃度廷尉神州統外移之刺史刺史有疑亦歸臺獄必令死者不怨生者無恨庶鬻棺之諺輟歎於終古兩造之察流詠於方今臣學闇申韓才寡治術輕陳庸管懼乖國憲宋書謝莊傳又略見通典一百六十四索虜互市議臣愚以為獯獫棄義唯利是視關市之請或以覘國順之示弱無明柔遠距而觀釁有足表彊且漢文和親豈止彭陽之寇武帝修約不廢馬邑之謀故有餘則經略不足則閉關何為屈冠帶之邦通引弓之俗樹無益之軌招塵點之風交易爽議既應深杜和約詭論尤宜固絕臣庸管多蔽豈識國儀恩誘降逮敢不披盡宋書謝莊傳密詣世祖啟事賊劭自絕於天裂冠毀冕窮弒極逆開闢未聞四海泣血幽明同憤奉三月二十七日檄聖迹昭然伏讀感慶天祚王室叡哲重光殿下文明在嶽神武居陝肅將乾威龔行天罰滌社稷之仇雪華夷之恥使弛墜之構更獲締造垢辱之甿復得明目伏承所命柳元景司馬文恭宗愨沈慶之等精甲十萬已次近道殿下親董銳旅授律繼進荊鄢之師岷漢之眾舳艫萬里旌旆虧天九土冥符群后畢會今獨夫醜類曾不盈旅自相暴殄省闥橫流百僚屏氣道路以目檄至輒布之京邑朝野同欣里頌塗歌室家相慶莫不望景聳魂瞻雲佇足先帝以日月之光照臨區㝢風澤所漸無幽不洽況下官世荷寵靈叨恩踰量謝病私門幸免虎口雖志在投報其路無由今大軍近次永清無遠欣悲踊躍不知所裁宋書謝莊傳與江夏王義恭牋下官凡人非有達概異識俗外之志實因羸疾常恐奄忽故少來無意於人間豈當有心於崇達邪頃年乘事回薄遂果饕非次既足貽誚明時又亦取愧朋友前以聖道初開未遑引退及此諸夏事寍方陳微請款志未伸仍荷今授被恩之始具披寸心非惟在己知尤實懼塵穢彝序稟生多病天下所悉兩脅癖疾殆與生俱一月發動不減兩三每至一惡痛來逼心氣餘如綖利患數年遂成痼疾吸吸惙惙常如行尸恆居死病而不復道者豈是疾痊直以荷恩深重思荅殊施牽課尪瘵以綜所忝眼患五月來便不復得夜坐恆閉帷避風日晝夜惛懵為此不復得朝謁諸王慶弔親舊唯被敕見不容停耳此段不堪見賓已數十日持此苦生而使銓綜九流應對無方之訴實由聖慈罔已然當之信自苦劇若才堪事任而體氣休健承寵異之遇處自效之塗豈苟欲思閑辭事邪家素貧弊宅舍未立兒息不免麤糲而安之若命寧復是能忘微祿正以復有切於此處故無復他願耳今之所希唯在小閑下官微命於天下至輕在己不能不重屢經披請未蒙哀恕良由誠淺辭訥不足上感家世無年亡高祖四十曾祖三十二亡祖四十七下官新歲便三十五加以疾患如此當復幾時見聖世就其中煎憹若此實在可矜前時曾啟願三吳敕旨云都不須復議外出莫非過恩然亦是下官生運不應見一閑逸今不敢復言此當付之來生耳但得保餘年無復物務少得養疴此便是志願永畢在衡門下有所懷動止必聞亦無假居職患於不能裨補萬一耳識淺才常羸疾如此孤負主上擢授之恩私心實自哀愧入年便當更申前請以死自固但庸近所訴恐未能仰徹公恩盼弘深粗照誠懇願侍坐言次賜垂拯助則苦誠至心庶獲哀允若不蒙降祐下官當於何希冀邪仰憑愍察願不垂恡宋書謝莊傳為朝臣與雍州刺史袁顗書夫夷陂相因興革遞數或多難而固其國或殷憂而啟聖明此既著於前史亦彰於聞見王室不造昏凶肆虐神鼎將淪宗稷幾泯幸天未亡宋乾曆有歸主上體自聖文繼明作睿而辱均牖里屯踰夏臺既天地俱憤義勇同奮剋殄鯨鯢三靈更造應天順民爰集寶命四海屬息肩之歡華戎見來蘇之泰吾等獲免刀鋸僅全首領復身奉惟新命承亨運緩帶談笑擊壤聖世汝雖劬勞於外迹阻京師然心期所寄江漢何遠自九江告變皆謂鄧氏狂惑比日國言藉藉頗塵吾子道路之議豈其或然聞此之日能無駭惋凶人反道敗德日夜滋深昵近狡慝取謀豺虎非惟毒流外物惡積中朝乃欲毀陵邑虐崇憲燒宗廟鹵御物然後蕩覆京都必使蘭蕕俱盡自非聖上廟算靈圖俛眉遜避維持內外擁衛臣下則赤縣為戎百姓其魚矣此事此理寍可孰念既天道輔順謳歌有奉高祖之孫文皇之子德洞九幽功貫三曜匡拯家國提毓黔首若不子民南面將使神器何歸而群小構慝妄生窺覬成軫惑燕貫高亂趙讒人罔極自古有之汝中京冠冕儒雅世襲多見前載縣鑒忠邪何遠遺郎中之清軌近忘太尉之純概吾等相與或群從舅甥或姻婭周款一旦胡越能無悵恨若疑誑所至邪詖無窮汝當誓眾奮戈翦此朝食若自延過聽迷塗未遠聖上臨物以仁接下以愛豈直雍齒先封乃當射鉤見相矣當由力窘跡屈丹誠未亮邪跂予南服寤寐延首若反棹沿流歸誠鳳闕錫珪開㝢非爾而誰吾等竝過荷曲慈俱叨非服紆金拖玉改觀蓬門入奉舜禹之渥出見羲唐之化雍容揄揚信白駒空谷之時也柰何毀擲先基自蹈凶戾山門蕭瑟松庭誰埽言念楚路豈不思父母之邦幸納惡石以蠲美疹裁書表意爾其圖之宋書袁顗傳太宗使朝士與顗書藝文類聚二十五有此以為謝莊撰為沈慶之荅劉義宣書皇綱絕而復紐區宇墜而更維文選王巾頭陀寺碑文注與左僕射書弟昨還方承一日忽患悶當時乃爾大惡殊不易追企怛想諸治昨來已漸勝眠食復云何頃日寒重春節至居患者無不增動今作何治眼風不異耳指遣承問謝莊白呈左僕射淳化閣帖三竹贊瞻彼中唐綠竹猗猗貞而不介弱而不虧杳裊人表蕭瑟雲崖推名楚潭美質梁池藝文類聚八十九宋孝武宣貴妃誄并序惟大明六年夏四月壬子宣貴妃薨律谷罷煖龍鄉輟曉照車去魏聯城辭趙皇帝痛掖殿之既闃悼泉途之已宮巡步檐而臨蕙路集重陽而望椒風嗚呼哀哉天寵方隆王姬下姻肅雍揆景陟屺爰臻國軫喪淑之傷家凝霣庇之怨敢撰德於旂旒庶圖芳於鍾萬其辭曰玄丘烟熅瑤臺降芬高唐渫雨巫山鬱雲誕發蘭儀光啟玉度望月方娥瞻星比婺毓德素里棲景宸軒處麗絺綌出懋蘋蘩修詩賁道稱圖照言翼訓姒幄贊軌堯門綢繆史館容與經闈陳風緝藻臨彖分微游藝殫數撫律窮機躊躇冬愛怊悵秋暉展如之華寔邦之媛敬勤顯陽肅恭崇憲奉榮維約承慈以遜逮下延和臨朋違怨祚靈集祉慶藹迎祥皇胤璿式帝女金相聯跗齊穎接萼均芳以蕃以牧燭代輝梁視朔書氛觀臺告祲八頌肩和六祈輟滲衡總滅容翬翟毀衽掩綵瑤光收華紫禁嗚呼哀哉帷軒夕改軿輅晨遷離宮天邃別殿雲懸靈衣虛襲組帳空烟巾見餘軸匣有遺絃嗚呼哀哉移氣朔兮變羅紈白露凝兮歲將闌庭樹驚兮中帷響金釭曖兮玉座寒純孝擗其俱毀共氣摧其同欒仰昊天之莫報怨凱風之徒攀茫昧與善寂寥餘慶喪過乎哀棘實滅性世覆沖華國虛淵令嗚呼哀哉題湊既肅龜筮既辰階撤兩奠庭引雙輴維慕維愛曰子曰身慟皇情於容物崩列辟於上旻崇徽章而出寰甸照殊策而去城闉嗚呼哀哉經建春而右轉循閶闔而逕度旌委鬱於飛飛龍逶遲於步步鏘楚挽於槐風喝邊簫於松霧涉姑繇而環廻望樂池而顧慕嗚呼哀哉晨轀解鳳曉蓋俄金山庭寢日隧路抽陰重扃閟兮燈已黯中泉寂兮此夜深銷神躬於壤末散靈魄於天潯響乘氣兮蘭馭風德有遠兮聲無窮嗚呼哀哉文選五十七藝文類聚十五黃門侍郎劉琨之誄秋風散兮涼葉稀出吳洲兮謝江幾瞻國門兮聳雲路睇舊里兮驚客衣魂終朝而三奪心一夜而九飛過建春兮背闕庭歷承明兮去城輦旌徘徊而北係轜逶遲而不轉挽掩隧而辛嘶驥含愁而鳴俛顧物色之共傷見車徒之相泫藝文類聚四十八殷貴妃諡策文維年月日皇帝曰咨故淑儀殷氏惟爾含徽挺懋爰光素里友琴流荇實華紫掖奉軒景以柔明登譽處椒風以婉孌升名幽閑之範日藹層闈繁祉之慶方隆蕃世而當春掩藻中波滅源朕用震悼傷於厥心松柏已翦泉冥將隧宜旌德第行式衍聲芳今遣某官某冊告諡曰宣魂而有靈尚茲寵渥嗚呼哀哉藝文類聚十五初學記十孝武帝哀策文應門洞望馳道南除叢塗已撤鬱鬯將虛哀子嗣皇帝擗摽池綍周遑旌軫攀七緯之崩淪慟三靈之徂盡百神慕而行雲沈萬國哀而素霜霣衣冠緬邈弓劍不追敢緝謳頌髣髴希夷其辭曰樞電皇根月瑤國緒胤裔丹陵蟬聯華渚二后在天大行纂武克睿克聖重規襲矩昭昭金式明明玉溫望雲其遠就日其尊兩零露湛冬暖春暄聲芳納麓道昭賓門上德無稱至功不器怊悵四始優遊六位綴響蘭深緝言瓊祕悠哉梁踐眇焉汾肆敬業開寓離經作翰鴻起荊河鸞遊楚漢泗濱霑明江區承奐陝左清郊棠陰虛館地維不紐乾綱弛機羲庭薄蝕紫路流飛泣血派涘顧瞻川沂孝貫樞極義震寰圍誓鉞皇郊詔師牧甸七景締華五雲卷煽雪怨園邑埽恥瀛縣啟聖宸蓋集寶龍見王室多故國步方蹇淮濟裂冠江荊毀冕東楚亂常西華汨典動筭揮圖爰戡爰翦浹宙斯澄綿區咸鏡修風曉逸德星夕映溽露飛甘舒雲結慶禎被動植信泊翔泳缺禮克宣墜章必搆方堂饗極圓流肆冑南聳郊宮北清靈囿瑤軒春藉翠華冬狩經緯窮文克定盡武鄗上呈祥介丘載佇在盈念宂成功弗處榮鏡中世舄奕前古睿業初遠鴻化方亭丹雲承日素景媵星玉几去襲綴衣在庭辭重陽之昭昭降大夜之冥冥氣貿炎涼史詔龜筮文物空嚴鑾和虛衛動蜃輅之逶迤顧璧羽之容裔出國門分天地向幽途異身世龍旌鬱而青槐遠驚葭亂而白楊翳觀初霜之變條聽秋風之下蔕橋山絙雲穀林虧日輦道結寒松庭盡密芝蓋迫軨上驤眷轡萬㝢肅其北𨌹靈阿闃其深隘南維有時傾離光不常鏡騰英聲與茂實方流華於舞詠藝文類聚十三皇太子妃哀策文楹凝桂奠庭肅龍轀風沈國路雲起郊門皇帝傷總繸之掩綵悼副褘之滅華行光既晏長河又斜顧而言曰璇瑤有毀郁烈無湮翦素裁簡授之史臣其辭曰霍岫虧天灊流凝漢祥發桐珪慶昭金筭毓景帝里飛芳戚閈祕儀施谷升音集灌月晷幾望娣袂維良釋幃春宮承飾少陽五葉衍藻四訓抽光葳蕤蕙振婉孌瓊相清徽就遠祲沴傳方臨華罷翠當曄收蘭複殿生響長廡結寒節移虛饋氣變容衣中庭草薆階上螢飛傷縈里第痛溢朝闈霜侵燭昧風密帷淒驚葭夕轉龍驂夜嘶筵既訣兮奠既撤背青闕兮去神閨旌掩鬱而還泛蓋逶遲而顧低素紼歛維華軿解馭山隧恆陰松阿不曙離天渥兮就銷沈委白日兮即冥暮菊有秀兮蘅有芬德方遠兮聲彌樹藝文類聚十六初學記十豫章長公主墓志銘稟中極之照體星軒之華肅恭在國掖庭欽其風恪勤衡館庶族仰其德神葉靈條爰自帝堯文信啟魯肇京於楚宵燭載照娥英是從婉娩絺綌優柔肅雍蘅蕙有寶金碧不居泉庭一夜里館長蕪藝文類聚十六司空何尚之墓誌遠源長瀾自晉徂韓潛川韜玉霍岫騰鸞處華民瞻出光帝難寂寞壽仁茫昧報施調於飪歸經難褰寄晻映流芳煙熅作義藝文類聚四十七
