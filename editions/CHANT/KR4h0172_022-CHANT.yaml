body:
  text: 羊欣書三月六日欣頓首暮春感摧切割不能自勝當柰何柰何得去六日告深慰足下復何如腳中日勝也吾日弊難復令自顧憂歎情想轉積執筆增惋足下保愛書欲何言羊欣頓首淳化閣帖三陳吏民亡叛制臣伏尋亡叛之由皆出於窮逼未有足以推存而樂為此者也今立殊制於事為苦臣聞苦節不可貞懼致流弊昔龔遂譬民於亂繩緩之然後可理黃霸以寬和為用不以嚴刻為先臣愚以為單身逃役便為盡戶今一人不測坐者甚多既憚重負各為身計牽挽逃竄必致繁滋又能禽獲叛身類非謹惜既無堪能坐陵勞吏名器虛假所妨實多將階級不足供賞服勤無以自勸又尋此制施一邦而已若其是邪則應與天下為一若其非邪亦不宜獨行一部民離憂患其獘將甚臣忝守所職懼難尊用敢率管穴冒以陳聞宋書羊玄保傳奏劾謝沈山陰令謝沈親憂未除常著青絳納兩襠請免沈前所居官御覽六百九十三引宋起居注太始二年御史中丞羊希奏北征上計以今月十二日入泗口緣道把沙開溝以夜繼日日才行十餘里或七八里參陸澄皇弟休清殤服議尋澄議既無畫然前列不合準據案禮云子不殤父臣不殤君君父至尊臣子恩重不得以幼年而降又曰尊同則服其親服推此文旨旁親自宜服殤所不殤者唯施臣子而已宋書禮志二通典八十二刊革山澤舊科議壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致嗟怨今更刊革立制五條凡是山澤先常熂爈種養竹木雜果為林芿及陂湖江海魚梁鰌鮆場常加功脩作者聽不追奪官品第一第二聽占山三頃第三第四品二頃五十畝第五第六品二頃第七第八品一頃五十畝第九品及百姓一頃皆依定格條上貲簿若先已占山不得更占先占闕少依限占足若非前條舊業一不得禁有犯者水土一尺以上竝計贓依常盜律論停除咸康二年壬之科宋書羊玄保傳大明初希以云云從之又南史三十六與孫詵書稱陸法真足下同僚似有陸錄事者此生東南名地又張玄外孫持身至清雅有志節年高官下秉操下衰計當日夕相與申意宋書良吏王歆之傳世祖世吳郡陸法真歷官有清節嘗為劉秀之安北錄事參軍太山羊希與安北咨議參軍孫詵書荅何衡陽書敬覽高話辭切證明所為彼上人者難為酬對者也然如來窮理盡性因感成教故五善思啟戒品為之設六蔽待祛般若為之照薰以十善淨以無漏畢竟解脫至菩提而已矣斯末之所以明而本之不昧者邪孔以致孝為務則仁被四海釋以大慈為首則化周五道導物之迹非乃冥邪但應有麤精終然自殊耳凡覽般若諸經不以無孔為疑何獨誦丘之書有見棄之言乎以龍鬼之陋尚感聖而至誘掖得信豈季俗而已哉足下據見在之教以詰三世之辨奢迂之怪固不待言若許因果不謬猶形之與影徵要之效如合符也若日月之行幽明之信水火之降風雲之作皆先因而後果不出感召之道故緣起鑑能致水緣滅燧不招火一切諸法從緣起滅耳若鵝之就斃味登俎鼎燕之獲免無取鹽梅故鵝殺於人猶蟲死於燕鵝蟲見世受人燕未來報報由三業業有遲疾若人入孝出悌揚於王庭君親無將將則必誅此見報之疾著乎視聽者也若忠為令德剖心沈淵劫掠肆殺有幸而免此後報之遲疏而不失者也善惡之業業無不報但過去未來非耳目所得故信之者寡而非之者眾耳科法清淨滌塵開慧中國弗思謂為陷阱非我無謀秦勿用也勸人為善誠哉斯言然權者謂實非假設也故文王廢伯邑考而立武王權也周適非王發有天命禮是疏制理固從實伯邑廢立實也各從其實德用交歸自非大智孰能預之經云善權方便亦復如是耳夫民生而殺性之欲也飲血席毛在上皇之世矣聖人去殺非教殺也但民教未盡而化宜漸損雖將享三品尊薦厚賓然湯開其綱孔釣不綱詩翼五豝禮弗身踐據茲而觀作者之心見矣今忍不食誠已慈之心若推不忍於視聽之表均不食於見聞之內其至矣哉其至矣哉祗藉來誶申以管窺實相無言言成戲論既不自是想亦同非若高明之譬請俟諸君子廣弘明集二十木瓜賦美中洲之嘉樹表閑冶之麗姿結靈根以誕秀傾朝日以揚輝擢叢柯之冉冉布翠葉而蕤葳惟茲木之在林亦超類而獨劭方朝華而繁實比沙棠而有耀當大廈之方隆愧微幹之纖撓豈隱樸以幸全固呈才而不效離眾用而獲寍永端己以勵操願佳人之予投思同歸以託好顧衛風之攸珍雖瓊琚而匪報藝文類聚八十七御覽九百七十三為謝晦奉表自理臣階緣幸會蒙武皇帝殊常之眷外聞政事內謀帷幄經綸夷險毗贊王業預佐命之勳膺河山之賞及先帝不豫導揚末命臣與故司徒臣羨之左光祿大夫臣亮征北將軍臣道濟等竝升御床跪受遺詔載貽話言託以後事臣雖凡淺感恩自厲送往事居誠貫幽顯逮營陽失德自絕宗廟朝野岌岌憂及禍難忠謀協契徇國忘己援登聖朝惟新皇祚陛下馳傳乘流曾不惟疑臨朝殷懃增崇封爵此則臣等赤心已亮於天鑒遠近萬邦咸達於聖旨若臣等志欲專權不顧國典便當協翼幼主孤背天日豈復虛館七旬仰望鸞旗者哉故廬陵王於營陽之世屢被猜嫌積怨犯上自貽非命天祚明德屬當昌運不有所廢將何以興成人之美春秋之高義立帝清館臣節之所司耿弇不以賊遺君父臣亦何負於宋室邪況釁結鬩牆禍成畏逼天下耳目豈伊可誣臣忝居蕃任乃誠匪懈為政大小必先啟聞糾剔群蠻清夷境內分留弟姪竝侍殿省陛下聿遵先志申以婚姻童稚之目猥荷齒召薦女遷子合門相送事君之道義盡於斯臣羨之總錄百揆翼亮三世年耆乞退屢抗表疏優旨綢繆未垂順許臣亮管司喉舌恪虔夙夜恭謹一心守死善道此皆皇宋之宗臣社稷之鎮衛而讒人傾覆妄生國釁天威震怒加以極刑并及臣門同被孥戮雖未知臣道濟問推理即事不容獨存先帝顧託元臣翼命之佐勦於佞邪之手忠貞匪躬之輔不免夷滅之誅陛下春秋方富始覽萬機民之情偽未能鑒悉王弘兄弟輕躁昧進王華猜忌忍害規弄威權先除執政以逞其欲天下之人知與不知孰不為之痛心憤怨者哉臣等見任先帝垂二十載小心謹慎無纖介之愆伏事甫尒而嬰若斯之罪若非先帝謬於知人則為陛下未察愚款臣去歲末使反得朝士及殿省諸將書竝言嫌隙已成必有今日之事臣推誠仰期罔有二心不圖姦回潛遘理順難恃忠賢隕朝愚臣見襲到彥之蕭欣等在近路昔白公稱亂諸梁嬰冑惡人在朝趙鞅入伐臣義均休戚任居分陝豈可顛而不扶以負先帝遺旨輒率將士繕治舟甲須其自送投袂撲討若天祚大宋卜世靈長義師克振中流清蕩便當浮舟東下戮此三豎申理冤恥謝罪闕庭雖伏鑕赴鑊無恨於心伏願陛下遠尋永初託付之旨近存元嘉奉戴之誠則微臣丹款猶有可察臨表哽慨言不自盡宋書謝晦傳又為謝晦上表臣聞凶邪敗國先代成患讒豎亂朝異世齊禍故趙高矯逼秦氏用傾董卓階亂漢祚伊覆雖哲王宰世大明照臨未能使其漸弗興茲害不作姦臣王弘等竊弄權威興造禍亂遂與弟華內外影響同惡相成忌害忠賢圖希非望故司徒臣羨之左光祿大夫臣亮橫被酷害并及臣門雖未知征北將軍臣道濟存亡不容獨免遂遣蕭欣到彥之等輕舟見襲姦偽之甚一至於斯羨之及亮或宿德元臣姻婭皇極或任總文武位班三事道濟職惟上將扞城是司皆受遇先朝棟梁一代臣昔因時幸過蒙先眷內聞政事外經戎旅與羨之亮等同被齒盼既經啟王基協濟大業爰自權輿暨於揖讓誠積雖微仍見紀錄竝蒙丹書之誓各受山河之賞欲使與宋升降傳之無窮及聖體不豫穆卜無吉召臣等四人同升御床顧命領遺委以家國仰奉成旨俯竭股肱忠貞不效期之以死但營陽悖德自絕於天社稷之危憂在託付不有所廢將焉以興乃遠稽殷漢用升聖德陛下順流乘傳不聽張武之疑入邸龍飛非俟宋昌之議斯乃主臣相信天人合契九五當陽化形四海羨之及亮內贊皇猷臣與道濟分翰於外普天之下孰曰不宜遂蒙寵授來鎮此方分留弟姪以侍臺省到任以來首尾三載雖形在遠外心係本朝事無大小動皆咨啟八州之政罔一專輒尊上之心足貫幽顯陛下遠述先旨申以婚姻大息世休復蒙引召是以去年送女遣兒闔家俱下血誠如此未知所愧而凶狡無端妄生釁禍羨之內誅臣受外伐顧省諸懷不識何辠天聽遐邈陳訴靡由弘等既蒙寵任得侍左右自謂勢擅狐鼠理隔熏掘又以陛下富於春秋始覽政事欲馮陵恩幸闚望國權親從磐跱規自封殖不除臣等罔得專權所以交結讒慝成是亂階又惟弘等所構當以營陽為言廬陵為辠又以臣等位高功同內外膠固陛下信其厚貌忘厥左道三至下機能不暫惑伏自尋省廢昏立明事非為己廬陵之事不由傍人內積蕭牆之釁外行叔段之罰既制之有主臣何預焉然廬陵為性輕險悌順不足武皇臨崩亦有口詔比雖發自營陽實非國禍至於羨之亮等周旋同體心腹內外政欲戮力皇家盡忠報主若令臣等頗欲執權不專為國初廢營陽陛下在遠武皇之子尚有童幼擁以號令誰敢非之而泝流三千虛館三月奉迎鑾駕以遵下武血心若斯易為可鑒且臣等奉事先朝十有七年竝居顯要世稱恭謹不圖一旦致茲釁罰夫周公大賢尚有流言之謗伯奇至孝不免譖愬之禍慈父非無情於仁子明君豈有志於貞臣姦遘所移勢回山岳況乃精誠微淺而望求信者哉詩不云乎讒人罔極交亂四國愷悌君子無信讒言陛下躬覽篇籍研覈是非釁兆之萌宜應深察臣竊懼王室小有皇甫之患大有閻樂之禍夙夜殷憂若無首領夫周道浸微桓文稱伐君側亂國趙鞅入誅況今凶禍滔天辰極危逼台輔孥戮岳牧傾陷臣才非絳侯安漢是職人愧博陸廁奉遺旨國難既深家痛亦切輒𥳑徒繕甲軍次巴陵蕭欣窘懾望風奔迸臣誠短劣在國忘身仰憑社稷之靈俯厲義勇之氣將長驅電埽直入石頭梟翦元凶誅夷首惡弔二公之冤魂寫私門之禍痛然後分歸司寇甘赴鼎鑊雖死之日猶生之年伏惟陛下德合乾元道侔玄極鑒凶禍之無端察貞亮之有本回日月之照發霜雷之威梟四凶於廟庭懸三監於絳闕申二台之匪辜明兩蕃之無罪上謝祖宗下告百姓遣一乘之使賜咫尺之書臣便勒眾旋旗還保所任須次近路尋復表聞宋書謝晦傳上元嘉厤表臣授性頑惰少所關解自昔幼年頗好厤數耽情注意迄於白首臣亡舅故祕書監徐廣素善其事有既往七曜厤每記其得失自太和至泰元之末四十許年臣因比歲攷校至今又四十載故其疏密差會皆可知也夫圓極常動七曜運行離合去來雖有定勢以新故相涉自然有毫末之差連日累歲積微成著是以虞書著欽若之典周易明治厤之訓言當順天以求合非為合以驗天也漢代雜候清臺以昏明中星課日所在雖不可見月盈則蝕必當其衝以月推日則躔次可知焉捨易而不為役心於難事此臣所不解也堯典云日永星火以正仲夏今季夏則火中又宵中星虛以殷仲秋今季秋則虛中爾來二千七百餘年以中星檢之所差二十七八度則堯令冬至日在須女十度左右也漢之太初厤冬至在牽牛初後漢四分及魏景初法同在斗二十一臣以月蝕檢之則景初今之冬至應在斗十七又史官受詔以土圭測景攷校二至差三日有餘從來積歲及交州所上檢其增減亦相符驗然則今之二至非天之二至也天之南至日在斗十三四矣此則十九年七閏數微多差復改法易章則用算滋繁宜當隨時遷革以取其合案後漢志春分日長秋分日短差過半刻尋二分在二至之閒而有長短因識春分近夏至故長秋分近冬至故短也楊偉不悟即用之上厤表云自古來及今凡諸厤數皆未能竝己之妙何此不曉亦何以云是故臣更建元嘉厤以六百八為一紀半之為度法七十五為室分以建寅之月為歲首雨水為氣初以諸法閏餘一之歲為章首冬至從上三日五時日之所在移舊四度又月有遲疾合朔月蝕不在朔望亦非厤意也故元嘉皆以盈縮定其小餘以正朔望之日伏惟陛下允迪聖哲先天不違劬勞庶政寅亮鴻業究淵思於往籍探妙旨於未聞窮神知化罔不該覽是以愚臣欣遇盛明效其管穴伏願以臣所上元嘉法下史官攷其疏密若謬有可採庶或補正闕謬以備萬分宋書厤志上太子率更何承天私撰新法元嘉二十年上表詔付外詳議奏改漏刻箭尚書今既改用元嘉厤漏刻與先不同宜應改革案景初厤春分日長秋分日短相承所用漏刻冬至後晝漏率長於冬至前且長短增減進退無漸非唯先法不精亦各傳寫謬誤今二至二分各據其正則至之前後無復差異更增損舊刻參以晷影刪定為經改用二十五箭請臺勒漏郎將攷驗施用宋書厤志下奏劾博士顧雅等尚書刺海鹽公主所生母蔣美人喪海鹽公主先離婚今應成服撰儀注參詳宜下二學禮官博士議公主所服輕重太學博士顧雅議今既咸用士禮便宜同齊衰削杖布帶疏履朞禮畢心喪三年博士周野王議又云今諸王公主咸用士禮譙王衡陽王為所生太妃皆居重服則公主情理亦宜家中朞服為允其博士庾邃之顏測殷明王淵之四人同雅議何惔王羅雲二人同野王議如所上臺案今之諸王雖行士禮是施於傍親及自己以下至於為帝王所厭猶一依古典又永初三年九月符脩儀亡廣德三主以餘尊所厭猶服大功海鹽公主體自宸極當上厭至尊豈得遂服臺據經傳正文并引事例依源責失而博士顧雅周野王等捍不肯怗方稱自有宋以來皇子蕃王皆無厭降同之士禮著於故事緦功之服不廢於未戚顧獨貶於所生是申其所輕奪其所重奪其所重豈緣情之謂臺伏尋聖朝受終於晉凡所施行莫不上稽禮文兼用晉事又太元中晉恭帝時為皇子服其所生陳氏練冠縓緣此則前代施行故事謹依禮文者也又廣德三公主為所生母符脩儀服大功此先君餘尊之所廢者也元嘉十三年第七皇子不服曹婕妤止於麻衣此厭乎至尊者也博士既不據古又不依今背違施行見事而多作浮辭自衛乃云五帝之時三王之季又言長子去斬衰除禫杖皆是古禮不少今世博士雖復引此諸條無救於失又詰臺云蕃國得遂其私情此義出何經記臣案南譙衡陽太妃竝受朝命為國小君是以二王得遂其服豈可為美人比例尋蕃王得遂者聖朝之所許也皇子公主不得申者由有厭而然也臺登重更責失制不得過十日而復不詶荅既被摧攝二三日甫輸怗辭雖理屈事窮猶聞義恥服臣聞喪紀有制禮之大經降殺攸宜國家舊典古之諸侯眾子猶以尊厭況在王室而欲同之士庶此之僻謬不俟言而顯太常統寺曾不研卻所謂同乎失者亦未得之宜加裁正弘明國典謹案大學博士顧雅國子助教周野王博士王羅雲顏測殷明何惔王淵之前博士遷員外散騎侍郎庾邃之等咸蒙抽飾備位前疑既不謹守舊文又不審據前準遂上背經典下違故事率意妄作自造禮章太常臣敬叔位居宗伯問禮所司騰述往反了無研卻混同茲失亦宜及咎請以見事竝免今所居官解野王領國子助教雅野王初立議乖舛中執捍愆失末違十日之限雖起一事合成三愆羅雲掌押捍失三人加禁固五年宋書禮志二元嘉二十三年七月白衣領御史中丞何承天奏陳滿事議獄貴情斷疑則從輕昔有驚漢文帝乘輿馬者張釋之劾以犯蹕罪止罰金何者明其無心於驚馬也故不以乘輿之重加以異制今滿意在射鳥非有心於中人案律過誤傷人三歲刑況不傷乎微罰可也宋書何承天傳南史三十三通典一百六十六義熙中劉毅鎮姑孰常出行而隱陵縣吏陳滿射鳥箭誤中直帥雖不傷人處法棄市何承天議尹嘉罪議被府宣令普議尹嘉大辟事稱法吏葛滕籤母告子不孝欲殺者許之法云謂違犯教令敬恭有虧父母欲殺皆許之其所告惟取信於所求而許之謹尋事原心嘉母辭自求質錢為子還責嘉雖虧犯教義而熊無請殺之辭熊求所以生之而今殺之非隨所求之謂始以不孝為劾終於和賣結刑倚旁兩端母子俱罪滕籤法文為非其條嘉所存者大理在難申但明教爰發矜其愚蔽夫明德慎罰文王所以恤下議獄緩死中孚所以垂化言情則母為子隱語敬則禮所不及今捨乞宥之評依請殺之條責敬恭之節於飢寒之隸誠非罰疑從輕寍失有罪之謂也愚以謂降嘉之死以普春澤之恩赦熊之愆以明子隱之宜則蒲亭雖陋可比德於盛明豚魚微物不獨遺於今化宋書何承天傳永初末有尹嘉者家貧母熊自以身貼錢為嘉償責坐不孝當死承天議值赦竝免薄道舉事議尋劫制同籍朞親補兵大功不在此例婦人三從既嫁從夫夫死從子今道舉為劫若其叔父尚在制應補謫妻子營居固其宜也但為劫之時叔父已歿代公道生竝是從弟大功之親不合補謫今若以叔母為朞親令代公隨母補兵既違大功不謫之制又失婦人三從之道由於主者守朞親之文不辨男女之異遠嫌畏負以生此疑懼非聖朝恤刑之旨謂代公等母子竝宜見原宋書何承天傳南史三十三通典一百六十七奏事官名議既沒之名不合奏者非有它義正嫌於近不祥耳奏事一卻動經歲時盛明之世事從𥳑易曲嫌細忌皆應蕩除宋書何承天傳故司徒掾孔邈奏事未御邈已喪殯議者謂不宜仍用邈名更以見官奏之承天又議久喪不葬議禮所云還葬當謂荒儉一時故許其稱財而不求備丁況三家數十年中葬輒無棺櫬實由淺情薄恩同於禽獸者耳竊以為丁寶等同伍積年未嘗勸之以義繩之以法十六年冬既無新科又未申明舊制有何嚴切欻然相糾或由鄰曲分爭以興此言如聞在東諸處此例既多江西淮北尤為不少若但讁此三人殆無整肅開其一端則互相恐動里伍縣司競為姦利財賂既逞獄訟必繁懼虧聖明烹鮮之美臣愚謂況等三家且可勿問因此附定制旨若民人葬不如法同伍當即糾言三年除服之後不得追相告列於事為宜宋書何承天傳時丹陽丁況等久喪不葬承天議立三百六十律法制議上下相生三分損益其一蓋是古人𥳑易之法猶如古厤周天三百六十五度四分之一後人改制皆不同焉而京房不悟謬為六十承天更設新率則從中呂還得黃鍾十二旋宮聲韻無失黃鍾長九寸大蔟長八寸二釐林鍾長六寸一釐應鍾長四寸七分九釐強其中呂上生所益之分還得十七萬七千一百四十七復十二辰參之數隋書律厤志上
