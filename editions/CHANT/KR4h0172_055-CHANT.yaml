body:
  text: 虞龢上明帝論書表臣聞爻畫既肇文字載興六藝歸其善八體宣其妙厥後群能間出洎乎漢魏鍾張擅美晉未二王稱英羲之書云頃尋諸名書鍾張信為絕倫其餘不足存又云吾書比之鍾張當抗行張草猶當雁行羊欣云羲之便是小推張不知獻之自謂云何欣又云張字形不及右軍自然不如小王謝安嘗聞子敬君書何如右軍荅云故當勝安云物論殊不爾子敬荅曰世人那得知夫古質而今妍數之常也愛妍而薄質人之情也鍾張方之二王可謂古矣豈得無妍質之殊且二王暮年皆勝於少父子之閒又為今古子敬窮其妍妙固其宜也然優劣既微而會美俱深故同為終古之獨絕百代之楷式桓玄耽玩不能釋手乃撰二王紙迹雜有縑素正行之尤美者各為一秩常置左右及南奔雖甚狼狽猶以自隨擒獲之後莫知所在劉毅頗尚風流亦甚愛書傾意搜求及將敗大有所得盧循素善尺牘尤珍名法西南豪士咸慕其風人無長幼翕然尚之家贏金幣競遠尋求於是京師三吳之迹頗散四方羲之為會稽獻之為吳興故三吳之近地偏多遺迹也又是末年遒美之時中世宗室諸王尚多素嗤貴遊不甚愛好朝廷亦不搜求人間所秘往往不少新渝惠侯雅所愛重懸金招買不計貴賤而輕薄之徒銳意慕學以茅屋漏汁染變紙色加以勞辱使類久書真偽相糅莫之能別故惠侯所蓄多有非真然招聚既多時有佳迹如獻之吳興二牋足為名法孝武亦篡集佳書都鄙士人多有獻奉真偽混雜謝靈母劉氏子敬之甥故靈運能書而特多王法臣謝病東皋遊玩山水守拙樂靜求志林壑造次之遇遂紆雅顧預涉泛之遊參文詠之末其諸佳法恣意披覽愚好既深稍有微解及臣遭遇曲沾恩誘漸漬玄猷朝夕諮訓題勒美惡指示蚩妍點畫之情昭若發蒙於時聖慮末存草體凡諸教令必應真正小不在意則偽謾難識事事留神則難為心力及飛龍之始戚藩告釁方事經略未遑研習及三年之初始玩寶迹既科簡舊秘再詔尋求景和時所散失及乞左右嬖幸者皆原往罪兼賜其直或有頑愚不敢獻書遂失五卷多是戲學伏惟陛下爰凝睿思淹留草法擬效漸妍賞析彌妙旬目之間轉求精祕字之美惡書之真偽剖判體趣窮微入神機息務閑從容研究乃使使三吳荊湘諸境窮幽測遠鳩集散逸及群臣所上數月之間奇迹雲萃詔臣與前將軍巢尚之司徒參軍事徐希秀淮南太守孫奉伯科簡二王書評其品題除猥錄美供御賞玩遂得遊目瓌翰展好寶法錦質繡章爛然畢覩大凡秘藏所錄鍾繇紙書六百九十七字張芝縑素及紙書四千八百二十五字年代既久多是簡帖張昶縑素及紙書四千七十字毛弘八分縑素書四千五百八十八字索靖紙書五千七百五十五字鍾會書五紙四百六十五字是高祖平泰川所獲以賜永嘉公主俄為第中所盜流播始興及泰始開運地無遁寶詔龐沈搜索遂乃得之又有范仰恆獻上張芝縑素書三百九十八字希世之寶潛采累紀隱迹於二王耀美於盛辰別加繕飾在新裝二王書所錄之外由是榻書悉用薄紙厚薄不均輒好縐起范曄裝治卷帖小勝猶謂不精孝武使徐爰治護隨紙長短參差不同具以數十紙為卷披視不便不易勞茹善惡正草不相分別今所治繕悉改其獘孝武撰子敬學書戲習十卷為秩傅云戲學而不題或真行章草雜在一紙或重作數字或學前輩名人能書者或有聊爾戲書既不留意亦殊猥劣徒聞則錄曾不披簡卷小者數紙大者數十巨細差懸不相匹類是以更裁減以二丈為度亦取小王書古詩賦讚論或草或正言無次第者入戲學部其有惡者悉皆刪去卷既調均書又精好羲之所書紫紙多是少年臨川時迹既不足觀亦無取焉今榻書皆用大厚紙泯若一體同度翦截皆齊又補接敗字體勢不失墨色更明凡書雖同在一卷要有優劣今此一卷之中以好者在首下者次之中者最後所以然者人之看書必銳於開卷懈怠於將半既而略進次遇中品賞悅留連不覺終卷又舊書目秩無次第諸秩中各有第一至於第十脫落散亂卷秩殊等今各題其卷秩所在與目相應雖相涉入終無雜謬又舊以封書紙次相隨草正混糅善惡一貫今各隨其品不從本封條目紙行凡最字數皆使分明一毫靡遺二王縑素書珊瑚軸二秩二十四卷紙書金軸二秩二十四卷又紙書玳瑁軸五秩五十卷皆互秩金題玉燮織成帶又有書扇二秩二卷又紙書飛白章草二秩十五卷竝栴檀軸又紙書戲學一秩十二卷玳瑁軸此皆書之冠冕也自此以下別有三品書凡五十二秩五百二十卷悉栴檀軸又羊欣縑素及紙書亦選取其妙者為十八秩一百八十卷皆漆軸而已二王新入書各裝為六秩六十卷別充備預又其中入品之餘各有條貫足以聲華四寓價輕五都天府之名珍盛代之偉寶陛下淵昭自天觸理必鏡凡諸思制莫不妙極乃詔張永更製御紙緊潔光麗輝日奪目又合祕墨美殊前後色如點漆一點竟紙簡筆一二簡毫專用白兔大管豐毛膠漆堅密草書筆悉使長毫以利縱舍之便兼使吳興郡作青石圓硯質滑而停墨殊勝南方瓦石之器縑素之工殆絕於昔王僧虔尋得其術雖不及古不減郗家所製二王書獻之始學父書正體乃不相似至於絕筆章草殊目擬類筆迹流擇宛轉妍媚乃欲過之羲之書在始未有奇殊不勝庾翼郗愔迨其末年乃造其極常以章草荅庾亮亮以示翼翼歎服因與羲之書云吾昔有伯英章草書十紙過江亡失常痛妙迹永絕忽見足下荅家兄書煥若神明頓還舊觀舊說羲之罷會稽住蕺山下一老嫗捉十許六角竹扇出市王聊問一枚幾錢云直二十許右軍取筆書扇扇為五字嫗大悵惋云舉家朝飡惟仰於此何乃書壤王云但言王右軍書字索一百入市市人競市去姥復以十數扇來請書王笑不荅又云羲之常自書表與穆帝帝使張翼寫效一毫不異題後荅之羲之初不覺更詳看乃歎曰小人幾欲亂真又羲之牲好鵝山陰曇䃶村有一道士養好鵝十餘王清旦乘小船故往意大願樂乃告求市易道士不與百方譬說不能得道士乃言性好道久欲寫河上公老子縑素早辦而無人能書府君若能自屈書道德經各兩章便合群以奉羲之便住半日為寫畢籠鵝而歸又嘗詣一門生家設佳饌供億甚盛感之欲以書相報見有一新棐床几至滑淨乃書之草正相半門生送王歸郡還家其父已刮盡生失書驚懊累日桓玄愛重書法每讌集輒出法書示賓客客有食寒具者仍以手捉書大點污後出法書輒令客洗手兼除寒具子敬常牋與簡文十許紙題最後云民此書甚合願存之此書為桓玄所寶高祖後得以賜王武剛未審今何在謝奉起廟悉用棐材右軍取棐書之滿床奉收得一大簀子敬後往謝為右軍書甚佳而密已削作數十棐板請子敬書之亦甚合奉竝珍錄奉後孫履分半與桓玄用履為揚州主簿餘一半孫恩破會稽略以入海羲之為會稽子敬七八歲學書羲之從後掣其筆不脫歎曰此兒書後當有大名子敬出戲見北館新泥堊壁白淨子敬取帚沾泥汁書方丈一字觀者如市羲之見歎美問誰所作荅云七郎羲之作書與觀故云子敬飛白大有意是因於此壁也但一好事年少故作精白紗裓著詣子敬子敬便取書之草正諸體悉備兩袖及褾略周年少覺王左右有淩奪之色掣裓而走左右果逐之及門外鬭爭分製少年纔得一袖耳子敬為吳興羊欣父不疑為烏程令欣時年十六書已有意為子敬所知子敬往縣入欣齋欣衣白新絹裙晝眠子敬因書其裙幅及帶欣覺歡樂遂寶之後以上朝廷中乃零失子敬門生以子敬書種蠶後人於蠶中尋取紙大有所得謝安善書不重子敬每作好書必謂被賞安輒題後荅之朝廷秘寶名書久已盈積太初狂伯乃欲一時燒除左右懷讓者苦相譬說乃止臣見衛恆古來能書人錄一卷時有不通今隨事改正并寫諸雜勢一卷今新裝二王鎮書定目各六卷又羊欣書目六卷鍾等書目一卷文字之部備矣謹詣省上表并上錄勢新書以聞六年九月中書侍郎臣虞龢上又略見御覽七百四十八引兩條郊配用牛數議祀帝之名雖五而所生之實常一五德之帝迭有休王各有所司故有五室宗祀所主要隨其主而饗焉主一配一合用二牛宋書禮志三大明五年九月博士虞龢議四時講武獻牲議檢周禮四時講武獻牲各有所施振旅春蒐則以祭社茇舍夏苗則以享礿治兵秋獮則以祀方大閱冬狩則以享烝漢祭祀志唯立秋之日白郊事畢始揚威武名曰貙劉乘輿入囿躬執弩以射牲以鹿麑太宰令謁者各一人載獲車馳送陵廟然則春田薦廟未有先準宋書禮志四大明七年二月太學博士虞龢議宣貴妃立廟議曲禮云天子有后有夫人檀弓云舜葬蒼梧三妃不從昏義云后立六宮有三夫人然則三妃即三夫人也后之有三妃猶天子之有三公也按周禮三公八命諸侯七命三公既尊於列國諸侯三妃亦貴於庶邦夫人據春秋傳仲子非魯惠公之元嫡尚得考彼別宮今貴妃蓋天秩之崇班理應刱立新廟宋書始平王子鷥傳大明七年上又諷有司云云有脫文通典四十七作有司奏故宣貴妃既加殊禮未詳應立廟不虞龢議宣貴妃祔廟議春秋傳云祔而作主烝嘗禘於廟嘗為吉祭之名大祥及禫未得入廟應在禫除之後也新安王心喪之內若遇時節便應吉祭於廟親奉亦在無嫌祔之為言以後亡者祔於先廟也小記云諸侯不得祔於天子今貴妃爵視諸侯居然不得祔於先后又別考新宮無所宜祔且卒哭之後益無祔理宋書禮志四大明七年三月昭太后祔廟議春秋之義庶母雖名同崇號而實異正嫡是以猶考別宮而公子主其祀今昭皇太后既非所生益無親奉之理周禮宗伯職云若王不與祭則攝位然則宜使有司行其禮事又婦人無常秩各以夫氏為定夫亡以子為次昭皇太后即正位在前宣太后追尊任後以次序而言宜躋新禰於上宋書禮志四泰始二年正月長兼儀曹郎虞龢議又通典四十七末句作宜躋祏於上位皇太子納徵議按儀禮納徵直云玄纁束帛儷皮而已禮記郊特牲云虎豹皮與玉璧非虛作也則虎作也則虎豹之皮居然用兩珪璧宜仍舊各一也宋書禮志一明帝泰始五年十一月長兼國子博士虞龢議又見通典五十八皇帝幸東宮作鼓吹議輿駕度宮雖為婚行迹實遊情求洽作鼓吹非嫌通典一百四十七武帝時儀曹關皇太子某月某日納妃依禮舊不作樂未審至尊明幸東宮應作鼓吹與不輿曹郎虞龢議案武帝當作明帝其事在泰始中因誤以為晉時耳郊配用牛數議祀之為義竝五帝以為言帝雖云五牲牢之用謂不應過郊祭廟祀宜用二牛宋書禮志三大明五年九月祠部郎顏奐議晉陵國廟祭議禮記云所祭者亡服則不祭今晉陵王於衡陽小功宜依二國同廢宋書禮志四大明七年十一月有司奏晉陵國剌孝王廟依廬陵平王等國例一歲五祭二國以王三卿主祭應同有服之例與不博士顏僧道議與劉惠書比歲賢子充秀州閭可謂得人南齊書劉瓛傳瓛父惠又南史五十詣郡列辭門戶不建罪應至此狂愚犯法實是薩身自應依受戮況弟少孤薩三歲失父一生恃賴唯在長兄兄雖可垂愍有何心處世宋書孫棘傳大明五年發三五丁薩應充行坐違期付獄兄棘詣郡乞以身代薩又辭列免兄棘妻許復語棘君當門戶且大家以小郎屬君豈可委罪太守張岱依事表上世祖下詔賜帛張江陵與妻吳罪議夫題里逆心而仁者不入名且惡之況乃人事故敺傷呪詛法所不原詈之致盡則理無可宥罰有從輕蓋疑失善求之文旨非此之謂江陵雖值赦恩故合梟首婦本以義愛非天屬黃之所恨情不在吳原死補治有允正法宋書孔季恭傳通典一百六十七大明申安陸應城縣民張江陵與妻吳共罵母黃令死黃忿恨自經死值赦律無罵母致值赦之科淵之議奏彈顏竣臣聞人臣之奉主毀家光國竭情無私若乃無禮陵人怙富卑上是以王叔作戒子晳為戮未有背本塞原好利忘義而得自容盛世溷亂清流者也右將軍東揚州刺史建城縣開國侯顏竣因附風雲謬蒙翼長天地更造拔以非次聖朝親攬萬務一歸而窺覘國柄潛圖秉執受任選曹驅扇滋甚出尹京輦形勢彌放傳詔犯憲舊須啟聞而竣以通訴忤已輒加鞭辱罔顧威靈莫此為甚嚴詔屢發當官責效權恣不行怨懟彌起懷挾姦數苞藏陰慝預聞中旨罔不宣露罰則委上恩必歸已荷遇之門即加謗辱受譴之室曲相哀撫翻戾朝紀狡惑視聽脅懼上宰激動閭閻未慮上聞內懷猜懼偽請東牧以卜天旨既獲出蕃怨詈方肆反脣腹誹方之已輕且時有啟奏必協姦私宣示親朋動作群小前冬母亡詔賜還葬事畢不去盤桓經時方構間勳貴造立同異又表示危懼深營身觀曲訪大臣慮不全立遂以已被斥外國道將顛釁積懷抱惡窮辭色兼行闕於家早負世議逮身居崇寵奉兼萬金榮以夸親祿不充養宿憾母弟恃貴輒戮天倫怨毒親交震駭凡所莅任皆闕政刑輒開丹陽庫物貸借吏下多假資禮解為門生充朝滿野殆將千計驕放自下妨公害私取監解見錢以供帳下賓放酣歌不異平月街談道說非復風聲竣代都文吏特荷天私棄瑕錄用豫參要重勞無汗馬賞班河山出內寵靈踰越倫伍山川之性日月彌滋溪壑之心在盈彌奓虎冠狼貪未足為譬今皇明開耀品物咸亨傷俗點化實惟害焉宜加顯戮以彰盛化請以見事免竣所居官下太常削爵土須事御收付廷尉法獄辠宋書顏竣傳王僧達被誅謂為竣所讒搆臨死陳竣前後忿懟每懷言不見從僧達所言頗有相符據上乃使御史中丞庾徽之奏之上刺史張悅書乞留釋道汪道汪法師識行清白風霜彌峻卓爾不群確焉難拔近聞梁州遣迎承教旨許去闔境之論僉曰非宜鄙州邊荒僧尼山萬禪戒所資一焉是賴豈可水失其珠山忘其玉願鑒道俗之誠令四輩有憑也高僧傳道汪姓潘長樂人住蜀武擔寺將赴梁州刺史申坦文淵上書悅即敦留與晉安王子勛書舟楫已辦器械亦整三軍踊躍人爭效命便欲沿流挂颿直取自下願速遣陶亮眾軍兼行相接分據新亭南洲則一麾定矣宋書鄧琬傳為江斅讓尚公主表伏承詔旨當以臨海公主降嬪榮出望表恩加典外顧審輶蔽伏用憂惶臣寒門顇族人凡質陋閭閻有對本隔天姻如臣素流室貧業寡年近將冠皆已有室荊釵布裙足得成禮每不自解無偶迄茲媒訪莫尋素族弗問自惟門慶屬降公主天恩所覃庸及醜末懷憂抱愓慮不獲免徵命所當果應茲舉雖門泰宗榮於臣非幸仰緣聖貸冒陳愚實自晉氏以來配尚王姬者雖累經美冑亟有名才至如主敦懾氣桓溫斂威真長佯愚以求免子敬灸足以違詔王偃無仲都之質而倮露於北階何瑀闕龍工之姿而投軀於深井謝莊殆自同於矇瞍殷沖幾不免於彊鉏彼數人者非無才意而勢屈於崇貴事隔於聞覽吞悲茹氣無所逃訢制勒甚於僕隸防閑過於婢妾往來出入人理之常當賓侍客朋友之義而令掃轍息駕無闚門之期廢筵抽席絕接對之理非雖交友離異乃亦兄弟疏闊第令受酒肉之賜制以動靜監子荷錢帛之私節其言笑姆妳爭媚相勸以嚴妮媼競前相諂以急第令必凡庸下才監子皆葭萌愚豎議舉止則未閑是非聽言語則謬於虛實姆妳敢恃耆舊唯贊妬忌尼媼自倡多知務檢口舌其間又有應荅問訊卜筮師母乃至殘餘飲食詰辯與誰衣被故敝必責頭領又出入之宜繁省難衷或進不獲前或入不聽出不入則嫌於欲疏求出則疑有別意召必以三晡為期遣必以日出為限夕不見晚魄朝不識曙星至於夜步月而弄琴晝拱袂而披卷一生之內與此長乖又聲影纔聞則少婢奔迸裾袂向席則老醜叢來左右整刷以疑寵見嫌賓客未冠以少容致斥禮則有列滕象則有貫魚本無嫚嫡之嫌豈有輕婦之誚況今義絕傍私虔恭正匹而每事必言無儀適設辭輒言輕易我又竊聞諸主集聚唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其恆意不可貸借固實常辭或言野敗去或言人笑我雖家曰私理有甚王憲發口所言恆同科律王藻雖復彊佷頗經學涉戲笑之事遂為冤魂褚曖憂憤用致夭絕傷理害義難以具聞夫螽斯之德實致克昌專妒之行有妨繁衍是以尚主之門往往絕嗣駙馬之身通離釁咎以臣凡弱何以克堪必將毀族淪門豈伊身眚前後嬰此其人雖眾然皆患彰遐邇事融天朝故吞言咽理無敢論訴臣幸屬聖明矜照由道弘物以典處親以公臣之鄙懷可得自盡如臣門分世荷殊榮足守前基便預提拂情官顯宦或由才升一叨壻戚咸有恩假是以仰冒非宜披露丹實非唯止陳一己規全身願寔乃廣申諸門憂患之切伏願天慈照察特賜蠲停使燕雀微群得保叢蔚蠢物含生自已彌篤若恩詔難降披請不申便當刊膚翦髮投山竄海初學記未有云云二字宋書孝武文穆王皇后傳宋世諸主莫不嚴妬太宗每疾之左光祿大夫江湛孫當尚世祖女上乃使人為斅作表讓昏以此表徧示諸主又見南史二十三王藻傳藝文類聚十六又初學記十三以為虞通之作明堂頌肅肅明堂惟國之光儀天矩地崇姬潤黃縣殷颺輝服夏擅芳無斁伊典有煥斯章緜緜教樞翳翳化紀聲沈五都風晦千祀我皇蒸哉追孝創軌縟憲垂統光圖麗史宗祀既崇享配惟馨六樂薦和四圭流明殷殷華麗監盥孚誠慶旁旁燭休光下盈初學記十三昭太后祔廟議正名存義有國之徽典臣子一例史傳之明文今昭皇太后正位母儀尊號允箸祔廟之禮宜備彝則母以子貴事炳聖文孝武之祀既百代不毀則昭后之祔無緣有虧愚謂神主應入章后廟又宜依晉元皇帝之於愍帝安帝之於永安后祭祀之日不親執觴爵使有司行事宋書禮志四明帝泰始二年正月孝武昭太后崩五月有司奏祔廟之禮宜下官詳議博士王略太常丞虞愿議又見通典四十七禮敬太子生母議百僚內外禮敬貴妃應與皇太子同其東朝臣隸理歸臣節宋書禮志二泰始二年九月皇太子所生陳貴妃禮秩既同儲宮未詳宮臣及朝臣竝有敬不妃主在內相見又應何儀博士王慶緒議
