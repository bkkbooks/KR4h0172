body:
  text: 臨川長公主上表乞還身王族妾遭隨奇薄絕於王氏私庭囂戾致此分異今孤疾煢然假息朝夕情寄所鍾唯在一子契闊荼炭特兼憐愍否泰枯榮繫以為命實願申其門釁還為母子推遷僶俛未及自聞先朝慈愛鑒妾丹衷若賜使息徹歸第定省仰揆天旨或有可尋今事迫誠切不顧典憲敢緣恩燾觸冒披聞特乞還身王族守養弱嗣雖死之日實甘於生宋書孝武文穆王皇后傳后弟藻尚臨川長公主藻死離婚太宗以江斅讓婚表徧示諸主於是上表從之露板辭父凶滅無狀孤負天明存荷優養沒蒙加禮明罰羽山未足敕法烏鳥微心昧死上訴乞反葬舊塋糜骨鄉壤宋書彭城王義康傳大明四年義康女玉秀等露板辭詔聽竝加資給與夫弟僧達書昔謝太傅奉寡嫂王夫人如慈母今蔡興宗亦有恭和之稱宋書蔡興宗傳南史二十九床奏東西堂施局腳床銀塗釘宋書武帝紀下宋國既建有司奏奏請崇蕭太后臣聞道積者慶流德洽者禮備故祗敬表於崇高嘉號彰於盛典伏惟太妃母儀之德化穆不言保翼之訓光被洪業雖幽明同慶而稱謂未窮稽之前代禮有恆準宜式遵舊章允副群望臣等參受宋皇太后號宋書孝懿蕭皇后傳高祖踐祚有司奏奏用廟祀歌辭皇朝肇建廟祀應設雅樂太常鄭鮮之等八十八人各撰立新哥黃門侍郎王韶之所撰哥辭七首並合施用宋書樂志一永初元年七月有司奏又見御覽五百六十六又奏改太樂諸歌舞詩依舊正旦設樂參詳屬三省改太樂諸哥舞詩黃門侍郎王韶之立三十二章合用教試日近宜逆誦習輒申攝施行宋書樂志一永初元年十二月有司又奏奏請推恩外戚大孝之德盛於榮親一人有慶光被萬國是以靈文寵於西京壽張顯於隆漢故平原太守趙裔故洮陽令蕭卓並外屬尊戚不逮休寵臣等仰述聖思遠稽舊章並可追贈光祿大夫加金章紫綬裔命婦孫可豫章郡建昌縣君卓命婦趙可吳郡壽昌縣君宋書孝穆趙皇后傳永初二年有司奏奏郊配武皇帝配南郊武敬皇后配北郊宋書少帝紀永初三年九月有司奏奏上張太后尊號臣聞嚴親敬始所因者本克孝之道由中被外惟夫人德並坤元徽音光劭發祥兆慶誕啟聖明宜崇極徽號允備盛則從春秋母以子貴之義遵漢晉推慶之典謹上尊號為皇太后宮曰永樂宋書武帝張夫人傳夫人生少帝少帝即位有司奏奏上胡太后尊號臣聞德厚者禮尊慶深者位極故閟宮既構詠歌先妣園陵崇衛聿追來孝伏惟先婕妤柔明塞淵光備六列德昭巛範訓洽母儀用能啟祚聖明奄宅四海嚴親莫逮天祿永違臣等遠準春秋近稽漢晉謹上尊號曰章皇太后陵日熙寍立廟於京師宋書武帝胡婕妤傳婕妤生文帝賜死文帝即位有司奏奏免何玢之揚州刺史王弘上會稽從事韋詣解列先風聞餘姚令何玢之造作平床一乘舴艋一艘精麗過常用功兼倍請免玢之官御覽七百七十一引元嘉起居注有司奏詔可案王弘為揚州在元嘉初奏無讀土令之文謹案道娛啟事以土令在近謂幘不宜變萬秋雖云幘宜仍舊而不明無讀土令之文今書舊事于左魏臺雜訪曰前後但見讀春夏秋冬四時令至於服黃之時獨闕不讀今不解其故魏明帝景初元年十二月二十一日散騎常侍領太史令高堂隆上言曰黃于五行中央土也王四季各十八日土生於火故於火用事之末服黃三季則否其令則隨日時不以五行為分也是以服黃無令宋書禮志二元嘉六年有司奏奏掖庭有故不舉祭禮喪服傳云有死於宮中者則為之三月不舉祭今礿祀既戒而掖庭有故下太常依禮詳正太學博士江邃袁朗徐道娛陳珉等議參互不同殿中曹郎中領祠部謝元議以為遵依禮傳使有司行事於義為安輒重參詳宗廟敬重饗祀精明雖聖情罔極必在親奉然苟曰有疑則情以禮屈無所稱述於義有據請聽如元所上宋書禮志四元嘉七年四月有司奏詔可又略見通典五十二奏無兩禫禮喪禮有禫以祥變有漸不宜便除即吉故其閒服以綅縞也心喪已經十三月大祥十五月祥禫變除禮畢餘情一周不應復有再禫宣下以為永制宋書禮志二通典八十元嘉十七年有司奏奏請用何承天新厤治厤改憲經國盛典爰及漢魏屢有變革良由術無常是取協當時方今皇猷載暉舊域光被誠應綜覈晷度以播維新承天厤術合可施用宋二十二年普用元嘉厤宋書厤志上元嘉二十年何承天上新厤詔外詳議有司奏上彭城王義康罪狀義唐昔擅國權恣心陵上結朋樹黨苞納凶邪重舋彰著事合明罰特遭陛下仁愛深至敦惜周親封社不削爵寵無貶四海之心朝野之議咸謂皇德雖厚實撓典刑而義康曾不思此大造之德自出南服詭飾情貌外示知懼內實不悛窮好極欲干請無度聖慈含弘每不折舊矜釋屢加恩疇己往而陰敦行李方啟交通之謀潛資左右以要死士之命崎嶇伺隙不忘窺窬時猶隱忍罰止僕侍狂疾之性永不懲革兇心遂成悖謀仍構遠投群醜千里相結再議宗社重闚鼎祚賴陛下至誠感神宋厤方永故姦事昭露罪人斯得周公上聖不辭同氣之刑漢文仁明無隱從兄之惡況義康舋深二叔謀過淮南背親反道自棄天地臣等參議請下有司削義康王爵收付廷尉法獄治罪宋書彭城王義康傳元嘉二十二年范曄等謀反事逮義康有司上奏於是免義康子女為庶人絕屬籍徙付安成郡奏換民資以充軍用軍用不充揚南徐兗江四州富有之民家資滿五千萬僧尼滿三千萬者並四分換一過此率討事息即還宋書索虜傳元嘉二十七年有司奏奏皇子宜為生母服古者與尊者為體不得服其私親而比世諸侯咸用士禮五服之內悉皆成服於其所生反不得遂宋書禮志二元嘉二十九年南平王鑠所生母吳淑儀薨依禮無服麻衣練冠既葬而除有司奏云云於是皇子皆申母服奏上路太后尊號臣聞厤集周邦徽音充嗣氣淳漢國沙麓發祥昔在上代業隆胙遠未有不敷陰教以闡洪基膺淑慶以載聖哲者也伏惟淑媛柔明內昭徽儀外範合靈初迪則庶姬仰燿引訓蕃閫則家邦被德民應惟和神屬惟祉故能誕鍾叡躬用集大命固靈根於既殞融盛烈乎中興載厚化深聲詠允緝宜式諧舊典恭享極號奉尊號曰皇太后宮曰崇憲宋書文帝路淑媛傳淑媛生孝武帝隨世祖出蕃世祖人討元凶淑湲留尋陽上即位遣建平王宏奉迎有司奏奏不應致拜太傅聖旨謙光尊師重道欲致拜太傅斯誠弘茲遠風敦闡盛則然周之師保實稱三吏晉因於魏特加其禮帝道嚴極既有常尊攷之史載未見茲典故卞壼孫楚並謂人君無降尊之義遠稽聖典近即群心臣等參議謂不應有加拜之禮宋書江夏王義恭傳世祖即阼進位為太傅上不欲致禮太傅諷有司奏奏請議殄寇告二郊劉義宣臧質干時犯順滔天作戾連結淮岱謀危宗社質反之始戒嚴之日二郊廟社皆已遍陳其義宣為逆未經同告輿駕將發醜徒冰消質既梟懸義宣禽獲二寇俱殄並宜昭告檢元嘉三年討謝晦之始普告二郊太廟賊既平蕩唯告太廟太社不告二郊禮官博議宋書禮志三孝建元年六月八座奏奏議殤及無後廟祭東平沖王彥穉無後唯殤服五月雖臣不殤君應有主祭而國是追贈又無其臣未詳毀靈立廟為當他祔宋書禮志四孝建元年七月有司奏又見通典五十二奏裁諸王車服制度車服以庸虞書茂典名器慎假春秋明誡是以尚方所制禁嚴漢律諸侯竊服雖親必辠自頃以來下僭彌盛器服裝飾樂舞音容通於王公達於眾庶上下無辨人志靡一今表之所陳實允禮度九條之格猶有未盡謹共附益凡二十四條聽事不得南向坐施帳并𢃕蕃國官正冬不得跣登國殷及夾侍國師傅令及油戟公主王妃傳令不得朱服輿不得重杠鄣扇不得雉尾劍不得鹿盧形槊毦不得孔雀白鷩夾轂隊不得絳襖平乘誕馬不得過二匹胡伎不得綵衣舞伎正冬著袿衣不得莊面蔽花正冬會不得鐸舞杯柈舞長蹻伎透狹舒丸劍博山伎緣大橦伎升五案伎自非正冬會奏舞曲不得舞諸妃主不得著袞帶信幡非臺省官悉用絳郡縣內史相及封內史長於其封君既非在三罷官則不復追敬不合稱臣正宜上下官敬而已諸鎮常行車前後不得過六隊白直夾轂不在其限刀不得過銀銅為裝諸王女封縣主諸王子孫襲封王王之妃及封侯者夫人行並不得鹵簿諸王子繼體為王者婚葬吉凶悉依諸國公侯之禮不得同皇弟皇子車輿不得油幢軺車不在其限平乘舫皆平兩頭作露平形不得擬象龍舟悉不得朱油帳鉤不得作五花及豎筍形若先有器物者悉輸送臺臧書到後二十日期若有竊玩犯禁者及統司無舉糾並臨時議罪宋書禮志五孝建二年十月江夏王義恭竟陵王誕表改革諸王車服制度凡九條上因諷有司增廣條目奏云云又見江夏王義恭傳又見南史十三奏請議殷祭依舊今元年十月是殷祠之月領曹郎范泰參議依永初三年例須再周之外殷祭尋祭再周來二年三月若以四月殷則猶在禫內下禮官議正宋書禮志三孝建元年十二月有司奏奏請議郊祠灌獻今月十五日南郊尋舊儀廟祠至尊親奉以太尉亞獻南郊親奉以太常亞獻又廟祠行事之始以酒灌地送神則不灌而郊初灌同之於廟送神又灌議儀不同於事有疑輒下禮官詳正宋書禮志三孝建二年正月庚寅有司奏奏改郊廟樂名宋承晉氏郊廟之樂未有名稱直號前舞後舞有乖古制通典一百四十七建武二年有司奏案宋無建武年號當是孝建之誤奏為皇后父服故散騎常侍右光祿大夫開府儀同三司義陽王師王偃喪逝至尊為服緦三月成服仍即公除至三月竟未詳當除服與不又皇后依朝制服心喪行喪三十日公除至祖葬日臨喪當著何服又舊事皇后心喪服終除之日更還著未公除時服然後就除未詳今皇后除心制日當依舊更服為但釋心制中所著布素而已勒禮官處正宋書禮志二孝建三年三月有司奏通典八十奏定副車案漢胡廣蔡邕並云古者諸侯貳車九乘秦滅六國兼其車服故王者大駕屬車八十一乘尚書御史乘之最後一車懸豹尾法駕則三十六乘檢晉江左逮至於今乘輿出行副車相承五乘宋書禮志五孝建三年五月有司奏奏請議皇子出後告廟皇子出後檢未有告廟先例輒勒二學禮官議正應告與不告者為告幾室宋書禮志四孝建三年五月有司奏
