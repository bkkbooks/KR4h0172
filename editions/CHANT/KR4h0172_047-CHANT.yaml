body:
  text: 鮑照謝賜藥啟臣衛躬不謹養命無術情淪五難妙謝九法飆落先傷衰疴早及遐澤近臨猥委存卹疢同山嶽蒙靈藥之賜惠非河間謬仙使之屈恩逾脯糗惠重帷席荷對銜慚伏抱衿渥謝永安令解禁止啟臣田茅下第質非謝品志終四民希絕三仕邀世逢辰謬及推擇恩成曲積榮秩兼過雖誓投纖生昊天罔極迄無犬馬孤慚星歲加以淪節雪飆沉誠款晦值天光燭幽神照廣察澡舋從宥與物更稟遂晞曬陽春湔汰秋水綴翼雲條葺鮮洪沼洗膽明目抃手太平重甄再造含氣孰比不悟乾陶彌運復垂埏飾矯迹升等改觀非服振纓珥筆聯承貴寵豈臣浮朽所可恭從實非愚瞢所宜循踐瑣族易灰脆漏已迫空荷載燾終貴仰復飲冰肅事懷火畢命不勝屏營之情謹啟事以聞論國制啟臣啟臣聞尺之量錦工者裁之袤丈之木繩墨在焉事無巨細非法不行當今世問政睦藩國相望君舉必書動成准式息躬聖壤十有餘載條制節文宜其備矣諸王列封動靜兼該而竊見國之處事未盡善臣之暗蔽私心有惜伏見彭城國舊制猶有數卷雖多殊革大綱可依愚謂宜令掌固刊而撰之上著朝典藩邦之度下揆國訓繁簡之誼傍酌州府寬猛之中章程久具永為恆制豈伊今美乃足貴之將來臣忝充直員脫以啟聞煩而非要伏追慚悚謹啟謝上除啟臣言被宣賜臣上除臣伏事日淺蒙荷已豐天澤所及且喜且懼但臣自丁常梪來塗階級非所敢冀今日榮願直爾不少冒乞停不止除伏願重許干穢悚息謝假啟二首臣啟臣居家之治上漏下濕暑雨將降有懼崩壓比欲完葺私寡功力板插綯塗必須躬役冒欲請假三十日伏願天恩賜垂矜許干啟復追悚息謹啟臣啟臣所患彌留病軀沉痼自近蒙歸頻更頓處日夜間困或數四委然一弊瞻景待化加以凶衰嬰遘慘悼終鮮兄弟仲田所哀臣實百罹孤苦夙雨天倫同氣實惟一妹存沒永訣不獲計見封瘞泉壤臨送私懷感恨情痛兼深臣母年老經離憂傷服麤食淡羸耗增疾心計焦迫進退罔躓冒乞申假百日伏願天慈賜垂矜許臣違福履身事屯悴歎息和景掩淚春風執啟涕結伏追惶悚謹啟奉始興王命作白紵舞曲啟侍郎臣鮑照啟被教作白紵舞歌詞謹竭庸陋裁為四曲附啟上呈識方淟悴思塗猥局言既無雅聲未能文不足以宣贊聖旨抽拔妙實謹遣簡餘慚隨悚盈謹啟通世子自解僕以常梪無用於世遭逢謬幸被受恩榮誠願論畢久宜捐落仁眷篤終復獲淹停感今惟昔銜佩無已但自無堪尸素累載腹心之愧寤寐為憂今請解所職願蒙矜許自奉清塵于茲六祀墜辰永往遺恩在心執紙哽咽言不自宣重與世子啟奉還誨深承殷勤篤眷之重披讀未終悲愧交集僕以常人所蒙隆厚久應知退非適今日銜恩戀德用缺進心今者之請必願鑒許且僕棲遲無事咫尺館第餐稟風微非旦則夕居職還私兩者無異而於僕無用有以自處豈非仁念始終之惠重致干日彌深慚感登大雷岸與妹書吾自發寒雨全行日少加秋潦浩汗山溪猥至渡泝無邊險徑遊歷棧石星飯結荷水宿旅客貧辛波路壯闊始以今日食時僅及大雷塗登千里日踰十晨嚴風慘節悲風斷肌去親為客如何如何向因涉頓憑觀川陸遨神清渚流睇方曛東顧五洲之隔西眺九派之分窺地門之絕景望天際之孤雲長圖大念隱心者久矣南則積山萬狀爭氣負高含霞飲景參差代雄凌跨長隴前後相屬帶天有匝橫地無窮東則砥原遠隰亡端靡際寒蓬夕卷古樹雲平旋風四起思鳥群歸靜聽無聞極視不見北則陂池潛演湖脈通連苧蒿攸積菰蘆所繁栖波之鳥水化之蟲智吞愚彊捕小號噪驚聒紛乎其中西則回江永指長波天合滔滔何窮漫漫安竭創古迄今舳艫相接思盡波濤悲滿潭壑煙歸八表終為野塵而是注集長寫不測脩靈浩盪知其何故哉西南望廬山又特驚異基壓江潮峰與辰漢連接上常積雲霞雕錦褥若華夕曜巖澤氣通傳明散綵赫似絳天左右青靄表裏紫霄從嶺而上氣甚金光半山以下純為黛色信可以神居帝郊鎮控湘漢者也若潀洞所積溪壑所射鼓怒之所豗擊湧澓之所宕滌則上窮荻浦下至狶洲南薄鷰𠂢北極雷澱削長埤短可數百里其中騰波觸天高浪灌日吞吐百川寫泄萬壑輕煙不流華鼎振涾弱草朱靡洪漣隴蹙散渙長驚電透箭疾穹溘崩聚坻飛嶺覆回沫冠山奔濤空谷碪石為之摧碎碕岸為之齏落仰視大火俯聽波聲愁魄脅息心驚慓矣至於繁化殊育詭質怪章則有江鵝海鴨魚鮫水虎之類豚首象鼻芒鬚針尾之族石蟹土蚌燕箕雀蛤之疇折甲曲牙逆鱗返舌之屬掩沙漲被草渚浴雨排風吹澇弄翮夕景欲沈曉霧將合孤雛寒嘯遊鴻遠吟樵蘇一歎舟子再泣誠足悲憂不可說也風久雷飆夜戒前路下弦內外望達所屆寒暑難適汝專自慎夙夜戒護勿我為念恐欲知之聊書所覩臨塗草蹙辭意不周河清頌并序臣聞善談天者必徵像於人工言古者先考績於今鴻羲以降遐哉邈乎鏤山嶽雕篆素昭德垂勳可謂多矣而史編唐堯之功載格于上下樂登文王之操稱於昭于天素狐玄玉聿彰符命朴牛大螾爰定祥曆魚鳥動色禾雉興讓皆物不盈眥而美溢金石頌聲為之而寢詩人於是不作庸非惑歟自我皇宋之承天命也仰應龍木之精俯協龜水之靈君圖帝寶粲爛瑰英固以業光曩代事華前德矣聖上天飛踐極迄茲二十有四載道化周流玄澤汪濊地平天成含生阜熙文同軌通表裏釐福曜德中區黎庶知讓觀英遐外夷貊懷惠秩禮恤勤散露臺之金賑民舒國傾御邸之粟約違迫脅奢去甚泰讌無留飲畋不盤樂物色異人優游鯁直顯靡失心幽無怨魄精炤日月事洞天情故不勞仗斧之使號令不肅而自嚴無辱鳳舉之事靈怪不召而自彰萬里神行飆塵不起農商野廬邊城偃柝冀馬南金填委內府馴象栖爵充羅外苑阿紈纂組之饒衣覆宗國魚鹽杞梓之利傍贍荒遐士民殷富繁軼五陵宮宇宏麗崇冠三川閭閈有盈歌吹無絕朱輪疊轍華冕重肩豈徒世無窮人民獲休息朝呼韓罷酤鐵而已哉是以嘉祥累仍福應尤盛青丘之狐丹穴之鳥栖阿閣遊禁園金芝九莖木禾六刃秀銅池發膏畝宜以謁薦郊廟和協律呂煙霏霧集不可勝紀然而聖上猶夙興昧旦若有望而未至宏規遠圖如有追而莫及神明之貺推而弗居也是以琬碑鏐檢盛典蕪而不治朝神省方大化抑而未許崇文協律之士蘊儛頌於外坐朝陪宴之臣懷揄揚於內三靈佇睠九壤注心既有日矣歲宮乾維月邅蒼陸長河巨濟異源同清澄波萬壑潔瀾千里斯誠曠世偉觀昭啟皇明者也語曰影從表瑞從德此其效焉宣尼稱鳳鳥不至河不出圖傳曰俟河之清人壽幾何皆傷不可見者也然則古人所不見者今殫見之矣孟軻曰千載一聖是旦暮也豈不信哉夫四皇六帝樹聲長世大寶也澤浸群生國富刑清鴻德也制禮裁樂惇風遷俗文教也誅箠羯黠束顙象闕武功也鳴禽躍魚滌穢河渠至祥也大寶鴻德文教武功其崇如此幽明同贊民祇與能厥應如彼唯天為大堯實則之皇哉唐哉疇與為讓抑又聞之勢之所覃者淺則美之所傳者近道之所感者深則慶之所流者遠是以豐功韙命潤色縢策盛德形容藻被歌頌察之上代則奚斯吉甫之徒鳴玉鑾於前視之中古則相如王襃之屬馳金羈於後絕景揚光清埃繼路故班固稱漢成之世奏御者千有餘篇文章之盛與三代同風由是言之斯迺臣子舊職國家通議不可輟也臣雖不敏敢不勉乎乃作頌曰窺刊崩石捃逸殘竹巢風寂寥羲埃綿邈鉅生大年贍學淵聞鞶繡成景粉繢顓軒徒翫井科未覩天河亙古通今明鮮晦多千齡一見書史登歌旋我皇駕揆景方塗淩周躐殷蹶唐轢虞如彼七緯累璧重珠高祖撥亂首物定靈更開天地再鑄群生帝御三傑龍步八坰朔南暨教海北騰聲淪深格高浹遐洞冥毚鼎遷宋玄圭告成大明方徽鴻光中微聖命誰堪皇曆攸歸謀從筮協神與民推黃旗西映紫蓋東輝納瑞螭玉升政衡機金輪豹飾珠冕龍衣正位北辰垂拱南面天下何思日用罔倦復禮歸仁觀恆通變一物有違戚言毀膳菲躬簡法厚下安宅謙德彌光損道滋益孝崇饗祀勤隆耕籍饘酎秋羊封墐春骼嬰耄兼粱鰥孤重帛體由學染俗以教遷禮導刑清樂鬯風宣分衢讓齒析訟推田野旌伏彥朝賞登賢儒訓優柔武節焱鷙文憲精弘戎容犀利樞鈐明審程彠周備吏礪平端民羞幸覬桴鼓凝埃烽驛垂轡銷我長劍歸為農器閩外水鄉鄣表炎國隴首西南渤尾東北赩赩嶺丹渾渾泉黑移琛雲朔轉隼邛僰狼歌薦功鳥譚陳德治博化光民阜財盛班白行謠青綺高詠雲表幽和物章明慶麗植雕質蠢行藻性仁草晨莩德宿宵映海無隱飆山有黃落牛羊內首閭戶外拓瑞木朋生祥禽輩作薰風蕩閨飴露流閣器範神妙劑調象藥匪直也斯偉慶方溱注彼四瀆媚此雙川伏靈遙紀閟貺遐年澄波崑嶽鏡流蔥山泉室凝澱水府清涓俛瞰夷都降眡驪淵朱宮潛耀紫閣陰鮮昔在爽德王風不昌迺溢迺竭或壅或亡絜源濫壑曾是未央先民永慨大道悠長雲何其瑞實鍾我皇聞諸師說天竦聽密介焉如響匪遠惟疾矧是皇心妙夫貞一左右天經戶牖人術訏謨布簡絲言盈室穢有綿祀清豈崇日一人之慶吹萬稟和靈根方固修源重波副睿貳哲帝體皇柯景雲蔚嶽秀星駢羅垂光九野騰響四遐輔車鼎足槃石虎牙世匹周室基永漢家泰階既平洪河既清大人在上區宇文明樵夫議道漁父濯纓臣照作頌鋪德樹聲佛影頌形生麤怪神照潭寂驗幽以明考心者迹六塵煩苦五道綿劇乃炳舟梁爰悟淪溺色丹貌繢留相瓊石金光絕見玉毫遺覿俾昏作朗效順去逆宋臨川王起臣聞憑飆薦響唱微效長垂波鑒景功少致深是以冰臺築乎魏邑鳳閣起於漢京皆所以贊生通志感悅幽情者也伏見所製淩煙樓棲置崇迥延瞰平寂即秀神皋因基地勢東臨吳甸西眺楚關奔江永寫鱗嶺相葺重樹窮天通原盡目悲積陳古賞絕舊年誠可以暉曠高明藻撤遠心矣夫識緣感傾事待言彰匪言匪述綿世罔傳敢作銘曰凌煙樓銘巖巖崇樓藐藐層隅階基天削戶牖雲區瞰江列楹望景延除積清風露合綵煙塗俯窺淮海俛眺荊吳我王結駕藻思神居宜此萬春脩靈所扶藥奩銘歲霣走丸生猒隤墻時無驟得年有遐方水玉出煙靈飛生光龜文電衣龍綵雲裳九芝八石延正盪斜二脂六體振衰返華毛姬餌葉鳳子藏花景絕翠虬氣隱赬霞深神罕別妙奇不揚或繁虎杖或亂蛇床故不世不可以服未達不可以嘗眩精逆目是乃為良石帆銘應風剖流息石橫波下潀地紉上獦星羅吐湘引漢歙蠡吞沱西歷岷冡北瀉淮河眇森弘藹積廣連深淪天測際亘海窮陰雲族未起風柯不吟崩濤山墜鬱浪雷沉在昔鴻荒刊啟源陸表裏民邦經緯鳥服瞻貞視晦坎水巽木乃剡乃鏟既刳既斲飛深浮遠巢潭館谷涉川之利謂易則難臨淵之戒曰危乃安泊潛輕濟冥表勤言穆我戒逐留御不還徒悲猿鵠空駕滄煙君子彼想祗心載惕林簡松括水採龍鷁覘氣涉潮投祭涵璧揆檢舍圖命辰定歷二崤虎口周王夙趨九折羊腸漢惡電驅潛鱗浮翼爭景乘虛衡石赬鰩帝子察殂青山斷河后父沉軀川吏掌津敢告訪途飛白書勢銘秋毫精勁霜素凝鮮霑此瑤波染彼松煙超工八法盡奇六文鳥企龍躍珠解泉分輕如游霧重似崩雲絕鋒劍摧驚勢箭飛差池鷰起振迅鴻歸臨危制節中險騰機珪角星芒明麗爛逸絲縈髮垂平理端密盈尺錦兩片字金溢故仙芝煩弱既匪足雙蟲虎瑣碎又安能匹君子品之是最神筆瓜步山楬文歲舍龍紀月巡鳥張鮑子辭吳客楚指兗歸揚道出關津升高問途北眺氈鄉南矖炎國分風代川揆氣閩澤四睨天宮窮曜星絡東窺海門候景落日遊精八表駛視四遐超然永念意類交橫信哉古人有數寸之籥持千鈞之關非有其才施處勢要也瓜步山者亦江中眇小山也徒以因迥為高據絕作雄而淩清瞰遠擅奇含秀是亦居勢使之然也故才之多少不如勢之多少遠矣仰望穹垂俯視地域涕洟江河疣贅丘嶽雖奮風漂石驚電剖山地綸維陷川鬭毀宮豪盈髮虛曾未注言況乎沉河浮海之高遺金堆璧之奇四遷八聘之策三黜五逐之疵販交買名之薄吮癰舐痔之卑安足議其是非
