body:
  text: 南平王鑠荅移魏若庫辰樹蘭知以邊氓擾動多有叛逆欲杜絕奸宄兩息民患又欲迭送奔亡禁其來往申告嘉貺實獲厥心但彼和好以來矢言每缺侵軼之獘屢違義舉任情背畔專肆暴略豈唯竊犯王黎乃害乃行使頃誅討蠻髦事止畿服或有狐奔鼠竄逃自北境而輒便苞納待之若舊資其糧仗縱為寇賊往歲擅興戎旅禍加孩耄罔顧善鄰之約不惟疆域之限來示所云彼竝行之雖豐辭盈觀即事違實興嫌長亂實彼之由反以為言將違躬厚之義疆埸之民有自來矣且相期有素本不介懷若於本欲消奸弭暴永存匪石宜先謹封守斥遣諸亡驚蹏逸鏃不妄入境則邊城之下外戶不閉王制嚴明豈當獨負來信若亡命奔越侵盜彼民斯固刑之所取無勞遠及自荷閫外思闡皇猷每申敕守宰務敦義讓往誠未布能不愧怍當重約示以副至懷宋書索虜傳元嘉二十五年虜寍南將軍豫州刺史北并侯若庫辰樹蘭移書豫州右將軍雍州刺史南平王鑠荅移奉表自陳往年元凶禍逆陛下入討臣背凶赴順可謂常節及丞相構難臧魯協從朝野怳惚咸懷憂懼陛下欲建百官羽儀星馳推奉臣前後固執方賜允俞社稷獲全是誰之力陛下接遇慇懃累加榮寵驃騎揚州旬月移授恩秩頻加復賜徐兗仰屈皇儲遠相餞送臣一遇之感感此何忘度希偕老永相娛慰豈謂陛下信用讒言遂令無名小人來相掩襲不任枉酷即加誅翦雀鼠貪生仰違詔敕令親勒部曲鎮扞徐兗昔緣何福同生皇家今有何愆便成胡越陵鋒奮戈萬沒豈顧盪定以期冀在旦夕右軍宣簡爰及武昌皆以無罪竝遇枉酷臣有何過復致於此陛下宮帷之醜豈可三緘臨紙悲塞不知所言宋書竟陵王誕傳上使沈慶之率大眾計誕誕奉表投之城外又見魏書島夷傳駮丘邁之閨月周忌議邁之議不可準據案晉世及皇代以來閏月亡者皆以閏之後月祥宜以來年七月為祥忌宋書禮志二孝建元年六月湘東國刺稱國太妃以去三十年閏六月二十八日薨未詳周忌當在六月為取七月勒禮官議正博士丘邁之議宜以今六月為忌左僕射建平王宏謂云云又見通典一百讜言陳時務議臣聞建國之道咸殊興王之政不一至於開諫致寍防口取禍固前王同軌後主共則秦殷之敗語戮刺亡周漢之盛謗升箴顯陛下以至德神臨垂精思治進儒禮而崇寬教哀獄法而黜嚴刑表忠行而舉貞節辟處士而求賢異脩廢官而出滯賞徹天膳而重農食禁貴遊而弛榷酤通山澤而易關梁固已海內仰道天下知德今復開不諱之塗獎直辭之路四海希風普天幸甚舉蒙採問敢不悉心謹條鄙見置陳如左辭埋違謬伏用震讋夫用兵之道自古所慎頃干戈未戢戰備宜脩而卒不素練兵非夙習且戎衛之職多非其才或以資厚素加或以祿薄帶帖或寵由權門恩自私假既無將領虛尸榮祿至於邊城舉燧羽驛交馳而望其擐甲推鋒立功閫外譬木求魚不可得矣常謂臨難命師皆出倉卒驅烏合之眾隸造次之主貌疏情乖有若胡越豈能使其同力拔危濟難故奔北相望覆敗繼有今欲改選將校皆得其人分臺見將各以配給領護二軍為其總統令撫養士卒仗恩信先加農隙校獵以習其事三令五申以齊其心使動止應規進退中律然後畜銳觀釁因時而動摧敵陷堅折衝於外孫子曰視卒如赤子故可與之共死所以張弮效爭先之心吮癰致必盡之命豈不由恩著者士輕其生令明者卒畢其力攷心迹事如或有在妄陳膚知追懼乖謬宋書建平王宏傳廟樂議聖王之德雖同刱制之禮或異樂不相沿禮無因襲自寶命開基皇符在運業富前王風通振古朝儀國章竝循先代自後晉東遷日不暇給雖大典略備遺闕尚多至於樂號廟禮未該往正今帝德再昌大孝御寓宜討定禮本以昭來葉尋舜樂稱韶漢改文始周樂大武秦革五行眷夫祖有功而宗有德故漢高祖廟樂稱武德太宗廟樂曰昭德魏制武始舞武廟制咸熙舞文廟則祖宗之廟別有樂名晉氏之樂正德大豫及宋不更名直為前後二舞依據昔代義舛事乖今宜釐改權稱以凱容為韶舞宣烈為武舞祖宗廟樂總以德為名若廟非不毀則樂無別稱猶漢高文武咸有嘉號惠景二主樂無餘名章皇太后廟依諸儒議唯奏文樂何休杜預范甯注初獻六羽竝不言佾者佾則干在其中明婦人無武事也郊祀之樂無復別名仍同宗廟而已尋諸漢志永至等樂各有義況宜仍舊不改宋及東晉太祝唯送神而不迎神近議者或云廟以居神恆如在也不應有迎送之事意以為竝乖其衷立廟居靈四時致享以申孝思之情夫神升降無常何必恆安所處故祭義云樂以迎來哀以送往鄭注云迎來而樂樂親之來送往而哀哀親之返其享否不可知也尚書曰祖考來格詩云神保遹歸注曰歸於天地也此竝言神有去來則有送迎明矣即周肆夏之名備迎送之樂古以尸象神故儀禮祝有迎尸送尸近代雖無尸豈可闕迎送之禮又傅立有迎神送神哥辭明江左不迎非舊典也宋書樂志一孝建二年九月尚書左僕射建平王宏議竣據周禮孝經天與上帝連文重出故謂上帝非天則易之作樂非為祭天也案易稱先王以作樂崇德殷薦之上帝以配祖考尚書云肆類於上帝春秋傳曰告昊天上帝凡上帝之言無非天也天尊不可以一稱故或謂之昊天或謂之上帝或謂之昊天上帝不得以天有數稱便謂上帝非天徐邈推周禮國有故則旅上帝以知禮天旅上帝同是祭天言禮天者謂常祀也旅上帝者有故而祭也孝經稱嚴父莫大於配天故云郊祀后稷以配天宗祀文王於明堂以配上帝既以配天為義則上帝猶天益明也不欲使二天文同故變言上帝爾周禮祀天之言再見故鄭注以前天神為五帝後冬至所祭為昊天竣又云二至之祀又非天地未知天地竟應以何時致享記云埽地而祭器用陶匏旨明所用質素無害以樂降神荀萬秋謂郊宜有樂事有典據竣又云東平王蒼以為前漢諸祖別廟是以宗祖之廟可得各有舞樂至於祫祭始祖之廟則專用始祖之舞故謂後漢諸祖共廟同庭雖有祖宗不宜人人別舞此誠一家之意而未統適時之變也後漢從儉故諸祖共廟猶以異室存別廟之禮晉氏以來登哥誦美諸室繼作至於祖宗樂舞何獨不可迭奏苟所詠者殊雖復共庭亦非嫌也魏三祖各有舞樂豈復是異廟邪宋書樂志一左僕射建平王宏又議又見通典一百四十七天子為皇后父服議謂至尊緦制終止舉哀而已不須釋服宋書禮志二孝建三年三月尚書令中軍將軍建平王宏議參議副車正數屬車起秦八十一乘義兼九國三十六乘無所準竝不出經典自蔡邕胡廣傳說耳又是從官所乘非帝者副車正數江左五乘則儉不中禮案周官云上公九命貳車九乘侯伯七命車七乘子男五命車五乘然則帝王文物旗旒皆十二為節今宜依禮十二乘為制宋書禮志五孝建三年五月有司奏案漢蔡邕胡廣竝云云尚書令建平王宏參議詔可又通典六十六
