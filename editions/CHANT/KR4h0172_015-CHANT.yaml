body:
  text: 尋陽王子房與吳喜書知統戎旅已次近路卿所在著名今日何為立忠於彼邪想便倒戈共受河山之賞宋書吳喜傳請建國學表臣聞風化興於哲王教訓表於至世至說莫先講習甚樂必寄朋來古人成童入學易子而教尋師無遠負糧忘艱安親光國莫不由此若能出不由戶則斯道莫從是以明詔爰發已成渙汗學制既下遠近遵承臣之愚懷少有未達今惟新告始盛業初基天下改觀有志景慕而置生之制取少停多開不來之端非一塗而已臣以家推國則知所聚不多恐不足以宣大宋之風弘濟濟之美臣謂合選之家雖制所未達父兄欲其入學理合開通雖小違晨昏所以大弘孝道不知春秋則所陷或大故趙盾忠而書弒許子孝而得辠以斯為戒可不懼哉十五志學誠有其文若年降無幾而深有志尚者何必限以一格而不許其進邪楊烏豫玄實在弱歲五十學易乃無大過昔中朝助教亦用二品潁川陳載已辟太保掾而國子取為助教即大尉準之弟所貴在於得才無繫於定品教學不明獎厲不著今有職閑而學優者可以本官領之門地二品宜以朝請領助教既可以甄其名品斯亦敦學之一隅其二品才堪自依舊從事會今生到有期而學校未立覆簣實望其速回轍已淹其遲事有似賖而宜急者殆此之謂古人重寸陰而賤尺璧其道然也宋書苑泰傳諫改錢法流聞將禁私銅以充官銅民雖失器終於獲直國用不足其利實多臣愚意異不寍寢默臣聞治國若烹小鮮拯敝莫若務本百姓不足君孰與足未有民貧而國富本不足而未有餘者也故囊漏貯中識者不吝反裘負薪存毛實難王者不言有無諸侯不言多少食祿之家不與百姓爭利故拔葵所以明治織蒲謂之不仁是以貴賤有章職分無爽今之所憂在農民尚寡倉廩未充轉運無已資食者眾家無私積難以禦荒耳夫貨存貿易不在少多昔日之貴今者之賤彼此共之其揆一也但令官民均通則無患不足若使必資貨廣以收國用者則龜貝之屬自古所行尋銅之為器在用也博矣鍾律所通者遠機衡所揆者大夏鼎負圖實冠眾瑞晉鐸呈象亦啟休徵器有要用則貴賤同資物有適宜則家國共急今毀必資之器而為無施之錢於貨則功不補勞在用則君民俱困校之以實損多益少陛下勞謙終日無倦庶務以身率物勤素成風而頌聲不作板渭不至者良由基根未固意在遠略伏願思可久之道除欲速之情弘山海之納擇芻牧之說則嘉謀日陳聖慮可廣其亡存心然後苞桑可繫愚誠一至用忘寢食宋書范泰傳南史三十三表賀元正並陳旱災元正改律品物惟新陛下藉日新以蓄德仰乾元以履祚吉祥集室百福來庭頃旱魃為虐亢陽愆度通川燥流異井同蹋老弱不堪遠汲貧寡單於負水租輸既重賦稅無降百姓怨咨臣年過七十未見此旱陰陽并隔則和氣不交豈惟凶荒必生疾疫其為憂虞不可備序雩榮之典以誠會事巫祝常祈罕能有感上天之譴不可不察漢東海枉殺孝婦亢旱三年及祭其墓澍雨立降歲以有年是以衛人伐邢師興而雨伏願陛下式遵遠猷思隆高構推忠恕之愛矜冤枉之獄遊心下民之瘼厝思幽冥之紀令謗木豎闕諫鼓鳴朝察芻牧之言總統御之要如此則苞桑可繫危幾無兆斯而災害不消未之有也故夏禹引百姓之罪殷湯甘萬方之過太戊資桑穀以進德宋景藉熒惑以脩善斯皆因敗以轉成往事之昭晰也循未俗者難為風就正路者易為雅臣疾患日篤夕不謀朝會及歲慶得一聞達微誠少亮無恨泉壤永違聖顏拜表悲咽宋書范泰傳乞加贈廬陵王義真表伏承廬陵王已復封爵猶未加贈陛下孝慈天至友于過隆伏揆聖心已自有在但司契以不唱為高冕旒以因寄成用臣雖言不足採誠不亮時但猥蒙先朝忘醜之眷復沾廬陵矜顧之末息晏委質有兼常款契闊戎陣顛狽艱危厚德無報授令路絕此老臣兼不能自已者也杇謝越局無所逃刑宋書范泰傳元嘉二年徐羨之等猶秉重權復上表云云泰諸子禁之表竟不奏三年羨之等伏誅因旱蝗上表陛下昧旦丕顯求民之瘼明斷庶獄無倦政事理出群心澤謠民口百姓翕然皆自以為遇其時也災變雖小要有以致之守宰之失臣所不能究上天之譴臣所不敢誣有蝗之處縣官多課民捕之無益於枯苗有傷於殺害臣聞桑穀時亡無假斤斧楚昭仁愛不禜自瘳卓茂去無知之蟲宗均囚有異之處蝗生有由非所宜殺石不能言星不自隕春秋之有所宜詳察禮婦人有三從之義而無自專之道周書父子兄弟罪不相及女人被宥由來上矣謝晦婦女猶在尚方始貴後賤物情之所甚苦匹婦一室亦能有所感激臣於謝氏不容有情蒙國重恩寢處思報伏度聖心已當有在禮春夏教詩無一而闕也臣近侍坐聞立學當在入年陛下經略粗建意存民食入年則農功興農功興則田里闢入秋治庠序入冬集遠生二塗竝行事不相害夫事多以淹稽為戒不遠為患任臣學官竟無微績徒墜天施無情自處臣之區區不望目覩盛化竊慕子囊城郢之心庶免荀偃不瞑之恨臣比陳愚見便是都無可採徒煩天聽愧怍反側宋書范泰傳元嘉三年秋旱蝗又上表旱災未已加以疾疫又上表頃亢旱歷時疾疫未已方之常災實為過差古以為王澤不流之徵陛下昧旦臨朝無懈治道躬自菲薄勞心民庶以理而言不應致此意以為上天之於賢君正自殷懃無已陛下同規禹湯引百姓之過言動於心道敷自遠桑穀生朝而殞熒惑犯心而退非唯消災弭患乃所以大啟聖明靈雨立降百姓改瞻應感之來有同影響陛下近當仰推天意俯察人謀升平之化尚存舊典顧思與不思行與不行耳大宋雖揖讓受終未積有虞之道先帝登遐之日便是道消之初至乃嗣主被殺哲藩嬰禍九服徘徊有心喪氣佐命託孤之臣俄為戎首天下蕩蕩王道已淪自非神英撥亂反正則宗社非復宋有革命之與隨時其義尤大是以古今異用循方必壅大道隱於小成欲速成或未必達深根固蔕之術未洽於愚心是用猖狂妄作而不能緘默者也臣既頑且鄙不達治宜加之以篤疾重之以惛耄言或非言而復不能無言陛下錄其一毫之誠則臣不知厝身之所宋書范泰傳論沙門踞食表臣言陛下體達佛理將究其致遠必遐期研精入微但恨起予非昔對揚未易臣少信大法積習善性頗聞餘論髣髴玄宗往者侍坐過蒙眷誘意猥詞訥不能有所運通此之為恨畢世無已臣近難慧義踞食蓋區區樂同之意不敢求長於人側餐下風已達天聽臣請此事自一國偏法非經通永制外國風俗不同言論亦異聖人不變其言何獨苦改其用言宣意意達言忘儀以存敬敬立形廢是以聖人因事制誡隨俗變法達道乃可無律思夫其防彌繁用捨有時通塞惟理膠柱守株不以疏乎今之沙門匠乏善誘道無長壹各信所見尟能虛受乃至競異於一堂之間不和於時雍之世臣竊恥之況於異臣者乎司徒弘達悟有理中不以臣言為非今之令望信道未篤意無前定以兩順為美不斷為大俟此而制河可清矣慧嚴道生本自不企慧觀似悔始位伏度聖心已當有在今不望明詔孤發但令聖旨粗達宰相則下觀而化孰曰不允皇風方當遠畼文軌將就大同小異雖微漸不可長青青不伐將尋斧柯故宜自邇及遠令無思不服江左中興高座來遊愛樂華夏不言此制釋公信道最篤不苦其節思而不改容有其旨羅什卓犖不羈不可測落髮而不偏踞如復可尋禪師初至詣闕求通欲以故床入踞理不可開故不許其進後東安眾集果不偏食此即先朝舊事臣所親見者也謹啟弘明集十二臣言陛下近遊祗洹臣固請碑讚如憶髣髴有許法駕既遊臣輒仰刊碑上曰皇帝讚止此三字而已專輒之罪思臣所甘至於記福冥中未知攸濟若賜臣筆數字臣且不朽以之弘獎風尚有益而無損萬機脫有未暇聖旨自可笑授之左史侍衛之臣寍無自效之心裨諶世叔何遠之有可不勞聖慮亦冕旒之意也臣事久謝生塗已盡區區在心唯來世而已臣受恩深重祿賜有餘自度終無報於聖世已矣蓋首竝結草之誠願陛下哀而弗責臣言同上臣言奉被明詔悚懼屏營管穴偏見不足陳聞直以事已上達不寍寢默今敕又令更求其中是用猖狂復申本懷臣謂理之所在幸可不以文害意五帝不相襲禮三王不沿其樂革命隨時其義竝大莊周以古今譬舟車孟軻以專信書不如無書是故證羊非直聞斯兩用大道之行天下為家臣之區區一堂之同而況異俗偏制本非中庸之教生義觀得蒙弘接聖旨脫有下問望其依理上酬不敢以多自助取長於人慧觀荅臣都無理據唯褎臣以過言貶臣以干非推此疑其必悔未便有反善怙辭臣弘亦謂為然慧義弘陣已崩走伏路絕恃此為救難乎自免況復司契在上遁辭知窮臣近難慧觀輒復上呈如左臣以愚鄙將智而耄豈惟言之不中深懼不覺其惛侍衛之臣實時之望既不能矜臣此意又不能誨臣不逮此皆臣自招之自咎而已伏願陛下錄其一往之至不以知拙為罪復敦冒昧干穢竊時古典不加刑之耳同上上封事極諫少帝伏聞陛下時在後園頗習武備鼓鞞在宮聲聞於外黷武掖庭之內諠譁省闥之閒不聞將帥之臣統御之主非徒不足以威四夷秪生遠近之怪近者東寇紛擾皆欲伺國瑕隙今之吳會寍過二關河根本既搖於何不有如水旱成災役夫不息無寇而戒為貴漸多河南非復國有羯虜難以理期此臣所以用忘寢食而干非其位者也陛下踐祚委政宰臣實同高宗諒闇之美而更親狎小人不免近習懼非社稷至計經世之道王言如絲其出如綸下觀而化疾於影響伏願下思弘古道式遵遺訓從理無滯任賢勿疑如此則天下歸德宗社惟永詩云一人有慶兆民賴之天高聽卑無幽不察興衰在人成敗易曉未有政治在於上而人亂於下者也臣蒙先朝過遇陛下殊私實欲盡心竭誠少報萬分而惛耄已及百疾互生便為永違聖顏無復自盡之路貪及視息陳其狂瞽陛下若能哀其所請留心覽察則臣夕殞於地無恨九泉宋書范泰傳殷祭議今雖既祔之後得以烝嘗而無殷祭之禮有喪薦廢吉祭祭新生於寢今不設別寢既祔遂祭於廟故四時烝嘗以奇追遠之思三年一禘以習昭穆之序義本各異三年喪畢則合食太祖過時而殷無取於限三十月也降安之祕以喪而廢矣通典四十九義熙三年臨川王道規嗣議公之友愛即心過厚禮無二嗣宜還本屬宋書范泰傳初司徒道規無子養太祖及薨以兄道憐次子義慶為嗣高祖以道規素愛太祖又令居重道規追封南郡公應以先華容縣公賜太祖泰議從之與謝侍中書卿常言如何歷觀高士類多有情吾亦許卿以同何緬邈之過便是未孤了幽關也吾猶存舊情東望慨然便是有不馳處也見熾公阡陌如卿問栖僧於山誠是美事屢改驟遷未為快也杖策之郡斯則善也祗洹中轉有奇趣福業深緣森兮滿目見形者所不能傳聞言而悟亦難其人辭煩而已於此絕筆范泰敬謂祗洹塔內讚因熾公相示可少留意省之并同子與人歌而善廣弘明集十六與司徒王弘諸公書論道人踞食范泰敬白公卿諸賢今之沙門坐有二法昔之祗洹似當不然據今外國言語不同用舍亦異聖人隨俗制法因方弘教尚不變其言何必苦同其制但一國不宜有二一堂寍可不同而今各信偏見自是非彼不尋制作之意惟此雷同為美鎮之無主遂至於此無虛於受人有同於必執不求魚兔之實競攻筌蹏之末此風不革難乎取道樹王六年以致正覺始明玄宗自敷高座皆結跌趺坐不偏踞也坐禪取定義不夷俟據之食美在乎食不求鮑此皆一國偏法非天下通制亦由寒鄉無絺綌之禮日南絕氈裘之律不可見大禹解裳之初便謂無復章甫請各一兩捨以付折衷君子范泰區區正望今集一食之同過此已往未之或知禮以知貴僧法尚同今升齋堂對聖像堂如神在像中四雙八輩義無云異自矜之情寍可試暫不我釋公往在襄陽偏法已來思而不變當有其旨是以投錫乘車義存同眾近禪道場天會亦方其坐豈非存大略小禮不兼舉故邪方坐無時而偏踞有時自方以恆適異為難嘗變取同為異且主人降已敬賓有自來矣更諮義公了不見酬是以敬白同異以求厥中願惠咳嚏之餘以蔽怯弱之情弘明集荅釋慧義書前論已包此通上人意強氣猛弗之尋耳戒以防非無非何戒故愚惑之夫其戒隨俗變律華夏本不偏企則聚骨交脛之律故可得而略手食之戒無用匙筯之文何重偏坐而輕手食律不得手近女人尋復許親溺可援是為凡夫之疑果足以改聖人之律益知二百五十非自然定法如此則固守不為全得師心未足多怪夏五闕文固守不為疑明慎所見苟了何得顧眾而動企之為義意在宜進欲速則事不得行端坐則不安其居時有踞慠之夫故非禮法所許一堂兩志上人之同泯焉莫逆弟子之和孑然單獨何敢當五十大陣是用畏敵而默庶乎上善之救弘明集與竺道生釋慧觀書論踞食外國風俗還自不同提婆始來義觀之徒莫不沐浴鑽仰此蓋小乘法耳便謂理之所極謂無生方等之經皆是魔書提婆未後說經乃不登高座法顯後至泥洹始唱便謂常住之言眾理之最般若宗極皆出其下以此推之便是無主於內有聞輒變譬之於射後破奪先則知國之律非定法也偏坐之家無時而正高座說法亦復企踞外國食多用手戒無匙筯慧義之徒知而不改至於偏坐永為不慚固自為矛盾其誰能解弟子意常謂與人同失賢於自代其是推心樂同非敢許以求直今之奉法白衣決不可作外國被服沙門何必苦守偏俗弘明集鸞鳥詩序昔罽賓王結罝峻祁之山獲一鸞鳥王甚愛之欲其鳴而不能致也乃飾以金樊饗以珍羞對之愈戚三年不鳴其夫人曰嘗聞鳥見其類而後鳴何不懸鏡以映之王從其言鸞覩形感契慨然悲鳴哀響中宵一奮而絕嗟乎茲禽何情之深昔鍾子破琴於伯牙匠石韜斤於郢人蓋悲妙賞之不存慨神質於當年耳矧乃一舉而殞其身者哉悲夫北堂書鈔一百三十六蓺文類聚九十御覽九百十六張長公贊長公秉心獨逸世表量物難同審已彌了情雖高邃迹無抗矯靡當夷惠孰識多少蓺文類聚三十六高鳳贊遐哉玄古邈矣皇羲自茲已降顯默參差智為世駭才為物奇迹出無泯潛躍俱馳曖曖若人孰測其為戢曜幽壑採真重崖沖情莫亮汗迹示疵輕俗無際肆志莫羈蓺文類聚三十六吳季子札贊延州高遠棄國師誠優遊大邑觀風上京仁懷邦壤道畼聖明鑒徹昔代樂察未形嬴博遠死解劍在生夫子戾止爰詔作名蓺文類聚三十六佛贊精粗事阻始未理通捨事就理即朗祛蒙惟此靈覺因心則崇四等極物六度在躬明發儲寢孰是化初夕滅雙樹豈還本無渺渺遠神遙遙安和願言來期免茲淪湑宏明集十六為宋公祭嵩山文劉裕敬薦中獄之靈惟嶽作鎮中畿擬天比峻降祉發輝宣和陰陽道達幽微既曰輔順亦代厥違霜露所均萬人是依不以虛薄志歸不庭仰紓國恥俯拯黎甿望嶺懷仁踐境延情金璧之贈愧懼交盈思樂時雍終憑威靈舊都既清三秦期廓豈惟人謀抑亦冥略逝將言旋自雍徂洛何以寄懷一卮清酌珪璧云乎深誠攸託初學記五探時旨上言臣歷觀前史二漢故事諸蕃王政以訞詛幸災便正大逆之罰況義康奸心舋迹彰著遐邇而至今無恙臣竊惑焉且大梗常存將重階亂骨肉之際人所難言臣受恩深重故冒犯披露宋書范曄傳作彭城王義康與徐湛之書宣示同黨吾凡人短才生長富貴任情用已有過不聞與物無恆喜怒違實致使小人多怨士類不歸禍敗已成猶不覺悟退加尋省方知自招刻肌刻骨何所復補然至盡心奉上誠貫幽顯拳拳謹慎惟恐不及乃可恃寵驕盈實不敢故為欺罔也豈苞藏逆心以招灰滅所以推誠自信不復防護異同率意信心不顧萬物議論遂致議巧潛構眾惡歸集甲奸險好利負吾事深乙凶不齒扇長無賴丙丁趨走小子唯知諂進伺求長短共造虛說致令禍陷骨肉誅戮無辜凡在過釁竟有何徵而刑罰所加同之元惡傷和枉理感徹天地吾雖幽逼日苦命在漏刻義慨之士時有音信每知天文人事及外閒物情土崩瓦解必在朝夕是為釁起群賢濫延國家夙夜憤踊心腹交戰朝之君子及士庶白黑懷義秉理者寍可不識時運之會而坐待橫流邪除君側之惡非唯一代況此等狂亂辠骫終古所無加之翦戮易於摧朽邪可以吾意宣示眾賢若能同心奮發族裂逆黨豈非功均刱業重造宋室乎但兵凶戰危或致侵濫若有一豪犯順誅及九族處分之要委之群賢皆當謹奉朝廷動止聞啟往日嫌怨一時豁然然後吾當謝辠北闕就戮有司苟安社稷瞑目無恨勉之勉之宋書范曄傳獄中與諸甥姪書以自序吾狂釁覆滅豈復可言汝等皆當以辠人棄之然平生行己在懷猶應可尋至於能不意中所解汝等或不悉知吾少懶學問晚成人年三十許政始有向耳自爾以來轉為心化雖老將至者亦當未已也往往有微解言乃不能自盡為性不尋注書心氣惡小苦思便憒悶口機又不調利以此無談功至於所通解處皆自得之於胸懷耳文章轉進但才少思難所以每於操筆其所成篇殆無全稱者常恥作文士文患其事盡於形情急於藻義牽其旨韻移其意雖時有能者大較多不免此累政可類工巧圖繢竟無得也常謂情志所託故當以意為主以文傳意以意為主則其旨必見以文傳意則其詞不流然後抽其芬芳振其金石耳此中情性旨趣千條百品屈曲有成理自謂頗識其數嘗為人言多不能賞意或異故也性別宮商識清濁斯自然也觀古今文人多不全了此處縱有會此者不必從根本中來言之皆有實證非為空談年少中謝謝莊有其分手筆差易文不拘韻也吾思乃無定方特能濟難適輕重所稟之分猶當未盡但多公家之言少於事外遠致以此為恨亦由無意於文名故也本未關史書政恆覺其不可解耳既造後漢轉得統緒詳觀古今箸述及評論殆少可意者班氏最有高名既任情無例不可甲乙辨後贊於理近無所得唯志可推耳博贍可不及之整理未必愧也吾雜傳論皆有精意深旨既有裁味故約其詞句至於循吏以下及六夷諸序論筆勢縱放實天下之奇作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而已欲徧作諸志前漢所有著悉今備雖事不必多且使見文得盡又欲因事就卷內發論以正一代得失意復未果贊自是吾文之傑思殆無一字空設奇變不窮同含異體乃自不知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也恐世人不能盡之多貴古賤今所以稱情狂言耳吾於音樂聽功不及自揮但所精非雅聲為可恨然至於一絕處亦復何異邪其中體趣言之不盡弦外之意虛響之音不知所從而來雖少許處而旨態無極亦嘗以授人士庶中未有一豪似者此永不傳矣吾書雖小小有意筆勢不快餘竟不成就每愧此名宋書范曄傳又略見御覽五百八十五雙鶴詩序客有寄余雙鶴者其一揚翰皎潔響逸九皋其一翅折志衰自視缺然余因歎玩之遂為之詩蓺文類聚九十和香方序麝本多忌過分必害沈實易和盈斤無傷零藿虛燥詹唐黏溼甘松蘇合安息鬱金柰多和羅之屬竝被珍於外國無取於中土又棗膏昏鈍甲煎淺俗非惟無助於馨烈乃當彌增於尤疾也宋書范曄傳此序所言悉以比類朝士麝本多忌比庾炳之零藿虛燥比何尚之詹康黏溼比沈演之棗膏昏鈍比羊玄保甲煎淺俗比徐湛之甘松蘇合比慧林道人沈實易和以自比也
