body:
  text: 謝靈運七濟翠緌媚眉朱裳妍形御覽六百八十六朝食既畢摘果堂陰春惟枇杷夏則林檎御覽九百七十一遊名山志夫衣食人生之所資山水性分之所適今滯所資之累擁其所適之性耳俗議多云歡足本在華堂枕喦漱流者乏於大志故保其枯槁余謂不然君子有愛物之情有救物之能橫流之弊非才不治故有屈己以濟彼豈以名利之場賢於清曠之域邪語萬乘則鼎湖有縱轡論儲貳則嵩山有絕控又陶朱高揖越相留侯願辭漢傅推此而言可以明矣破石山石帆山破石溪南二百餘里又有石帆修廣與破石等度質色亦同傳云古有人以破石之半為石帆故名彼為石帆此名破石赤石山永寍安固二縣中路東南便是赤石又枕海會稽郡石壁山巫湖三面悉高山枕水渚山溪澗凡有五處南第一谷今在所謂石壁精舍石門山石門㵎六處石門遡水上入兩山口兩邊石壁右邊石巖下臨澗水神子溪神子溪南山與七里山分流去斤竹澗數里臨川郡華子岡華子岡麻山第三谷故老相傳華子期者祿里先生弟子翔集此頂故華子為稱也彊中桂林頂遠則嵊尖彊中臨江梯從臨江樓步路南上二里餘左望湖中右傍長江南門樓始寍又北轉一汀十里直指舍下園南門樓自南樓百步許對橫山地胏山地胏山者王演山記謂之木榴山一名地胏初學記五新溪新溪蠣味偏甘有過紫溪者御覽九百四十二吹臺山吹臺有高桐皆百圍嶧陽孤桐方此為劣初學記二十八述祖德詩序太元中王父龕定淮南負荷世業尊主隆人逮賢相徂謝君子道消拂衣蕃嶽考卜東山事同樂生之時志期范蠡之舉文選謝靈運述祖德詩注贈宣遠詩序從兄宣遠義熙十一年正月作守安成其年夏贈以此詩到其年冬有荅文選謝瞻荅靈運詩注魏太子擬魏太子鄴中集詩序建安末余時在鄴宮朝游夕讌究歡愉之極天下良辰美景賞心樂事四者難并今昆弟友朋二三諸彥共盡之矣古來此娛書籍未見何者楚襄王時有宋玉唐景梁孝王時有鄒枚嚴馬游者美矣而其主不文漢武帝徐樂諸才備應對之能而雄猜多忌豈獲晤言之適不誣方將庶必賢於今日爾歲月如流零落將盡撰文懷人感往增愴王粲家本秦川貴公子孫遭亂流寓自傷情多陳琳袁本初書記之士故述喪亂事多徐幹少無宦情有箕潁之心事故仕世多素辭劉楨卓犖偏人而文最有氣所得頗經奇應瑒汝潁之士流離世故頗有飄薄之歎阮瑀管書記之任故有優渥之言平原侯植公子不及世事但美遨遊然頗有憂生之嗟竝見文選無量壽佛法藏長王宮懷道出國城願言四十八弘誓拯群生淨土一何妙來者皆清英穨年欲安寄乘化好晨征藝文類聚七十六王子晉贊淑質非不麗難以之百年儲宮非不貴豈若登雲天王子愛清淨區中寔囂諠冀見浮丘公與爾共繽翻初學記二十三巖下見一老翁四五少年贊衡山采藥人路迷糧亦絕過息巖下坐正見相對說一老四五少仙隱不可別其書非世教其人必賢哲初學記二十三和范光祿祗洹像贊三首並序范侯遠送像贊命余同作神道希微願言所屬輒總三首期之道場佛惟此大覺因心則靈垢盡智照數極慧明三達非我一援群生理阻心行道絕形聲菩薩若人仰宗發性遺慮以定養慧和理斯附爰初四等終然十住涉求至矣在外皆去緣覺聲聞合厭苦情多兼物志少如彼化城權可得寶誘以涅槃救爾生老肇元三車翻乘一道竝廣弘明集十五聚沬泡合維摩經十譬贊八首水性本無泡激流遂聚沫即異成貌狀消散歸虛壑君子識根本安事勞與奪愚俗駭變化橫復生欣怛藝文類聚七十六燄性內相表狀非炎安知火新新相推移熒熒非向我如何滯著人終歲迷因果芭蕉生分本多端芭蕉知不一含萼不結核敷華何由實至人善取譬無宰誰能律莫昵緣合時當視分散日藝文類聚八十七聚幻幻工作同異誰謂復非真一從逝物過既往亦何陳謬者疑久近遠者皆自賓勿起離合情會無百代人藝文類聚七十六夢覺謂寢無知寐中非無見意狀盈眼前好惡迭萬變既悟眇已往惜為浮物戀孰視娑婆盡寍當非赤縣影響合影響順形聲資物故生理一旦揮霍去何因相像似群有靡不然昧漠呼自已四色尚無本八微欲安恃藝文類聚七十六浮雲泛濫明月陰薈蔚南山雨能為變動用在我竟無取俄已就飛散豈復得攢聚諸法既無我何由有我所電倏爍驚電過可見不可逐恆物生滅後誰復覈遲速慎勿空留念橫使神理恧發已道易孚忘情長之福已上竝見釋藏肥九廣弘明集十五侍汎舟讚汎畫鷁兮遊蘭池渚相委兮石參差日隱雲兮月照林風遼泠兮水漣漪初學記二十五書帙銘懷幽卷賾戢妙抱密用捨以造舒卷不失亮惟勤翫無或暇逸藝文類聚五十五御覽六百六佛影銘並序夫大慈弘物因感而接接物之緣端緒不一難以形檢易以理測故已備載經傳具著記論矣雖舟壑緬謝像法猶在感運欽風日月彌深法顯道人至自祇洹具說佛影偏為靈奇幽巖嵌壁若有存形容儀端莊相好具足莫知始終常自湛然廬山法師聞風而悅於是隨喜幽室即考空巖北枕峻嶺南映滮澗摹擬遺量寄託青彩豈唯像形也篤故亦傳心者極矣道秉道人遠宣意旨命余製銘以充刊刻石銘所始寔由功被未有道宗崇大若此之比豈淺思膚學所能宣述事經徂謝承眷罔已輒罄竭劣薄以諾心許徽猷祕奧萬不寫一庶推誠心頗感群物飛鴞有革音之期闡提獲自援之路當相尋於淨土解顏於道場聖不我欺致果必報援筆興言情迫其概群生因染六趣牽纏七識迭用九居屢遷劇哉五陰卷矣四緣遍使轉輪苦根迍邅迍邅未已轉輪在己四緣雲薄五陰火起亹亹正覺是極是理動不傷寂行不乖止曉爾長夢貞爾沈詖以我神明成爾靈智我無自我實承其義爾無自爾必袪其偽偽既殊塗義故多端因聲成韻即色開顏望影知易尋響非難形聲之外復有可觀觀遠表相就近曖景匪質匪空莫測莫領倚巖煇林傍潭鑒井借空傳翠激光發囧金好冥漠白豪幽曖日月居諸胡寍斯慨曾是望僧擁誠俟對承風遺則曠若有概敬圖遺縱疎鑿峻峰周流步欄窈窕房櫳激波映墀引月入窗雲往拂山風來過松地勢既美像形亦篤彩淡浮色群視沈覺若滅若無在摹在學由其潔精能感靈獨誠之云孚惠亦孔續嗟爾懷道慎勿中惕弱喪之推闡提之役反路今覩發蒙茲覿式厲厥心時逝流易敢銘靈宇敬告震錫釋藏肥九廣弘明集十五武帝誄並序九有同悲四海等哀矧伊下臣思戀徘徊敢遵前典式述聖徽乃作誄曰舜潛歷巖高晦泗渚龍德而隱風積乃舉皇之遁世屯難方阻眷此區寰閔爾淪胥太元之季權戚攜薄隆安之初主相蒙弱嶽牧糾虔朝廷紛錯妖橫乘隙蛟噴鯨躍既擾奧區遂斥帝廛亂離斯瘼不後不先寔賴明哲授手康旃紀度迴薄餘分成閏舊晉中微偽楚籍釁躡彼潛機整此英陣推亡必朽固存斯振盧循負險肆慝遐嶺殄我江豫迫我臺省民既搖蕩國將遷鼎乘騶歸轅式固皇境弘危濟險弭難釋殆虎騎騖隰舟師漲海傾穴尋窠窮幽測昧昔去洛汭息肩江沚世更十君年踰百祀國絕興復家成桑梓荒默莫恤穨國誰恥夏典載禹九道是行商詔述湯兼攻是并勤彼周流協此經營仗鉞伐鼓赫赫明明乃敕眾師竟執戎昭誨以三略惠以六韜雲撤周京席卷秦郊復禮前塋雪愧舊朝既清西關將旋東道中憩徐豫兼應燕趙業盛曩代惠侔大造澤及四海功格八表悠悠聲教綿綿川陸北獻氈裘南貢金竹髽首冠弁穿胸斂服寒穴欣日巢栖翫屋匪惟遐譚靈物偕就孰是人事自天所祐甘露芝草祥雲瑞宿嘉禾連木素鳥皓獸昔之所感謳頌同音今之所應幽顯一心宋充虞德晉猶唐欽曰總八紘於茲三齡四維開張九流昭明敦儉務素欽賢愛萌制規作訓闡校修經禮樂已甄雲雨未弘將陟井陘薄埽白登北朔渴望飛旌衡輣東岱靈遲玉牒金縢天地不仁蒼生寡福已荷一遇棄我何速梁顛太穨甘殞以贖同軌畢至率土咸哀殊方均服欒欒素縗灑淚成雨響叫如雷史臣考卜高山開基貞龜無遠遷靈有期嗣皇擗摽群后崩悲孰云不戚痛百在茲惟祖之夕流火始變秋月未永飛漏急箭鳴簫哀噭金觴虛奠列駕長隧發輦華殿華殿既謝長隧是幸雙蓋躊躇六閑引領攀援容貌眷戀俄頃哀哀百僚長辭含鯁奉教百朝執鞭三始從履五牧年歷十祀天光下濟謬蒙眷齒愧微刀筆頗預遊止垂幕侍講接筵飡理修曙朗夕登臺泛沼匪月匪日無晏無早如何一旦緬邈穹昊徽容未遠聖靈超然收淚即路含戚何言風霜蕭瑟山海蒼茫地苦情矜節速心傷孰是幽哀實戀我皇情思如環萱蘇豈忘藝文類聚十三又略見北堂書鈔一百五十八廬陵王誄並序事非淮南而痛深於中霧迹非任城而暴甚於仰毒託體皇極銜怨至盡豈惟有識傷慨故亦率土悽心蓋出罔己之悲以陳酸切之事云爾誄曰哀哀君王終仁且德在枉無言即罪有默曾是忍虐古來一酷身微咎累痛踰酖毒何斯禍斯乃怨乃辱命如可延人百有贖矜急景之難留悼驚波之易淪自君王之冥漠歷彌稔於此春聆鳴禽之響谷視喬木之陵雲咸感節而興悅獨懷悲而莫申侯射隼於高墉赫王典以正刑服二辜於𤜻犴致九伐於南荊發酸痛於仁詔令寵贈於哀心布悽愴於帝言攄綢繆於皇音藝文類聚四十五廬山慧遠法師誄並序道存一致故異化同暉德合理妙故殊方齊致昔釋安公振玄風於關右法師嗣沫流於江左聞風而說四海同歸爾乃懷仁山林隱居求志於是眾僧雲集勤修淨行同法餐風棲遲道門可謂五百之季仰紹舍衛之風廬山之嵔俯傳靈鷲之旨洋洋乎未曾聞也予志學之年希門人之末惜哉誠願弗遂永違此世春秋八十有四義熙十三年秋八月六日薨年踰縱心功遂身亡有始斯終千載垂光嗚呼哀哉乃為誄曰於昔安公道風允被大法將盡穨綱是寄體靜息動懷真整偽事師以孝養徒以義仰弘如來宣揚法雨俯授法師威儀允舉學不闚牖鑒不出戶粳糧雖御獨為萇楚朗朗高堂肅肅法庭既嚴既靜愈高愈清從容音旨優游儀形廣演慈悲饒益眾生堂堂其器亹亹其資𩮀角味道辭親隨師供奉三寶析微辨疑盛化濟濟仁德怡怡於焉問道四海承風有心載馳戒德鞠躬令聲續振五濁暫隆弘道讚揚彌虛彌沖十六王子孺童先覺公之出家年未志學如彼鄧林甘露潤澤如彼瓊瑤既磨既琢大宗戾止座眾龍集聿來胥宇靈寺奚立舊望研幾新學時習公之勖之載和載輯乃修什公宗望交泰乃延禪眾親承三昧眾美合流可上可大穆穆道德超於利害六合俱否山崩海竭日月沈暉三光寢晰眾麓摧柯連波中結鴻化垂緒微風永滅嗚呼哀哉生盡沖素死增傷悽單縶土槨示同斂骸人天感悴帝釋慟懷習習遺風依依餘淒悲夫法師終然是棲室無停響途有廣蹊嗚呼哀哉端木喪尼哀直六年仰慕洙泗俯憚罤筌今子門徒實同斯囏晨埽虛房夕泣空山嗚呼法師何時復還風嘯竹柏雲靄巖峰川壑如泣山林改容自昔聞風志願歸依山川路邈心往形違始終銜恨宿緣輕微安養有寄閻浮無希嗚呼哀哉釋藏輕八廣弘明集二十三曇隆法師誄並序夫協理置論百家未見其是因心自了一己不患其躓而終莫相辨我若咸歎翻淪得拔竟知於誰冀行跡立則善惡靡徵欲聲名傳則薰蕕同歇然意非身之所挫期出命之所限者目所親覿見之若人矣慧心朗識發於髫辮生自豪華家贏金帛加以巧乘騎解絲竹沫絕景於康衢弄絃管於華肆者非徒經旬涉朔彌歷年稔而已諒趙李之咸陽程鄭之臨邛矣既而永夜獨悟中飲興歎曰悲夫欣厭迭來終歸憂苦不杜其根於何超絕且三界迴沈諸天倏瞬況齊景牛山趙武企陰催促節物逼迫霜露推此願言伊何能久慨然有擯落榮華兼濟物我之志母氏矜其心姊弟申其操遂相許諾出家求道一身既然闔門離世妻子長絕歡娛永謝豈唯向之靡樂判之盛年終古恩愛於今仳別矣旅舟南遡投景廬嶽一登石門香鑪峰六年不下嶺僧眾不堪其操法師不改其節援物之念不以幽居自抗同學嬰疾振錫萬里相救余時謝病東山承風遙羨豈望人期頗以山招法師至止鄙人榮役前詩敘粗已記之故不重煩及中間反山成說款盡遂獲接棟重崖俱浥迴澗茹芝朮而共餌披法言而同卷者再歷寒暑非直山陽靡喜慍之容令尹一進已之色實明悟幽微袪滌近滯蕩吝澡垢日忘其疾庶白首同居而乖離無象信順莫歸徵集何緣晚節罹舋遠見參尋至止阻闊音塵殆絕值暑遘疾未旬即化誠存亡命也此行頗實有由承凶感痛寔百常情紙墨幾時非以斯名蓋欽志節追感平生自不能默已故投懷援筆其辭曰仰尋形識俯探理類採聲知律拔茅觀彙物以靈異人以智貴即是神明觀鑒意謂爰初在稚慧心夙察吐噏芳華懷抱日月如彼蘭苑風過氣越如彼天倪雲被光發求名約身規操束己儻或遇世曾未近似生以意泰意管生理孰是歡慰程鄭趙李家畜金繒才練藝技驤首揮霍繁絃綺靡酒娛調促意妍服侈朝迫景曛夕忌星徙悠悠白日淒淒良夜年往歡流厭來情舍苦樂環迴終卒代謝棄而更適生速名借誰能易奪何術推移精粗渾淆善惡參差即心有限在理莫規試覈眾肆庶獲所窺道家躓近群流缺遠假名恆誰傍義豈反獨有兼忘因心則善傷物沈迷羨彼驅遣變服京師振錫廬頂長別榮冀永息幽嶺舍華襲素去繁就省人苦其難子取其靜昏之視明即愚成絕智之秉情對理斯涅吝既弗袪滯亦安拔子之矜之為爾苦節節苦在己利貞存彼以明闇逝以慈累徙欲以援物先宜濟此發軫情違終然理是梁鴻攜妻荷蓧見子雞黍接人行歌通己於世曰高於道殊鄙始見法師獨絕神理形壽易盡然諾難判乘心即化棄身靡歎懷道彌厲景命已晏矜物辭山終身旅館嗚呼哀哉魂氣隨之延陵已了鳶螻同施漆園所曉委骸空野豈異豈矯幸有遺餘聊給蟲鳥嗚呼哀哉緬念生平同幽共深相率經始偕是登臨開石通澗剔柯疏林遠眺重疊近矚嶇嶔事寡地閒尋微探賾何句不研奚疑弗析帙舒軸卷藏拔紙襞問來荅往俾日餘夕沮溺耦耕夷齊共薇跡同心歡事異意違承疾懷灼聞凶懣悲孰云不痛零淚沾衣嗚呼哀哉行久節移地邊氣改終秋中冬踰桂投海永念伊人思深情倍俯謝常人仰愧無待嗚呼哀哉竝廣弘明集二十三安成郡庭枇杷樹賦伊南國之嘉木偉邦庭而延樹稟金秋之清條抱東陽之和煦肈含葩於結霜成災果乎纖露高臨甍首傍拂階路蓺文類聚八十七臨終遺弟晦書吾得啟體幸全歸骨山足亦何所多恨弟思自勉厲為國為家宋書謝瞻傳又略見南史十九悲人道悲人道兮悲人道之實難哀人道之多險傷人道之寡安懿華宗之冠冑固清流而遠源樹文德於庭戶立操學於衡門應積善之餘祐當履福之所延何小子之兇放實招禍而作愆值革變之大運遭一顧於聖皇參謀猷於刱物贊帝制於宏綱出治戎於禁衛入關言於帷房分河山之珪組繼文武之龜章稟顧命於西殿受遺寄於御床伊懦劣其無節實懷此而不忘荷隆遇於先主欲報之於後王憂託付之無效懼愧言於存亡謂繼體其嗣業能增輝於前光居遏密之未幾越禮度而緬荒普天壤而殞氣必社稷之淪喪矧吾儕之體國實啟處而匪遑藉億兆之一志固昏極而明彰諒主尊而民晏信卜祥之無疆國既危而重構家已衰而載昌獲扶顛而休否冀世道之方康朝褎功以疏爵祗命服於西蕃奏簫管之嘈囋擁朱旄之赫烜臨八方以作鎮響文武之桓桓厲薄弱以為政實忘食於日旰豈申甫之敢慕庶惟宋之屏翰甫逾歷其三稔實周回其未再豈有慮於內缺四字其云裁痛夾輔之二宰竝加辟而靡貸哀弱息之從禍悲發中而心痗伊荊漢之良彥逮文武之子民見忠貞而弗亮覩理屈而莫申皆義概而同憤咸荷戈而競臻浮舳艫之奕奕陳車騎之轔轔觀人和與師整謂茲兵其誰陳庶亡魂之雪怨反涇渭於彝倫齊輕舟於江曲殄銳敵其皆湮勒陸徒於白水寇無反於隻輪氣有捷而益壯威既肅而彌振嗟時哉之不與迕風雨以踰旬我謀戰而不克彼繼奔其躡塵乏智勇之奇正忽孟明而是遵苟成敗其有數豈怨天而尤人恨矢石之未竭遂摧師而覆陳誠得喪之所遭固當之其無吝徒同懷之弱子橫遭罹之殃釁智未窮而事傾力未極而莫振誓同盡於鋒鏑我怯劣而愆信愍弟姪之何辜實吾咎之所嬰謂九夷其可處思致免以全生嗟性命之難遂乃窘紲於邊亭亦何忤於天地備艱危而是丁我聞之於昔誥功彌高而身蹙霍芒刺而幸免卒傾宗而滅族周嘆貴於獄吏終下蕃而靡鞠雖明德之大賢亦不免於殘戮懷今憚而忍人忘向惠而莫復續無賞而震主將何方以自牧非砏石之圜照熟違禍以取福著殷鑑於自古豈獨嘆於季叔能安親而揚名諒見稱於先哲保歸全而終孝傷在余而皆缺辱歷世之平素忽盛滿而傾滅惟蒸嘗與灑埽痛一朝而永絕問其誰而為之寔孤人之險戾辠有踰於丘山雖百死情寄俱憚耕兮從祿覩世道兮艱詖規志局兮功名每謂之兮為易今定諡兮闔棺慚明智兮昔議雖待盡兮為恥嗟厚兮靡寘長揖兮數子謝爾兮明智百齡兮浮促終焉兮斟克臥盡兮斧斤理命兮同得世安彼兮非此豈曉分兮辨惑御莊生之達言請承風以為則宋書謝晦傳掖庭有故不舉祭議遵依禮傳使有司行事於義為安宋書禮志四元嘉七年四月殿中曹郎領祠部謝元議詔可刑法議謂宜先治其本然後末可理本所以探士大夫於符而未所以檢小人邪可使受檢於小人邪士犯坐奴是士庶天隔則士無弘庶之由以不知而押之於伍則是受檢於小人也然則小人有罪士人無事僕隸何罪而令坐之若以實相交關貴其聞察則意有未因何者名實殊章公私異令奴不押符是無名也民乏貲財是私賤也以私賤無名之人豫公家有實之任公私混淆名實非允由此而言謂不宜坐還從其主於事為宜無奴之士不在此例若士人本檢小人則小人有過己應獲罪而其奴則義歸戮僕然則無奴之士未合宴安使之輸贖於事非謬二科所附惟制之本耳此自是辨章二本欲使各從其分至於求之管見宜附前科區別士庶於義為美盜制按左丞議士人既終不為兵革幸可同寬宥之惠不必依舊律於議咸允宋書王弘傳
