body:
  text: 劉緄祀孝武昭后二廟議尋晉元北面稱臣於愍帝烝嘗奉薦亦使有司行事且兄弟不相為後著於魯史以此而推孝武之室至尊無容親進觴爵拜伏其日親進章皇太后廟經昭皇太后室過前議既使有司行事謂不應進拜昭皇太后正號久定登列廟祀詳尋祝文宜稱皇帝諱案禮婦無見兄之典昭后位居傍尊致虔之儀理不容備孝武昭后二室牲薦宜闕宋書禮志四泰始二年六月太學博士劉緄議重奏江夏王女服禮記女子十五而笄鄭云年應許嫁者也其未許嫁者則二十而笄射慈云十九猶為殤禮官違越經典於禮無據博士太常以下結免贖論謐坐杖督五十奪勞百日南齊書江謐傳泰始四年江夏王義恭第十五女卒年十九未笄禮官議從成人服諸王服大功左丞孫敻重奏三公山下禊賦九醞白醝北堂書鈔一百四十八皇太子納徵議聘幣之典損益惟義歷代行事取制士婚若珪璋之用實均璧品采豹之彭義齊虎文熊羆表祥繁衍攸寄今儲后崇騁禮先訓遠皮玉之美宜盡輝備禮稱束帛儷皮則珪璋數合同璧熊羆文豹各應用二宋書禮志一明帝泰始五年十一月兼太常丞孫詵議又見通典五十八皇太子冕服議案周禮公自袞冕以下鄭注袞冕以至卿大夫之玄冕皆其朝騁天子之服也伏尋古之上公尚得服袞以朝皇太子以儲副之尊率土瞻仰愚謂宜式遵盛典服袞冕九旒以朝賀宋書禮志五泰始六年正月儀曹郎丘仲起議又見通典六十一重議郊祀改革之宜實如聖旨前虞愿議蓋是仰述而已未顯後例謹尋自初郊閒二載明堂閒一年第二郊與第三明堂還復同歲愿謂自始郊明堂以後宜各閒二年以斯相推長得異歲宋書禮志三泰始六年五月虞愿議曹郎王延秀重議祀明堂應告廟議案鄭玄云郊者祭天之名上帝者天之別名也神無二主故明堂異處以避后稷謹尋郊宗二祀既名殊實同至於應告不容有異宋書禮志三泰始七年十月祠部郎王延秀議與王僧虔書五常之始文武為先文則經緯天地武則撥亂定國僕一門雖謝文通乃忝武達群從姑叔三媾帝室祖兄二世糜軀奉國而致子姪餓死草壤去冬今春頻荷二敕既無中人屢見蹉奪經涉五朔踰歷四晦書牘十二接覲六七遂不荷潤反更曝鰓九流繩平自不宜獨苦一物蟬服龜腸為日已久飢虎能嚇人遽與肉餓麟不噬誰為落毛去冬乞豫章丞為馬超所爭今春蒙敕南昌縣為史偃所奪二子勳蔭人才有何見勝若以貧富相奪則分受不如身雖孤微百世國士姻媾位宦亦不後物尚書同堂姊為江夏王妃檀珪同堂姑為南譙王妃尚書婦是江夏王女檀珪祖姑嬪長沙景主尚書伯為江州檀珪祖亦為江州尚書從兄出身為後軍參軍檀珪父釋褐亦為中軍參軍僕於尚書人地本懸至於婚宦不至殊絕今通塞雖異猶忝氣類尚書何事乃爾見苦泰始之初八表同逆一門二世粉骨衛主殊勳異績已不能甄常階舊途復見侵抑南齊書王僧虔傳元徽中遷吏部尚書高平檀珪罷沅南令僧虔以為征北板行參軍訴僧虔求祿不得與僧虔書又與王僧虔書昔荀公達漢之功臣晉武帝方爵其玄孫夏侯惇魏氏勳佐金德初融亦始就甄顯方賞其孫封樹近族羊叔子以晉泰始中建策伐吳至咸寍末方知襃寵封其兄子卞望之以咸和初殞身國難至興寍末方崇禮秩官其子孫蜀郡主簿田混黃初未死故君之難咸康中方擢其子孫似不以世代遠而被棄年世疏而見遺檀珪百罹六極造化罕比五喪停露百口轉命存亡披迫本希小祿無意階榮自古以來有沐食侯近代有王官府佐非沐食之職參軍非王官之謂質非匏瓜實羞空懸殷何二生或是府主情味或是朝廷意旨豈與悠悠之人同口而語使僕就此職尚書能以郎見轉不若使日得五升祿則不恥執鞭南齊書王僧虔傳皇太妃為國親本親服議禮妾服君之庶子及女君之黨皆謂大夫士耳妾名雖總而班有貴賤三夫人九嬪位視公卿大夫猶有貴妾而況天子諸侯之妾為他妾之子無服既不服他妾之子豈容服君及女君餘親況皇太妃位亞尊極禮絕群后崇輝盛典有踰東儲尚不服朞太妃豈應有異若本親有慘舉哀之儀宜仰則太后宋書禮志二泰豫元年後廢帝即位崇所生陳貴妃為皇太妃有司奏皇太妃位亞尊極未詳國親舉哀格當一同皇太后為有降異又於本親朞以下當猶服與不兼太常丞司馬燮之議昭太后廟毀置議案君母之尊義發春秋庶幾饗薦無間周典七廟承統猶親盡則毀況伯之所生而無服代祭稽之前代未見其準宋書禮志四元徽二年十月壬寅有司奏昭太后廟毀置下禮官詳議太常丞韓賁議祠孝武及昭太后親執爵議晉景帝之於世祖肅祖之於孝武皆傍尊也親執觴杓今孝武皇帝於至尊親雖伯父功列祖宗奉祠之日謂宜親執案昭皇太后於主上親無名秩情則疏遠庶母在我猶子祭孫止況伯父之庶母愚謂昭后觴爵可付之有司宋書禮志四元徽二年十月丙寅有司奏至尊親祠太廟文皇帝太后之日孝武皇帝及昭皇太后雖親非正統而嘗經北面未詳應親執爵與否下禮官議兼太常丞韓賁議昭太后廟毀置議昭皇太后不係於祖宗進退宜毀議者云妾祔於妾祖姑祔既必告毀不容異應告章皇太后一室案記云妾祔於妾祖姑無妾祖姑則易牲而祔於女君可也始章太后於昭太后論昭穆而言則非妾祖姑又非女君於義不當伏尋昭太后名位允極昔初祔之始自上祔於趙后即安於西廟竝皆幣告諸室古者大事必告又云每事必告禮牲幣雜用檢魏晉以來互有不同元嘉十六年下禮官辨正太學博士殷靈祚議稱吉事用牲凶事用幣自茲而後吉凶為判已是一代之成典今事雖不全凶亦未近吉故宜依舊以幣徧告二廟又尋昭太后毀主無義陳列於太祖博士欲依虞主薶於廟兩階之閒案階閒本以薶告幣虞主之所昔虞喜云依五經典議以毀主祔於虞主薶於廟之北牆最為可據昭太后神主毀之薶之後上室不可不虛置太后便應上下升之既升之頃又應設脯醢以安神今禮官所議謬略未周遷毀事大請廣詳訪宋書禮志四元徽二年十月有司奏昭太后廟毀置都令史殷匪子議駁王儉公府長史朝服議制珪象德損替因時裁服象功施用隨代車旗變於商周冠佩革於秦漢豈必殊代襲容改尚沿物哉夫邊貂假幸侍之首賤幘登尊極之顏一適時用便隆後制況朱裳以朝緬傾百祀韋舄不加浩然惟舊服為定章事成永則其儉之所秉會非古訓青素相因代有損益何事棄盛宋之興法追往晉之頹典變改空煩謂不宜革宋書禮志五无徽四年儀曹郎中沈俁之議又議雲火從物沿損異議帝樂五殊王禮三變豈獨大宋造命必咸仍於晉舊哉夫宗社疑文庭廟闕典或上降制書下協朝議何乃鉉府佐屬裳黻稍改白虎之詔斷宣室之疇咨乎又許令史之從省咎達官之簡略律苟可遵固無辨於貴賤規若必等亦何關於權宜一用一舍彌增其滯且佐非章韋舄之職吏本朝服之官凡在班列罔不如一此蓋前令違而遂改今制允而長用也爵異服殊寍會矛盾之譬討論疑制焉取彊弱之辨府執既革之餘文臺據永行之成典良有期於無固非所望於行迷同上喪儀銘旌今之旒也天子丈二尺皆施跗樹於壙中遣車九乘謂結草為馬以泥為車疏布輤四面有障置壙四角以載遣奠牢肉斬取骨輕車各載一枚通典七十九案此條作崔元凱弔哭禮君自弔其臣主人出迎於外見君馬首不哭先入門右北面眾主人袒即位升自阼階西面主人前至中庭君哭主人哭拜稽顙成踊先出君去主人哭拜送於外門外明日主人縗絰拜謝於朝今代人君弔主人出迎見馬首拜君遣吏弔主人布席於喪庭孝子左貫首絰待於席南北面不哭也吏持版弔於席北面向孝子再拜訖伏吏跪讀版孝子再拜有弔賓主人迎即位中門外西面北上眾賓東面者北上門西北面者東上主人拜賓傍三拜眾賓不荅拜主人入即堂下朝夕哭位眾隨入如外位也知生者弔知死者傷主人哭弔者皆哭退出主人拜中門外如初弔辭至主人前曰聞君有某之喪如何不淑傷辭詣喪前曰子遭離之如何不淑此各主於其所知也若有知主又知死者傷而且弔也又曰同僚賓客相弔也因主人朝夕哭而往弔也又曰凡賓客來弔孝皆當位東階下西面不得廬中長吏自弔其人左貫首絰出迎還入門君至門謝孝還位乃從命還位若不謝遣者君向柩哭則孝當伏孝當後哭先止所以不使君甚哀也哭訖君遣還位乃從命還位則哭不得入廬也哭位在東階下辭去孝子哭也君先出孝後出於門外見馬而拜訖哭而還也若有命止令勿出亦便隨從命也羸可使人自扶若病不能者君至自杖而已通典八十三服節有不弔者三謂畏厭溺死也欲弔者不變服哭之也通典八十三懸重鑿木為重形如札有簨設於中庭近南以懸之上重高三尺差而上之天子當九尺矣鬲以葦席南向橫覆之辟屈兩端於南面以蔑之今喪家帳門其遺象也古者喪家無幕蓋是倚廬棟耳今人倚廬於喪側因是為帳焉案蔡謨說以二瓦器盛始死之祭繫於木裹以葦席置庭中近南名為重今之凶門是其遺像也禮既虞而作主未葬未有主故以重當之禮稱為主道此其義也通典八十四始死服變禮孝子始有親喪悲哀至甚充充如有窮未可以飾哭踊無數三日既殯瞿瞿如有求而不得賓客弔及祭事皆三踊君來弔則九踊躍皆有儐相詔導之者童子始有親喪去首飾服十五升白布深衣以至成服女子許嫁成人在室父卒為母始死去首飾而骨笄纚不徒跣不扱上衽不踊哭拊心無數總髽以麻母為長子繼母為長子妾為君之長子與在室女子子父卒為同母伯叔父母為女子子長中殤始死骨笄纚通典八十四遣奠朝於祖廟一宿明日載柩將至墓柩將還南向少牢之奠於車西名曰用薦遣奠尚饗大夫以上太牢其祝辭曰哀子某敢用絜牲剛鬣用薦此遣奠者也通典八十六虞祭子為父三月而葬將啟出棺皆絻散帶垂既啟袒哭踊無數日中虞絕無時之哭矣通典八十七祔祭祔祭於祖廟祭於祖父以合亡者祔祀之也以卒哭明日其辭曰哀子某敢用潔牲剛鬣普淖普薦醴酒用薦祔事適爾皇祖某甫以隮祔女子祔於祖姑此皆於今亡者為祖姑也今代皆無廟堂於客堂設其祖座東面令亡者在其北亦東面而共此饌也若祖父母生存無亡祔者當中一以上祔高祖父母姑也通典八十七為祖母持重服時人或有祖父亡而後己母亡孫奉養祖母祖母卒則為之齊縗三年者凱以為祖母三年自謂己父母早亡受重於祖故為祖斬縗三年祖母齊縗三年今己父後亡則受重於文不受重於祖孫雖奉祖母固自當如禮縗周耳通典八十九為父後為嫁母及繼母嫁服父卒繼母嫁從為之服報鄭玄曰嘗為母子貴終其恩也案王肅云若不隨則不服凱以為出妻之子為母及父卒繼母嫁從為之服報此皆為庶子耳為父後者皆不服也傳云與尊者為體不敢服其私此不獨為出母言為繼母發繼母嫁己隨則為之服服是私也為父後者亦不敢服也鄭玄云嘗為母子貴終其恩不別嫡庶王肅云隨嫁乃為之服此二議時人惑焉凱以為齊縗三年章繼母如母則當始終與母同不得隨嫁乃服不隨則不服如此者不成如母為父後者則不服庶子不服也通典九十四喪服駁代人或有出後大宗者還其祖父母周與女子出適不降其祖同義凱以為女子出適人有歸宗之義故上不降祖下不降昆弟之為父後者今出後大宗大宗尊之統收族者也故族人尊之百代不遷其父母報之周所謂尊祖故敬宗也又曰持重於大宗降其小宗還當為其祖父母大功耳又云代人有出為大宗後還為其父母周其子從服大功者凱以經文為人後者為其父母周為其兄弟降一等此指為後者身也不及其子則當以其父所後之家還計其親疏為服紀耳案晉劉智釋疑或問禮為人後者為當唯出子一身還本親也魯國孔正陽等議以為人後者服所後之親若子為其本親降一等不言代降一等者以其至其子以義斷不復還本親故也禮云若子者則於本父母不若子矣劉智又案禮為人後者於兄弟降一等比出子及其子孫皆為人後者也甲無後故乙為之後乙之子孫皆去其親往為甲後皆當稱為人後服本親不傷於後者若子則其親亦然矣本親有自然之恩降一等足以明所後者為重無緣得絕之矣儒林掾謝襲稱學士張擔之從祖母丁喪本是親祖母亡父出後求詳禮典輒敕助教陳福議當諸出為人後者還服本親皆降一等自為後者之身及為後者之子追服大功如福議則擔之不應廢業王彪之荅如所云族人後大宗者出後者子於本祖無服孫不服祖於情不安是以諸儒之說義旨總謂為人後者雖在五服之外皆降本親一等無孫不服本祖之條案記云夫為人後其妻為舅姑大功鄭玄云不二降也其妻於舅姑義服不二降況其子孫骨肉至親便當無服乎禮義則重義例亦明如禮之例諸出後者及子孫還服本親於所後者有服與無服皆同降一等謂擔之當服大功通典九十六居重喪遭輕易服斬縗既練而遭大功之喪則著大功之冠及麻麻謂男子首絰婦人腰絰也又易其故既練之葛以麻謂男子腰婦人首也大功之喪既葬卒哭男子復其練冠帶周之葛帶男子首絰婦人腰絰皆言周者斬縗練男子除首婦人除腰今大功之喪既葬首腰皆當有絰大功既葬之葛絰則小功之絰也大四寸六分小不可以居三年之喪故皆絰周絰也通典九十七與顧歡書折夷夏論謝鎮之白敬覽夷夏之論辯搉一源詳據二典清辭斐暐宮商有體玄致亹亹其可味乎吾不涯管昧竭闚幽宗若不思探賾無階豪𥢶但鏡復逾三未消鄙惑聊述所疑庶聞後釋論始云佛是老子老子是佛又似仙化比泥洹長生等無死爰引世訓以符玄教篡其辭例蓋似均也未譏翦華廢祀亦猶蟲諠鳥聒非所宜效請試論之案周孔以儒墨為典老莊以棄教明筌此皆開漸遊方未猶洪祐也且蟲鳥殊類化道本隔夫欲言之宜先究其由故人參二儀是謂三才三才所統豈分夷夏則知人必人類獸必獸群近而徵之七珍人之所愛故華夷同貴恭敬人之所厚故九服攸敦是以關睢之風行乎四國況大化所陶而不洽三千哉若經據而言蓋閒佛之興世也古昔一法萬界同軌釋迦文初修菩薩時廣化群生於成佛而有其土預霑慈澤皆來生我國我閻浮提也但久迷生死隨染俗流蹔失正路未悟前覺耳以聖人俯三達之智各觀其根知區品不同故說三乘而接之原夫真道唯一法亦不二今權說有三殊引而同歸故遊會說法悟者如沙塵拯沈濟惑無出此法是以當來過去無邊世界共斯一揆則知九十有五非其流也明矣彼乃始言其同而末言其異故知始之所同者非同末之所異者非異將非謬擊瓦釜濫諧黃鍾邪豈不誣哉至如全形守祀戴冕垂紳披氈繞貝埋塵焚火正始之音婁羅之韻此俗禮之小異耳今見在鳥鳴在獸而獸呴允執萬之一音感異類而殊應便使夷夏隔化一何混哉舟枯車溺可以譬彼夫俗禮者出乎忠信之薄非道之淳修淳道者務在反俗俗既可反道則可淳反俗之難故宜袪其甚泰袪其甚泰必先墮冠削髮方衣去食墮冠無世飾之費削髮則無笄擳之煩方衣則不假工於裁製去食則絕情想於耆味此則為道者日損豈夷俗之所制及其敷文奧籍三藏四舍此則為學者日益豈華風之能造又云佛經繁顯道經簡幽推此而言是則幽者鑽仰難希顯則涉求易望簡必不足以示理繁則趣會而多津佛法以有形為空幻故忘身以濟眾道法以吾我為真實故服食以養生且生而可養則及日可與千松比霜朝菌可與萬椿齊雪邪必不可也若深體三界為長夜之宅有生為大夢之主則思覺悟之道何貴於形骸假使形之可練生而不死此則老宗本異非佛理所同何以言之夫神之寓形猶於逆旅苟趣舍有宜何戀戀於檐宇哉夫有知之知可形之形非聖之體雖復堯孔之生壽不盈百大聖泥洹同於知命是以永劫以來澄練神明神明既澄照絕有無名趣四句此則正真終始不易之道也又刻船者祈心於金質守株者期情於羽化故封有而行六度凝滯而茹靈芝有封乖六度之體為之或能濟物凝滯必不羽化即事何足兼人尋二源稍迹曠局異懷居然優劣如斯之流非可具詰彼皆自我之近情非通方之宏識則知殊俗可以道甄哀哉玄聖既邈斐然競興可謂指蟲迹為蒼文餌螫乳為醍醐良可哀也佛道汪洋智量不可以言窮應迹難以形測其辯有也則萬相森陳若千峙竝立其析無也則泰山空盡與秋毫俱散運十力以摧魔弘四等以濟俗抗般若之法炬何幽而不燭潛三昧之法威何遠而不伏寍疑夷夏不效哉弘明集六重與顧歡書謝鎮之白猥辱反釋究詳淵況既和光道佛而涇渭釋李觸類長之爰至某奕敷佛彌過精旨踰昧夫飾櫃貿珍曜夜不售所謂馳走滅跡跳動息影焉可免乎循雅論所據正以蟲鳥異類夷夏舛俗余以三才均統人理是一俗訓小殊法教大同足下荅云存乎周易非胡書所擬便謂素旗已舉不復伸檢玄旌為素麾異乎曹子之觀旗輒復略諸近要以標大歸然髻珠雖隱暮四易顯聊以寄謔儻不貽忤夫太極剖判兩儀妄搆五陰合興形識謬彰識以流染因結形以愛滯緣生羲皇之前民多專愚專愚則巢居穴處飲血如毛君臣父子自相視胡越猶若禽獸又比蒙童道教所不入仁義所未侈及其妉慾淪波觸崖思濟思濟則祈善祈善則聖應夫聖者何邪感物而道通者也夫通不自通感不自感感恆在此通每自彼自彼而言懸鏡高堂自此而言萬象斯歸故知天竺者居娑婆之正域處淳善之嘉會故能感通於至聖土中於三千聖應既彼聲被則此覩日月之明何假離朱之察聞雷霆之音奚事子野之聽故卑高殊物不嫌同道左右兩儀無害天均無害天均則雲行法教不嫌同道則兩施夷夏夫道者一也形者二也道者真也形者俗也真既猶一俗亦猶二盡二得一宜一其法滅俗歸真必反其俗是以如來制軌玄劫同風假令孔老是佛則為韜光潛導匡救偏心立仁樹義將順近情是以全形守祀恩接六親攝生養性自我外物乃為盡美不為盡美蓋是有涯之制未鞭其後也何得擬道菩提比聖牟尼佛教敷明要而能博要而能博則精疏兩汲精疏兩汲則剛柔一致是以清津幽暢誠規易準夫以規為圓者易以手為圓者難將不捨其所難從其所易邪道家經籍簡陋多生穿鑿至如靈寶妙真採撮法華制用尤拙及如上清黃庭所尚服食咀石餐霞非徒法不可效道亦難同其中可長唯在五千之道全無為用全無為用未能遣有遣有為懷靈芝何養佛家三乘所引九流均接九流均接則動靜斯得禪通之理是三中之一耳非其極也禪經微妙境相精深以此締真尚不能至今云道在無為得一而已無為得一是則玄契千載玄契千載不俟高唱夫明宗引會導達風流者若當廢學精思不亦怠哉豈道教之筌邪敬尋所辨非徒止不解佛亦不解道也反亂一首聊酬啟齒頌曰運往兮韜明玄聖兮幽翳長夜兮悠悠眾星兮晢晢太暉灼兮昇曜列宿奄兮消蔽夫輪捔兮殊村歸敷繩兮一制苟專迷兮不悟增上驚遠逝卞和慟兮荊側豈偏尤兮楚厲良芻蔑兮般若焉相責兮智慧釋藏車六弘明集六
