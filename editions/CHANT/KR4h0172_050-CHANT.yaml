body:
  text: 孫康團扇銘有圓者扇誕此秀儀晞露濯色擬日定規朗姿玉暢惠氣蘭披北堂書鈔一百三十四報庾業劉延熙書前驅之人忽獲來翰披尋狂惑良深悵駭聖主以神武撥亂德盛勳高群逆交煽滅在晷刻君等勳義之烈世荷國恩事愧鳴鴞不懷食糝今練勒所部星言進邁相見在近不復多陳宋書吳喜傳奉啟書歸款臣庸隸荒萌偷生上國過蒙世祖孝武皇帝過常之恩犬馬有心實感恩遇是以晉安始唱投誠孤住不期生榮實存死報今天命大歸群迷改屬輒率領所部束骸待誅違拒之罪伏聽湯鑊宋書辥安都傳詣縣陳辭今年亢旱禾稼不登氓黎饑餒採掇存命聖上哀矜已垂存拯但饉罄來久困殆者眾米穀轉貴糴索無所方涉春夏日月悠長不有微救永無濟理不惟凡璅敢憂身外鹿鳴之求思同野草氣類之感能不傷心民糴得少米資供朝夕志欲自竭義存分餐今以千斛助官賑貸此境連年不熟今歲尤甚晉陵境特為偏祐此郡雖獘猶有富室承陂之家處處而是竝皆保熟所失蓋微陳積之穀皆有巨萬旱之所獘實鍾貧民溫富之家各有財寶謂此等竝宜助官得過儉月所損至輕所濟甚重今敢自勵為勸造之端實願掘水揚塵崇益山海宋書孝義徐耕傳元嘉二十一年大旱民飢耕詣縣辭縣為言上當時議者以耕比漢卜式詔書褎美酬以縣令上書歸順自靈祚南遷禍纏神土二京失統豹狼縱毒蒼天蹈犬噬之悲舊都哀荼蓼之痛臣以庸鄙仗義因機乘寇虜天亡之期藉二州思奮之憤故創迹天台爰暨咸雍義風一鼓率土響同威聲既張士卒效勇師不禁朝群狡震裂殄逆鱗於圅關掃凶迹於秦土非仰協宋靈俯允群願焉能若斯者哉今平城遺虐連兵大壇東西狼顧威形莫接長安孤危河洛不戍平陽二孼世連土字宇擁率部落控弦五萬東屯潼塞任質軍門私署安西將軍常山白廣平練甲高平進師汧隴北漠護軍結駟連騎提戈載驅胡蘭落生等部曲數千擬擊偽鎮闔境顒顒仰望皇澤伏願陛下給一旅之眾北陵河陝賜臣威儀兼給戎械進可以厭捍凶寇覆其巢窟退可以宣國威武鎮御舊京使中都有鳴鑾之響荒餘懷來蘇之德謹遣使人趙綰馳表丹誠宋書索虜傳元嘉二十三年蓋吳年二十九於杏城天台舉兵反虜諸戎夷竝響應有眾十餘萬燾聞吳反惡其名累遣軍擊之輒敗吳上表歸順又上表臣聞天無貳日地無貳主昔中都失統九域分崩群凶丘列於天邑飛鴞鴟目於四海先皇慈懷內發愍及戎荒翦偽羌於長安雪黎民之荼炭政教既被民始寍蘇天未亡難禍亂仍起獫狁侏張侵暴中國使長安為豺狼之墟鄴洛為蜂蛇之藪縱毒生民虐流兆庶士女能言莫不嘆憤傾首東望仰希拯接咸同旱苗之待天澤赤子之望慈親臣仰恩天時以義伐暴輒東西結連南北樹黨五州同盟迭相要契仰馮威靈千里雲集冀廓除榛莽以王師義夫始臻莫不瓦解虜主二月四日領資倒庫與臣連營接刃交鋒無日不戰獲賊過半伏屍蔽野伏願特遣偏師賜垂拯接若天威既震足使姦虜潰亡遺民小大咸蒙生造宋書索虜傳燾遣軍屢敗乃自率大眾攻之吳又上表與弟秀南歸奉辭於南平王鑠爽秀得罪本朝負釁三世生長絕域遠身胡虜兄弟闔門淪點偽授殞命不可還國無因近係南雲傾屬東日蓋猶痿人思步肓者願明嵩霍咫尺江河匪遠夷庚雝塞隔同天地痛心疾首晝慨宵悲虜主猖狂豺豕其志虐徧華戎怨結幽顯自盱眙旋軍亡殪過半昏酣沈湎恣性肆身爽秀等因民之憤籍將旋之願齊契義奮梟馘醜徒馮恃皇威肅清逋穢牢洛諸城指期克定規以涓塵微雪夙負方當束骸北闕待戮司寇懦節未申伏心邊表明大王殿下以叡茂居藩文武兼姿遠邇欽傾承風聞德願垂援拯以慰虔望老弱百口先遣歸庇逼逼丹心仰希懷遠謹遣同義潁川聶元初奉詞陳聞宋書魯爽傳元嘉二十八年爽部曲千餘家奔汝南遣秀從許昌還壽陽奉辭於南平王鑠板義宣及臧質等文丞相劉今補天子名義宣車騎臧今補丞相名質平西朱今補車騎名脩之皆板到奉行宋書魯爽傳南史四十令軍中顧望者斬首轉步者斬足御覽三百十二引裴子野宋略左將軍劉康祖聞虜寇壽陽自虎牢率七千人來赴虜至者八萬騎康祖令軍中建議伐河北河南阻飢野無所掠脫意外固守非旬月可拔稽留大眾轉輸方勞伐罪弔民事存急速今偽帥始死兼逼暑時國內猜擾不暇遠赴關內之眾裁足自守愚謂宜長驅中山據其關要冀州已北民人尚豐兼麥已向熟資因為易向義之徒必應響赴若中州震動黃河以南自當消潰臣城守之外可有二千人今更發三千兵假別駕進勳之振威將軍領所發隊并二州望族從蓋柳津直衝中山申坦率歷城之眾可有二千駱驛俱進較略二軍可七千許人既入其心腹調租發車以充軍用若前驅乘勝張永及河南眾軍便宜一時濟河使聲實兼舉愚計謬允宜竝建司牧撫柔初附定州刺史取大嶺冀州刺史向井陘并州刺史屯雁門幽州刺史塞軍都湘州刺史備大行因事指麾隨宜加授畏威欣寵人百其懷濟河之日請大通版假常忿將率憚於深遠勳之等慷慨之誠誓必死效若能成功清一可若不克捷不為大傷竝催促裝束伏聽敕旨宋書索虜傳元嘉二十九年太祖更遣張永王玄謨及魯爽等北伐青州刺史劉興祖建議伐河北上意止存河南不納祀孝武昭后二廟議夫烝嘗之禮事存繼嗣故傍尊雖近弟姪弗祀君道雖高臣無祭典案晉景帝之於武帝屬居伯父武帝至祭之日猶進觴爵今上既纂祠文皇於孝武室謂宜進拜而已觴爵使有司行事案禮過墓則軾過祀則下凡在神祇尚或致恭況昭太后母臨四海至尊親曾北面呪母有敬謂宜進拜祝文宜稱皇帝諱尋皇后廟見之禮本脩虔為義今於孝武論其嫂叔則無通問之典語其尊卑亦無相見之義又皇后登御之初昭后猶正位在宮敬謁之道久已前備愚謂孝武昭太后二室並不復薦告宋書禮志四泰始二年六月大常丞虞愿議郊祀議郊祭宗祀俱主天神而同日殷薦於義為黷明詔使圓丘報功三載一享明堂配帝閒歲昭薦詳辰酌衷實允懋典宋書禮志三泰始六年五月前兼曹朗虞愿議與王僧達書聞褚先生出居貴館此子滅景雲棲不事王侯抗高木食有年載矣自非折節好賢何以致之昔文舉棲冶城安道入昌門於茲而三焉夫卻粒之士餐霞之人乃可蹔致不宜久羈君當思遂其高步成其羽化望其還策之日蹔紆清塵亦願助譬說齊書褚伯王傳南史褚伯王傳祭霍山議脩祀川嶽道光列代差秩珪璋義昭聯冊但業曠中葉儀漏典文尋姬典事繼宗伯漢載持節侍祠血祭霾沈經垂明範酒脯牢具悉有詳例又名山著珪幣之異大冢有嘗禾之嘉山海祠霍山以太牢告玉此準配記傳其可言者也今皇風緬暢輝祀通嶽愚謂宜使以太常持節牲以太牢之具羞用酒脯時穀禮以赤璋纁幣又鬯人之職凡山川四方用脤則盛酒當以蠡桮其餘器用無所取說案郊望山瀆以質表誠器尚陶匏籍以茅席近可依準山川以兆宜為壇域宋書禮志四大明七年有司奏詔奠祭霍山末審應奉使何官用何牲饌進奠之日又用何器殿中郎丘景先議閏月周忌議案吳商議閏月亡者應以本正之月為忌謂正閏論雖各有所執商議為允宜以今六月為忌宋書禮志二孝建元年六月湘東國刺稱國太妃以去三十年閏六月二十八日薨未詳周忌當在六月為取七月勒禮官議正博士丘邁之議又見通典一百殄寇告二郊議禮無不報始既遍告今賊已禽不應不同宋書禮志三孝建元年太學博士徐宏陸澄孫勃議東平沖王祔主議王既無後追贈無臣殤服既竟靈便合毀記曰殤與無後者從祖祔食又曰士大夫不得祔於諸侯祔於祖之為士大夫者案諸侯不得祔於天子沖王則宜祔諸祖之廟為王者應祔長沙景王廟宋書禮志四孝建元年七月太學博士徐宏議又見通典五十二殷祭議三年之喪雖從權制再周祥變猶服縞素未為純吉無容以祭謂來年四月未宜便殷十月則允宋書禮志三孝建元年十二月太學博士徐宏議又見通典五十平賊告二郊議案王制天子巡狩歸假於祖禰又曾子問諸侯適天子告於祖奠於禰命祝史告於社稷宗廟山川告用牲幣反亦如之諸侯相見必告於祖禰乃命祝史告至於前所告者又云天子諸侯將出必以幣帛皮圭告於祖禰反必告至天子諸侯雖事有小大其禮略鈞告出告至理不得殊鄭云出入禮同其義甚明天子出征類于上帝推前所告者歸必告至則宜告郊不復容疑元嘉三年唯告廟社未詳其義或當以禮記唯云歸假祖禰而無告郊之辭果立此義彌所未達夫禮記殘缺之書本無備體折簡敗字多所闕略正應推例求意不可動必徵文天子反行告社亦無成記何故告郊獨當致嫌但出入必告蓋孝敬之心既以告歸為義本非獻捷之禮今輿駕竟未出宮無容有告至之文若陳告不行之禮則為未有前準愚謂祝史致辭以昭誠信苟其義舛於禮自可從實而闕臣等參議以應告為允宜竝用牲告南北二郊太廟太社依舊公卿行事宋書禮志三孝建元年六月八座奏云云國子助教蘇瑋生議詔可殷祭議案禮三年喪畢然後祫於太祖又云三年不祭唯天地社稷越紼行事且不禫即祭見譏春秋求之古禮喪服未終固無祼享之義自漢文以來一從權制宗廟朝聘莫不皆吉雖祥禫空存無綅縞之變烝嘗薦祀不異平日殷祲禮既弗殊豈獨以心憂為礙宋書禮志三孝建元年十二月國子助教蘇瑋生議又見通典五十為皇后父服議案三日成服即除及皇后行喪三十日禮無其文若竝謂之公除則可粗相依準凡諸公除之設蓋以王制奪禮葬及祥除皆宜反服未有服之於前不除於後雖有齊斬重制猶為功緦麻除喪夫公除蹔奪豈可遂以即吉邪愚謂至尊三月服竟故應依禮除釋皇后臨祖及一周祥除竝宜反服齊衰宋書禮志二通典八十
