body:
  text: 釋僧弼與沙門寶林書稱佛馱跋陀羅道場禪師甚有天心便是天竺王何風流人也高僧傳二檄太山文沙門竺道爽敢告太山東嶽神府及都錄使者蓋元玄創判二儀始分上置璇璣則助之以三光下設后土則鎮之以五嶽陰陽布化於八方萬物誕生於其中是以太山據青龍之域衡霍處諸陽之儀華陽顯零班之境恆岱𠛱幽武之賓嵩峙皇州之中鎮四瀆之所墳此皆稟氣運實無邪之穢神道自然崇正不偽因天之覆順地之載敦朴方直澹然玄靜進道四運之端退履五教之精內韜通微之資外朗道德之明上達虛無下育蒼生含德潛通無遐不徹遊步九崖翱翔玄闕故能形無正始呼吸陰陽握攬乾坤推步八荒夫東嶽者龍春之初清陽之氣育動萌芽王父之位南箕北斗中皇九天東王西母無極先君乘氣鳳翔去此幽玄澄於太素不在人閒蕩消眾穢其道自然而何妖祥之鬼魍魎之精假東嶽之道託山居之靈因游魂之狂詐惑俗人之愚情雕匠神典偽立神形元無所記末無所經外有害生之毒氣內則百鬼之流行晝則穀飯成其勢夜則眾邪處其庭此皆狼蛇之群鬼梟蟒之虛聲自三皇創基傳載於今歷代所崇未覩斯響也故零征記曰夫神正者則潛曜幽昧上騰高象下戲玄闕逍遙雲影龍翔八極風興雨施化若雷電行廚不設百味自然含慈秉素澤潤蒼生恩過二養位若朝陽應天而食不害眾命此乃靈翔之妙節清虛之神道若神不正者則干於萬物因時託響傳惑於俗沮成散朴激動人心傾財極殺斷截眾命枉害中年殂其骨肉精神離迸痛傷元氣東嶽之神豈此之謂也故枕中戒曰含氣蠢蠕百蟲勿癭無食鳥卵中有神靈天無受命地庭有形麤稟二儀焉可害生此皆逆理違道本經群民含慈順天不殺況害豬羊而飲其血以此推之非其神也又五嶽真神則精之候上法璇璣下承乾坤稟道清虛無音無響敬之不以歡慢之不以慼千譽萬毀神無增損而汝矯稱假託生人因虛動氣殺害在記順之則賜恩違之則有禍咎進退諂偽永無賢軌毀辱真神非其道也故黃羅子經玄中記曰夫自稱山嶽神者必是蟒虵自稱江海神者必是黿鼉魚鱉自稱天地父母神者必是貓貍野獸自稱將軍神者必是熊羆虎豹自稱仕人神者必是猿猴㹢玃自稱宅舍神者必是犬羊豬犢門戶井竈破器之屬鬼魅假形皆稱為神驚恐萬姓淫鬼之氣此皆經之所載傳之明驗也自汝妖祥漸踰六載招來四遠靡不響應送疾而往者如小水歸海獲死而還者哀呼盈路重者先亡便云算盡輕者易降自稱其福若使重患難濟則汝無恩中容之疾非汝所殺三者無效焉可奉事乃令群民投身歸命既無良醫善藥非散髮之能降經旬歷月曾無影報以此推之有何證驗又國太元桓王及封陽六國之懿節三台之輔光贊皇家黎元慈悅天福謬加體嬰微疾謂汝之祗能感靈德故宣德信命詣汝神殿獻薦三牲加贈珍異若汝聖道通乾坤致妙者何不上啟九皇下諮后土參集百靈顯彰妙術使國良輔消疾獲安既無響應乃奄薨遐驗此虛妄焉足奉哉又昔太山石立社移神靈降象遐聲萬代此則乾坤之所感顯為時瑞汝託稱其聖既不能興雲致雨以表神德圖妖邪以損真道正使汝能因槃動箸舉杯盡酒猶為鬼幻非為真正況無其徵有何神也又太山者則閻羅王之統其土幽昧與世異靈都錄使者降同神行定本命於皇記察都籍於天曹群惡無細不拾纖善小而無遺總集魂靈非生人應府矣而何獘鬼詐稱斯旨橫恣人閒欺紿萬端蓬林之樹烏鵲之野翕動遠近𠛱於祠典聚會男女樹俗之心穢氣外舋梟聲遠布毒鍾王境為害滋甚夫雲霧蔽天群邪翳正自汝妖異多所傷害吾雖末流備階三服每覽經傳而覩斯孽推古驗今邪不處正吾將蕩穢光揚聖道告到嚴鉤魅黨還游冡墓餐果飲泉足生之路既令群民無傾財之困鳥獸無羅網之卒若復顧戀望餐不去者吾將宣集毗沙神王和羅子等授以金剛屯真師勇武秋霜陵動三千威猛難當曜戈明劍擬則推山降龍伏魔靡不稽顙汝是小鬼敢觸三光鶴毛入炭魚行鑊湯傾江滅火朝露見陽吾念仁慈愍汝所行占此危殆慮即傷心速在吾前復汝本形長歸萬里滄浪海邊勿復稽留明順奉行弘明集十四檄魔文釋智靜釋智靜頓首頓首明將軍輪下相與玄塗殊津人天一統宗師雖異三界大同每規良會申展曩積而標榜未冥所以致隔今法王御世十方思順靈網方申紘綱彌絙大通有期高會在近不任翹想竝書喻意耳夫時塞有通否終則泰千聖相尋群師迭襲昔我皇祖本原天王體化應符龍飛初域節權形以附萬邦奮慧柯以覆六合威蕩四邪掃清三六方當抗橫縱於八區絙紘綱於宇宙夷靜七荒寍一九土而冥宗不弔真容擬位重明寢暉靈舟覆浪故令蟻聚邪番興茲鳧見暴起曀染真塗塵惑清眾虐鍾蒼生毒流萬劫懷道有情異心同忿我法王承運應期理亂上承高冑千託群心秉天期以籠三千握聖圖以隆大業雲起四宮鸞翔天竺降神迦維為時城壍綏撫黎元善安卿士獎導群情慰喻有疾嚴慧柯於胸中被神甲於身外愍十八之無辜哀三空之路絕志匡大荒靖安平難百域千邦高伏風化承君不忌重迷自覆深攝愚懷故守偽見狼據欲天鴟鳴神闕畔渙疆場抗距靈節謂大位可登弘規可改覽茲二三遠為歎息昔大通統世群方影附有偽癡天魔不遵改節干迕聖聽陳擾神慮領卒歸區權形萬變精甲照曦霜戈拂域靈鼓競興響衝方外矯步陸梁自謂強盛王師一奮群邪殄喪眾迷革心望風影伏況君單將驍然一介士無方尋眾不成旅而欲違背陵虐華邑篡奪靈權騰邈最勝以為氣真可不謬乎今釋迦統世道隆先劫妙化蕩蕩神羅遠御智士雍雍雲算蓋世武夫龍跳控弦萬隊協略應真奇謀起拔故命使持節前鋒大將軍鑒閻浮都督歸義侯薩陀波崙獨稟天奇蒙塵玄鏡神高須彌猛氣籠世善武經文忠著皇闕領眾十萬億揚鑣首路使持節威遠大將軍四天都督忉利公導師武勝標群文超宏謀妙思絕塵心栖夢表憂時忘身志必匡世領眾百萬億鸞飛天衢使持節征魔大將軍六天都督兜率王解脫月妙思虛玄高步塵表略竝童真功侔九地悼愍三塗忿若縱害校卻慷慨龍迴思奮領眾四百萬億雲迴天門使持節征魔大將軍七天都督四禪王金剛藏朗質映暉金顏遐燭恩過九陽力傾山海右眄則濛氾飛波左顧則扶桑落曜德無不照威無不伏領眾七百萬億虎眄須彌使持節鎮域大將軍九天都督八住王士大維摩詰奇算不思法柯遠震體合神姿權踰萬變呼吸則九服雲從叱咤則十方風靡哀彼下民無辜三楚領眾九百萬億飲馬虛津使持節鑒後大將軍十三天都督小千諸軍事九住王士大文殊承冑遐元形暉三曜胤自紫宮神高體大應適千塗玄算萬計群動感於一身眾慮靜於一念深抱慈悲情兼四攝領眾若塵翱翔斯在使持節匡教大將軍錄魔諸軍事群邪校尉中千王觀世音智略淵深慧柯遠振明達四通朗鑒三固或託迹群邪曜奇鋒起或權形二九息彼塗炭揮手則鐵圍摧巖噓氣則浮雲頹崿能為萬方不請之友領眾不思杖戈虎嘯使持節布化大將軍三界都督補處王大慈氏妙質縱網天姿標桀體喻金剛心籠塵表猛氣衝雲慧柯遠奮無生轉於胸中權智應於事外志有所規無往不就威恩雙行真俗竝設領眾八萬四千嚴警待命勇出之徒充溢大千金剛之士彌塞八極咸思助征席卷六合乘諸度之寶軒守八正之脩路跨六通之靈馬控虛中之神轡彎四禪之勁弓放權見之利箭鳴冀桓桓輕步矯矯奉命聖庭曾無有闕貴邦導師勝子五百幽鑒天命來投王化聖上開襟感氣歸順皆受名爵封賞𠛱上功侔舊臣聲蓋萬域而君何心橫生異計偃蹇邊荒規固常位毒害勃於蒼生天禍流於永劫可不哀哉可不謬哉君昔因時為物所惑狂迷君心投危外竄百行一愆賢達常失久謂君覺智返愚歸罪象季來身抽簪同遊群儁以道自權榮名終始如何攝愚守謬偷安邪位託癡山以自高恃見林以遊息耽六欲之穢塵翫邪迷以怡性建憍慢之高幢引無明之匈陣闊步荒塗輕弄神器塗篡天宮抗衡日月恐不果哉舉手而映三光把土以填巨海雖擬心虛標事之難就將軍殖福玄津原承彌遠華貌暐然群情屬目望冑之基易登由來之功可借君可改往修來翻然歸順謝過朱門以道齊好家國竝存君臣同顯身名獲安曉迷達觀眷屬晏然可不美哉今王師剋舉十萬翹轡手提法羅齊舞群聖道柯曜於前驅靈鼓震於後隊神鐘一扣十方傾覆海浪飛流陸原涌沸于斯之時須彌籠於一塵天地迴於一粟無動安於左衽妙樂曜於右手神力若斯豈可當也我法王體道仁慈不忍便襲權停諸軍暫壹靈轡臨路遣書庶迴迷駕君可蚤定良圖面縛歸闕委命皇庭逍遙玄境隆名內暉遊形外奇上方即任非君是誰夫慧當識機明貴免禍窮而知反君子所美斯乃轉禍之高秋取功之良節昔夏桀背主殷王致伐商紂首亂周武建師此即古今蓍龜將軍之明誡相與雖乖於當年風流同味人天崎嶇何足致隔想便懽然通書致命所以竊痛其辭委曲往反者不欲令蘭芳夏凋脩柯摧頹深維致言善自量笇無使君身傾匡三趣莫令六天鞠生稊稗造穎眄目助懷惕然臨路遣書諸情多憤言不藉意同上破魔露布文釋寶林賢劫大千微塵年五濁鼎沸朔現壽百齡日使持節都督恆沙世界諸軍事征魔大將軍淨州刺史十地王臣金剛藏使持節都督八萬波羅蜜諸軍事破結將軍領魔蠻校尉大司馬梵州刺史八地公解脫月等稽首和南上聖朝尚書謹案夫六合同曜靈之鑒群流歸百谷之王萬化均於空玄眾奇宗於一智斯蓋理有宗極之地統物無殊趣之會是以如來越重昏而孤興蔚勤功於曠劫曜三塗之高明拔洪癡於始造窮聖德之區奧究無生之虛致覽物化之樞機握宏德之紘紉至若英姿挺特神光赫奕雖復千暉竝照固已絕矣身殊萬狀而非眾體合至妙而不一應出五道而非生示入形亡而非滅希夷怳惚無名無像莫測其深靡知其廣應群感而不勞周萬動而常靜歷恆沙以倏忽撫八荒於俄頃兩儀頹陷而不夷力負潛移而不易吸大火而不燋懷洪流而不溺乾坤不足以語其德文玄不足以明其道巨包六合不可以稱其大妙入無閒不可以明其小爾乃亭毒蒼生化兼始母無欲無為而無不為翱翔於應變之塗逍遙於有無之表挺達群聖之端恬淡涅槃之域二乘韜思於重忘之致十住息慮於動靜之機梵王咨嗟以歸德帝釋伏膺而厭位其為聖也亦已極矣於是應定光之遐記驗大通之圖錄出五道而龍興超帝皇以命世道王三界德被十方畿甸恆沙都邑大千偃九定之閒室登七覺之雲觀濯八解之清池遊總持之廣苑爾乃戴慈悲之殿處空同之座袞龍眾好天冠頂相左輔彌勒之流右弼文殊之匹前歌大方之雅頌後舞四攝之鑾拂衛以八住體虛之士侍以四果卓落通仙三臺唯聖六府唯賢爾乃宣教姬孔宰守虞唐揚威湯武州牧三皇其為化也坦八正之平衢開三乘之通津𠛱無為之妙宅濟大苦於勞塵杜三惡之姦路啟懽樂於天人爵以果伯之位祿以甘露之餐功巨者賞以淨土之封勳小者指以化城之安此乃超百王之洪業太平之至治也五趣宦身之清朝四生土位之宗極而群迷愚嶮背真彌曠欣濡洙之近足忘江湖於遠全故魔王波旬植愚根於曠始積迷心於妄境汎三染之洪波入邪見之稠林至乃竊弄神器假偽冒真夸王天宮分𠛱嶽土制命六天縱肆偏威內以三公諸毒卿相九結外以軍將六師戎卒四岳內行跋扈不忌皇憲自火螢光爭暉天照故乃頃者抗行神威揚兵道樹震雷公霹靂之聲𠛱擔石吐火之眾又持世致惑於靜室波崙悲號於都肆斯皆癡狂縱虧於聖節作亂中夏為日久矣聖皇悼昏俗之聾瞽悲弱喪以增懷將總群邪以齊見會九流而同津於是命將大勢之徒簡卒金剛之類茹金嚼鐵之夫衝水蹈火之士勇卒塵沙驍雄億萬星流風發龍騰魔境置軍萬全之策逼寇必死之野而魔賊不祗敢執蠻荊之蠢爾抗宗繪之逋慠建麾於自憍之地結固於雲迷之嶮傍唐重複俠疊鱗次且其形勢則癡山嵯峨固其前愛水浩汗漲於後邪林蔚薈蒙其左癡㵎淵玄帶其右塵勞之卒豺視於交境六師之將虎步於長逵望若雲起蔽天霧塞六合其為盛也開闢罕有臣等於是承聖朝之遐威出超啚之奇略蓋以高算之籠彌以玄策之圍精騎千里步卒萬帀遊師翳野屯塞要害使前將軍檀那望慳麾以直進後軍毗耶蹴懈卒於其後禪那略遊騎於其左尸羅防密姦於其右外軍漚和浪騎隊於平原之上走逗兵於詰屈之下陳虎旅而高驤設危機於幽伏中軍般若握玄樞之妙鑒把戰勝之奇術控億兆之雄將擁塵沙之勁卒於是眾軍響應萬塗競進感動六合聲震天地雄夫奮威浪奔白刃之光奪於曦曜法鼓之音亂於雷震䩛馬䟃䟃以騰擲迅象飛控以馳驅禪弓煙舉而雲興慧箭雨灑以流虛鞭以假名之策蹴入無有之原研以師子之吼刺以苦空之音揮干將而亂斬動戈矛而競偃橫塵尸以被野流膋血於長川崩癡山之嵯峨竭愛水之洪流窮僭於諸見之窟挫高於七慢之巢於是魔賊進無抗鱗之用退無希脫之隱慮盡路窮迴遑靡據魔王面縛於魔庭群旅送命於軍門諸天電卷以歸化迷徒風馳於初暉皇威掃蕩其猶大陽之熯晨霜注洪流以滅爝火故使萬世之逋寇土崩於崇朝中華之昔難肅清於俄頃斯誠聖皇神會之奇功曠代著世之休烈雖昔殷湯建雲功於夏郊周武掃清氛於商野斯乃上古之雄奇豈以得齊於聖勳臣輒奉宣皇猷綏慰初附安以空同之宅充以八解之流防以戒善之禮習以六度之風耆年者悟其即真於新唱弱喪者始聞歸歟之音夫應天順罰春秋之道興功定亂先王所美元惡以賓祗從聖憲六合同明廓清宇內玄風遐扇率土懷慶朝有康哉之歌野有樂哉之詠功高道大非見所表聖慮幽深非言能宣麤條皇威奇算之方又𠛱眾軍龍驤之勢電驛星馳謹露布以聞臣等誠惶以下余以講習之暇聊復永日寓言假事庶明大道冀好迷之流不遠而復經云涅槃無生而無不生至智無照而無不照無生無照一切皆成成無成而無不成其唯如來乎戰勝不以干戈之功略地不以兵強天下皇王非處一之尊霸臣非桓文之貴丘姬之教於斯遠矣聃周之言似而非當故知宗極存乎俗見之表至尊王於真鑒之裏中人躊躇於有無之閒下愚驚笑於常迷之境庶令覽者捨河伯秋水之自多遠遊於海若之淵門不束情於近教而駭神於長廣之說也弘明集十四高僧傳勝鬘經序勝鬘經者蓋是方等之宗極者也所以存於千載功由人弘故得以元嘉十三年歲在乙亥有天竺沙門名功德賢業素敦尚貫綜大乘遠載梵本來遊上京庇迹祇洹招學讚訪才雖不精絕義粗輝揚遂播斯旨乃上簡帝王于時有優婆塞何上之尸丹楊尹為佛法檀越登集華輦敏德名望便於郡內請出此經既會賢本心又謹傳譯字句雖質而理妙淵博殆非常情所可厝慮時竺道生義學弟子竺道攸者少習玄宗偏蒙旨訓後侍從入廬山溫故傳覆可謂助鳳耀德者也法師至元嘉十一年於講坐之上遷神異世道攸慕深情慟有若天墜於是奉訣墳壟遂遁臨川三十許載經出之後披尋反覆既悟深旨仰而嘆曰先師昔義闇與經會但歲不待人經襲義後若明匠在世剖析幽賾者豈不使異經同文解無餘向者哉輒敢解釋兼翼宣遺訓故作注解凡有五卷時人以為文廣義隱所以省者息心玄門至大明四年孝武皇帝以其師習有承敕出為都邑法師慈因得諮覲粗問此經首尾又尋其注意竊謂義然今聊撮其要解撰為二卷庶使後賢共見其旨焉釋藏跡九大涅槃經記此大涅槃經初十卷有五品其梵本是東方道人智猛從天竺將來暫憩高昌有天竺沙門曇無讖廣學博見道俗兼綜遊方觀化先在燉煌河西王宿植洪業素心冥契契應王公躬統士眾西定燉煌會遇其人神解悟識請迎詣州安止內苑遣使高昌取此梵本命讖譯出此經初分唯有五品次六品已後其本在燉煌讖因出經下際知部黨不足訪募餘殘有梵道人應期送到此經梵本都二萬五千偈後來梵本想亦近具足但頃來國家殷猥未暇更譯遂少停滯諸可流布者經中大意宗塗悉舉無所少也今現已有十三品作四十卷為經文句執筆者一承經師口所譯不加華飾其經初後所演佛性廣略之閒耳無相違也每自惟省雖復西垂深幸此遇遇此大典開解常滯非言所盡以諸家譯經之致大不允其旨歸疑謬後生是故竊不自辭輒作徒勞之舉冀少有補益諮參經師采尋前後略舉初五品為私記餘致準之悉可領也釋藏跡八華嚴經記華嚴經梵本凡十萬偈黃道人支法領從于闐得此三萬六千偈以晉義熙十四年歲次鶉火三月十日於揚州司空謝石所立道場寺請天竺禪師佛度跋陀羅手執梵文譯梵為晉沙門釋法業親從筆受時吳郡內史孟顗右衛將軍褚叔度為檀越至元熙二年六月十日出訖凡再校梵本至大宋永初二年辛丑之歲十二月二十八日校畢釋藏跡九優婆塞戒經記太歲在丙寅夏四月二十三日河西王世子撫軍將軍錄尚書事大沮渠興國與諸優婆塞等五百餘人共於都城之內請天竺法師曇摩讖譯此在家菩薩戒至秋七月二十三都訖秦沙門道養筆受願此功德令國祚無窮將來之世值遇彌勒初聞悟解逮無生忍十方有識咸同斯誓釋藏跡九摩得勒伽記宋元嘉十二年歲在乙亥揚州聚落丹陽郡秣陵縣平樂寺三藏與弟子共出此律從正月起至九月二十三日草成二十五日寫畢白衣優婆塞張道孫敬信執寫釋藏百一八吉祥記八吉祥經宋元嘉二十九年太歲壬辰正月三日天竺國大乘比丘釋求那跋陀羅於荊州城內譯出此經至其月六日竟使持節侍中都督荊湘雍益梁寍南北秦八州諸軍事司空荊州刺史領南蠻校尉南譙王優婆塞劉義宣為檀越釋藏跡九禪要祕密治病經記河西王從弟優婆塞大沮渠安陽侯於于闐國衢摩帝大寺金剛阿練若住處從天竺比丘大乘沙門佛陀斯那其人天才特拔諸國中獨步口誦半億偈兼明禪法內外綜博無籍不練故世人咸曰人中師子沮渠親面稟受憶誦無滯以宋孝建二年九月八日於竹園精舍書出此經至其月二十五日訖尼慧濬為檀越釋藏善三又跡九雜阿毗曇心序如來泥洹數百年後有尊者法勝於佛所說經藏之中抄集事要為二百五十偈號阿毗曇心其後復有尊者達摩多羅覽其所製以為文體不足理有所遺乃更搜采眾經復為三百五十偈補其所闕號曰雜心新舊偈本凡有六百篇第之數則有十一品篇號仍舊為稱唯有擇品一品全異於先尊者多羅復即自廣引諸論敷演其義事無不列列無不辨微言玄旨於是昭著自茲之後道隆於世涉學之士莫不寶之以為美說於宋元嘉三年徐州刺史太原王仲德請外國沙門伊葉波羅於彭城出之擇品之半及論品一品有緣事起不得出竟至元嘉八年復有天竺法師名求那跋摩得斯陀含道善練茲經來遊揚都更從校定諮詳大義余不以闇短廁在二集之末輒記所聞以訓章句庶於覽者有過半之益耳釋藏跡十果實寺中碑銘宋元初元年天竺沙門僧律嘗行此處聞鐘磬聲天花滿山因建伽藍其後有梵僧求那跋摩來居此寺曰此山將來必逢菩薩聖主大宏寶塔遂同銘之續高僧傳僧朗傳引果實寺舊碑瑞像梵書此迦羅衛國育王第四女之所造也續高僧傳十二慧最石函銘宋元徽元年建塔續高僧傳僧朗傳果實寺置塔獲石圅銘與南陽劉廓書每思棊聚非意致闊方有來緣想能近領述異記道珍嘗為孱陵令廓為荊州參軍每與圍棊日夜相就局子略無停輟道珍以宋元徽三年六月二十六日亡至九月廓坐齋中忽見一人以書投廓云朱孱陵書廓開書看是道珍手跡既讀書失所在渚宮遺事作想能近顧
