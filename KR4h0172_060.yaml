body:
  text: 闕名奏上沈太后尊號昔豳都追遠正邑纏哀緬慕德義敬奉園陵先太妃德履端華徽景明峻風光宸掖訓流國幃鞠聖誕靈蚤捐鴻祚臣等遠模漢册近儀晉典謹上尊號為皇太后宋書文帝沈婕妤傳婕妤生明帝卒贈湘東國太妃明帝即位有司奏奏請崇憲太后別居外宮夫德敷於內典章必遠化覃於外徽號宜宣伏惟皇太后懿聖自天母儀允著義明八遠道變九圍聖明登御景胙攸改皇太后宜改前號別居外宮宋書文帝路淑媛傳明帝即位有司奏奏請議昭太后祔廟晉太元中始正太后尊號徐邈議廟制自是以來箸為通典今昭皇太后於至尊無親正特制義服祔廟之禮宜下禮官詳議宋書禮志四泰始二年正月孝武昭太后崩五月甲寅有司奏奏請議祭孝武昭后二廟禮來七月嘗祀二廟依舊車駕親奉孝武皇帝至尊親進觴爵及拜伏又昭皇太后室應拜及祝文稱皇帝諱又皇后今月二十五日虔見於禰拜孝武皇帝昭皇太后並無明文下禮官議正宋書禮志四泰始二年六月有司奏奏封張興世等寧朔將軍督預州之梁郡諸軍事豫州刺史領南梁郡太守竟陵張興世都統水軍屢戰剋捷仍進斷賊上流錢溪貴口苦戰平定凶逆今封南平郡作唐縣開國侯食邑一千戶寧朔將軍參司徒中直兵軍事廣平佼長生同統水軍屢戰及興世上據錢溪長生獨距賊衝要功次興世今封武陵郡遷陵縣開國侯食邑八百戶寧朔將軍試守西陽太守吳興全景文尚書比部郎吳縣孫超之假輔國將軍右衛將軍南彭城劉亮等三人並經晉陵苦戰景文超之仍又北討破釜水軍斷賊糧運及經葛冢石梁二處破賊亮南伐經大戰又最處險劇景文今封西陽郡孝寧縣超之封長沙郡羅縣亮封順陽縣並開國侯食邑各六百戶假輔國將軍驃騎司馬劉靈遺寧朔將軍右軍蔡那寧朔將軍屯騎校尉段佛榮等三人統治攻道並經苦戰靈遺今封新野郡新野縣那封始平郡平陽縣佛榮封湘東郡臨蒸縣並開國伯食邑各五百戶假輔國將軍左軍吳興沈懷明龍驤將軍積射將軍東平周盤龍司徒參軍南彭城李安民等三人懷明經晉陵破賊又水軍南伐統治攻道盤龍雖不統軍並經大戰先登陷陳安民又隨張興世遏斷錢溪別統軍貴口破賊今封懷明建安郡吳興縣盤龍封晉安郡晉安縣安民封建安郡邵武縣並開國子食邑各四百戶假輔國將軍遊擊將軍彭城杜幼文龍驤將軍羽林監太原王穆之龍驤將軍羽林監濟北頓生龍驤將軍羽林監沛郡周普孫員外散騎侍郎朱重恩等五人幼文經晉陵破賊在軍統攻道南伐濃湖普孫副沈攸之都統衆軍穆之生重恩並南伐有功今封幼文邵陵郡邵陽縣穆之封衡陽郡衡山縣生封始平郡武功縣普孫封順陽郡清水縣重恩封南海郡龍川縣並開國男食邑各三百戶宋書鄧琬傳泰始二年晉安王子勛即位於尋陽改元義嘉至是平定論功封賞有司奏奏劫竊依舊制自今凡劫竊執官仗拒戰邏司攻剽亭寺及傷害吏人并監司將吏自為劫皆不限人數悉依舊制斬刑若遇赦黥及兩頰劫字斷去兩腳筋徙付交梁寧州五人以下止相逼奪者亦依黥作劫字斷去兩腳筋徙付遠州若遇赦原斷徒猶黥面依舊補冶士家口應及坐悉依舊結謫泰始四年四月有司奏奏遷葬崇寧太后北疆未緝戎役是務禮之詳略各沿時宜臣等參議修寧陵玄宮補治毀壞權施油殿暫出梓宮事畢即窆於事為允宋書文帝路淑媛傳泰始四年有司奏奏請詳太子昏禮案晉江左以來太子昏納徵禮用玉一虎皮二未詳何所準況或者虎取其威猛有彬炳玉以象德而有潤栗圭璋既玉之美者豹皮義兼炳蔚熊羆亦昏禮吉徵以類取象亦宜並用未詳何以遺文晉氏江左禮物多闕後代因襲未遑研考今法章徽儀方將大備宜憲範經籍稽諸舊典今皇太子昏納徵禮合用圭璋豹皮熊羆皮與不下禮官詳依經記更正若應用者為各用一為應用兩宋書禮志一明帝泰始五年十一月有司奏又見通典五十八奏始安王休仁罪狀臣聞明罰無親情屈於司綱國典有經威申於義滅是以梁趙之誅跣出稱過來言之罰克入致動謹案劉休仁苞蓄禍迹事蔽於天明竄匿沈姦情宣於民聽自以屬居戚近早延恩睦異禮殊義望越常均往歲授鉞南討本非才命啓行濃湖特以親攝仰遵廟略俯藉衆效屬承泰運竊附成勳而亟叨天功多自臧伐既聖明御寓躬覽萬機百司有紀官方無越而休仁矜勳怙貴自謂應總朝權遂妄生疑難深自猜外故司空晉平刺王休祐少無令業長滋貪暴蒞任陝荊毒流西夏編戶嗟散列邑雕虛聖澤含弘未明王憲亟與休仁論其愆迹辭意既密不宜傳廣遂飾容旨反相勸激休祐以休仁位居朝右任遇優崇必能為己力援故深相黨結休祐於是輸金薦寶承顏接意造膝之間必論朝政遂無日不俱行無時不同宿聲酣聚集密語清間休仁含姦扇惑善於計數説休祐使外託專慎之法密行貪詐之心謂朝廷不覺人莫之悟休祐遂乃外積懼怨內協禍心既得贊激凶慝轉熾與休仁共為姦謀潛伺機隙圖造釁變規肆凶狡休仁致殞倉卒實維天誅而晉平國太妃妾邢不能追慚子惡上感曲恩更懷不逞巫蠱呪詛休仁因聖躬不和猥謀姦逆滅道反常莫斯為甚殛肆朝市庶申國刑而法網未知自引厥命天慈矜厚減法崇恩賜全二息及其爵封斯誠弘風曠德貫絶通古然非所以棄惡流釁懲懼亂臣者也臣等參議謂宜追降休仁為庶人絶其屬籍見息悉徙遠郡休祐愆謀始露亦宜裁黜徙削之科一同舊準收邢付獄依法窮治宋書始安王休仁傳泰始七年五月有司奏上有詔邢狂愚不足與計休仁降封聽子襲爵奏諒暗不親奉吉祭七月嘗祠至尊諒暗之內為親奉與不使下禮官通議伏尋三年之制自天子達漢文愍秦餘之斃於是制為權典魏晉以來卒哭而祔則就吉案禮記王制三年不祭唯祭天地社稷為越紼而行事鄭玄云唯不敢以卑廢尊也范宣難杜預段畼所以闕宗廟祭者皆人理所奉哀戚之情同於生者譙周祭志稱禮身有喪則不為吉祭緦麻之喪於祖考有服者則亦不祭為神不饗也尋宮中有故雖在無服亦廢祭三月有喪不祭如或非若三年之內必宜親奉者則應禘序昭穆而今必須免喪然後禘祫故知未祭之意當似可思起居注晉武有二喪兩期之中並不自祠亦近代前事也伏惟至尊孝越姬文情深明發公服雖釋純哀內纏推訪典例則未應親奉有司祗應祭不為曠仰思從敬竊謂為允臣等參議甚有明證宜如所上宋書禮志四泰豫元年七月有司奏詔可奏上陳太妃尊號臣聞河龍啓聖理浹民神郊電基皇慶爍天地故資敬之道粹古銘風沿貴之誼眇代凝則伏惟貴妃含和日晷表淑星樞徽音峻古柔光照世聲華帝掖軌秀天嬪景發皇明祚昌睿命而備物之章未換彝策遠酌前王允陟鴻典臣等參議謹上尊號曰皇太妃輿服一如晉孝武帝太后故事置家令一人改諸國太妃曰太妃宮曰弘化宋書明帝陳貴妃傳貴妃生廢帝廢帝踐阼有司奏蔣恭兄弟罪議禮讓者以義為先自厚者以利為上末世俗薄靡不自私伏膺聖教猶或不逮況在野夫未達誥訓而能互發天倫之憂甘受莫測之罪若斯情義實為殊特蔑爾恭協而能行之茲乃終古之所希盛世之嘉事二子乘舟無以過此豈宜總執憲文加以罪戮且晞張封筒遠行他界為劫造釁自外贓不還家所寓村伍容有不知不合加罪勒縣遣之還復民伍宋書蔣恭傳妻弟元嘉中晉陵蔣崇平為劫見禽云與恭妻弟吳晞張為侶晞張先行不在本村遇水妻息五口避水移寄恭家討録晞張不獲收恭及兄協付獄治罪恭協並款舍住晞張家口而不知劫情兄弟爭求受罪郡縣不能判依事上詳州議乃除恭義成令協義怡令崇寧陵令上書言瑞雲見自大明八年至今四年二月宣太后陵明堂前後數有光及五色雲又芳香四滿又五采雲在松下狀如車蓋太始四年崇寧陵令上書參佐慶獲白鹿箋伏承獲白鹿於彭城之東山皓質玉映育性馴和藝文類聚九十五宋孝武帝在彭城參佐慶獲白鹿箋徐州移答魏宜勒庫莫提知以楊難當投命告敗比之窮鳩欲動衆以相存拯救危恤難有國者之所用心雖然移書之言亦已過矣何者楊氏先世以來受晉爵號修職守藩為我西服十載之中再造逆亂號年建義猖狂妄作為臣不忠宜加誅討又知難當稱臣彼國宜是顧畏首尾兩屬求全果是純臣服事於魏何宜與人和親而聽臣下縱逸昔景平之末國祚中微彼乘我內難侵我司兗是以七年治兵義在經略三帥涉河秋毫不犯但崇此信誓不負約言耳彼伺我軍仍相掩襲俘我甲土翦我邊民是彼有兩曲我有二直也司馬楚文思亡命竄伏魯軌刁雍實為蠆尾而擁其逋逃開其疆場元顯無子焉得天助謬稱遐託何足以云又譏竊興師旅不相關移若如來言又非所受黃龍國主受我正朔且渠茂虔父子歸款彼皆殘滅俘馘豈有先言況仇池奉晉十世事宋三葉九伐所加何傷於彼僕聞師曲為老義作亂雄言貴稱情不在夸大移書本詣梁益而謬來鄙府大人不遠幸無過談宋書索虜傳元嘉十九年虜鎮東將軍武昌王宜勒庫莫提移書益梁二州往伐仇池侵其附屬而移書越詣徐州徐州移答兗州移答魏安南平南府夫皇極肇建實膺神明之符生民初載實稟沖和之氣故司牧之功宣於上代仁義之道興自諸華在昔有晉混一區宇九譯承風遐戎嚮附永嘉失御天綱圮裂石容苻姚遞乘非據或棲息趙魏或保聚邠岐我皇宋屬當歸曆受終晉氏北臨河濟西盡咸汧弔民伐罪流澤五都魏爾時祗德悔禍思用和輯交通使命以祈天衷來移所謂分疆畫境其惡久定者也俄而不恆其信虞我國憂侵牢及洛至於清濟往歲入河且欲綏理舊城是以頓兵南澨秋毫無犯軍師不能奉遵廟算保有成功回旆之日重失司兗來移云不因土立州招引亡命夫古有分土而無分民德之休明四方繈負昔周道方隆靈臺初構民之附化八十萬家彼不思弘善政而恐人之棄己縱威肆虐老弱無遺詳觀今古略聽輿誦未有窮凶以延期安忍而懷衆者也若必宜因土立州則彼立徐揚豈有其地往年貴主獻書云強者為雄斯則棄德任力逆行倒施有一於此何以能振復加欲遊獵具區觀化南國今治道方融遠人必至開館飾邸則有司存來歲元辰天人協慶鸞旗省方東巡稽嶺若欲邀恩宜赴茲會懷德貴蚤無或後期又稱馳獵積年野無飛伏此邦解網舍前矜䖵育鷇七澤八藪禽獸豐碩虞候搜算義非所吝三代肆覲其典雖缺呼韓入漢厥儀猶全饋餼之秋每存豐厚宋書索虜傳元嘉二十三年虜安南平南府又移書兗州以南國僑置州不依城土多濫北境名號又欲遊獵具區兗州答移尚書下荊州符收謝晦禍福無門逆順有數天道微於影響人事鑒於前圖未有蹈義而福不延從惡而禍不至也故智計之士審敗以立功守正之臣臨難以全節徐羡之傅亮謝晦安忍鴆殺獲罪於天名教所極政刑所取已遠暴四海宣於聖詔羡之父子亮及晦息電斷之初並即大憲復王室之讎攄義夫之憤國典澄明人神感悅三姓同罪既擒其二晦之室屬縲仆獄戶苟幽明所怨孤根易拔以順討逆雖厚必萌然歸死難圖獸困則噬是以爰整其旅用為過防京師之衆天下雲集士練兵精大號響震使持節中領軍佷山縣開國侯到彥之率羽林選士果徑二萬雲旍首路組甲曜川使持節散騎常侍都督南徐兗之江北淮南青州徐州之淮陽下邳琅邪東莞七郡諸軍事征北將軍南兗州刺史永修縣開國公檀道濟統徑鋭武卒三萬戈船蔽江星言繼發千帆俱舉萬棹遄征散騎常侍驍騎將軍段宏鐵馬二千風驅電擊步自竟陵直至鄢郢又命征虜將軍雍州刺史劉粹控河陰之師衝其巢窟湘州刺史張劭提湘川之衆直據要害巴蜀杜荊門之險秦梁絶丹圻之徑雲網四合走伏路盡然後鑾輿效駕六軍鵬翔警蹕前驅五牛整旆雖以英布之氣彭寵之資登陴無名授兵誰御加以西土之人咸沐皇澤東吳將土懷本首丘必不自陷罪人之黨橫為亂亡之役置軍則魚潰嬰城則鳥散其勢然矣聖上殷勤哀愍其罪由晦士民何辜是用一分前麾宣示朝旨符到其即共收擒晦身輕舟護送若已猖蹶先事阻衛宜翻然背亂相率歸朝頃大刑所加洪恩曠洽傅亮三息特蒙全宥晦同産以下羡之諸姪咸無所染況彼府州文武並列王職荷國榮任身雖在外乃心辰極夫轉禍貴速後機則凶遂使王師臨郊雷電皆至噬臍之恨亦將何及宋書謝晦傳元嘉三年太祖時已戒嚴諸軍相次進路尚書符荊州東討下符夫晦明遞運崇替相沿帝宋之基懋業維永聖祖重光氤氳上業狂昏承祀國維以紊毒流九縣釁穢三靈搢紳戮辱黔庶塗炭人神同憤朝野泣血聖上明睿在躬膺符握曜眷懷家國夙夜劬勞懼社稷湮蕪彝倫左衽天威雷發氛沴冰消殄凶譙門不俟鳴條之旅殲虐牧野無勞孟津之鉞華夷即晏晷緯還光鏗鏘聞於管絃趨翔被於冠冕同軌仰化異域懷風劉子勛昏世稱兵義同翦惡明朝不戢同識邪正窺窬畿甸逼遏兩江陵上無君暴於遐邇王赫斯怒興言討違命彼上將治兵薄伐今遺寧朔將軍尋陽內史沈攸之輕鋭七千飛舟先邁龍驤將軍劉靈遺羽林虎旅連鋒繼造假節督南討前鋒諸軍事冠軍將軍兗州刺史殷孝祖驅濟河徑卒電擊雷動使持節車騎將軍江州刺史曲江縣開國侯王玄謨蒸徒五萬董統前師使持節侍中司徒揚州刺史建安王休仁擁神州之衆總督群帥龍驤將軍劉勔寧朔將軍劉懷珍步騎五千直指大雷寧朔將軍柳倫司州刺史龐孟虯淮潁突騎邪趣西陽使持節驃騎大將軍豫州刺史山陽王休祐總勒步帥連旗百萬河舟代馬遄騖江濆越棘吳鉤交曜畿服茹鼓動坤維金甲震雲漢掎角相望水陸俱發冠軍將軍武念率雍司之鋭已據樊沔徐州刺史申令孫提彭宋剽勇陵塗焱奮皇上當親馭六師降臨江服旌旆掩雲舳艫海昔吳楚連衡燕淮徑悍塵擾區內聲沸秦中霧散埃滅豈非先鑒而嬰彼孤城以待該天之網迫此烏合以抗絡寓之師雲羅四掩霜鋒交集猶徑飆之拂細草烈火之掃寒原燋卷之形昭然已著朝廷惻愍我僚吏哀矜我士民並亦何辜拘誤迷黨故加宣示令得自新如其淪惑不改抵冒王威同焚既至雖悔奚補奉詔以四王幼弱不幸陷難兵交之日不得妄加侵犯若有逼損誅翦無貸左右主帥嚴相衛奉詿誤之罪一無所問宋書鄧琬傳時東賊甚急張永江方興回軍東討尚書下符宋故散騎常侍揚州丹楊郡秣陵縣謝公墓志祖瑤字球度琅邪下缺十餘字夫人琅邪王氏父頤之字修年振威將軍東海內史父字景山給事黃門侍郎散騎常侍光祿勳夫人太原王氏父坦之字文度持節都督平北將軍刺史藍田獻侯宋故散騎常侍揚州丹楊郡秣陵縣西鄉顯安里領豫州陳陽夏縣都鄉吉遷里謝濤字明遠春秋卌有九元嘉十八年歲次屠維月依林鍾十七日卒其年九月卅日窀穸揚州丹楊郡建康縣土山里夫人琅邪王氏七十有二大明七年歲次單閼月十五日卒其年十一月十四日合祔父靜之字壽司徒長史義興太守祖獻之字子敬中書令嗣曾孫綽古刻叢鈔宋故散騎常侍護軍將軍臨澧侯劉使君墓志祖諱道鄰字道鄰侍中太傅長沙景王妃高平平陽檀氏字憲子諡曰景定妃父畼道淵永寧令祖貔稚羆琅邪太守合葬琅邪臨沂莫府山父諱義融字義融領軍車騎桂陽恭侯夫人琅邪臨沂王氏字韶風父簡長仁東陽太守祖穆伯遠臨海太守合葬丹徒練壁雩山所生母湯氏宜城人葬練壁雩山兄覬茂道散騎常侍桂陽孝侯夫人廬江灊何氏憲英父愈之彥和通直常侍祖叔度金紫光祿大夫合葬練壁雩山第三弟彪茂蔚祕書郎葬江夫人河南陽翟褚氏成班父方回太傅功曹祖叔度雍州刺史第四弟實茂軌太子舍人夫人琅邪臨沂王氏淑婉父津景淵中書郎祖虞休仲左衛將軍江乘白山第五弟季茂通海陵太守葬練壁雩山夫人陳郡陽夏袁氏妙父淑陽源太尉忠憲公祖豹士蔚丹陽尹第一姊茂徽𡣪陳郡長平殷臧憲郎父元素南康太守祖曠思泰軍功曹重𡣪琅邪臨沂王閔之希損鎮西主簿父升之休道都官尚書祖敬弘左光祿儀同第二姊茂華𡣪廬江灊何求子有書郎父鎮長弘宜都太守祖尚之彥德司空簡穆公第三姊茂姬𡣪平昌安丘孟詡元亮中軍參軍離父靈休太尉長史祖昶彥遠丹陽尹第四姊茂薑𡣪蘭陵蕭惠徽中書郎父思話征西將軍儀同三司祖源之君流前將軍第五妹茂容𡣪蘭陵蕭贍叔文父斌伯蒨青冀二州刺史祖摹之仲緒丹陽尹重𡣪濟陽圉蔡康之景仁通直郎父熙元明散騎侍郎祖廓子度太常卿第六妹茂嫄𡣪濟陽考城江遜孝言父湛徽淵左光祿儀同忠簡公祖夷茂遠前將軍湘州刺史重𡣪琅邪臨沂王法興驃騎參軍父翼之季弼廣州刺史祖楨之公幹侍中夫人濟陽考城江氏景婼父淳徽源太子洗馬祖夷茂遠前將軍湘州刺史第一男晃長暉出後兄紹封桂陽侯第二男旻淵高拜臨澧侯世子第三男皓淵華第五男量淵邃出後第四弟實第五男淵頖第六男晏淵平第一女麗昭第二女麗明第三女小字僧歸亡葬宋故散騎常侍護軍將軍臨澧侯劉使君墓志君諱襲字茂德南彭城人宋高祖武皇帝弟景王之穆也神姿韶雅風譽夙懋弱冠拜祕書郎逮二凶肆禍人倫道消君身離幽執僅免虎口事清還復舊職以母憂去官既除又拜祕書郎轉太子舍人自升二宮令望允緝出為鎮蠻護軍廬江太守蒞政平簡聲績兼著遷明威將軍安成太守屬中流構舋四表迷逆君英議獨發招會如神故能以一之旅剋濟忠節義超終古誠貫當今皇朝欽嘉爵賞取榮除輔國將軍郢州刺史封建陵縣開國侯俄徵太子右衛率加給事中未拜遷侍中冠軍將軍改封臨灃縣開國侯鎮肅石頭實當關要之寄遷左衛將軍未拜仍除中護軍春秋卅有八泰始六年三月十日薨於位聖主嗟悼朝野傷悲有詔故中護軍臨灃縣開國侯志行貞純才用理濟忠勤著於艱時勤績倡乎泰運年志始壯奄焉凶折悲傷惻割實兼常懷思加寵數以申哀榮可贈護軍將軍加散騎常侍如故諡曰忠侯粵五月草七日庚寅將葬於琅邪之乘武岡以悲幽明之殊隔傷一訣而永分仰清徽而灑淚傃玄石而裁文其辭曰峨峨山嶽效靈允矣君子誕膺休禎支蔭帝宇締慶文明德以行高仁與華二宮官政兩服國步時屯艱難斯屬忠則忘家義實光族朝乃欽庸以望既歸寵惟或侍帝言或司蕃戎方宏互美家邦如何不躬芳稍述日月有時考辰筮吉玄堂啓基深泉永穸長悲古刻叢鈔宋張推兒墓志宋故臨渭縣侯湘東太守張府君諱濟夫人邱氏諱靜姬第三女推兒春秋卅有一亡於偏憂元徽元年十月甲辰十七日庚申權假窀穸於西鄉遠葉蘭飛浚源琁潔履信早辰含章妙歲選史圖容循詩範節皎鏡冬泉優柔春蕙淄北忸行營東慚藝冥昧慶善窅翳壽仁泣血霣性團憂殲身罷景方旦摧華載春壟木已藹墓草行陳朱火幾爓元夜無晨古刻叢鈔金革鉤文錫爾金鉤且公且侯南史吉士瞻傳剡縣刻石山大石文此齊者黃公之化氣也立石文黃天星姓蕭字某甲得賢帥天下大平小石文刻石者誰會稽南山李斯刻秦望之封也南齊書祥瑞志會稽剡縣刻石山相傳為名不知文字所存升明末縣民兒襲祖行見石上有文凡三處苔生其上字不可識刊苔去之大石文云云立石文云云小石文云云天璽文戊丁之人與道俱肅然入草應天符皇帝興運南齊書祥瑞志升明三年四月滎陽人尹午於嵩高山東南隅見天雨石墜地石開有璽在其中方三寸其文曰云云又曰云云午奉璽詣雍州刺史蕭赤斧赤斧表獻之
