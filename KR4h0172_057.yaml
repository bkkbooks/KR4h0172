body:
  text: 朱昭之與顧歡書難夷夏論見足下高談夷夏辨商二教條勤經旨冥然玄會妙唱善同非虛言也昔應吉甫齊孔老於前吾賢又均李釋於後萬世之殊塗同歸於一朝歷代之疑爭怡然於今日賞深悟遠蠲慰者多益世之談莫過於此至於各言所好便復肝膽楚越不知苦甘之方雖二而成體之性必一乃互相攻擊異端遂起往反紛類斯害不少惜矣初若登天光被俗表末如入淵明夷輝淪夫導師失路則迷塗者衆故忘其淺昧遽相牽拯令先布其懷未陳所恨想從善如流者不惜乖於一往耳山川悠遠良話未期聊寄於斯以代暫對情旗一接所釋不淺朱昭之白夫聖道虛寂故能圓應無方以其無方之應故應無不適所以自聖而檢心本無名於萬會物自會而為稱則名號以為之彰是以智無不周者則謂之為正覺通無不順者則謂之為聖人開物成務無不達也則謂之為道然則聖不過覺覺不出道君可知也何須遠求哉但華夷殊俗情好不同聖動常因故設教或異然曲禮淨戒數同三百威儀容止又等三千所可為異政在佛道之名形服之間耳達者尚復以形骸為逆旅袞冕豈足論哉所可為嫌祇在設教之始華夷異用當今之俗而更兼治遷流變革一條宜辨耳今當之言聖人之訓動必因順東國貴華則為袞冕之服禮樂之容屈伸俯仰之節衣冠簪佩之飾以弘其道蓋引而近之也夷俗重素故教以極質髡落徽容衣裳弗裁間情開照期神曠劫以長其心推而遠之也道法則採餌芝英餐霞服丹呼吸太一吐故納新大則靈飛羽化小則輕強無疾以存其身即而效之也三者皆應之一用非吾所謂至也夫道之極者非華非素不即不殊無近無遠誰舍誰居不偏不黨勿毀勿舉圓通寂寞假字曰無妙境如此何所異哉但自皇犧已來各弘其方師師相傳不相關涉良由彼此兩足無復我外之求故自漢代以來淳風轉澆仁義漸廢大道之科莫傳五經之學彌寡大義既乖微言又絶衆妙之門莫遊中庸之儀弗覩禮術既壞雅樂又崩風俗寢頓君臣無章正教陵遲人倫失序於是聖道彌綸天運遠被玄化東流以慈係世仁衆生民黷所先習欣所新聞革面從和精義復興故微言之室在在並建玄詠之賓處處而有此可以事見非真布之空談將無物不可以終否故受之以同人故邪意者夫聖人之撫百姓亦猶慈母之育嬰兒始食則餌以甘肥甘肥既厭復改以脂蜜脂蜜既厭則五體休和內外平豫為益至矣不其然乎理既然矣而橫厝非貶妄相分別是未悟環中不可與議二賢推蕩往反解材之勢縱復得解非順理之作順理析之豈待推蕩足下發源開端明孔老是佛結章就議則與奪相懸何搢紳擎跽為諸華之容稽首佛足則有狐蹲之貶端委罄折為侯甸之恭右膝著地增狗踞之辱請問若孔是正覺釋為邪見今日之談吾不容聞許為正真何理鄙誚既虧畏聖之針又忘無苟之禮取之吾心所恨一也又云全形守祀繼善之教毀貌易性絶惡之學是商臣之子有繼善之功覆障毀落有絶惡之志推尋名實為恨二也又云下棄妻孥上廢宗祀夫鬼神之理冥漠難明故子路有問宣尼弗釋當由死生道殊神緣難測豈為聖不能言良恐賢不能得三達之鑒照之有在足下已許神化東流而復以喪祭相乘與奪無定為恨三也又云切法可以進謙弱賒法可以退夸強三復此談顛倒不類夫謙弱易回可以賒和而進夸強難化應以苦切乃退隱心檢事不其然乎米粳在目則東西易位偏著分心則辭義舛惑所言乖當為恨四也又云抑則明者獨進引則昧者競前夫道言真實敬同高唱覆載萬物養育衆形而云明者獨進似若自私佛音一震則四等兼羅三乘同順天龍俱靡而云昧者競前夫道言真實敬同高唱覆載萬物養育衆形而云明者獨進似若自私佛音一震則四等兼羅三乘同順天龍俱靡而云昧者競前亦又近誣探頤之談而妄生瘡疣遊辭放發為恨五也又云佛是破惡之方道是興善之術破惡之方吾無間然夫惡止善行乃法教所以興也但未知興善之術術將誰然若善者已善奚用興善善者非善又非興善則興善之名義無所託今道者善也復以興善取之名義太為繼富不以振惡為教褊矣大道兼弘而欲局之為恨六也又云殘忍剛愎則師佛為長慈柔虛受則服道為至夫摧伏勇猛回靡殘暴實是牟尼之巨勳不乖於慧旨但道力剛明化功彌遠成性存存恩無不被梟鴆革心威無不制而云唯得虛受太為淺略將無意淪偏著不悟狹劣傷道邪披尋第目則先誡臆説建言肆論則不覺情遷分石難持為恨七也又云八象西戎諸典廣略兼陳金剛般若文不踰千四句所弘道周萬法粗妙兩施繁約共有典法細誡科禮等碎精粗橫生言乖乎實為恨八也又云以國而觀則夷虐夏溫請問炮烙之苦豈康竺之刑流血之悲詎齊晉之子刳剔苦害非左衽之心秋露含垢匪海濱之士推檢性情華夷一揆虛設溫嚴為恨九也又云博奕賢於慢遊講誦勝於戲唬尋夫風流所以得傳經籍所以不廢良由講誦以得通咨求以成悟故曰學而不講是吾憂也而方之戲謔太為慢德請問善誘之筌其將安寄初未得意而欲忘言為恨十也有此十恨不能自釋想望君子更為伸之謝生亦有差參足下攻之已密且專所請不復伐匠弘明集七咨顧歡夷夏論并書朱廣之叩頭見與謝常侍往復夷夏之論辨章同歸之義可謂簡見通微清練之談也至於聃尚端冕之飾屏破翦落之素申以擎跪之恭辱以狐蹲之肅桎束華人杜絶外法舟車之喻雖美平恕之情未篤致會之源既坦筌寄之塗方壅然則三乘之悟窅望茲土六度之津於今長訣披經玩理悵怏良深謝生貶沒仙道褒明佛教以羽化之術為浮濫之説殘形之唱為履真之文徒知己指之為指不知彼指之無殊豈所以通方得意善同之謂乎僕夙漸法化晚味道風常以崇空貴無宗趣一也蹄網雙張義無偏取各隨曉入唯心所安耳何必龍袞可襲而瓔珞難乘者哉自貧來多務研斆沈潛緘卷巾牘奄逾十載幼習前聞零落頓盡蘊志空年開贍靡階每獨慷慨遙夜輒啓旦忘寐而清心遠信纏若彌篤若夫信沿理則輕泛無主轉墯之賓因斯而起是以罄率狂管書述鄙心願重為啓誨敷導厥疑廣之叩頭論云擎跪罄折侯甸之恭也狐蹲狗踞荒流之肅也疑曰夫邦殊用隔久自難均至於各得所安由來莫辨侯甸之容所言當矣狐狗之目將不獨傷論云若謂其致既均其法可換者而車可涉川舟可行陸乎必不可也疑曰夫法者所以法情情非法也法既無定由情不一不一之情所尚殊塗剛柔並馳華戎必同是以長川浩漫無當於此矣平原遠陸豈取於彼邪舟車兩乘何用不可論云既不全同又不全異下棄妻孥上廢宗祀疑曰若夫廢祀於上不能絶棄於下此自擬異入同非同者之過也寧可見犁牛不登宗廟之用而永棄於牢餼之具邪論云嗜欲之物皆以禮伸孝敬之典獨以法屈悖德犯順曾莫之覺疑曰若悖德犯順無施而可慈敬惠和觸地而通是以損膳行道非徵凶之宅服冕素餐非養正之方屈伸之望可相絶於此矣論云理之可貴者道也事之可賤者俗也今捨華效夷義將安取若以其道邪道固符合矣若以其俗邪俗則夭乖矣疑曰至道虛通故不爵而尊俗無不滯故不黜而賤賤者不能無纍尊者自然天足天足之境既符俗纍之域亦等道符纍等又誰美誰惡故俱是聖化唯照所惑惑盡明生則彼我自忘何煩遲遲捨效之際耿介於華夷之間乎論云無生之教賒無死之化切切法可以進謙弱賒法可以退夸強疑曰無生即無死無死即無生名反實合容得賒切之別邪若以迹有差降故優劣相懸者則宜以切抑強以賒引弱故孔子曰求也退故進之由也兼人故退之致教之方不其然乎論云佛教文而博道教質而精精非粗人所信博非精人所能疑曰夫博聞強識必緣照遠廣敦修善行必因理入微照明則理無不精理精則明無不盡然則精博同功相為利用博猶精也豈粗人所能信精猶博也豈弘通所獨闕論云佛言華而引道言實而析析則明者獨進引則昧者競前疑曰夫華不隔理則為達鑒所陶實未屆虛故為鑽賞所業陶業有序者為質昧邪為待明邪若其質昧則明不獨進若必待明則昧不獲前若明昧俱得何須抑引妙況難章所宜更辨論云佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵遵正則歸塗不迷見妙則百慮咸得疑曰簡則易從云何難見繁則難理豈得易遵遵正則歸塗不迷可以階道之極雖非幽簡自然玄造何假難明之術代茲易曉之路哉論云若殘忍剛愎則師佛為長慈柔虛受則服道為至疑曰夫邪見枉道法所不存慈悲喜捨是所漸録喜心則能受捨亦必虛虛受之義窅然復會未知殘愎之人更依何法若謂所受者異則翻成刻船何相符之有乎論云佛是破惡之方道是興善之術又以中夏之性不可效西戎之法疑曰興善之談美矣勿效之誨意所未安請問中夏之性與西戎之人為夏性純善戎人根惡如令根惡則於理何破使其純善則於義何興故知有惡可破未離於善有善可興未免於惡然則善惡參流深淺互列故羅雲慈惠非假東光桀跖凶虐豈鍾西氣何獨高華之風鄙戎之法邪若以此善異乎彼惡殊乎此惡則善惡本乖寧得同致論云蹲夷之儀婁羅之辨猶蟲喧鳥聒何足述效疑曰夫禮以伸敬樂以感和雖敬由禮伸而禮非敬也和因樂感樂非和也故上安民順則玉帛停筐風淳俗泰則鐘鼓輟響又鐘帛之運不與二儀並位蓋以拯頓權時不得已而行耳然則道義所存無係形容苟造其反不嫌殊周全祗蹲虔跪孰曰非敬敬以伸心孰曰非禮禮敬玄符如何徒捨舍識之類人標其所貴貴不在言言存貴理是以麟鳳懷仁見重靈篇猩猩能語受蚩禮章未知之所論義將何取若執言損理則非知者所據若仗理忘言則彼以破相明宗故李叟之常非名欲所及維摩靜黜非巧辨所追檢其言也彼我俱遣尋其旨也老釋無際俱遣則濡沫可遣無際則不負高貴何乃遠望般若名非智慧便相挫蹙比類蟲鳥研復逾日未愜鄙懷且方俗殊韻豈專胡夏近唯中邦齊魯不同權輿俶落亦古今代述以其無妨指録故傳授世習若其非也則此未為是如其是也則彼不獨非既未能相是則均於相非想茲漢音流入彼國復受蟲喧之尤鳥聒之誚婁羅之辨亦可知矣一以此明莛楹可齊兩若兼除不其通乎夫義奧淵微非所宜參誠欲審方玄匠聊伸一往耳傾心遙佇遲聞後裁弘明集七與道高法明二法師書難佛不見形夫道處清虛四大理常而有法門妙出群域若稱其巧能利物度脫無量為教何以不見真形於世真空説而無術邪今正就尋西方根源伏願大和上垂懷允納下心無惜神誥弟子李渺和南弘明集十一李渺和南旋省雅論位序區別辭況充美欣會良多所謂感化異時像正殊俗援外以映內徵文以驗實敬範來趣無所間然夫受悟之由必因鑑觀暗寄生疑疑非悟本若書契所存異代齊解萬世之後可不待聖而師矣若乃聲迹並資言象相濟大義既乖儒墨競興豈徒正信不朗將亦謗誤增釁得不取證於示見印記以自固乎大聖以無礙之慧垂不請之慈何為吝昭昭之明晦倍尋之器絶群望於泥洹之後興罪垢於三會之先芻狗空陳其能悟乎儀像虛設其能信乎至於帝王姬孔訓止當世來生之事存而不論故其隱見廢興權實莫辨今如來軌業彌貫三世慈悲普潤不得以見在為限群迷求解不可以滅盡致窮是以化度不止於篇籍佛事備列於纍萬問今之所謂佛事者其焉在乎若如雅況所信在此所驗在彼而聖不世出孔釋異塗即事而談罔非矛盾矣其可相驗乎未能默廢聊復寓言幸更詳究遲覩清釋弘明集十一李渺和南雅論明受悟之津爰自疑得暗寄有餘無取鑒觀鞠躬讚誦咸足屆道覽復往況彌覩淵賾然所謂像法乖正求悟理粗借筌會旨無假示見此固姬孔所以垂訓輝光所以不表取之世典綽焉足矣放光動地徒何為乎若正信不止於俯仰而佛事備舉於形聲大覺所由妙其色涉求之所基始故知信者必以儒墨致疑學者將由無證自悔吝明無咎於三五潛景道德愆於十號矣豈不然乎又誨姬孔務拯穨季無暇來生設在結繩三世自明亦又不然七經所陳義兼未來釋典敷載事止緣報故易云積善餘慶積惡餘殃經云無我無造無受者善惡之業亦不亡此則緣教常緩兼訓已弘豈謂所務在此所闕在彼哉來論雖美故自循環之説耳望復擢新演異以洗古今之滯使夷路坦然積礙大通也深願大和上垂納亮款弟子李渺謹呈弘明集十一翟雉賦并序余在荊楚見人有養雉翟二鳥者慨然感之而為賦云含野氣於人塗信多懼而少嘉雉見質而不陋翟表文而不華映寒條之始緑發冬秀之餘葩藝文類聚九十引作叔之遂隱論崇退儒生問於抱朴丈人曰請問隱何為者也而生上古徇之至今繼踵何哉丈人曰夫全朴之道萬物一氣三極湛然天人無際豈有朝野之別隱顯之端哉則夫隱於已失者也平原既開風流散漫故隱者所以全其真素養其浩然之氣也藝文類聚三十七作叔之懷舊序余與從甥孫道濟交好特至昔寓荊州同處一室冬多間暇長共學書余收而録之欲以為索居之愛道濟因記紙未曰舅還山之日覽此相存閲書見其手迹皎若平日悽悵傷心御覽七百四十九作升之傷孤鳥詩序偶得二鳥將欲放之俄頃而一者死一者既放屢顧悲鳴感微禽之有心遂為詩以傷之藝文類聚九十作叔之續劉伯倫酒德煩有酒則飲清含醇無酒則餐糟書鈔一百四十八作升之舟贊致遠任重各因所由陸則騁車水惟用舟弱楫輕棹利涉齊求緬彼漁父鼓枻清謳北堂書鈔一百三十七一百三十八並作升之藝文類聚七十一作叔之初學記二十五作叔元御覽七百七十作叔之笏贊慎為德要唯善用光敬上尊賢貴不踰常用制斯器備對遺忘因事施禮升降有章初學記二十六作升之甘橘贊節重履險操貴有恆一樹保榮四運齊能在質惟美於味斯弘異分南域北則枳橙藝文類聚八十六初學記二十八並作升之蘭菊銘蘭既春敷菊又秋榮芳薰百草色豔群英孰是芳質在幽愈馨藝文類聚八十一作淑之與河伯箋伏惟河伯府君君侯潛曜靈泉翱翔神渚發洪流於崑崙揚高波於砥柱包四瀆以稱王總百川而為主初學記六案劉敬叔異苑云河內荀儒字君林乘冰省舅氏陷河而死兄倫字君文求尸積日不得設祭水側授箋與河伯宿岸側冰開手執箋浮上倫又箋謝之鬼遺方序劉涓子不知何許人也晉末於丹陽郊外較射忽見一物高二丈許因射而中之走而電激聲若風雨夜不敢追明旦率門人弟子鄰伍數十人尋其蹤迹至山見一小兒問之何姓小兒云主人昨夜為涓子所射今欲取水以洗瘡因問小兒主人是誰答曰是黃父鬼乃將小兒還未至聞搗藥聲遙見三人一人臥一人開書一人搗藥比及隨叫笑而前三人並走遺一帙癰疽方并一臼藥人有癰者塗之隨手而愈御覽七百二十四與天公箋道元居在城南接水近塘草木幽鬱蚊虻所藏茅茨陋宇才容數床無有高門大戶來風致涼積汙纍燻體貌萎黃未免夏暑逆愁冬霜冬則兩幅之薄被上有牽綿與敝絮撤以三股之絲綖夾以四升之粗布狹領不掩其巨形促緣不覆其長度伸腳則足出攣捲則脊露高似孫緯略作吞道元與吞公箋藝文類聚三十五作喬道元文少二十字奴曰高安兩手並殘指如竹筒畏風惡寒小者家生厥名曰饒腹中瘕堅大如飯捎飽食終日不能作勞借一小兒傖公吳母近因冬節暫詣其舅狗咬一脛肉落如手攣筋徹骨跂而不愈長婢來成左目失明動則入井已死復生次婢良信有桓公司馬之疹行步雖曠了無前進隱疾難明辭不盡韻小婢從成南方之奚形如驚麞言語嘍儷聲音駭人惟堪驅雞他無所役遣詣阿嵇復被狗咋困熟如泥初學記十九有露車一乘轅復摧折以犁轅續之左崎右嵧強弱相負傍行斫轅御覽七百七十三九愍映金箱之羽蓋鳴玉衡之鸞鑣望天路以振策指萬里於崇朝御覽三百五十八與琅邪太守許誠言書貴郡臨沂縣沙村逆鱗魚可調藥物
