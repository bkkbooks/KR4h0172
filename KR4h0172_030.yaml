body:
  text: 謝靈運怨曉月賦臥洞房兮當何悅滅華燭兮弄曉月昨三五兮既滿今二八兮將缺浮雲褰兮收泛灩明舒照兮殊皎潔墀除兮鏡鑒房櫳兮澄徹藝文類聚一初學記一御覽四羅浮山賦並序客夜夢見延陵茅山在京之東南明旦得洞經所載羅浮山事云茅山是洞庭口南通羅浮正與夢中意相會遂感而作羅浮山賦曰若乃茅公之説神化是悉數非億度道單悒譎洞四有九此惟其七潛夜引輝幽境朗日故曰朱明之陽宮耀真之陰室洞穴之寶衢海靈之雲術伊離情之易結諒沈念之羅浮發潛夢於永夜若遡波而乘桴越扶嶼之細漲上增龍之合流鼓蘭枻以水宿杖桂策以山遊藝文類聚七又略見北堂書鈔一百五十八嶺表賦見五瀆之東寫覩六水之南馳揮靈海之委輸孰石穴之永歸北堂書鈔一百五十八若乃長山款跨外內乖隔下無伏流上無夷迹麋兔望岡而旋歸鴻雁覩峰而反翮既陟麓而踐坂遂升降於山畔顧後路之傾巘眺前磴之絶岸看朝雲之抱岫聽夕流之注澗羅石棊布怪譎橫越非山非阜如樓如闕斑采類繡明白若月蘿蔓絶攀苔衣流滑藝文類聚八長溪賦潭結緑而澄清瀨揚白而戴華飛急聲之瑟汩散輕文之漣羅始鏡底以如玉終積岸而成沙藝文類聚九孝感賦舉高檣於楊潭眇投迹於炎州貫廬江之長路出彭蠡而南浮于時月孟節季歲亦告暨離鄉眷壤改時懷氣戀丘墳而縈心憶桑梓而零淚孟積雪而抽筍王斫冰以鱠鮮荑葇葉於枯木起春波於寒川顧微心之庸褊謝精靈於昭晰擁永慕而莫從曾遐感而靡徹藝文類聚二十歸塗賦並序昔文章之士多作行旅賦或欣在觀國或怵在斥徒或述職邦邑或羈役戎陳事由於外興不自已雖高才可推求懷未愜今量分告退反身草澤經塗履運用感其心賦曰承百世之慶靈遇千載之優渥匪康衢之難踐諒跬步之易局踐寒暑以推換眷桑梓以緬邈褫簪帶於窮城反巾褐於空谷果歸期於願言獲素念於思樂於是舟人告辦佇楫在川觀鳥候風望景測圓背海向溪乘潮傍山悽悽送歸愍愍告旋時旻秋之杪節天既高而物衰雲上騰而雁翔霜下淪而草腓捨陰漠之舊浦去陽景之芳蕤林承風而飄落水鑒月而含輝發青田之枉渚逗白岸之空亭路威夷而詭狀山側背而易形停余舟而淹留搜縉雲之遺迹漾百里之清潭見千仞之孤石歷古今而長在經盛衰而不易藝文類聚二十七感時賦並序夫逝物之感有生所同頽年致悲時懼其速豈能忘懷乃作斯賦相物類以逮己閔交臂之匪賒揆大耋之或遄指崦嵫於西河鑒三命於豫躬怛行年之蹉跎于鶗鴂之先號挹芬芳而夙過微靈芝之頻秀迫朝露其如何雖發歎之早晏諒大暮之同科藝文類聚三十四傷己賦嗟夫卞賞珍於連城孫別駿於千里彼珍駿以貽愛此陋容其敢擬丁曠代之渥惠遭謬眷於君子眺徂歲之驟經覩芳春之每始始春芳而羡物終歲徂而感己貌憔悴以衰形意幽翳而苦心出衾裯而載坐闢襜幌以迥臨望步簷而周流眺幽閨之清陰想輕綦之往迹餐和聲之餘音播芬煙而不燻張明鏡而不照歌白華而絶曲奏蒲生之促調藝文類聚三十四逸民賦上闕于天唯舍唯用其見也則如遊龍其潛也則如隱鳳來無所從去無所至有酒則舞無酒則醒不明不晦不昧不類蕭條秋首葳蕤春中弄琴明月酌酒和風御清風以遠路拂白雲而峻舉指寰中以為期望繫外而延佇藝文類聚三十六入道至人賦爰有名外之至人乃入道而館真荒聰明以削智遁支體以逃身於是卜居千仞左右窮懸幽庭虛絶荒帳成煙水縱橫以觸石日參差於雲中飛英明於對溜積氤氳而為峰推天地於一物橫四海於寸心超埃塵以貞觀何落落此胸襟藝文類聚三十六辭祿賦荷賞延之渥恩在弱齡而覃惠蒙聖達之眷顧得乘間以沉泄雖鑣羈之有名恆遊獎而匪滯解龜紐於城邑反褐衣於丘窟判人事於一朝與世物乎長絶自牽綴於朱絲奄二九於斯年服纓佩於兩宮執鞭笏於宰蕃藝文類聚三十六撰征賦並序蓋聞昏明殊位貞晦異道雖景度回革亂多治寡是故升平難於恆運剝喪易以橫流皇晉受命河汾來遷吳楚數歷九世年踰十紀西秦無一援之望東周有三辱之憤可謂積禍纏釁固以久矣況乃陵塋幽翳情敬莫遂日月推薄帝心彌遠慶靈將升時來不爽相國宋公得一居貞回乾運軸內匡寰表外清遐陬每以區宇未統側席盈慮值天祚攸興昧弱授機龜筮元謀符瑞景徵於是仰祗俯協順天從兆興止戈之師躬暫勞之討以義熙十有二年五月丁酉敬戒九伐申命六軍治兵于京畿次師于汳上靈檣千艘靁輜萬乘羽騎盈塗飛旍蔽日別命群帥誨謨惠策法奇於三略義祕於六韜所以鉤棘未曜殞前禽於金墉威弧始彀走鈒隼於滑臺曾不踰月二方獻捷宏功懋德獨絶古今天子感東山之劬勞慶格天之光大明發興於鑒寐使臣遵于原隰余攝官承乏謬充殊役皇華愧於先雅靡盬悴於征人以仲冬就行分春反命塗經九守路踰千里沿江亂淮遡薄泗汳詳觀城邑周覽丘墳眷言古迹其懷已多昔皇祖作藩受命淮徐道固苞桑勳由仁積年月多歷市朝已改永為洪業纏懷清曆於是采訪故老尋履往迹而遠感深慨痛心殞涕遂寫集聞見作賦撰征俾事運遷謝託此不朽其詞曰系列山之洪緒承火正之明光立熙載於唐后申讚事於周王疇庸命而順位錫寶圭以徹疆歷尚代而平顯降中葉以繁昌業服道而德徽風行世而化揚投前蹤以永冀省輶質以遠傷睽謀始于蓍蔡違用舍於行藏庇常善之罔棄憑曲成之不遺昭在幽而偕煦賞彌久而愈私顧晚草之薄弱仰青春之葳蕤引蔓穎於松上擢纖枝於蘭逵施隆貸而有渥報涓塵而無期歡太階之休明穆皇道之緝熙惟王建國辨方定隅內外既正華夷有殊惟昔小雅逮於班書戎蠻孔熾是殛是誅是以宣王用棘於獫狁高帝方事於胸奴然侵鎬至涇自塞及平窺郊伺鄙圍郭攻城慕攜王之矯虔階喪亂之未寧竊強秦之三輔陷隆周之兩京雄崤澠以制險據繞霤而作扃家永懷於故壤國願言於先塋俟太平之曠期屬應運之聖明坤寄通於四瀆乾假照於三辰水潤土以顯比火炎天而同人惟上相之睿哲當草昧而經綸總九流以貞觀協五材而平分時來之機悟先於介石納隍之誡一援於生民龜筮允臧人鬼同情順天行誅司典詳刑樹牙選徒秉鉞抗旍弧矢罄楚孝之心智戈棘單吳子之精靈迅三翼以魚麗襄兩服以雁逝陳未列於都甸威已振於秦薊灑嚴霜於渭城被和風於洛汭就終古以比猷考墳册而莫契昔西怨於東徂今北伐而南悲豈朝野之恆情動萬乘之幽思歌零雨於豳風興采薇於周詩慶金墉之凱定眷戎車之遷時佇千里而感遠涉弦望而懷期詔微臣以勞問奉王命於河湄夕飲餞以俶裝旦出宿而言辭歲既晏而繁慮日將邁而戀乖闕敬恭於桑梓謝履綦於庭階冒沈雲之暗藹迎素雪之紛霏凌結湍而凝清風矜籟以揚哀情在本而易阜物雖末而難懷眷余勤以就道苦憂來其城頽爾乃經雉門啓浮梁眺鍾巖越查塘覽永嘉之紊維尋建武之緝綱于時內慢神器外侮戎狄君子橫流庶萌分析主晉有祀福祿來格明兩降覽三七辭厄元誕德以膺緯肇回光於陽宅明思服於下武興繼代以消逆簡文因心以秉道故恩用而刑廢孝武捨己以杖賢亦寧外而治內觀日化而就損庶雍熙之可對閔隆安之致寇傷龜玉之毀碎漏妖凶於滄洲纏舋難而盈紀時焉依於晉鄭國有蹙於百里賴英謨之經營弘兼濟以忘己主寰內而緩虞澄海外以漬滓至如昏祲蔽景鼎祚傾基黍離有歎鴻雁無期瞻天命之貞符秉順動而履機率駿民之思效普邦國而同歸蕩積霾之穢氛啓披陰之光暉反平陵之杳藹復七廟之依稀務役簡而農勸每勞賞而忠甄燮時雍於祖宗布乂安於海甸掃逋醜於漢渚滌僭逆於岷山羈巢處於西木引鼻飲於源淵惠要襋而思韙援冠辨而來虔視冶城而北屬懷文獻之收揚匪元首之康哉孰股肱之惟良譬觀曲而識節似綴組以成章業彌纏而彌微事愈有而莫傷次石頭之雙岸究孫氏之初基幸漢庶之漏網憑江介以抗維初鵲起於富春果鯨躍於川湄匝三世而國盛歷五偽而宗夷察成敗之相仍猶脣亡而齒寒載十二而謂紀豈蜀滅而吳安衆咸昧於謀兆羊獨悟於理端請廣武以誨情樹襄陽以作藩拾建業其如遺沿萬里而誰難疾魯荒之詖辭惡京陵之譖言責當朝之憚貶對曩籍而興歎敦怙寵而判違敵既勍而國圮彼問鼎而何階必先賊於君子原性分之異託雖殊塗而歸美或卷舒以愚智或治亂其如矢謝昧迹而託規卒安身以全里周顯節而犯逆抱正情而喪己薄四望而尤眄歎王路之中鯁蠢於越之妖燼敢凌蹈於五嶺崩雙嶽於中流擬凶威於荊郢隱雷霆於帝坐飛芒鏃於宮省於時朝有遷都之議人無守死之志師旅痛於久勤城墉闕於素備安危勢在不侔衆寡形於見事於赫淵謀研其神策緩轡待機追奔躡迹遇雷池而振曜次彭蠡而殲滌穆京甸以清晏撒多壘而寧役造白石之祠壇懟二豎之無君踐掖庭以幽辱淩祧社而火焚愍文康之罪己嘉忠武之立勳道有屈於災蝕功無謝於如仁訊落星之饗旅索舊棲於吳餘迹階戺而不見橫榛卉以荒除彼生成之樂辰亦猶今之在余慨齊吟於爽鳩悲唐歌於山樞弔偽孫於塗首率君臣以奉疆時運師以伐罪偏投書於武王迄西北之落紐乏東南以振綱誠巨平之先覺實中興之後祥據左史之攸徵胡影迹之可量過江乘而責始知遇雄之無謀厭紫微之宏凱甘陵波而遠遊越雲夢而南泝臨浙河而東浮彀連弩於川上候蛟龍於中流爰薄方與乃屆歐陽入夫江都之域次乎廣陵之鄉易千里之曼曼泝江流之湯湯洊赤圻以經復越二門而起漲眷北路以興思看東山而怡目林叢薄路逶迤石參差山盤曲水激瀨而駿奔日映石而知旭審兼照之無偏怨歸流之難濯羡輕魵之涵泳觀翔鷗之落啄在飛沈其順從顧微躬而緬邈於是抑懷蕩慮揚榷易難利涉以吉天險以艱于敵伊阻在國斯便勾踐行霸於琅邪夫差爭長於黃川葛相發歎而思正曹后愧心於千魂登高堞以詳覽知吳濞之衰盛戒東南之逆氣成劉后之駴聖藉鹽鐵之殷阜臨淮楚之剽輕盛几杖而弭心怒抵局而遂爭忿爰盎之扶禍惜徒傷於家令匪條侯之忠毅將七國之陵正褎漢藩之治民並訪賢以昭明侯文辨其誰在曰鄒陽與枚生據忠辭於吳朝執義説於梁庭敷高才於兔園雖正言而免刑闕里既已千載深儒流於末學欽仲舒之睟容遵縫掖於前躅對園囿而不窺下帷幕而論屬相端非之兩驕遭弘偃之雙慝恨有道之無時步險塗以側足聞宣武之大閲反師旅於此廛自皇運之都東始昌業以濟難抗素旄於秦嶺揚朱旗於巴川懼帝系之墜緒故黜昏而崇賢嘉收功已垂世嗟在嗣而覆旃德非陟而繼宰舋踰禹其必顛造步丘而長想欽太傅之遺武思嘉遁之餘風紹素履之落緒民志應而願稅國屯難而思撫譬乘舟之待楫象提釣之假縷總出入於和就兼仁用於默語弘九流以𢴲四維復先陵而清舊宇卻西州之成功指東山之歸豫惜圖南之啓運恨鵬翼之未舉發津潭而迥邁逗白馬以憩舲貫射陽而望邗溝濟通淮而薄角城城坡陀兮淮驚波平原遠兮路交過面艽野兮悲橋梓遡急流兮苦磧沙敻千里而無山緬百谷而有居被宿莽以迷徑覩生煙而知墟謂信美其可娛身少長於樂土實長歎於荒餘哀神形之具瘁值歲寒之窮節視曾雲之崔巍聆悲飆之掩屑彌晝夜以滯淫怨凝陰之方結望新晴於落日起明光於躋月眷轉蓬之辭根悼朔雁之赴越披微物而疚情此思心其可説問徭役其幾時駭閲景於興沒感曰歸於采薇豫來思於雨雪豈初征之懼對冀鸛鳴之在垤停驂騑于踰宿騖吾楫於邳鄉奚車正以事夏虺左相以輔湯綿三代而享邑廁踐土之一匡嗟仲幾之寵侮遂捨存以徵亡喜辥宰之善對美士彌之能綱升曲垣之逶迤訪淮陰之所都原入跨之達恥俟遭時以遠圖捨西楚以擇木逮南漢以定謨亂孟津而魏滅攀井陘而趙徂播靈威於齊橫振餘猛於龍且觀讓通而告狶曷始智而終愚迄沂上而停枻登高圯而不進石幽期而知賢張揣景而示信本文成之素心要王子於雲仞豈無纍於清霄直有概於貞吝始熙績於武關卒敷功於皇胤處夷險以解挫弘憂虞以時順矜若華之翳晷哀飛驂之落駿傷粒食而興念眷逸翮而思振戾臣山而東顧美相公之前代嗟殘虜之將糜熾餘猋於海濟驅鮐稚於淮曲暴鰥孤於泗澨託末命于風雲冀靈武之北閲惟授首之在晨當盛暑而選徒肅嚴威以振響漸溫澤而沾腴既雲撒於朐城遂席卷於齊都曩四關其奚阻道一變而是孚傷炎季之崩弛長逆布以滔天假父子以詐愛借兄弟以偽恩相魏武以譎狂宄謨奮於東藩桴未譟於東郭身已馘於樓門審貢牧於前説證所作於舊徐聆泗川之浮磬玩夷水之蠙珠草漸苞於熾壤桐孤幹於嶧隅慨禹迹於尚世惠遺文於夏書紛征邁之淹留彌懷古於舊章商伯文於故服咸徵名於彭殤眺靈壁之曾峰投呂縣之迅梁想蹈水之行歌雖齊汩其何傷啓仲尼之嘉問告性命以依方豈苟然於迂論聆寓言於達莊於是濫石橋登戲臺策馬釣渚息轡城隅永感四山零淚雙渠怨物華之推驛慨舟壑之遞遷謂徂歲之悠闊結幽思之方根感皇祖之徽德爰識沖而量淵降俊明以鏡鑑回風猷以昭宣道既底於國難惠有覃於黎元士頌歌於政教民謠詠於渥恩兼採芑之致美協漢廣之發言強虎氐之搏翼灟雲網於所禁驅黔萌以蘊崇取園陵而湮沈錫殘落於河西序淪胥於漢陰攻方城而折扃擾譙潁其誰任世闕才而貽亂時得賢而興治救祖考之邦壤在幽人而枉志體飛書之遠情悟犒師之通識逮明達之高覽契古今而同事拔淵謨於潛機騁神鋒於雲斾驅斥澤而風靡蹙坑谷而鳥竄中華免夫左衽江表此焉緩帶既剋黜於肥六又作鎮於彭沛晏皇圖於國內震天威於河外掃東齊而已寧指西崤而將泰值秉均而代謝實大業之興廢心無忝於樂生事有像於燕惠抱明哲之不伐奉宏勳而是稅捐七州以爰來歸五湖以投袂屈盛績於平生申遠期於暮歲訪曩載於宋鄙採陽秋於魯經晉申好於東吳鄭憑威於南荊故反師於曹門將以塞於夷庚納五叛以長寇伐三邑以侵彭美西鉏之忠辭快韓厥之奇兵追項王之故臺迹霸楚之遺端挺宏志於總角奮英勢於弱冠氣蓋天而倒日力拔山而傾湍始飆起於勾越中電激於衡關興偏慮於攸吝忘即易於所難忌陳錦而莫照思反鄉而有歎且夫殺義害嬰而豐疑緤賢不策失位誰持逮理屈而愈閉方怨天而懷悲對駿騅以發憤傷虞姝於末詞陟亞父之故營諒謀始之非託遭衰嬴之崩綱值威炎之結絡迄皓首於阜陵猶謬覺於然諾視一人於三傑豈在己之庸弱置豐沛而不舉故自同於俎鑊發汴口而遊歷迄西山而弭轡觀終古之幽憤懷元王之沖粹丁戰國之權爭方恬心於道肆學浮丘以就德友三儒以成類潔流始於初源纍仁基於前美撥楚族之休烈傳芳素於來祀強見譽於清虛德致稱於千里或避寵以辭姻或遺榮而不仕政直言以安身駿絶才以喪己驅信道之成終表昧世之虧始悟介焉之已差則不俟於終日既防萌於未著雖念德其何益爾乃孟陬發節雷隱蟄驚散葉荑柯芳花飾萌麥萋萋於旄丘柳依依於高城相雎鳩之集河觀鳴鹿之食蘋沂泗遠兮清川急秋冬近兮緒風襲風流蕙兮水增瀾訴愁襟兮鑑戚顏愁盈根而薀際戚發條而成端嗟我行之彌日待征邁而言旋荷慶雲之優渥周雙七於此年陶逸豫於京甸違險難於行川轉歸舷而眷戀望修檣而流漣願關鄴之遄清遲華鑾之凱旋穆淳風於六合溥洪澤於八埏頒賢愚於大小順規矩於方圓固四民之獲所宜稅稷於萊田苦邯鄲之難步庶行迷之易痊長守朴以終稔亦拙者之政焉宋書謝靈運傳又略見藝文類聚五十九
