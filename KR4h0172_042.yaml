body:
  text: 陸徽薦朱萬嗣表臣聞陵雪褎穎貞柯必振尊風賞流清原斯挹是以衣囊揮譽於西京折轅延高於東帝伏見廣州別駕從事史朱萬嗣年五十三字少豫理業沖夷秉操純白行稱私庭能著官政雖氏非世祿宦無通資而隨牒南服位極僚首九綜州綱三端府職頻掌蕃機屢績符守年暨知命廉尚愈高冰心與貪流爭激霜情與晚節彌茂歷宰金山家無寶鏤之飾連組珠海室靡璫珥之珍確然守志不求聞達實足以澄革汙吏洗鏡貪氓臣謬忝司牧任專萬里雖情祗慎擢才闕豪露敢罄愚陋舉其所知如得提名禮闈抗迹朝省摶嶺表之清風負冰宇之潔望則恩融一臣而施光萬物敢緣天澤雲行時德雨施每甄外州榮加遠國是以獻其瞽言希垂聽覽宋書陸徽傳薦龔穎表臣聞運纏明夷則艱貞之節顯時屬棟撓則獨立之操彰昔之元興皇綱弛紊譙縱乘釁肆虐巴庸害殺前益州刺史毛璩竊據蜀士涪岷士庶怵迫受職璩故吏龔穎獨秉身貞白抗志不撓殯送舊君哀敬盡禮全操九載不染僞朝縱雖殘凶猶重義概遂延以旌命劫以兵威穎忠誠奮發辭色方壯雖桎梏在身踐危愈信其節白刃臨頸見死不更其守若王蠋之抗辭燕軍同周苛之肆詈楚王方之於穎蔑以加焉誠當今之忠壯振古之遺烈而名未登於王府爵猶齒於卿曹斯實邊岷遠土所為於邑臣過叨恩私宣風萬里志存砥竭有懷必聞故率愚愨舉其所知追懼紕妄伏增㦜㮚宋書龔穎傳元喜二十四年刺史陸徽上表上言移鎮東陽城被攻毀壤不可守移鎮長廣之不期城宋書索虜傳奏理廬陵王義真臣聞仁義之在天下若中原之有菽理感之被萬物故不繫於貴賤是以考叔反悔誓於及泉壼關復冤魂於湖邑當斯之時豈無尊卿賢輔或以事迫心違或以道壅謀屈何嘗不願聞善於輿隸藥石阿氏哉臣雖草芥備充黔首少不量力頗高殉義之風謂蹈善於朝聞愈徒生於白首用敢干禁忘戮披敘丹愚伏惟高祖武皇帝誕茲神武撫運龍興仰清天步則齊德有虞俯廓九州則侔功大夏故虔順天人享有萬國雖靈祚修長聖躬弗永陛下繼明紹統遐邇一心藩王哲茂四維寧謐傾耳康哉之詠企踵升平之風竊念廬陵王少蒙先皇優慈之遇長受陛下睦愛之恩故在心必言所懷必亮容犯臣子之道致招驕恣之愆至於天姿夙成實有卓然之美宜在容養録善掩瑕訓盡義方進退以漸今猥加剝辱幽徙遠郡上傷陛下棠棣之篤下令遠近恇然失圖士庶杜口人為身計臣伏思大宋之興雖協應符緯而開基造次根條未繁宜廣樹藩戚敦睦以道使兄弟之美比輝魯衛龜策告同祚均七百豈不善哉陛下富於春秋慮未重復忽安危之遠算肆不忍於一朝特願留神九思重加詢采上考前代興亡之由中存武皇締構之業下顧蒼生顒顒之望時開曲宥反王都邑選保傅於舊老求四友於髦俊引誘情性導達聰明几人在苦皆能自厲況王質朗心聰易加訓範且中賢之人未能無過過貴自改罪願自新以武皇之愛子陛下之懿弟豈可以其一眚長致淪棄哉謹昧死詣闕伏地以聞惟願丹誠一經天聽退就斧鑊無愧地下矣宋書廬陵王義真傳納款世祖啓劉誕猖狂遂搆釁逆凡在含齒莫不駭惋臣等預荷國恩特百常憤忽以今月二十四日中獲賊誕疏欲見邀誘臣即共執録僞使并得誕與撫軍長史沈懷文揚州別駕孔道存撫軍中兵參軍孔璪前司兵參軍孔桓之前司空主簿張晏書具列本郡太守王曇生臣即日便應星馳歸骨輦轂臣母年老身在侍養輒遣息寶素寶先束骸詣闕宋書顧琛傳大明三年竟陵王誕反世祖以琛素結事誕或有異志遣使就吳郡太守王曇生誅琛父子會延稔先至琛等既執斬之遣遣子送延稔首啓世祖云云世祖所遣誅琛使其日亦送至僅而獲免馳書報父琛南師已近朝廷孤弱不時順從必有覆滅之禍宋書唐賜妻子事議法移路尸猶為不道況在妻子而忍行凡人所不行不宜曲通小情當以大理為斷謂副為不孝張同不道宋書顧覬之傳南史三十五通典一百六十七定命論仲尼云道之將行命也道之將廢命也丘明又稱天之所支不可壤天之所壤不可支卜商亦曰死生有命富貴在天孟軻則以不遇魯侯為辭斯則運命奇偶生數離合有自來矣馬遷劉向揚雄班固之徒著書立言咸以為首世之論者多有不同嘗試申之曰夫生之資氣清濁異原命之稟數盈虛乖致是以心貌詭貿性運舛殊故有邪正昏明之差修夭榮枮之序皆理定於萬古之前事徵於千代之外沖神寂鑒一以貫之至乃卜相末技巫史賤術猶能豫題興亡逆表成敗禍福指期讖照不能徙吉凶素著威衛不能防若夏氓宅生於帝宮豈蠲殘傷之崇漢臣衍貨於天府寧免餧斃之魂且又善惡之理雖詳而禍福之驗常昧逆順之體誠分而吉凶之效常隱智絡天地猶罹沈牖之災明照日月必嬰深匡之難增信積德離患於長飢席義枕仁徼禍於促算何則理運苟其必至聖明其猶病諸況乃蕞迹流惑之徒投心顓蒙之域而欲役慮以揣利害策情以笇窮通其為重傷豈不惑甚是以通人君子間泰其神沖緩其度不矯俗以延聲不依世以期榮審乎無假自求多福榮辱修夭夫何為哉問曰夫書稱惠迪貽吉易載履信逢祐前哲餘議亦以將迎有會淪塞無兆宣攝有方夭閼無命善游銷魂於深梁工騎燼生於曠野明珠招駭於暗至蟠木取悅於先容是以罕樂以陽施長世景惠以陰德遐紀彭竇以繕衛延命盈忌以荒湎促齡陳張稱台鼎之崇嚴辛衍宰司之盛若乃遊惡蹈凶處逆踐禍宣昭史策易以研正至如神仙所序天竺所書事雖難徵理未易詰留滯傾光思聞通裁對曰子可謂扶繩而辨循刻而議若乃宣攝有方豈非吉運所屬將迎有會實亦凶數自挻若夫陽施陰德長世遐年揆厥所原孰往非命研復來指讎校往說起豫惟商未讖所異資生稟運參差萬殊逆順吉凶理數不一原夫餐椒非養生之術咀劍豈衛性之經命之所延人肉其骨而含嚼膏粱時或嬰患深澗乖徼寵之津空谷絶探榮之轍運之所集物稊其枯而俯仰竿牘終然離沮爾乃蹻跖橫行曾原窘步湯周延世詡邑絶緒吉凶徵應糾纏若茲畢萬保軀密賤傷領梁野之言豈不或妄穀南魯北甘此促生彭翁竇叟將以何術晉平趙敬淫放已該漢主魏相奚獨傷夭同異若斯是非孰正至如雷濱凝分挫志遠圖棘津陰拱振功高世樊生沖矯鐫旌善之文華子高抗銘懲非之策皆士衡所云同川而異歸者也殊塗均致實繁有徵即理易推在言可略昔兩都全盛六合殷昌霧集貴寵之閭雲動權豪之術鈞貿貽談豐唯陳張而已觀夫二子才未越衆而此以藉榮揮價彼獨擯景淪聲通否之運斷可知矣嚴辛不安時任命而委罪亮直亦地脈之徒歟若神仙所序顯明修習齊彊燕平厥驗未著李覃董芬其效安在喬松之侶雲飛天居夷列之徒風行水息良由理數懸挺實乃鍾茲景命天竺遺文星華方策因造前定果報指期貧豪莫差修夭無爽有允瑣辭無愆鄙說統而言之孰往非命冥期前定各從所歸善惡無所矯其趨愚智焉能殊其理若乃得議其工失蚩其拙操之則栗舍之則悲斯固染情於近纍豈不貽誚於通識問曰清論光心英辨溢目求諸鄙懷良有未盡若動止皆運險易自天理定前期靡非暗至玉門犁丘睿識弗免豈非聖愚齊致仁虐同功昏明之用將何施而可對曰夫聖人懷虛以涵育凝明以洞照惟虛也故無往而不通惟明也故無來而不燭涸海流金弗染溫涼之岨巖兵猛兕無纍爪刃之災忘生而生愈全遺神而神彌暢若玉門犁丘蓋同迹於人故同人有患然而均心於天亦均天無害大賢則禮備形器慮盡藏假靜默以居否深拱以違礥皆數在清全故鍾茲妙識是以稟仲尼之道不在奔車之上資伯夷之運不處覆舟之下若乃越難趨險逡巡弗護履危踐機僶俯從事愚之所司聖亦何為及中下之流馳心妄動是非舛幹倚伏移貿故北宮意逆而功順東門心晦而迹明宣應遺筮而逢吉張松協數而遘禍且智防有紀患纍無方爾乃猘狗逐而華子奔腐鼠遺而虞氏滅匣猿逸而林木殘櫝珠亡而池水竭凡厥條流曲難詳備搖形役思其效安徵豈若澡雪靈府洗練神宅據道為心依德為慮使迹窮則義斯暢身泰則理兼通豈不美哉何必遺此而取彼問曰夫建極開化樹聲貽則典防之興由來尚矣必乃幽府懸兆冥數指期善惡前徵是非數定名教之道不亦幾乎息哉對曰天生蒸民樹之物則教義所稟豈非冥數何則形氣之具必有待而存顓蒙之倫豈無因而立必假纖紈以安生藉粱豢以延祀資信禮以繕性秉廉義以劾情聖人聰明深懿履道測化通體天地同情日月仰觀俯察撫運裁風於是乎昭日星之紀正霜雨之度張雲霞之明衍風露之渥浮舟翼滯騰駕振幽又乃甄理三才辨綜五德宏鋪七體之瑞宣昭八經之緒是以時雍在運群方自通抱德煬和全真保性故信食相資代為脣齒富教相假遞成輔車今弛棄纖紈損絶粱豢必云徼生委命豈不已曉其迷至乎湮斥廉義屏黜信禮責以祈存推數遂乃未辨其惑連類若斯乖妄滋甚然則教義之道生運所資寵辱榮枯常由此作斯固命中之一物非所以為難也問曰循復前旨既以理命縣兆生數冥期研覆後文又云依杖名教帥循訓範若藉數任天則放情蕩思拘訓馴範則防慮檢喪函矢殊用矛戈異適雙美之談豈能兩遂對曰夫性運乖舛心貌詭殊請布末懷略言其要若乃吉命所鍾縱情蹈道訓性而順因心則靈凶數所挻率由踐逆聞言不信長惡無悛此愚智不移聲訓所遺者也其有見善如不反從諫如順流是則命待教全運須化立譬以良醫之室病者所存至如澄神清魂平心實氣無妄之痾勿藥有喜所謂縱情蹈道無假隱括若膏盲之疾長桑不治體府之病陽慶弗理此則率由踐逆自絶綢御至乃趙儲之命宜永須扁鵲而後全齊后之數必延待文擊而後濟亦猶運鍾循獎彝範所興善惡無主唯運所集而異膏粱方丈沈疾弗顧瑤碧盈尺阽危弗存夫靜躁之容造次必於是曲直之性顛沛不可移是以夷惠均聖而異方遵竦齊通而殊事雖復鉗桎羿奡思復巢許之情捶勒曾史言膺蹻跖之慮不然之事斷可知也必幽符鑽仰冥數修習雖存陵惰其可得乎故運屬波流勢無防慮命徼山立理無放情用殊函矢雙美奚躓談異矛戈兩濟何傷問曰夫君臣恩深師資義固所以霑榮塗施提飾荷聲故刳心流腸捐生以抗節火妻灰子薶名以償義若幽期天兆則明敡可遺冥數目賓則感效宜絶豈其然乎對曰論之所明原本以為理難之所疑即末以為用蓋陰閉之巧不傳萌漸之調長絶故知妄言賞理古人所難吾所謂命固以綿絡古今彌貫終始爰及君臣父子師友夫妻皆天數冥合神運玄至逮乎睽愛離會既命之所甄昏爽順戾迹運之所漸爾乃松柳異質薺荼殊性故疾風知徑草嚴霜識貞木何異忠孝之質資行夙昭至於刻志酬生題誠復施殉節投命馴義忘己亦由石雖可毀堅不可銷丹雖可磨赤不可滅因斯而言君臣師資既幽期自賓心力感效亦冥數天兆夫獨何怪哉宋書顧覬之傳覬之常謂秉命有定分非智力所移唯應恭己守道信天任運而暗者不達妄求僥幸徒虧雅道無關得喪乃以其意命弟子願著定命論其辭曰云云奉迎文帝登極表侍中臣琇散騎常侍臣嶷之中書監尚書令護軍將軍建城縣公臣亮左衛將軍臣景仁給事中游擊將軍龍鄉縣侯臣隆越騎校尉都亭侯臣綱給事黃門侍郎臣孔璩之散騎侍郎臣劉思考員外散騎侍郎臣潘盛中書侍郎臣何尚之羽林監封陽縣開國侯臣蕭思話長兼尚書左丞德陽縣侯臣孫康吏部郎中騎都尉臣張茂度儀曹郎中臣徐長琳倉部郎中臣庾俊之都官郎中臣袁洵等上表曰臣聞否泰相革數窮則變天道所以不諂卜世所以靈長乃者運距陵夷王室艱晦九服之命靡所適歸高祖之業將墜於地賴基厚德深人神同獎社稷以寧有生獲乂伏惟陛下君德自然聖明在御孝悌著於家邦風猷宣於蕃牧是以徵祥雜沓符瑞㸌輝宗廟神靈乃眷西顧萬邦黎獻望景託生臣等忝荷朝列豫充將命復集休明之運再覩太平之業行臺至止瞻望城闕不勝喜悅鳧藻之情謹詣門拜表以聞宋書文帝紀
