body:
  text: 王淮之奏請三年之喪用鄭義鄭玄注禮三年之喪二十七月而吉古今學者多謂得禮之宜晉初用王肅議祥禫共月故二十五月而除遂以為制江左以來唯晉朝施用之縉紳之士猶多遵玄義夫先王制禮以大順群心喪也寍戚著自前訓今大宋開泰品物遂理愚謂宜同即物情以玄義為制朝野一禮則家無殊俗宋書王准之傳永初二年奏又南史二十四又通典八十永初元年黃門侍郎王准之奏刑法議昔為山陰令士人在伍謂之押符同伍有愆得不及坐士人有罪符伍糾之此非士庶殊制實使即刑當罪耳夫束之冑與小人隔絕防檢無方宜及不逞之士事接群細既同符伍故使糾之於時行此非唯一處左丞議奴客與鄰伍相關可得檢察符中有犯使及刑坐即事而求有乖實理有奴客者類多使役東西分散住家者少其有停者左右驅馳動止所須出門甚寡典計者在家十無其一奴客坐伍濫刑必眾恐非立法當罪本旨右丞議士人犯偷不及大辟者宥補兵雖欲弘士懼無以懲邪乘理則君子違之則小人制嚴於上猶冒犯之以其宥科犯者或眾使畏法其心乃所以大宥也且士庶異制意所不同宋書王弘傳弘與八座丞郎疏左丞江奧右丞孔默之尚書王淮之殿中丞謝元吏部尚書何尚之皆有議芍藥華賦原夫神區之麗草兮憑厚德而挺受翕光液而發藻兮颺暉而振秀蓺文類聚八十一野騖賦翾翾雙鶩體蕞羽微和鳴愧雁麗采慚翬仰鵠推高瞻隼憚威遵時弄音假日于飛爾乃湛淡揚瀾俛仰威疇心矜遠野意惕近洲蓺文類聚九十一與何偃書吾與義興直恨相知之晚每惟君子知我若夫嘉我小善矜余不能惟賢叔耳宋書何尚之傳偃叔父悠之為義興太守侍中太常與琅邪王徽相善悠之卒徽與偃書與江湛書弟心病亂度非但蹇躄而已此處朝野所共知騶會忽扣蓽門閭里咸以為祥怪君多識前世之載天值何其易傾弟受海內駭笑不過如燕石禿鶖邪未知君何以自解於良史邪今雖王道鴻鬯或有激朗於天表必欲探潛援寶傾海求珠自可卜肆巫祠之閒馬棧牛口之下當劇孟於博徒拔卜式於芻牧亦有西戎孤臣東都戒士上窮範馳之御下盡詭遇之能兼鱗雜襲者必不乏於世矣且廬於承明署乎金馬皆明察之官又賢於管庫之末何為劫勒通家疾病人塵穢難甚之選將以靖國不亦益囂乎書云任官惟賢才而君擢士先疹廢芃芃棫樸似不如此且弟曠違兄姊迄將十載姊時歸來終不任輿曳入閤兄守金城永不堪扶抱就路若不憊疾非性僻而何此君曰表裏無假長目飛耳也常謂生遭太公將即華士之戮幸還管叔必蒙僻儒之養光武以馮衍才浮其實故棄而不齒諸葛孔明云來敏亂群過於孔文舉況無古人之才概敢干周漢之常刑彼二三英賢足為曉治與否恐君逢此時或亦不免高閤乃復假名不知己者豈欲自比衛賜邪君欲高斅山公而以仲容見處徒以搥提禮樂本不參選鄙夫瞻彼固不任下走未知新沓何如州陵耳而作不師古坐亂官政誣飾蚯蚓冀招神龍如復託以真素者又不宜居華留名有害風俗君亦不至期人如此若交以為人賜舉未以己勞則商販之事又連所不忍聞也豈謂不肖易擢貪者可誘凡此數者君必居一焉雖假天口於齊駢藉鬼說於周季公孫碎毛髮之文莊生縱漭瀁之極終不能舉其契為之辭矣子將明魂必靈咍於萬里汝穎餘彥將拂衣而不朝浮華一開風俗或從此而爽鬼谷以揣情為最難何君忖度之輕謬今有此書非敢叨擬中散誠不能顧影負心純盜虛聲所以綿格累紙本不營尚書虎爪板也成童便往來居舍晨省復經肚旋加有諸甥亦何得頓絕慶弔然生平之意自於此都盡君平公云生我名者殺我身天爵且猶滅名安用吏部郎哉其舉可陋其事不經非獨縉紳者不道僕妾皆將笑之忽忽不樂自知壽不得長且使千載知弟不詐諼耳宋書王微傳吏部尚書江湛舉微為吏部郎微與湛書又略見蓺文類聚四十八與從弟僧綽書吾雖無人鑒要是早知弟每共宴語前言何嘗不以止足為貴且持盈畏滿自是家門舊風何為一旦落寞至此當局苦迷將不然邪詎容都不先聞或可不知耳衣冠冑胤如吾者甚多才能固不足道唯不傾側溢詐士頗以此容之至於規矩細行難可詳料疹疾日滋縱肆益甚人道所貴廢不復脩幸值聖明兼容置之教外且舊恩所及每蒙寬假吾亦自揆疾疹重侵難復支振民生安樂之事心死久矣所以解日偷存盡於大布糲粟半夕安寢便以自度血氣盈虛復稍道長以大散為和羹弟為不見之邪疾廢居然且事一己上不足敗俗傷化下不至毀辱家門泊爾尸居無方待化凡此二三皆是事實吾與弟書不得家中相歎也州陵此舉為無所因反覆思之了不能解豈見吾近者諸牋邪良可怪笑吾少學作文又晚節如小進使君公欲民不偷每加存飾詶對尊貴不厭敬恭且文詞不怨思抑揚則流澹無味文好古貴能連類可悲一往視之如似多意當見居非求志清論所排便是通辭訴屈邪爾者真可謂真素寡矣其數旦見客小防自來盈門亦不煩燭舉吉也此輩乃云語勢所至非其要也弟無懷居今地萬物初不以相非然魯器齊虛實宜書紳今三署六府之人誰表裏此內儻疑弟豫有力於素論何如哉則吾長扼不死終誤盛壯也江不過彊久拂吾云是巖穴人巖穴人情所高吾得當此則雞鶩變作鳳皇何為干飾廉隅秩秩見於面目所惜者大耳諸舍闔門皆蒙時私此既未易陳道故常因含聲不言至兄弟尤為叨竊臨海頻煩二郡謙亦越進清階吾高枕家巷遂至中書郎此足以闔棺矣又前年優旨自弟所宣雖夏后無辜人周宣及鰥寡不足過也語皆循檢校迹不為虛飾也作人不阿諛無緣頭髮見白稍學諂詐且吾何以為足不能行自不得出戶頭不耐風故不可扶曳家本貧餧至於惡衣蔬食設使盜跖居此亦不能兩展其足妄意珍藏也正令選官設作此舉於吾亦無劍戟之傷所以懃懃畏人之多言也管子晉賢乃關人主之輕重此何容易哉州陵亦自言視明聽聰而返區區飾吾何辯致而下英俊夫奇士必龍居深藏與蛙蝦為伍於勳其猶難之林宗輩不足識也似不肯睠睠奉牋記彫琢獻文章居家近市廛親戚滿城府吾猶自知袁陽源輩當平此不飾詐之與直獨兩不關吾心又何所耿介弟自宜以解塞群賢矣兼悉怒此言自爾家任兄故能也日日望弟來屬病終不起何意向與江書粗布胸心無人可寫比面乃具與弟書便覺成本以當半日相見吾既惡勞不得多語樞機幸非所長相見亦不勝讀此書也親屬欲見自可示無急付手宋書王微傳微既為始興王濬府吏濬數相存慰微奉荅牋書輒飾以辭采微為文古甚頗抑揚袁淑見之謂為訴屈微因此又與從弟僧綽書又略見蓺文類聚四十八報何偃書卿昔稱吾於義興吾常謂之見知然復自悝鄙野不參風流未有一介熟悉於事何用獨識之也近日何見綽送卿書雖知如戲知卿固不能相哀苟相哀之未知何相期之可論卿少陶玄風淹雅脩畼自是正始中人吾真庸性人耳自然志操不倍王樂小兒時尤麤笨無好常從博士讀小小章句竟無可得口吃不能劇讀遂絕意於尋求至二十左右方復就觀小說往來者見床頭有數帙書便言學問試就檢當何有哉乃復持此擬議人邪尚獨愧笑揚子之褎贍猶恥辭賦為君子若吾篆刻菲亦甚矣卿諸人亦當尤以此見議或謂言深博作一段意氣鄙薄人世初不敢然是以每見世人文賦書論無所是非不解處即日借問此其本心至於生平好服上藥起年十二時病虛耳所撰服食方中粗言之矣自此始信攝養有徵故門冬昌朮隨時參進寒溫相補欲以扶護危羸見冀白首家貧乏役至於春秋令節輒自將兩三門生入草采之吾實倦遊醫部頗曉和藥尤信本草欲其必行是以躬親意在取精世人便言希仙好異矯慕不羈不同家頗有罵之者又性知畫繢蓋亦鳴鵠識夜之機盤紆糾紛或記心目故兼山水之愛一往迹求皆仿像也不好詣人能亡榮以避權右宜自密應對舉止因卷慚自保不能勉其所短耳由來有此數條二三諸賢因復架累致之高塵詠之清壑瓦礫有資不敢輕廁金銀也而頃年嬰疾沈淪無已區區之情愒於生存自恐難復而先命猥加魂氣褰爾常人不得作常自處疾苦正亦臥思已熟謂有記自論既仰天光不夭庶類兼望諸賢共相哀體而卿首唱誕言布之翰墨萬石之慎或未然邪好盡之累豈其如此綽大駭歎便是闔朝見病者吾本儜人加疹意惛一旦聞此便惶怖矣五六日來復苦心痛引喉狀如匈中悉腫甚自憂力作此荅無復條貫貴布所懷落漠不舉卿既不可解立欲便別且當笑宋書王微傳時論者或云微之見舉廬江何偃亦豫其議慮為微所咎與書自陳微報之以書告弟僧謙靈弟年十五始居宿於外不為察慧之譽獨沈浮好書聆琴閒操輒有過目之能討測文典斟酌傳記寒暑未交便卓然可述吾長病或有小間輒稱引前載不異舊學自爾日就月將著名邦黨方隆夙志嗣美前賢何圖一旦冥然長往酷痛煩冤心如焚裂尋念平生裁十年中耳然非公事無不相對一字之書必共詠讀一句之文無不研賞濁酒忘愁圖籍相慰吾所以窮而不憂實賴此耳奈何罪酷煢然獨坐憶往年散發極目流涕吾不舍日夜又恆慮吾羸病豈圖奄忽先歸冥冥反覆萬慮無復一朝音顏髣髴觸事歷然弟今何在令吾悲窮昔仕京師分張六旬耳其中三過誤云今日何意不來鍾念懸心無物能譬方欲共營林澤以送餘年念茲有何罪戾見此夭酷沒於吾手觸事痛恨吾素好醫術不使弟子得全又尋思不精致有枉過念此一條特復痛酷痛酷奈何吾罪奈何弟為志奉親孝事兄順雖僮僕無所叱咄可謂君子不失色於人不失口於人沖和淹通內有皁白舉動尺寸吾每咨之常云兄文骨氣可推英麗以自許又兄為人矯介欲過宜每中和道此猶在耳萬世不復一見奈何唯十紙手迹封坼儼然至於思戀不可懷及聞吾病肝心寸絕謂當以幅巾薄葬之事累汝奈何反相殯送弟由來意謂婦人雖無子不宜踐二庭此風若行便可家有孝婦仲長昌言亦其大要劉新婦以刑傷自誓必留供養殷太妃感柏舟之節不奪其志僕射篤順范夫知禮求得左率第五兒廬位有主此必何益冥然之痛為是存者意耳吾窮疾之人平生意志弟實知之端坐向窗有何慰適正賴弟耳過中未來已自愒望今云何得立自省惛毒無復人理比煩冤困憊不能作刻石文若靈響有識不得吾文豈不為恨儻意慮不遂謝能思之如狂不知所告訴明書此數紙無復詞理略道阡陌萬不寫一阿謙何圖至此誰復視我誰復憂我他日寶者三光割嗜好以祈年今也唯速化耳吾豈復支冥冥中竟復云何弟懷隨和之寶未及光諸文章欲收作一集不知忽忽當辨此不今已成服吾臨靈取常共飲桮酌自釀酒寍有仿像不冤痛冤痛宋書王微傳弟僧謙亦有才譽為太子舍人遇疾微躬自處治而僧謙服藥失度遂卒微深自咎恨發病不復自治哀謙不能已以書告靈茯苓讚皓苓下居披紛上薈中狀雞鳧具容龜蔡神俟少司保延幼艾終志不移柔紅可佩初學記二十大觀本草十二禹餘糧讚疏波瀝浸徒謂範常沈靈祕用神哉无方阡疇不惠稼穡非芳明德禹功信在餘糧初學記二十桃飴讚阿鹿續氣胡膠屬絃未若桃飴越地通天液首化玉酡貌定仙人知暍日胡不蔭年初學記二十大觀本草二十三黃連讚黃連苦味左右相因斷涼滌暑闡命輕身縉雲昔御飛蹕上旻不行而至吾聞其人初學記二十大觀本草七遺令薄葬不設轜鼓挽之屬施五尺床為靈二宿便毀以嘗所彈琴置床上何長史來以琴與之宋書王微傳元嘉二十年卒時年二十九僧謙卒後四旬而微終遺令云云荅詔亡父亡祖司徒司空南史二十一表謝不能因依左右傾意權貴南史二十一上表解職臣自審庸短少闕宦情兼宿抱重疾年月稍甚生平素念願閑衡廬先朝追遠之恩早見榮齒曩者以親貧須養僶俛從祿解褐後府十有餘旬俄遷舍人殆不朝直實無緣坐閱宸寵尸爵家庭情計二三屢經聞啟終獲允亮賜反初服還私未用又擢為洗馬意旨優隆其令且拜許有郡缺當務處置會琅邪遷改即蒙敕往反神翰慈誘殷勤令裝成即自隨靈寶往年淪覆長溪因彼散失仰感沈恩俯銘浮寵臣釁積禍并仍丁艱罰聊及視息即蒙逮問具啟以奉營情事負舉猥多賜蒞宣城極其窮躓仲春移任方冬便值虜南侵臣忝同肺腑情為義動苦求還都侍衛輦轂至止之日戎旗已搴在郡雖淺而貪得分了方拂農衣還事耕牧宣城民庶詣闕見請爾時敕亡從兄僧綽宣見留之旨闇疾寡任野心素積仍附啟苦乞且旋任還務未明亡兄臣錫奄見棄背啟解奔赴賜帶郡還都曾未淹積復除義興臣自天飛海泳豈假鱗翼徒思橫施與日而深自處官以來未嘗有涓豪之積羸疾闇疚又無人一諾而性狎林水偏愛禽魚議其所託動乖治要故收崖斂分無忘俄頃實由有待難供上裝未立東郡奉輕西郟祿重具陳蘄懇備執初願置乞江湘遠郡一二年中庶反耕之日糧藥有寄即蒙亮許當賜矜擢遭逢厄運天地崩離世蒙聖朝門情之顧及在臣身復荷殊識義雖君臣恩猶父子臣誠庸蔽心過草木奉諱之日不覺捐身單軀弱嗣千里共氣繼罹凶塗動臨危盡生微朝露不察如絲信順所扶得獲全濟再見天地重覩三光於時兄子僧亮等幽窘醜逆盡室獄戶山川嶮岨吉凶路塞悠遠之思誰能勿勞嘗膽濡足是其公願分心挂腹實亦私苦幸屬聖武剋復大業宇宙廓清四表靖晏臣父子叔姪同獲泰辰造情追尋歸骨之本欲以死明心誤有餘辰情願已展避逆向順終古常節智力無效有何勳庸而頻煩恩榮勳踰分次但忽病之日不敢固辭故吞訴於鵲渚飲愧於新亭及元凶既殄人神獲乂端右之授即具陳請天慈優渥每越常倫南蠻護軍旬月私授臣三省非分必致孤負居常輕任尚懼網墨況參要內職承寵外畿其取覆折不假識見故披減啟訴表疏相屬或乞輕高就卑或願以閑易要言誓致苦播於辭牘誠知固陋當觸明科去歲往年累犯刑禁理無申可罪有恆典虛穢朝序慚累家業臣甘其終物議其盡陛下棄其身瑕矜其貴戚迂略法憲典相全養臣一至之感口此何忘利伊恩升加以今位當時震驚收足失所本忘閉情不敢聞命內慮於己外訪於親以為天地之仁施不期報再造之恩不可妄屬故洗拂灰壤登沐膏露上處聖澤下更生辰合芳離蛻訃邇改觀但偷榮託幸忽移此歲自見妨長轉不可寍宜其沈放志事俱盡伏願陛下承太始之德加成物之恩及臣狂蔽未至得於榮次自引聖朝厚終始之惠孤臣保不泯之澤夫讓功為高臣無功而讓專素為美臣榮采已積以是求退誠亦可愍又妻子為居更無餘累婢僕十餘粗有田入歲時是課足繼朝昏兼比日眩瞀更甚風虛漸劇湊理合閉榮衛惛底心氣沖弱神志衰散念此根疵不支歲月公私誠願宜蒙亮許乞徇餘辰以終瑣運白水皎日不足為譬願垂矜鑑哀申此請宋書王僧達傳求徐州啟臣衰索餘生逢辰籍業先帝追念功臣睠及遺賤飾短捐陋布策稠采從官委褐十有一載早憑慶泰脫親盛明而有志於學無獨見之敏有務在身無偏鑒之識固不足建言世治備辯時宜竊以天恩不可終報尸素難可久處故猖狂蕪謬每陳所懷陛下孝誠發衷義順動物自龍飛以來實應九服同歡三光再朗而臣假視巷里借聽民謠黎氓未締其感遠近風議不獲稍進臣所用夙宵疾者寤寐疚心者也臣取之前載譬之於今當漢文之時可謂藉已成之業據既安之運重以布衣菲食憂勤治道而賈誼披露迺誠猶有歎哭之諫況今承顛沛萬機惟始恩未及普信未遑周臣又聞前達有言天下重器也一安不可卒危一危亦不可卒安陛下神思淵通亦當鑒之聖慮竊謂今之務惟在萬有為已家國同憂允彼庶心從民之欲民有咨瘼之聲君表納隍之志下有愆弊之苦上無侈豫之情又應官酌其才爵疇其望與失不賞寍失不刑至若樞任重司藩扞要鎮治亂攸寄動靜所歸百度惟新或可因而弗革事在適宜無或定其出處天下多才在所用之臣非惟寄觀世路謬識其難即之於身詳見其弊何者臣雖得免牆面書不入於學伍行無愆戾自無近於才能直以廕託門世夙列榮齒且近雖奔迸江路歸命南闕竟何功效可以書賞而頻出內寵陛下綢繆數旬之中累發明詔自非才略有素聲實相任豈可聞而弗驚履而無懼固宜退省身分識恩之厚不知報荅當在何期夫見危致命死而後已皆殷勒前誥重其忘生臣感先聖格言思在必效之地使生獲其志死得其所如使臣享厚祿居重榮衣孤在熊而無事於世者固所不能安也今四夷猶警國未忘戰辮髮凶詭尤宜裁防閒者天兵未獲已肆其輕漢之心恐戎狄貪惏猶懷匪遜脫以神州暫擾中夏兵機容或游魂塞內重窺邊壘且高秋在節胡馬興威宜圖其易蚤為之所臣每一日三省志在報效遠近大小顧其所安受效偏方得司者則慮之所辨情有不疑若首統軍政董勒天兵既才所不周實誠亦非願陛下矜諒已厚願復曲體此心護軍之任臣不敢處彭城軍府即時過立且臣本在驅馳非希崇顯輕智小號足以自安願垂鑑恕特賜申獎則內外榮荷存沒銘分宋書王僧達傳與沈璞書足下何如想館舍正安士馬無恙離析有時音旨無日憂詠沈吟增其勞望閒者獯獫扈橫掠剝邊鄙郵販絕塵坰介靡達瞻江眄淮眇然千里吾聞經陽梗棘伊滑荐遁鳥集絃絕憲深自占承知迺昔寇苦城境勝冑朝飡伍甲宵舍烽鼓交警羽鏑驟合而足下砥兵礪伍總厲豪彥師請一奮氓無貳情遂能固孤城覆嚴對陷死地覿生光古之田孫何以尚茲商驛始通粗知梗概崇讚膽智嘉賀文猛甚善甚善吾近以戎暴橫斥規效情命收龜落簪星舍京里既獲遄至胡馬卷迹支離霑德復繼前緒行葦之懽實協初慮但乖塗重隔顧增慨涕比恆疾臥憂委兼疊裁書送想無斁久懷宋書白序荅丘珍孫書褚先生從白雲游舊矣古之逸民或留慮兒女或使華陰成市而此子索然唯朋松石介於孤峰絕嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪薜蘿若已窺煙液臨滄洲矣知君欲見之輒當申譬南齊書褚伯玉傳南史褚伯玉傳祭顏光祿文維宋孝建三年九月癸丑朔十九日辛未王君以山羞野酌敬祭顏君之靈鳴呼哀哉夫德以道樹禮以仁清惟君之懿早歲飛聲義窮機彖文蔽班楊性婞剛潔志度淵英登朝光國實宋之華才通漢魏譽浹龜沙服爵帝典棲志雲阿清交素友比景共波氣高叔夜嚴方仲舉逸翮獨翔孤風絕侶流連酒德嘯歌琴緒遊顧移年契闊燕處春風首時爰談爰賦秋露未凝歸神太素明發晨駕瞻廬望路心悽目泫情條雲互涼陰掩軒娥月寢耀微燈動光几牘誰炤衾衽長塵絲竹罷調攬悲蘭宇屑涕松嶠古來共盡牛山有淚非獨昊天殲我明懿以此忍哀敬陳奠饋申酌長懷顧望歔欷嗚呼哀哉文選
