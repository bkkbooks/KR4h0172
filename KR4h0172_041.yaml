body:
  text: 趙迫符以息倩犯罪乞解侍中護軍表臣識慚羊媼慮闕日磾致咎猖狂初不自悟形影相弔心情喪恧無宜復管司喉脣作統連率藝文類聚五十四贈王孚孝廉板教前文學主簿王孚行潔業淳棄華息競志學修道老而彌篤方授右職不幸暴亡可假孝廉檄薦以特牲緬想延陵以遂本懷宋書自序陳府事啓伏見西府兵士或年幾八十而猶伏隸或年始七歲而已從役衰耗之體氣用湮微兒弱之軀肌膚未實而使伏勤昏稚騖苦傾晚於理既薄為益實輕書制休老以六十為限役少以十五為制若力不周務故當粗存優減宋書自序陳營創城府功課經始城宇莫非造創基築既廣夫課又嚴不計其勞苟務其速以歲月之事求不日之成比見役人未明上作閉鼓乃休呈課既多理有不逮至於息日拘備關限方涉暑雨多有死病頃日所承亦頗有逃逸竊惟此既內藩事殊外鎮撫蒞之宜無繫早晚若得少寬其工課稍均其優劇徒隸既苦易以悅加考其卒功廢闕無幾臣聞不居其職不謀其事庖割有主尸不越樽豈臣疏小所當預議但臣泳恩歲厚服義纍世苟是所懷忘其常骿宋書自序救荒議東土災荒民凋穀踊富民蓄米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆勒使糶貨為制平價此所謂常道行於百世權宜用於一時也又緣淮歲豐邑當地穰麥既已登黍粟行就可析其估賦仍就交市三吳飢民即以貸給使強壯轉運以贍老弱且酒有喉脣之利而非餐餌所資尤宜禁斷以息遊費宋書自序時三吳水淹穀貴民飢刺史彭城王義康使立議以救民急亮議即並施行發冢不赴救議尋發冢之情事止竊盜徒以侵亡犯死故同之嚴科夫穿掘之侶必銜枚以晦其迹強劫之黨必歡呼以威其事故赴凶赫者易應潛密者難且山原為無人之鄉丘隴非恆途所踐至於防救不得比之村郭督實效名理與劫異則符伍之坐居宜降矣又結罰之科雖有同符之限而失遠近之斷夫冢無村界當以比近坐之若不域之以界則數步之內與十里之外便應同罹其責防人之禁不可頓去止非之憲宜當其律愚謂相去百步內赴告不時者一歲刑自此以外差不及罰宋書自序通典一百六十七元嘉中修治石堨籤施生興業首教農畝立民崇政訓本播穡故能殷邦康俗禮節用成頃北洛侵蕪南宛雕毀獫狁肆凶犬夷充疆遠肅烽驛近虞郊閈遂使沃衍弗井巨防莫修窘力輟耕闕於分地凶荒無待流冗及今禮化孚內威禁清外斯實去盜修畎昭農緒稼之時弘圖廣務拓土祈年之日殿下降心育物振民復古且方提封榛棘綏入殊荒竊見郡境有舊石堨區野腴潤實為神皋而蕪決稍積久廢其利凡管所見謂宜創立昔文翁守官起沃成産偉連撫民開奧增業惠昭二邦庸列兩漢雖效政圖功不見所絶聯事惟忝憂同職同缺宋書自序南陽郡界有古時石堨蕪廢歲久亮籤世祖修治之棄彭城南歸議以車營為函箱陳精兵為外翼奉二王及妃媛直趨歷城分城兵配宋書四十六五十九張暢傳元嘉二十七年托跋燾南侵江夏王義恭欲棄彭城南歸計議彌日不定安北中兵參軍沈慶之議鑄四銖錢議昔秦幣過重高祖是患普令民鑄改造榆策而貨輕物重又復乖時太宗放鑄賈誼致譏誠以采山術存銅多利重耕戰之器曩時所用四民競造為害或多而孝文弗納民鑄遂行故能朽貫盈府天下殷富況今耕戰不用采鑄廢久鎔冶所資多因成器功艱利薄絶吳鄧之資農民不習無釋耒之患方今中興運聖化維新雖復偃甲銷戈而倉庫未實公私所乏唯錢而已愚謂宜聽民鑄錢郡縣開置錢署樂鑄之家皆居署內平其雜式去其雜偽官斂輸郭藏之以為永寶去春所禁新品一時施用今鑄悉依此格萬稅三千嚴檢盜鑄并禁翦鑿數年之間公私豐贍銅盡事息姦偽自止且禁鑄則銅轉成器開鑄則器化為財翦華利用於事為益宋書顏竣傳孝建三年與南郡王義宣書僕荷任一方而釁生所統近聊率輕師指往翦撲軍鋒裁交賊爽授首公情契異常或欲相見及其可識指送相呈宋書南郡王義宣傳世祖使慶之送魯爽首示義宣并與書案文選陀頭寺碑文注引謝莊為沈慶之答義宣書云皇綱絶而復紐區宇墜而更維一是答書一是與書非即此篇也答皇太后令問荷國重恩名器至此自惟凡陋本無廓廟之姿至如戍防一蕃撲討蠻蜒可強充斯任雖自上如此豈敢厝心去留歸還之事伏聽朝旨宋書沈攸之傳元徽二年群公稱皇太后令遣中使問攸之云云攸之答與武陵王贊箋江陵一總八州地居形勝鎮撫之重宜以上歸本欲仰移節蓋改臨荊部所以未具上聞者欲待至止面自咨申不圖重關擊柝覲接莫由若使匡朝之誠終蔽於聖察襲遠之舉近擁於郢都則無以謝烈士之心何用塞義夫之志便不犯關陵漢期一接奉若夫斬蛟陷石之卒裂骼卷鐵之將煙騰飆迅容或驚動左右苟不獲已敢不先布下情同上下官位重分陝富兼金穴子弟勝衣爵命己及親黨辨菽抽序便加耳倦絃歌口猒粱肉布衣若此復欲何求豈不知俯眉苟安保養餘齒何為不計百口甘冒危難誠感歷朝之遇欲報之於皇室爾昧理之徒謂下官懷無猒之願既貫誠於白日不復明心於殿下若使天必喪道忠節不立政復闔門碎滅百死無恨但高祖王業艱難太祖劬勞日昊卜世不盡七百之期宗社已成他人之有家國之事未審於聖心何如同上遺蕭道成書吾聞魚相忘於江湖人相忘於道術彼我可謂通之矣大明之中謬奉聖主忝同侍衛情存契闊義著斷金乃分帛而衣等糧而食值景和昏暴心爛形燋若斯之苦寧可言盡吾自分碎首於閣下足下亦懼滅族於舍人爾時磐石之心既固義無二計蹙迫時難相引求全天道矜善此理不空結姻之始實關於厚及明帝龍飛諸人皆為鬼矣吾與足下得蒙大造親過夙眷遇若代臣録其心迹復忝驅使臨崩之日吾豫在遺託加榮授寵恩深位高雖復情謝古人粗識忠節誓心仰報期之必死此誠志竟末申遂先帝登遐微願永奪自爾已來與足下言面殆絶非唯分張形迹自然至此脫枉一告未嘗不對紙流涕豈願相誚於今哉苟有所懷不容不白初得賢子諱疏云得家信云足下有廢立之事安國寧民此功巍巍非吾等常人所能信也俄奉皇太后假令云足下潛構深略獨斷懷抱一何能壯但冠雖斃不可承足蓋共尊高故耳足下交結左右親行殺逆以免身患卿當謂龍逢比干癡人耳凡廢立大事不可廣謀但袁褚遺寄劉又國之近戚數臣地籍實為膏腴人位並居時望若此不與議復誰可得共披心胸者哉昏明改易自古有之豈獨大宋中屯邪前代盛典煥盈篇史請為足下言之群公共議宜啓太后奉令而行當以王禮出第足下乃可不通大理要聽君子之言豈可罔滅天理一何若茲孝經云資於事父以事君縱為宗社大計不爾寧不識有君親之意邪乃復慮以家為啖以爵賞小人無狀遂行弒害吾雖寡識竊從古比豈有為臣而有近日之事邪使一日荼毒身首分離生自可恨死者何罪且有登齋之賞此科出於何文凡在臣隸誰不惋駭華夷扣心行路泣血乃至不殯使流蟲在戶自古以來此例有幾衛國微小故有弘演不圖我宋獨無其人撫膺惆悵不能自已足下與向之殺者何異人情易反還成嗟悲為子君者無乃難乎蹊田之譬豈復有異管仲有言君善未嘗不諫足下諫諍不聞甘崔杼之罪何惡逆之甚昔太甲還位伊不自疑昌邑之過不可稱數霍光荷託尚共議於朝班然後廢之猶有湯沐之施論者不以劫主為名桓溫之心未忘於篡海西失道人倫頓盡廢之以公猶禮處之當溫強盛誰能相抗尚畏懼於形迹四海不愜未嘗有樂推之者伊尹霍光名高於臣節桓氏亦得免於脅奪凡是諸事布於書策若此易曉豈待指掌卿常言比迹夷叔如何一旦行過桀跖邪聖明啓運蒼生重造普天率土誰不歌抃實是披心馨節奉公忘私之日而卿大收宮妓劫奪天藏器械金寶必充私室移易朝舊布置私黨被甲入殿內外宮閣管籥悉關家人吾不知子孟孔明遺訓如此王謝陶庾行此舉止且朱方帝鄉非親不授足下非國戚也一旦專縱自樹云是兒守臺城父居東府一家兩録何以異此知卿防固重復猜畏萬端言以禦遠實為防內若德允物望夷貊猶可推心共處如其失理乖道金城湯池無所用也文長以戈戟自衛何解滅亡吳起有云義禮不修舟中之人皆讎也足下既無伍員之痛苟懷貪婪而有賤賊宋之心吾寧損申包之節邪聞求忠臣者必出孝子之門卿忠孝於斯盡矣今竊天府金以行姦惠盜國權爵以結人情且授非其理合我則賞此事已復不可恆用用之既訖恐非忠策且受者不感識者不知不能遏姦折謀誠節慨惋隔硋數千無因自對不能知復何情顏當與足下敘平生舊款吾聞前哲絶交不出惡言但此自陳名節於胸心因告別於千載放筆增歎公私潸淚想不深怪往言然天下耳目豈伊可誣抑亦當自知投杖無疆為必先及南齊書張敬兒傳宣令軍中荊州城中大有錢可相與還取以為資糧齊書柳世隆傳攸之渡魯山岸猶有數十匹騎自隨宣令軍中巡行上表言劉真道等政績宰邑敷政必以簡惠成能蒞職闡治務以利民著績故王奐見紀於前升卿流稱於後竊見錢塘令劉真道餘杭令劉道錫皆奉公恤民恪勤匪懈百姓稱詠訟訴希簡又翦蕩凶非屢能擒獲災水之初餘杭高堤崩潰洪流迅激勢不可量道錫躬先吏民親執板築塘既還立縣邑獲全經歷諸縣訪核名實並為二邦之首最治民之良宰宋書劉懷肅傳元嘉十三年東土飢上遣楊州治中從事史沈演之巡行在所演之上表上嘉之各賜穀千斛以一大錢當兩議龜貝行於上古泉刀興自有周皆所以阜財通利實國富民者也歷代雖遠資用彌便但採鑄久廢兼喪亂纍仍縻散漂滅何可勝計晉遷江南疆境未廓或土習其風錢不普用其數本少為患尚輕今王略開廣聲教遐暨金鏹所布爰逮荒服昔所不及悉已流行之矣用彌曠而貨愈狹加須競竊翦鑿銷毀滋繁刑禁雖重姦避方密遂使歲月增貴貧室日劇暋作肆力之氓徒勤不足以贍誠由貨貴物賤常調未革弗思釐改為斃轉深斯實親教之良時通變之嘉會愚謂若以大錢當兩則國傳難朽之寶家贏一倍之利不俟加憲巧源自絶施一令而衆美兼無興之費莫盛於茲矣宋書何尚之傳中領軍沈演之議嘉禾頌煥炳禎圖昭晰瑞典運傾方閟時亨始顯綈狀既章鳥文斯辨於皇聖辟承物紀遠明兩辰麗昌輝天衍其一理妙位崇事神業盛淵渥德澤虛寂道政協化安心調樂移性玉衡從體瑤光得正巨星垂采景雲立慶其二極仁所被罔幽不攘至和所感靡況弗彰鴛出丹穴鸚起西湘白鹿踰海素鳥越江結響穹陰儀形鐘陽治人奉天乃勤乃格黛耒俶載高廩已積嘉禾重穋甘露流液擢秀辰畦揚穎角澤離穟合豪榮區蔭斥其四盈箱徵殷貫桑表周今我大宋靈貺綢繆帝終撝謙繹思勿休躬薦宗廟溫恭卒由降福以誠孝享虔羞其五頒趾推功登徽睿詔恩覃隱顯賞延荒徼河溓海夷山華嶽耀憬琛敻賮兼澤委效日表地外改服請教其六茂對盛時綏萬屢豐厭厭歸素秩秩大同上藏諸用下知所從仰式王度俯歌南風鴻名稱首永保無窮其七宋書符瑞志下元嘉二十四年七月嘉禾旅生華林園及景陽山園丞梅道念以聞中領軍吉陽縣侯沈演之奏上嘉禾頌白鳩頌并上表臣聞貞裕之美介於盛王休瑞之臻罔違哲后故鳴鳳表垂衣之化翔鷦徵解網之仁陛下道德嗣基聖明纘世教清鳥紀治昌雲官禮漸同川澤浹末徼天嘉明懿民樂薰風星辰以之炳煥日月以之光華神圖祗緯盈觀閟序白質黑章充牣靈囿應感之符畢臻而因心之祥未屬以素鳩自遠毨翰歸飛資性間淑羽貌鮮麗既聞之先説又親覩嘉祥不勝藻抃上頌一首辭不稽典分乏采章愧不足式昭皇慶崇讚盛美蓋率輿誦備之篇末其頌曰有哲其儀時惟皓鳩性協五教名編素丘殷曆方昌婉翹來遊漢録克韡爰降爰休其一於顯盛宋睿慶遐傳聖皇在上道照鴻軒稱施既平孝思永言人和於地神豫於天其二禮樂孔秩靈物咸昭白雀集苞丹鳳棲郊文騶儷迹嘉穎擢苗灼灼縞羽從化馴朝其三豈伊赴林必周之栩豈伊歸義必商之所惟德是依惟仁是處育景陽嶽濯姿帝宇其四刑曆頒興理感迭通雉飛越常鷺起西雍蒸然戾止實兼斯容一茲民聽穆是王風其五宋書符瑞志下元嘉二十四年九月白鳩又見中領軍沈演之表秋羇賦於時朱雲弛辰金祗御歲菊圖縟於園沼橘倒飾於池例草改貌而傾蕡林伐狀而搖蒂潭瀲氣而威荷露危光而嚴蕙藝文類聚三
