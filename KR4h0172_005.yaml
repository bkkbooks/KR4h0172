body:
  text: 孝武帝華林清暑殿賦其西積仞連嶺石穴通波北堂書鈔一百五十八若夫瑤榭未清瓊室流炎熏風夕烈熾景晨嚴高巒廢駕遊衢輟驂思延寒於夏堂豈徒聞於遺籍伊涼燠之可變粵在今之猶昔密眄林梁側眺池籞起北阜而置懸河沿西原而殿清暑編茅樹基采椽成宇轉流環堂浮清浹室闢西櫺而鑒斜月高東軒而望初日粵乃炎精待戒青祗將畢濯禊在辰光風明密婉祥鱗於石沼儀瑞羽於林術浮觴無屆展樂有時惟歡洽矣含歌受辭歌曰山懷風兮谷吐泉清潭邃兮遠氣宣符深情兮應遙心促千里兮測雲天藝文類聚六十二傷宣貴妃擬漢武帝李夫人賦并序朕以亡事棄日閲覽前王詞苑見李夫人賦悽其有懷亦以嗟詠久之因感而會焉巡靈周之殘冊略鴻漢之遺篆弔新宮之奄映唁璧臺之蕪踐賦流波以謠思詔河濟以崇典雖媛德之有載竟滯悲其何遣訪物運之榮落訊雲霞之舒卷念桂枝之秋霣惜瑤華之春翦桂枝折兮沿歲傾瑤華碎兮思聯情彤殿閉兮素塵積翠戺蕪兮紫苔生寶羅暍兮春幌垂珍簟空兮夏幬扃秋臺惻兮碧煙凝冬宮冽兮朱火清流律有終深心無歇徙倚雲日裴回風月思玉步於鳳墀想金聲於鸞闕竭方池而飛傷損圜淵而流咽端蚤朝之晨罷泛輦路之晚清轥南陸蹕閶闔轢北津警承明面縞館之酸素造松帳之蔥青俯衆胤而慟興撫藐女而悲生雖哀終其已切將何慰於爾靈存飛榮於景路沒申藻於服車垂葆旒於昭術竦鸞劍於清都朝有儷於徵準禮無替於粹圖閟瑤光之密陛宮虛梁之餘陰侯玉羊之晨照正金雞之夕臨升雲鼛以引思鏘鴻鍾以節音文七星於霜野旗二耀於寒林中雲枝之天秀寓坎泉之曾岑屈封嬴之自古申反周乎在今遣雙靈兮達孝思附孤魂兮展慈心伊鞠報之必至諒顯晦之同深豫棄西楚之齊化略東門之遙䘳淪漣兩拍之傷奄抑七萃之針宋書始平王子鸞傳又藝文類聚三十四又略見文選謝莊宣貴妃誄注停白板郡縣制方鎮所假白板郡縣年限依臺除食祿三分之一不給送宋書孝武帝紀即位遣大使巡方詔天步艱難國道用否雖基構永固而氣數時愆朕以眇身奄承皇業奉尋曆命鑒寐震懷萬邦風政人治之本感念陵替若疚在心可分遣大使巡省方俗宋書孝武紀節省詔興王立訓務弘治節輔臣佐時勤獻政要仰惟聖規每存茲道猥以眇躬屬承景業闡揚遺澤無廢厥心夫量人為出邦有恆典而經給之宜多違常度兵役糜牦府藏散減外內衆供未加損約非所以聿遵先旨敬奉遺圖自今諸可薄己厚民去煩從簡者悉宜施行以稱朕意宋書孝武紀求言詔世道未夷惟憂在國夫使群善畢舉固非一才所議況以寡德屬衰薄之期夙宵寅想永懷待旦王公卿士凡有嘉謀善政可以維風訓俗咸達乃誠無或依隱宋書孝武紀飭治詔百姓勞斃徭賦尚繁言念未乂宜崇約損凡用非軍國宜悉停功百省細作并尚方雕文靡巧金銀塗飾事不關實嚴為之禁供御服膳減除遊侈水陸捕採各順時日官私交市務令優衷其江海田池公家規固者詳所開弛貴戚競利悉皆禁絶宋書孝武紀下王素等詔濟世成務咸達隱微軌俗興讓必表清節朕昧旦求善思惇薄風琅邪王素會稽朱百年竝廉約貞遠與物無競自足皋畝志在不移宜加褎引以光難進竝可太子舍人宋書王素傳下沈慶之等詔朕以不天有生罔二泣血千里志復深逆鞠旅伐罪義氣雲踴群帥仗節指難如歸故曾未積旬宗社載穆遂以眇身猥篡大統永念茂庸思崇徽錫新除使持節散騎常侍都督南兗豫徐兗四州諸軍事鎮軍將軍南兗州刺史沈慶之新除散騎常侍領軍將軍柳元景新除散騎常侍右衛將軍宗愨督兗州諸軍事輔國將軍兗州刺史徐遺寶寧朔將軍始興太守沈法系驃騎咨議參軍顧彬之或盡誠謀初宣綜戎略或受命元帥一戰寧亂或稟奇軍統協規效捷偏師奉律勢振東南皆忠國忘身義高前烈功載民聽誠簡朕心定賞策勳茲焉攸在宜列土開邑永蕃皇家慶之可封南昌縣公元景曲江縣公竝食邑三千戶愨洮陽縣侯食邑二千戶遺寶益陽縣侯食邑一千五百戶法系平固縣侯彬之陽新縣侯竝食邑千戶宋書沈慶之傳恤徐湛之等詔徐湛之江湛主僧綽門戶荼酷遺孤流寓言念既往感痛兼深可令歸居本宅厚加恤賜宋書徐湛之傳恤卜天與詔日者逆豎犯蹕釁變卒起廣威將軍關中侯卜天與提戈赴難挺身奮節斬殪凶黨而旋受虐刃勇冠當時義侔古烈興言追悼傷痛於心宜加甄贈以旌忠節可贈龍驤將軍益州刺史諡曰壯侯宋書卜天與傳答有司奏不應致拜太傅詔暗薄篡統實憑師範思盡虔恭以承道訓所奏稽諸往代謂無拜禮據文既明便從所執宋書江夏王義恭傳上不欲致禮太傅諷有司奏詔答贈張敷侍中詔司徒故左長史張敷貞心簡立幼樹風規居哀毀滅孝道淳至宜在追甄於以報美可追贈侍中宋書張敷傳贈王微祕書監詔微棲志貞深文行惇洽生自華宗身安隱素足以賁茲丘園惇是薄俗不幸蚤世朕甚悼之可追贈祕書監宋書王微傳與劉延孫等詔朕藉群能之力雪莫大之恥以眇眇之身託於王公之上思所以策勳樹良永寧世烈新除侍中領前軍將軍延孫率懷忠敏器局沈正協贊義初誠力俱盡左衛將軍竣立志開亮理思清要茂策忠暮經綸惟始俾積基更造咸有勤焉宜顯授龜社大啓邦家延孫可封東昌縣侯竣建城縣侯食邑各二千戶宋書劉延孫傳重農舉才詔首食尚農經邦本務貢士察行寧朝當道內難甫康政訓未洽衣食有仍耗之斃選造無觀國之美昔衛文勤民高宗恭默卒能收賢巖穴大殷季年朕每側席疚懷無忘鑒寐凡諸守蒞親民之官可詳申舊條勸盡地利力田善蓄者在所具以名聞褎甄之科精為其格四方秀孝非才勿舉獻答允值即就銓擢若止無可採猶賜除署若有不堪酬奉虛竊榮薦遣還田里加以禁錮尚書百官之元本庶績之樞機丞郎列曹局司有在而頃事無巨細悉歸令僕非所以衆材成構群能濟業者也可更明體制咸責厥成糾核勤惰嚴施賞罰宋書孝武紀又略見通典二十二答義宣詔皇帝敬問朕以不天招罹屯難家國阽危翦焉將及所以身先八百雪清冤恥遠憑高笇共濟艱難遂登寡暗嗣奉洪祀尊戚酬勳實表心事粃政闕職所願匡拯而嘉言蔑聞未德先著勤王之績未終毀冕之圖已及臧質嶮躁無行見棄人倫以此不識志在問鼎凶意將逞先借附從扇誘欺熾成此亂階如使群逆竝濟衆邪競逐將恐瞻烏之命未識所止搆怨連禍孰知其極公明有不照背本崇姦迷昵讒醜還謀社稷雖履霜有日喧議糾紛朕以至道無私杜遏疑議信理推誠暴於遐邇不虞變難酬醜言遂驗是悼心失圖忽忘寢食今便親御六師廣命群牧告靈誓衆直造柴桑梟轘元惡以謝天下然後警蹕清江鳴鑾郢路投戈襲袞面稟規勖有宋不造家禍仍纏昔歲事寧方承遠訓冀以虛薄永弭厥艱豈謂曾未朞稔復覩斯舋二祖之業將墜於淵仰瞻鴻基但深感慟宋書南郡王義宣傳建仲尼廟詔仲尼體天降德維周興漢經緯三極冠冕百王爰自前代咸加褎述典司失人用闕宗祀先朝遠存遺範有詔繕立世故妨道事未克就國難頻深忠勇奮厲實憑聖義大教所敦永惟兼懷無忘待旦可開建廟制同諸侯之禮詳擇爽塏厚給祭秩宋書孝武紀開苑禁詔諸苑奈制綿遠有妨肆業可詳所開弛假與貧民宋書孝武紀宥罪詔國道再屯艱虞畢集朕雖寡德終膺鴻慶惟新之社實深百王而惠宥之令未殊常渥永言勤慮寤寐載懷在朕受命之前凡以罪徒放悉聽還本犯釁之門尚有存者子弟可隨才署吏宋書孝武紀重散騎詔散騎職為近侍事居規納置任之本實為親要而頃選常侍陵遲未允宜簡授時良永置清轍宋書孔覬傳通下情詔旒纊之道有孚於結繩日昃之勤已切於姬后況世斃教淺歲月澆季朕雖勠力寓內未明求衣而識狹前王務廣昔代永言菲德其愧良深朝咨野怨自達者寡惠民利公所昧實衆自今百辟庶尹下民賤隸有懷誠抱志擁鬱衡閭失理負謗未聞朝聽者皆聽躬自申奏小大以聞朕因聽政之日親對覽焉宋書孝武紀答江夏王義恭請封禪詔太宰表如此昔之盛王永保鴻名常為稱首由斯道矣朕遭家多難入篡純孝德薄勳淺鑒寐崩愧頃麟鳳表禎茅禾兼瑞雖符祥顯見恧乎猶深庶仰述矢志拓清中寓禮祗謁神朕將試哉宋書禮志三下龐秀等詔昔歲國難方結疑懦者衆故散騎常侍太子右率龐秀之履嶮能貞首畼義節用使狡狀先聞軍備夙固醜逆時殄頗有力焉追念厥誠無忘於懷侍中祭酒顏師伯侍中領射聲校尉袁愍孫豫章太守王謙之太子前中庶子領右衛率張淹爰始入討預參義謀契闊大難宜蒙殊報秀之可封樂安縣伯食邑六百戶師伯平都縣子愍孫興平縣子謙之石陽縣子淹廣晉縣子食邑各五百戶宋書顏師伯轉答蔡興宗辭昏詔卿諸人欲各行己意則國家何由得婚且姊言豈是不可違之處邪宋書蔡興宗傳大明初詔興宗女與南平王敬猷婚興宗以女曾與姊約許其孫袁彖陳啓詔答給東土詔去歲東土多經水災春務已及宜君優課糧種所須以時貸給宋書孝武紀優賜奉迎文武等詔先帝靈命初興龍飛西楚歲紀浸遠感往纏心奉迎文武情深常隸思弘殊澤以申永懷吏身可賜爵一級軍戶免為平民宋書孝武紀恤貧民詔政道未著俗斃尚深豪侈兼并貧弱困窘存闕衣裳沒無斂槥朕甚傷之其明敕守宰勤加存恤賻贈之科速為條品宋書孝武紀殷祭章太后廟詔章皇太后追尊極號禮同七廟豈容獨闕殷薦隔茲盛祀閟宮遙祫既行有周魏晉從饗式範無替宜述附前典以宣情敬宋書禮志四通典四十七與顏竣詔何偃遂成異世美志長往與之周旋重以姻媾臨哭傷怨良不能已往矣如何宜散騎常侍金紫光祿大夫本官如故宋書何偃傳又與顏竣詔宏夙情業尚素心令績雖年未及壯願言兼申謂天道可倚輔仁無妄雖寢患淹時慮不至禍豈圖祐善虛設一旦永謝驚惋摧慟五內交殞平生未遠舉目如昨而賞對遊娛緬同千載哀酷纏綿實增痛切卿情均休戚重以周旋乖坼少時奄成今古聞問傷惋當何可言宋書建平王宏傳宏薨上痛悼甚至每朔望輒出臨靈自為墓志銘并序與東揚州刺史顏竣詔赦逃亡詔往因師旅多有逋亡或連山染逆懼致軍憲或辭役憚勞苟免刑罰雖約法從簡務思弘宥恩令驟下而逃伏猶豈習愚為性忸惡難反將在所長吏宣導乖方可普加寬申咸與更始宋書孝武紀沙汰沙門詔門下佛法訛替沙門混雜未足扶濟鴻教而專成逋藪加頃奸心頻發凶狀屢聞敗道亂俗人神交忿可付所在與寺耆長精加沙汰後有違犯嚴其坐誅坐主者詳為條格速施行宋書天竺迦毗黎國傳大明二年有曇標道人與羌人高闍謀反上因是下詔又初學記二十三廣弘明集六又二十七下詔罪王僧達王僧達餘慶所鍾早登榮觀輕險無行暴於世談值國道中艱盡室願效甄其薄誠貰其源慝爵遍外內身窮榮寵曾無在泮食椹懷音乃協規西楚志擾東區公行剽掠顯奪凶黨倚結群惡誣亂視聽朕每容隱思加蕩雪曾無犬馬感恩之志而炎火成燎原之勢涓流兆江河之形遂脣齒高闍契規蘇寶搜詳妖圖覘察象緯逮賊長臨梟餘黨就鞫咸布辭獄牒宣言虛市猶欲隱忍法為情屈小醜紛紜人扇方甚矯搆風塵志希非覬固已達諸公卿彰於朝野朕焉得輕宗社之重行匹夫之仁殛山誅邪聖典所同戮諷翦律漢法攸尚便可收付廷尉肅正刑書故太保容文昭公弘契闊歷朝綢繆眷遇豈容忘茲勳德忽其世祀門爵國姻一不貶絶宋書王僧達傳僧達屢經狂逆上以其終無悛心因高闍事陷之下詔於獄賜死論選舉詔八柄馭下以爵為先九德咸事政典居首銓衡治樞興替攸寄頃世以來轉失厥序徒秉國約終貽權謗今南北多士勳勤彌積物情善否實繫斯任官人之詠維聖克允則哲之美粵帝所難加澆季在俗讓議成風以一人之識當群品之誚望沈浮自得庸可致乎吏部尚書可依郎分置并詳省間曹宋書謝莊傳又別詔江夏王義恭分選詔旦出任朝論者亦有同異誠知循常甚易改舊生疑但吏部尚書由來與録共選良以一人之識不辨洽通兼與奪威權不宜專一故也前述宣先旨敬從來奏省録作則永貽後昆自此選舉之要唯由元凱一人若通塞乖衷而訴達者鮮且違令與物理至隔閡前王盛主猶或難之況在寡暗尤見其短又選官裁病即嗟誚滿道人之四體會盈有虛旬日之閒便至怨詈況實有假託不由寢頓者邪一詣不前貧苦交困則兩邊致患互不相體校之以實竝有可哀若職置二人則無此斃兼選曹樞要歷代斯重人經此職便成貴塗己心外議咸不自限故范曄魯爽舉兵滅門以此言之實由榮厚勢樞殷繁所至設可擬議此授唯有數人本積歲月稍加引進而理無前期多生慮表或嬰艱抱疾事至回移官人之任決不可闕一來一去向人已周非有黜責已貴難賤既成妨長置之無所盛衰遞襲便是一段世臣相處之方臣主生疑所以彌覺此職宜在降階監令端右足處時望無人則闕異於九流今但直銓選部有減前資物情好猜橫立別解本旨向意終不外宣唯有從郎分置視聽自改選既輕先民情已變有堪其任大展遷回兼常之宜以時稍進本職非復重官可得不須帶帖數過居之盡無詒怪自中分荊揚于時便有意於此正訝改革不少容生駭惑爾來多年欲至歲下處分會何偃致故應有親人故近因此施行本意詔文不得委悉故復紙墨具陳宋書謝莊傳上時親覽朝政常慮權移臣下以吏部尚書選舉所由欲輕其勢力下詔又別詔太宰江夏王於是置吏部尚書二人省五兵尚書答顏竣詔憲司所奏非宿昔所以相期卿受榮遇故當極此訕訐怨憤已孤本望乃復過煩思慮懼不自全豈為下事上誠節之至邪宋書顏竣傳上未欲便加大戮且止免官竣頻啓謝罪并乞性命上愈怒詔答省貢賦詔夫山處巖居不以魚鱉為禮頃歲多虞軍調繁切違方設賦本濟一時而主者玩習遂為常典杶杆瑤琨任土作貢積羽群輕終致深斃永言弘革無替朕心凡寰衛貢職山淵採捕皆當詳辨産殖考順歲時勿使牽課虛懸睽忤氣序庶簡約之風有孚於品性惠敏之訓無漏於幽仄宋書孝武紀罪顏竣詔竣孤負恩養乃可至此宋書顏竣傳竟陵王誕為逆上因此陷竣召御史中丞庾徽之於前為奏奏成詔云云詔卜天生天生始受戎任逋造寇壘而投輪越塹率果先騰驍壯之氣嘉歎無己可且賜布千匹以厲衆校宋書卜天與傳天生隸沈慶之攻廣陵城天生推車塞塹率數百人先登西北角徑至城上苦戰移日不拔乃還世祖下詔恤北討文武詔近北討文武於軍亡沒或殞身矢石或厲疾死亡竝盡勤王事而斂槥卑薄可普更賻給務令豐厚宋書孝武紀宥罪詔昔姬道方凝刑法斯厝漢德初明犴圄用簡良由上一其道下淳其性今民澆俗薄誠淺僞深重以寡德弗能心化故知方者鮮趣辟實繁向因巡覽見二尚方徒隸嬰金屨校既有矜復加國慶民和獨隔凱澤益以慚焉可詳所原宥宋書孝武紀矜恤詔夫五辟三刺自古所難巧法深文在季彌甚故沿情察訟魯師致市市獄勿擾漢史飛聲廷尉遠邇疑讞平決攸歸而一蹈幽圄動逾時歲民嬰其困吏容其私自今因至辭具竝即以聞朕當悉詳斷庶無留獄若繁文滯劾證逮遐廣心須親察以盡情狀自後依舊聽訟宋書孝武傳修親桑禮詔古者薦鞠青壇聿祈多慶分繭玄郊以供純服來歲可使六宮妃嬪修親桑之禮宋書孝武紀經袁湛墓下詔故侍中左光祿大夫開府儀同三司晉寧敬公外氏尊戚素風簡正歲紀稍積墳塋浸遠朕近巡覽千畝遙瞻松隧緬惟徽塵感慕增結可遣使祭少申永懷宋書袁湛傳勞顏師伯詔虜驅率犬羊規暴邊塞輔國將軍青冀二州刺史師伯宣略命師命變應機濟戍奮怒一月四捷支軍異部騁勇齊效頻梟名王大殲群醜朕用嘉歎良深於懷可遣使慰勞并符輔國府詳考功最以時言上宋書顏師伯傳
