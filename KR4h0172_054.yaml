body:
  text: 孫休喪遇閏議尋三禮喪遇閏歲數者沒閏閏在周內故也鄱陽哀王去年閏三月薨月次節物則是四月之分應以今年四月末為祥按晉元明二帝並以閏月崩以閏後月祥先代成準則是今比通典一百大明元年二月博士孫休議章太后廟不宜與殷祭議按禮記祭法置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟遠廟為祧鄭云天子遷廟之主昭穆合藏於祧中祫乃祭之王制曰祫禘鄭云祫合也合先君之主於祖廟而祭之謂之祫三年而夏禘五年而秋祫謂之五年再殷祭又禘大祭也春秋文公二年大事於太廟傳曰合族以食序以昭穆祭統曰有事於太廟則群昭群穆咸在不失其倫今殷祠是合食太祖而序昭穆章太后既屈於上不列正廟若迎主入太廟既不敢配列於正序又未聞於昭穆之外別立為位若徐邈議今殷祠就別廟奉薦則乖禘祫大祭合食序昭穆之義也邈云陰室四殤不同祫就祭此亦其義也喪服小記殤與無後從祖祔食祭法王下祭殤鄭玄云祭適殤於廟之奧謂之陰厭既從祖食於廟奧是殤有位於奧非就祭別宮之謂今章太后廟四時饗薦雖不於孫止若太廟禘祫獨祭別宮與四時蒸嘗不異則非禘大祭之義又無取於祫合食之文謂不宜與太廟同殷祭之禮高堂隆答魏文思后依薑嫄廟禘祫又不辨祫之義而改祫大饗蓋有由而然耳守文淺學懼乖禮衷宋書禮志四大明二年二月有司奏皇代殷祭無事於章后廟高堂隆議魏文思后依周薑嫄廟禘祫及徐邈晉宣太后殷薦舊事使禮官詳正博士孫武議又見通典四十七王侯兄弟嗣統議按晉濟北侯荀勗長子連卒以次子輯拜世子先代成準宜為今例宋書禮志二通典九十三大明二年王子出後告廟臨軒議南豐昔別開土宇以紹營陽義同始封故有臨軒告廟之禮今歆奉詔出嗣則成繼體先爵猶存事是傳襲不應告廟臨軒宋書禮志四大明元年六月詔以前太子步兵校尉祗男歆紹南豐王朗太學博士王燮之議太后出行副車議周禮后六服五路之數悉與王同則副車之制不應獨異又記云古者后立六官三夫人九嬪二十七世婦八十一御妻以聽天下之內治天子立六官三公九卿二十七大夫八十一元士以聽天下之外治鄭注云后象王立六宮而居之亦正寢一燕寢五推所立每與王同禮無降亦明矣皇太后既禮均至極彌不應殊謂並應同十二乘關為允宋書禮志五大明元年九月博士王燮之議郊祀遇雨議遇雨遷郊則先代成議禮傳所記辛日有徵郊特牲曰郊之用辛也周之始郊日以至鄭玄注曰三王之郊一用夏正用辛者取其齋戒自新也又月令曰乃擇元日祈穀於上帝注曰元日謂上辛郊祭天也又春秋載郊有二成十七年九月辛丑郊公羊曰曷用郊用正月上辛哀元人四月辛已郊穀梁曰自正月至於三月郊之時也以十二月下辛卜正月上辛如不從以正月下辛卜二月上辛如不從以二月下辛卜三月上辛以斯明之則郊祭之禮未有不用辛日者也晉氏或丙或己或庚並有別議武帝以十二月丙寅南郊受禪斯則不得用辛也又泰始一年十一月己卯始并圜丘方懌二至之祀合於二郊三年十一月庚寅冬至祠天郊於圜丘是猶用圜丘之禮非專祈穀之祭故又不得用辛也今之郊饗既行夏時雖得遷卻謂宜猶必用辛也徐禪所據或為未宜又按郊特牲曰受命於祖廟作龜於禰宮鄭玄注曰受命謂告退而卜也則告義在郊非為告日今日雖有遷而郊不異愚謂不宜重告宋書禮志三大明二年正月博士王燮之議又見通典四十二章太后廟宜與殷祭議按禘小祫大禮無正文求之情例如有可準推尋祫之為名雖在合食而祭典之重於此為大夫以孝享親尊愛罔極既殷薦於太祖亦致盛祀於小廟譬有事於尊者可以及卑故魏高堂隆所謂猶以祫故而祭之也是以魏之文思晉之宣后雖不並序於太廟而猶均禘於薑嫄其意如此又徐邈所引四殤不祫既而祭之以為別饗之例斯其證矣愚謂章太后廟亦宜殷薦宋書禮志四大明二年二月博士王燮之議又見通典四十七作王奭之皇太妃為國親本親服議案喪服傳妾服君之黨得與女君同如此皇太妃服宗與太后無異但太后既以尊降無服太妃儀不應殊故悉不服也計本情舉哀其禮不異又禮諸侯絶期皇太后雖云不居尊極不容輕於諸侯謂本親期以下一無所服有慘自宜舉哀親疏二儀準之太后宋書禮志二泰豫元年後廢帝即位崇所生陳貴妃為皇太妃有司奏國親舉哀格當一同皇太后為有降異又於本親期以下當猶服與不前曹郎王燮之議章太后廟宜與殷祭議祫祭之名義在合食守經據古孫武為詳竊尋小廟之禮肇自近魏晉之所行足為前準高堂隆以祫而祭有附情敬徐邈引就祭四殤以證別饗孫武據殤祔於祖謂廟有殤位尋事雖同廟而祭非合食且七廟同宮始自後漢禮之祭殤各祔厥祖既豫祫則必異廟而祭愚謂章廟殷薦推此可知宋書禮志四大明二年二月太常丞孫緬議祠孝武及昭后親執爵議晉世祖宗祠顯宗烈肅祖並是晉帝之伯今朝明準而初無有可行事之禮愚謂主上親執孝武皇帝觴爵有愜情敬昭皇太后君母之貴見尊一時而與章宣二廟同饗閟宮非惟不躬奉乃宜議其毀替請且依舊三公行事宋書禮志四元徽二年十月有司奏至尊親祠太廟孝武皇帝及昭皇太后未詳應親執爵與不下禮官議前左丞孫緬議又見通典四十七王侯兄弟嗣統議禮記微子立衍商禮斯行仲子舍孫姬典攸貶歷代遵循靡替於舊今胙土之君在而世子卒厥嗣未育非舍孫之謂愚以為次子有子自宜紹為世孫若其未也無容遠搜輕屬承統繼體傳之有由父在立子允稱情典宋書禮志二大明二年六月博士傅郁議又見通典九十三國有故不舉祭議案春秋太子奉社稷之粢盛長子主器出可守宗廟以為祭主易彖明文監國之重居然親祭皇女夭札時既同宮三月廢祭於禮宜停宋書禮志四大明三年六月博士郁議王侯兄弟嗣統議案春秋傳云世子死有母弟則弟無則立長年均擇賢義均則卜古之制也今長子早卒無嗣進立次息以為世子取諸左氏理義無違又孫武所據晉濟北侯荀勗長子卒立次子亦近代成例依文採比竊所允安謂宜開許以為永制宋書禮志二大明二人六月博士孫武傅郁議云云曹郎諸葛雅之議詔可又見通典九十三宋故龍驤將軍護鎮蠻校尉寧州刺史邛都縣侯爨使君之碑君諱龍顏字仕德建寧同樂顓頊之玄才子祝融之眇胤也清源流而不滯深根固而不傾夏后之盛敷陳五教勳隆九土古功播於万祀故乃耀輝西嶽郢楚子文詺德於春秋斑朗紹縱於季葉陽九運否蟬蛻河東逍遙中原斑彪刪定漢記斑固述修道訓爰暨漢末菜邑於爨因氏族焉姻婭媾於公族振纓蕃乎王室乃祖肅魏尚書僕射河南尹位均九列舒翮中朝遷運庸蜀流播南口樹安九世千柯繁茂万葉雲興卿望摽於四姓邈冠顯於上京瑛豪繼體於茲而美祖晉寧建寧二郡太守龍驤將軍寧州刺史考龍驤輔國將軍八郡監軍晉寧建寧二州太守追諡寧州刺史卭都縣侯金紫纍迹朱黻充庭君承尚書之玄孫監軍之令子也容貌瑋於時倫貞操超於門友溫良沖挹在家必聞本州禮命主簿不就三辟別駕從事史正式當朝請拱端右仁篤顯於朝野清名扇於遐邇舉義熙十年秀才除郎中相西鎮辵蠻府行參軍除試守建寧太守剖符本邦衣錦晝遊民歌其德士詠其風於是貫伍鄉朝本州司馬長史而君素懷慷慨志存遠御万里口闕除散騎侍郎建無烋容退無慍色忠誠簡於帝心芳風宣於天邑除龍驤將軍試守建寧太守軺車越斧金章紫綬棨戟憧𢣏襲封卭都縣侯歲在壬申百六遘釁州土擾亂東西二竟凶豎狼暴緬成寇場君收合精鋭五丁之衆身伉矢石碎千計肅清邊嵎君南中磐石人情歸望遷本邑龍驤將軍護鎮蠻校尉寧州刺史卭都縣侯君姿英雄之高略敦純懿之弘度獨步南境卓爾不群雖子産之在鄭蔑以加焉是以蘭聲既暢福隆後嗣者矣自非愷悌君子孰能若斯也哉旻天不弔寢疾彌篤享年六十一歲在丙戍十二月上旬薨黎庶痛悼蠻長傷懷夭朝遠感追贈中牢之饋也故吏建寧趙欠之巴郡杜子長等哀德永慕玄澤刊石樹碑表尚烋烈其頌曰巍嵬靈山峻高迢遰或躍或淵龍飛紫闕邈邈君侯天姿英哲縉紳門揚名四外束帛戔戔禮騁交會優遊南境恩沾裳撫同方嶽勝殘去殺悠哉明后德重道融騫騫匪躬鳳翔京邑曾比縱如何不弔遇此繁霜良木摧枯元暉潛藏在三感慕孝右哀傷銘邇玄石千載垂功祖已薨背考忠存銘記良願不遂奄然早終嗣孫碩子等友乎哀感仰尋訓永慕高縱控勒在三仲秋七月登山采石樹立元碑表殊勳於當世流芳風於千代故記之寧州長子驎宏早終次弟驎紹次弟驎暄次弟驎崇等建樹此碑大明二年歲在戊戍九月上旬壬子朔嗣孫碩碩萬碩思碩碩羅碩俗等立匠碑府主簿益州杜萇子文建侯寧爨道慶作碑拓本案碑在雲南陸涼州有碑陰三列皆人名不録國母除太夫人議案禮下國卿大夫之妻皆命天子以斯而推則子男之母不容獨異宋書禮志二大明二年十一月有司奏興平國解稱國子袁愍孫母王氏應除大夫人檢無國母除太夫人例下禮官議正太學博士司馬興之議國有故不舉祭議竊惟國之大事在祀與戎皇太子有撫軍之道而無事御之義戎既如之祀亦宜然案祭統夫祭之道孫為王父尸又云祭有昭穆所以別父子太子監國雖不攝至於宗廟則昭穆實存謂事不可亂又云有故則使人準此二三太子無奉祀之道又皇女夭札則實同宮一體之哀理不得異設令得祀今獨無親奉之義宋書禮志四大明三年六月太學博士司馬興之議太子妃喪撤樂議案禮齊衰大功之喪三月不從政今臨軒拜授則人君之大典今古既異賖促不同愚謂皇太子妃祔廟之後便可臨軒作樂及鼓吹宋書禮志二大明五年閏月太學博土司馬興之議又見通典八十二又議案禮大功至則辟琴瑟誠無自奏之理但王者體大理絶凡庶故漢文既葬悉皆復吉唯縣而不樂以此表哀今準其輕重侔其降殺則下流大功不容徹樂以終服夫金石賓饗之禮簫管警塗之衛實人君之盛典當陽之威飾固亦不可久廢於朝又禮無天王服嫡婦之文直後學推貴嫡之義耳既已制服成喪虛懸終窆亦足以甄崇冢正摽明禮歸矣宋書禮志二通典八十二郊配用牛數議案鄭玄注禮記大傳稱孝經郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝配五帝也夫五帝司方位殊功一牲牢之用理無差降太祖文皇帝躬成天地則道兼覆載左右群生則化洽四氣祖宗之稱不足彰無窮之美金石之音未能播勳烈之盛故明堂聿修聖心所以昭玄極泛配宗廟先儒所以得禮情愚管所見謂宜用六牛宋書禮志三大明五年九月太學博士司馬興之議太子妃喪不舉祭議夫緦則不祭禮之大經卿卒不繹春秋明義又尋魏代平原公主薨高堂隆議不應三月廢祠而猶云殯葬之間權廢事改吉芬馥享祠尋此語意非使有司此無服之喪尚以未葬為廢況皇太子妃及大功未祔者邪上尋禮文下準前代不得蒸嘗宋書禮志四大明五年十月博士司馬興之議國母除太夫人議五等雖差而承家事等公侯之母崇號得崇子男於親尊秩宜顯故春秋之義母以子貴固知從子尊與國均也宋書禮志二大明二年十一月有司奏興平國解稱國子袁愍孫母王氏應除太夫人博士程彥議廟祠有故遷日議曾子問日蝕太廟火牲未殺則廢縱有故則使人清廟敬重郊禋禮大故廟焚日蝕許以可遷輕哀微故事不合改是以鼷鼠食牛改卜非禮晉世祖有司行事顧司空之改郊月既不見其當時之宜此不足為準愚謂日蝕廟火天譴之變乃可遷日至於舉哀小故不宜改辰宋書禮志四大明三年十一月殿中郎殷淡議上魏獻文帝表臣昔蒙劉氏生成之恩感義亡身志陳報答遂與雍州刺史袁顗豫州刺史殷琰等共唱大義奉戴子勛纂承彼曆大運未集遂至分崩而劉彧滔天殺主篡立蒼生殄悴危於綴旒伏惟陛下龍姿鳳儀光格四表凡在黔黎延屬象魏所願天地垂仁亟圖南服宜遣文檄喻以吉凶使江東之地離心草靡荊雍九州北面請吏乞高臣官名更遣雄將秣馬五千助臣經討并賜威儀震動江外長江已北必可定矣臣雖不武乞備前驅進據之宜更在處分敢冒愚款推誠上聞機運可乘實在茲日魏書常珍奇傳上書訴父冤私門有幸亡大姑元嘉中蒙入臺六宮薄命早亡先朝賜美人又聽大姑二女出入問訊父饒司空誕取為府史恆使入山圖畫道路勤劇備至不敢有辭不復聽歸消息斷絶姑二女去年冒啓歸訴蒙陛下聖恩賜敕解饒吏名誕見符至大怒喚饒入交問汝欲死邪訴臺求解饒即答官比不聽通家信消息斷絶若是姊為啓聞所不知誕因問饒汝那得入臺饒被問依實啓答既出誕主衣莊慶畫師王強語饒汝今年敗汝姊誤汝官云小人輩敢持臺家逼我饒因叛走歸誕即遣王強將數人逐突入家縛録將還廣陵至京口客舍乃陊死井中託云饒懼罪自殺抱痛懷冤冒死歸訴宋書竟陵王誕傳誕嫌隙既著道路常云其反大明三年建康民陳文紹上書詣闕上書告竟陵王誕謀反息道龍昔伏事誕親見姦狀又見誕在石頭城內修乘輿法物習倡警蹕道龍私獨憂懼向伴侶言之語頗漏泄誕使大吏令監內執道龍道龍逸走誕怒鞭殺監又捕殺道龍宋書竟陵王誕傳上書訴弟詠之枉狀弟詠之昔蒙誕采録隨從歷鎮大駕南下為誕奉送箋書經涉危險時得上聞聖明登祚恩澤周普回改小人使命微勤賜署臺位詠之恆見誕與左右小人莊慶傅元祀潛圖姦逆言詞醜悖每云天下方是我家有汝等不憂不富貴又常疏陛下年紀姓諱往巫鄭師憐家祝詛詠之既聞此語又不見其事恐一旦事發橫罹其罪密以告建康右尉黃宣達并有啓聞希以自免元祀弟知詠之與宣達來往自嫌言語漏泄即具以告誕誕大怒令左右飲詠之酒逼使大醉因言詠之乘酒罵詈遂被害自顧冤枉事有可哀宋書竟陵王誕傳唐賜妻子事議賜妻痛往遵言兒識不及理考事原心非存忍害謂宜哀矜宋書願覬之傳通典一百六十七沛郡唐賜得病吐出蟲十餘枚臨死語妻張死後刳腹出病死後張手白破視五臟悉爢碎郡縣以張忍行刳剖賜子副又不禁駐事起赦前法不能決廟祠有故遷日議禮記祭統君之祭也有故則使人而君不失其儀鄭玄云君雖不親祭禮無闕君德不損愚以為有故則必使人者明無遷移之文苟有司充事謂不宜改日宋書禮志四大明三年有司奏四時廟祠吉日已定遇雨及舉哀舊停親奉以有司行事先下使禮官博議於禮為得遷日與不博土江長議上表為父乞贈典先臣故懷安令道慶賦命乖辰自違明世敢緣衛戍請名之典特乞雲雨微垂灑潤宋書文帝路淑媛傳大明四年上表詔付門下有司承旨奏贈給事中案道慶淑媛弟六明六年舉秀才對策源清則流潔神聖則刑全躬化易於上風體訓速於草偃通鑑一百二十九上覽之惡其諒也投策於地
