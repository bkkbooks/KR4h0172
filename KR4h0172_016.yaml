body:
  text: 臧燾宣太后不配食中宗廟議陽秋之義母以子貴故子成風咸稱夫人經云考仲子之宮若配食惠廟則宮無緣別築前漢孝文孝昭太后竝繫子為號祭於寢園不配於高祖孝武之廟後漢和帝之母曰恭懷皇后安帝祖母曰恭愍皇后雖不繫子為號亦祭於陵寢不配章安二帝此則二漢雖有太后皇后之異至於竝不配食義同陽秋唯光武追廢呂后故以薄后配高祖廟又衛后既廢霍光追尊李夫人為皇后配孝武廟此非母以子貴之例直以高武二廟無配故耳夫漢立寢於陵自是晉制所異謂宜遠準陽秋考宮之義近慕二漢不配之典尊號既正則罔極之情申別建寢廟則嚴禰之義顯繫子為稱兼明母貴之所由一舉而允三義固哲王之高致也宋書臧燾傳晉孝武太元中追崇庶祖母宣太后議者或謂宜配食中宗燾議又見南史十八褚爽上表稱太子名議案禮記云父前子名君前臣各又云君之於嗣子親則父也尊則君也如此則太子雖國之儲二猶同於臣列以君前臣名之義言則爽表未為失禮然史籍所載人臣與人主言及上表未有稱太子名者今省無先比即其驗也昔武皇帝代尚書僕射山濤啓事稱皇太子而不言名濤中期名士必詳典式其不稱名當有理趣特以皇太子儲君名諱尊重不敢指斥故耳古今異儀禮有損益今依仗前賢固循先比則爽表所稱為違舊準通典一百四泰元十九年七月義興太守褚爽上表稱太子名下太學議助教臧燾議云云四府君遷主議臣聞國之大事在祀與戎將營宮室宗廟為首古先哲王莫不致肅恭之誠心盡崇嚴乎祖考然後能流淳化於四海通幽感於神明固宜詳廢興於古典循情禮以求中者也禮天子七廟三昭三穆與太祖而七自考廟以至祖考五廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠有禱然後察之此宗廟之次親疏之序也鄭玄以為祧者文王武王之廟王肅以為五世六世之祖尋去祧之言則祧非文武之廟矣周之祖宗何云去祧為壇乎明遠廟為祧者無服之祖也又遠廟則有享嘗之降去祧則有壇墠之殊明世遠者其義彌疏也若祧是文武之廟宜同月祭於太祖雖推后稷配天由功德之所始非尊崇之義每有差降也又禮有以多貴者故傳稱德厚者流光德薄者流卑又云自上以下降殺以兩禮也此則尊卑等級之典上下殊異之文而云天子諸侯俱祭五廟何哉又王祭嫡殤下及來孫而上祀之禮不過高祖推隆恩於下流替誠敬於尊屬亦非聖人制禮之意也是以泰始建廟從王氏議以禮父為士子為天子諸侯祭以天子諸侯其尸服以士服故上及征西以備六世之數宣皇雖為太祖尚在子孫之位至於殷祭之日未申東向之禮所謂子雖齊聖不先父食者矣今京兆以上既遷太祖始得居正議者以昭穆未足欲屈太祖於卑坐臣以為非禮典之旨也所謂與太祖而七自是昭穆既足太祖在六世之外非為須滿七廟乃得居太祖也議者又以四府君神主宜永同於殷祫臣又以為不然傳所謂毀廟之主陳乎太祖謂太祖以下先君之主也故白虎通云禘祫祭遷廟者以其繼君之體持其統而不絶也豈如四府君在太祖之前非繼統之主無靈命之瑞非王業之基昔以世近而及今則情禮已遠而當長饗殷祫永虛太祖之位求之禮籍未見其可昔永和之初大議斯禮於時虞喜范宣竝以淵儒碩學咸謂四府君神主無緣永存於百世或欲瘞之兩階或欲藏之石室或欲為之改築雖所秉小異而大歸是同若宣皇既居群廟之上而四主禘祫不已則大晉殷祭長無太祖之位矣夫理貴有中不必過厚禮與世遷豈可順而不斷故臣子之情雖篤而靈厲之諡彌彰追遠之懷雖切而遷毀之禮為用豈不有心於加厚顧禮制不可踰爾石室則藏於廟北改築則未知所處虞主所以依神神移則有瘞埋之禮四主若饗祀宜廢亦神之所不依也準傍事例宜同虞主之瘞埋然經典難詳群言紛錯非臣卑淺所能折中宋書臧燾傳義熙初太廟鴟尾災燾謂著作郎徐廣曰征西京兆四府君宜在毀落而猶列廟饗此其徵乎乃上議又見宋書禮志三南史十八舉兵上表臣聞執藥隨親非情謬於甘苦揮斤斬毒豈忘痛於肌膚蓋以先疑後順忠焉必往忍小存大雖愛必從丞相臣義宣育哲台鉉拊聲聯服定主勤王之業勳越乎齊晉宗戚懿親之寄望崇於魯衛而惡直醜正實繁有黨或染凶作僞疾害元功或藉勞挾寵乘威縱戾自知愆深釁重必貽剿戮乃成紫毀朱交閒忠輔崇樹私徒招聚群惡念舊愛老無一而存豈不由凶醜相扇志肆讒惑陛下垂慈狎達不稍惟疑遂令負扆席圖蔽於流議投杼市虎成於十夫鑒古揆今實懷危逼故投袂樊葉立節於本朝揮戈晉陽務清於君側臣誠庸懦奉教前朝雖恧緇衣好賢之美敢希巷伯惡惡之情固已藉風聽而宵憤撫短策而馳公念況乃宏命爰格誠係宗社今奉旨前邁星言啓行臣本凡瑣少無遠概因緣際會遂班槐鼎素望既盈愜心實足豈應徼功非冀更希異寵直以蔓草難除去惡宜速是以無顧夷險慮不及身仰恃天眷察亮丹款苟血誠不照甘心罪戮伏願陛下先鑒元輔匪躬茂節未録庸瑣奉國微誠不遂淟涊之情以失四海之望昭戮馬劍顯肆市朝則結旌向國全鋒凱歸九流凝序三光平耀斯則仰說宗廟俯愜兆民裁表感慨涕言無已宋書臧質傳答魏主拓跋燾書省示具悉姦懷爾自恃四腳屢犯國疆諸如此事不可具說王玄謨退於東梁垣散於西爾謂何以不聞童謠言邪虜馬飲江水佛狸死卯年此期未至以二軍開飲江之徑爾冥期使然非復人事寡人受命相滅期之白登師行未遠爾自送死豈容復令生全饗有桑乾哉但爾住攻此城假令寡人不能殺爾爾由我而死爾若有幸得為亂兵所殺爾若不幸則生相鎖縛載以一驢直送都市我本不圖全若天地無靈力屈於爾齏之粉之屠之裂之如此未足謝本朝爾識智及衆力豈能勝苻堅邪頃年展爾陸梁者是爾未飲江太歲未卯故爾斛蘭昔深入彭城值少日雨隻馬不返爾豈憶邪即時春雨已降四方大衆始就雲集爾但安意攻城莫走糧食闕乏者告之當出廩相飴得所送劍刀欲令我揮之爾身邪甚苦人附反各自努力無煩多云宋書臧質傳又與虜衆書示詔虜中諸士庶狸伐見與書如別等正朔之民何為力自取如此大丈夫豈可不知轉禍為福邪今寫臺格如別書自思之宋書臧質傳密信說南郡王義宣有大才負大功挾震主之威自古斟有全者宜在人前蚤有處分且萬物莫不係心於公整衆入朝內外孰不欣戴不爾一旦受禍悔無所及宋書南郡王義宣傳又略見南史十三震主之威不可持久主相勢均事不兩立今專據閫外地勝兵彊持疑不決則後機致禍宋書臧質傳虎牢陷上表自劾去年逆虜縱肆陵暴河南司州刺史臣德祖竭誠盡力抗對強寇孤城獨守將涉朞年救師淹緩舉城淪沒聖懷垂悼遠近嗟傷陛下殷夏諒暗委政自下臣等謀猷淺蔽託付無成遂令致節之臣抱忠傾覆將士殲辱王略虧挫上墜先規下貽國恥稽之朝典無所辭責雖有司撓筆未加準繩豈宜尸祿昧安殊寵乞蒙屏固以申國法宋書索虜傳景平元年虜剋虎牢司空徐羡之尚書傳亮領軍將軍謝晦表少帝不許與佐光祿大夫傅亮上表歸政臣聞元首司契運樞成務臣道代終事盡宣翼冕旒之道理絶於上皇拱已之事不行於中古故高宗不言以三齡為斷冢宰聽政以再期為節百王以降罔或不然陛下聖德紹興負荷洪業億兆顒顒思陶盛化而聖旨謙挹委成群司自大禮告終鑽燧三改大明佇照遠邇傾屬臣等雖率誠屢聞未能仰感敢藉品物之情謹因蒼生之志伏願陛下遠存周文日昃之道近思皇室締構之艱時攬萬機躬親朝政廣闢四聰博詢庶業則雍熙可臻有生幸甚宋書徐羡之傳重奏近陳寫下情言為心罄奉被還詔鑒許未回豈惟愚臣秉心有在詢之朝野人無異議何者形風四方實繫王德一國之事本之一人雖世代不同時殊風異至於主運臣贊古今一揆未有渾心委任而休明可期此之非宜布自遐邇臣等荷遇二世休戚以均情為國至豈容順默重披丹心冒昧以請同上又固陳比表批陳辭誠俱盡詔旨沖遠未垂聽納三復屏營伏增憂歎臣聞克隆先搆幹蠱之盛業昧旦丕顯帝王之高義自皇宋創運英聖有造殷憂未闕艱患仍纏賴天命有底聖明承業時屯國故猶在民心太山之安未易可保昏明隆替繫在聖躬斯誠周詩夙興之辰殷王待旦之日豈得無為拱己復玄古之風逡巡虛挹徇匹天之事伏願以宗廟為重百姓之心弘大業以嗣先軌隆聖道以增前烈愚瞽所獻情盡於此同上奏論郊配臣聞崇德明祀百王之令典憲章天人自昔之所同雖因革殊時質文異世所以本情篤教其揆一也伏惟高祖武皇帝允協靈祗有命自天弘日靜之勤立蒸民之極帝遷明德光宅八表太和宣被玄化遐通陛下以聖哲嗣徽道孚萬國祭禮久廢思光鴻烈饗帝嚴親今實宜之高祖武皇帝宜配天郊至於地祗之配雖禮無明文先代舊章每所因循魏晉故典足為前式謂武敬皇后宜配北郊蓋述懷以追孝躋聖敬於無窮對越兩儀允洽幽顯者也明年孟春有事於二郊請宣攝內外詳依舊典宋書禮志三永初三年九月司空羡之尚書令亮等奏可奏廢廬陵王義真臣聞二叔不咸難結隆周淮南悖縱禍興盛漢莫不義以斷恩情為法屈二代之事殷鑒無遠仁厚之主行之不疑故共叔不斷幾傾鄭國劉英容養釁廣難深前事之不忘後王之成鑒也案車騎將軍義真凶忍之性爰自稚弱咸陽之酷醜聲遠播先朝猶以年在紈綺冀能改厲天屬之愛想聞革心自聖體不豫以及大漸臣庶憂惶內外屏氣而縱博酣酒日夜無輟肆口縱言多行無禮先帝貽厥之謀圖慮經固親敕陛下面詔臣等若遂不悛必加放黜至言苦厲猶在紙翰而自茲迄今日月增甚至乃委棄藩屏志還京邑潛懷異圖希幸非冀轉聚甲卒徵召車馬陵墳未乾情事猶昨遂蔑棄遺旨顯違成規整棹浮舟以示歸去肆心專已無復咨承聖恩低徊深垂隱忍屢遣中使苦相敦釋而親對散騎侍郎邢安泰廣武將茅仲思縱其悖罵乩主謗朝此久播遠近暴於人聽臣聞原火不撲蔓草難除青青不伐終致尋斧況憂深患著社稷慮切請一遵晉朝武陵舊典使顧懷之旨不隧於武廟全宥之德獲申於昵親仰尋感慟臨啓悲咽宋書廬陵王義真傅少帝失德羡之等密謀廢立則次第應在義真以義真輕訬不任主祖稷因其與少帝不協乃奏廢之上言追上皇太后尊號伏惟先婕妤柔明塞淵光備六列德昭坤範訓洽母儀用能啓祚聖明奄宅四海而天祚永違嚴親莫逮臣等參詳遠準春秋近稽漢晉謹追上遵號為皇太后禮官撰諡用崇寢廟通典七十二元嘉元年朱興妻周事議自然之愛虎狼猶仁周之凶忍宜加顯戮臣以為法律之外故尚弘物之理母之即刑由子明法為子之道焉有自容之地雖伏法者當罪而在育者靡容愚謂可特申之遐裔宋書徐羡之傳南史十五通典一百六十七上范曄等反謀表臣與范曄本無素舊中忝門下與之鄰省屢來見就故漸成周旋比年以來意態轉見傾動險忌富貴情深自謂任遇未高遂生怨望非唯攻伐朝士譏謗聖時乃上議朝廷下及藩輔驅扇同異恣口肆心如此之事已具上簡近員外散騎侍郎孔熙先忽令大將軍府吏仲承祖騰曄及謝綜等意欲收合不逞規有所建以臣昔蒙義康接盼又去歲群小為臣妾生風塵謂必嫌懼深見勸誘兼云人情樂亂機不可失識緯天文竝有徵驗曄尋自來復具陳此并說臣論議轉惡全身為難即以啓聞被敕使相酬引究其情狀於是悉出檄書選事及同惡人名手墨翰迹謹封上呈凶悖之甚古今罕比由臣暗於交土聞此逆謀臨啓震惶荒情無措宋書范蔚宗傳還郡自陳表賊臣范曄孔熙先等連結謀逆法靜尼宣分往還與大將軍臣義康共相脣齒備於鞠對伏尋仲承始達熙先等意便極言姦狀而臣兒女近情不識大體上聞之初不務指斥紙翰所載尤復漫略者實以凶計既表逆事歸露又仰緣聖慈不欲窮盡故言勢依違未敢縷陳情旨無隱已昭天鑒及群凶收禽各有所列曄等口辭多見誣謗承祖醜言紛紜特甚乃云臣與義康宿有密契在省之言期以為定潛通姦意報示天文未云熙先縣指必同以誑於曄或以智勇見稱或以愚懦為目既美其信懷可覆復駭其動止必啓凡諸詭妄還自違伐多舉事端不究源統齎傳之信無有主名所徵之人又已死後首尾垂互自為矛楯即臣誘引之辭以為始謀之證銜臣糾告竝見怨咎縰肆狂言必見禍陷伏自探省亦復有由昔義康南出之始敕臣入相伴慰晨夕覲對經踰旬日逆圖成謀雖無顯然懟容異意頗形言旨遺臣利刃期以際會臣苦相諫譬深加拒塞以為怨憤所至不足為慮便以關啓懼成虛妄思量反覆實經愚心非為納受曲相蔽匿又令申情范曄釋中閒之憾致懷蕭思話恨婚意未申謂此僥幸亦不宣達陛下敦惜天倫彰於四海藩禁優簡親理咸通又昔蒙眷顧不容自絶音翰信命時相往來或言少意多旨深文淺辭色之閒往往難別臣每懼異聞皆略而不答惟心無邪悖故不稍以自嫌慺悁丹實具如此啓至於法靜所傳及熙先等謀知實不早見關之日便即以聞雖晨光幽燭曲昭窮款裁以正義無所逃刑束骸北闕請罪司寇乾施含宥未加治考中旨頻降制使還往仰荷恩私哀惶失守臣殃積罪深丁罹酷罰久應屏棄永謝人理況奸謀所染忠孝頓闕智防愚淺暗於禍萌士類未明其心群庶謂之同惡朝野側目衆議沸騰專信讎隙之辭不復稍相申體臣雖駑下情非木石豈不知醜酟難嬰伏劍為易而靦然視息忍此餘生實非苟𠫤微命假延漏刻誠以負戾灰滅貽惡方來貪及視息少自披訴冀幽誠丹款儻或昭然雖復身膏草土九泉無恨顯居官次垢穢朝班厚顏何地司以自處乞蒙隳放伏待鈇鑕宋書徐湛之傳翠龜表句容縣人獲龜一頭體披素毫騰露飛集初學記三十
