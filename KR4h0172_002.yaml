body:
  text: 少帝下除羨之詔平理獄訟政道所先朕哀荒在疚未堪親覽司空尚書令可率眾官月一決獄宋書徐羨之傳允殷景仁辭侍中詔景仁退挹之懷有不可改除黃門侍郎以申君子之請宋書殷景仁傳錄陽瓚詔故寍遠司馬濮太守陽瓚滑臺之逼厲誠固守投命徇節在危無撓古之烈士無以加之可贈給事中振䘏遺孤以慰存亡文選顏延之陽給事誄封吐谷渾阿豺詔吐谷渾阿豺介在遐表慕義可嘉宜有寵任今酬其來款可篤塞表諸軍事安西將軍沙州刺史澆河公宋書吐谷渾傳慰勞高句驪王高璉詔皇帝問使持節散騎侍都督營平二州諸軍事征東大將軍高句驪王樂浪公篡戎東服庸績繼軌厥惠既彰款誠亦著踰遼越海納貢本朝朕以不德忝承鴻緒永懷先蹤思覃遺澤今遣謁者朱邵伯副謁者王邵子等宣旨慰勞其茂康惠政永隆厥功式昭往命稱朕意焉宋書東夷高句驪傳任徐羨之令朝廷及大府事悉咨徐司馬其餘啟還宋書張邵傳武帝北伐劉穆之卒朝廷恇懼便欲發詔以司馬徐羨之代之張邵以世子無專命宜須北咨信反乃使世子出命云聽訟詔政刑多所未悉可如先二公推訊宋書徐羨之傳太祖即祚有司奏車駕依舊臨華林園聽訟下詔追復廬陵王義真詔前廬陵王靈柩在遠國封墮替感惟拱慟情若貫割王體自至極地戚屬尊豈可令情禮永淪終始無寄可追復先封特遣奉迎并孫脩華謝妃一時俱還言增摧哽宋書廬陵王義真傳追崇臨川王道規詔褎崇道勳經國之盛典尊親追遠因心之所隆故侍中大司馬臨川烈武王體道欽明至德淵邈叡哲自天孝友光備爰始協規則翼贊景業陵威致討則克翦梟鯨逮妖逆交侵方難孔棘勢踰累棊人無固志王神謨獨運靈武宏發輯寍內外誅覆群凶固已化被江漢勳高微管遠猷侔於二南英雄邁於兩獻者矣朕幼蒙殊愛德廕特隆豐恩慈訓義深情戚永惟仁範感慕纏懷今當擁移寢祐初祀西夏思崇嘉禮式備徽章庶以昭宣風度允副幽顯其追崇丞相加殊禮鸞輅九旒黃屋左纛給節鉞前後部羽葆鼓吹虎賁班劍百人侍中如故宋書臨川王道規傳初太祖少為道規所養高祖命紹焉咸以禮無二繼太祖還本而定義慶為荊州廟主當隨往江陵太祖詔詔徵戴顒宗炳新除通直散騎侍郎戴顒太子舍人宗炳竝志託丘園自求衡蓽恬掙之操久而不渝顒可國子博士炳可通直散騎侍郎宋書戴顒傳下百濟王餘映詔皇帝問使持節都督百濟軍事鎮東大將軍百濟王累葉忠順越海效誠遠王篡戎聿脩先業慕義既彰厥懷亦款浮桴驪水獻賝執贄故嗣位方任以藩東服勉勖所莅無墜前蹤今遣兼謁者閭丘恩子兼副謁者丁敬子等宣旨慰勞稱朕意宋書百濟國傳誅徐羨之等詔民生於三事之如一愛敬同極豈惟名教況乃施侔造物義在加隆者乎徐羨之傅亮謝晦皆因緣之才荅恩在昔擢自無聞超居要重卵翼而長未足以譬永初之季天禍橫流大明傾曜四海遏密實受顧託任同負圖而不能竭其股肱盡其心力送往無復言之節事居闕忠貞之效將順靡記匡救蔑聞懷寵取容順成失德雖末因懼禍以建大策而逞其悖心不畏不義播遷之始謀肆酖毒至止未幾顯行怨殺窮凶極虐荼酷備加顛沛皁隸之手告盡逆旅之館都鄙哀愕行路飲涕故廬陵王英秀明遠徽風夙播魯衛之寄朝野屬情羨之等暴蔑求專忌賢畏逼造搆貝錦成此無端罔主蒙上橫加流屏矯誣朝旨致茲禍害寄以國命而翦為仇讎旬月之間再肆酖毒痛感三靈怨結人鬼自書契以來棄常安忍反易天明未有如斯之甚者也昔子家從弒鄭人致討宋肥無辜蕩澤為戮況逆亂倍於往釁情痛深於國家此而可容孰不可忍即宜誅殛告謝存亡而於時大事甫爾異同紛結匡國之勳實著莫大之罪未彰是以遠酌民心近聽輿訟雖欲討亂慮或難圖故忍戚含哀懷恥累載每念人生實難情事未展何嘗不顧影慟心伏枕泣血今逆臣之釁彰暴遐邇君子悲情義徒恩奮家讎國恥可得而雪便命司寇肅明典刑晦據有上流或不即罪朕當親率六師為其遏防可遣中領軍到彥之即日電發征北將軍檀道濟絡繹繼路符衛軍府州以時收翦已命征虜將軍劉粹斷其走伏罪止元凶餘無所問感惟永往心情崩絕氛霧既袪庶幾治道爾宋書徐羨之傳追恤廬陵王義真詔故廬陵王含章履正英哲自然道心內昭徽風遐被遭時多難志匡權逼天未悔禍運鍾屯險群凶肆醜專竊國柄禍心潛搆釁生不圖朕每永念讎恥含痛內結遵養姦慝情禮未申今王道既享政刑始判宣昭國體於是乎在可追崇侍中大將軍王如故為慰冤魂少申悲憤宋書廬陵王義真傳追贈張約之詔乃者權臣陵縱兆亂基禍故吉陽令張約之抗疏矢言至誠慷慨遂事屈群醜殞命遐疆志節不申感焉兼至昔關老奏書見紀漢策閻篡獻規荷榮晉代攷其忠概參迹前蹤宜加旌顯式揚義烈可贈以一郡賜錢十萬布百匹宋書廬陵王義真傳遣大使巡行詔夫哲王宰世廣達四聰猶巡嶽省方採風觀政所以情偽必審幽遐罔滯王澤無擁九皋聞者也朕以寡薄猥篡洪緒雖永念治道志存昧旦願言傅巖發想宵寐而丘園之秀藏器未臻物情民隱尚隔視聽乃眷區域輟寢忘餐今氛祲袪蕩宇內寍晏旌賢弘化於是乎始可遣大使巡行四方其宰守稱職之良閏蓽一介之善詳悉列奏勿或有遺若刑獄不䘏政治乖謬傷民害教者具以事聞其高年鰥寡幼孤六疾不能自存者可與郡縣優量脤給博採輿誦廣納嘉謀務盡銜命之旨俾若朕親覽焉宋書文帝紀班宣詔書昔王者巡功群后述職不然則有存省之禮聘覜之規所以觀民立政命事攷績上下偕通遐邇咸被故能功昭長世道歷遠年朕以寡闇屬承洪業寅畏在位昧於治道夕惕惟憂如臨淵谷懼國俗陵穨民風凋偽眚厲違和水旱傷業維勤躬庶事思弘攸宜而機務惟殷顧循多闕政刑乖謬未獲具聞豈誠素弗孚使群心莫盡納隍之愧在予一人以歲時多難王道未壹卜征之禮廢而未脩眷被氓庶無忘欽恤今使兼散騎常侍渝等申令四方周行郡邑親見刺史二千石官長申述至誠廣詢治要觀察吏政訪求民隱旌舉操行存問所疾禮俗得失一依周典每各為書還具條奏俾朕昭然若觀覽焉大夫君子其各悉心敬事無惰乃力其有咨謀遠圖謹言中誠陳之使者無或隱遺方將敬納良規以補其闕勉哉勖之稱朕意焉宋書裴松之傳賜始興太守徐豁詔始興大守豁潔已退食恪居在官政事脩理惠澤沾被近嶺南荒弊郡境尤甚拯䘏有方濟厥饑饉雖古之良守蔑以尚焉宜蒙褎賞以旌清績可賜絹二百匹穀千斛宋書徐豁傳追封東漢沈戎為述善侯詔東漢故臣沈戎沈國嫡系世有善行才智兼長忠義自矢遂敢身入虎穴諭以至誠一矢不加逆子格面茅社之錫用以旌功乃國難既夷挂冠遠遯捨故宅為佛寺棄封侯如脫屣進不為身退不為名忠上潔己邦家之光沈氏積善唯戎述之可追封為述善侯沈麟十述祖德碑蠲䘏丹徒詔丹徒桑梓綢繆大業攸始踐境永懷觸感罔極昔漢章南巡加恩元氏況情義二三有兼曩日思播遺澤酬慰士民其蠲此縣今年租布五歲刑以下皆悉原遣登城三戰及大將家隨宜隱卹宋書文帝紀答范泰詔知與慧義論踞食近亦粗聞率意不異來旨但不看佛經無經制以所見耳不知慧嚴云何道生便是縣同慧觀似未肯悔其始位也比自可與諸道人更求其中邪祗洹碑讚乃不憶相許既非所習加以無暇不獲相酬甚以為恨弘明集十二求讜言詔朕恭承洪業臨饗四海風化未弘治道多昧求之人事鑒寐惟憂加頃陰陽違序早疫成患仰惟災戒責深在予思所以側身剋念議獄詳刑上荅天譴下恤民瘼群后百司其各獻讜言指陳得失勿有所諱宋書文帝紀賜徐豁營葬事錢布詔豁廉清勤恪著稱所司故擢授南服申其才志不幸喪殞朕甚悼之可賜錢十萬布百匹以營葬事宋書徐容傳報師子國王詔此小乘經甚少彼國所有皆可悉為寡送之聞彼鄰多有師子此獻未覩可悉致之引宋元嘉起居注與彭城王義康詔降延之為小邦不政有謂其在都邑豈動物情罪過彰著亦士庶共悉直欲選代令思愆里閭猶復不悛當驅往東土乃至難恕自可隨事錄治殷劉意咸無異也宋書顏延之傳章太后生母喪禮詔朕夙罹偏罰情事兼常每思有以光隆懿戚少申罔極之懷而禮文遺逸取正無所監之前代用否又殊故惟疑累年在心未遂蘇夫人奄至傾殂情禮莫寄追思遠恨與事而深日月有期將卜窀穸便欲粗依春秋以貴之義式遵二漢推恩之典但動藉史筆傳之後混稱心而行或容未允可時共詳論以求其中執筆永懷益增感塞宋書殷景仁傳答王弘詔省表遠擬隆周經國之禮近述大易卑牧之志三復沖旨良用憮然公體道淵虛明識經遠毗翼艱難勳猷光茂俾朕獲辰居垂拱司契委成豈容高遜總錄固辭神州使成務有虧以重朕之不德邪深存體國所望寅亮驃騎親賢之寄地均旦奭還入內輔參贊機務輒敬從所執宋書王弘傳答王弘詔衛軍表如此司徒宜須事力可順公雅懷割二千人配府資儲不煩事送宋書王弘傳北伐詔河南中國多故湮沒非所遺黎荼炭每用矜懷今民和年豐方隅無事宜時經理以固疆埸可簡甲卒五萬給右將軍到彥之統安北將軍王仲德兗州刺史竺靈秀舟師入河驍騎將軍段宏精騎八千直指虎牢劉德武勁勇一萬以相犄角後將軍長沙王義欣可權假節率見力三萬監征討諸軍事便速備辦月內悉發宋書索虜傳戒劉道濟詔聞卿在任未盡清省又頗為殖貨若萬一有此必宜改之比傳人情不政緝諧當以法御下深思自警以副本望宋書劉粹傳答江夏王義恭詔吾亦得湛啟事為之酸懷乃不欲苟違所請但汝弱年新涉庶務八州殷曠專斷事重疇諮委仗不可不得其人量算二三未獲便相順許今荅湛啟權停彼葬頃朝臣零落相係寄懷轉寡湛實國器吾乃欲引其令還直以西夏任重要且停此事耳汝慶賞黜罰豫關得失者必宜悉相委寄宋書劉湛傳時劉湛求自送子喪還都義恭亦為之陳請太祖荅義恭又南史三十五與義恭詔事至於此甚為可歎當今之才委授已爾宜盡相彌縫取其可取棄其可棄汝疏云泯然無際如此甚佳彼多猜不可令萬一覺也汝年已長漸更事物且群情矚望不以幼昧相期何由故如十歲時動止諮問但當今所專必是小事耳亦恐量此輕重未必盡得彼之疑怨兼或由此邪宋書劉湛傳義恭每為劉湛所裁自以年長未得行意雖奉詔旨頗有怨言上友于素篤欲加酬順乃詔之下吐谷渾慕瑰詔吐谷渾慕瑰兄弟慕義至誠可嘉宜授策爵以甄忠款可督塞表諸軍事征西將軍沙州刺史隴西公宋書吐谷渾傳節儉詔自頃軍役殷興國用增廣資儲不給百度尚繁宜存簡約以應事實內外可通共詳思務令節儉宋書文帝紀勸農桑詔自頃農桑惰業遊食者眾荒萊不闢督課無聞一時水旱便有罄匱不深存務本豐給靡因郡守賦政方畿縣宰親民之主宜思獎訓導以良規咸使肆力地無遺利耕蠶樹藝各盡其力若有力田殊眾歲竟條名列上宋書文帝紀詔譬臨川王義慶玄象茫昧既難可了且史家諸占各有異同兵星王時有所干犯乃主當誅以此言之益無懼也鄭僕射亡後左執法嘗有變王光祿至今平安日蝕三朝天下之至忌晉孝武初有此異彼庸主耳猶竟無他天道輔仁福善謂不足橫生憂懼兄與後軍各受內外之任本以維城表裏經之盛衰此懷實有由來之事設若天必降災寍可千里逃避邪既非遠者之事又不知吉凶定所若在都則有不測去此必保利貞者豈敢苟違天邪宋書臨川王道規傳太白星犯右執法義慶懼有災禍乞求外鎮太祖詔譬之義慶固求解僕射乃許之遣大使巡益梁四郡詔益梁交廣境域幽遐治宜物情或多偏擁可更遣大使巡求民瘼宋書文帝紀錄長沙景王等詔古者明王經國司勳有典平章以馭德刑班瑞以疇功烈銘徽庸於鼎彝配祫祀於清廟是以從饗先王義存商誥祭於大蒸禮著周典自漢迄晉世崇其文王猷既昭幽顯咸秩先皇經緯天地撥亂受終駿命爰集光宅區宅雖聖明淵運三靈允協抑亦股肱翼亮之勤祈父宣力之效故使持節侍中都督南徐兗二州揚州之晉陵京口諸軍事太傅南徐兗二州刺史長沙景王故侍中大司馬臨川烈武王故司徒南康文宣公穆之侍中衛將軍開府儀同三司錄尚書事揚州刺史華容縣開國公弘使持節散騎常侍都督江州豫州西陽新蔡晉熙四郡軍事征南大將軍開府儀同三司江州刺史永脩縣開國公道濟故左將軍青州刺史龍陽縣開國侯鎮惡或履道廣深秉德沖邈或雅量高劭風鑒明遠或識準弘正才略開邁咸文德以熙帝載武功以隆景業固以侔縱姬旦方軌伊邵者矣朕以寡德篡戎鴻緒每惟道勳思遵令典而太常未銘從祀尚闕鑒寐欽屬永言深懷便宜敬是前式憲茲嘉禮勒功天府配祭朝廷俾示徽章垂美長世茂績遠猷永傳不朽宋書長沙王道憐傳又略見南史宋本紀二增封王弘等詔乃者三逆煽禍寔繁有徒爰初遵養暨於明罰外虞內慮實惟艱難故大保華容縣公弘故衛將軍華故左光祿大夫曇首抱義懷忠乃情同至籌謀廟堂竭盡智力經營艱險簡自朕心國恥既雪允膺茅土而竝執謙挹志不命踰故用佇朝典將有後命盛業不究相係殞落永懷傷歎痛恨無已弘可增封千戶華曇首封開國縣侯食邑各千戶護軍將軍建昌公彥之深誠密謨比蹤齊望其復先食邑以酬忠勳宋書王弘傳䘏王弘家詔聞王太保家便已匱乏清約之美同規古人言念始終情增悽歎可賜錢百萬米千斛宋書王弘傳
