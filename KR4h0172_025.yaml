body:
  text: 鄭鮮之諫北討表伏思聖略深遠臣之愚管無所措其意然臣愚見竊有所懷虜凶狡情狀可見自關中再敗皆是帥帥違律非是內有事故致外有敗傷虜聞殿下親御六軍必謂見伐當重兵潼關其勢然也若陵威長驅臣實見其未易若輿駕頓洛則不足上勞聖躬如此則進退之機宜在孰虜賊不敢乘勝過陝遠懾大威故也今盡用兵之算事從屈申遺師撲討而南夏清晏賊方懼將來永不敢動若輿駕造洛而反凶醜更生揣量之心必啓邊戎之患此既必然江南顒顒傾注輿駕忽聞遠伐不測師之深淺必以殿下大申威靈未還人情恐懼事又可推往年西征劉鍾危殆前年劫盜破廣州人士都盡三吳心腹之內諸縣屢敗皆由勞役所致又聞處處大水加遠師民敝敗散自然之理殿下在彭城劫盜破諸諸縣事非偶爾皆是無賴凶慝凡順而撫之則百姓思安違其所願必為亂矣古人所以救其煩穢正在於斯漢高身困平城呂后受胸奴之辱魏武軍敗赤壁宣武喪師枋頭神武之功一無所損況偏師失律無虧於廟堂之上者邪即之事實非敗之謂惟齡石等可念耳若行也或速其禍反覆思惟愚謂不煩殿下親征小劫西虜或為河洛之患今正宜通好北虜則河南安河南安則濟泗靜伏願聖鑑察臣愚懷宋書鄭鮮之傳宋國初建轉奉常佛佛虜陷關中高祖復欲北討行意甚盛鮮之上表諫請立學表至於洙泗之教洋洋盈耳所以柔漸性情日用成器國廢胄子之教家弛勸學之訓宜振起頽業以回視聽接光太陽燭之幽夜令欣流者濟津懷寶者剖和藝文類聚三十八舉謝絢自代蓋聞知賢弗推臧文所以竊位宣子能讓晉國以之獲寧鮮之猥承人乏謬蒙過眷既恩以義隆遂再叨非服知進之難屢以上請然自退之志未獲暫申夙夜懷冰敢忘其懼伏見行參軍謝絢清悟審正理懷通美居以端石雖未足舒其采章升庸以漸差可以位擬人請免愚短甘充下列授為賢牧實副群望宋書鄭鮮之傳桓偉進號安西轉補功曹舉陳郡謝絢自代滕羡仕宦議名教大極忠孝而己至乎變通抑引每事輒殊本而尋之皆是求心而遺迹迹之所乘遭遇或異故聖人或就迹以助教或因迹以成罪屈申與奪難可等齊舉其阡陌皆可略言矣天可逃乎而伊尹廢君君可脅乎而鬻權見善忠可愚乎而箕子同仁自此以還殊實而齊聲異譽而等美者不可勝言而欲令百代之下聖典所闕正斯事於一朝豈可易哉然立言明理以古證今當使理厭人情如縢羡情事者或終身隱處不關人事或升朝理務無譏前哲通滕者則以無譏為證塞滕者則以隱處為美折其兩中則異同之情可見矣然無譏前哲者厭情之謂也若王陵之母見烹於楚陵不退身窮居終為社稷之臣非為榮也鮑勛蹇諤魏朝亡身為效觀其志非貪爵也凡此二賢非滕之論夫聖人立教猶云有禮無時君子不行有禮無時政以事有變通不可守一故耳若滕以此二賢為證則恐人人自賢矣若不可人人自賢何可獨許其證譏者兼在於人不但獨證其事漢魏以來記闕其典尋而得者無幾人至乎大晉中朝及中興之後楊臻則七年不除喪三十餘年不關人事溫公則見逼於王命庾左丞則終身不著夾高世遠則為王右軍何騎驃所勸割無有如滕之易者也若以縗麻非為哀之主無所復言矣文皇帝以東關之役尸骸不反者制其子弟不廢婚宦明此孝子已不自同於人倫有識已審其可否矣若其不爾居宗輔物者但當即聖人之教何所復明制於其間哉及至永嘉大亂之後王敦復申東關之制於中興原此是為國之大計非為訓範人倫盡於此也何以言之父讎明不同戴天日而為國不可許復讎此自以法奪情即是東關永嘉之喻也何妨綜理王務者布衣以處之明教者自謂世非橫流凡士君子之徒無不可仕之理而雜以情譏謂宜在貶裁耳若多引前事以為通證則孝子可顧法而不復讎矣文皇帝無所立制於東關王敦無所明之於中興每至斯會輒發之於宰物是心可不喻乎且夫求理當先以遠大若滄海橫流家國同其淪溺若不仕也則人有餘力人有餘力則國可至乎亡家可至乎滅當斯時也匹婦猶亡其身況大丈夫哉既其不然天下之才將無所理滕但當盡陟岵之哀擬不仕者之心何為證喻前人以自通乎且名為大才之所假而小才之所榮榮與假乘常已有慚德無欣工進何有情事乎若其不然則工進無欣何足貴於千載之上邪苟許小才榮其位則滕不當顧常疑以自居乎所謂柳下惠則可我則不可也且有生之所宗者聖人聖人之為教者禮法即心而言則聖人之法不可改也而秦以郡縣治天下莫之能變漢文除肉刑莫之能復彼聖人之為法猶見改於後王況滕賴前人而當必通乎若人皆仕未知斯事可俟後聖與不況仕與不仕各有其人而不仕之所引每感三年之下見議者弘通情紀每傍中庸又云若許譏滕則恐亡身致命之仕以此而不盡何芹言之過與夫忠列之情初無計而後動若計而後動則懼法不盡命若有不盡則國有常法故古人軍敗於外而家誅於內苟忠發自內或懼法於外復有踟蹰顧望之地邪若有功不賞有罪不誅可致斯喻耳無有名教翼其子弟而子弟不致力於所天不致力於所天則王經忠不能救主孝不顧其親是國家之罪人耳何所而稱乎夫恩宥十世非不隆也功高賞厚非不報也若國憲無負於滕恬則羡之通塞自是名教之所及豈是勸沮之本乎議者又以唐虞邈矣孰知所歸尋言求意將所負者多乎後漢亂而不亡前史猶謂數公之力魏國將建荀令君正色異議董昭不得枕蘇則之膝賈充受辱於庾純以此而推天下之正義終自傳而不沒何為發斯歎哉若以時非上皇便不足復言多者則夷齊於奭望子房於四人亦無所復措其言矣至於陳平默順避禍以權濟屈皆是衛生免害非為榮也滕今無所衛鞭塞已冥義安在乎昔陳壽在喪使婢丸藥見責鄉閭阮咸居哀騎驢偷婢身處王朝豈可以阮獲通於前世便可疑於後乎且賢聖抑引皆是究其始終定其才行故雖事有驚俗而理必獲申郗詵葬母後園而身登宦所以免責以其孝也日磾殺貌無譏以其忠也今豈可以二事是忠孝之所為便可許殺貌葬母後園乎不可明矣既其不可便當究定滕之才行無所多辨也滕非下官鄉親又不周旋才能非所能悉若以滕謀能決敵才能周用此自追蹤古人非議所及若是士流故謂宜如子夏受曾參之詞可謂善矣而子夏無不孝之稱也意之所懷都盡於此自非名理何緣多其往復如其折中裁之居宗宋書鄭鮮之傳為桓偉輔國主簿先是兗州刺史滕恬為丁零翟遼所沒死尸不反恬子羡仕宦不廢議者嫌之桓玄在荊州使群博議鮮之議父疾去職議夫事有相權故制有與奪此有所屈而彼有所申未有理無所明事無所獲而為永制者也當以去官之人或容詭託之事詭託之事誠或有之豈可虧天下之大教以末傷本者乎且設法蓋以衆苞寡而不以寡違衆況防社去官而塞孝愛之實且人情趨於榮利辭官本非所防所以為其制者蒞官不久則奔競互生故社其欲速之情以申考績之實省父母之疾而加以罪名悖義疾理莫此為大謂宜從舊於義為允宋書鄭鮮之傳長吏以父母疾去官禁錮三年山陰令沈叔任父疾去職鮮之因此上議從之啓事伏承明旦見南蠻是四廢日來月朔好不審可從否與沙門論踞食書夫聖人之訓修本袪末即心為教因事成用未有反性違形而篤大化者也雖復形與俗乖事高世表至於拜敬之節揖讓之禮由申所至道俗不殊也故齊講肆業則備其法服禮拜有序先後有倫敬心內充而形肅於外稽首至地不容企踞之禮斂衽于拜事非偏坐所預而以踞食為心用遺儀為斂粗事理相違未見其通者也夫有為之教義各有之至若般舟苦形以存道道親而形疏行之有理用之有本踞食之教義無所弘進非苦形退貽慢易見形而不及道者失其恭肅之情而啓駭慢之言豈聖人因事為教章甫不適越之義邪原其所起或出於殊方之性或於矯枉之中指其所救如病急則藥速非服御長久之法也夫形教相稱事義有倫既制其三服行其禮拜節以法鼓列以次序安得企踞其間整慢相背者哉在昔宜然則適事所至一日之用不可為永年之訓理可知也故問仁者衆而復禮為本今禪念化心而守迹不變在理既末於用又粗苟所未達敢不布懷鄭君頓首弘明集十二神不滅論多以形神同滅照識俱盡夫所以然其可言乎十世既以周孔為極矣仁義禮教先結其心神明之本絶而莫言故感之所體自形已還佛唱至言悠悠弗信余墜弱喪思拔淪溺仰尋玄旨研求神要悟夫理精於形神妙於理寄象傳心粗舉其證庶鑒諸將悟遂有功於滯惑焉夫形神混會雖與生俱存至於粗妙分源則有無區異何以言之夫形也五臟六腑四肢七竅相與為一故所以為生當其受生則五常殊授是以肢體偏病耳目互缺無奪其為生一形之內其猶如茲況神體靈照妙統衆形形與氣息俱運神與妙覺同流雖動靜相資而精粗異源豈非各有其本相因為用者邪近取諸身即明其理庶可悟矣一體所資肌骨則痛癢所知爪髮則知之所絶其何故哉豈非肌骨所以為生爪髮非生之本也生在本則知存生在末倒則知滅一形之用猶以本末為興廢況神為生本其源至妙豈得與七尺同枯戶牖俱盡者哉推此理也則神之不滅居可知矣客難曰子之辨神形盡矣即取一形之內知與不知情矣然形神雖粗妙異源俱以有為分夫所以為有則生為其本既孰有本己盡而資乎本者獨得存乎出生之表則廓然冥盡既冥盡矣非但無所立言亦無所立其識矣識不立則神將安寄既無所寄安得不滅乎答曰子之難辨則辨矣識不立則神安寄既無所寄安得不滅乎答曰子之難辨則辨矣未本諸心故有若斯之難乎夫萬化皆有也榮枯盛衰死生代乎一形盡一形生此有生之始終也至於水火則彌貫群生贍而不匱豈非火體因物水理虛順生不自生而為衆生所資因即為功故物莫能遏乎同在生域其妙如此況神理獨絶器所不鄰而限以生表冥盡神無所寄哉因斯而談太極為兩儀之母兩儀為萬物之本彼太極者渾元之氣而已猶能總此化根不變其一矧神明靈極有無兼盡者邪其為不滅可以悟乎難曰子推神照於形表指太極於物先誠有其義然理貴厭心然後談可究也夫神形未嘗一時相違相違則無神矣草木之無神無識故也此形盡矣神將安附而謂之不滅哉苟能不滅則自乖其靈不資形矣既不資形何理與形為生終不相違不能相違則生本是同斷可知矣答曰有斯難也形神有源請為子循本而釋之夫火因薪則有火無薪則無火薪雖所以生火而非火之本火本自在因薪為用耳若待薪然後有火則燧人之前其無火理乎火本至陽陽為火極故薪是火所寄非其本也神形相資亦猶此矣相資相因生塗所由耳安在有形則神存無形則神盡其本惚恍不可言矣請為吾子廣其類以明之當薪之在水則火盡出水則火生一薪未改而火前期神不賴形又如茲矣神不待形可以悟乎難曰神不待形未可頓辨就如子言苟不待形則資形之與獨照其理常一雖曰相資而本不相關佛理所明而必陶鑄此神以濟彼形何哉答曰子之問有心矣此悠悠之所感而未暨其本者也神雖不待形然彼形必生必生之形此神必宅必宅必生則照感為一自然相濟自然相濟則理極於陶鑄陶鑄則功存功存則道行如四時之於萬物豈有心於相濟哉理之所順自然之所至耳難曰形神雖異自然相濟則敬聞矣子既譬神之於形如火之在薪薪無意於有火火無情於寄薪故能合用無窮自與化永非此薪之火移於彼薪然後為火而佛理以此形既盡更宅彼形形神去來由於罪福請問此形為罪為是形邪為是神邪若形也則大冶之一物耳若神也則神不自濟繫於異形則子形神不相資之論於此而躓矣答曰宜有斯問然後理可盡也所謂形神不相資明其異本耳既以為生生生之內各周其用苟用斯生以成罪福神豈自妙其照不為此形之用邪若其然也則有意於賢愚非忘照而玄會順理玄會順理盡形化神宅此形子不疑於其始彼此一理而性於其終邪難曰神即形為照形因神為用斯則然矣悟既由神惑亦在神神隨此形故有賢愚賢愚非神而神為形用三世周回萬劫無算賢愚靡始而功顯中路無始之理玄而中路之功未孰有在未之功而拔無始之初者邪若有嘉通則請從後塵答曰子責其始有是言矣夫理無始終玄極無涯既生既化罪福往復自然所生耳所謂聰明誠由耳目耳目之本非聰明也所謂賢愚誠應有始既為賢愚無始可知矣夫有物也則不能管物唯無物然後能為物所歸若有始也則不能為終唯無始也然後終始無窮此自是理所必然不可徵事之有始而責神同於事神道玄遠至理無言髣佛其宗相與為悟而自末徵本動失其統所以守此一觀庶階其峰若肆辨競辭余知其息矣洪範説生之本與佛同矣至乎佛之所演則多河漢此溺於日用耳商臣極逆後嗣隆業顏冉德行早夭無聞周孔之教自為方內推此理也其可知矣請廣其證以究其詳夫稟靈乘和體極淳粹堯生丹朱頑凶無章不識仁義瞽瞍誕舜原生則非所育求理應傳美其事若茲而謂佛理為迂可不悟哉釋藏車五弘明集五祭牙文潔牲先事薦茲敬祭崇牙既建義鋒增厲人鬼一揆三才同契惟茲靈鑒庶必有察逆順幽辨忠孝顯節使凶醜時殲主寧臣悅振旅上京凱歸西蕃神器增暉四境永安藝文類聚六十初學記二十一御覽三百三十九
