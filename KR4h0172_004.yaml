body:
  text: 文帝謁京陵詔朕違北京二十餘載雖云密邇瞻塗莫從今因四表無塵時和歲稔復獲拜奉舊塋展罔極之思饗讌故老申追遠之懷固以義兼於桑梓情加於過沛永言慷慨感慰實深宜聿宣仁惠覃被率土其大赦天下復丹徒縣僑舊今歲租布之半行所經縣蠲田租之半二千石官長竝勤勞王務宜有沾錫登城三戰及大將戰亡墜沒之家老病單弱者普加贍卹遣使巡行百姓問所疾苦孤老鰥寡六疾不能自存者人賜穀五斛宋書文帝紀徙民實京口詔京口肇祥自古著符近代衿帶江山表裏華甸經塗四達利盡淮海城邑高明土風淳壹苞總形勝實唯名都故能光宅靈心克昌帝業頃年岳牧遷回軍民徙散廛里廬宇不逮往日皇基舊御地兼蕃重宜令殷阜式索形望可募渚州樂移者數子家給以田宅并蠲復宋書文帝紀搜訪舊人詔吾生於此城及盧循肆亂害流茲境先帝以桑梓根本實同休戚復以蒙稚猥同艱難情意繾綣夷險兼備舊物遣蹤猶存心目歲月不居逝踰三紀時人故老與運零落眷惟既往倍深感歎可搜訪於時士庶文武今尚存者具以名聞人身已亡而子孫見在優量賚之宋書文帝紀徵蕭思話為吏部尚書詔沈尚書暴病不救其體業貞審立朝盡公年時尚可方相委任奄忽不永痛惋特深銓管要機通塞所寄丈人才用體國二三惟允宋書蕭思話傳下訶羅單諸國詔訶羅單媻皇媻達三國頻越遐海款化納貢遠誠宜甄可竝加除授宋書夷蠻傳與始興王濬詔沈璞累年主簿又經國卿雖未嘗為行佐故當正參軍邪若爾正當署餘曹兼房任不爾便宜行佐正署中兵恐於選體如不多耳宋書自序濬出為南徐州太祖謂璞曰濬既出蕃卿故當臥而護之與濬詔乃為正佐別詔沈璞近者險急老弱殊當憂迫邪念卿爾時難為心想百姓流轉已還此遣部運尋至委卿量所贍濟也宋書自序璞為盱眙大守虜攻守三旬退太祖嘉其功遣中使深相襃美又別詔北伐詔虜近雖摧挫獸心靡革驅逼遺氓復規竊暴比得河朔秦雍華戎表疏歸訴困棘跂望綏拯潛相糾結以侯王師并陳芮芮此春因其來掠掩襲巢窟種落畜牧所亡大半連歲相持於今未解又猜虐互發親黨誅殘根本危敝自相殘殄芮芮間使適至所說竝符遠輸誠款誓為犄角遐邇注情既宜赴獎且水雨豐澍舟楫流通經略之會實在茲日可遣寍朔將軍王玄謨率太子步兵校尉沈慶之鎮軍咨議參軍申坦等戈船一萬前驅入河使持節督青冀幽三州徐州之東安東莞二郡諸軍事輔國將軍青冀二州刺史霄城侯蕭斌推三齊之鋒為之統帥持節都督徐兗青冀幽五州豫州之梁郡諸軍事鎮將軍徐兗二州刺史武陵王駿總四州之眾水陸竝驅太子左衛率始興縣五等侯臧質勒東宮禁兵統驍騎將軍安復縣開國侯王方回建武將軍安蠻司馬新康縣開國男劉康祖右軍參軍事梁坦步騎十萬逕造許洛使持節督豫司雍秦并五州諸軍事右將軍豫州刺史領安蠻校尉南平王鑠悉荊河之師方軌繼進東西齊舉宜有董一使持節侍中都督揚南徐二州諸軍事太尉領司徒錄尚書太子太傅國子祭酒江夏王義恭德望兼崇風略遐被即可三府文武并被以中儀精卒出次徐方為眾軍節度別府司空府使所督諸鎮各遣虎旅數道爭先督梁南北秦三州諸車事綏遠將軍西戎校尉梁南北秦三州刺史秀之統輔國將軍楊文德宣武將軍巴西梓潼二郡太守劉弘宗連旗深入震蕩汧隴護軍將軍封陽縣開國侯蕭思活部龍驤將軍枝坦寍遠將軍竟陵太守南城縣開國侯劉德願藉荊雍之勁攬群師之銳宜由武關稜威震𣸥指授之宜委司空義宣議量宋書索虜傳嘉陳憲詔右軍行參軍行汝南新蔡二郡軍事陳憲盡力捍禦全城摧寇忠敢之效宜加顯擢可龍驤將軍汝南新蔡二郡太守宋書索虜傳南平王鑠鎮壽陽以憲行郡固守懸瓠虜主攻城四十二日不拔魯爽歸下詔偽寍南將軍魯爽中書郎魯秀志榦列到忠誠久著撫茲福先闔門效款招集義銳梟翦薰醜肅定邊城獻馘象魏雖宣孟之去翟歸晉穨當之出胡入漢方之此日曾何足云朕實嘉之宜即授任逞其忠略爽可督司州陳留東郡濟陰濮陽五郡諸軍事征虜將軍司州刺史秀可輔國將軍營陽潁川二郡太守其諸子弟及同契士庶委征虜府以時申言詳加酬敘宋書魯爽傳虜退下詔玁狁孔熾難及數州睠言念之寤寐興悼凶羯痍挫迸迹遠奔彫傷之民宜時振理凡遭寇賊郡縣令還復居業封屍掩骼賑贍餓流東作方始務盡勸課貸給之宜事從優厚其流寓江淮者竝聽即屬并蠲復稅調宋書文帝紀荅袁淑詔令僕治務所寄不共求體當而互相推委糾之是也然故事殘舛所以致茲疑執特無所問時詳正之宋書徐湛之傳時尚書僕射徐湛之與尚書令何尚之有事互相推委卿史中丞袁淑竝奏免官詔云與南郡王義宣詔善脩民務不須營潛逃計也宋書南郡王義宣傳南史十三贈劉康祖詔康祖班師尉武戎律靡忒對眾以寡殲殄大半猛氣雲騰志申力屈沒世殉節良可嘉悼宜加甄寵以旌忠烈可贈益州刺史諡曰勇壯宋書劉康祖傳卹寇經諸州詔經寇六州居業未能仍值災澇饑困薦臻可速符諸鎮優量救卹今農事行興務盡地利若須田種隨宜給之宋書文帝紀征虜詔惡稔身滅戎醜常數虐虜窮凶著於自昔未勞資斧已伏天誅子孫相殘親黨離貳關洛偽帥竝懷內款河朔遺民注誠請效拯溺蕩穢今其會也可符驃騎司空二府各部分所統東西應接歸義建績者隨勞酬獎宋書文帝紀時拓跋燾死下詔詔賜郭啟玄家穀故綏遠將軍晉壽太守郭啟玄往銜命虜庭秉意不屈受任白水盡勤靡懈公奉私餼纖毫弗納布衣蔬食飭躬惟儉故超授顯邦以甄廉績而介誠苦節終始匪貳身死之日妻子凍餒志操殊俗良可哀悼可賜其家穀五百斛宋書王歆之傳詔蕭思話得撫軍將軍思話啟事碻磝不拔士卒疲勞且班師清濟更圖進討此鎮山川嚴阻控臨河朔形勝之要擅名自古宜除其授以允望實思話可解徐州為冀州餘如故彭城文武復量分配即鎮歷城宋書蕭思話傳與江夏王義恭詔今朝賢無多且羊孟尚不得告謝尚之任遇有殊便未宜申許邪宋書何尚之傳元嘉二十九年致仕詔書敦勸上又與江夏王義恭詔與蕭思話詔虜既乘利方向盛冬若脫敢送死兄弟父子自共當之耳言及增憤可以示張永申垣宋書張永傳贈陸徽輔國將軍詔徽厲志廉潔歷任恪勤奉公盡誠克己無倦襃榮未申不幸夙殞言念在懷以為傷恨可贈輔國將軍本官如故賜錢十萬米二百斛諡曰簡子宋書陸徽傳釋慧嚴喪事詔嚴法師器識淵遠學道之匠奄爾遷神痛悼於懷可給錢五萬布五十匹高僧傳賜蕭思話弓琴手敕丈人頃何所作事務之暇故以琴書為娛耳所得不曰義邪眷想常不忘情想亦同之前得此琴云是舊物亦有名京邑今以相借因是戴顒意於彈撫響韻殊勝直爾嘉也并往桑弓一張材理乃快先所常用既久廢射又多病略不能制之便成老公令人歎息良材美器宜在盡用之地丈人真無所與讓也宋書蕭思話傳策命訶羅單諸國惟汝慕義款化效誠遐恩之所洽殊遠必甄用敷典章顯茲策授爾其欽奉凝命永固厥職可不慎歟宋書夷蠻傳策命媻皇國王惟爾仰政邊城率貢來庭皇澤凱被無幽不洽宜班典策授茲嘉命爾其祗順禮度式保厥終可不慎歟同上策命媻達國王惟爾仰化懷誠馳慕聲教皇風遐暨荒服來款是用加茲顯策式甄義順爾其祗憲典永終休福可不慎歟同上與彭城王義康書今以謝述代曜其才應詳練著於歷職故以佐汝汝始親庶務而任重事殷宜寄懷群賢以盡弼諧之美想自得之不俟吾言也宋書謝景仁傳誡江夏王義恭書汝以弱冠便親方任天下艱難家國事重雖曰守成實亦未易隆替安危在吾曹耳豈可不感尋王業大懼負荷今既分張言集未日無由復得動相規誨宜深自砥礪思而後行開布誠心厝懷平當親禮國士友接佳流識別賢愚鑒察邪正然後能盡君子之心收小人之力汝神意爽悟有日新之美而進德脩業未有可稱吾所以恨之而不能已已者也汝性褊急袁太妃亦說如此性之所滯其欲必行意所不在從物回改此最獘事宜應慨然立志念自裁抑何至丈夫方欲贊世成名而無斷者哉今粗疏十數事汝別時可省也遠大者豈可具言細碎復非筆可盡禮賢下士聖人垂訓驕侈矜尚先哲所去豁達大度漢祖之德猜忌褊急魏武之累漢書稱衛青云大將軍遇士大夫以禮與子人有恩西門安于矯性齊美關羽張飛任偏同獘行己舉事深宜鑒此若事異今日嗣子幼蒙司徒便當周公之事汝不可不盡祗順之理苟有所懷密自書陳若形迹之閒深宜慎護至於爾時安危天下決汝二人耳勿忘吾言今既進袁大妃供給計足充諸用此外一不須復有求取近亦具白此意唯脫應大餉致而當時遇有所乏汝自可少多供奉耳汝一月日自用不可過三十萬若能省此益美西楚殷曠常宜早起接待賓侶勿使留滯判急務訖然後可入問訊既覩顏色審起居便應即出不須久停以廢庶事也下日及夜自有餘閑府舍住止園池堂觀略所諳究計當無須改作司徒亦云爾若脫於左右之宜須小小回易當以始至一治為限不須紛紜日求新異凡審獄多決當時難可逆慮此實為難汝復不習殊當未有次第訊前一二日取訊簿密與劉湛輩共詳大不同也至訊日虛懷博盡慎無以喜怒加人能擇善者而從之美自歸己不可專意自決以矜獨斷之明也萬一如此必有大吝非唯訊獄君子用心自不應爾刑獄不可擁滯一月可再訊凡事皆應慎密亦宜豫敕左右人有至誠所陳不可漏泄以負忠信之款也古人言君不密則失臣臣不密則失身或相讒搆勿輕信受每有此事當善察之名器深宜慎惜不可妄以假人昵近爵賜尤應裁量吾於左右雖為少恩如聞外論不以為非也以貴陵物物不服以威加人人不厭此易達事耳聲樂嬉游不宜令過摴蒱漁獵一切勿為供用奉身皆有節度奇服異器不宜興長汝嬪侍左右已有數人既始至西未可怱怱復有所納宋書江夏王義恭傳又誡宜數引見佐史非唯臣主自應相見不數則彼我不親不親則無因得盡人人不盡復何由具知眾事廣引視聽既益開博於言事者又差有地也同上又見南史十三與江夏王義恭書尹沖誠節志概繼蹤古烈以為傷惋不能已己宋書索虜傳尹沖沒虜抗節不降投塹死因下義恭書與長沙王義欣手書蕭承之理民直亦不在武幹後今擬為兗州刺史檀征南詳之南齊高帝紀上承之為濟南太守拒虜文帝以其有全城之功與義欣手書承之與道濟無素事遂寢與衡陽王義季書殷僕射疾患少日奄忽不救其識具經遠奉國竭誡周游繾綣情兼常痛民望國器遇之為難惋歎之深不能已已汝亦同不往矣如何宋書殷景仁傳與彭城王義康書會稽姊飲宴憶弟所餘酒今封送宋書彭城王義康傳就拓跋燾求馬自頃歲成民阜朝野無虞春末當東巡吳會以畫游豫臨滄海探禹穴陟姑蘇之臺搜長洲之苑舟楫雖盛寡於良駟想能惠以逸足令及此行宋書索虜傳又與江夏王義恭書早知諸將輩如此恨不以白刃驅之今者悔何所及宋書張永傳永及申坦竝為統府撫軍將軍蕭思話所收繫於歷城獄太祖以屢征無功諸將不可任責永等與思話詔又與江夏王書賜始興王濬書鸚鵡事想汝已聞汝亦何至迷惑乃爾且沈懷遠何人其詎能為汝隱此邪故使法瑜口宣投筆惋慨宋書二凶傳荅群臣迎立皇運艱獘數鍾屯夷仰惟崇基感尋國故永慕厥躬悲慨交集賴七百祚永股肱忠賢故能休否以泰天人式序猥以不德謬降大命顧已兢悸何以克堪輒當暫歸朝廷展哀陵寢并與賢彥申寫所懷望體其心勿為辭費宋書文帝紀荅何承天局子之賜何必非張武之金邪宋書何承天傳承天素好弈棊頗用廢事太祖賜以局子承天奉表陳謝上荅荅江夏王義恭其願還經年方復作此流遷必當大罔罔也宋書自序沈邵為鍾離太守義恭啟太祖曰盰眙大守劉顯真求自解說邵往莅任有績彰於民聽若重授盱眙足為良二千石上不許詔荅荅衡陽王義季稱意才難得沈邵雖未經軍事既是腹心作鍾離郡及在後軍府房中甚脩理或欲遣之宋書自序義季在江陵安西府中兵久缺啟太祖求人上荅詰讓太子劭臨賀公主南第先有一下人欲嫁又聞此下人養他人奴為兒而汝用為隊主抽拔何乃速汝間用主副竝是奴邪欲嫁置何處宋書元凶劭傳上遣閹人奚承祖詰讓劭
