body:
  text: 顏延之行殣賦嗟我來之云遠覩行殣於水隅崩朽棺以掩壙仰枯顙而枕衢資沙礫以含實藉水草之襚儲撫躬中塗太息蘭渚行徘徊於永路時悄愴於川侶藝文類聚三十四白鸚鵡賦并序余具職崇賢預觀神祕有白鸚鵡焉被素履玄性溫言達九譯絕區作瑞天府同事多士咸奇思賦其辭曰稟儀素域繼體寒門貌履玄而被潔性既春而示溫雖言禽之末品妙六氣而剋生往祕奇於鬼服來充美於華京恨儀鳳之無辨惜晨鷖之徒暄思受命於黃髮獨含辭而採言起交河之榮薄出天山之無垠既達美於天居亦儷景於雲阿漸惠和之方渥綴風土而未訛服璅翮於短衿仰梢雲之曾柯覬天網之一布漏微翰於山阿藝文類聚九十一赭白馬賦并序驥不稱力馬以龍名豈不以國尚威容軍𩢰趫迅而已實有騰光吐圖疇德瑞聖之符焉是以語崇其靈世榮其至我高祖之造宋也五方率職四隩入貢祕寶盈於玉府文駟列乎華廄乃有乘輿赭白特稟逸異之姿妙簡帝心用錫聖皁服御順志馳驟合度齒歷雖衰而藝美不忒襲養兼年恩隱周渥歲老氣殫斃於內棧少盡其力有惻上仁乃詔陪侍奉述中旨末臣庸蔽敢同獻賦其辭曰惟宋二十有二載盛烈光乎重葉武義粵其肅陳文教迄已優洽泰階之平可升興王之軌可接訪國美於舊史攷方載於往牒昔帝軒陟位飛黃服皁后唐膺籙赤文候日漢道亨而天驥呈才魏德楙而澤馬效質伊逸倫之妙足自前代而閒出竝榮光於瑞典登郊歌乎司律所以崇衛威神扶護警蹕精曜協從靈物咸秩暨明命之初基罄九區而率順有肆險以稟朔或踰遠而納賮聞王會之阜昌知函夏之充牣總六服以收賢掩七戎而得駿蓋乘風之淑類實先景之洪胤故能代驂象輿歷配鉤陳齒筭延長聲價隆振信聖祖之蕃錫留皇情而驟進徒觀其附筋樹骨垂梢植髮雙瞳夾鏡兩權協月異體峰生殊相逸發超攄絕夫塵轍驅鶩迅於滅沒簡偉塞門獻狀絳闕旦刷幽燕晝秣荊越教敬不易之典訓人必書之舉惟帝惟祖爰游爰豫飛輶軒以戒道環彀騎而清路勒五營使案部聲八鸞以節步具服金組兼飾丹雘寶鉸星纏鏤章霞布進迫遮迾郤屬輦輅欻聳擢以鴻驚時濩略而龍翥弭雄姿以奉引婉柔心而待御至於露滋月肅霜戾秋登王于興言闡肄威稜臨廣望坐百層料武藝品驍騰流藻周施和鈴重設睨影高鳴將超中折分馳迥場角壯永埒別輩越群絢練敻絕捷趫夫之敏手促華鼓之繁節經玄蹏而雹散歷素支而冰裂膺門沫赭汗溝走血踠迹回唐畜怒未洩乾心降而微怡都人仰而朋悅妍變之態既畢淩遽之氣方屬跼鑣轡之牽制隘通都之圈束眷西極而驤首望朔雲而蹀足將使紫燕駢衡綠虵衛轂纖驪接趾秀騏齊亍覲王母於崑墟要帝臺於宣嶽跨中州之轍迹窮神行之軌躅然而般於遊畋作鏡前王肆於人上取悔義方天子乃輟駕迴慮息徒解裝鑒武穆憲文光振民隱脩國章戒出豕之敗御惕飛鳥之跱衡故祗慎乎所常忽敬備乎所未防輿有重輪之安馬無泛駕之佚處以濯龍之奧委以紅粟之秩服養知仁從老得卒加獘帷收仆質天情周皇恩畢亂曰惟德動天神物儀兮於時駔駿充階街兮稟靈月駟祖雲螭兮雄志倜儻精權奇兮既剛且淑服鞿羈兮效足中黃殉驅馳兮願終惠養蔭本枝兮竟先朝露長委離兮文選十四藝文類聚九十三寒蟬賦始蕭瑟以攢吟終嬋媛而孤引越客發度障之歌代馬懷首燕之信不假緌於范冠豈鏤體於人爵折清飆而不淪團高木以飄落藝文類聚九十七餐霞之氣神馭乎九仙稟露之清氣精於八蟬初學記三十贈諡袁淑詔夫輕道重義亟聞其教世敝國危希遇其人自非達義之至識正之深者孰能抗心衛主遺身固節者哉故太子左衛率淑文辯優洽秉尚貞愨當要逼之切意色不橈厲辭道逆氣震凶黨虐刃交至取斃不移古之懷忠隕難未云出其右者興言嗟悼無廢乎心宜在加禮永旌宋有臣焉可贈侍中太尉諡曰忠憲公宋書袁淑傳世祖即位使顏延之為詔賜䘏袁淑遺孤詔袁淑以身殉義忠烈邈古遺孤在疚特所矜懷可厚加賜䘏以慰存亡同上庭誥庭誥者施於閨庭之內謂不遠也吾年居秋方慮先草木故遽以未聞誥爾在庭若立履之方規覽之明已列通人之規不復續論今所載咸其素畜本乎性靈而致之心用夫選言務一不尚煩密而至於備議者蓋以網諸情非古語曰得鳥者羅之一目而一目之羅無時得鳥矣此其積意之方道者識之公情者德之私公通可以使神明加嚮私塞不能令妻子移心是以昔之善為士者必捐情反道合公屏私尋尺之身而以天地為心數紀之壽常以金石為量觀夫古先垂戒長老餘論雖用細制每以不朽見銘繕築末迹咸以可久承志況樹德立義收族長家而不思經遠乎曰身行不足遺之後人欲求子孝必先慈將責弟悌務為友雖孝不待慈而慈固植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相出可使家有參柴人皆由損夫內居德本外夷民譽言高一世處之逾嘿器重一時體之茲沖不以所能干眾不以所長議物淵泰入道與天為人者士之上也若不能遺聲欲人出己知柄在虛求不可校得敬慕謙通畏避矜踞思廣監擇從其遠猷文理精出而言稱未達論問宣茂而不以居身此其亞也若乃聞實之為貴以辯畫所克見聲之取榮謂爭奪可獲言不出於戶牖自以為道義久立才未信於僕妾而曰我有以過人於是感苟銳之志馳傾觖之望豈悟已挂有識之裁入脩家之誡乎記所云千人所指無病自死者也行近於此者吾不願聞之矣凡有知能預有文論若不練之庶士校之群言通才所歸前流所與焉得以成名乎若呻吟於牆室之內喧囂於黨輩之閒竊議以迷寡聞妲語以敵要說是短算所出而非長見所上適值尊朋臨座稠覽博論而言不入於高聽人見棄於眾視則慌若迷塗失偶黶如深夜撤燭銜聲茹氣腆嘿而歸豈識向之夸慢祗足以成今之沮喪邪此固少壯之廢爾其戒之夫以怨誹為心者未有達無心救得喪多見誚耳此蓋臧獲之為豈識量之為事哉是以德聲令氣愈上每高忿言懟譏每下愈發有尚於君子者寍可不務勉邪雖曰恆人情不能素盡故當以遠理勝之么笇除之豈可不務自異而取陷庸品乎富厚貧薄事之懸也以富厚之身親貧薄之人非可以一時同處然昔有守之無怨安之不悶者蓋有理存焉夫既有富厚必有貧薄豈其證然時乃天道若人皆厚富是理無貧薄然乎必不然也若謂富厚在我則宜貧薄在人可乎又不可矣道在不然義在不可而橫意去就謬生希幸以為未達至分蠶溫農飽民生之本躬稼難就上以僕役為資當施其情願庀其衣食定其當治遞其優劇出之休饗後之捶責雖有勸恤之勤而無霑曝之苦務前公稅以遠吏讓無急傍費以息流議量時發斂視歲穰儉省贍以奉己損散以及人此用天之善御生之得也率下多方見情為上立長多術晦明為懿雖及僕妾情見則事通雖在畎畝明晦則功博若奪其當然役其煩務使威烈雷霆猶不禁其欲雖棄其大用窮其細瑕或明灼日月將不勝其邪故曰孱焉則差的焉則闇是以禮道尚優法意從刻優則人自為厚刻則物相為薄耕收誠鄙此用不忒所謂野陋而不以居心也含生之氓同祖一氣等級相傾遂成差品遂使業習移其天識世服沒其性靈至夫願欲情嗜宜無閒殊或役人而養給然是非大意不可侮也隅奧有竈齊侯蔑寒犬馬有秩管燕輕饑若能服溫厚而知穿弊之苦明周之德厭滋旨而識寡嗛之急仁恕之功豈與夫比肌膚於草石方手足於飛走者同其意用哉罰慎其濫惠戒其偏罰濫則無以為罰惠偏則不如無惠雖爾眇末猶扁庸保之上事思反己動類念物則其情得而人心塞矣抃博蒲塞會眾之事諧調哂謔適坐之方然失敬致悔皆此之由方其剋瞻彌喪端儼況遭非鄙慮將醜折豈若拒其容而𥳑其事靜其氣而遠其意使言必諍懕賓友清耳笑不傾撫左右悅目非鄙無因而生侵侮何從而入此亦持德之管籥爾其謹哉嫌惑疑心誠亦難分豈唯厚貌蔽智之明深情怯剛之斷而已哉必使猜怨愚賢則嚬笑入戾期變犬馬則步顧成妖況動容竊斧束裝盜金又何足論是以前王作典明慎議獄而僭濫易意朱公論璧光澤相如而倍薄異價此言雖大可以戒小游道雖廣交義為長得在可久失在輕絕久由相敬絕由相狎愛之勿勞當扶其正性忠而勿誨必藏其枉情輔以藝業會以文辭使親不可褻疏不可閒每存大德無挾小怨率此往也足以相終酒酌之設可樂而不可嗜嗜而非病者希病而遂眚者幾既眚既病將蔑其正若存其正性紓其妄發其唯善戒乎聲樂之會可𥳑而不可違違而不背者鮮矣背而非弊者反矣既弊既背將受其毀必能通其礙而節其流意可為和中矣善施者豈唯發自人心乃出天則與不待積取無謀實竝散千金誠不可能贍人之急雖乏必先使施如王丹受如杜林亦可與言交矣浮華怪飾滅質之具奇服麗食棄素之方動人勸慕傾人顧盼可以遠識奪難用近欲從若覩其淫怪知生之無心為見奇麗能致諸非務則不仰自貴不禁自止夫數相者必有之徵既聞之術人又驗之吾身理可得而論也人者兆氣二德稟體五常二德有奇偶五常有勝殺及其為人寍無叶沴亦猶生有好醜死有夭壽人皆知其懸天至於丁年乖遇中身迂合者豈可易地哉是以君子道命愈難識道愈堅古人恥以身為溪壑者屏欲之謂也欲者性之煩濁氣之蒿蒸故其為害則燻心智耗真情傷人和犯天性雖生必有之而生之德猶火含烟而煙妨火桂懷蠹而蠹殘桂然則火勝則烟滅蠹壯則桂折故性明者欲𥳑嗜繁者氣惛去明即惛難以生矣是以中外群聖建言所黜儒道眾智發論是除然有之者不患誤深故藥之者恆苦術淺所以毀道多而於義寡頓盡誠難每指可易能易每指亦明之末廉嗜之性不同故畏慕之情或異從事於人者無一人我之心不以己之所善謀人為有明矣不以人之所務失我能有守矣己所謂然而彼定不然弈棋之蔽悅彼之可而忘我不可學嚬之蔽將求去蔽者念通怍介而已流言謗議有道所不免況在闕薄難用算防接應之方言必出己或信不素積嫌閒所襲或性不和物尤怨所聚有一於此何處逃毀苟能反悔在我而無責於人必有達鑒昭其情遠識迹其事日省吾躬月料吾志寬嘿以居潔靜以期神道必在何恤人言喭曰富則盛貧則病矣貧之為病也不唯形色麤黶或亦神心沮廢豈但交友疏棄必有家人誚讓非廉深遠識者何能不移其植故欲蠲憂患莫若懷古懷古之志當自同古人見通則憂淺意遠則怨浮昔有琴歌於編蓬之中者用此道也夫信不逆彰義必幽隱交賴相盡明有相照一面見旨則情固丘岳一言中志則意入淵泉以此事上水火可蹈以此託友金石可弊豈待充其榮實乃將議報厚之篚筐然後圖終如或與立茂思無忽祿利者受之易易則人之所榮蠶穡者就之艱艱則物之所鄙艱易既有勤倦之情榮鄙又閒向背之意此二塗所為反也以勞定國以功施人則役徒屬而擅豐麗自理於民自事其生則督妻子而趨耕織必使陵侮不作懸企不萌所謂賢鄙處宜華野同泰人以有惜為質非假嚴刑有恆為德不慕厚貴有惜者以理葬有恆者與物終世有位去則情盡斯無惜矣又有務謝則心移斯不恆矣又非徒若此而已或見人休事則懃蘄結納及聞否論則處彰離貳附會以從風隱竊以成釁朝吐面譽暮行背毀昔同稽款今猶叛戾斯為甚矣又非唯若此而已或憑人惠訓藉人成立與人餘論依人揚聲曲存稟仰甘赴塵軌衰沒畏遠忌聞影迹又蒙蔽其善毀之無度心短彼能私樹己拙自崇恆輩罔顧高識有人至此實蠹大倫每思防避無通閭伍覩驚異之事或涉流傳遭卒迫之變反思安順若異從己發將尸謗人迫而又迕愈使失度能夷異如裴楷處逼如裴遐可稱深士乎喜怒者有性所不能無常起於褊量而止於弘識然喜過則不重怒過則不威能以恬漠為體寬愉為器者則為美矣大喜蕩心微抑則定甚怒煩性小忍即歇故動無愆容舉無失度則物將自懸人將自止習之所變亦大矣豈惟蒸性染身乃將移智易慮故曰與善人居如入芝蘭之室久而不聞其芬與之化矣與不善人居如入鮑魚之肆久而不知其臭與之變矣是以古人慎所與處唯夫金真玉粹者乃能盡而不污爾故曰丹可滅而不能使無赤石可毀而不能使無堅苟無丹石之性必慎浸染之由能以懷道為人必存從理之心道可懷而理可從則不議貧議所樂耳或云貧何由樂此未求道意道者瞻富貴同貧賤理固得而自我喪之未為通議苟議不喪夫何不樂或曰溫飽之貴所以榮生飢寒在躬空曰從道取諸其身將非篤論此又通理所用凡養生之具豈間定實或以膏腴夭性有以菽藿登年中散云所足與不由外是以稱體而食貧歲愈嗛量腹而炊豐家餘飡非粒實息耗意有盈虛爾況心得優劣身獲仁富明白入素氣志如神雖十旬九飯不能令饑業席三屬不能為寒豈不信然且以己為度者無以自通彼量渾四游而斡五緯天道弘也振河海而載山川地道厚也一情紀而合流貫人靈茂也昔之通乎此數者不為剖判之行必廣其風度無挾私殊博其交道無懷曲異故望塵請友則義士輕身一遇拜親則仁人投分此倫序通允禮俗平一上獲其用下得其和世務雖移前休未遠人之適主吾將反本夫人之生蹔有心識幼壯驟過哀耗騖及其閒夭鬱既難勝言假獲存遂又云無幾柔麗之身亟委土木剛清之才遽為丘壤回遑顧慕雖數紀之中爾以此持榮曾不可留以此服道亦何能平進退我生游觀所達得貴為人將在含理含理之貴惟神與交幸有心靈義無自惡偶信天德逝不上慚欲使人沈來化志符往哲勿謂是賒日鑿斯密著通此意吾將忘老如曰不然其誰與歸值懷所撰略布眾條若備舉情見顧未書一贍身之經別在田家節政奉終之紀自著燕居畢義宋書顏延之傳又略見藝文類聚二十三又三十五初學記十八御覽四百十六又四百七十七又五百九十三又八百七十一清者人之正路御覽四百二十六枚叔有言欲人勿聞莫若勿言御寒莫若重裘止謗莫若自脩論語云內省不疚夫何憂何懼御覽五百九十三觀書貴要觀要貴博博而知要萬流可一詠歌之書取其連類合章比物集句采風謠以達民志詩為之祖褎貶之書取其正言晦義轉制衰王微辭豐旨貽意盛聖春秋為上易首體備能事之淵馬陸得其象數而失其成理荀王舉其正宗而略其數象四家之見雖各有所志總而論之精理出於微明氣數生於形分然則荀王得之於心馬陸取之於物其無惡迄可知矣夫象數窮則太極著人心極則神功彰若荀王之言易可謂極人心之數者也初學記二十一引兩條御覽六百八又六百九荀爽云詩者古之歌章然則雅頌之樂篇全矣是以後之詩者率以歌為名及秦勒望岱漢祀郊宮辭著前史者文變之高制也雖雅聲未至弘麗難追矣逮李陵眾作總雜不類元是假託非盡陵制至其善篇有足悲者摯虞文論足稱優洽柏梁以來繼作非一所纂至七言而已九言不見者將由聲度闡誕不協金石至於五言流靡則劉楨張華四言側密則張衡王粲若夫陳思王可謂兼之矣御覽五百八十六達見同善通辯異科一曰言道二曰論心三曰校理言道者本之於天論心者議之於人校理者取之於物從而別之繇塗參陳要而會之終致可一若夫玄神之經窮明之說義兼三端至無二極但語出梵方故見猜世學事起殊倫故獲非恆情天之賦道非差胡華人之稟靈豈限外內一以此思可無臆裁為道者蓋流出於仙法故以鍊形為上崇佛者本在於神教故以治心為先鍊形之家必就深曠反飛靈餱丹石粒芝精所以還年卻老延華駐彩欲使體合纁霞軌徧天海此其所長及偽者為之則忌災祟課粗願混士女亂妖正此其巨蠹也治心之術必辭親偶閉身性師淨覺信緣命所以反壹無生剋成聖業智邈大明志狹恆劫此其所貴及詭者為之則藉髮落狎菁華傍榮聲謀利論此其甚誣也物有不然事無不弊衡石日陳猶患差忒況神道不形固眾端之所假未能體神而不疑神無者以為靈性密微可以積理知洪變欻怳可以大順待照若鏡天肅若窺淵能以理順為人者可與言有神矣若乃罔其真而眚其弊是未加心照耳弘明集十三策秀才文廢興之要敬俟良說文選任昉天監策秀才文注請立渾天儀表張衡創物蔡邕造論戎夏相襲世重其術臣昔奉使入關值大軍旋旆渾儀在路肆觀奇祕絕代異寶旋及王府攷諸前志誠應夙聞尚書璇璣玉衡以齊七政崔瑗所謂數術窮天地制作侔造化經志所云圖憲所本故體度不渝精測尚矣則七晷運變無匪康時九代貞觀不絕司曆臣夙懷末意懼於非任今忝惟職統敢昧死以聞藝文類聚一御覽二拜永嘉太守辭東宮表抗志絕操芼陸謝芻代食賓士何獨匪民藝文類聚五十為竟陵王世子臨會稽郡表此郡歌風蹈雅既髣髴於淹中春誦夏絃實依稀於河上頃者以來稍有訛替可推擇明經式寄儒職使琢玉成器無爽昔談鑄金待價有符舊說藝文類聚五十謝子竣封建城侯表伏見策書降錫息竣開國建城縣侯爵踰三等戶越兼千生邀洪禮身茂盛世闔宗革聽盡室改觀誠慚末品誤參其泰臣聞子之能仕父教之忠忠教善信臣實負其前誥能仕志政竣固暗於明試徒以數遇會昌消憂啟聖幸與靈祚福德共從義勳分賞執珪登朝析金受邑慶重慮愆恩往懼積非臣耄蔽所任圖報豈竣庸薄所能奉服藝文類聚五十一上表自陳臣聞行百里者半於九十言其末路之難也愚心常謂為虛方今乃知其信臣延之人薄寵厚宿塵國言而雪效無從榮牒增廣厤盡身彫日叨官次雖容載有塗而妨穢滋積早欲啟請餘筭屏蔽醜老但時制行及歸慕無賖是以腆冒愆非𥳑息干黷耗歇難支質用有限自去夏侵暑入此秋變頭齒眩疼根痼漸劇手足冷痺左髀尤甚素不能食頃向減半本猶賴服食比倦悸遠晚年疾所催顧景引日臣班叨首卿位尸封典肅祗朝校尚恧匪任而陵廟眾事有以疾怠宮府覲慰轉闕躬親息㚟庸微過宰近邑回澤爰降實加將監乞解所職隨就藥養伏願聖慈特垂矜許稟恩明世負報冥暮仰企端闈上戀罔極宋書顏延之傳
