body:
  text: 徐爰藉田賦衍參途之廣闢眇道路之悠遠增華畢之未驚渺同方其已反初學記十四隱千軫以風行闐萬轡而霧轉白日麗晷乎桑野大駕稅幸乎疆甽同上議國史限斷表臣聞虞史炳圖原光被之美夏載昭策先隨山之勤天飛雖王德所至終陟固有資田躍神宗始於俾乂上日兆於納揆其在殷頌長發玄王受命作周實唯雍伯考行之盛則振古之弘軌降逮二漢亦同茲義基帝創乎豐郊紹祚本於昆邑魏以武命國志晉以宣啓陽秋明黃初非更姓之本太始為造物之末又近代之令準式遠之鴻規典謀緬邈紀傳成準善惡具書成敗畢記然餘分紫色滔天泯夏親所芟夷而不序於始傳涉聖卓紹煙起雲騰非所誅滅而顯冠乎首述豈不以事先歸之前録功偕著之後撰伏惟皇宋承金行之澆季鍾經綸之屯極擁玄光以鳳翔秉神符而龍舉劋定鯨鯢天人佇屬晉祿數終上帝臨宋便應奄膺紘寓對越神工而恭服勤於三分讓德邁於不嗣其為巍巍蕩蕩赫赫明明歷觀逖聞莫或斯等宜依銜書改文登舟變號起元義熙為王業之始載序宣力為功臣之斷其僞玄篡竊同於新莽雖靈武克殄自詳之晉録及犯命干紀受戮霸朝雖揖禪之前皆著之宋策國典體大方垂不朽請外詳議伏須遵承宋書徐爰傳先是元嘉中何承天草創國史世祖初又使山謙之蘇實生踵成之六年以爰終其業因上表於是內外同爰議皇子出後告廟議國之大事必告祖禰皇子出嗣不得謂小昔第五皇子承統廬陵備告七廟宋書禮志四孝建三年五月兼右丞殿中郎徐爰議鑄四銖錢議貴貨利民載自五政開鑄流圜法成九府民富國實教立化光及時移俗易則通變適用是以周漢俶遷隨世輕重降及後代財豐用足因條前寶無復改創年歷既遠喪亂屢經堙焚翦毀日月銷減貨薄民貧公私俱困不有革造將至大乏謂應式遵古典收銅繕鑄納贖刊刑箸在往策今宜以銅贖刑隨罰為品宋書頻竣傳孝建三年防禦索虜議詔旨虜犯邊塞水陸遼遠孤城危棘復不可置臣以戎虜猖狂狡焉滋廣列卒擬侯伺覘閒隙不勞大舉終莫永寧然連於千里費固巨萬而中興造創資儲未積是以齊斧徘徊朔氣稽掃今皇運洪休靈威遐懾蠢爾遺燼懼在誅翦思肆蜂蠆以表有餘雖不敢深入濟沛或能草竊邊塞羽林鞭長太倉遙阻救援之日勢不相及且當使緣諸戍練卒嚴城凡諸督統聚糧蓄田籌計資力足相抗擬小鎮告警大督電赴塢壁邀斷州郡犄角儻有自送可使匹馬不反詔旨胡騎倏忽抄暴無漸出耕見虜野粒資寇比及少年軍實無擬江東根本不可俱竭宜立何方可以相贍臣以為方鎮所資實宜且田且守若使堅壁而春墾輟耕清野而秋登莫擬私無生業公成虛罄遠引根本二三非宜救之之術唯在盡力防衛來必拒戰去則邀躡據險保隘易為首尾胡馬既退則民豐廩實比及三載可以長驅詔旨賊之所向本無前謀兵之所進亦無定所比歲戎戍倉庫多虛先事聚衆則消費糧粟敵至倉卒又無以相應臣以為推鋒前討大須資力據本應末不俟多衆今寇無傾國豕突列城勢足脣齒養卒得勇所任得才臨事而懼應機無失豈煩空聚兵衆以待未然詔旨什狄貪婪唯利是規不挫凶圖姦志歲結臣以為不擊則必侵掠侵掠不已則民失農桑農桑不收則不戍不立為立之方擊之為要詔旨若令邊地歲驚公私失業經費困於遙輸遠圖決無遂事寢斃贊略逆應有方臣以為威虜之方在於積粟塞下若使邊民失業列鎮寡儲非唯無以遠圖亦不能制其侵抄今當使小戍制其始寇大鎮赴其入境一被毒手便自吹齏鳥逝矣宋書徐爰傳孝建三年皇子出後告廟臨軒議營陽繼體皇基身亡封絶恩詔追封錫以一城既始啓建茅土故宜臨軒告廟今歆繼後南豐彼此俱為列國長沙南豐自應各告其祖豈關太廟事非始封不合臨軒宋書禮志四大明元年六月詔以前太子步兵校尉祗男歆紹南豐王朗有司奏繼體不告廟臨軒殿中郎徐爰議郊祀遇雨議郊禮用辛有礙遷日禮官祠曹考詳已備何偃據禮不應重告愚情所同尋告郊剋辰於今宜改告事而已次辛十日居然展齊養牲在滌無緣三月謂毛血告牷之後雖有事礙便應有司行事不容遷郊宋書禮志三大明二年正月右丞徐爰議又見通典四十二郊兆議郊祀之位遠古蔑聞禮記燔柴於太壇祭天也兆於南郊就陽位也漢初甘泉河東禋埋易位終亦徙於長安南北光武紹祚定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南出道狹未議開闡遂於東南已地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊章畢新南驛開塗陽路修遠謂宜移郊正午以定天位宋書禮志一通典四十二大明三年九月安陸國廟祭議案禮慈母妾母不代祭鄭玄注以其非正故傳曰子祭孫止又云為慈母後者為祖庶母可也注稱緣為慈母後之義父妾無子亦可命己庶子為之後也考尋斯義父母妾之祭不必唯子江夏宣王太子體自元宰道戚之胤遭時不幸聖上矜悼降出皇愛嗣承徽緒光啓大蕃屬國為祖始王夫人載育明懿則一國之正上無所厭哀敬得申既未獲祔享江夏又不從祭安陸即事求情愚以為宜依祖母有為後之義謂合列祀於廟宋書禮志四大明四年有司奏安陸國土雖建而奠酹之所未及營立四時薦饗故祔江夏之廟宣王所生夫人當應祠不右丞徐爰議陳留國立世子議禮厚大宗以其不可乏祀諸侯代及春秋成義處嗣承家傳爵身為國王雖薨沒無子猶列昭穆立後之日便應即纂國統於時既無承繼處秀以次襲紹處嗣既列廟饗故自與代數而遷豈容蒸嘗無闕橫取他子為嗣為人胤嗣又應恭祀先父案禮公子不得禰諸侯處嗣無緣降廟就寢銑亦不得援祭先王徵禮考事處嗣不應立後銑本長息宜還為處秀代子通典九十三大明四年九月有司奏陳留王曹處嗣薨以弟處秀襲後秀又薨今依例應拜代子未詳應以秀長子銑為代子為應立次子鍇大學博士王溫之江長議竝謂應以銑為王嗣太常丞陸澄議為立鍇右丞徐爰謂云云詔如爰議宋書禮志二有刪節諸處字皆作虔秀作季為太子妃服議宮人從服者若二御器臨應著縗時從服者悉著縗非其日如常儀太子既有妃朞服召見之日還著公服若至尊非器臨日幸東宮太子見亦如之宮臣見至尊皆著朱衣宋書禮志二通典八十二大明五年有司奏右丞徐爰參議皇太子妃喪議皇太子妃雖未山塋臨軒拜官舊不為礙梓棺在殯應懸而不作祔後三御樂宜使學官擬禮上宋書禮志二通典八十二大明五年閏月又議皇太子期服內不合作樂及鼓吹宋書禮志二太子妃喪不舉祭議禮緦不祭蓋惟通議大夫以尊貴降絶及其有服不容復異祭統云君有故使人可者謂於禮應祭君不得齊祭不可闕故使臣下攝奉不謂君不應祭有司行事也晉咸寧四年景獻皇后崩晉武帝伯母宗廟廢一時之祀雖名號尊崇粗可依準今太子妃至尊正服大功非有故之比既未山塋謂蒸祠宜廢尋蔚之等議指歸不殊闕蒸為允過卒哭祔廟一依常典宋書禮志四大明五年十月右丞徐爰議宣貴妃立廟議宣貴妃既加殊命禮絶五宮考之古典顯有成據廟堂克構宜選將作大匠宋書禮志四大明七年正月左丞徐爰議又朏宋書始平王鸞傳大匠下有卿字宣貴妃祭議禮有損益古今異儀春秋傳雖云卒哭而祔祔而作主時之諸侯皆禫終入廟且麻衣縓緣革服於元嘉苫絰變除申情於皇宋況宣貴妃誕育睿蕃葬加殊禮靈筵廬位皆主之哲聖考宮創祀不復關之朝廷謂禫除之後宜親執奠爵之禮若有故三卿行事貴妃上厭祖姑下絶列國無所應祔宋書禮志四通典四十七大明七年三月左丞徐爰議晉陵王無後廟祭議嗣王未立將來承胤未知疏近豈宜空計服屬以虧祭敬宋書禮志四通典五十二大明七年十一月左丞徐爰議詔可齊敬王子羽廟祭議國無後於制除罷始封之君實存承嗣皇子追贈則為始祖臣不殤君事著前準豈容虛關蒸嘗以俟有後謂宜立廟作主三卿主祭依舊宋書禮志四大明八年正月游擊將軍徐爰議又見通典五十二駮陸澄皇后班諱稱姓議案司馬孚議皇后春秋逆王后於齊竝不言姓南史四十八陸澄傳泰始初澄為尚書殿中郎議皇后諱班下應依舊稱姓左丞徐爰案郊祀議虞稱肆類殷述昭告蓋以創世成功德盛業遠開統肇基必享上帝漢魏以來聿遵斯典高祖武皇帝克伐僞楚晉安帝尚在江陵即於京師告義恭於郊兆伏惟泰始應符神武英斷王赫出討戎戒淹時雖司奉弗虧親謁尚闕謹尋晉武郊以二月晉元禋以三月有非常之慶必有非常之典不得拘以常祀限以正月上辛愚謂宜下史官考擇十一月嘉吉車駕親郊奉謁昊天上帝高祖武皇帝配饗其餘祔食不關今祭宋書禮志三泰始二年十一月黃門侍郎徐爰議渾儀論渾儀之制未詳厥始王蕃言虞書稱在琁璣玉衡以齊七政則今渾天儀日月五星是也鄭玄說動運為機持正為衡皆以玉為之視其行度觀受禪是非也渾儀羲和氏之舊器歷代相傳謂之璣衡其所由來有原統矣而斯器設在侯臺史官禁密學者寡得聞見穿鑿之徒不解機衡之意見有七政之言因以為北斗七星搆造虛文託之讖緯史遷班固猶尚惑之鄭玄有贍雅高遠之才沈靜精妙之思超然獨見改正其說聖人復出不易斯言矣蕃之所云如此夫侯審七曜當以運行為體設器擬象焉得定其盈縮推斯而言未為通論設使唐虞之世已有渾儀涉歷三代以為定準後世聿遵孰敢非革而三天之儀紛然莫辨至揚雄方難蓋通渾張衡為太史令乃鑄銅制範衡傳云其作渾天儀考步陰陽最為詳密故知自衡以前未有斯儀矣蕃又云渾天遭秦之亂師徒喪絶而失其文惟渾天儀尚在侯臺案既非舜之璇玉又不載今儀所造以緯書為穿鑿鄭玄為博實偏信無據未可承用夫璇玉貴美之名璣衡細之目所以先儒以為北斗七星天綱運轉聖人仰觀俯察以審時變焉宋書天文志一旄頭說晉武常問侍臣旄頭何義彭推對曰秦國有奇怪觸山截水無不崩潰唯畏旄頭故虎士服之則秦制也張華曰有是言而事不經臣謂壯士之怒髮踊衡冠義取於此摯虞決疑無所是非也徐爰曰彭張之說各言意義無所承據案天文畢昴之中謂之天街故車駕以罼罕前引畢方昴圓因其象星經昴一名旄頭故使執之者冠皮毛之冠也宋書禮志五食針悠悠遂古民之初生有生自食有實資生順性甘是黍稷炎皇俶載后棄茂植一食三飽聖賢通執三穀既翳五味亦宜潔爨豐盛滋芬美肥奉君養親靡不加精充虜潤氣調神暢情北堂書鈔一百四十二一百四十三家儀蠟本施祭故不賀其明日為小歲賀稱初歲福始慶無不宜正旦賀稱元正首慶百物惟新小歲之賀既非大慶禮止門內御覽三十三婚迎車用銅香爐二枚御覽七百三奏陳天文符讖去義熙元年至元熙元年十月太白星晝見經天凡七占曰天下革民更主異姓興義熙元年至元熙元年十一月朔日有蝕之凡四皆蝕從上始臣民失君之象也義熙十一年五月三日慧星出天市其芒掃帝坐天市在房心之北宋之分野得彗柄者興此除舊布新之徵義熙七年七月二十五日五虹見於東方占曰五虹見天子黜聖人出義熙七年八月十一日新天子氣見東南十二年北定中原崇進宋公歲星裴回房心之間大火宋之分野與武王克殷同得歲星之分者應王也十一年以來至元熙元年月行失道恆北入太微中占月入太微廷王入為主十三年十月鎮星入太微積留七十餘日到十四年八月十日又入太微不去到元熙元年積二百餘日占曰鎮星守太微亡君之戒有立王有徙王十四年五月十七日茀星出北斗魁中占曰星茀北斗中聖人受命十四年七月二十九日慧星出太微中彗柄起上相星下芒尾漸長至十餘丈進掃北斗及紫微中占曰慧星出太微社稷亡天下易政入北帝宮室一占天下得召人召人聖主也一曰慧孛紫微天下易主十四年十月一日熒惑從入太微鉤已至元年四月二十七日從端門出積尸留二百六日繞鎮星熒惑與鎮星鉤已天庭天下更紀十四年十二月歲太白辰裴回居斗牛之閒經旬斗牛曆數之起占曰三星合是謂改立元熙元年十二月二十四日四黑龍登天易傳曰冬龍見天子亡社稷大人應天命之符金雌詩云大火有心水抱之悠悠百年是其時火宋之分野水宋之德也金雌詩又曰云山而兩漸欲舉短如之何乃相岨交哉亂也當何所唯有隱巖殖禾黍西南之朋困桓父兩云玄字也短者云胙短也巖隱不見唯應見谷殖禾谷邊則聖諱炳明也易曰西南得朋故能困桓父也劉向讖曰上五盡寄致太平草付合成集群英前句則陛下小諱後句則太子諱也十一年五月西明門地陷水涌出毀門扉閾西者金鄉之門為水所毀此金德將衰水德方興之象也太興中民於井中得棧鐘上有古文十八字晉自宣帝至今數滿十八年義熙八年太社生桑明尤著者也夫六亢位也漢建武至建安二十五年一百九十六年而禪魏魏自黃初至咸熙二年四十六年而禪晉晉自泰始至今元熙二年一百五十六年三代數窮咸以六年宋書符瑞志上南史宋本紀一南史未有漢光武社於南陽漢末而其樹死劉備有蜀乃應之而興及晉季年舊根始萌至是而盛矣若此者有數十條蜀葵賦惟茲珍草懷芬吐榮挻河渭之膏壤吸昴井之玄精繞銅爵而疏植映昆明而羅生作妙觀於神州扇令名於東京馳驛命而遠致攢華林而麗庭申修翹之冉冉播圓葉之青青藝文類聚八十一御覽九百九十四遠法師銘沙門釋惠遠雁門樓煩人本姓賈氏世為冠族年十二隋舅令狐氏遊學許洛年二十一欲南渡就范宣子學道阻不通遇釋道安以為師抽簪落髮研求法藏釋曇翼每資以燈燭之費誦鑒淹遠高悟冥賾安常歎曰道流東國其在遠乎襄陽既沒振錫南遊結宇靈嶽自年六十不復出山名被流沙彼國僧衆皆稱漢地有大乘沙門每至然香禮拜輒東向致敬年八十三而終世說文學篇注園桃賦嗟王母之奇果特華實兮兼副既陶煦之夏成又淩寒而冬就嗟異殖兮難拔亦晚枯兮先茂農黃品其味漢帝驚其珍林休反耕之牛宅樹同惡之神景斃勇於不足彌增罪於甘分雖無言兮成蹊叵充肴於魏君時令載始周南申章瞻擇有制藥齊惟良魯拂樞以悔荊楚供弧以事王藝文類聚八十六初學記二十八柳花賦步江皋兮騁望感春柳之依依垂柯葉而雲布揚零華而雪飛或風回而遊薄或霧亂而飆零野淨穢而同降物均色而齊明藝文類聚八十九初學記二十八籍田賦瞻望圭景咫尺三州緬彼帝籍百有餘年映至德於盛位儷列晷於微辰紆紛陽以昧旦信堯心而禹勤史奉載耜之禮民奏舉趾之歌膏壤千畝與式既同區勢平易畝陌修通提攜丘澤眺嶺面松藝文類聚三十九御覽五百三十七大暑賦惟祝融之司運赫溽暑之方隆日貞躍於鶉首律遷度於林鍾溫風翕以晨至星火爛以昏中氣滔滔而方盛晷永路而難終流水兮莫繼朱煙兮四纏鬱邑兮中房展轉兮長筵體沸灼兮如燎汗流爛兮珠連藝文類聚五御覽三十四菊賦佇寒丘以彌望覿中霜之軟菊肇三春而懷芬淩九秋以愈馥不履苦淪操不在同而表淑傷衆花之飄落嘉茲卉之能靈振徑朔以揚淥含凝露而吐英藝文類聚八十一薺賦終風掃於暮節霜露交於杪秋有萋妻之緑薺方滋繁於中丘藝文類聚八十二祭孫叔敖文謹以醴羞祭楚令尹孫君之靈眇眇千載悠悠舒荊理無不通事隔者形尚想清塵承風效誠超超夫子淡矣道情自心伊貴人爵靡嬰芳風如蕭清響如塤景矣行役言戾豫方側聞夫子記憤睢陽靈封穨墓丘塋榛荒幽幽幽神道為有為亡徘徊永念悽矣其傷藝文類聚三十八御覽五百二十六七誨攜同好命爪牙攝烏虎杖雄戈緣山結網參雲張羅御覽三百五十一美人賦居瑤光之巖奧御象席之瓊珍文選謝希逸宣貴妃誄注與江夏王義恭箋承復須古物今奉秦李斯狗枷漢相如犢鼻引謝綽宋拾遺録義恭性愛古物常遍就朝士求之侍中何勖已有所送而王徵索不已何甚不平出行於道遇狗枷敗犢鼻乃命左右取之還以箱擎送之箋曰寄宗人何勖書以韻語序義慶州府僚佐陸展染鬚髮欲以媚側室青青不解久星星行復出宋書又引見御覽三百七十三徵翟法賜表止奉詔書徵郡民新除著作佐郎南陽翟法賜補員外散騎侍郎法賜隱迹廬山於今四世栖身幽巖人罕見者如當逼以王憲束以嚴科馳山獵草以期禽獲慮致顛殞有傷盛化宋書翟法賜傳
