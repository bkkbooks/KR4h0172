body:
  text: 裴松之請禁私碑表碑銘之作以明示後昆自非殊功異德無以允應茲典大者道動光遠世所宗推其次節行高妙遺烈可紀若乃亮采登庸績用顯著敷化所蒞惠訓融遠述詠所寄有賴鐫勒非斯族也則幾乎僭黷矣俗敝僞興華煩已久是以孔悝之銘行是人非蔡雍制文每有愧色而自是厥後其流彌多預有臣吏必為建立勒銘寡取信之實刊石成虛僞之常真假相蒙殆使合美者不貴但論其功費又不可稱不加禁裁其敝無已以為諸欲立碑者宜悉令言上為朝議所許然後聽之庶可以防遏無徵顯彰茂實使百世之下知其不虛則義信於仰止道孚於來葉宋書裴松之傳又禮志二云熙中尚書祠部郎裴松之又議禁斷上三國志注表臣松之言臣聞智周則萬理自賓鑒遠則物無遺照雖盡性窮微深不可識至於緒餘所寄則必接乎粗迹是以體備之量猶曰好察邇言畜德之厚在於多識往行伏惟陛下道該淵極神超妙物暉光日新郁哉彌盛雖一貫墳典怡心玄賾猶復降懷近代博觀興廢將以總括前蹤貽誨來世臣前被詔使采三國異同以注陳壽國志壽書銓敘可觀事多審正誠游覽之苑囿近世之嘉史然失在於略時有所脫漏臣奉詔尋詳務在周悉上搜舊聞傍托遺逸案三國雖歷年不遠而關漢晉首尾所涉出入百載注記分錯每多舛互其壽所不載事宜存録者則罔不畢取以補其闕或同說一事而辭有乖雜或出事本異疑不能判竝皆鈔內以備異聞若乃紕繆顯然言不附理則隨違矯正以懲其妄其時事當否及壽之小失頗以愚意有所論辨自就撰集已垂朞月寫校始訖謹封上呈竊惟繢事以衆色成文蜜蜂以兼采為味故能使絢素有章甘踰本質臣實頑乏顧慚二物雖自馨厲分絶藻繢既謝淮南食時之敏又微狂簡斐然之作淹留無成祗穢翰墨不足以上酬聖旨少塞愆責愧懼之深若墜淵谷謹拜表以聞隨用流汗臣松之誠惶誠恐頓首頓首死罪謹言元嘉六年七月二十四日中書侍郎西鄉侯臣裴松之上明監本三國志奉使巡行反奏事臣聞天道以下濟光明君德以廣運為極古先哲后因心溥被是以大思在躬則時雍自洽禮行江漢而美化斯遠故能垂大哉之休詠廓造周之盛則伏惟陛下神睿玄通道契曠代冕旒華堂垂心八表咨敬敷之未絶慮明揚之靡畼清問下民哀此鰥寡渙焉大號周爰四達遠猷形於雅誥惠訓播乎遐陬是故率土仰詠重譯咸說莫不謳吟踴躍式銘皇風或有扶老攜幼稱歡路左誠由亭毒既流故忘其自至千載一時於是乎在臣謬蒙銓任忝廁顯列猥以短乏思純八表無以宣畼聖旨肅明風化黜陟無序搜揚寡聞慚懼屏營不知所措奉二十四條謹隨事為牒伏見癸卯詔書禮俗得失一依周典每各為書還具條奏依事為書以繫之後宋書裴松之傳庾炳之府公禮敬議案春秋桓八年祭公逆王后于紀公羊傳曰女在國稱女此其稱王后何王者無外其辭成矣推此而言則炳之為吏之道定於受命之日矣其辭已成在無外名器既正則禮亦從之且今宰牧之官拜不之職未接之民必有其敬者以既受王命則成君民之義故也吏之被敕猶除者受拜民不以未見闕其被禮吏安可以未到廢其節乎愚懷所見宜執吏禮宋書庾炳之傳答江氏問大功嫁妹江氏問裴松之曰從兄女先剋此六月與庾長史弟婚其姊蔡氏先三月亡葬送已畢從兄無嗣兄子簡為後今與從妹同服大功大功未可以嫁子不知無父而兄有大功服可復嫁妹不答曰意謂父有大功尚可嫁子兄在大功理無不可今所未了者未知女身大功亦可得嫁不又降而在大功得與本服九月者同不見宗濤答范超伯問娶婦之與嫁子輕重有一等之差已身小功可以娶妻女身大功何為不可以嫁謂此言為是但其論降在大功者如為不盡吾以為騁納禮重故探其本情適人差輕故以見服為斷禮無降在大功不可嫁子之文不應於外生疑且有小功下殤之喪過五月便可以娶降在九月者過三月而後嫁計其日月亦一等之謂也通典六十答何承天書論次孫持重禮嫡不傳重傳重非嫡皆不加服明嫡不可二也范宣所云次孫本無三年之道若應為服後次孫宜為喪主終竟三年而不得服三年之服也通典八十八難郭沖條諸葛亮五事王隱蜀記云晉初扶風王駿鎮關中司馬高平劉寶長史滎陽桓隰諸官屬士大夫共論諸葛亮於時談者多譏亮託身非所勞困蜀民力小謀大不能度德量力金城郭沖以為亮權智英略有踰管晏功業未濟論者惑焉條亮五事隱沒不聞於世者寶等亦不能復難扶風王慨然善沖之言臣松之以為亮之異美誠所願聞然沖之所說實皆可疑謹隨事難之如左其一事曰亮刑法峻急刻剝百姓自君子小人咸懷怨歎法正諫曰昔高祖入關約法三章秦民知德今君假借威力跨據一州初有其國未垂惠撫且客主之義宜相降下願緩刑弛禁以慰其望亮答曰君知其一未知其二秦以無道政苛民怨匹夫大呼天下土崩高祖因之可以弘濟劉章暗弱自焉以來有世之恩文法羈縻互相承奉德政不舉威刑不肅蜀土人土專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致弊實由於此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩竝濟上下有節為治之要於斯而著難曰案法正在劉主前死今稱法正諫則劉主在也諸葛職為股肱事歸元首劉主之世亮又未領益州慶賞刑政不出於己尋沖所述亮答專自有其能有違人臣自處之宜以亮謙慎之體殆必不然又云亮刑法峻急刻剝百姓未聞善政以刻剝為稱其二事曰曹公遣刺客見劉備方得交接開論伐魏形勢甚合備計稍欲親近刺者尚得便會既而亮入魏客神色失措亮因而察之亦知非常人須臾客如廁備謂亮曰向得奇士足以助君補益亮問所在備曰起者其人也亮徐歎曰觀客色動而神懼視低而忤數奸形外漏邪心內藏必曹氏刺客也追之以越牆而走難曰凡有刺客皆暴虎憑河死而無悔者也劉主有知人之鑒而惑於此客則此客亦一時之奇士也又語諸葛云足以助君補益則亦諸葛之流亞也凡如諸葛之儔鮮有為人作刺客者矣時主亦當惜其器用必不投之死地也且此人不死要應顯達為魏竟見誰乎何其寂蔑而無聞三事曰亮屯於陽平遣魏延諸軍并兵東下亮惟留萬人守城晉宜帝率二十萬衆拒亮而與延軍錯道徑至前當亮六十里所偵侯白宣帝說亮在城中兵少力弱亮亦知宣帝垂至已與相逼欲意氣自若敕軍中皆臥旗息鼓不得妄出菴幔又令大開四城門北趣山明日食時亮謂參佐拊手大笑曰司馬懿必謂吾怯將有彊伏循山走矣侯邏還白如亮所言宣帝後知深以為恨難曰案陽平在漢中亮初屯陽平宣帝尚為荊州都督鎮宛城至曹真死後始與亮於關中相抗禦耳魏嘗遣宣帝自宛由西城伐蜀值霖雨不果此之前後無復有與陽平交兵事就如沖言宣帝既舉二十萬衆已知亮兵少力弱若疑其有伏兵正可設防持重何至便走乎案魏延傳云延每隨亮出輒欲請精兵萬人與亮異道會於潼關亮制而不許延常謂為怯歎已才用之不盡也亮尚不以延為萬人別統豈得如沖言頓使將軍兵在前而以輕弱自守乎且沖與扶風王言顯彰宣帝之短對子毀父理所不容而云扶風王慨然善沖之言故知此書舉引皆虛四事曰亮出祁山隴西南安二郡應時降圍天水拔冀城虜姜維驅略士女數千人還蜀人皆賀亮亮顏色愀然有戚容謝曰普天之下莫非漢民國家威力未舉使百姓困於豺狼之吻一夫有死皆亮之罪以此相賀能不為愧於是蜀人咸知亮有吞魏之志非惟拓境而已難曰亮有吞魏之志久矣不始於此衆人方知也且於時師出無成傷缺而反者衆三郡歸降而不能有姜維天水之匹夫耳獲之則於魏何損拔西縣千家不補街亭所喪以何為功而蜀人相賀乎五事曰魏明帝自征蜀幸長安遣宣王督張郃諸軍雍涼徑卒三十餘萬潛軍密進規向劍閣亮時在祁山旌旗利器守在險要十二更下在昔八萬時魏軍始陳幡兵適交參佐咸以賊衆強盛非力所制宜權停下兵一月以并聲勢亮曰吾統武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望而計日雖臨征難義所不廢皆催遺令去於是去者感悅願留一戰往者憤踊思致死命相謂曰諸葛公之恩死猶不報也臨戰之日莫不拔刃爭先以一當十殺張郃卻宣王一戰大剋此信之由也難曰臣松之案亮前出祁山魏文帝身至長安耳此年不復自來且亮大軍在關壟魏人何由得越亮徑向劍閣亮既出戰場本無久住之規而方休兵還蜀皆非經通之言孫盛習鑿齒搜求異同罔有所遺而竝不多載沖知其乖刺多矣蜀志諸葛亮傳注史記集解序班固有言曰司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖於天漢其言秦漢詳矣至於采經托傳分散數家之事甚多疏略或有抵牾亦其所涉獵者廣博貫穿經傳馳騁古今上下數千載閒斯已勤矣又其是非頗謬於聖人論大道則先黃老而後六經序遊俠則退庶士而進姦雄述貨殖則崇勢利此其所蔽也然自劉向揚雄博極群書皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録駰以為固之所言世稱其當雖時有紕繆實勒成一家總其大較信命世之宏才也考較此書文句不同有多有少莫辨其實而世之惑者定彼從此是非相貿真僞舛雜故中散大夫東莞徐廣研核衆本為音義具列異同兼述訓解粗有所發明而殊恨省略聊以愚管增演徐氏采經傳百家并先儒之說豫是有益悉皆鈔內刪其游辭取其要實或義在可疑則數家兼列漢書音義稱臣瓚者莫知氏姓今直云瓚曰又都無姓名者但云漢書音義時見微意有所裨補譬嘒星之繼朝陽飛塵之集華嶽以徐為本號曰集解未詳則闕弗敢臆說人心不同聞見異辭班氏所謂疏略抵牾者依違不悉辨也愧非胥臣之多聞子産之博物妄言末學蕪穢舊史豈足以關諸畜德庶幾無所用心而已宋本史記辭太子少傅表伏見詔書以臣為太子少傅承命震惶喜懼交悸臣抱疾東荒志絶榮觀不悟聖恩猥復加寵東宮之重四海瞻望非臣薄德所可居之今海內英秀應選者多且板築之下豈亮高逸而近私愚朽汙辱清朝嗚呼微臣永非復大之一物矣所以曳闕下者實瞻望聖顏貪繫表之旨臣如而歸夕死無恨宋書王敬弘傳元嘉十二年徵為太子少傳敬弘詣京師上表詔不許疏屢上竟以不拜東歸辭左光祿大夫開府儀同三司表臣比自啓聞謂誠心已達天鑒玄邈未蒙在宥不敢宴處牽曳載馳臣聞君子行道忘其為身三復斯言若可庶勉顧惜惛耄志與願違禮年七十老而傳家家道猶然況於在國伏願陛下矜臣西夕愍臣一至特回聖恩賜反其所則天道下濟愚心盡矣宋書王敬弘傳十六年以為左光祿大夫開府儀同三司侍中如故詣京師上表竟不拜東歸又表臣躬耕南澧示求聞達先帝拔臣於蠻荊之域賜以國士之遇陛下嗣徽特蒙眷齒由是感激委質聖朝雖懷犬馬之誠遂無塵露之益年向九十生理殆盡永絶天光淪沒丘壑謹冒奉表傷心久之宋書王敬弘傳二十三年重申前令又表奏請徵王弘之郭希林聖明司契載德惟新垂鑑仄微表揚隱介默語仰風荒遐傾首前員外散騎常侍琅邪王弘之恬漠丘園放心居逸前衛將軍參軍武昌郭希林素履純潔嗣微前武竝擊壤聖朝未蒙表飾宜加旌聘賁於丘園以彰止遜之美以袪動求之纍臣愚弘之可太子庶子希林可著作郎宋書王弘傳弘之家在會稽上虞從兄敬弘為吏部尚書奏云云又陳弘之高行表於初筮苦節彰於莫年今內外晏然當修太平之化宜招空谷以敦沖退之美宋書王弘之傳太祖即位敬弘為左僕射又陳與子恢之書祕書有限故有競朝請無限故無競吾欲使汝處於不競之地宋書王敬弘傳子恢之被召為祕書郎敬弘為求奉朝請與恢之書墾起湖田議遠廢之疇方翦荊棘率課窮乏其事彌難資徒粗立徐行無晚宋書孔季恭傳大明初孔靈符為丹陽尹表徙無資之家於餘姚鄞鄮三縣界墾起湖田光祿勳王升之議
