body:
  text: 文帝徙謝靈運詔靈運罪釁纍仍誠合盡法但謝玄勳參微管宜宥及後嗣可降死一等徙付廣州宋書謝靈運傳廷尉奏靈運率部衆反叛論正斬刑上愛其才欲免而已彭城王義康堅執謂不宜恕乃詔下楊難當詔楊難當表如此悔謝前愆可特恕宥并特還章節宋書氐胡傳梁州平下詔蕭承之稟命先驅蒙險深入全軍屢剋奮其忠果可龍驤將軍隨府轉寧朔司馬太守如故南齊書高帝紀上營道侯冠禮詔營道侯義綦可克日冠外詳舊施行何禎冠儀約制及王堪私撰冠儀亦皆家人之可遵用者也答沮渠茂虔詔故使持節侍中都督秦河沙涼四州諸軍事車騎大將軍開府儀同三司領護胸奴中郎將西夷校尉涼州牧河西王蒙遜才兼文武勳濟西服爰自萬里款誠夙著方仗忠果翼宣遠略奄至薨殞悽悼於懷便遣使弔祭并加顯諡嗣子茂虔篡戎前軌乃心彌彰宜蒙寵授紹茲蕃業可持節散騎常侍都督涼秦河沙四州諸軍事征西大將軍領護胸奴中郎將西夷校尉涼州刺史河西王宋書氐胡大且渠蒙遜傳求賢詔周宗以寧實由多士漢室之隆亦資得人朕寤寐樂賢為日已久而俊哲難階明揚莫效用令遺才在野管庫虛朝永懷前載慚德深矣夫舉爾所知宣尼之篤訓貢士任官先代之成準便可宜敕內外各有薦舉當依方銓引以觀厥用宋書文帝紀誅檀道濟詔檀道濟階緣時幸荷恩在昔寵臨優渥莫與為比曾不感佩殊遇思答萬分乃空懷疑二履霜日久元嘉以來猜阻滋結不義不昵之心附下罔上之事固已暴之民聽彰於遐邇謝靈運志凶辭醜不臣顯著納受邪說每相容隱又潛散金貨招誘剽猾逋兆必至實繁彌廣日夜伺隙希冀非望鎮軍將軍仲德往年入朝屢陳此迹朕以其位台鉉豫班河嶽彌縫容養庶或能革而長惡不悛凶慝遂遘因朕寢疾規肆禍心前南蠻行參軍龐延祖具悉奸狀密以啓聞夫君親無將刑茲罔赦況罪釁深重若斯之甚便可收付廷尉肅正刑書事止元惡餘無所問宋書檀道濟傳答沈亮陳府事詔前已令卿兄改革尋值遷回竟是不施行邪今更敕西府也宋書自序亮啓西府兵士以六十休老十五供役詔答又答沈亮陳城府功課詔啓之甚佳此亦由來常患比屢敕之猶復如此甚為無理近復令孟休宣旨想當不同卿比可密觀其優劇也宋書自序亮時營創城府功課嚴促陳之太祖詔答罪劉湛詔劉湛階藉門蔭少叨榮位往佐歷陽奸詖夙著謝晦之難潛使密告求心即事久宜誅屏朕所以棄罪略瑕庶收後效寵秩優泰踰越倫匹而凶忍忌克剛愎靡厭無君之心觸遇斯發遂乃合黨連群搆扇同異附下蔽上專弄威權薦子樹親互為表裏邪附者榮曜九族秉理者推陷必至旋觀奸慝為日已久猶欲弘納遵養冀或悛革自邇以來淩縱滋甚悖然懟容罔所顧忌險謀潛計睥睨兩宮豈唯彰暴國都固亦達于四海比年七曜違度震蝕表災侵陽之徵事符幽顯縉紳含憤義夫興歎昔齊魯不綱禍傾邦國昭宣電斷漢祚方延便收付廷尉肅明刑典宋書劉湛傳恤民詔前所給揚南徐二州百姓田糧種子兗兩豫青徐諸州比年所寬租穀應督入者悉除半今半有不收處都原之凡諸逋債優量申減又州郡佸稅所在市調多有煩刻山澤之利猶或禁斷役召之品遂及稚弱諸如此比傷治害民自今咸依法令務盡優允如有不便即依事別言不得苟趣一時以乖隱恤之旨主者明加宣下稱朕意焉宋書文帝紀嘉劉道錫詔前者兵寇攻逼邊情波駭廣威將軍巴西梓潼二郡太守劉道錫將率文武盡心固守保全之績厥效可書可冠軍咨議參軍前建威將軍晉壽太守申坦孤城弱衆厲志致果死傷參半壯氣不衰雖力屈陷沒在誠宜甄可建威將軍巴西梓潼二郡太守宋書劉道産傳勸學詔夫所因者本聖哲之遠教本立化成教學之為貴故詔以三德崇以四術用能納諸義方致之軌度盛王祖世咸必由之永初受命憲章弘遠將陶鈞庶品混一殊風有詔典司大啓庠序而頻遘屯夷未及修建永瞻前猷思敷鴻烈今方隅乂寧戎夏慕嚮廣訓胄子實維時務便可式遵成規闡揚景業宋書文帝紀下沮渠無諱詔往年狡虜縱逸侵害涼土河西王茂虔遂至不守淪陷寇逆纍世著誠以為矜悼次第無諱克紹遺業保據方隅外結鄰國內輯民庶係心闕庭踐修貢職宜加朝命以褎篤勳可持節散騎常侍都督涼河沙三州諸軍事征西大將軍領護胸奴中郎將西夷校尉涼州刺史河西王宋書氐胡大且渠蒙遜傳崇孔聖詔胄子始集學業方興自微言泯絶逝將千祀感事思人意有慨然奉聖之胤可速議繼襲於先廟地特為營造依舊給祠置令四時饗祀闕里往經寇亂黌校殘毀并下魯郡修復學舍採召生徒昔之賢哲及一介之善猶或衛其丘壟禁其芻牧況尼父德表生民功被百代而墳塋荒蕪荊棘弗翦可蠲墓側數戶以掌酒掃魯郡上民孔景等五戶居近孔子墓側蠲其課役供給酒掃并種松柏六百株文帝紀破楊難當下詔往年氐豎楊難當造為叛亂俯首者衆其長史楊萬壽建節將軍姚憲情不違順屢進矢言及凶醜宵遁闔境奔擾建忠將軍呂訓衛倉儲以侯王師寧朔將軍姜檀果烈懇到志在宣力濁水之捷厥庸顯然近者協贊義奮乃心無替洛陽符昭誠係本朝亦同斯舉俘擒僞將獨克武興推鋒致效隕命寇手竝事著屯險感於豫懷宜蒙旌敘榮慰存亡可贈萬壽龍驤將軍昭武都太守憲補員外散騎侍郎訓駙馬都尉奉朝請檀征西大將軍司馬仇池太守宜竝內徙可符雍涼二州厚加贍恤宋書劉懷肅傳又詔故晉壽太守姜道盛前討仇池志輸誠力即戎著效臨財能清近先登濁水殞身鋒鏑誠節俱亮矜悼於懷可贈給事中賜錢千萬同上報衡陽王義季詔誰能無過改之為貴耳此非唯傷事業亦自損性命世中比比皆汝所諳近長兄弟緣此致故將軍蘇徽耽酒成疾旦夕待盡吾試禁斷并給藥膳至今能立此自是可節之物但嗜者不能立志裁割耳晉元帝人主尚能感王導之諫終身不復飲酒汝既有美尚加以吾意殷勒何至不能慨然深自勉厲乃復須嚴相割裁坐諸紜紜然後少止者幸可不至此一門無此酣法汝於何得之臨書歎塞宋書衡陽王義季傳自彭城王義康廢後遂為長夜之飲太祖纍加詰責義季引愆陳謝上詔報之義季雖奉此旨酣縱如初又詔汝飲積食少而素羸多風常慮至此今果委頓縱不能以家國為懷近不復顧性命之重可歎可恨豈復一條本望能以理自厲未欲相苦耳今遣孫道胤就楊佛等令晨夕視汝并進止湯食可開懷虛受慎勿隱避吾飽嘗見人斷酒無它慊吸蓋自當時甘嗜罔己之意耳今者憂怛政在性命未暇及美業復何為吾煎毒至此邪宋書衡陽王義季傳季以酒成疾上又詔之終不改答何承天論曆詔何承天所陳殊有理據可付外詳之宋志曆志上慰勞楊文德詔近者校尉仇池公表虜縱逸寇竊仇池將士挫傷民萌塗炭眷言西顧矜慨在懷楊文德世篤忠順誠感家國糾率義徒奄殄凶醜鋒旗所向殲潰無遺氛祲澄清蕃境寧一念功惟事良有欣嘉便可遣慰勞宣示朝旨并敕梁州刺史申坦隨宜應援宋書氐胡傳元嘉二十年三月前鎮東司馬符達立保宗弟文德追擊斬索虜平北將軍拓跋齊遣露板馳告朝廷太祖詔以楊文德為北秦州刺史詔顯祿勳效蓋惟國典施賞務速無或踰時楊文德志氣果到文武兼全乘機潛奮殊功成集告捷歸誠獻俘萬里朝無暫土樹難自肅休烈昭著朕甚嘉焉楊氏世西勞方忠纍葉宜紹先緒膺受寵勞可使持節散騎常侍都督北秦雍二州諸軍事征西大將軍平羌校尉北秦州刺史封武都王同上勸農詔國以民為本民以食為天故一夫輟稼飢者必及倉廩既實禮節以興自頃在所貧罄家無宿積賦役暫偏則人懷愁墊歲或不稔而病乏比室誠由德政弗孚以臻斯弊抑亦耕桑未廣地利多遺宰守微化導之方萌庶忘勤分之義永言弘濟明發載懷雖制令亟下終莫懲勸而坐望滋殖庸可致乎有司其班宣舊條務盡敦課遊食之徒咸令附業考核勤惰行其誅賞觀察能殿嚴加黜陟古者從時脈土以訓農功躬耕帝籍敬供粢盛仰瞻前王思遵令典便可量處千畝考卜元辰朕當親率百辟致禮郊甸庶幾誠素將被斯民宋書文帝紀又見禮志一下沈演之范曄詔總司戎政翼贊東朝惟允之舉匪賢莫授侍中領右衛將軍演之清業貞審器思沈濟右衛將軍曄才應通敏理懷清要竝美彰出內誠亮在公能克懋厥猷樹績所蒞演之可中領軍曄可太子詹事宋書沈演之傳賑給詔霖雨彌日水潦為患百姓積儉易致乏匱二縣官長及營署部司各隨統檢實給其柴米必使周悉宋書文帝紀勸農詔比年穀稼傷損淫亢成災亦由播殖之宜尚有未盡南徐兗豫及揚州浙江西屬郡自今悉督種麥以助闕乏速運彭城下邳郡見種委刺史貸給徐豫土多稻田而民聞專務陸作可符二鎮履行舊陂相率修立并課墾闢使及來年凡諸州郡皆盡勤地利勸導播殖蠶桑麻紵各盡其方不得但奉行公文而已宋書文帝紀下沮渠安周詔故征西大將軍河西王無諱弟安周才略沈到世篤忠款統承遺業民衆歸懷雖亡土喪師孤立異所而能招率殘寡攘寇自今宜加榮授垂軌先烈可使持節散騎常侍都督涼河三州諸軍事領西域戊己校尉涼州刺史河西王宋書氐胡大且渠蒙遜傳賜南郡王義宣詔師護以在西久比表求還出內左右自是經國常理亦何必其應於一往今欲聽許以汝代之護雖無殊績潔已節用通懹期物不恣群下此信未易非唯聲著西土朝野以為美談在彼已有次第為士庶所安論者乃謂未議遷之今之回換在欲為汝耳汝與護年時一輩各有其美物議亦互有少劣若今向事脫一減之者既於西夏交有巨礙遷代之譏必歸責於吾矣復當為護怨非但一誚而已也如此則公私俱損為不可不先共善詳此事亦易勉耳無為使人動生評論也宋書南郡王義宣傳又略見南史十三案義季小字師護詔有司恬所陳當是事宜近諸除授可悉停宋書申恬傳時遷換諸郡守恬上表上從之詔有司答徐湛之上范曄等反謀詔湛之表如此良可駭惋曄素無行檢才負瑕釁但以才藝可施故收其所長頻加榮爵遂參清顯而險利之性有過溪壑不識恩遇猶懷怨憤每存容養冀能悛革不謂同惡相濟狂悖至此便可收掩依法窮詰宋書范曄傳嘉獎師儒詔庠序興立纍載胄子肄業有成近親策試覩濟濟之美緬想洙泗永懷在昔諸生答問多可採覽教授之官竝宜沾賚賜帛有差宋書文帝紀嘉征林邑將帥詔林邑介恃遐險久稽王誅龍驤將軍交州刺史檀和之忠果到列思略經濟稟命攻討萬里推鋒法命肅齊文武畢力潔己奉公以身率下故能立勳海外震服殊俗宜加褎飾參管近侍可黃門侍郎領越騎校尉行建武將軍龍驤司馬蕭景憲協贊軍首勤捷顯著總勒前驅剋殄巢穴必能威服荒夷撫懷民庶可持節督交州廣州之鬱林寧浦二郡諸軍事建威將軍交州刺史龍驤司馬童林之九真太守傅蔚祖戰死竝贈給事中宋書林邑傳下衡陽王義季詔杜驥申恬倉卒之際尚以弱甲瑣卒徼寇作援彼為元統士馬桓桓既不懷奮發連被意旨猶復逡巡豈唯大乖應赴之宜實孤百姓之望且胸奴輕漢將自此而始賊初起逸未知指趨故且裝束兼存觀察耳少日勢漸可見便應大有經略何合安然遂不敢動遣軍政欲乘際會拯危急以申威援本無驅馳平原方幅爭鋒理又山路易馮何以畏首尾回弱若謂事理政如此者進大鎮聚甲兵徒為煩耳宋書衡陽王義季傳封蓋吳詔北地蓋吳起衆秦川華戎響附奮其義勇頻煩克捷屢遣表疏遠效忠款志梟逆虜以立勳績宜加爵號褎獎乃誠可以為使持節都督關隴諸軍事安西將軍雍州刺史北地郡公使雍梁遣軍界上以相援接宋書索虜傳詔群臣吾少覽篇籍頗愛文義遊玄玩采未能息卷自纓紼世務情兼家國徒存日昃終有慚德而區宇未一師饉代有永言斯瘼彌於其慮加疲疾稍增志隨時往屬思之功與事而廢殘虐遊魂齊民塗炭乃眷北顧無忘弘拯思總群謀掃清逋逆感慨之來遂成短韻卿等體國情深亦當義篤其懷也宋書索虜傳賑賜京邑詔比者冰雪經旬薪粒貴踊貧斃之室多有宭罄可檢行京邑二縣及營署賜以柴米宋書文帝紀厲武詔安不忘危經世之所同治兵教戰有國之恆典故服訓明恥然後少長知禁頃戎政雖修而號令未審今宣武場始成便可剋日大習衆軍當因校獵肄武講事宋書文帝紀經劉穆之墓詔故侍中司徒南康文宣公穆之秉德佐命翼亮景業謀猷經遠元勳克茂功銘鼎彝義章典策故已嗣徽前哲宣風後代者矣近因遊踐瞻其塋域九原之想情深悼歎可致祭墓所以申永懷宋書劉穆之傳下雷次宗詔前新除給事中雷次宗篤尚希古經明行修自絶招命守志隱約宜加升引以旌退素可散騎侍郎宋書雷次宗傳以沈亮為司空義宣參軍詔陝西心膂須才故授卿此職宋書自序亮遷南譙王義宣司空中兵參軍下詔與彭城王詔沈邵人身不惡吾與林子周旋異常可以補遷宋書自序會彊弩將軍缺上詔録尚書彭城王義康於是拜彊弩將軍
