body:
  text: 王弘開廣陵前浦表伏聞廣陵前浦榛蕪久近復開徐清源虛邃含明內鑒瑞以數致象以類應夫如是者鸞響鳳儀可停屬而須矣藝文類聚九謝賜河上梨表奉賜河上梨一千遠方味甘每垂降及仰被恩榮俯增祗愧御覽九百六十九辭建安郡公封邑表臣聞趙武稱隨會夫子之家事治言於晉國無隱情臣千載幸會謬荷榮遇雖以智能虛薄政績蔑聞而言無隱情竊所庶幾向令天啓其心預定大策而名編司勳功不見紀固將請不賞之罪懸龍蛇之書豈當稽違成命苟修小節但無功勤暴之四海進闕君子勞心之謀退微小人勞力之效而聖朝僭賞於上愚臣苟忝於下則為厚誣當時永貽口實實財之誚比此為輕惟塵盛猷虧玷為大微躬所惜一朝亦盡非唯仰塵國紀實亦俯畏友朋憂心彌疹胡顏靡託且凡人之交尚申知己況在明主可用理干所以敢遂愚狷守之以死宋書王弘傳因大旱引咎遜位臣聞三才雖殊其到則一故世道休明五福攸應政有失德咎徵必顯臣抑又聞之台輔之職論道讚契上佐人主燮理陰陽位以德授則和氣淳穆寇竊非據則謫見於天是以陳平有辭不濫主者之局邴吉停駕大懼牛喘之由斯固有國之所同天人之遠旨陛下聖哲御世光隆宜休徵表祥醴泉毖涌而頃陰陽隔并亢旱成災秋無嚴霜冬無積雪疾厲之氣彌歷四時此豈非任失其人覆餗之咎臣以庸短自畢凡流謬逢嘉運叨恩在昔陛下忘其不腆又重以以今任正位槐鼎統理神州珥貂衣袞總録朝端內外要重頓萃微躬窮極寵貴人臣莫比比德居之猶或難稱矧伊陋昧何以克任此之易了不俟明識但受之始屬值時艱六戎親戒憂及社稷誠是臣下致節忘身之時當有何心塵撓聖聽所以僶俯從事循牆馳驅志在宣力慮不及遠既鯨鯢折首西夏底定便宜訴其本懷避賢謝拙而常人偷安日甘一日實亦仰佩天眷未能自已荏苒推遷忽及三載遂令負乘之釁彰著幽明愆伏之災患纏氓庶上缺皇朝緝熙之美下增官謗覆折之災伏念惶赧五情飛散雖曰厚顏何以寧處不遠而復大義攸稱小懲大戒細人之福近復之美非所敢觖懲戒之幸竊懷庶幾今履端惟始朝慶禮畢輒還私門思愆家巷庶微塞天譴少弭謗讟伏願鑑其所守即而許之臨啓愧塞不自宣盡宋書王弘傳又上表遜位臣聞異姓為後宗周之明義親不在外有國之所先故魯長滕君春秋所美楚出棄疾前史垂誠矧乃茂親明德道光一時述職侯甸朝政弗及而以庶族庸陋浮華之臣超踰先典居中贊契豈所以憲章古式緝熙治道驃騎將軍臣義康徽猷遠邈明德彌劭敷政江漢化被荊南縉紳屬情想樂當務周旦之寄不謀同詞分陝雖重比此為輕臣實空暗階恩踰越俯積素餐仰玷盛化公私二三無一而可昔孫叔未進優孟見歌展季在下臧文貽譏況道隆地昵義兼前禮臣於古人無能為役負乘竊位萬物謂何雖曰厚顏胡寧以處斯亡之懼實疚其心乞解州録以允民望伏願陛下遠存至公近鑑丹款俯順朝野改授親賢豈惟下臣獲免大戾凡厥衆隸孰不慶幸若天眷罔已脫復遲回請出臣表逮聞內外朝議輿誦或有可擇宋書王弘傳又表遜位近冒表聞披陳愚管實冀天鑒體其至誠而奉被還詔未蒙酬察徒塵聖覽仰延優旨顧影慚惶罔識攸厝臣忝荷要重四載於今既違前史量力之誡又微古人進賢之美尸位固寵日積官謗旋觀周行興愧已厚況在親賢朝野歸德甫思引身曷云能補惟塵大典虧喪已多不悟天眷之隆復垂恩獎名器弗改蒙寵如舊感愚自揆芒若無涯臣義康既總録百揆毗讚盛化忝廁下風咨憑有所內朝細務庶可免竭神州任重望實兼該臣何人斯寇竊不已為爾推遷覆敗將及就無人事之愆必有陰陽之患伏念惟憂疹如疾首不知何理可以自安但成旨已決渙汗難反加臣懦劣少無此志進不能抗言陳辭以死自固退不能重繭置冰鮮食為瘠祗畏天威遂復俯仰至於攝督所部料綜文案曹局吏役所須不多其餘文武皆為𤕠長相俯初建或有未充請留職僚同事而已自此以外及諸資實一送司徒臣受恩深重休滅是預義無虛飾苟自貶損伏願聖察特垂許順不令誠訴其見抑奪宋書王弘傳陳會稽王道子請建屯田近面所咨立屯田事已具簡聖懷南畝事興時不可失宜早督田畯以要歲功而府資單刻控引無所雖復厲以重勸肅以嚴威適足令囹圄充積而無救於事實也伏見南局諸冶募吏數百雖資以廩膳收入其微愚謂若回以配農必功利百倍矣然軍器所須不可都廢今欲留銅官大冶及都邑小冶各一所重其功課一準揚州州之求取亦當無乏餘者罷之以充東作之要又欲二局田曹各立典軍募吏依冶募比例并聽取山湖人此皆無損於私有益於公者也其中亦應疇量分判番假及給廩多少自可一以委之本曹親局所統必當練悉且近東曹板水曹參軍納之領此任其人頗有幹能自足了其事耳頃年以來斯務弘廢田蕪廩虛實亦由此弘過蒙飾擢志輸短效豈可相與寢默有懷弗聞邪至於當否尊自當裁以遠鑒若所啓謬允者伏願便以時施行庶歲有務農之勤倉有盈廩之實禮節之興可以垂拱待也宋書王弘傳奏彈謝靈運臣聞間厥有家垂訓大易作威專戮致誡周書斯典或違刑茲無赦世子左衛率康樂縣公謝靈運力人桂興淫其嬖妾殺興江涘棄尸洪流事發京畿播聞遐邇宜加重劾肅正朝風案世子左衛率康樂縣公謝靈運過蒙恩獎頻叨榮授聞禮知禁為日已久而不能防間閫闈致茲紛穢罔顧憲軌忿殺自由此而勿治典刑將替請以事見免靈運所居官上臺削爵土收付大理治罪御史中丞都亭侯王准之顯居要任邦之司直風聲噂𠴲曾不彈舉若知而弗糾則情法斯撓如其不知則尸昧已甚豈可復預班清階式是國憲請免所居官以侯還散輩中內臺舊體不得用風聲舉彈此事彰赫曝之朝野執憲蔑聞群司循舊國典既穨所虧者重臣弘忝承人乏位副朝端若復謹守常科則終莫之糾正所以不敢拱默自同秉彝違舊之愆伏須準裁宋書王弘傳上言定丁役舊制民年十三半役十六金役當以十三以上能自營私及公故以充役而考之見事猶或未盡體有彊弱不皆稱年且在家自隨力所能堪不容過苦移之公役動有定科循吏隱恤可無其患庸宰守常已有勤劇況直苛政豈可稱言乃有務在豐役增進年齒孤遠貧弱其敝尤深至令依寄無所生死靡告一身之切逃竄求免家人遠計胎孕不育巧避羅憲實亦由之今皇化惟新四方無事役召之應存乎消息十五至十六宜為半丁十七為全宋書王弘傳南史二十一案通典七作大明中王敬弘上言案弘卒於元嘉九年敬弘卒於元嘉二十四年而言大明中誤也與八座丞郎疏同伍犯法無士人不罪之科然每至詰謫輒有詩訴若垂恩宥則法廢不可行依事糾責則物以為苦怨宜更為其制使得憂苦之衷也又主守偷五匹常偷四十匹竝加大辟議者咸以為重宜進主偷十匹常偷五十匹死四十匹降以補兵既得小寬民命亦足以有懲也想各言所懷宋書王弘傳弘為衛將軍與八座丞郎疏案此疏乃與同官書札也通典一百六十四以為上書一百七十以上疏皆誤刑法議尋律令既不分別士庶又士人坐同伍罹謫者無處無之多為時恩所宥故不盡親謫耳吳及義興適有許睦之徒以同符合給二千石論啓丹書已未閒會稽士人云十數年前亦有四旅坐此被責以時恩獲停而王尚書云人舊無同伍坐所未之解恐蒞任之日偶不值此事故邪聖明御世士人誠不憂至苦然要須臨事論通上干天聽為紛擾不如近為定科使輕重有節也又尋甲符制蠲士人不傳符耳令史復徐亦得如之共相押領有違糾列了無等衰非許士人閭里之外也諸議云士庶緬絶不相參知則士人犯法庶民得不知若庶民不許不知何許士人不知小民自非超然簡獨永絶塵粃者比門接棟小以為意終自聞知不必須日夕來往也右丞百司之言粗是其況如衰陵士人實與里巷關通相知情狀乃當於冠帶小民今謂之士人便無小人之坐署為小民輒受士人之罰於情於法不其頗歟且都令不及士流士流為輕則小人令使徵預其罰便事至相糾閭伍之防亦為不同謂士人可不受同伍之謫耳罪其奴客庸何傷邪無奴客可令輸贖有修身閭閰與群小實隔又或無奴僮為衆所明者官長二千石便當親臨列上依事遣判又主守偷五匹常偷四十匹竝加大辟議者咸以為重弘以為應見優量者實以小吏無知臨財易昧或由疏慢事蹈重科求之於心常有可愍故欲小進匹數寬其性命耳宜進主守偷十匹常偷五十匹死四十匹降以補兵至於官長以上荷蒙祿榮付以局任當正已明憲檢下防非而親犯科律亂法冒利五匹乃以為弘矣士人無私相偷四十匹理就使至此致以明罰固其宜耳竝何容復加哀矜且此輩士人可殺不可謫有如諸論本意自不在此也近聞之道路聊欲共論不呼乃爾難精既衆議糾紛將不如其已若呼不應停寢謂宜集議奏聞決之聖旨宋書王弘傳南史二十一與謝靈運書問辨宗論義論曰由教而信有日進之功非漸所明無入照之分問曰由教而信而無入照之分則是暗信聖人若暗信聖人理不關心政可無非聖之尤何由有日進之功論曰暫者假也真者常也假知無常常知無假又曰假知纍伏理暫為用用暫在理不恆其知問曰暫知為假知者則非不知矣但見理尚淺未能常用耳雖不得與真知等照然寧無入照之分邪若暫知未是見理豈得云理暫為用者又不知以何稱知論曰教為用者心日伏伏纍彌久至於滅纍問曰教為用而纍伏為云何伏邪若都未見理專心暗信當其專心唯信而已謂此為纍伏者此是慮不能竝為此則彼廢耳非為纍相權能使纍伏也凡厥心數孰不皆然如此之伏根本末異一倚一伏循環無已雖復彌久纍何由滅弘白一悟之談常謂有心但未有以折中異同之辨故難於厝言耳尋覽來論所釋良多然猶有未好解處試條如上為呼可容此疑不既欲使彼我意盡覽者泠然後對無兆兼當造膝執筆增懷真不可言王弘敬謂廣弘明集二十一答謝靈運書更尋前答起悟亦不知所以為異正當爾耳已送示生公此閒道人故有小小不同小涼當共面盡脫有厝言更白面寫未由寄之於此所散猶多廣弘明集二十南臺不開門啓既無墨敕又闕幡棨雖稱上旨不異單刺元嘉二年雖有再開門例此乃前事之違今之守舊未為非禮但既據舊使應有疑卻本末曾無此狀猶宜厥咎其不請白虎幡銀字棨致門不時開由尚書相承之矣亦合糾正宋書王曇首傳元嘉四年車駕出北堂嘗使三更竟開廣莫門南臺云應須白虎幡銀字棨不肯開門尚書左丞羊玄保奏免御史中丞傅隆以下曇首繼啓與釋某書昨服散差可然不過佳請示所宜如更增劇恐難為力耳未能合遣俗有餘念故耳王曇首和南淳化閣帖三建議勸文帝就徵羡之等受寄崇重未容便敢背德廢主若存慮其將來受禍至此殺害蓋由每生情多寧敢一朝頓懷逆志且三人勢均莫相推伏不過欲握權自固以少主仰待耳今日就徵萬無所慮宋書王華傳太祖入奉大統以少帝見害疑不敢下華建議云云太祖從之案三人者謂徐羡之傅亮謝謝晦也詠雪離合霰先集兮雪霏霏散輝素兮被詹庭曲室寒兮朔風厲川陸涸兮百籟鳴御覽十二為晉恭帝禪詔夫天造草昧樹之司牧所以陶鈞三極統天施化故大道之行選賢與能隆替無常期禪代非一族貫之百王由來尚矣晉道陵遲仍世多故爰暨元興禍難既積至三光貿位冠履易所安皇播越宗祀墮泯則我宣元之祚永墜於地顧瞻區域翦焉已傾相國宋王大縱聖德靈武秀世一匡穨運再造區夏固以興滅繼絶舟航淪弱矣若夫仰在璿璣旁穆七薄伐不庭開復疆宇遂乃三俘僞主開滌五都雕顏卉服之鄉龍荒朔漠之長莫不回首朝陽沐浴玄澤故四靈效瑞川嶽啓圖嘉祥雜遝休應炳著玄象表革命之期華裔注樂推之願代德之符著乎幽顯瞻烏爰止允集明哲夫豈延康有歸咸熙告謝而已哉昔火德既微魏祖砥績黃運不競三后肆勤故天之歷數實有攸在朕雖庸暗昧於大道永鑒廢興為日已久念四代之高義稽天人之至望子其遜位別宮歸禪於宋一依唐虞漢魏故事宋書武帝紀中案王詔之傳云恭帝即位遷黃門侍郎領著作郎凡諸詔奏皆其辭也禪策咨爾宋王夫玄古權輿悠哉邈矣其詳靡得而聞爰自書契降逮三五莫不以上聖君四海止戈定大業然則帝王者宰物之通器君道者天下之至公也昔在上葉深鑒茲道是以天祿既終唐虞弗得傳其嗣符命來格舜禹不獲全其謙所以經緯三才澄序彝化作範振古垂風萬葉莫尚於茲自是厥後歷代彌劭漢既嗣德於放勳魏亦方軌於重華諒以協謀乎人鬼而以百姓為心者也昔我祖宗欽明辰居其極而明晦代序盈虧有期翦商兆禍非唯一世曾是弗剋矧伊在今天之所廢有自來矣惟王體上聖之姿苞二儀之德明齊日月道合四時乃者社稷傾覆王拯而存之中原蕪梗又濟而復之自負固不賓干紀放命肆逆滔天竊據萬里靡不潤之以風雨震之以雷霆九伐之道既敷八法之化自理豈伊博施於民濟斯黔庶固己義洽四海道威八荒者矣至於上天垂象四靈效徵圖讖之文既明人神之望已改百工歌於朝庶民頌於野億兆抃踊傾佇惟新自非百姓樂推天命攸集豈伊在子所得獨專是用仰祗皇靈俯順群議敬禪神器授帝位於爾躬大祚告窮天祿永終於戲王其允執其中敬遵典訓副率土之嘉願恢洪業於無窮時膺休祐以答三靈之眷望宋書武帝紀中南史一璽書禪位蓋聞天生蒸民樹之以君帝皇寄世實公四海崇替係於勳德升降存乎其人故有國必亡卜年著其數代謝無常聖哲握其符昔在上世三聖係軌疇咨四嶽以弘揖讓惟先王之有作永垂範於無窮及劉氏致禪實堯是法有魏告終亦憲茲典我世祖所以撫歸運而順人事乘利見而定天保者也而道不常泰戎夷亂華喪我洛京蹙國江表仍遘否運淪沒相因逮於元興遂傾宗祀幸賴神武光天大節宏發匡復我社稷重造我國家惟王聖德欽明則天光大應期誕載明保王室內紓國難外播宏略誅大憝於漢陽逋僭盜於沂渚澄氛西岷肅清南越再靜江湘拓定樊沔若乃永懷區宇思一聲教王師首路則伊洛澄流稜威崤潼則華嶽褰靄僞酋銜璧咸陽即序雖彝器所銘詩書所詠庸勳之盛莫之與二也遂偃武修文誕敷德政八統以馭萬民九職以刑邦國思兼三王以施四事故能信著幽顯義感殊方自歷世所賓舟車所暨靡不謳歌仁德抃舞來庭朕每敬惟道勳永察符運天之歷數實在爾躬是以五緯升度屢示除舊之迹三光協數必昭布新之祥圖讖禎瑞皎然斯在加以龍顏英特天授殊姿君人之表煥如日月傳稱惟天為大惟堯則之詩云有命自天命此文王夫或躍在淵者終饗九五之位勳格天地者必膺大寶之業昔土德告沴傳胙於我有晉今歷運改卜永終於茲亦以金德而傳於宋仰四代之休義鑒明昏之定期詢於群公爰逮庶尹咸曰休哉罔違朕志今遣使持節兼太保散騎常侍光祿大夫淡兼太尉尚書宣範奉皇帝璽綬受終之禮一如唐虞漢魏故事王其允答人神君臨萬國時膺靈祉酬於上天之眷命宋書武帝紀中請定不贖罪四條啓尚書金部奏事如右斯誠檢忘一時權制懼非經國弘本之令典臣尋舊制以罪補士凡有十餘條雖同異不紊而輕重實殊至於詐列父母死誣罔父母淫亂破義反逆此四條實窮亂抵逆人理必盡雖復殊刑過制猶不足以塞莫大之罪既獲全首領大造已隆寧可復遂拔徒隸緩帶當年自同編戶列齒齊民乎臣懼此制永行所虧實大方今聖化惟新崇本棄末一切之令宜加詳改愚謂此四條不合加贖罪之恩宋書王詔之傳高祖受禪有司奏東冶士朱道民禽三叛士依例放遣詔之啓駮王實之請假事伏尋舊制群臣家有情事聽併急六十日太元中改制年賜假百日又居在千里外聽併請來年限合為二百日此蓋一時之令非經通之旨會稽雖塗盈千里未足為難百日歸休於事自足若私理不同便應自表陳解豈宜名班朝列而久淹私門臣等參議謂不合開許或家在河洛及嶺沔漢者道阻且長猶宜別有條品請付尚書詳為其制宋書王詔之傳臨郡察潘綜吳逵孝廉教孝廉之選必審其人雖四科難該文質寡備必能孝義邁俗拔萃著問者便足以顯應明楊允將符旨烏程潘綜守死孝道全親濟難烏程吳逵義行純至列墳成行咸精誠內淳休聲外著可竝察孝廉并列上州臺陳其行迹宋書潘綜傳
