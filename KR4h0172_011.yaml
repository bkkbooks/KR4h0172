body:
  text: 長沙王義欣陳江淮事宜江淮左右土瘠民疏頃年以來薦飢相襲百城雕斃於今為甚綏牧之宜必俟良吏勞人武夫不經政術統內官長多非才授東南殷實猶或簡能況賓接荒垂而可輯粲頓闕願敕選部必使任得其人庶得不勞而治宋書長沙王道憐傳上言申季歷治績所統威遠將軍北譙梁二郡太守關中侯申季歷自奉職邦畿於茲五年信惠並宣威化兼者外清姦暴內輯民黎役賦均平閭井齊肅綏穆初附招攜荒遠郊境之外仰澤懷風爵賞之授績能是顯宜升階秩以崇獎勸宋書王歆之傳元嘉九年豫州刺史長沙王義欣上言檄司兗二州夫王者之兵以義德相濟非徒疆理土地恢廣經略將以大庇蒼生保全黎庶是以蒙踐霜雪踰歷險難匡國寧民肅清四表昔我高祖武皇帝誕膺明命爰造區夏內夷篡逆外寧寇亂靈武紛紜雷動風舉響軼龍堆聲浮雲朔陵天振地援山蕩海於是華域肅清謳歌允集王綱帝典煥哉惟文太和煙熅流澤洋溢中葉諒暗委政冢宰黠虜乘釁侵侮上國遂令司兗良民復陷非所周鄭遺黎重隔王化聖皇踐祚重光開朗明哲柔遠以隆中興遐夷慕義雲騰波涌方將蹈德履信被藝襲文增修業統作規於後勤施洽於三方惠和雍於北狄夫養魚者除其猏獺育禽者去其豺狼故智士研其慮勇夫厲其節嘉謀動蒼天精氣貫辰緯幕府忝任稟承廟自算翦爪明衣誓不顧命提吳楚之徑卒總八州之鋭士紅旗絳天素甲奪日虎步中原龍超河渚興雲散雨慰大旱之思弔民伐罪積後已之情師以順動何征而不克況乎遵養耆昧綏復境土而已哉昔淮泗初開狡徒縱逸王旅入關群豎飆扇襄邑之戰素旗授首半城之役伏尸蔽野支解體分羽翼摧挫加以搆難西虜結怨黃龍控弦熸滅首尾逼畏蜂屯蟻聚假息旦夕豈復能超蹈長河以當堂堂之陳哉夫順從遺速歸德惡晚賞褎先附威加後服是以秦趙羈旅披榛委誠施紱乘軒剖符州郡慕容姚泓恃強作禍提挈萬里卒嬰鈇鉞皆目前之誠驗往世之所知也聖上明發愛恤以道懷二州士民若能審決安危翻然革面率其支黨歸投軍門者當表言天臺隨才敘用如其迷心不悛竄首巢穴長圍既周臨衝四至雖欲壼漿厥篚其可得乎幸加三思詳擇利害宋書索虜傳元嘉七年後將軍長沙王義欣出鎮彭城總統群帥檄司兗二州箜篌賦侯牽化而始造魯幸奇而後珍名啓端於雅引器荷重於吳君等齊歌以無譬似秦箏而非群藝文類聚四十四初學記十六鶴賦其狀也紺絡頸而成飾赬點首以表儀羽凝素而雪映尾舒玄而參差趾象蚪以振步形亞鳳以擅奇藝文類聚九十山雞賦形鳳婉而鵠跱羽袞蔚而緗暉臨淥湍而映藻傍青崖而妍飛不隱耀而貽纍倏見屈於虞機藝文類聚九十一薦庾實等表詔書疇咨群司延及連牧旌賢仄陋拔善幽遐伏惟陛下惠哲光宣經緯明遠皇階藻曜風猷日升而猶詢衢室之令典遵明臺之睿訓降淵慮於管庫紆聖思乎版築故以道邈往載德高前王臣敢竭虛暗祗承明旨伏見前臨沮令新野庾實秉真履約愛敬淳深昔在母憂毀瘠過禮今罹父疚泣血有聞行成閨庭孝著鄰黨足以敦化率民齊教軌俗前徵奉朝請武陵龔祈恬和平簡貞潔純素潛居研志耽情墳籍亦足鎮息穨競獎勗浮動處士南郡師覺授才學明敏操介清修業均井泄志固冰霜臣往年辟為州祭酒未行其志若朝命遠暨玉帛遐臻異人間出何遠之有宋書臨川王道規傳啓事恩旨賜臣犀鏤竹節如意目所未覩御覽七百三黃初妻趙罪議案周禮父母之仇避之海外雖遇市朝鬭不反兵蓋以莫大之冤理不可奪含戚枕戈義許必報至於親戚為戮骨肉相殘故道乖常憲記無定準求之法外裁以人情且禮有過失之宥律無讎祖之文況道之縱暴本由於酒論心即實事盡荒耄豈得以荒耋之王母等行路之深讎臣謂此孫忍愧銜悲不違子義共天同域無虧孝道宋書臨川王道規傳感春賦聽時禽之哢音信關關以嚶嚶悲陽鴻之赴翔憐春燕之入楹天暗曖而流雲日陰翳而淪精風淑穆而吹蘭雨濛濛而洗莖草承澤而擢秀花順氣而飛馨初學記三華林清暑殿賦構禦暑之清言傍測景之西岑列喬梧以蔽日樹長楊以結陰醴泉湧於椒室迅波經於蘭庭業芳芝以爭馥合百草以競馨飾丹壤以和璧加疏楯以連城至於朱明在運鬱夕囂晨寒堂涼結清觀風臻覽茲宇之靈緯啓聖情以寤神豈宣曲之妄擬焉甘泉之足陳藝文類聚六十二桐樹賦伊梧桐之靈材蔚竦林而擢秀玄根通於幽泉密葉垂藹而增茂挺修幹蔭朝陽招飛鸞鳴鳳皇甘露灑液於其莖清風流薄乎其枝丹霞赫奕於其上白水浸潤乎其陂初學記二十八白馬賦惟皇有造曰靈有祕麗氣摛精底愛覃粹八埏稽首以賓庭九荒斂衽而納贄衆車垂德以服箱龍馬宅仁而受轡是以周稱踰輪漢則天駟體自乾維衍生坎位伊赭白之為俊超絶世而稱驥爾其為狀也竦身輕足高顙露精氣猛聲烈步遠視明著獻西宛表德東京價傾鱏函夏觀竭都城飾金鍐之倏爍揚玉鑾之瓏玲發鳴鏑於懸月驅永埒於修坰施四介以作好耀二矛之重英舉舊間而未儔考前迅而較名初學記二十九舉才表臣聞雲和備樂則繁會克諧驊騮驂服則致遠斯效陛下順簡夤化文明在躬玉衡既正泰階載一而猶發慮英髦垂情仄陋幽谷空同顯著揚歷是以潛虬聳鱗佇利見之期翔鳳弭翼應來儀之感竊見南陽宗炳操履間遠思業貞純砥節丘園息賓盛世貧約而苦內無改情軒冕屢招確爾不拔若以蒲帛之騁感以大倫之美庶投竿釋褐翻然來儀必能毗燮九官宣贊百揆尚書金部郎臣徐森之臣府中直兵參軍事臣王天寶並局力允濟忠諒款誠往年逆臣叛逸華陽失守森之全境寧民績章危棘前者經略伊瀍元戎喪旅天寶北勤河朔東據營丘勳勇既昭心事兼竭雖蒙褎敘未盡才宜並可授以邊藩展其志力交址遼邈纍喪藩將政刑每闕撫蒞惟艱南中敻遠風遙迥隔蠻獠狡竊邊氓荼炭實須練實以綏其難謂森之可交州刺史天寶可寧州刺史庶足威懷荒表肅清遐服昔魏戊之賢功存薦士趙武之明事彰管庫臣識愧前良理謝先哲率舉所知仰酬採訪退懼瞽言無足甄獎宋書江夏王義恭傳元嘉元年上世祖勸進表臣聞治亂無兆倚伏相因乾靈降禍二凶極逆深酷巨痛終古未有陛下忠孝自天赫然電發投袂泣血四海順軌是以諸侯雲赴數均八百義奮之旅其會如林神祚明德有所底止而沖居或躍未登天祚非所以嚴重宗社紹延七百昔張武抗辭代王順請耿純陳款光武正位況今罪逆無親惡盈釁滿阻兵安忍戮善崇姦履地戴天畢命俄頃宜早定尊號以固社稷景平之季實惟樂推王室之亂天命有在故抱拜兆於壓璧赤龍表於霄徵伏惟大明無私遠存家國七廟之靈近哀黔首荼炭之切時陟帝祚永慰群心臣負釁嬰罰偷生人壤幸及寬政待罪有司敢以漏刻視息披露肝膽宋書江夏王義恭傳省録尚書表臣聞天地設位三極同序皇王化則九官咸事時亮之績昭於虞典論道之風宣於周載台輔之設坐調陰陽元凱之置起釐百揆所以欒針矢言侵官是誡陳平抗辭匪職罔答漢承秦後庶僚稱改爵因時變任與世移總録之制本非舊體列代相沿茲仍未革今皇家中造事遵前文宜憲章先代證文古則停省條録以依昔典使物競思存人懷勤一則名實靡愆庸節必紀臣謬典國重虛荷崇位興替宜知敢不輸盡宋書江夏王義恭傳孝建元年諫親征竟陵王誕表誕素無才略畜養又寡自拒王命士庶離散城內乏糧器械不足徒賴免兵倉頭三四百人造次相附恩怨夙結臣始短慮謂一旬可殄而假息流遷七十餘日上將受律群蕃嶽峙鋭卒精旅動以萬計大威所震未有成功臣雖凡怯猶懷憤踊陛下入翦封豕出討長蛇兵不血刃再興七百而蕞爾小醜遂延晷漏致皇赫斯怒將動乘輿此實臣下素食駑鈍之責行留百司莫不仰慚俯愧今盛暑被甲日費千金天威一麾孰不幸甚臣伏尋晉文王征淮南淹師出二百日方能制寇今誕餱糧垂竭背逆者多慶之等轉悟遲重之非漸見乘機之利且成旨頻降必應旦夕夷殄愚又以廣陵塗近人信易達雖違江水約示不難且覩理者寡暗塞者衆忽見雲旗移次京都既當祗悚四方之志必有未達臣愚伏重思計今寧不當計小醜省生命以安遐邇之情又以長江險闊風波難期王者尚不乘危況乃泛不測之水昔魏文濟江遂有遣州之名今雖先天下違動干休慶龍舟所幸理必利涉然居安慮危不可不懼私誠款款冒啓赤心追用悚汗不自宣盡宋書竟陵王誕傳條制諸王府鎮表古先哲王莫不廣植周親以屏帝宇諸侯受爵亦願永固邦家至有管蔡梁燕致禍周漢上乖顯授之恩下亡血食之業夫善積慶深宜享長久而歷代侯王甚乎匹庶豈異姓皆賢宗室悉不賢由生於深宮不覩稼穡左右近習未值田蘇富貴驕奢自往而至聚毛折軸遂乃危禍漢之諸王並置傅相猶不得禁逆七國連謀實由強盛晉氏列封正足成永嘉之禍尾大不悼終古同疾不有更張則其源莫救日者庶人恃親殆傾王業去歲西寇藉寵幾敗皇基不圖襄楚復生今釁良以地勝兵勇獎成凶惡前事之不忘後事之明兆陛下大明紹祚垂法萬葉臣年衰意塞無所知解忝皇放耆長慚慨內深思表管見裨崇萬一竊謂諸王貴重不應居邊至於華州優地時可暫出既以有州不須置府若位登三事止乎長史掾屬若宜鎮御別差扞城大將若情樂沖虛不宜逼以戎事若捨文好武尤宜禁塞僚佐文學足充話言遊梁之徒一皆勿許文武從鎮以時休止妻子室纍不煩自隨百僚修詣宜遵晉令悉宣令齊到備列賓主之則衡泌之士亦無煩干侯貴王器甲於私為用蓋寡自金銀裝刀劍戰具之服皆應輸送還本曲突徙薪防之有素庶善者無懼惡者止姦宋書江夏王義恭傳義恭常慮為世祖所疑及海陵王休茂於襄陽為亂乃上表請封禪表惟皇天崇稱大夏始行揖讓迄於有晉雖聿修前緒而迹淪言廢蔑記於竹素者焉可單書紹乾維建徽號流風聲被絲管自無懷以來可傳而不可朽者七十有四君罔仁厚而道滅鮮義澆而德宣鍾律之先曠世綿絶難得而聞丘索著明者尚有遺炳故易稱先天弗違後天奉時蓋陶唐姚姒商姬之主莫不由斯道也是以風化大洽光熙於後炎漢二帝亦踵曩則因日姓之心聽輿人之頌龍駕帝服鏤玉梁甫昌言明稱告成上靈況大宋表祥唐虞受終素德山龍啓符金玉顯瑞異采勝於軫墟紫煙藹於邦甸錫冕兆九五之徵文豹赴天曆之會誠二祖之幽慶聖后之冥休道冠軒堯惠深亭毒而獨執沖約未言封禪之事四海竊以為恧焉臣聞惟皇配極惟帝祀天故能上稽乾式照臨黔首協和窮昊膺茲多福高祖武皇帝明並日月光振八區拯已溺之晉濟橫流之世撥亂寧民應天受命鴻徽洽於海表威稜震乎沙外太祖文皇帝體聖履仁述業興禮正樂頌作象曆明達通於神祗玄澤被乎上下仁孝命世睿武英挺遭運屯否三才湮滅乃龍飛五洲鳳翔九江身先八百之期斷出人鬼之表慶煙應高牙之建風耀翔迹之辰親翦凶逆躬清昏壒天地革始夫婦更造豈與彼承業繼緒拓復禹迹車一其軌書罔異文者同年而議哉今龍麟已至鳳皇已儀比李已實靈茅已茂雕氣降氛於宮榭珍露呈味於禁林嘉禾積穗於殿甍連理合幹於園籞皆耀質離宮植根蘭囿至夫霜毫玄文素翮赬羽泉河山嶽之瑞草木金石之祥方畿憬塗之謁抗驛絶祖之奏彪炳雜沓粵不可勝言太平之應茲焉富矣宜其從天人之誠遵先王之則備萬乘整法駕修封泰山瘞玉岱趾延喬松於東序詔韓岐於西廂麾天閽使啓關謁紫宮朝太一奏鈞天詠雲門贊揚幽奧超聲前古豈不盛哉伏願時命宗伯具茲典度宋書禮志三大明元年十一月太宰江夏王義恭奏又略見初學記十三劾蔡興宗表臣聞慎節言語大易有規銓序九流無取裁闕若乃結黨連群譏訴互起街淡巷議罔顧聽聞乃撤實憲制所宜禁經之巨蠹侍中祕書監臣彧自表父疾必求侍養聖旨矜體特順所陳改授臣府元僚兼帶軍郡雖臣駑劣府任非輕準之前人不為屈後京郡本以為祿不計戶之少多遇缺便用無關高下撫軍長史莊滯府纍朝每陳危苦內職外守稱未堪依唯王球昔比賜以優養恩慈之厚不近於薄前新除吳郡太守興宗前居選曹多不平允鴻渥含宥恕其不間改任大都寵均阿輔仍苦請益州雅違成命伏尋揚州刺史子尚吳興太守休若並國之茂戚魯衛攸在猶牧守東山竭誠撫蒞而辭擇適情起自庶族逮佐北藩尤無欣荷御史中丞永昔歲餘愆從恩今授光祿勳臣淹雖曰代臣纍經降黜後效未申以何取進司徒左長史孔覬前除右衛尋徙今職回換之宜不為乃少竊外談謂彧等咸為失分又聞興宗躬自怨懟與尚書右僕射師伯疏辭旨甚苦臣雖不見所聞不虛臣以凡才不應機務謬自幸會受任三朝進無古人舉賢之美退無在下獻替之績致茲紛紜伏增慚悚然此源不塞此風弗變將虧正道塵穢盛猷伏願聖聽賜垂覽察宋書蔡宗興傳請赦義康妻息表臣聞忝祖遠之猶或慮親降霍省序義重令戚故嚴道疾終嗣啓方宇阜陵愆屏身遌晚恩竊惟故庶人劉義康昔昧姦回自貽非命沈魂漏籍垂誡來典運革三朝歲盈三紀天地改朔日月再升陶形賦氣咸蒙更始義康妻息漂沒早違盛化衆女孤弱永淪黔首即情原舋本非己招感事哀煢俯增傷咽敢緣陛下聖化融泰春澤覃被慈育群生仁被泉草實希洗宥還齒帝宗則施及陳荄榮施污壤臣特憑國私冒以誠表塵觸靈威伏紙悲悸宋書彭城王義康傳前廢帝永光元年太江夏土義恭表奏徙彭城王義康投畀之言義著雅篇流殛之教事在書典庶人義康負舋深重罪不容戮聖仁不忍屢加遲回宥其大辟賜遷近甸斯乃至愛發天超邈終古曾不遇愆甘引而讒言同衆佷悖徼幸每形辭色內宣家人外動民聽不逞之族因以生心胡誕世假竊名號構成凶逆杜漸除微古今所務況禍機驟發庸可忽乎臣等參議宜徙廣州遠郡放之邊表庶有防絶宋書彭城王義康傳元嘉二十四年太尉録尚書江夏王義恭等奏奏請嚴章服臣聞佾懸有數等級異儀佩笏有制卑高殊序斯蓋上哲之洪謨範世之明訓而時至彌流物無不斃僭侈由俗軌度非古晉代東徙舊法淪落侯牧典章稍與事廣名實一差難以卒變章服崇濫多歷年所今樞機更造皇風載新耗斃未充百用思約宜備品式之律以定損厭之條臣等地居枝昵位參台輔遵正之首請以爵先致貶之端宜從戚始輒因暇日共參愚懷應加省易謹陳九事雖懼匪衷庶竭微款伏願陛下聽覽之餘薄垂昭納則上下相安表裏和穆矣宋書江夏王義恭傳與驃騎大將軍竟陵王誕奏詔付外詳奏斬臧質事臧質底棄下才而藉遇深重窮愚悖常構扇凶逆變至滔天志圖泯夏違恩叛德罪過恆科梟首之憲有國通典懲戾思永去惡宜深臣等參議須辜日限意使依漢王莽事例漆其頭首藏於武庫庶為鑑戒昭示將來宋書臧質傳斬質首傳京師江夏王義恭左僕射宏等奏詔可章太后毀廟議經籍殘偽訓傳異門諒言之者罔一故求之者鮮究是以六宗之辨舛於兼儒迭毀之論亂於群學章皇太后誕神啓聖禮備中興慶流胙胤德光義遠宜長代崇芬奕葉垂則豈得降侔通倫反遵常典夫議者成疑實傍紀傳知一爽二莫窮書旨案禮記不代祭爰及慈母置辭令有所施穀梁於孫止別主立祭則親執虔祀事異前志將由大君之宜其職彌重人極之貴其數特中且漢代鴻風遂登配祔晉氏明規咸留薦祀遠考史策近因暗見未應毀之於義為長所據公羊祗足堅秉安可以貴等帝王祭從士庶緣情訪制顛越滋甚謂應同七廟六代乃毀宋書禮志四孝建元年有司奏章皇太后廟毀置之禮義恭以為云云詔可鑄四銖錢議伏見沈慶之議聽民私鑄樂鑄之室皆入署居平其準式去其雜偽愚謂百姓不樂與官相關由來甚久又多是人士蓋不願人署凡盜鑄為利利在偽雜偽雜既禁樂入必寡云斂取輸郭藏為永寶愚謂上之所貴下必從之百姓聞官斂輪郭輪郭之價百倍大小對易誰肯為之強制使換則狀似逼奪又去春所禁新品一時施用愚謂此條在可開許又云今鑄宜依此格萬稅三千又云嚴檢盜鑄不得更造愚謂禁制之設非惟一旦昧利犯憲群庶常情不患制輕患在冒犯今入署必萬輸三千私鑄無十三之稅逐利犯禁居然不斷又云銅盡事息姦偽自禁愚謂赤懸內銅非可卒盡比及銅盡姦偽已積又云禁鑄則銅轉成器聞鑄則器化為財然頃所患患於形式不均加以翦鑿闕二字鉛錫衆訴耳越若止於盜鑄銅者亦無須苦禁宋書顏竣傳孝建三年墾起湖田議夫訓農修本有國所同土著之民習玩日久如京師無田不聞從居他縣尋山陰豪族富室頃畝不少貧者肆力非為無處耕起空荒無救災歉又緣湖居民魚鴨為業及有居肆理無樂徙宋書孔靖傳
