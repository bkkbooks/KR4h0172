body:
  text: 顏延之範連珠蓋聞匹夫履順則天地不違一物投誠則神明可交事有微而愈著理有暗而必昭是以魯陽傾首離光為之反舍有鳥拂波河伯為之不潮藝文類聚五十七大筮針余因讀易偶意蓍龜友人有請決遊宦務志卦有咎占故作大針以悟焉先王設筮大人盡慮卦遭同人變而之豫先號後笑初睽末遇時至運來當在三五功畢官成幾乎衍數慶在坤宮災在坎路不出戶庭獨立無懼違此而動投足且無惰爾儀靈骨有知無曰余逆神策不豫南人司針敢告馳騖藝文類聚七十五右光祿大夫西平靖侯顏府君家傳銘嵎夷導日岱方禋春星離望合水別浸鄰少陽畜德蒼祇效神孕仙字聖誕智息仁洙上道奧稷下儒淵乃昔宗林傾席曜筵外門取俊接室稱賢闔則遁哀燭亦抗宣曠彼琅邪實惟海宇憬屬之罘邪臨潮𢷵載濟越師大淹秦旅誰其來遷時聞遠祖青州隱秀爰始貞居內辟鼎府外康邦閭建節中平分竹黃初刑清齊右政偃營區葛嶧明懿平陽聰理或荐公庭或登宰士列美霸朝變風千里華萼之茂於昭不已博士淵退再逡儒聘貞子七穆比世稱盛無忝汝陰有偉安定舍人孜敏亦允儲命靖侯潛德信豈在明言則測幽歎實聳靈仁親之寶大孝之榮官必凝績學乃敦經隨難蕃霸特安闈掖扶元陟帝翼成復辟忌滿裁婚鑒沖貶石望年靜駕樂恬延曆三祖連光衆門稟教於時列孝克端殊操潔景衡陰湮心理奧任不窮秩是謂高蹈山曾木胄積荄深永惟世思樹辭林碑表有毀策素匪任誦靈墳阿長寄風音景定建康志四十三又略見藝文類聚五十五初學記二十一陶徵士誄并序夫璿玉致美不為池隍之寶桂椒信芳而非園林之實豈其樂深而好遠哉蓋云殊性而已故無足而至者物之藉也隨踵而立者人之薄也若乃巢高之抗行夷皓之峻節故已父老堯禹錙銖周漢而綿世浸遠光靈不屬至使菁華隱沒芳流歇絶不其惜乎雖今之作者人自為量而首路同塵輟塗殊軌者多矣豈所以昭末景泛餘波有晉徵士尋陽陶淵明南嶽之幽居者也弱不好弄長實素心學非稱師文取指達在衆不失其寡處言愈見其默少而貧病居無僕妾井臼弗任藜菽不給母老子幼就養勤匱遠惟田生致親之議追悟毛子捧檄之懷初辭州府三命後為彭澤令道不偶物棄官從好遂乃解體世紛結志區外定迹深棲於是乎遠灌畦鬻蔬為供魚菽之祭織絇緯蕭以充糧粒之費心好異書性樂酒德簡棄煩促就成省曠殆所謂國爵屏貴家人忘貧者與有詔徵為著作郎稱疾不到春秋若干元嘉四年月日卒於尋陽縣之某里近識悲悼遠士傷情冥默福應嗚呼淑貞夫實以誄華名由諡高苟允德義貴賤何算焉若其寬樂令終之美好廉克己之操有合諡典無愆前志故詢諸友好宜諡曰靖節徵士其辭曰物尚孤生人固介立豈伊時遘曷云世及嗟乎若士望古遙集韜此洪族蔑彼名級睦親之行至自非敦然諾之信重於布言廉深簡潔貞夷粹溫和而能峻博而不繁依世尚同詭時則異有一於此兩非默置豈若夫子因心違事畏榮好古薄身厚志世霸虛禮州壤推風孝惟義養道必懷邦人之秉彝不隘不恭爵同下士祿等上農度量難鈞進退可限長卿棄官稚賓自免子之悟之何悟之辨賦詩歸來高蹈獨善亦既超曠無適非心汲流舊巘葺宇家林晨煙暮藹春煦秋陰陳書輟卷置酒絃琴居備勤儉躬兼貧病人否其憂子然其命隱約就間遷延辭聘非直也明是惟道性糾纆斡流冥漠報施孰云與仁實疑明智謂天蓋高胡愆斯義履信曷憑思順何置年在中身疚維痁疾視死如歸臨凶若吉藥劑弗嘗禱祀非恤傃幽告終懷和長畢嗚呼哀哉敬述清節式尊遺占存不願豐沒無求贍省訃卻賻輕哀薄斂遭壤以穿旋葬而窆嗚呼哀哉深心追往遠情逐化自爾介居及我多暇伊好之洽接閻鄰舍宵盤晝憩非舟非駕念昔宴私舉觴相誨獨正者危至方則礙哲人卷舒布在前載取鑒不遠吾規子佩爾實愀然中言而發違衆速尤忤風先蹶身才非實榮聲有歇睿音永矣誰針余闕嗚呼哀哉仁焉而終智焉而斃黔婁既沒展禽亦逝其在先生同塵往世旌此靖節加彼康惠嗚呼哀哉文選五十七藝文類聚三十七陽給事誄并序惟永初三年十一月十一日宋故寧遠司馬濮陽太守彭城陽君卒嗚呼哀哉瓚少稟志節資性忠果奉上以誠率下有方朝嘉其能故授以邊事永初之末佐守滑臺值國禍荐臻王略中否獯虜間釁劘剝司兗幽并騎弩屯逼鞏洛列營緣戍相望屠潰瓚奮其猛鋭志不違難立乎將卒之間以緝華裔之衆罷困相保堅守四旬上下力屈受陷勍寇士師奔擾棄軍爭免而瓚誓命沈城佻身飛鏃兵盡器竭斃于旗下非夫貞壯之氣勇烈之志豈能臨敵引義以死徇節者哉景平之元朝廷聞而傷之有詔曰故寧遠司馬濮陽太守陽瓚滑臺之逼厲誠固守投命徇節在危無撓古之烈士無以加之可贈給事中振恤遺孤以慰存亡追寵既彰人知慕節河汴之間有義風矣逮元嘉廓祚聖神紀物光昭茂緒旌録舊勳苟有概於貞孝者實事感於仁明末臣蒙固側聞至訓敢詢諸前典而為之誄其辭曰貞不常祐義有必甄處父勤君怨在登賢苫夷致果題子行間忠壯之烈宜自爾先舊勳雖廢邑氏遂傳惟邑及氏自溫徂陽狐續既降晉族弗昌之子之生立績宋皇拳猛沈毅溫敏肅良如彼竹柏負雪懷霜如彼騑駟配服驂衡邊兵喪律王略未恢函陝堙阻瀍洛蒿萊朔馬東騖胡風南埃路無歸轊野有委骸帝圖斯艱簡兵授才實命陽子佐師危臺憬彼危臺在滑之坰周衛是交鄭翟是爭昔惟華國今實邊亭憑巘結關負河縈城金柝夜擊和門晝扄料敵厭難時惟陽生涼冬氣徑塞外草衰逖矣獯虜乘障犯威鳴驥橫厲霜鏑高翬軼我河縣俘我洛畿攢鋒成林投鞍為圍翳翳窮壘嗷嗷群悲師老變形地孤援闊卒無半菽馬實拑秣守未焚衝攻已濡褐烈烈陽子在困彌達勉慰痍傷拊巡飢渴力雖可窮氣不可奪義立邊疆身終鋒栝嗚呼哀哉賁父殞節魯人是志汧督效貞晉策攸記皇上嘉悼思存寵異於以贈之言登給事疏爵紀庸恤孤表嗣嗟爾義士沒有餘喜嗚呼哀哉文選五十七藝文類聚四十八宋文皇帝元皇后哀策文惟元嘉十七年七月二十六日大行皇后崩于顯陽殿粵九月二十六日將遷座于長寧陵禮也龍輁纚綍容翟結驂皇塗昭列神路幽嚴皇帝親臨祖饋躬瞻宵載飾遺儀於組旒淪徂音乎珩珮悲黼筵之移御痛翬褕之重晦降輿客位撤奠殯階乃命史臣纍德述懷其辭曰倫昭儷升有物有憑圓精初鑠方祇始凝昭哉世族祥發慶膺祕儀景胄圖光玉繩昌暉在陰柔明將進率禮蹈和稱詩納順爰自待年金聲夙振亦既有行素章增絢象服是加言觀維則俾我王風始基嬪德惠問川流芳猷淵塞方江泳漢載謠南國伊昔不造鴻化中微用集寶命仰陟天機釋位公宮登曜紫闈欽若皇姑允迪前徽孝達寧親敬行宗祀進思才淑傍綜圖史發音在詠動容成紀壼政穆宣房樂韶理坤則順成星軒潤飾德之所屆惟深必測下節震騰上清朓側有來斯雍無思不極謂道輔仁司化莫晰象物方臻視祲告沴太和既融收華委世蘭殿長陰椒塗弛衛嗚呼哀哉戒涼在肂杪秋即穸霜夜流唱曉月升魄八神警引五輅遷迹噭噭儲嗣哀哀列辟灑零玉墀雨泗丹掖撫存悼亡感今懷昔嗚呼哀哉南背國門北首山園僕人案節服馬顧轅遙酸紫蓋眇泣素軒滅綵清都夷體壽原邑野淪藹戎夏悲歡來芳可述往駕弗援嗚呼哀哉文選五十八又宋書文帝袁皇后傳藝文類聚十五為張湘州祭虞帝文惟哲化神繼天作聖藏器漁陶致身愛敬是以二妃嬪德九子觀命在麓不迷御衡以正唐曆既終虞道乃光咨堯授禹素俎采堂百齡厭世萬里陟方敬詢故老欽咨聖君職奉西湘虔屬南雲神之聽之匪酒伊葷藝文類聚十一祭屈原文惟有宋五年月日湘州刺史吳郡張邵恭承帝命建旟舊楚訪懷沙之淵得捐珮之浦弭節羅潭艤舟汨渚乃遣戶曹掾某敬祭故楚三閭大夫屈君之靈蘭薰而摧玉縝則折物忌堅芳人諱明潔曰若先生逢辰之缺溫風怠時飛霜急節嬴羋遘紛昭懷不端謀折儀尚貞蔑椒蘭身絶郢闕迹遍湘干比物荃蓀連類龍鸞聲溢金石志華日月如彼樹芳實穎實發望汨心欷瞻羅思越藉用可塵昭忠難闕文選六十宋書顏延之傳祖祭弟文闔棺窮野啓殯中荒靈影夙滅筵寢虛張人往運來自秋徂陽蕃蘭落色宿草滋長孰云不痛辭家去鄉爾之於役爰適茲邑上秋告來方春佇立如何不弔吉違凶集六親憧心姻朋浩泣我雖載奔伊何云及永懷在昔追亡悼存惟兄及弟瞻母望昆生無榮嬿沒望歸魂令龜吉兆祖櫬東旋靈轅次路嚴舟在川廓然何及痛矣終天藝文類聚二十一讓中書令表虛竊國靈坐招禁要聞命慚惶形魂震越臣東州凡鄙生微於時長自閭閻不窺官轍門無富貴志絶華伍直以委身壟畝飢寒交切先朝陶均庶品不遺愚賤得免耕稅之勤廁仕進之末陛下盛德居蕃總攬英異越以不才超塵清軌奉躬歷稔勞效莫書仰侍曲成之仁畢願守宰之秩豈期天地中闋殷憂啓聖倚附興運擢景神塗雲飛海泳冠絶倫等曾未三期殊命八萃詳料賞典則臣不應科瞻言勤良則臣與侔貴方欲訴款皇朝降階盛序微已國言少徹身謗而制書猥下爵樹彌隆臣小人也不及遠謀寵利之來何能居約徒以上瀆天明下汨彝議災謫之興懼必在邇今之過授以先微身苟曰非據危辱將及十手所指諭等膏肓所以寤寐兢遽維縈苦疾者也伏願陛下察其丹誠矜其疾願絶會收恩以全愚分則造化之施方茲為薄宋書顏竣傳張暢卒官表張暢遂不救疾東南之秀蚤樹風範聞問悽慘深切常懷宋書五十九張暢傳案暢有二傳前篇在四十六不載此表奏薦孔覬王彧為散騎常侍常侍華選職任俟才新除臨海太守孔覬意業間素司徒長史王彧懷尚清理並任為散騎常侍宋書孔覬傳孝建三年吏部尚書顏竣奏郊廟樂議德業殊稱則千羽異容時無沿制故物有損益至於禮失道愆稱習忘反中興釐運視聽所革先代謬章宜見刊正郊之有樂蓋生周易周官歷代著議莫不援準夫掃地而祭器用陶匏唯質與誠以章天德文物之備理固不然周官曰國有故則旅上帝及四望又曰四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望四望非地則知上帝非天孝經云郊祀后稷以配天宗祀文王於明堂以配上帝則豫之作樂非郊天地大司樂職奏黃鍾哥大呂舞雲門以祀天神鄭注天神五帝及日月星辰也王者以夏正月祀其所受命之帝於南郊則二至之祀又非天地考之衆經郊祀有樂末見明證宗廟之禮事炳載籍爰自漢元迄乎有晉雖時或更制大抵相因其惟不襲名號而已今樂典淪滅知音世希改作之事臣聞其語正德大豫禮容具存宜殊其徽號飾而用之以正德為宣化之舞大豫為興和之舞庶足以光表世烈悅被後昆前漢諸祖宗廟處所各異主名既革舞號亦殊今七廟合食庭殿共所舞蹈之容不得廟有別制後漢東平王蒼已議之矣又王肅韓祗以王者德廣無外六代四夷之舞金石絲竹之樂宜備奏宗廟愚謂蒼肅祗議合於典禮適於當今宋書樂志一孝建二年九月散騎常侍丹陽尹建城縣開國侯顏竣議又見通典一百四十七與虜互市議愚以為與虜和親無益已然之明效何以言其然夷狄之欲侵暴正苦力之不足耳未嘗拘制信義用輟其謀昔年江上之役乃是和親之所招歷稔交騁遂求國婚朝廷羈縻之義依違不絶既積歲月漸不可誣獸心無厭重以忿怒故至於深入幸今因兵交之後華戎隔判若言互市則復開曩敝之萌議者不過言互市之利在得馬今棄此所重得彼下駟千匹以上尚不足言況所得之數裁烈十百邪一相交關卒難閉絶寇負力玩勝驕點已甚雖云互市實覘國情多贍其求則舛慠罔已通而為節則必生邊虞不如塞其漸杜其觖望內修德化外經邊事保境以觀其釁於事為長宋書顏竣傳元嘉二十八年虜自彭城北歸復求市竣議鑄四銖錢議泉貨利用近古所同輕重之議定於漢世魏晉以降未之能改誠以貨物既均改之偽生故也世代漸久弊運頓至因革之道宜有其術今云開署放鑄誠所欣同但慮採山事絶器用日耗銅既轉少器亦彌貴設器直一千則鑄之減半為之無利雖令不行又云去春所禁一時施用是欲使天下豐財若細物必行而不從公鑄利已既深情偽無極私鑄翦鑿書不可禁五銖半兩之屬不盈一年必至於盡財貨未贍大錢已竭數歲之間悉為塵土豈可令取斃之道基於皇代今百姓之貨雖為轉少而市井之民未有嗟怨此新禁初行品式未一須臾自止不足以垂聖慮唯府藏空匱實為重憂今縱行細錢官無益賦之理百姓雖瞻無解官乏唯簡費去華設在節儉求贍之道莫此為貴然錢有定限而消失無方翦鑄雖息終致窮盡者亡應官開取銅之署絶器用之塗定其品式日月漸鑄歲久之後不為世益耳宋書顏竣傳鑄二銖錢議議者將為官藏空虛宜更改鑄天下銅少宜減錢式以救交弊賑國紓民愚以為不然今鑄二銖恣行新細於官無解於乏而人姦巧大興天下之貨將靡碎至盡空立嚴禁而利深難絶不過一二年間其斃不可復救其甚不可一也今鎔鑄有頓得一二億理縱復得此必待彌年歲暮稅登財帛暫革日用之費不贍數月雖權徵助何解乏邪徒使姦民意騁而貽厥愆謀此又甚不可二也民懲大錢之改兼畏近日新禁市井之間必生喧擾遠利未開切患猥及富商得志貧民困窘此又甚不可三也若使交益深重尚不可行況又未見其利而衆斃如此夫算當時取誚百代乎宋書顏竣傳為世祖檄京邑夫運不常隆代有莫大之釁爰自上葉或因多難以成福或階昏虐以兆亂或由君臣義合理悖恩離故堅冰之遘每鍾澆末未有以道御世教化明厚而當梟獍反噬難發天屬者也先帝聖德在位功格區宇明照萬國道洽無垠風之所被荒隅變識仁之所動木石開心而賊劭乘藉冢嫡夙蒙寵樹正位東朝禮絶君后凶慢之情發於齠齔猜忍之心成於幾立賊濬險躁無行自幼而長交相倚附共逞姦回先旨以王室不造家難亟結故含蔽容隱不彰其釁訓誘啓告冀能革音何悟狂慝不悛同惡相濟肇亂巫蠱終行弒逆聖躬離荼毒之痛社稷有翦墜之哀四海崩心人神泣血生民以來未聞斯禍奉諱驚號肝腦塗地煩冤腷臆容身無所大將軍諸王幽間窮省存亡未測徐僕射江尚書袁左率皆當世標秀一時忠貞或正色立朝或聞逆弗順並橫分階闥懸首都市宗黨夷滅豈伊一姓禍毒所流末知其極昔周道告難齊晉勤王漢歷中圮虛牟立節異姓末屬猶或亡軀況幕府職同昔人義兼臣子所以枕戈嘗膽苟全視息志梟元凶少雪仇恥今命冠軍將軍領咨議中直兵柳元景寧朔將軍領中直兵馬文恭等統徑卒三萬風馳徑造石頭分趨白下輔國將軍領咨議中直兵宗愨等勒甲楯二萬征虜將軍領司馬武昌內史沈慶之等領壯勇五萬相尋就路支軍別統或焚舟破釜步自姑熟或迅楫蕪湖入據雲陽凡此諸帥皆英果權奇智略深贍名震中土勳暢遐疆暮府親董精悍一十餘萬授律枕戈駱驛繼邁司徒睿哲淵謨赫然震發徵甲八州電起荊郢冠軍將軍臧質忠烈協舉靁動漢陰冠軍將軍朱修之誠節亮款悉力請奮荊雍百萬稍次近塗蜀漢之卒續已出境又安東將軍誕平西將軍遵考前撫軍將軍蕭思話征虜將軍魯爽前寧朔將軍王玄謨並密信俱到不契同期傳檄三吳馳軍京邑遠近俱發揚旍萬里樓艦騰川則滄江霧咽鋭甲赴野則林薄摧根謀臣智士雄夫毅卒畜志須時懷憤待用先聖靈澤結在民心逆順大數冥發天理無父之國天下無之羽檄既馳華夷響會以此衆戰誰能抗禦日此義動何往不捷況逆醜無親人鬼所背計其同惡不盈一旅崇極群小是與比周哲人君子必加積忌傾海注螢穨山壓卵商周之勢曾何足云諸君或奕世貞賢身缺皇渥或勳烈肺腑休否攸同拘逼凶勢俯眉寇手含憤茹戚不可為心大軍近次威聲已接便宜因變立功洗雪滓纍若事有不獲能背逆歸順亦其次也如有守迷遂往黨一凶類刑茲無赦戮及五宗賞罰之科信如日月原火一燎異物同灰幸求多福無詒後悔書到宣告咸使聞知宋書元凶劭傳案顏延之傳劭召延之示以檄文問曰此筆誰所造延之曰竣之筆也又顏竣傳云世祖入討任總內外并造檄書几贊序今上在彭城賜金荊臥几藝文類聚八十九山石榴賦風觸枝而翻花雨淋條而殞芬環青軒而燧列繞翠波而星分視栖翡之失榮顧雕霞之無文藝文類聚八十六大司馬江夏王賜絹葛啓冰紈風綌事膺盛服御覽八百十九引顏測集梔子贊濯雨時摛素當飆獨含芬豐榮殊未紀銷落竟進聞藝文類聚八十九
