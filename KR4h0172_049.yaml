body:
  text: 張興世建議截賊上流賊據上流兵彊地勝我今雖相持有餘而制敵不足今若以兵數千潛出其上因險自固隨宜斷截使其首尾周遑進退疑沮中流一梗糧運自艱制賊之奇莫過於此宋書張興世傳棄彭城南歸議若歷城鬱州可至下官敢不高讚今城內乏食人無固心但以關扃嚴密不獲走耳若一搖動則潰然奔散雖欲至所在其可得乎今食雖寡然朝夕未至窘乏豈可捨萬安之術而即危亡之道此計必行下官請以頸血汙君馬迹一作汙公馬蹏宋書張暢傳案暢有二傳一在四十六一在五十九其文小異今錄前篇而以重出之文夾注當句之下又見南史三十二為南譙王義宣與從弟永書近有都信具汝刑網之源可謂雖在縲紲而復心無愧矣蕭公平厚先無嫌隙見汝翰迹言不相傷何其滔滔稱人意邪當今世故艱迫義氣雲起方藉群賢共康時難當遠慕廉藺在公之德近效平勃忘私之美忽此蔕芥剋申舊情公亦命蕭示以疏達兼令相執共遵此旨宋書張永傳河清頌渾渾洪河家國之濱襟帶晉衛領袖齊秦龍門誕溜積石傳津乘運能有經啟天人化流上帝時表初星飛書曝瑞龍圖照人神協既偉通氣載榮初學記六若耶山敬法師誄夫待物而游致用生外道來自我懷抱以歡故晦寶停璞導兼車以出魏鸞逸雲緒豈增軒以人衛是以士之傲俗尚孤其道幽居之民無悶高獨吾每宣書夙流照爛故已跂予感詠身心不足若乃沖獨之韻少歲已高絕嶺之氣早志能遠初憩駕廬山年始勝髮緬邈之志直已千里乃求剃形就道忘家入法時沙門釋慧遠雖高其甚高以其尚幼未之許也遂乃登絕澗首太陽臨虛投地之險以身易志法師乃奇而納焉冑翔華胤業集素履勁露未嚴先風苦節同學不勝其勞若人不改其操於時經藏始東肄業華右遂扣途萬里屢遊圅洛定慧相曉致用日微羅什既亡遠公沈世乃還迹塞門屏居窮岫其不出意若邪之山者於茲二十餘年矣余叔謝病歸身唯風停想法師乘感來遊積席談晏清謝竟言不別而別故已默語交達而動靜虛員矣徵士戴顒秀調宣簡神居共逸風理交融乃倚岫成軒停林啟館即此人外因心會友西河方浪東山已隤風雲既盡草木餘哀心之憂矣淚合無開嗚呼哀哉乃為誄曰在尚上王歌鳳伊洛逸路翔雲高軒鳴鶴靈源世流幽人代作歸來之子跨古逢運結轍承風遵途襲問緯玉則溫經金斯振歲學兩幼年盈數始令德既軒其秀唯起鋒穎萬代風標千里情愛相輕家國如草達矣哲人獨肆玄寶總駕七覺飛鞍八道三江多靜湛勝廬山地去萬物迹軌停玄僚僚清慧結宇承煙前驅群有首路人天吾生製融集彼清風業流善會情竦妙同白日春上素月秋中方寸無底六合可窮卓彼羅什三界特秀真俗冠冕神道領袖若人對響承車即轍沙漠織寒長風負雪投袂冰霜攬裾暮節誰斯問津悠焉在哲莊今老帶孔思周懷百時如一京載獨開匈地既滿願惟糟魄移此無生悽居樹席妙入環中道出形上所謂伊人玄途獨亮智虛于情照實其相生住無住異壤相尋羅什就古慧遠去今所石何運伯牙罷音殷憂逃遁昔還爾心東巖解迹削景若邪早帳風首春席雲阿流庭結草復渚含波月軒東秀日落西華情步不辭寢興亮絕白雲臨間清風練節經綸五道提衡六趣四諦歸想三乘總路生滅在法諸行難常哲人薪盡舊火移光白日投晦中春起霜鳴呼哀哉昔余丸髮早讌清襟送志非歲迎韻者心家貧親老耕而弗飽就檄追歡身素孤夭既隔於形徒通以道自我徒病高榭東山明月途靜白雲路間承松吐嘯風上舒言咨予載侯夙居涼峻佇館伊人流心酌韻如何高期隔成幽顯五絃喪弄三觴誰餞鳴呼哀哉山泉同罷松竹衰涼秋朝霜露寒夜嚴長鳴呼哀哉孤猨將思旅雁聲時廣開性品無情者誰連臺成草比館唯悲存亡既代物色長衰鳴呼哀哉蒼生失御萬物無歸陰爽就夜重陽頓暉嗚呼哀哉伊四望之茫茫愴予心之悄悄雖淚至之有端固憂來其無兆隱長思以歡悲諒縱橫於言表嗚呼哀哉廣弘明集二十六瑇瑁𪊧尾銘移珍西岳費藻南濆凝華淡景搖採爭雲夷心侶鏡色眾斯分蓺文類聚六十九荅南譙王義宣書仰復淵旨匪邇伊教俯惟未造鞠躬汛對竊以為遂通資感涉悟藉緣誠微良因則河漢滋惑故待問擬乎撞鐘啟發俟於悱憤矣夫妙學窮理乃聖乃神光景燭八維頫仰觀九有然而運值百齡窅均萬劫者豈非嘉緣未構故業化莫孚哉是以聖靈輟軌斯文莫載靡得明徵理歸指斥宗致祗以微顯婉而成潛徙冥遠之生導三世之源積善啟報應之轍綱宿昭仁蒐苗弘信既以漸積習成吝滯日袪然後道暢皇漢之朝訓敷永平之祀物無輝熒人斯草偃實知放華猶昏文宣未旭非旨睽以異逋諒理均而俱躓者附會玄遠孰夷冒言謬犯不韙輕率狂簡弘明集十二張新安荅譙王論子孔釋書將士休假議臣聞開兵從稼前王以之兼隙耕戰遞勞先代以之經遠當今化寍萬里文同九服捐金走驥於焉自始伏見將上休假多蒙三番程會既促裝赴在早故一歲之閒四馳遙路或失遽春耜或違要秋登致使公替常儲家闕舊粟攷定利害宜加詳改愚謂交代之限以一年為制使征士之念勞未及積游農之望收功歲成斯則王度無騫民業斯植矣宋書張永傳廬山招提寺釋僧瑜贊悠悠玄機茫茫至道出入生死孰為妙寶其一自昔藥王殊化絕倫往聞其說今覩斯人其二英英沙門慧定心固凝神紫氣表迹隻樹其三其德可樂其操可貴文之作矣或颺髣髴其四法苑殊林一百十五釋曇鑒讚披荔逞芬握瑾表潔渾渾法師弗緇弗涅煒曄初辰條蔚暮節神遊智往豈伊實訣高僧傳曇鑒姓趙冀人終江陵辛寺辯為傳讚宣貴妃誄嚴位服於旗容尚徽諡於銘策節哀路於蕭鍾齊行鑣於輬翟御覽三百五十八奏劾韋朗風聞前廣州刺史韋朗莅任虐法暴濁是彰於州所造鏤銀鉿二枚朱牙楯三十幡朱畫青綾盾三十五幡犀皮鎧六領雜白莞席三百二十二領銀塗漆屏風二十三床又綠沈屏風一床銅鏡臺一具請以見事追免朗前所居官初學二十五席門屏風門鏡臺門御覽三百五十六五十七七百一竝引元嘉起居注元嘉十六年御史中丞劉損奏損一作楨非劾荀萬秋啟領曹朗中荀萬秋每設事綠私遊肆其所之豈可復參列士林編名天閣請免萬秋所居官初學記十一引宋元嘉起居注詣闕上表理彭城王義康蓋聞哲王不逆切旨之諫以博聞為道人臣不忌殲夷之罰以盡言為忠是故周昌極諫馮唐面折孝惠所以克固儲嗣魏尚所以復任雲中彼二臣豈好逆主干時犯顏違色者哉又爰盎之諫孝文曰淮南王若道遇死則陛下有殺弟之名奈何文帝不用追悔無及臣草莽微臣竊不自揆敢抱葵藿傾陽之心仰慕周易匪躬之志故不遠六千里願言命侶謹貢丹愚希垂察納伏推陛下躬執大象首出萬物王化咸通三才必理闢大人之路開大道之門搜殊逸於巖穴招奇英於側陋窮谷無白駒之倡喬岳無遺寶之嗟豈特羅飛翮於垂天網沈鱗於溟海況於彭城王義康先朝之愛子陛下之次弟哉一旦黜削遠送南服恩絕於內形隔於遠躬離明主身放聖世草萊黔首皆為陛下痛之臣追惟景平之嘉之釁幾於危殆三公託以興廢之宜密懷不臣之計台輔伺隙於京甸強楚窺窬於上流或顯逆而陵主有生之所惴恐神祗之所忿忌也賴宗社靈長廟筭流遠灑滌塵埃殲馘醜類氛霧時靖四門載清當爾之時義康豈不預參皇謀均此休否哉且陛下舊楚形勝非親勿居遽以驃騎之號任以藩夏之重撫政南郢綏民遏寇播皇宋之澤以洽幽荒陛下之潤被之九有豈直南荊之民沾渥而已焉遂召之以宰輔又寄之以和味既居三事又牧徐揚所以幽顯齊歡人神同忭莫不言陛下授之為得義康受之為是也今如何信貌之侶闕兄弟之恩乎若有迷謬之愆可責之罪也正可數之以善惡導之以義方且廬陵王往事足以知今此乃陛下前事之殷鑒後乖之靈龜也夫曾子之不殺忠臣之篤譬二告而猶織仁王之令範故詩云無信人之言人實不信又云兄弟雖鬩不廢親也尚書曰克明峻德以親九族九族既睦可以親百姓兄弟安可棄乎臣伏願陛下上尋往代黜廢之禍下惟近者讒言之舋廬陵王既申冤魂於后土彭城王亦弭疑愆於宋京豈徒皇代當今之計蓋乃良史萬代之美也且諂諛難辨是非易黷福始禍先古人所畏故愛身之士自為已計莫不結舌杜口孰肯冒忌干主哉臣以頑昧獨獻微管所以勤勤懇懇必訢丹誠者實恐義康年窮命盡奄忽於南遂令陛下有棄弟之責臣雖微賤竊為陛下羞之況書言記事史豈能屈典謨而諱哉脫如臣慮陛下根之何益揚子雲曰獲福之大莫先於和穆遘禍之深莫過於內難每服斯言以為警戒矧今覩王室大事豈得韜筆默爾而已哉臣將恐天下風靡離閒是懼遂令宇內遷觀民庶革心欲致康哉實為難也陛下徒云惡枝之宜伐豈悟伐柯之傷樹乃往古之所悲當今所宜改也陛下若蕩以平聽屏此猜情垂訊芻蕘之謀曲察狂瞽之計一發非意之詔逮訪博古之士速召義康返於京甸兄弟協和君臣緝穆息宇內之譏絕多言之路如是則四海之望塞讒說之道消矣何必司徒公揚州牧然後可以安彭城王哉若臣所啟違憲於國為非請即伏誅以謝陛下雖復分形赴鑊煮體烹屍始願所甘豈不幸甚宋書彭城王義康傳前龍驤參軍巴東扶令育詣闕上表表奏即收付建康獄賜死南史十三作前龍驤參軍巴東令扶樂案宋志巴東郡無巴東縣亦無扶縣廣韻扶又姓知姓扶名令育也奏詳何承天元嘉厤太子率更令領國子博士何承天表更改元嘉厤法以月蝕檢今冬至日在斗十七以土圭測影知冬至已差三日詔使付外檢署以元嘉十一年被敕使攷月蝕士圭測影檢署由來用楊偉景初法冬至之日日在斗二十一度少檢十一年七月十六日望月蝕加時在卯到十五日四更二唱丑初始蝕在營室十五度末景初其日日在軫三度以月蝕所衝攷之其日日應在翼十五度半又到十三年十二月十六日望月蝕加時在西到初始食到一更三唱蝕既在鬼四度景初其日日在女三以衝攷之其日日應在牛六度半又到十四年十二月十六日望月蝕加時在戍之半到二更四唱亥未始蝕到三更一唱食既在井三十八度景初其日日在斗二十五以衝攷之其日日應在斗二十二度半到十五年五月十五日望月蝕加時在戍其日月始生而已蝕光已生四分之一格在斗十六許度景初其日日在井二十四攷取其衝其日日應在井二十又到十七年九月十六日望月蝕加時在子之少到十五日未二更一唱始蝕到三更蝕十五分之十二格在昴一度半景初其日在房二以衡攷之則其日日在氐十三度半凡此五蝕以月衡一百八十二度半攷之冬至之日日竝不在斗二十一度少竝在斗十七度半閒悉如承天所上又去十一年起以土圭測影其年景初法十一月七日冬至前後陰不見影到十二年十一月十八日冬至其十五影極長到十三年十一月二十九日冬至其二十六日影極長到十四年十一月十一日冬至其前後竝陰不見到十五年十一月二十一日冬至十八日影極長到十六年十一月二日冬至其十月二十九日影極長到十七年十一月十三日冬至其十日影極長到十八年十一月二十五日冬至二十一日影極長到十九年十一月六日冬至其三日影極長到二十年十一月十六日冬至其前後陰不見影尋校前後以影極長為冬至竝差三日以月蝕檢日所在已差四度土圭測影冬至又差三日今之冬至乃在斗十四閒又如承天所上又承天法每月朔望及弦皆定大小餘於推交會時刻雖審皆用盈縮則月有頻三大頻二小比舊法殊為異舊日蝕不唯在朔亦有在晦及二日公羊傳所謂或失之前或失之後愚謂此一條自宜仍舊宋書厤志上太史令錢樂之兼丞嚴粲奏難何承天新厤若晦朔定大小餘紀首值盈則退一日便應以故歲之晦為新紀之首宋書厤志上
