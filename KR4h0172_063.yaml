body:
  text: 求那跋陀羅奉書父母若專守外道則雖還無益若歸依三寶則長得相見釋藏輦六又百四法華宗要序夫本際冥湛則神根凝一涉動離淳則精粗異陳於是心轡競策塵想爭馳翳有淺深則昏明殊鏡是以從初得佛暨於此經始應物開津故三乘別流別流非真則終期有會會必同源故其乘唯一唯一無上故謂之妙法頌曰是乘微妙清淨第一於諸世間最無有上夫妙不可明必擬之有像像之美者蓮華為上蓮華之秀分陀利為最妙萬法而為言故喻之分陀利其為經也明發蒙不可以語極釋權應之所由御終不可以祕深則開實以顯宗致權應既彰則局心自廢宗致既顯則真悟自生故能令萬流合注三乘同往同往之三會而為一乘之始也覺慧成滿乘之盛也滅景澄神乘之終也雖以萬法為乘然統之有主舉其宗要則慧收其名故經以真慧為體妙一為稱是以釋迦玄音始發讚佛智甚深多寶稱善歎平等大慧頌曰為説佛慧故諸佛出世間唯此一事實餘二則非真然則佛慧乃一之正實乘之體成妙之至足華之開秀者也雖寄華宣微而道玄像表稱之曰妙而體絶精粗頌曰是法不可示言詞相寂滅二乘所以息慮補處所以絶塵唯佛與佛乃能究盡故恆沙如來感希聲以雲萃已逝之聖振餘靈而現證信佛法之奧區窮神之妙境其此經之謂乎此經之謂乎觀少習歸一之言長味會通之要然緬思愈勤而幽旨彌潛未嘗不面靈鷲以遐想臨詞句而增懷諒由枝説差其本謬文乖其正也有外國法師鳩摩羅什超爽俊邁奇悟天拔量與海深辨流玉散繼釋蹤以嗣軌秉神火以霜燭紐穨綱於將絶拯漂溺於已淪耀此慧燈來光斯境秦弘始八年夏於長安大寺集四方義學沙門二千餘人更出斯經與衆詳究什自手執梵經口譯秦語曲從方言而趣不乖本即文之益亦已過半雖復霄雲披翳陽景俱暉未足喻也什猶謂語現而理沈事近而旨遠又釋言表之隱以應探賾之求雖冥扉未開固已得其門矣夫上善等潤靈液尚均是以仰感囑纍俯慨未聞故採述旨要流布未聞庶法輪遐軫往所未往十方同悟究暢一乘故序之云爾釋藏迹八修行地不淨觀經序夫禪典之妙蓋是三乘之所遊反迷悟惑者託幽途以啓真城塹三業之固宅廣六度以澄神散結賊於曠野研四變以遊心焰三慧為炬明浪中源以殊分金剛戟以練魔定慧相和以測真如是智依定則癡妄虧而霄落定由智則七淵湛然而清清融九服則玄庭有階階級相乘則爐冶成妙義之本本之有方尋根傳訓則冥一俱當雖利鈍有殊濟苦一量若契會同趣則聖性同照聖性同照則纍患永遼故知禪智為出世之妙術實際之義標也夫禪智之為道言約理備究析中道對治萬法善惡相乘迭轉孰止互有廢興館窺匠徹略位其宗以揆大方異世同文上聖為慈悲之主留法藏於千載示三乘之軌轍知會通之至階汰粗蚌於曩劫曲成衆豔之靈蠙密典相傳以至今接有緣以八背未始失其會隨機猶掌回所謂淡智常寂而不失照雖萬機寂化一用故能窮諸法寶擬想玄扉遊志妙極躡神光於無間者哉禪典要密宜對之有宗若漏失根源則枝尋不全群盲失旨則上慢幽昏可不懼乎若能審其本根冥訓道成實觀會古則萬境齊明沖途豁爾而融體玄象於無形然後知凡聖異流心行無邊然棄本尋條之士各以升降小異俱會其宗遂迷穴見隅變其津塗昏遊長夜永與理隔不亦哀哉自頃來禪訓實鮮得其中每以殊形難保遷動不常便啓誠三寶搜求玄要依四百論扣其關旨會遇西來宗匠綜習大法尋本至終冥隅一開千載之下優曇再隆可不欣乎遂乃推究高宗承嗣之範云佛涅槃後阿難曲奉聖旨流行千載先與同行弟子摩田地摩田地傳與舍那婆斯此三應真大願弘覆冥構於昔神超事外慈在寧濟潛行救物偶會無差佛在世時有外學五通仙人往至佛所請求出家乘俗高勝志存遠寄便言若我入道智慧辨才與身子等者爾乃當於至尊法中修習梵行佛知其本根於後百年當弘大事便答仙人汝今出家智慧淺薄不及身子仙人即退後百年中其人出世奇識博達遇物開悟遂出家學道尋得應真三明內照六通遠振辨才無礙摧諸異論所度人衆其量無邊於諸法藏開託教文諸賢遂見乃有五部之異是化運有方開徹有期五部既舉則深淺殊風遂有支派之別既有其別可不究本詳而後學邪此一部典名為具足清淨法場傳此法至於罽賓轉至富若蜜羅富若蜜羅亦盡諸漏具足六通後至弟子富若羅亦得應真此二人於罽賓中為第一教首富若密羅去世已來五十餘年弟子去世二十餘年曇摩多羅菩薩與佛陀斯那俱共咨得高勝宣行法本佛陀斯那化行罽賓為第三訓首有於彼來者親從其受法教誨見其涅槃其涅槃時遺教言我所化人衆數甚多入道之徒具有七百富若羅所訓為教師者十五六人如今於西域中熾盛教化受學者衆曇摩羅從天竺來以是法要傳與婆陀羅婆陀羅傳與佛陀斯那佛陀斯那愍此旃丹無真習可師故傳此法本流至東州亦欲使了其真偽塗無亂轍成無虛構必加厚益斯經所云開四色為分界一色無量緣宗歸部律則發趣果然其猶朝陽暉首萬類影旋師子震吼則衆獸伏焉聖王輪寶諸雄悚然覽斯法界廓清虛津入有不惑處無不沈自非道起群方智鑒玄中孰能立無言之辨於靈沼之淵寄言述於先覺之林可謂無名於所名而物無不名無形於所形而物無不形無事於所事而物無不事者哉釋藏迹九勝鬘經序勝鬘經者蓋方廣之要路超升之洪軌故其為教也創基覆簣而雲峰已構沖想一興而淵悟載豁言踰常訓旨越舊篇故發心希聖而神儀曜靈歸無別章而歎德斯備誠感聲發而尊號響集然後勒心切戒曠志僧那善攝靡遺大乘斯御馳輪幽轍長驅永路期運克終誕登玄極玄極無二故萬流歸一故曰二乘皆入一乘所謂究竟第一義乘一誠無辨而義有區分名曰義生故稱謂屢轉三五之興蓋由此也爾其奧也窮無始之前以明解惑之本究來際之味挹泥洹之妙文寡義豐彌綸群籍宇宙不足以擬其廣太虛不能以議其量淵兮其不可測也廓兮其不可極也將求本際之源追返流之極者必至於此焉司徒彭城王殖根遐劫龍現茲生依迹上台協讚皇極而神澄世表志光玄猷聞斯幽典誠期愈曠凡厥道俗莫不響悅請外國沙門求那跋陀羅手執正本口宣梵音山居苦節通悟息心釋寶雲譯為宋語德行諸僧慧嚴等一百餘人考音詳義以定厥文大宋元嘉十三年歲次玄枵八月十四日初轉梵輸訖於月終公乃廣寫雲布以澤未洽將興後世同往高會道場故略敘法要以染同慕之懷云爾釋藏迹九菩提經注序夫萬法無相而有二諦聖人無知而有二名二諦者俗也道也二名者權也智也二名以語默為稱二諦以緣性為言緣性兩陳而其實不乖語默誠異而幽旨莫二故般若經曰色即是空空即是色見緣起為見法也菩提經者諸佛之要藏十住之營統其文雖約而義貫衆典其旨雖玄而曉然易覽猶日月麗天則群像自朗示之一隅則三方自釋也經之為體論緣性則以二諦為宗語玄會則以權智為主言菩提則以無得為玄明發意則以冥期為妙婉約而弘深莫不備矣耆婆法師入室之祕説也親承者寡故罕行於世家師順得之於始會余雖不敏謬聞於第五十性疏多漏故事語而書紳豈曰注解自貽來哂庶同乎我者領之文外耳釋藏迹九均善論有白學先生以為中國聖人經綸百世其德弘矣智周萬變天人之理盡矣道無隱旨教罔遺筌聰睿迪哲何負於殊論哉有黑學道士陋之謂不照幽冥之途弗及來生之化雖尚虛心未能虛事不逮西域之深也於是白學訪其所以不逮云爾白曰釋氏所論之空與老氏所言之空無同異乎黑曰異釋氏即物為空空物為一老氏有無兩行空有為異安得同乎白曰釋氏空物物信空邪黑曰然空又空不翅於空矣白曰三儀靈長於宇宙萬品盈生於天地孰是空哉黑曰空其自性之有不害因假之體也今構群材以成大廈罔專寢之實積一豪以致合抱無檀木之體有生莫俄頃之留太山蔑纍息之固興滅無常因緣無主所空在於性理所難據於事用吾以為誤矣白曰所言實相空者其如是乎黑曰然白曰浮變之理交於目前視聽者之所同了邪解之以登道場重之以輕異學誠未見其淵深黑曰斯理若近求之實遠夫情之所重者虛事之可重者實今虛其真實離其浮偽愛欲之惑不得不去愛去而道場不登者吾不知所以相曉也白曰今析豪空樹無缺垂蔭之茂離材虛室不損輪奐之美明無常增其愒蔭之情陳若偏篤其競辰之慮貝錦以繁采發輝和羹以鹽梅致旨齊侯追爽鳩之樂燕王無延年之術恐和合之辨危脆之教正足戀其嗜好之欲無以傾其愛競之惑也黑曰斯固理絶於諸華墳素莫之及也白曰山高纍卑之辭川樹積小之詠舟壑火傳之談堅白唐肆之論蓋盈於中國矣非理之奧故不舉以為教本耳子固以遺情遺纍虛心為道而據事剖析者更由指掌之間乎黑曰周孔為教正及一世不見來生無窮之緣積善不過子孫之慶纍惡不過餘殃之罰報效止於榮祿誅責極於窮賤視聽之外冥然不知良可悲矣釋迦關無窮之業拔重關之險陶方寸之慮宇宙不足盈其明設一慈之救群生不足勝其化敘地獄則民懼其罪敷天堂則物歡其福指泥洹以長歸乘法身以遐覽神變無不周靈澤無不覃先覺翻翔於上世後悟騰翥而不紹坎井之局何以識大方之家乎白曰固能大其言矣今效神光無徑寸之明驗靈變罔纖介之異勤誠者不覩善救之貌篤學者弗剋陵虛之實徒稱無量之壽孰見期頤之叟咨嗟金剛之固安覿不朽之質苟於事不符宜尋立言之指遺其所寄之説也且要天堂以就善曷若服義而蹈道懼地獄以敕身孰與從理以端心禮拜以求免罪不由祗肅之意施一以徼百倍弗乘無吝之情美泥洹之樂生耽逸之慮贊法身之妙肇好奇之心近欲未弭遠利又興雖言菩薩無欲群生固以有欲矣甫救交敝之氓永開利競之俗澄神反道其可得乎黑曰不然若不示以來生之欲何以權其當生之滯物情不能頓至故積漸以誘之奪此俄頃要彼無窮若弗勤春稼秋穡何期端坐并底而息意庶慮者長淪於九泉之下矣白曰異哉何所務之乖也道在無欲而以有欲要之北行求郢西征索越方長迷於幽都永謬滯於昧谷遼遼閩楚其可見乎所謂積漸者日損之謂也當先遺其所輕然後忘其所重使利欲日去淳白自生耳豈得以少要多以粗易妙俯仰之間非利不動利之所蕩其有極哉乃丹青眩媚綵之目土木夸好壯之心興靡廢之道單九服之財樹無用之事割群生之急致營造之計成私樹之權務勸化之業結師黨之勢苦節以要厲精之譽護法以展陵競之情悲矣夫道其安寄乎是以周孔敦俗弗關視聽之外老莊陶風謹守性分而已黑曰三遊本於仁義盜跖資於五善聖迹之敝豈有內外且黃老之家符章之偽水祝之誣不可勝論子安於彼駭於此玩於濁水違於清淵耳白曰有迹不能不敝有術不能無偽此乃聖人所桎梏也今所惜在作法於貪遂以成俗不正其敝反以為高耳至若淫妄之徒世自近鄙源流蔑然固不足論黑曰釋氏之教專救夷俗便無取於諸華邪白曰曷為其然為則開端宜懷屬緒愛物去殺尚施周人息心遺榮華之願大士布兼濟之念仁義玄一者何以尚之惜乎幽旨不亮末流為纍耳黑曰子之論善殆同矣便事盡於生乎白曰幽冥之理固不極於人事矣周孔疑而不辨釋迦辨而不實將宜廢其顯晦之迹存其所要之旨請嘗言之夫道之以仁義者服理以從化帥之以勸戒者循利而遷善故甘辭興於有欲而滅於悟理淡説行於大解而息於貪偽是以示來生者蔽虧於道釋不得已杜幽暗者冥符於姬孔閉其兌由斯論之言之者未必遠知之者未必得不知者未必失但知六度與五教並行信順與慈悲齊立耳殊塗同歸者不得守其發輪之轍也宋書天竺迦毗黎國傳龍光寺竺道生法師誄并序元嘉十一年冬十月庚子道生法師卒於廬山嗚呼哀哉善人告盡追酸者無淺含理云滅如惜者又深法師本姓魏氏彭城人也父廣戚縣令幼而奇之攜就法汰法師改服從業天資聰茂思悟夙挺志學之年便登講座於時望道才僧著名之士莫不窮辭挫慮服其精致魯連之屈田巴項託之抗孔叟殆不過矣加以性靜而剛烈氣諧而易遵喜捨以接誘故物益重焉中年遊學廣搜異聞自楊徂秦登廬躡霍羅什大乘之趣提婆小道之要咸暢斯旨究舉其奧所聞日優所見踰賾既而悟曰象者理之所假執象則迷理教者化之所因束教則愚化是以徵明責實惑於虛誕求心應事芒昧格言自胡相傳中華承學未有能出期誠者矣乃收迷獨運存履遺迹於是衆經雲披群疑冰釋釋迦之旨淡然可尋珍怪之辭皆成通論聃周之伸名教秀弼之領元心於此為易矣物忌光穎人疵貞越怨結同服好折群遊遂垂翼斂趾銷影巖穴遵晦至道投迹愚公登舟之迹有往無歸命盡山麓悲興寰畿嗚呼哀哉泗汴之清呂梁之峻唯是淑靈育此明俊如草之蘭如石之瑾匪曰薰雕成此芳絢爰初志學服膺元迹經耳了心披文調策弱而登講靡章不析善以約言弗尚辭㦎有識欽承厭是鉤賾中年稽教理洗未盡用是遊方求諸淵隱雖遇殊聞彌覺同近途窮無歸回轅改軫芟夷名迹闡揚事表何壅不流何晦不曉若出朝離其明昭昭四果十住藉以汲矯易之牛馬莊之魚鳥孰徵斯實弗迷斯道淹留茲悟告子晦言道誠在斯群聽咸播不獨抵峙誚毀多聞子謂無害勸是宣傳識協貞誠見誨浮喧默蔭去大弭此騰口增栖成英敻逸篁藪遁思泉源無閡川阜庶乘間託曰仁曰壽命也有懸曾不永久蘭蓀連類氣傷於偶嗚呼哀哉爰念初離三秋告暮風肅清流雲高林素送別南浦交手分路茫茫去止悽悽情顧熟在隱淪各從沿泝惄是長乖異成永互嗚呼哀哉遡來風之絶響送行雲之莫因緬三冬其已謝轉獻歲於此春聽陽禽之悅豫矚神氣之氤氳念庠序於茲月信習業之嘉辰隱講堂之空覿惻高座之虛聞歎因事以矜理悲緣情以懷人嗚呼哀哉天道茫昧信順可推理不湮滅庶或同歸申夭可略情念可遺短章無布聊以寫悲嗚呼哀哉廣弘明集二十六武丘法綱法師誄元嘉十一年冬十一月辛未法綱法師卒嗚呼哀哉夫峭立方矯既傷於通任卑隨圓比又虧於剛潔山居協枯稿之斃邑止來囂湫之患酌二情而簡雙事者法師其有焉少遊華京長栖幽麓樂志入出乘情去來瀆厭人流就間於木石鬱寂邱壑求歡於物類人以為無特操我見其師誠矣天性膚敏陶漸風味從容情理賞託文義交遊敦亮盡之契進趣慕復外之道埋身法服朱纓之纍早絶抗迹神疆丹墀之閡夙判侃乃桑門矯拂之迹徒倚伏之數者哉昔因邂逅傾蓋著交同以翦落夷契群萃布懷舒憤以寄當年遂攜手遊梁比翼栖鄧餐風靈岫挹道元津比樂齊宴千載一時自林傾鳥散奄忽盈紀子薄高柯豫淪泥滓常冀曾卜索居之遇遂成梁高山海之別東瀾弗復西景莫收致盡川征歸骨曾丘嗚呼哀哉誄曰厥族氏殷實湯之裔榮聲中微源流昭晰少遭閔凶宗無緦繐慈姑經營託是養衛爰逮三五聰韻特挺雙奇比秀偶羅齊穎志陋中區思擢神境脫落生近耽慕緣永既遵元轍洞曉名迹仁義之外通非所惜室欲靡遂坐以會適弗依朱扇考卜嚴壁來不濡足去不絶翮頡頏升萃進退損益豫惡浮波爾能即心俱翔道澤同集德林齊拂和風共聆元音自宮徂國在目在襟往化綿邈遺思沈吟亦既離逖天道明晰爾出舊山豫反遐裔庶乘和運同蔭共憩寒灰弗煙落葉離綴暌願莫從子遂下世人之云亡風懷掩翳嗚呼哀哉元冬凄冽江滸蕭條寒風揚幕飛霰入艘命有近止歸途尚遙憫憫即盡寂寂哀號孤旅如薄均化無褎嗚呼哀哉懷遊居之虎邱悼冥滅之廬嶺惟採録於中京念提攜於番境情飄飄於雙戀思纏綿於兩省何綢繆兮無極心所存兮腷臆閲嚴冬兮已謝藉隆暑兮既息四運紛其邅回情期窅以長匿苟來緣之匪亡卷生年以增惻嗚呼哀哉廣弘明集二十六後出雜心序昔如來泥洹之後於秦漢之間有尊者法勝造阿毗曇心本凡有二百五十偈以為十品後至晉中興之世復有尊者達摩多羅更增三百五十偈以為十一品號曰雜心十品篇目仍舊為名唯別立擇品篇以為異耳位序品次依四諦為義界品直説法相以擬苦諦行業使三品多論生死之本以擬集諦賢聖所説斷結證滅之義以擬滅諦智定二品多説無漏之道以擬道諦自後諸品雜明上事更無別體也於宋元嘉十一年甲戍之歲有外國沙門名曰三藏觀化遊此其人先於大國綜習斯經於是衆僧請令出之即以其年九月於宋都長干寺集諸學士法師雲公譯語法師觀公筆受考校治定周年乃訖鏡以不才謬豫聽末雖思不及玄而時有淺解今謹率所聞以示後生至於折中以俟明哲於會稽始寧山徐支江精舍撰記釋藏迹十列言秣陵縣皇太后睿鑒沖明聖符幽洽滌思淨場研襟至境固以聲藻宸內事靈梵表乃創思鎔斫抽寫神華模造普賢采儀盛像寶傾宙珍妙盡天飾所設齋訖今月八日會有限名簿素定引次就席數無盈減轉經將半景及昆吾忽覩異僧預於座內容止端嚴氣貌秀發舉衆驚嗟莫有識者齋主問曰上人何名答曰名惠明住何寺答曰來自天安言對之間倏然不見閣席悚魂遍筵肅慮以為明祥所賁幽應攸闡紫山可覿華臺不遠蓋聞至誠所感還景移緯澄心所徇發石開泉況帝德涵運皇功懋洽仁洞乾遐理暢冥外故上王盛士剋表大明之朝勸發妙身躬見龍飛之室適若因陛下惠燭海隅明華日月故以惠明為人名繼天興祚式垂無疆故以天安為寺稱神基彌遠道政方凝九服咸泰万寓齊悅謹列言屬縣以顯天休高僧傳答李交州渺難佛不見形釋道高白奉垂問至聖顯晦之迹理味淵博辭義照洗敬覽反覆彌高德音使君垣牆崇邃得門自難輒罄愚管罔象玄珠夫如來應物凡有三焉一者見身放光動地二者正法如佛在世三者像教髣佛儀軌髣佛儀軌應今人情人情感像孰為見哉故淨名經云善解法相知衆生根至於翅頭未城龍華三會人情感見孰為隱哉故法華經云時我及衆僧俱出靈鷲山儴佉之宮孱然可期西方根源何為不覩而世之疑者多謂經語不符暗寄情少咸以不覩生滯夫三皇五帝三代五霸姬旦孔丘刪詩制禮並聞史籍孰覩之哉釋氏震法鼓於鹿園夫子揚德音於鄹魯皆耳眼所不得俱信之於書契若不信彼不患疑此既能了彼何獨滯此使君聖思淵遠洞鑒三世願尋壽量未盡之教近取定光儒童之迹中推大通智勝之集以釋衆人之幽滯若披重霄於太陽貧道言淺辭拙語不宣心冀奉見之日當申之於論難耳謹白弘明集十一道高重答李交州書釋道高白重奉深誨義華旨遠三讀九思方服淵致故知至理非庸近能測微言奧辭非鄙訥所參今謹率常淺粗陳所懷夫萬善為教其途不一有禪宴林藪有修德城傍或曲躬彈指或歌讚誦詠皆耳眼之所了為者亦無量斯則受悟之津由暗寄之稱何必受悟於因鑒觀何必暗寄其則生疑疑亦悟本請當論之疑則求解解則能悟悟則人道非本如何雖儒墨之競興九流之是非乃爝火之不息非日月之不暉何急急於示見而促促於同歸哉今不同季俗無證驗以微誠亦不謬大聖裕昭昭之光明而世之疑者據以不覩形遂長迷於大夢橫沈淪而溺生死先儒往哲粗有舊答既途無異轍輒述而不作夫亡身投誠必感則俱見不感不見其有見者以告不見其不見者會不信見聖人何嘗不在群生何嘗不見哉聞法音而稱善芻狗非謂空陳覩形像而曲躬靈儀豈為虛設姬孔救穨俗而不贍何暇示物以將來若丘旦生遇於結繩則明三世而不已問今佛事其焉在乎低首合掌莫非佛事但令深悟有方殊途同歸前疏所引彼此疑信者正為世人不見便謂無佛故取不見周孔為其繩準耳此乃垂拱而相隨豈矛盾之謂哉便君生知無假素氣天然居大寶之地運穎脫之思流浪義苑涉步書園吐握餘暇優遊永日德音既宣莫不側聽貧道學業粗淺彌慚簡札上酬謬略懼塵盛藻追增悚愧流汗霡霂謹白弘明集十一答李交州難佛不見形釋法明白巨論爰降敬覽移日馥若幽蘭清若惠風貧道器非霜穎運非庖生動乖理間獨躓疑駭良由辭納旨滯劇難星陳愚謂二暗寄奇鑒觀示見鞠躬歌讚感動靈變並趣道之津梁清升之嘉會故宜寄觀雙舉疑驗兩行豈得罷絶示見頓漏神彩齊軌姬孔同範世訓放光動地徒為空言夫法身凝絶妙色湛然故能隱顯順時行藏莫測顯則乘如而來隱則善逝而去即言求旨何愆於十號哉餘暉所映足光季俗信者豈以螢燭增疑正向旦日白黑比肩塔像經書彌滿世界學者豈以無證自悔又引七經義兼未來積善餘慶積惡餘殃雖新新生滅交臂代謝善惡之業不得不受此乃過明三世愈亮七經徵翰檢實則聞命矣前論云帝王姬孔訓止當世來生之事存而不論故其隱見廢興權實莫辨似若矛盾義將安寄當仁不讓伏聽淵賾前疏粗述至聖沈浮而義據未照詞況未泯謹更詳究共弘至道夫群生長寢於三有衆識永惛於六塵潛移為吞噬之主相續為回轉之輪形充逆旅之館神當過憩之賓往來三惡而苦楚經離八難而酸辛欣樂暫娛憂畏永勤一身死壤復受一身雖世智辨聰群書滿腹百家洞了九流必達知死生有命富貴在天鬼神莫之要聖哲弗能預未免謬見以翳情疑似以干慮寄懷於巫糈投誠於符呪執邪以望正存偽以待真遲回於兩心躊躇於二徑放光動地其可見乎所以玄籍流布列筌待機機動必感感而後應者也自有棲志玄宅下操幽淵明一生若朝露辨三世之不虛縱轡於清真之術斂控於濁偽之衢植德耘邪而薈蔚樹福灌正而扶疏苦節競辰於寸陰潔已爭逝於桑榆懷誠抱向感而遂通豈不親映光彩而覩其靈變哉若耳眼所不自了或通夢之所見如漢明因夢以感聖大法於是而來遊帝王傾誠以歸德英豪斂衽以服化沙門齊肩於王公僧尼直躬於天子九十六種孰為高哉宋武皇帝始登帝位夢一道人提鉢就乞因而言曰君於前世施維衛佛一鉢之飯含居斯位遣問嚴公徵其虛實嚴公即送七佛經呈聞吳主孫權初疑佛法有靈驗當停罷省遂獲舍利光明照宮金鐵不能碎爐冶不能融今見帝京建初寺是吳郡有石佛浮身海水道士巫師人從百數符章鼓舞一不能動黑衣五六朱張數四薄爾奉接遂相勝舉即今見在吳郡北寺惇誠至到者莫不有感朱張連世奉佛由覩驗致郭文舉祗崇三寶正信堅明手探虎鯁深識安危蘭公拂嚴雪於猛獸護公感枯泉而洪流並高行逸群清身邁俗皆有異迹世咸記焉自茲以外不可勝論貧道少惰學業迄於白首孤陋寡聞彰於已誡直言朴辭未必可採懼不允當伏追慚悚謹白弘明集十一答范泰等書祗洹寺釋慧義等五十人敬白諸檀越夫沙門之法正應謹守經律以信順為本若欲違經反律師心自是此則大法之深患穢道之首也如來制戒有開有閉開則行之無疑閉則莫之敢犯戒防沙門不得身手觸近女人凡持戒之徒見所親漂溺深水視其死亡無敢救者於是世人謂沙門無慈此何道之有是以如來為世譏嫌開此一戒有難聽救如來立戒是畫一之制正可謹守而行豈容以意專輒改作俗儒猶尚謹守夏五莫敢益其月者將欲深防穿鑿之徒杜絶好新樂異之客而況三達制戒豈敢妄有通塞范檀越欲令此衆改偏從方求不異之和雖貪和之為美然和不以道則是求同非求和也祗洹自有衆已來至於法集未嘗不有方偏二衆既無經律為證而忽欲改易佛法此非小事實未敢高同此寺受持僧祗律為日已久且律有明文説偏食法凡八議若無偏食之制則無二百五十矣云食不得制於床上所棄之食置於右足邊又云不得懸足纍脛此豈非偏食之明證哉戒律是沙門之祕法自非國主不得預聞今諸檀越疑惑方偏欲生興廢貧道不得不榷其輕重略舉數條示其有本甘受宣戒之罪佛法通塞繼諸檀越通則共獲護法之功塞必相與有滅法之罪幸願三思令幽顯無恨弘明集十二
