body:
  text: 王玄謨論彭城表彭城南屆大淮左右清汴城隍峻整襟帶衛周又自淮以西裏陽以北經塗三千達於濟岱六州之民三十萬戶實由此境請用楊頭為西秦州假節表被敕令臣遣使與楊元和楊頭相聞并致信餉即遣中軍行參軍呂智宗齎書并信等亦自遣使隨智宗及頭語智宗頃破家為國母妻子弟并墜沒虜中不顧孝道陳力邊捍竭忠盡誠未為朝廷所識若以元和承統宜授王爵若以其年小未堪大任則應別有所委頃來公私紛紜華戎交構皆此之由臣伏尋頭元嘉以來實有忠誠於國棄親遣愛誠在可嘉氏羌負遠又與虜咫尺急之則反緩之則怨觀頭使人言語不敢便望仇池公所希政在西秦州假節而已如臣愚見蕃捍漢川使無虜患頭實有力四千戶荒州殆不足吝元和小弱若未可專委復數年之後必堪嗣業用之不難若才用不稱則應歸頭若茄蘆不守漢川亦無立理宋書氐胡傳孝建二年以楊元和為征虜將軍楊頭為輔國將軍元和年小才弱不能緩御所部頭母妻子弟並為虜執頭至誠奉順無所懷顧雍州刺史王謨上表上不許案孝武孝建二年十月以王玄謨雍州刺史氐胡傳作王謨有脫今校正領汝陰太守上疏王途始開隨復淪塞非惟天時抑亦人事虎牢滑臺非惟將之不良抑亦本之不固本之不固皆由民憚遠役臣請以西陽之魯陽襄陽之南鄉發甲卒分為兩道直趣淆澠征士無遠徭之思吏士有屢休之歌若欲以東國之衆經營牢洛道途既遠獨克實難宋書王玄謨傳元嘉中領汝陰太守時虜攻陷滑臺執朱修之以歸玄謨上疏臨雍州上言所統僑郡無有境土新舊錯亂租課不時宜加并合南史十六墾起湖田議小民貧匱遠就荒疇去舊即新糧種俱闕習之既難勸之未易謂宜微加資給使得肆勤明力田之賞申怠惰之罪宋書孔靖傳大明初靈符表徙無資之家於餘姚鄞鄮三縣界墾起湖田太常王玄謨議報南郡王義宣書頻奉二誨伏對戰駭先在彭泗聞諸將皆云必有今日之事以鄙意量謂無此理去年九月故遣參軍光僧瑗修書表心并密陳入相之計欲使周旦之美復見於今豈意理數難推果至於此昔因幸會蒙國士之顧思報厚德甘起泉壤豈謂一旦事與願違公崇長姦回自放西服信邪細之説忘大節之重溺流狡之志滅君親之恩狎玩極寵越希非覬祖宗世祀自圖顛覆瞑目行事未有如斯之甚者也乃復枉覃書檄遠示見招此則丹心微款未亮於高鑑赤城幽志虛感於平日環念周回始悟知己之為難也公但念提職在昔不思善教有本徒見徐魯去就未知仗義有人豈不惜哉有臣則欲其忠誘人而導諸逆君子忠恕其是乎苟不忠恕則擇木之翰有所不集矣夫挑妾者愛其易求妻則敬其難若承命如響將焉用之原轂存輿無禮必及竊恐荊郢之士已當潛二其懷非皇都陋臣秉義不徙公雖心迷迹往猶願勉建良圖抑撫軍忠壯慷慨亮誠有素新亭之勳莫與為等而妄信姦虛坐相貶謗不亦惑哉幸承人乏夙誡前驅精甲已次近路鎮軍駱驛繼發太傅驃騎嗣董元戎乘輿親御六師威靈遐振人百其氣慕義如林舟騎雲回赫奕千里輒屬鞬秉鋭與執事周旋授命當仁理無所讓夫君道既盡民禮亦絶執筆裁答感慨交懷宋書南郡王羲宣傳時討義宣遣豫州刺史王玄謨舟師頓梁山洲內東西兩岸為卻月城營柵甚固義宣屢與玄謨書要令降玄謨書報馳信告柳元景西城不守唯餘東城衆寡相懸請退還姑熟更議進取宋書垣護之傳與何勗書劉雍向顧見噉遂舉體流血宋書劉穆之傳穆之孫雍嗜食瘡痂詣孟靈休靈休先患瘡瘡痂未落者悉褫取以飴雍雍既去靈休與何勗書案勗無忌之子為侍中封安成公又見南史十五與到彥之書諫回師外聞節下欲回師反旆竊所不同何者殘虜畏威望風奔迸八載侵地不戰克復方當長驅朔漠窮掃遺醜況乃自送無假遠勞宜使竺靈秀速進滑臺助朱修之固守節下大軍進擬河北則牢洛遊魂自然奔退且昔人有連年攻戰失衆乏糧者猶張膽爭前莫肯輕退況今青州豐穰濟漕流通士馬飽逸威力無損若空棄滑臺坐喪成業豈是朝廷受任之旨宋書垣護之傳馳書勸王玄謨急攻滑臺昔武皇攻廣固死沒者亦衆況事殊曩日豈得計士衆傷疲願以屠城為急宋書垣護之傳臨死與從弟榮祖書弟嘗勸我危行言遜今果敗矣南齊書垣榮祖傳南史二十五諸官出行分道議每至出行未知制與何官分道應有舊科法唯稱中丞專道傳詔荷信詔喚衆官應詔者行得制令無分別他官之文既無畫然定則準承有疑謂皇太子正議東儲不宜與衆同例中丞應與分道揚州刺史丹楊尹建康令並是京輦士地之主或檢校非違或赴救水火事應神速不宜稽駐亦合分道又尋六門則為行馬之內且禁衛非違並由二衛及領軍未詳京尹建康令門內之徒及公事亦得與中丞分道與不其準參舊儀告報參詳所宜分道聽如臺所上其六門內既非州郡縣部界則不合依門外其尚書令二僕射所應分道亦悉與中丞同宋書禮志二通典二十四元嘉十二年有司奏御史中丞劉式之議奏彈蕭惠開非才非望非勳非德南史十五奏彈王僧達廕藉高華人品𤕠末宋書劉穆之傳南史十五與顏竣書朱修之三世叛兵一旦居荊州青油幕下作謝宣明面見向使齋帥以長刀引吾下席於吾何有政恐胸奴輕漢耳宋書劉穆之傳南史十五初學記二十五與親故書吾家黑面阿秀遂居劉安衆處朝廷不為多士宋書劉穆之傳南史十五瑀族叔秀之為丹陽尹瑀又與親故書北征上疏以今月十二日入泗口緣道把沙開溝以夜繼日日才行十餘里或七八里北堂書鈔一百五十九引宋元嘉起居注民殺長吏議律文雖不顯民殺官長之旨若值赦但止徙送便與悠悠殺人曾無一異民敬官長比之父母行害之身雖遇赦謂宜長付尚方窮其天命家口令補兵宋書劉秀之傳大明田年改定制令疑民殺長吏科議者謂值赦宜加徙送秀之以為云云又見南史十五上換郡事宜表伏聞朝恩當加臣濟南太守仰惟優旨荒心散越臣殃咎之餘遭蒙踰忝寵私罔已復兼今授豈其愚迷所能上答臣近至止即履行所統究其形宜河濟之間應置戍扞其中四處急須修立玲口故城又是要所宜移太原委以邊事緣山渚邏並得除省防衛綏懷利便非一呂綽減效益著深同臣意百姓聞者咸皆附説急有同異二三未宜但房紹之蒞郡經年軍民粗狎改以帶臣有乖永事遠牽太原於民為苦而玲口之計復成交互人情非樂容有不安疆場威刑患不開廣若得依先處分公私允緝宋書申恬傳奉世祖箋下官近在歷下始奉國諱所承使人不知闊狹既還在路漸有所聞猶謂人倫無容有此私懷感慨未敢在言奉被今教果出慮表重增哀惋不能自勝此實天地所不覆載人神所不容忍率土民氓莫不憤咽況下官蒙荷榮渥義兼常志此月五日被驛使追命騎還朝切齒拊心輒已鍾疾雖百口在都一非所顧正欲遣啓受規略會奉今旨悲懼兼情伏承司徒英圖電發殿下神武霜斷臧質忠義並到不謀同時仗順沿流席卷江甸前驅風邁已應在近下官復練始集遣輔國將軍申坦龍驤將軍梁坦二軍分配精甲五千申坦為統便以即日水陸齊下下官悉率文武駱驛繼發憑威策懦勢同振朽開泰有期悲欣交集宋書蕭思話傳元凶弒立以思話為徐兗二州刺史思話即率部曲還彭城起義以應世祖遣使奉箋書一月三日思話白節近説寒切足下復何如比何一涉道久當諸惡邪少首望近吾所患猶爾思話白淳化閣帖四求解職表陛下未照臣愚故引參近侍臣以職事非長故委能何偃凡諸當不不敢參議竊見積射將軍徐沖之為偃命所黜臣愚懷謂有可申故聊説微異偃恃恩使貴欲人靡二情便訶脅主者手定文案割落臣議專載己辭雖天照廣臨竟未見察臣理違顏咫尺致茲壅濫則臣之受劾蓋何足悲但不順侍中臣有其咎當而行之不知何過且議之不允未有彈科省心揆天了知在宥臣不能謝愆右職改意重臣刺骨鑠金將有旦夕乞解所忝保拙私庭宋書蕭惠開傳斬吉翰子啓吉為劉義宣所遇交結不逞向臣訕毀朝政輒已戮之南史十八
