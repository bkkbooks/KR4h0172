body:
  text: 庾蔚之為高曾祖母持重服劉景升以婦人之不可踰夫既已乘矣按成粲云已自受重於父不受重於祖為祖母不應三年亦可謂殊塗而同謬者矣又劉智釋疑答問云高曾祖母與祖母俱存其卑者先亡則當厭屈不昔魯穆姜在而成公夫人薨春秋書曰葬我小君齊姜舊說云妻隨夫而成尊姑不厭婦婦人不主祭已承先君之正體無疑於服重也通典八十九婦從夫嫡會高祖母正體所傳竝有重何疑其亡先後同上為嫁母服母子至親本無絶道禮所親者屬也出母得罪於父猶追服周若父卒母嫁而反不服則是子自絶其母豈天理邪宜與出母同制按晉制寧假二十五月是終其心喪耳通典八十九大功殤服漢戴德云獨謂父母為子昆弟相為當不如鄭以周親為斷周親七歲以下容有緦麻之服而不以緦麻服服之者以其未及於禮故有哭日之差耳他親有三殤之年而降在無服者此是服所不及豈得先以日易月之例邪戴逵雖欲申馬難鄭而彌覺其躓范寧難之可謂當矣按束晳通論無服之殤云禮緦麻不服長殤小功不服中殤大功不為易月哭唯齊縗乃備四殤焉凡云男二十而冠三十而娶女十五許嫁而笄二十而出竝禮之大斷至於形智夙成早堪冠娶亦不限之二十矣笄冠有成人之容婚嫁有成人之事鄭玄曰殤年為大夫乃不為殤為士猶殤之今代則不然受命出官便同成人也通典九十一同母異父昆弟大功服自以同生成親繼父同居由有功而致服二服之來其禮乖殊以為因繼父而有服者失之遠矣馬昭曰異父昆弟恩繫於母不於繼父繼父絶族者也母同生故為親者屬雖不同居猶相為服王肅以為從於繼父而服又言同居乃失之遠矣子游狄儀或言齊縗或言大功趨於輕重不疑於有無也家語之言固所未信子游古之習禮者也從之不亦可乎通典九十一小功成人服傳以同居為義蓋從夫謂之同室以明親近非謂常須共居設夫之從父昆弟少長異鄉二婦亦有同室之義聞而服之緦也今人謂從父昆弟為同堂取於此也婦從夫服降夫一等故為夫之伯叔父大功則知夫姑姊妹皆是從服夫之昆弟無服自別有義耳非如徐邈之言出自恩紀者通典九十二嫂叔服蔣濟成粲排棄聖賢經傳而苟虛樹已說可謂誣於禮矣通典九十二蔣濟以小功章娣姒婦姒者兄弟之妻相名也相與皆小功成粲云嫂應有服可從大功緦麻服傳云以名服及云以名加皆是先有其義故施以此名尋名則義自見矣外親以緦斷者抑異姓以敦已族也緦服既不足以申外甥外孫之情故聖人因其有伸之義而許其加也外祖以尊加從母以名加者男女異長伯季不同由母於姊妹有相親之近情故許其因母名以加服兄弟姊妹同氣之懷不異故其服不得殊由若同在他邦小功加一等而大功以上則不加也通典九十二為父後出母更還服為父後不服出母為廢祭也母嫁而迎還是子之私情至於嫡子不可廢祭鍾育率情而制服非禮意也禮云繼母從為之服非父後者也通典九十四繼母亡前家子取喪柩去服子當以父服為正父若服以為妻則子亦應服之如母若父與去而不服之則子宜依繼母出不服也通典九十四矯公曜出母還不為服臨亡使子迎母自是申子之情私而此母自處不失禮而子不用出母之服非也公曜不服當矣通典九十四父卒繼母還前親子家繼子為服繼子持服竟後乃去不得謂之為道比之繼母嫁於情為安通典九十四王式繼母還前繼子家式為服式父取後妻之請是無相責之情不得謂之為遣妻制服依禮葬畢乃還家積年方就前家子比之繼嫁不亦可乎然式是長子則不得服繼嫁以廢祭通典九十四親母無黨服繼母黨母亡禮應服其母之黨不服繼母之黨不可以母黨先已滅亡而服繼母之黨若服繼母之黨則亂於己母之出也通典九十五母出有繼母非一當服次其母者禮己母被出則服繼母之黨繼母雖亡己猶自服不得捨前以服後也當如喜議服次其母者之黨也通典九十五虞喜通疑曰縱有十繼母則當服次其母者之黨也從母被出為從母兄弟服出母絶族唯親者屬母子無絶道餘親不得有服此禮之明文褚所以服王由乎周氏王既絶周不復服褚矣褚何容獨服王邪禮有從無服而有服蓋是厭降所致豈得與義絶者同乎從母昆弟以名服者蓋明服之由不關義絶之後從母在王及與在庾誠無以異但在庾則絶王故褚不得從親者屬而服王也褚以王絶已故不服何嫌褚母之出也不服之理各有其義者也通典九十五晉王愷與褚粲兩姨兄弟王愷母被出更嫁庾氏後愷亡粲疑於服繼嫡母黨服按禮嫡母之黨徒從徒從者所從亡則已嫡母雖有三四應服見在者之黨但今人復服所生之黨則嫡母之黨非服徒從嫡雖沒猶宜服之但外氏無二統不可悉服宜以始生所遇嫡母之黨若己生悉不及宜服最後者之黨也通典九十五妻已亡為妻父母服夫妻一體之親而謂妻之父母徒從失之甚矣言應服者辨之已詳或疑外氏二統則妻之父母亦不宜二意以為母之兩三親假不同妻之三四於已猶一非其例也通典九十五夫為祖曾祖高祖父母持重妻不從服舅沒則姑老是授祭事於子婦至於祖服自以姑為嫡所謂有嫡婦無嫡孫婦也祖以嫡統唯一故子婦尚存其孫婦以下未得為嫡猶以庶服之孫婦及曾玄孫婦自隨夫服祖降一等故宜周也通典九十六出後還為本父服及追服所後父嘗為父子愛敬兼加豈得事改便同疏族方之繼母嫁於情為安通典九十六出後子為本庶祖母服庶子為父後不得服其所生以服廢祭故也已出伯父即為祖嫡何由得服父之所生乎通典九十六為庶子後為庶祖母服所後父若承祖後則己不得服庶祖母也父不承重已得為庶祖母一周庶無傳祭故不三年也通典九十六為曾祖後服間代取後禮未之聞宗聖時王所命以尊先聖本不計數恐不得引以為比也通典九十六何琦議云魏之宗聖遠繼宣尼此成比也故云竝有父母喪練日居廬堊室前喪既周應毀廬為堊室而後喪猶應居廬古者受弔於庭階廬堊室自是寢處之所今雖以廬堊室為喪位然自異於縗絰矣母喪既練而父亡為母伸服乃問劉表諸儒及太始制皆云父亡未殯而祖亡承祖嫡者不敢服祖重為不忍變於父在也況父在之日母久已亡寧可以父亡而變之乎意謂立服之旨皆定於始制之日女子大功之末可嫁既嫁必不可五月而除其服男子在周服之內出為族人後亦不可九月而除矣父為大夫子為父後降伯叔父大功或已兩三月而父亡寧可伸服周乎是知凡服皆以始制為斷唯有婦人於夫氏之親被遣義絶出則除之通典九十七父未殯祖亡服禮云三日而不生亦不生矣故君薨未殮人門升自阼階明以生奉之也父亡未殯同之平存是父為傳重正主己攝行事事無所闕虞喜何謂無倚廬乎孝子之所寢處不關於主闕之何嫌若祖為國君五屬皆斬則孫無獨周之義按賀循所記謂大夫士也通典九十七父喪內祖亡作二主立廬父喪內祖又亡則應兼主二喪今代以廬為受弔之處則立二廬是也人為父喪來弔則往父廬之所若為祖喪來弔則往祖廬之所宋書九十七長殤中殤變三年葛服問云麻之有本者變三年之葛既練遇麻斷本者於絻絰之次云小功不易喪之練冠因說麻之有本乃能變正服之葛方云殤長中變三年之葛終殤之月算而反三年之葛是非重麻為其無卒哭之稅下殤則不當是論周殤之大功若是大功之殤記當明之周殤最在上所以不言周耳鄭玄謂周殤長中已自大功不復指明殤服之異不於卒哭而變上服之葛又明下殤之麻雖不斷本以其幼賤亦不變能上服之葛閒傳大明斬縗變受之節因備列五服麻葛之分緦小功之麻不變上服之葛已自別見故此雖連言而在兼服之例是以不復曲辨若如鄭說謂大功親之殤者其如緦小功之絰麻既斷本又與三年之葛大小殊絶安得相變邪通典九十七居所後父喪有本親喪服禮齊縗斬縗之受服大功變既練之服計縗升數從其粗者若升數同則不變絰帶而己今代則不然應別制本親周服還本家則著之時代不同不得全依禮今以堊室為對弔之所故應還本家立堊室在諸弟之下以受弔設使本家遠便當於別室不得於所後靈前受本親喪之弔通典九十七為祖母持重既葬而母亡服若如范說非為反後喪之服亦應還毀堊室立廬在諸堊室之上但二喪共位廬堊室雜處恐非適時之禮謂宜始有後喪便別室為廬兼主二喪通典九十七范宣云承嫡居諸父之上一身為兩喪之主無緣更開門立廬以失居正之意兼親服一人身而內外兩親論卑尊之殺當以己族為正昭穆不可亂也論服當以親者為先親親之情不可汲也或族叔而是姨弟若此之類皆是也禮云夫屬父道妻皆母道夫屬子道妻皆婦道此言本無親也若本有外屬之親則當推其尊親之宜外親不關母婦之例無嫌昭穆之亂故可得隨其所親而服之若外甥女為己子婦則不用外甥之服是從親者服也外姊妹而為兄弟之妻亦宜用無服之制兄弟妻之無服乃親於外親之有服也至若從母而為從父昆弟之子婦則不可以婦禮待之由外親之屬近而尊也其餘皆可推而知矣通典九十七小功不稅鄭王所說雖各有理而王議容朝聞夕除或不容成服求之人心未為允愜若服其殘月人心得寧則應多少不同今喪寧心制既無其條則是前朝已自詳定無服殘月之制通典九十八鄭玄云五月之內追服王肅云服其殘月小功不追以恩輕故也庶祖母慈祖母服按喪服傳釋慈母如母以為妾之無子妾子無母父命以為母子然後慈母之義全也智云有子之妾有母之子竝乖經傳所說如母之義何由面生子不違父之命豈從失禮之命小記云慈母之父母無服今子服慈母如母猶無所從況可從父服慈祖母乎且先儒所云婦人不服慈姑者婦從夫尚猶不服則子不從明矣通典九十八王群請為從父姊反服王群從姊喪亡之初有繼兒群已制小功之服凡服皆定於始制之日豈得以葬竟兒亡方欲追改其服乎異於女子為夫所出申服於父母也經文多略可以類推舉近親之有服則疏者知無服凡經於五服之內文有未備皆於公子章發凡以例無主後之不降文不及從又無發凡以明之是知相矜止於周服而已晉朝喪亂移都於江南郡之卿士同奉天子何他邦之有乎通典九十九甲為寡叔母歸宗未嫁暴亡服甲叔母乙便是執操之人直是母欲奪而嫁之乃逆責杜漸防微古賢不足貴也許君之言當附於理通典九十九秀孝為舉將服白衣舉秀孝既未為吏故不宜有舊君之朝尊卑不同則無正服弔服加麻可也今人為守相刺史又無服但身蒙舉達恩深於常謂宜如鄭小同弔服加麻為允今已違適為異與舊君不通議論不奔弔故郡將喪通典九十九郡縣吏為守令服晉令云代至而除施之州郡縣員吏宜用齊周之制禮代殊事異理有大斷今州府之君既不久居其位暫來之吏不得以為純臣則齊周之制不為輕也君齊矣豈有從乎子妻其猶不從本無義於傍親卞光祿所行是也二公使吏從服姪姊可謂恢疏罔其乖遠矣通典九十九為廢疾子服疾病者不愈而亡彌加其悼豈有禮無降文情無所屈而自替其服者邪殤服本階梯以至成人豈可以病者準之篤其愛者以病彌可悲矣薄其恩者以病則宜棄矣病有輕重參差萬緒故立禮者深見其情杜而不言無降之理略可知矣嫡不為後是其去傳重之加非降其本服劉智劉玢所言近為得理矣通典一百一罪惡絶服夫聖人設教莫不敦風尚俗睦親糾宗者也每抑其侈薄之路深仁悌之誨公族有罪素服不舉恩無絶也若凶悖陷害則應臨事議其罪豈但不服而己裴耽以狂病致卒無罪可論田嶽之議足為允也通典一百一弟子為師服今受業於先生者皆不執弟子之禮唯師氏之官王命所置故諸王之敬師國子生之服祭酒猶粗依古禮弔服加麻既葬除之但不心喪三年耳通典一百一改葬無虞神已在廟無所復虞但先祭而開墓將定而奠事畢而祭靈遂毀靈座若棺毀更斂則宜有大斂之奠若移喪遠葬又有祖奠遣奠也通典百二父母墓毀服人子之情無可輟聖人以禮斷之故改葬所服不過於緦緦服雖輕而用情甚重意謂聞其親尸柩毀露及更葬便應制服奔往縱縱已修復亦應臨赴苟途路阻礙猶宜制服緦依三月而除豈可以不及葬事便晏然不服乎通典一百二變除問答問曰有葬在小祥之月此月復有虞祔之禮便用晦祥於理為速此與久喪復異取後月祥練於情允不答曰三年後葬祥不在葬月耳今未為絶久祥理取後月也又問曰葬與練祥三事各月猶未足申漸殺之情況乃練祥三變而可共在一月邪虞喜之言不近人情盧鄭王皆以此不同時日良有由也言各有當亦不嫌同辭春夏秋冬既各為一時一日有十二時然十二月何為不得各為一時之言也通典一百三婦喪久不葬服喪服小記云為兄弟既除喪及葬反服其服此是至葬反服之明文未解漢宣帝何故復為祥制集禮論者不記至葬反服之禮而載諸變除以明之可謂棄本逐末雜記云姑姊妹之夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親不為主夫若無族則東西家若又無則里尹主之喪大記云喪有無後無無主此皆謂喪事之主也服問云君所主夫人妻太子嫡婦此謂君雖尊統一家但為嫡者主喪耳而小記又云久喪不葬者不除是居周功之喪也若女子適人及男子為人後者皆隨其服而釋除緣其出有所屈故也素服心喪以至過葬但今世輕於下流之喪妻猶去其杖禫不容復有未葬不除也議者疑不得以下流之未葬以廢祖禰之蒸嘗且未葬亦可十年五歲嘗試言之夫子許貧者還葬而無槨是明亡者急於送往不容甚久可知若事遲過於服限亦不得停殯在宮而響樂在廟既吉凶不可以相干亦在所不忍也通典一百三招魂葬論葬以藏形廟以饗神季子所云魂氣無不之寧得招而葬乎通典一百三
