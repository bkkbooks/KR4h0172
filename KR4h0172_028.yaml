body:
  text: 孔覬辭署記室箋記室之局實惟華要自非文行秀敏莫或居心覬遜業之舉無聞於鄉部惰遊之貶有編於疲農直山淵藏引用不遐棄故得抃風儛潤憑附彌年今日之命非所敢冒昔之學優藝富猶尚斯難況覬能薄質魯亦何容易覬聞居方辨物君人所以官才陳力就列自下所以奉上覬雖不敏常服斯言今寵藉惟舊舉非尚德恐無以提衡一隅僉允視聽者也伏願天明照其心請乞改今局授以間曹則鳧鶴從方所憂去矣宋書孔覬傳夫以記室之要宜須通才敏思加性情勤密者覬學不綜貫性又疏惰何可以屬知祕記秉筆文閏假吹之尤方斯非濫覬少常檢本無遠植榮進之願何能忘懷若實有螢爝增暉光景固其騰聲之曰飛藻之辰也豈敢自求從容無其淡逸伏願矜其魯拙業之有地則曲成之施終始優渥宋書孔覬傳又通典三十一艾賦良藥弗達妙針莫宣奇艾急病靡身挺煙治匪君臣得用神火振淹固於一爛氣絶息乎無假淳建投而招崇鉗椒檮而貽禍伊茲艾之淑粹仍索質於中野嗟乎貞灰與邪燼迭御芳煙與苦蘭競薰是以艾正而賤蘭妖而珍故言堯則桀對舉蘭則艾因藝文類聚八十二艾贊論藹靈艾蔚彼修坡混區群卉理深用遠藝文類聚八十二氂牛賦惟茲獸之攸生亦棲遐而憑阻遁綿野於岷隅挹清源於庸渚奔逸躅而倫𤙁載賁首而亂羜茸長氂之䯱䰄戾狠情而首鼠邁羔羊之如膏侔蜉蝣之楚楚既作表於禮樂又為容於軍旅奉藩嶽之休明被戎荒而既序班賝賂而來庭超印蒟乎其所初學記二十九陳損益隆化之道莫先於官得其才枚卜之方莫若人慎其舉雖復因革不同損益有物求賢審官未之或改師錫僉曰煥乎欽明之誥拔茅征吉著於幽賁之爻晉師有成瓜衍作賞楚乘無入蒍賈不賀今舊命惟新幽人引領韶之盡美已備於振綱武之未盡或存於理目雖九官之職未可備舉親民之選尤宜在先愚欲使天朝四品官外及守牧各舉一人堪為二千石長吏者以付選官隨缺敘用得賢受賞失舉任罰夫惟帝之難豈庸識所易然舉爾所知非求多人因百官之明孰與一識之見執咎在己豈容徇物之私今非以選曹所銓果於乖謬衆職所舉必也惟良宜使求賢闢其廣塗考績取其少殿若才實拔群進宜尚德治阿之宰不必計年免徒之守豈限資秩自此以還故當才均以資資均以地宰蒞之官誠曰吏職然監觀民瘼翼化宣風則隱厚之求急於刀筆能事之功接於德心以此論才行之年歲豈惟政無秕蠹民庇手足而己將使公路日清私請漸塞士多心競仁必由己已處士砥自求之節仕子藏交馳之情寧子庸微不識治體冒昧陳愚退懼違謬宋書王華傳先是會稽孔寧子先為高祖太尉主簿陳損益云云井頌天高聽卑載厚流謙揮鋒既擊跪拜亦霑惟益有作德遠事兼明王用汲人具爾瞻初學記七水贊澄鑒無虛積之成川湍飛塋谷激石泠然藝文類聚八王睦事議設法止姦本於情理非謂一人為劫闔門應刑所以罪及同産欲開其相告以出造惡之身睦父母之際容可悉共逃亡而割其天屬還相縛送螫毒在手解腕求全於情可愍理亦宜宥使凶人不容於家逃刑無所乃大絶根源也睦既糾送則餘人無應復告並合赦之宋書何尚之傳南史何尚之傳通典一百六十七案此議宋書造惡作為惡之際作之王未句作並全之華林清暑殿賦其西則堂皇博敞正鵠是施帶以緑流樹以清椅初學記二十四堂七逞綿互之虹梁列雕刻之華榱網戶翠錢青軒丹墀若乃奧室曲房深沈冥密始如易循終焉難悉動微物而風生踐椒而芳溢觸遇成宴暫遊纍日却倚危石前臨濬谷終始蕭森激清引濁湧泉灌於階戺遠風生於楹曲暑雖殷而不炎氣方清而含育哀鶴唳暮悲猿啼曉靈芝被崖仙華覆沼藝文類聚六十二初學記二十四退居賦闕見宋書何尚之傳七表諫行幸侵夜萬乘宜重尊不可輕此聖心所鑒豈假臣啓輿駕比出還多冒夜群情傾側實有未寧清道而動帝王成則古今深誡安不忘危若值汲黯辛毗必將犯顏切諫但臣等碌碌每存順默耳伏願少採愚誠思垂省察不以人廢適可以慰四海之望宋書何尚之傳御覽四百五十三上言請原竺超民等刑罰得失治亂所由聖賢留心不可不慎竺超民為賊既遁走一夫可禽若反覆昧利即當取之非唯免愆亦可要不義之賞而超民無此意微足觀過知仁且為官保全城時謹守庫藏端坐待縛今戮及兄弟與向始未論者復成何異陸展盡質復灼然便同之巨逆於事為重臣豫蒙顧待自殊凡隸苟有所懷不敢自默宋書何尚之傳世祖即位藏質反義宣司馬竺超民臧質長史陸展兄弟並應從誅尚之上言超民坐者由此得原密奏庾炳之得失夫為國為家何嘗不謹用前典今苟欲通一人慮非哲王御世之長術炳之所行非曖昧而已臣所聞既非一旦又往往眼見事如丘山彰彰若此遂縱而糾不知復何以為治晉武不曰明主斷鬲令事遂能奮發華廙見待不輕廢錮纍年後起止作城門校尉耳若言炳之有誠於國未知的是何事政當云與殷景仁其舊與劉湛亦復不疏且景仁當時事意豈復可蔑朝士兩邊相推亦復何限縱有微誠復何足掩其惡今賈充勳烈晉之重臣雖事業不勝不聞有大罪諸臣進説便遠出之陛下聖睿反更遲遲於此炳之上之亹既自藉藉交結朋黨搆扇是非實足亂俗傷風諸惡紛紜過於范曄所少賊一事耳伏願深加三思試以諸聲傳普訪諸可顧問者群下見陛下顧遇既重恐不敢苦相侵傷顧問之日宜布嫌責之旨若不如此亦當不辨有所得失臣蠢既有所啓要盡其心如無可納伏願宥其觸忤之罪宋書庾炳之傳炳之領選既不緝衆論又頗通貨賄請急還家令史錢泰周伯齊出炳之宅咨事泰能彈琵琶伯齊善歌因留停宿為有司所奏上於炳之素厚將恕之召問尚書右僕射何尚之尚之具陳炳之得失又密奏又見南史三十五又陳炳之呼二令史出宿令史咨都令史駱宰宰云不通吏部曹亦咸知不可令史具向尚之説不得停之意炳之了不聽納之非為不解直是苟相留耳內外悉知此而誣於信受群情豈了陛下不假為之辭雖是令史出乃遠虧朝典又不得謂之小事謝晦望實非今者之儔一事錯誤免侍中官王珣時賢小失桓胤春搜之謬皆白衣領職況公犯憲制者邪不審可有同王桓白衣例不於任使無損兼可得以為肅戒孔萬祀居左丞之局不念相當語駱宰云炳之貴要異他尚書身政可得無言耳又云不癡不聾不成姑公敢作此言亦為異也同上時炳之自理不諳臺制令史並言停外非嫌太祖以炳之信受失所小事不足傷大臣尚之又陳又陳庾炳之愆過尚書舊有增置幹二十人以元凱丞幹之假疾病炳之常取十人私使詢處幹闕不得時補近得王師猶不遣還臣令人語之先取人使意常未安今既有手力不宜復留得臣此信方復遣耳大都為人好率懷行事有諸紜紜不悉可曉臣思張遼之言關羽雖兄弟曹公父子豈得不言觀今人憂國實寡臣復結舌日月之明或有所蔽然不知臣者豈不謂臣有爭競之迹追以悵悵臣與炳之周旋俱被恩接不宜復生厚薄太尉昨與臣言説炳之有諸不可非唯一條遠近相崇畏震動四海凡短人辨得致此便復可嘉虞秀之門生事之纍味珍肴未嘗有乏其外別貢豈可具詳炳之門中不問大小誅求張幼緒幼緒轉無以堪命炳之先與劉德願殊惡德願自持琵琶甚精麗遺之便復款然市令盛馥進數百口材助營宅恐人知作虛買券劉道錫驟有所輸傾南俸之半劉雍自謂得其力助事之如父夏中送甘蔗若新發於州國吏運載樵荻無輟於道諸見人有物鮮或不求聞劉遵考有材便乞材見好燭盤便復乞之選用不平不可一二太尉又云炳之都無共事之體凡所選舉悉是其意政令太尉知耳論虞秀之作黃門太尉不正答和故得停太尉近與炳之疏欲用德願兒入州西曹炳之乃啓用為主簿即語德願謝太尉前後漏泄賣恩亦復何極縱不加罪故宜出之士庶忿疾之非直項羽楚歌而己也自從裴劉刑罰以來諸將陳力百倍今日事實好惡可問若赫然發憤顯明法憲陛下便可間臥紫闥無復一事也同上尚之再啓太祖猶優遊之使尚之便陳其意尚之乃備言炳之愆過又答問庾炳之事臣既乏賈生應對之才又謝汲公犯顏之直至於侍坐仰酬每不能盡昨出伏復深思祗有愚滯今之事迹異口同音便是彰著政未測得物之數耳可為蹈罪負恩無所復少且居官失和未有此比陛下遲舊恩未忍窮法為弘之大莫復過此方復有尹京赫赫之授恐悉心奉國之人於此而息貪狼恣意者歲月滋甚非但虧點王化乃治亂所由如臣所聞天下論議炳之常塵纍日月未見一毫增輝今曲阿在水南恩寵無異而協首郡之榮乃更成其形勢便是老王雅也古人云無賞罰雖堯舜不能為治也陛下豈可坐損皇家之重迷一凡人事若復在可否之間亦不苟陳冗管今之枉直明白灼然而睿王令王反更不悟今賈誼劉向重生豈不慷慨流涕於聖世邪臣昔啓范曄當時亦懼犯之尤苟是愚懷所挹政自一能不舒達所謂雖九死而不悔者也謂炳之且外出若能修改在職著稱還亦不難而可得少明國典粗酬四海之誚今愆舋如山榮任不損炳之若復有彰大之罪誰復敢以聞述且自非殊勳異績亦何足塞今日之尤歷觀古今未有罪過藉藉受貨數百萬更高官厚祿如今者也臣每念聖化中有此事未嘗不痛心疾道設令臣等數人縱橫狼藉復如此不審當復云何處之近啓賈充遠鎮今亦何足分外出恐是策之良者臣知陛下不能採臣言故是不能盡己之愚至耳今蒙恩榮者不少臣何為獨懇懇於斯實尊主樂治之意伏願試更垂察同上太祖欲出炳之為丹陽又以問尚之尚之答臣見劉伯寵大慷慨炳之所行云有人送張幼緒幼緒緒語人吾雖得一縣負三十萬錢瘐沖遠乃當送至新林見縛束猶未得解手荀萬秋嘗詣炳之值一客姓夏侯主人問有好牛不云無問有好馬不又云無政有佳驢耳炳之便答甚是所欲客出門遂與相聞索之劉道錫云是炳之所舉就道錫索嫁女具及祠器乃當百萬數猶謂不然選令史章龍向臣説亦歎其受納之過言實得嫁女具銅爐四人舉乃勝細葛斗帳等物不可稱數在尚書中令奴酤酃酒利百十亦是立臺閣所無不審少簡聖聽不恐仰傷日月之明臣竊為之歎息同上太祖乃可有司之奏免炳之官刑法議案孔右丞議士人坐符伍為罪有奴罪奴無奴輸贖既許士庶緬隔刖聞察自難不宜以難知之事定以必知之法夫有奴不賢無奴不必不賢今多僮者傲然於王憲無僕者怵迫於時網是為恩之所霑恆在程卓法之所設必加顏原求之鄙懷竊所未慝謝殿中謂奴不隨主於名分不明誠是有理然奴僕實與閭里相關今都不問恐有所失意同左丞議宋書王宏傳以一大錢當兩議伏鑒明命欲改錢制不勞採鑄其利自倍實救斃之弘算增貨之良術求之管淺猶有未譬夫泉貝之興以估貨為本事孝交易豈假數多數少則幣輕數多則物重多少雖異濟用不殊況復一以當兩徒崇虛價者邪凡創制改法宜從民情未有違衆矯物而可久也泉布廢興驟議前代赤仄白金俄而罷息六貨憒亂民泣於市良由事不畫一難用遵行自非急病權時宜守久長之業煩政曲雜致遠常泥且貨偏則民病故先王立井田以一之使富不淫侈貧不過匱雖茲法久廢不可頓施要宜而近粗相放擬若今制遂行富人資貨自倍貧者彌增其困懼非所以欲均之意又錢之形式大少多品直云大錢則未知其格若止於四銖五銖則文皆古篆既非下走所識加或漫滅尤難分明公私交亂爭訟必起此最是其深疑者也命旨兼慮翦鑿日多以至銷盡鄙意復謂殆無此嫌民巧雖密要有蹤迹且用錢貨銅事可尋檢直由屬所怠縱糾察不精致使立制以來發覺者寡今雖有懸金之名竟無酬與之實若申明舊科禽獲即報畏法希賞不日自定矣愚者之議智者擇焉猥參訪逮敢不輸盡宋書何尚之傳元嘉二十四年録尚書江夏王義恭議以一大錢當兩以防翦鑿議者多同尚之議又見通典九分置荊郢二州議夏口在荊江之中正對沔口通接雍梁實為津要由來舊鎮根基不易今分取江夏武陵天門竟陵隨五郡為一州鎮在夏口既有見城浦大容舫竟陵出道取荊州雖水路與去江夏不異諸郡至夏口皆從流並為利便湘州所領十一郡其巴陵邊帶長江去夏口密邇既分湘中乃更成大亦可割巴陵屬新州於事為允宋書何尚之傳發民丁議發南兗州三五民丁父祖伯叔兄弟仕州居職從事及仕北徐兗為皇弟皇子從事庶姓主簿諸皇弟皇子府參軍督護國三令以上相府舍者不在發例其餘悉倩暫行征符到十日裝束緣江五郡集廣陵緣淮三郡集盱眙又募天下弩手不問所從若有馬步衆藝武力之士應科者皆加厚賞宋書索虜傳是歲軍旅大起尚書左僕射何尚之參議與顏延之書絳騶清路白簡深劾取之仲容或有虧邪通典二十四與中書令王球書延之有後命教府無復光輝列叔元嘉讚揚佛教事元喜十二年五月乙酉有司奏丹陽尹蕭摹之上言稱佛化被於中國己歷四代塔寺形像所在千計進可以擊心退足以招勸而自頃世以來情敬浮末不以情誠為至更以奢競為重舊宇頽圮曾莫之修而各造新構以相誇尚甲第顯宅於斯殆盡材竹銅綵糜損無極違中越制宜加檢裁不為之防流遁未己請自今以後有欲鑄銅像者悉詣臺自聞與造塔寺精舍皆先詣所在二千石通發本末依事列言本州必須報許然後就功其有輒鑄銅制輒造寺舍者皆以不承用詔書律論銅宅材瓦悉沒入官奏可是時有沙門慧琳假服僧次而毀其法著白黑論衡陽太守何承天與琳比狎雅相擊揚著達性論並拘滯一方詆呵釋教永嘉太守顏延之太子中舍人宗炳信法者也檢駮二論各萬餘言琳等始亦往還未抵迹乃止炳因著明佛論以廣其宗帝善之謂侍中何尚之曰吾少不讀經比復無暇三世因果未辨致懷而復不敢立異者正以前達及卿輩時秀率皆敬信故也范泰謝靈運每云六經典文本在濟俗為治耳必求性靈真奧豈得不以佛經為指南邪顏延年之折達性宗少文之難白黑論明佛法江汪尤為名理並足開獎人意若使率土之濱皆純此化則吾坐致太平夫復何事近蕭摹之請制未全經通即已相示委卿增損必有以武遏浮淫無傷弘獎者乃當著令耳尚之對曰悠悠之徒多不信法以臣庸蔽獨秉愚勤懼以闕薄貽點大教今乃更荷褎拂非所敢當至如前代群賢則不負明詔矣中朝已遠難復盡知渡江以來則王導周顗宰輔之冠蓋王濛謝尚人倫之羽儀郤超王坦王恭王謐或號絶倫或稱獨步韶氣貞情又為物表郭文謝敷戴逵等皆置心天人之際抗身煙霞之間亡高祖兄弟以清識軌世王元琳昆季以才華冠朝其餘范汪孫綽張玄殷覬略數十人靡非時俊又炳論所列諸沙門等帛曇邃者其下輩也所與比對則庾元規自邃以上護蘭諸公皆將亞迹黃中或不測人也近世道俗較談便爾若當備舉夷夏爰逮漢魏奇才異德胡可勝言寧當空失性靈坐棄天屬淪惑於幻妄之説自陷於無徵之化哉陛下思洞機表慮玄象外鉤深致遠無容取近斯自臣等以降若能謹推此例則清信之士無乏於時所謂人能弘道豈虛言哉慧遠法師嘗云釋氏之化無所不可適道固自教源濟俗亦為要務世主若能翦其訛獎其驗實與皇之政並行四海幽顯協力共敦黎庶何成康文景獨可奇哉使周漢之初復兼此化頌作刑清倍當速耳竊謂此説有契理奧何者百家之鄉十人持五戒則十人淳謹矣千室之邑百人修十善則百人和厚矣傳此風訓以遍寓內編戶千萬則仁人百萬矣此舉戒善之全具者耳若持一戒一善悉計為數者抑將十有二三矣夫能行一善則去一惡一惡既去則息一刑一刑息於家則萬刑息於國四百之獄何足難錯雅頌之興理宜倍速即陛下所謂坐致太平者也論理則其如此徵事則臣復言之前史稱西域之俗皆奉佛敬法故大國之衆數萬小國數百而終不相兼并內屬之後習俗頗弊猶甚淳弱罕行殺伐又五胡亂華以來生民塗炭冤橫死亡者不可勝數其中誤獲穌息必釋教是賴故佛圖澄入業而石虎殺戮減半洮池塔放光而符楗椎鋸用息蒙遜反噬無親虐如豺虎未節感悟遂成善人法逮道人力兼萬夫幾亂河渭面縛甘死以赴師範此非有他敬信故也夫神道助教有自來矣雷霆所擊暑雨恆事及展廟遇震而書為隱慝桀紂之朝冤死者不可稱紀而周宣晉景獨以深刑受崇檢報應之數既有不符徵古今之例祗更增惑以經文載之以彰勸戒萬一影像猶為深切豈若佛教責言義則有可然可信之致考事實又無己乖已妄之咎且觀世大王所降近驗並即表身世衆目共覩祈求之家其事相繼所以為勸戒所以為深切豈當與彼同日而談乎而愚暗之徒苟遂毀黷忽重殉輕滯小迷大恚僧尼之絶牉育嫉像塔之費朱紫此猶生民荷覆載之德日用而不論吏司若堙痤之勞有時而詆慢慧琳承天蓋亦然耳蕭摹啓制臣亦不謂全非但傷蠹道俗最在無行僧尼而情貌難分未可輕去金銅土木雖糜費滋深必福業所寄復難得頓絶臣比思為斟酌進退難安今日親奉德音實用夷泰時吏部郎羊玄保在座進曰此談蓋天人之際豈臣所宜預竊恐秦楚論強兵之術孫吳盡吞并之計將無取於此邪帝曰此非戰國之具良如卿言尚之曰夫禮隱逸則戰士怠貴仁德則兵氣衰若以孫吳為志苟在吞噬亦無取堯舜之道豈唯釋教而已帝悅曰釋門有卿亦猶孔氏之有季路所謂惡言不入於耳弘明集月賦遠日如鑑滿月如璧初學記一日月雖如璧以光為形同上北伐議內幹胡法宗宣詔逮問北伐伏計賊審有殘禍犬羊易亂殲殄非難誠如天旨今雖廟算無遺而士未精習緣邊鎮戍充實者寡邊民流散多未附業控引所資取給根本虧根以殉邊患宜動必萬克無虞往歲挫傷續以內釁每亡取亂誠為沛然然淮泗數州實亦雕耗流傭未歸創痍未起且攻守不等客主形異薄之則勢艱圍之則曠日進退之間姦虞互起竊謂當今之斃易衄方來之寇不深宜含垢藏疾以齊天道宋書何偃傳元嘉二十九年大祖欲更北伐訪之群臣偃議臨軒夾扶議自今臨軒乘輿法服燾華蓋登殿宜依廟齊以來御侍中常侍夾扶上殿及應為王公興又夾扶畢還本位求詳議宋書禮志五孝建二年十一月有司奏侍中祭酒何偃議郊祀遇雨議鄭玄注禮記引易説三王之郊一用夏正周禮凡國大事多用正歲左傳又啓蟄而郊則鄭之此説誠有據矣衆家異議或云三王各用其正郊天此蓋曲學之辨於禮無取固知穀梁三春皆可郊之月真所謂膚淺也然用辛之説莫不必同晉郊庚已參差未見前徵愚謂宜從晉遷郊依禮用辛燮之以受命作龜知告不在日學之密也宋書禮志三大明二年正月尚書何偃議與謝尚書珍玉名釧因物託情風人言味北堂書鈔一百三十六常滿樽銘貞明麗象吳食中望唯茲奇器神絶莫尚斟酌賦受不踰其量鳧鷖之詩豈伊異況藝文類聚七十三
