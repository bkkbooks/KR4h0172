body:
  text: 明帝改葬崇憲太后詔崇憲昭太后修寧陵地大明之世久所考卜前歲遭諸蕃之難禮從權宜奉營倉卒未暇營改而塋隧之所山原卑陋頃年穨壞日有滋甚恆費修整終無永固且詳考地形殊乖相勢朕蚤蒙慈遇情禮兼常思始終之義載彰幽顯史官可就巖山左右更宅吉地明審龜筮須選令辰式遵舊典以禮創制今中寓雖寧邊虜未息營就之功務在從簡舉言尋悲情如切割宋書文帝路淑媛傳車服詔車服之飾象數是遵故盛皇留範列聖垂制朕近改定五輅酌古代今修成六服沿時變禮所施之事各有條敘便可付外載之典章朕以大冕純玉繅玄衣黃裳乘玉輅郊祀天宗祀明堂又以法冕五綵繅玄衣絳裳乘金輅祀太廟元正大會朝諸侯又以飾冠冕四綵繅紫衣紅裳乘象輅小會宴饗餞送諸侯臨軒會王公又以繡冕之綵繅朱衣裳乘革輅征伐不賓講武校獵又以紘冕二綵繒青衣裳乘木輅耕稼饗國子又以通天冕朱紗袍為聽政之服宋書禮志五通典六十一又御覽六百八十六引王智深宋記寬刑詔夫愆有小大憲隨寬猛故五刑殊用三典異施而降辟次網便暨鉗撻求之法科差品滋遠朕務存欽恤每有矜貸尋創制科罪輕重同之大辟即事原情未為詳衷自今凡竊執官仗拒戰邏司或攻剽亭寺及害吏民者凡此諸條悉依舊制五人以下相逼奪者可特賜黥刖投畀四遠仍用代殺方古為優全命長戶施同造物庶簡惠之化有孚群萌好生之德無漏幽品宋書明帝紀搜括隱逸詔夫箕潁之操振古所貴沖素之風哲王攸重朕屬橫流之會接難晦之辰龕暴翦亂日不暇給今雖關隴猶靄區縣澄氛偃武修文於是乎在思崇廉恥用靜馳薄固已物色載懷寢興佇歎其有貞栖隱約自事衡樊鑿坯遺榮負釣辭聘志恬江海行高塵俗者在所精加搜括時以名聞將賁園矜德茂昭厥禮群司各舉所知以時授爵宋書明帝紀下廬江王禕詔昔周室既盛二叔流言漢祚方隆七蕃迷叛斯實事彰往代難興自古雖聖賢御極寓內紓患大尉廬江王籍慶皇枝蚤升寵樹幼無立德長缺修聲淡薄親情厚結行路狎昵群細疏澀人士自朕撥亂定宇受命應天實尚睦敦克敷友于故崇殊爵超居上台而公常懷不平表於事迹公若德深望重宜膺大統朕初平暴亂豈敢當璧自然推符奉璽天祚有歸且朕雖居尊極不敢自恃宗室之事無不咨公不虞志欲難滿妄生窺怨積慝在襟遂謀社稷曩者四方遘禍兵斥畿甸縉紳憂惶親賢同憤惟公獨幸厥災深忭時難晝則從禽遊肆夜則縱酒絃歌側耳視陰企賊休問司徒休仁等並各令弟事兼家國摧鋒履險各伐一方蒙霜踐棘辛勤已甚況身被矢石否泰難虞悠悠之人尚有信分公未曾有一函之使遣半紙之書志棄五弟以餌讎賊自謂身非勳烈義不參謀必期凶逆道申以圖輔相皇威既震群凶肅蕩乃有同慶萬國含欣而公容氣更沮下帷晦迹每覘天察宿懷協左道呪詛禱請謹事邪巫常被髮跣足稽首北極遂圖畫朕躬勒以名字或加之矢刃或烹之鼎鑊公在江州得一漢女云知吉凶能行厭呪大設供養朝夕拜伏依裝嚴整敬事如神令其呪詛孝武并及崇憲祈皇室危弱統天稱已巫稱神旨必得如願後事發覺委罪所生徼幸佹嶇僅得自免近又有道士張寶為公見信事既彰露肆之於法公不知慚懼猶加營埋遣左右二人主掌殯舍顯行邪志罔顧吏司又挾閹豎陳道明交關不逞傳驛音意投金散寶以為信誓又使府史徐虎兒招引邊將要結禁旅規害台輔圖犯宮掖公受性不仁才非治用昔忝江州無稱被徵前蒞會稽以罪左黜公稽古寡聞嚴而無理言不畼寒暑惠不及帷房朝野所輕搢紳同侮豈堪輔相之地寧任蒞民之職非唯一朝有自來矣大明之世迄於永光公常留中未嘗外撫何以在今方起嫌怨公少即長人情無哀戚侍拜長寧從祀宗廟顏無戚狀淚不垂臉兄弟長幼靡有愛心昔因孝武御筵置酒心誠不著於時義陽念遇木薄遭公此譖益被猜嫌朕當時狼狽不暇自理賴崇憲太后譬解百端少蒙申亮得免殃責景和狂主醜毒橫流初誅宰輔豺志方扇於建章宮召朕兄弟逼酒使醉公因酒勢遂肆苦言云朕休仁與太宰親數往必清間贈貺豐厚朕當時惶駭五內崩墜於其語次劣得小止往又經在尋陽長公主第兄弟共集忽中坐忿怒厲色見指以朕行止出入每不能固若得稱心規肆忿憾惟公此旨蚤欲見滅而天道愛善朕獲南面不長惡逆挫公毒心自大明積費國斃民凋加景和奢虐府藏罄盡朕在位甫爾恤義具瞻仍值終阻蜂起日耗萬金公卿庶民傾産歸獻積受台奉資畜優廣朕踐祚之初公請故太宰東傳餘錢見入數百萬內不充養外不助國散賜詔諛遍惠趨隸推心考行事類斯比群小交搆遂生異圖籍籍之議轉盈民口公若地居衡寄任專八柄德育於民勳高於物勢不自安於事為可公既才均櫟木牽以曲全因高無民得守虛靜而坐作凶咎自闕深釁由朕誠感無素爰至於此永尋多難惋慨實深凡人所行各有本志朕博愛尚仁為日已久尚能舍讎恕罪著於觸事豈容於公不相隱忍但禍萌易漸去惡宜疾負荷之重寧得坐觀且蔓草難除燎火須撲狡扇之徒宜時誅翦已詔司戮肅正典刑公身居戚長情禮兼至準之常科顧有惻怛宜少申國憲以弔不臧今以淮南宣城歷陽三郡還立南豫州降公為車騎將軍開府儀同三司南豫州刺史削邑千戶侍中王如故宋書廬江王禕傳以武陵王智隨繼世祖嗣詔世祖孝武皇帝雖恃尊墯惠勳狹政弛樂飲無饜事因於寧泰任威縱費義緣於務寡故以積怨動天流殃胤嗣景和肇釁義嘉成禍世祖繼體陷憲無遺昔皇家中圯含生懼滅賴英孝感奮掃雪冤恥動纘墜歷拯茲窮氓繼絶追遠禮訓攸尚況既帝且兄而缺斯典今以第九子智隨奉世祖為子武陵郡大明之世事均代邦可封智隨武陵王食邑五千戶尋世祖一門女纍不少既無釐總義須防間諸侯雖不得祖稱天子而事有一家之切且歸寧有所疹疾相營得失是任閨房有稟朕應天在位恩深九族庶此足申追睦之懷敷愛之旨宋書武陵王贊傳贊初名智隨贈劉龔詔故中護軍臨澧縣開國侯志行貞純才用理濟忠勤著於艱時勤績倡乎泰運年志始壯奄焉凶折悲傷惻割實兼常懷思加寵數以申哀榮可贈護軍將軍加散騎常侍如故諡曰忠侯古刻叢鈔劉襲墓志郊祀詔古禮王者每歲郊享爰及明堂自晉以來間年一郊明堂同日質文詳略疏數有分自分可間二年一郊間歲一明堂外可詳議宋書禮志三立晉熙王嗣詔夫虎狼護子猴猿負孫毒性薄情亦有仁愛故識念氣類尚均群品況在人倫可忘天屬晉熙太妃謝氏沈刻無親物理罕比征北公雖孝道無替而遭此不慈自少及長闕恩鞠之乃至休否莫關寒溫不訪晨昏屏塞定省靡因事無違忤動致誚責毒句發口人所難聞加惡備苦過於讎隙遂事憤於宗姻義傷於行路公故妃郗氏婦禮無違逢此嚴酷遂以憂卒用夭盛年又謝氏食則豐珍衣則文麗奉已之餘播覃群下而諸孫纊不溫體食不充飢付之姆嬭之手縱以任軍之路遇其所生棄若糞土襤縷比於重囚窮困過於下使誠皇規方遠沙塞將一公修短不諱亦難豫圖兼妾女纍弱一第領主防間之道人理斯急朕所以詔第六子燮奉公為胤欲以毗整一門為公繼紹但謝氏待骨肉至親尚相棄蔑況以義合免苦為難患萌防漸危機須斷便可還其本家削絶蕃秩宋書晉熙王昶傳罪始安王休仁詔夫無將之誅諒惟通典知咎自引實有偏介劉休仁地屬密親位居台重朕友寄特深寵秩兼茂不能弘贊國猷裨宣政道而自處相任妄生猜嫌側納群小之説內懷不逞之志晦景蔽迹無事陽愚因近疾患沈篤內外憂悚休仁規逼禁兵謀為亂逆朕曲惟天倫未忍明法申詔誥礪辨核事原休仁慚恩懼罪遽自引決追尋悲痛情不自勝思屈法科以伸矜悼可宥其二子并全封爵但家國多虞釁起台輔永尋既往感慨追深宋書始安王休仁傳答有司奏始安王休仁罪狀詔邢匹婦狂愚不足與計休仁知釁自引情有追傷可特為降始安縣王食邑千戶并停伯融等流徙聽襲封爵伯猷先紹江夏國令還本賜爵鄉侯宋書始安王休仁傳與諸方鎮及諸大臣詔休仁致殞卿未具悉事之始末今疏以相示休祐貪恣非政法網之所不容昔漢梁孝王維南厲王無它釁悖正以越漢制度耳況休祐吞嚼聚斂為西數州之蝗取與鄙虐無復人情屢得王景文褚淵沈攸之等啓陳其罪惡轉不可容吾篤兄弟之恩不欲致之以法且每恨大明兄弟情薄親見休祐屯苦之時始得寬寧彌不忍問所以改授徐州冀其去朝廷近必應能自悛革及拜徐州未及之任便徵動萬端暴濁愈甚既每為民蠹不可復全休仁身粗有知解兼為宰相又吾與其兄弟情昵特復異常頗與休仁論休祐釁狀休祐以休仁為吾所親必應知吾意又云休仁言對能為損益遂多與財賂深相結事乃寢必同宿行必共車休仁性軟易感説遂成繾綣共為一家是吾所吐密言一時倒寫吾與休仁少小異常唯虛心信之初不措疑雖爾猶慮清間之時非意脫有聞者吾近向休祐推情戒訓嚴切休祐更不復致疑休祐死得吾得其內外左右問以情狀方知言語漏泄并具之由彌日懊惋心神萎孰休仁又説休祐云汝但作佞此法自足安我常秉許為家從來頗得此力但試用看有驗不休祐從之於是大有獻奉言多乖實積惡既不可恕自休祐殞亡之始休仁款曲共知休仁既無罪釁主相本若一體吾之推意初無有聞休祐含愚為天下所疾致殞之本為民除患兄弟無復多人彌應思弔不咸益相親信休祐平生狼抗無賴吾慮休仁往哭或生崇禍且吾爾日本辨仗往哭晚定不行吾所以為設方便呼人在省而休仁得吾召入大自驚疑遂入辭楊太妃顏色狀意甚與常異既至省楊太妃驟遣監子去來參察從此日生嫌懼而吾之推情初不疑覺從休祐死後吾再幸休仁第飲噉極日排閣入內初無猜防休仁坐生嫌畏一日吾春中多期射雉每休仁清間多往雉場中或敕使陪輦及不行日多不見之每值宵休仁輒語左右云我已復得今一日及在房內見諸妓妾恆語我云不知朝夕見底若一旦死去作鬼亦不取汝取汝正足亂人耳休祐死時日已三晡吾射雉始從場出休仁從騎左右伏野中吾遣人召之稱云腹痛不堪騎馬爾時諸王車皆停在朱雀門裏日既暝不暇遠呼車吾衣書車近在離門裏敕呼來下油幢絡擬以載之吾由來諳悉其體有冷患聞腹痛知必是冷乃敕太醫上省送供御高梁薑飲以賜之休仁得飲忽大驚告左右稱敗今日了左右答曰此飲是御師名封題休仁乃令左右先飲竟猶不甚信乃僶俯噬之裁進一合許妄生嫌二事事如是由來十日五日一就問太妃自休祐死後每吾詔必先至楊太妃問如分別狀休仁由來自營府國興生文書二月中史承祖齎文書呈之忽語承祖云我得成許那何煩將來吾虛心如舊不復見信既懷不安大自嫌恐惟以情理不容復有善心休仁既經南討與宿衛將帥經習狎共事相識者布滿外內常日出入於廂下經過與諸相識將帥都不交言及吾前者積日失適休仁出入殿省諸衛主帥裁相悉者無不和顏厚相撫勞爾時我既甚惡意不欲見外人悠悠所傳互言差劇休仁規聞知方便使曇度道人及勞彥遠屢求啓闞覘吾起居及其所啓皆非急事吾意亦不厝疑吾與休仁親情實異年少以來恆相追隨情向大趣亦往往多同難否之日每共契闊休仁南討為都統既有勳績狀之於心亦何極已但休仁於吾望既不輕小人無知亦多挾背向既生猜二不復自寧夫禍難之由皆意所不悟如其意趣人莫能厚薄休祐之亡雖復悼念猶可以理割遣及休仁之殞悲愍特深千念不能已已舉言傷心事之細碎既不可曲載詔文恐物不必即解兼欲其兒子不欲窮法為詔之辭不得不云有兵謀非事實也故相報卿知宋書始安王休仁傳手詔譬王景文尚書左僕射卿已經此任東宮詹事用人雖美職次正可比中書令耳庶姓作揚州徐干木王休元殷鐵並處之不辭卿清才令望何愧休元毗贊中興豈謝干木綢繆相與何後殷鐵邪司徒以宰相不應帶神州遠遵先旨京口鄉基義重密邇畿甸又不得不用驃騎陝西任要由來用宗室驃騎既去巴陵理應居之中流雖曰間地控帶三江通接荊郢經塗之要由來有重鎮如此則揚州自成闕削史卿若有辭更不知誰應處之此選大備與公卿疇懷非聊爾也宋書王景文傳景文屢辭內授上千詔譬之降殷恆詔道矜生便有病無更橫疾恆因愚習惰久妨清序可降為散騎常侍宋書殷景仁傳道矜子恆為侍中度支尚書屬父疾積久為右司所奏下詔又見南齊書王奐傳南史二十七答王景文手詔去五月中吾病始差未堪勞役使卿等看選牒署竟請敕施行此非密事外聞王容都不聞然傳事好訛由來常患殷恆妻匹婦耳閨閣之內傳聞事復作一兩倍落漠兼謂卿是親故希鄉署不必云選事獨關卿也恆妻雖是傳聞之僻大都非可駭異且舉元薦凱咸由疇咨可謂唐堯不明下干其政邪悠悠好詐貴人及在事者屬鄉偶不悉耳多是其周旋門生輩作其屬託貴人及在事者永無由知非徒止於京師乃至州郡縣中或有詐作書疏灼然有文迹者諸舍人右丞輩及親近驅使人慮有作其名載禁物求停檢校強賣猥物與官仍求交直或屬人求乞州郡資禮希蠲呼召及虜發船車並啓班下在所即駐録但卿貴人不容有此啓由來有是何故獨驚之居貴要但問心若為耳大明之世巢徐二戴位不過執戟權亢人主顏師伯白衣僕射橫行尚書中令袁粲作僕射領選而人往往不知有粲粲遷為令居之不疑今既省録令便居昔之録任置省事及幹童並依録格粲作令來亦不異為僕射人情向粲淡淡然亦復不改常以此居貴位要任當有致憂兢理不卿今雖作揚州太子傳位雖貴而不關朝政可安不懼差於粲也想卿虛心受榮有而不為纍貴高有危殆之懼卑賤有溝壑之憂張單雙災木雁兩失有心於避禍不如無心於任運夫千仞之木既摧於斧斤一寸之草亦瘁於踐踏高崖之修幹與深谷之淺條存亡之要巨細一揆耳晉畢萬七戰皆獲死於牖下蜀相費禕從容坐談斃於刺客故甘心於履危未必逢禍縱意於處安不必全福但貴者自惜故每憂其身賤者自輕故易忘其已然為教者每誡貴不誡賤言其貴滿好自恃也凡名位貴達人以在懷泰則觸人改容否則行路嗟愕至如賤者否泰不足以動人存亡不足以絓數死於溝瀆死於塗路者天地之間亦復何限人不以係意耳以此而推貴何必難處賤何必易安但人生也自應卑慎為道行己用心務思謹惜若乃吉凶大期正應委之理運遭隨參差莫不由命也既非聖人不能見吉凶之先正是依俙於理言可行而為之耳得吉者是命吉遇不吉者是其命凶以近事論之景和之世晉平庶人從壽陽歸亂朝人皆為之戰栗而乃遇中興之運袁顗圖避禍於襄陽當時皆羡之謂為陵霄駕鳳遂與義嘉同滅駱宰見幼主語人云越王長頸鳥喙可與共憂不可與共樂范蠡去而全身文種留而遇禍今主上口頸頗有越王之狀我在尚書中久不去必危遂求南江小縣諸都令史住京師者皆遭中興之慶人人蒙爵級宰值義嘉染罪金木纏身性命幾絶卿耳眼所聞見安危在運何可預圖邪宋書王景文傳上殺壽寂之等景文懼自陳求解揚州上詔答又南史二十三手詔劉懷珍卿性忠讜平所仗賴在彼與年少共事不可深存受益景素兒乃佳但不能接物頗亦墮事卿每諫之南齊書劉懷珍傳建平王景素為荊州徙懷珍右軍司馬遷南郡太守加寧朔將軍明帝手詔懷珍奉旨寢疾又詔卿不應乃作景素佐才舊所寄今徵卿參二衛直南齊書劉懷珍傳
