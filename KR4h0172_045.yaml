body:
  text: 劉勔條對賈元友北攻懸瓠書元友稱虜主幼弱姦僞競起內外規亂天亡有期臣以為獯醜侵縱乘藉王境盤據州郡百姓殘亡去冬衆軍失耕今春連城圍逼國家復境之略實有不遑滅虜未及元友又云有七千餘家穀米豐積可供二萬人數年資儲臣又以為二萬人歲食米四十八萬斛五年合須米二百四十萬斛既理不容有恐事難稱言元友又云虜於懸瓠開驛保虜已先據若不足恃此不須闕俱是攻城便應先圖懸瓠何更越先取郾以受腹背之災且七千餘家豐積而虜猶當遠運為糧是威不制民民非異計元友又云虜欲水陸運糧以救軍命可襲之機在於今日臣又以為開立驛道據守堅城觀其形侯不似蹙弱可乘之機恐為難驗元友又云四郡民人遭虜二十七年之毒皆欲雪讎報恥伏待朝威臣又以為垣式寶等受國重恩今猶驅略車營翻還就賊蓋是戀本之情深非報怨之宜何可輕試元友又云請敕荊雍兩州遣二千精兵從義陽依西山北下直據郾城臣又以為郾城是賊驛路要戍且經蠻接嶮數百里中裹糧潛進方出平地攻賊堅城自古名將未有能以此濟者假其剋捷不知足南抗懸瓠北捍長社與不且賊擁數城水陸通便而今使官以二千斷其資運於事為難元友又云虜圍逼汝陰遊魂二歲為張景遠所挫不敢渡淮臣又以為景遠兵力寡弱不能自固遠遣救援方得少剋今定為賊所畏不景遠前所摧傷裁至數百虜步騎四萬猶不敢前而今必勸國家以輕兵遠討指掌可克言理相背莫復過此元友又云龍山雉水魯奴王景直等竝受朝爵馬步萬餘進討之宜唯須敕命臣以為魯奴與虜交關彌歷年世去歲送誠朝廷誓欲立功自蒙榮爵便即逃遁殊類姦猾豈易暗期兼王景直是一亡命部曲不過數十人既不可言又未足恃萬餘之言似不近實元友又云四郡恨忿此非類車營連結廢田二載生業已盡賊無所資糧儲已罄斷其運道最是要略臣又以斷運須兵兵應資食而當此過懸瓠二百里中使兵食兼足何處求辦臣竊尋元嘉以來傖荒遠人多千國議負儋歸闕皆勸討虜魯爽誕說實挫國威徒失兵力虛費金寶凡此之徒每規近說從來信納皆詒後悔界上之人唯視彊弱王師至境必壼漿侯塗裁見退軍便少截蜂起首領回師何嘗不為河畔所弊宋書劉勔傳泰始四年淮西人賈元友上書太宗勸北攻懸瓠可收陳郡南頓汝南新蔡四郡之地上以其所陳示勔使具條答勔對太宗納之與殷琰書昔景和凶悖行絶人倫昏虐險穢諫諍杜塞遂殘毀陵廟芟刈百僚縱毒窮凶靡有紀極於時人神回遑莫能自保中內士庶咸願一匡豫職在直衛目所備覩主上神機天發指麾克定橫流塗炭一朝太平扶危拯急實冠終古而四方持疑成此乖逆資斧所臨每從偃𥳑足下以衣冠華胄信概夙昭附戾從違猶見容養賢兄長史階升清列賢子參軍亦塞國網間者進軍宛唐計由劉順退衆閉城當時未了過蒙朝恩謬充將帥蚤承風素情有依然今皇威遠申三方蹙弱勝敗之勢皎然可覽王御史昨至主上敕驃騎教賢兄賢子書今悉遣送百代以來未有弘恩曲宥乃至於此且朝廷方宣示大義惟新王道何容標虛辭於士女失國信於一州以足下明識淵見想必不俟終日如其孤背亭毒弗忌屠陷者便當窮兵肆武究法極刑將恐貴門無復祭祀之主墳壟乏掃灑之望進謝忠臣退慚孝子名實兩喪沒有餘責扶力略白幸加研覽宋書殷琰傳又與殷琰書柳倫來奔具相申述方承足下迹纏穢亂心秉忠誠惘然窮愁不親戎政去冬開天之始愚迷者多如足下流比進非社稷宗臣退無顧命寄託朝廷既不偏相嫌責足下亦復無所獨愧程天祚己舉城歸順龐孟虯又繼迹奔亡劉胡困於錢溪袁顗欲戰不得推理揆勢亦安能久且南方初起連州十六擁徒百萬仲春以來無戰不北摧陷殄滅十無一二南憑袁顗弱卒北恃足下孤城以茲定業恐萬無一理方今國網疏略示舉宏維比日相白想亦已具矣且倫等皆是足下腹心牙爪所以攜手相捨非有怨恨也了知事不可濟禍害已及故耳夫擁數千烏合抗天下之兵傾覆之狀豈不易曉假令六蔽之人猶當不為其事況復足下少祖名教疾沒世無稱者邪所以復有此白者實惜華州重鎮鞠為茂草兼傷貴門一日屠滅足下若能封府庫開四門宣語文武示以禍福先遣咫尺之書表達誠款然後素車白馬來詣轅門若令足下髮膚不全兒姪雕耗者皇天后土實聞此言至辭不華寧復多白宋書殷琰傳上言皇子不宜置邸舍列肆販賣古人所非故卜式明不雨之由弘羊受致旱之責若以用度不充頓止為難者故宜量加減省宋書沈懷文傳子尚諸皇子置邸舍逐什一為患遍天下懷文又言之不聽省録尚書議昔天官正紀六典序職載師掌均七府成務所以翼平辰衡經贊邦極故總屬之原著夫官典和統之要昭於國言夏因虞禮有深冢司之則周承殷法無損掌邦之儀用乃調佐王均緝亮帝度而式憲之弘正漢廷述章之範崇明魏室雖條録之名立稱於中代總釐之實不愆於自古比代相治歷朝罔二及乎爵以事變級以時改皆興替之道無害國章八統元任靡或有革按台輔之職三曰禮典以和邦國以統百官四曰政典以平邦國以正百官鄭康成云冢宰之於庶僚無所不總也考於茲事備於典文詳古準今不宜虛廢宋書沈懷文傳揚州移治會稽議周制封畿漢置司隸各因時宜非存相反安民寧國其揆一也苟民心所安天亦從之未必改今追古乃致平一神州舊壞歷代相承異於邊州或罷或置既物情不說容虧化本宋書沈文傳揚州徙治既乖民情一州兩格尤失大體臣謂不宜有異宋書沈懷文傳墾起湖田議百姓雖不親農不無資生之路若驅以就田則坐相違奪且鄞等三縣去治竝遠既安之民忽徙他邑所垣未立舊居已毀去留兩困無以自資謂宜適任民情徙其新樂開宥逋亡且令就業若審成腴壤然後議遷宋書孔靖傳大明初侍中沈懷文王景文黃門侍郎劉凱郤顒議宋侍中趙倫之碑君戮力以致誠吐規以會機一鼓則寇騎雲徹旝動則敵氣霧消御覽三百三十七長鳴雞贊翠冠績莒碧距麗陳就昏別夕望旭驚晨初學記三十博羅縣簟竹銘簟竹既大薄且空中節長一丈其直如松初學記二十八錦繡萬花谷續四十議祖沖之新曆三精數微五緯會始自非深推測窮識晷變豈能刊古革今轉正圭宿案沖之所議每有違舛竊以愚見隨事辨問案沖之新推曆術今冬至所在歲歲微差臣法興議夫二至發斂南北之極日有恆度而宿無改位古曆冬至皆在建星戰國橫騖史官喪紀爰及漢初格侯莫審後雜覘知在南斗二十二度元和所用即與古曆相符也逮至景初而終無毫忒書云日短星昴以正仲冬直以月維四仲則中宿常在衛陽羲和所以正時取其萬世不易也沖之以為唐代冬至日在今宿之左五十許度遂虛加度分空撤天路其置法所在近違半次則四十五年九月率移一度在詩七月流火此夏正建申之時也定之方中又小雪之節也若冬至審差則豳公火流晷長一尺五寸楚宮之作晝漏五十三刻此詭之甚也仲尼曰丘聞之火伏而後蟄者畢今火猶西流司曆過也就如沖之所誤則星無定次卦有差方名號之正古今必殊典誥之音代不通軌堯之開閉今成建除今之壽星乃周之鶉尾即時東壁已非玄武軫星頓屬蒼龍誣天背經乃至於此沖之又改章法三百九十一年有一百四十四閏臣法興議夫日有緩急故斗有闊狹古人制章立為中格年積十九常有七閏晷或虛盈此不可革沖之削閏壞章倍減餘數則一百三十九年二月於四分之科頓少一日七千四百二十九年輒失一閏夫日少則先時閏失則事悖竊聞時以作事事以厚生以此乃生人之大本曆數之所先愚恐非沖之淺慮妄可穿鑿沖之又命上元日度發自虛一云虛為北方列宿之中臣法興議沖之既云冬至歲差又謂虛為北中舍形責影未足為迷何者凡在天非日不明居地以斗而辨借令冬至在虛則黃逆彌遠東北為黃鍾之宮室壁應屬玄枵之位虛宿豈得復為北中乎曲使分至屢遷而星次不改招搖易繩而律呂仍往則七政不以璣衡致齊建時亦非攝提所紀不知五行何居六屬安託沖之又令上元年在甲子臣法興議夫置元設紀各有所尚或據文於圖讖或取效於當時沖之云群氏糾紛莫審其會昔黃帝辛卯日月不過顓頊乙卯四時不忒景初壬辰晦無差光元嘉庾辰朔無錯景豈非承天者乎沖之苟存甲子可謂為合以求天也沖之又令日月五緯交會遲疾悉以上元為始臣法興議夫交會之元則食既可求遲疾之際非凡夫所測昔賈逵略見其差劉洪粗著其術至於疏密之數莫究其極且五緯所居有時盈縮即如歲星在軫見超七晨術家既追算以會今則往之與來斷可知矣景初所以紀首置差元嘉兼又各設後元者其竝省功於實用不虛推以為煩也沖之既違天於改易又設法以遂情愚謂此治歷之大過也臣法興議日有八行各成一道月有一道離為九行左交右疾倍半相違其一終之理日數宜同沖之通同與會周相覺九千四十其陰陽七十九周有奇遲疾不及一匝此則當縮反盈應損更益宋書歷志下
