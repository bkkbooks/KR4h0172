body:
  text: 傅隆論新禮表臣以下愚不涉師訓孤陋閭閰面牆靡識謬蒙詢逮愧懼流汗原夫禮者三千之本人倫之至道故用之家國君臣以之親用之婚冠少長以之仁愛夫妻以之義順用之鄉人友朋以之三益賓主以之敬讓所謂乎天播乎地窮高遠測深厚莫尚於禮也其樂之五聲易之八象詩之風雅書之典誥春秋之微婉勸懲無不本乎禮而後立也其源遠廣其體大而義精非夫叡哲大賢孰能明乎此哉況遭暴秦焚亡百不存一漢興始徵召故老搜集殘文其體例紕繆首尾脫落難可詳論幸高堂生頗識舊義諸儒各為章旬之說既明不獨達所見不同或師資相傳共枝別幹故聞人二戴俱事后蒼俄已分異廬植鄭玄偕學馬融人各名家又後之學者未逮曩時而問難星繁充斥兼兩摛文列錦煥爛可觀然而五服之本或差哀敬之制舛雜國典未一於四海家法參駁於搢紳誠宜攷詳遠慮以定皇代之盛禮者也伏惟陛下欽明玄聖同規唐虞疇咨四岳興言三禮而伯夷未登微臣竊位所以大懼負乘形神交惡者無忘夙夜矣而復猥充博采之數與聞爰發之求實無以仰酬聖旨萬分之一不敢廢嘿謹率管穴所見五十二事上呈蚩鄙茫浪伏用竦赧宋書傅隆傳元嘉十四年太祖以新撰禮論付隆使下意隆上表黃初妻趙事議原夫禮律之興蓋本之自然求之情理非從天墮非從地出也父子至親分形同氣稱之於載即載之於趙雖云三世為體猶一未有能分之者也稱雖創巨痛深固無讎祖之義故古人不以父命辭王父命也若云稱可以殺趙趙當何以處載將父子孫祖互相殘戮懼非先王明罰咎繇立法之本旨也向使石厚之子日磾之孫砥鋒挻鍔不與二祖同載天日則石碏秺侯何得人臣於國孝義於家流名百代以為美談者哉舊令云殺人父母徙之二千里外不施父子孫祖明矣趙當避王固當千里外耳令亦云凡流徙者同籍親近欲相隨者聽之此又大通情理因親以教愛者也趙既流移載為人子何得不從載從而稱不行豈名教所許如此稱趙竟不可分趙雖內愧終身稱當沈痛沒齒孫祖之義自不得永絕事理固然也宋書傅隆傳南史十五通典一百六十七各有刪節今合錄之舞佾議未詳此人數所由惟杜預注左傳佾舞云諸侯六六三十六人常以為非也夫舞者所以節八音者也八音克諧然後成樂故樂必以八人為列自天子至士降殺以兩兩者減其二列爾杜以為一列又減二人至士止餘四人豈復成樂案伏虔注左傳云天子八八諸侯六八大夫四八士二八其義甚允今諸王不復舞佾其總章舞伎即古之女樂己殿庭八八諸王則應六八理例坦然又春秋鄭伯納晉悼公女樂二八晉以一八賜魏絳此樂以八人為列之證也若如議者惟天子八則鄭應納晉二六晉應賜絳一六也自天子至士其文典章尊卑差級莫不以兩未有諸侯既降二列又一列輒減二人通降太半非唯八音不俱於兩義亦乖杜氏之謬可見矣國典事大宜令詳正宋書樂志一元嘉十三年太常傅隆以為云云又見通典一百四十七作傅崇避唐諱也奏彈謝察司徒員外散騎常侍謝察應著絳絝而察拔絝不以貫足有虧常體御覽六百九十六復肉刑議夫建邦立法弘治穆化必隨時立制德刑兼施貞一以閑其邪教禁以檢其慢灑湛露以膏潤厲嚴霜以肅威晞風者陶和而安恬畏戾者聞憲而警慮雖復質文迭用而斯道革肉刑之設肈自哲王蓋由曩代風淳民多惇謹圖像既陳則機心冥戢刑人在塗則不逞改操故能勝殘去殺化隆無為季末澆偽法網彌密利巧之懷日滋恥畏之情轉寡終身劇役不足止其姦況乎黥劓豈能反其善徒有酸慘之聲而無濟治之益至於棄市之條實在不赦之罪事非三殺考律同歸輕重均科減降路塞鍾陳以之抗言元皇所為留愍今英輔翼讚道邈伊周雖閉否之運甫開而避遺之難未已誠宜明慎用刑愛民弘育申哀矜以革濫移大辟於支體全性命之至重恢繁息於將來使將斷之骨荷更榮於三陽干時之華監商飆而知懼威惠俱宣感畏偕設全生拯暴於是乎在宋書蔡廓傳桓玄輔政議復肉刑廓上議又見晉書刑法志通典一百六十八皆有刑節鞫獄議鞫獄不宜令子孫下辭明言父祖之罪虧教傷情莫此為大自今但令家人與囚相見無乞鞫之訴便足以明伏罪不須責家人下辭宋書蔡廓傳宋臺建廓為侍中建議又通典一百六十四荅傅亮書揚州位居卿君之下常亦惟疑然朝廷以位相次不以本封復無明文云皇子加殊禮齊獻王為驃騎孫秀來降武帝欲優異之以秀為驃騎轉齊王為鎮軍在驃騎上若如足下言皇子使在公右則齊王本次自尊何改鎮軍令在驃騎上明知故依見位為次也又齊王為司空賈充為太尉俱錄尚書署事常在充後潘正叔奏公羊事于時三錄梁王彤為衛將軍署在太尉隴西王泰司徒王玄沖下近太元初賀新宮成司馬大傅為中軍而以齊王柔之為賀首至安帝為太子止禮徐邈為郎位次亦以太傅在諸王下又謁李太后宗正尚書符令以高密王為首時王東亭為僕射王徐皆是近世識古人今者足下引式乾公王吾謂未可為據其云上出式乾古傳中彭城王植荀組潘岳嵇紹杜斌然後道足下所疏四王在三司之上反在黃門郎下有何義且四王之下則云大將軍梁王彤車騎趙王倫然後云司徒王戎耳梁趙二王亦是皇子屬尊位齊在豫章王常侍之下又復不通蓋書家指疏時事不必存其班次式乾亦是私宴異於朝堂如今含章西堂足下在僕射下侍中在尚書下耳來示又云曾祖與簡文對錄位在簡文下吾家故事則不然今寫如別王姬身無爵位故可得不從夫而以王女為尊皇子出仕則有位有位則依朝復示之班序唯引泰和赦文差可為言然赦文前後亦參差不同太宰上公自應在大司馬前耳簡文雖撫軍時已授丞相殊禮又中外都督故以本任為班不以督中外便在公右也今護軍總方伯而位次故在持節都督下足下復思之宋書蔡廓傳時疑揚州刺史廬陵王義真朝堂班次亮與廓書廓荅與親故書小兒四歲神氣似可不入非類室不與小人游故以興宗為之名以興宗為之字荅妻郄氏求夏服書知須夏服計給事自應相供無容別寄宋書蔡廓傳申坦子令孫罪議若坦昔為戎首身今尚存累經肆眚猶應蒙宥令孫天屬理相為隱況人亡事遠追相誣訐斷以禮律義不合關若士先審知逆謀當時即應聞啟包藏積年發因私怨況稱風聲路傳實無定主而干黷欺罔罪合極法宋書蔡興宗傳宗為廷尉有解士先者告申坦昔與丞相義宣同謀時坦已死子令孫時作山陽郡自繫廷尉興宗議饋米郭原平及朱百年妻教秩年之貺著自國書餼貧之典有聞甲令況高迆窮老萊婦屯暮者哉永興郭原平世稟孝德洞業儲靈深仁絕操追風曠古棲貞處約華耇方嚴山陰朱百年道終物表妻孔耋齒孀居窶迫殘日欽風撫事嗟慨滿懷可以帳下米各餉百斛宋書郭世道傳表陳損益三事其一曰郡大田武吏年滿十六便課米六十斛十五以下至十三皆課米三十斛一戶內隨丁多少悉皆輸米且十三歲兒未堪田作或是單迥無相兼通年及應輸便自逃逸既遏接蠻俚去就益易或乃斷截支體產子不養戶口歲減實此之由謂宜更量課限使得存立今若減其米課雖有交損攷之將來理有深益其二曰郡頌銀民三百餘戶鑿坑採砂皆二三丈功役既苦不顧崩壓一歲之中每有死者官司檢切猶致逋違老少相隨永絕農業千有餘口皆資他食豈惟一夫不耕或受其饑而已所以歲有不稔便致甚困尋臺邸用米不異於銀謂宜準銀課米即事為便其三曰中宿縣俚民課銀一子丁輸南稱半兩尋此縣自不出銀又俚民皆巢居鳥語不閑貨易之宜每至買銀為損已甚又稱兩受人易生姦巧山俚愚怯不辨自申官所課甚輕民以所輸為劇今若聽計丁課米公私兼利宋書徐豁傳元嘉初為始興太守三年遣大使巡行四方并使郡縣各言損益豁因此表陳三事建言便宜夫璽印者所以辯章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽歷代迭用襲封之印奕世相傳貴在仍舊無取改作今世唯尉一職獨用一印至於內外群官每遷悉改討尋其義私所未達若謂官各異姓與傳襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣眾僚之卑何嫌於即印載籍未聞其說推例自乘其準而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚謂眾官即用一印無煩改伯若有新置官又官多印少文或零失然後乃鑄則仰裨天府非唯小益凶門柏裝不出禮典起自末代積習生常遂成舊俗爰自天子達于庶人誠行之有由卒革必駭然苟無關於情而有愆禮度存之未有所明去之未有所失固當式遵先典釐革後謬況復兼以游費實為民患者乎凡人士喪儀多出喪儀多出閭里每有此須動十數萬損民財力而義無所取至於寒庶則人思自竭雖復室如懸磬莫不傾產殫則所謂葬之以禮其若此乎謂宜謹遵先典一罷凶門之式表以素扇足以示凶昔事故飢荒米穀綿絹皆貴其後米價登復而絹于今一倍綿絹既貴蠶業者滋雖懃厲兼倍而貴猶不息愚謂致此良有其由昔事故之前軍器正用鎧已至於袍襖裲襠必俟戰陣實在庫藏永無損毀今儀從直衛及邀羅使命有防衛送迎悉用袍襖之屬非唯一府眾軍皆然綿帛易敗勢不支久又晝以禦寒夜以寢臥曾未周年便自敗裂每絲綿新登易折租以市又諸府競收動有千萬積貴不已實由於斯私服為之難貴官庫為之空盡愚謂若侍衛所須固不可廢其餘則依舊用鎧小小使命送迎之屬止宜給仗不煩鎧襖用之既簡則其價自降夫不恥惡食唯君子能之肴饌尚奢為日久矣今雖改張是弘而此風未革所甘不過一味而陳必方丈適口之外皆為說目之費富者以此示夸貧者為之單產眾所同鄙而莫能獨異愚謂宜粗為其品使奢儉有中若有不改加以貶黜則德儉之化不日而流宋書孔琳之傳義熙初眾官獻便宜琳之於眾議之外別建言奏劾徐羨之臣聞事上以奉憲為恭臨下以威嚴為整然後朝典為明莅眾必肅斯道或替則憲綱其頹臣以今月七日預皇太子正會會畢車去并猥臣停門待闕有何人乘馬當臣車前收捕驅遣命去何人罵詈收捕諮審欲錄每有公事臣常慮有紛紜語勿令問而何人獨罵不止臣乃使錄何人不肯下馬連叫大喚有兩威儀走來擊臣收捕尚書令省事倪宗又牽威儀手力擊臣下人宗云中丞何得行凶敢錄令公人凡是中丞收捕威儀悉皆縛取臣敕下人一不得鬭凶勢輈張有頃乃散又有群人就臣車側錄收捕樊馬子牙行築馬子頓伏不能還臺臣自錄非本無對校而宗敢乘勢凶恣篡奪罪身尚書令臣羨之與臣列車紛紜若此或云羨之不禁或云羨之禁而不止縱而不禁既乖國憲禁而不止又不經通陵犯監司凶聲彰赫容縱宗等曾無糾問虧損國威無大臣之體不有準繩風裁何寄羨之內居朝右外司輦穀位任隆重百辟所瞻而不能弘措朝章肅是風軌致使宇下縱肆凌暴憲司凶赫之聲起自京邑所謂已有短垣而自踰之又宗為篡奪之主縱不糾問二三虧違宜有裁貶請免羨之所居官以公還第宗等篡奪之愆已屬掌故御史檢處宋書孔琳之傳廢錢用穀帛議洪範八政以貨次食豈不以交易之所為為用之至要者乎若使不以交易百姓用力於為錢則是妨其為生之業禁之可也今農自務穀工自務器各肄其業何嘗致勤於錢故聖王制無用之貨以通有用之財既無毀敗之貴又省運致之苦此錢所以嗣功龜貝歷代不廢者也穀帛為寶本充衣食今分之為貨則致損甚多又勞毀於商販之手耗棄於割截之用此之為弊著自于曩故鍾繇曰巧偽之民競溼穀以要利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑錢之不用由於兵亂積久自至於廢有由而然漢未是也今既用而廢之則百姓頓亡其財今括囊天下之穀以周天下之食或倉庫充衍或糧靡斗儲以相資通則貧者仰富致之之道實假於錢一朝斷之便為棄物是有錢無糧之民皆坐而饑困此斷錢於錢一朝斷之便為棄物是有錢無糧之民皆坐而饑困此斷錢之立弊也且據仱用錢之處不以為貧用穀之處不以為富又民習來久革之怨惑語曰利不百不易業況又錢便於穀邪魏明帝時錢廢穀用四十年矣以不便於民乃舉朝大議精才達治之士莫不以宜復用錢民無異情朝無異論彼尚含穀帛而用錢足以明穀帛之弊著於已試也世或謂魏氏不用錢久積藏巨萬故欲行之利公富國斯殆不然昔晉文後舅犯之謀而先成季之信以為雖有一時之勳不如萬世之益于時名賢在列君子盈朝大謀天下之利害將定經國之要術若穀實便錢義不昧當時之近利而廢永用久通業斷可知矣斯實由困而思革改而更張耳近孝武之末天下無事時和年豐百姓樂業便自穀帛殷阜幾乎家給人足驗之事實錢又不妨民也頃兵革屢興荒饉荐及飢寒未振實此之由公既援而拯之大革視聽弘敦本之教明廣農之科敬授民時各順其業遊蕩知反務未自休固已南畝競力野無遺壤矣於此已往將升平必至何衣食之足卹愚謂救弊之術無取於廢錢晉書食貨志宋書孔琳之傳南史二十七通典八復肉刑議唐虞象刑夏禹立辟蓋淳薄既異致化實同寬猛相濟惟變所適書曰刑罰世輕世重言隨時也夫三代風淳而事簡故罕蹈刑辟季末俗巧而務殷故動陷憲綱若三千行於叔世必省踊貴之尤此五帝不相循法肉刑不可悉復者也漢文發仁惻之意傷自新之路莫由革古創制號稱刑厝然名輕而實重反更傷民故孝景嗣位輕之以緩緩而民慢又不禁邪期於刑罰之中所以見美在昔歷代詳論而未獲厥中者也兵荒已後罹法更多棄市之刑本斬右趾漢文一謬承而弗革所以前賢悵恨議之而未辯鍾繇陳群之意雖小有不同而欲右趾代棄市若從其言則所活者眾矣降死之生誠為輕法然人情慎顯而輕昧忽遠而驚近是以盤盂有銘韋弦作佩況在小人尤其所惑或目所不覩則忽而不戒日陳於前則驚心駭矚由此言之重之不必不傷輕之不必不懼而可以全其性命蕃其產育仁既濟物功亦益眾又今之所患逋逃為先屢叛不革宜令逃身靡所亦以肅戒未犯永絕惡原至於餘條宜依舊制豈曰允中貴獻管穴宋書孔琳之傳桓玄譏復肉刑琳之以為云云又南史二十七荅魏放之問大功嫁女魏放之問孔琳之曰降在大功當得嫁女不荅曰吾意降者似不得婚記稱大功之末可以嫁子小功之末可以娶妻下殤之小功則不可案如此文唯云降者不可娶妻不云不可嫁子此便是得嫁也通典六十荅傅都官駁大功嫁女議傳都官駁孔議曰娶妻嫁子雖為不同然可以例求也何者小功絕器之後可以娶妻至於下殤之小功則不可也本服重而降在小功既不得同小功而娶妻本服周而降在大功豈可同大功而嫁子乎孔荅曰娶妻事重嫁子事輕今若云不可納婦容可以嫁子為難耳既不明不可以嫁子而獨明不可以娶妻事重非其類矣通典六十傅難曰今舉重以明輕何以謂之不類孔荅曰傳意謂本周而在大功者則不得冠子嫁子納婦娶妻四事夫冠嫁納婦三事皆子身之吉事事不在己娶妻一事非在他人乃己身之吉事在子則輕在身則重輕故可行之服末重必卒哭而後可以降殺之明義亦既差降則事何必齊今若欲徵其文觀於輕者則知重者應明輕者猶不可則重者不言自彰而今獨言小功之殤不可以娶妻是指重者不可也重者自不可輕者自可有差何得輕必從重邪通典六十傳曰案禮葬後卒哭之與服末固是一語直辭異邪孔荅曰以葬後便為末虞畢乃卒哭且末與卒哭若果實同而名異者則當輒言小功之末可以納婦娶妻如大功之末輒言可以冠子嫁子何以別更起條云雖小功卒哭可以娶妻邪推文明矣通典六十書日月深酷撫膺崩叫心肝分膾尋繹懊憹觸感隕絕孤思悒悒自郡地最當柰何不孝柰何念痛悼難勝得去月二示知君所患故爾不差甚有幽悒熱甚比復何似想以轉佳眠食極勝也善將治之孤子竝疾患歎具悒悒腳中轉劇近服散未覺益惙頓何賴扶力迷甚不次孤子孔琳之柰何頓首淳化閣帖二
