body:
  text: 王景文自陳求解揚州臣凡猥下劣方圜無算特逢聖私頻叨不次乘非其任理宜覆折雖加恭謹無補橫至夙夜燋戰無地容處六月中得臣外甥女殷恆妻蔡疏欲令其兒啓聞乞祿求臣署入云凡外人通啓先經臣署於時驚怖即欲封疏上呈更思此家落漠庶非通謗且廣聽察幸無復所聞比日忽得兗州都送迎西曹解季遜板云是臣屬既不識此人即問郗顒方知虛託此十七日晚得征南參軍事謝儼口信云臣使人略奪其婢臣遣李武之問儼元由答云使人謬誤誤之與實雖所不知聞此之日唯有憂駭臣之所知便有此三變臣所不覺尤不可思若守爵散輩寧當招此誠由暗拙非復可防自竊州任倏已七月無德而祿其殃將至且傅職清峻亢禮儲極以臣凡走豈可暫安荷恩懼罪不敢執固焦魂褫氣憂迫失常況臣髮醜人群病絶力效穢朝點列顧無與等獨息易駭慚懼難持伏願薄回矜愍全臣身計大夫之俸足以自周久懷欣羡未敢干請仰希慈宥照臣款誠宋書王景文傳與幸臣王道龍書吾雖寡於行己庶不負心既愧殊效誓不上欺明主竊聞有為其貝錦者云營生乃至巨萬素無此能一旦忽致異術必非平理唯乞平心精檢若此言不虛便宜肆諸市朝以正風俗脫其妄作當賜思罔昧之由吾踰忝轉深足以致謗念此驚懼何能自測區區所懷不願望風容貸吾自了不作偷猶如不作賊故以密白想為申啓宋書王景文傳與子瓚之書吾欲使汝處不競之地南齊書王秀之傳秀之祖裕性貞正徐羡之傅亮當朝裕不與來往及致仕隱吳興與子瓚之書評何承天通裴難荀大功嫁女議降大功可嫁子為人所疑云要正以下殤小功不可娶舉輕以包重謂長殤大功亦不可嫁者意謂非也且子嫁降親生離恆山之日禽鳥猶哀況在人理其哀既深則吉實輕故情安於大功之末娶納吉慶為重吉重故可於小功卒哭夫舉重之不可何妨輕者仍自可乎而反云舉輕明重其義不例夫御孔懷之哀從輕降之命而與新婚者同其不可哉若使親表脫有其例當斷其可乎通典六十答何衡陽書所送琳道人白黑論辭清致美但吾暗於照理猶未遠其意既云幽冥之理不盡於人事周孔疑而不辨釋氏而不實然則人事之表幽暗之理為取廓然唯空為猶有神明邪若廓然唯空衆聖莊老何故皆云有神若有神明復何以斷其不實如佛言今相與共在常人之域料度近事猶多差錯以陷患禍及博奕粗藝注意研之或謂生更死謂死實生近事之中都未見有常得而無喪者何以決斷天地之外億劫之表冥冥之中必謂所辨不實邪若推據事不容得賞則疑之可也今人形至粗人神實妙以形從神豈得齊終心之所感崩城隕霜白虹貫日太白入昴氣禁之醫心作水火冷暖輒應況今以至明之智至精之志專誠妙徹感以受身更生於七寶之士何為不可實哉又云折毫空樹無傷垂蔭之茂離材虛室無損輪奐之美貝錦以繁采發華和羹以鹽梅致旨以塞本無之教又不然矣佛經所謂本無者非謂衆緣和合者皆空也垂蔭輪奐處物自可有耳故謂之有諦性本無矣故謂之無諦吾雖不悉佛理謂此唱居然甚矣自古千變萬化之有俄然皆已空矣當其盛有之時豈不常有也必空之實故俄而得以空邪亦如惠子所謂物方生方死日方中方睨死睨之實恆預明於未生未中之前矣愚者不覩其理唯見其有故齊侯攝爽鳩之餘偽而泣戀其樂賢者心與理一故顏子庶乎屢空有若無實若虛也自顏已下則各隨深淺而味其虛矣若又踰下縱不能自清於至言以傾愛競之惑亦何常無髣佛於一毫豈當反以一火增寒而更令戀嗜好之欲乎乃云明無常增渴癊之情陳苦偽篤競辰之慮其言過矣又以舟壑塘駟之論已盈耳於中國非理之奧故不舉為教本謂剖析此理更由指掌之民夫舟壑潛謝佛經所謂見在不住矣誠能明之則物我常虛豈非理之奧邪蓋悟之者寡故不以為教本耳支公所謂未與佛同也何為以素聞於中國而蔑其至言哉又以效神光無徑寸之明驗靈變無纖芥之實徒稱無量之壽孰見期頤之叟諸若此類皆謂於事不符夫神光靈變及無量之壽皆由誠信幽奇故將生乎佛土親映光明其壽無量耳今沒於邪見慢誕靈化理固天隔當何由覩其事之符乎夫心不貪欲為十善之本故能俯絶地獄仰生天堂即亦服義蹈道理端心者矣今內懷虔仰故禮拜悔罪達夫無常故情無所吝委妻子而為施豈有邀於百倍復何得乃云不由恭肅之意不乘無吝之情乎泥洹以無樂為樂法身以無身為身若本不希擬亦可為增耽逸之慮肇好奇之心若誠餐仰則耽逸稍除而獲利於無利矣又何關利競之俗乎又云道在無欲而以有欲要之俯仰之間非利不動何誣佛之深哉夫佛家大趣自以八苦皆由欲來明言十二因緣使高妙之流朗神明於無生耳欲此道者可謂有欲於無欲矣至於啓導粗近天堂地獄皆有影響之實亦由于公以仁活招封嚴氏以好殺致誅畏誅而欲封者必舍殺而修仁矣厲妙行以希天堂謹五戒以遠地獄雖有欲於可欲實踐日損之清塗此亦西行而求郢何患其不至哉又嫌丹青眩媚采之目土木誇好壯之心成私樹之權結師黨之勢要厲精之譽肆陵競之志固黑蝗之醜或可謂作法於涼其弊猶貪耳何得乃慢佛云作法於貪邪王莽竊六經以篡帝位秦皇因朝覲而構阿房寧可復罪先土之禮教哉又云宜廢顯晦之迹存其所要之旨示來生者蔽虧於道釋不得已請問其旨為欲何要必欲使修利遷善以遂其性矣夫聖無常心就萬物以為心耳若身死神滅是物之真性但當即其必滅之性與周孔并力致教使物無稟則遷善之實豈不純乎何誑以不滅欺以佛理使燒祝髮膚絶其胖合所遏曲裔數不可量為害若是以傷盡性之美釋氏何為其不得已乎若不信之流亦不肯修利而遷善矣夫信者則必耆域犍陀勒夷陀蜜竺法乘帛法祖竺法護于法蘭竺法行於道邃闕公則佛圖澄尸梨蜜郭文舉釋道安支道林遠和尚之倫矣神理風操似殊不在琳比丘之後寧當妄有毀人理落簪於不實人之化哉皆靈奇之實引綿邈之心以成神通清真之業者足下籍其不信遠送此論且世之疑者咸亦妙之故自力白答以塵露衆情夫世之然否佛法都是人興喪所大何得相與共處以可否之聞吾故罄其愚思制明佛論以自獻所懷始成已令人書寫不及此信晚更遣信可聞當付往也宗炳白弘明集三又答何衡陽書敬覽來論抑裁佛化畢志儒業意義檢著才筆辨核善可警策世情實中區之美談也觀足下意非謂制佛法者非聖也但其法權而無實耳未審道何以了其無實今相與斷見事大討失得略半也靈化超於玄極之表其故糾結於幽冥之中曾無神人指掌相語徒信史之闕文於焚燒之後便欲以廢頓神化相助寒心也夫聖人窮理盡以至於命物有不得其所若已納之於隍今誑以不滅欺以成佛使髡首赭衣焚身然指不復用天分以養父母夫婦父子之道從佛法已來沙河以西三十六國未暨中華絶此緒者億兆人矣東夷西羌或可聖賢及由金日磾得來之類將生而不得生者多矣若使佛法無實納隍之酷豈可勝言及經之權為合何道而云欲以矯誑過正以治外國剛強忿戾之民乎夫忿戾之類約法三章交賞見罰尚不信懼寧當復以即色本無泥洹法身十二因緣微塵劫數之言以治之乎稟此訓者皆足下所謂稟氣清和懷仁抱義之徒也資清和以疏微言厲信義以習妙行故遂能澄照觀法法照俱空而至於道皆佛經所載而足下所信矣至若近世通神令德若孫興公所讚八賢支通林所頌五哲皆時所共高故二子得以綴筆復何得其謂妄語乎孫稱竺法護之淵達于法蘭之淳博吾不關雅俗不知當比何士然法蘭弟子道邃未逮其師孫論之時以對勝流云謂庾文秉也是護蘭二公當又出之吾都不識琳比丘又不悉世論若足下謂與文秉等者自可不後道邃猶當後護蘭也前評未為失言誠能僧貌天虛深識真偽何必非天帝釋化作故激厲以成佛邪白黑論未可以為誠實也來告所疑若實有來生報應周孔何故默無片言此固偏見之恆疑也真宜所共明夫聖神玄發感而後應非先物而唱者也當商周之季民墜塗炭殺逆橫流舉世情而感聖者亂也故六經之應治而已矣是以無佛言焉劉向稱禹貢九州蓋述山海所記申毒之民偎人而愛人郭璞謂之天竺浮屠所興雖此之所夷然萬土星陳於太虛竟知孰為華哉推其偎愛之感故浮屠之化應焉彼之粗者雜有亂虐君臣治此之精者隨時抱道情佛事亦孝雖可有稟法性於伊洛餐真際於洙泗苟史佚以非治道而不書卜商以皆儒術而弗編縱復或存於復壁之外典復為秦王所燒周孔之無言未必審也夫玄虛之道靈仙之事世典未嘗無之而夫子道言遠見莊周之篇瑤池之宴乃從汲冢中出然則治之五經未可以塞天表之奇化也難又曰若即物常空空物為一空有未殊何得賢愚異稱夫佛經所稱即色為空無復異者非謂無有有而空耳有也則賢愚異稱空也則萬異俱空夫色不自色雖色而空緣合而有本自無有皆如幻之所作夢之所見雖有非有將來至至過去已滅見在不住又無定有凡此數義皆玄聖致極之理以言斥之誠難朗然由此觀物我亦實覺其昭然所以曠焉增洗汰之清也足下當何能安之又云形神相資古人譬之薪火薪弊太微薪盡火滅雖有其妙豈能獨存夫火者薪之所生神非形之所作意有精粗感而得形隨之精神極則超形獨存無形而神存法身常住之謂也是以始自凡夫終則如來雖一生尚粗苟有識向萬劫不汲必習以清升螟蛉有子蜾裸負之況在神明理廕寶積之蓋升鐙王之座何為無期又疑釋迦以盡權救物豈獨不愛數十百萬之説而吝俄頃神光不以曉邪見之徒夫雖云善權感應顯昧各依罪福昔佛為衆説又放光明皆素積妙誠故得神遊若時言成已著之筌故慢者可覩光明發由觀照邪見無緣瞻灑今覩經而不悛其慢先灑夫復何益若誠信之賢獨朗神照足下復何由知之而言者會復謂是妄説耳恆星不見夜明也考其年月即佛生放光之夜也管幼安風夜泛海同侶皆沒安於暗中見光投光赴島闔門獨濟夫佛無適莫唯善是應而致應若王祥郭巨之類不可稱説即亦見光之符也豈足下未見便無佛哉又陳周孔之盛唯方佛為弘然此國治世君王之盛耳但精神無滅冥運而已一生瞬息之中八苦備有雖剋儒業以整俄頃而未幾已滅三監之難父子相疑兄弟相戮七十二子雖復升堂入室年五十者曾無數人顏夭冉疾由醢豫族賜滅其鬚匡陳之苦豈可勝言忍飢弘道諸國亂流竟何所救以佛法觀之唯見其哀豈非世物宿緣所萃邪若所被之實理於斯猶未為深弘若使外率禮樂內修無生澄神於泥洹之境以億劫為當年豈不誠弘哉事不傳後理未可知幸勿據粗迹而云周孔則不然也人皆謂佛妄語山海經説死而更生者甚衆崑崙之山廣都之野軒轅之丘不死之國氣不寒暑鳳卵是食甘露是飲廕玕琪之樹歃朱泉人皆數千歲不死及化為黃能入於羽淵申生伯有之類丘明所説亦不少矣皆可推此之粗以信彼之精者也承音有道聞佛法而斂衽者必不啻作蒲城之死士可知矣當由所聞者未高故邪足下所聞者高於今猶可變豹也人是精神物但使歸信歸極粗稟教誡縱復微薄亦足為感感則彌升豈非脫或不滅之良計邪昔不滅之實事如佛言而神背心毀自逆幽司安知今生之苦毒者非往生之故爾邪輕以獨見慠尊神之訓恐或自貽伊阻也佛經説釋迦文昔為小乘比丘而毀大乘猶為此備苦地獄經歷劫數況都不信者邪復何以斷此經必虛乎足下所詰前書中語為因琳道人章句耳其意既已粗達不能復一二辨答所製明佛論已事事有通今付往足下力為善尋具告中否老將死以此續其書耳此書至便倚索答殊不密悉宗炳曰弘明集三寄雷次宗書昔與足下共於釋和尚間面受此義今便題卷首稱雷氏乎高僧傳六慧遠內通佛理外善群書時講喪服經次宗宗炳等並執卷承旨次宗後別著義疏首稱雷氏炳因寄書嘲之師子擊象圖序梁伯玉説沙門釋僧吉云嘗從天竺欲向大秦其間忽聞數十里外哮哮攬攬驚天怖地頃之但見百獸率走蹌地至絶而四巨象虓焉而至以鼻捲泥自辱塗數尺數數噴鼻隅立俄有師子三頭見於山下直摶四象崩血若濫泉巨樹草偃初學記二十九御覽八百八十九畫山水序聖人含道應物賢者澄懷昧象至於山水質有而趣靈是以軒轅堯孔廣成大嵬許由孤竹之流必有崆洞具茨藐姑箕首大蒙之遊焉又稱仁智之樂焉夫聖人以神發道而賢者通山水以形媚道而仁者樂不亦幾乎余眷戀廬衡契闊荊巫不知老之將至愧不能凝氣怡身傷跕石門之流於是畫象布色構茲雲嶺夫理絶於中古之上者可意求於千載之下旨徵於言象之外者可心取於書策之內況乎身所盤桓目所綢繆以形寫形以色貌色也且夫崑崙山之大曠子之小迫目以寸則其形莫覩迥以數里則可圍於寸眸誠由去之稍闊則其見彌小今張綃素以遠映則崑閬之形可圍於方寸之內豎劃三寸當千仞之高橫墨數尺體百里之迥是以觀畫圖者徒患類之不巧不以制小而纍其似此自然之勢如是則嵩華之秀玄牝之靈皆可得之於一圖矣夫以應目會心為理者類之成巧則目亦同應心亦俱會應會感神神超理得雖復虛求幽巖何以加焉又神本亡端栖形感類理人影迹誠能妙寫亦誠盡矣於是間居理氣拂觴鳴琴披圖幽對坐究四荒不違天勵之藂獨應無人之野峰岫嶢疑雲林森渺聖賢映於絶代萬趣融其神思余復何為哉畼神而已神之所畼孰有先焉張彥遠歷代名畫記引宗炳別傳又略見御覽七百五十引畫記甘頌煌煌嘉實磊磊景星南金其色隋珠厥形初學記二十八御覽九百六十六
