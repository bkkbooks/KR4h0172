body:
  text: 周朗上書獻讜言昔仲尼有言治天下若置諸掌豈徒言哉方策之政息舉在人蓋當世之君不為之耳況乃運鍾澆暮世膺亂餘重以宮廟遭不更之酷江服被未有之痛千里連死萬井共泣而秦漢餘敝尚行於今魏晉遺謬猶布於民是而望國安於今化崇於古郤行及前之言積薪待然之譬臣不知所以方然陛下既基之以孝又申之以仁民所疾苦敢不略薦凡治者何哉為教而已今教衰已久民不知則又隨以刑逐之豈為政之道歟欲為教者宜二十五家選一長百家置一師男子十三至十七皆令學經十八至二十盡使修武訓以書記圖緯忠孝仁義之禮廉讓勤恭之則援以兵經戰略軍部舟騎之容挽強擊刺之法官長皆月至學所以課其能習經者五年有立則言之司徒習武者三年善藝亦升之司馬若七年而經不明五年而勇不達則更求其言政置謀迹其心術行履復不足取者雖公卿子孫長歸農畝終身不得為吏其國學則宜詳考占數部部定子史令書不煩行習無糜力凡學雖凶荒不宜廢也農桑者實民之命為國之本有一不足則禮節不興若重之宜罷金錢以穀帛為賞罰然愚民不達其權議者好增者好增其異凡自淮以北萬匹為市從江以南千斛為貨亦不患其難也今且聽市至千錢以還者用錢餘皆用絹布及米其不中度者坐之如此則墾田自廣民資必繁盜鑄者罷人死必息又田非膠水皆播麥菽地堪滋養悉藝紵麻蔭巷緣藩必樹桑柘列庭接宇唯植竹栗若此令既行而善其事者庶民則敘之以爵有司亦從而加賞若田在草間木物不植則撻之而伐其餘樹在所以次坐之又取稅之法宜計人為輸不應以資云何使富者不盡貧者不蠲乃令桑長一尺圍以為價田進一畝度以為錢屋不得瓦皆責資實民以此樹不敢種土畏妄墾棟焚榱露不敢加泥豈有剝善害民禁衣惡食若此苦者方今若重斯農則宜務削茲法凡為國不患威之不立患恩之不下不患土之不廣患民之不育自華夷爭殺戎夏競威破國則積尸竟邑屠將則覆軍滿野海內遺生蓋不餘半重以急政嚴刑天災歲疫貧者但供吏死者弗望薶鰥居有不願娶生子每不敢舉又戍淹徭久妻老嗣絶及淫奔所孕皆復不收是殺人之日有數途生人之歲無一理不知復百年間將盡以草木為世邪此最是驚心悲魂慟哭太息者法雖有禁殺子之科設蚤娶之令然觸刑罪忍悼痛而為之豈不有酷甚處邪今宜家寬其役戶減其稅女子十五不嫁家人坐之特雉可以騁妻妾大布可以事舅姑若待足而行則有司加糾凡宮中女隸必擇不復字者庶家內役皆令各有所配要使天下不得有終獨之生無子之老所謂十年存育十年教訓如此則二十年間長戶勝兵必數倍矣又亡者亂郊饉人盈甸皆是不為其存計而任之遷流故飢寒一至慈母不能保其子欲其不為寇盜豈可得邪既御之使然復止之以殺彼於有司何酷至是且草樹既死皮葉皆枯是其粱肉盡矣冰霜已厚苫蓋難資是其衣裘敗矣比至陽春生其餘幾今自江以南在所皆穰有食之處須官興役宜募遠近食五十口一年者賞爵一級不過千家故近食十萬口矣使其受食者悉令就佃淮南多其長帥給其糧種凡公私遊手歲發佐農令堤湖盡修原陸並起仍量家立社計地設閭檢其出入督其遊惰須待大熟可移之復舊淮以北悉使南過江東旅客盡令西歸故毒之在體必割其緩處函渭靈區𨶑為荒窟伊洛神基蔚成茂草豈可不懷歟歷下泗間何足獨戀議者必以為胡衰不足避而不知我之病甚於胡矣若謂民之既徙狄心就之若其來從我之願也胡若能來必非其種不過山東雜漢則是國家由來所欲覆育既華得坐實戎空自遠其為來利固善也今空守孤城徒費財役亦行見淮北必非境服有矣不亦重辱喪哉使虜但發輕騎三千更互出入春來犯麥秋至侵禾水陸漕輸居然復絶於賊不勞而邊已困不至二年卒散民盡可蹻足而待也設使胡滅則中州必有興者決不能有奉土地率民人以歸國家矣誠如此則徐齊終逼亦不可守且夫戰守之法當恃人之不敢攻頃年兵之所以敗皆反此也今人知不以羊追狼蟹捕鼠而令重車弱卒與肥馬悍胡相逐其不能濟固宜矣漢之中年能事胡者以馬多也胡之後服漢者亦以馬少也既兵不可去車騎應蓄今宜募天下使養馬一匹者蠲一人役三匹者除一人為吏自此以進階賞有差邊亭徼驛一無發動又將者將求其死也自能執干戈幸而不亡筋力盡於戎役其於望上者固己深矣重有澄風掃霧之勤驅波滌塵之力此所自矜尤復為甚近所功賞人知甚濃然侶頗謬虛實怨怒實衆垂臂而反脣者往往為部耦語而呼望者處處成群凡武人意氣特易崩沮設一旦有變則向之怨者為敵也今宜國財與之共竭府粟與之同罄去者應遣濃加寵爵發所在祿之將秩未充餘費宜闕他事負輦長不應與唯可教以搜狩之禮習以鉦鼓之節若假勇以進務黜其身老至而罷賞延於嗣又緣淮城壘皆宜興復使烽鼓相達兵食相連若邊民請師皆宜莫許遠夷貢至止於報答語以國家之未暇示以何事而非君須內教既立徐料寇形辨騎卒四十萬而國中不擾取穀支二十歲而遠邑不驚然後越淮窮河跨隴出漠亦何適而不可又教之不敦一至於是今士大夫以下父母在而兄弟異計十家而七矣庶人父子殊産亦八家而五矣凡甚者乃危亡不相知飢寒不相恤又嫉謗讒害其間不可稱數宜明其禁以革其風先有善於家者即務其賞自今不改則沒其財又三年之喪天下之達喪以其哀病衷出故制同外興日久均痛故愈遲齊典漢氏節其臣則可矣薄其子則亂也云何使衰苴之容盡鳴號之音息夫佩玉啓旒深情弗忍冕珠視朝不亦甚乎凡法有變於古而刻於情則莫能順焉至乎敗於禮而安於身必遽而奉之何乃厚於惡薄於善歟今陛下以大孝始基宜反斯謬且朝享臨御當近自身始妃主典制宜漸加矯正凡舉天下以奉一君何患不給或帝有集皂之陋后有帛布之鄙亦無取焉且一體炫金不及伯兩一歲美衣不過數襲而必收寶連櫝集服纍笥目豈常視身未時親是為櫝帶寶笥著衣空散國家之財徒奔天下之貨而主以此惰禮妃以此傲家是何糜蠹之劇惑鄙之甚逮至婢豎皆無定科一婢之身重婢以使一豎之家列豎以役瓦金皮繡漿酒藿肉者故不可稱紀至有列軿以遊遨飾兵以驅叱不亦重甚哉若禁行賜薄不容致此且細作始并以為儉節而市造華怪即傳於民如此則遷也非罷也凡天下得治者以實而治天下者常虛民之耳目既不可誑治之盈耗並亦隨之故凡厥庶民制度日侈商販之室飾等王侯傭賣之身制均妃后凡一袖之大足斷為兩一裾之長可分為二見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已睥睨宮中朝制一衣庶家晚已裁學侈麗之原實先宮閫又妃主所賜不限高卑自今以去宜為節目金魄翠玉錦繡縠羅奇色異章小民既不得服在上亦不得賜若工人復造奇伎淫器則皆焚之而重其罪又置官者將以燮天平氣贊地成功防姦御難治煩理劇使官稱事立人稱官置無空樹散位繁進𤕠人今高卑貿實大小反稱名之不定是謂官邪而世廢姬公之制俗傳秦人之法惡明君之典好暗主之事其憎聖愛愚何其甚矣今則宜先省事從而并官置位以周典為式變名以適時為用秦漢末制何足取也當使德厚者位尊位尊者祿重能薄者官賤官賤者秩輕纓冕紱佩稱官以服車騎容衛當職以施又寄士州郡宜通廢罷舊地民戶應更置立豈吳邦而有徐邑揚境而宅兗民上淆辰紀下亂畿甸其地如朱方者不宜置州土如江都者應更建邑又民少者易理君近者易歸凡吏皆宜每詳其能每厚其秩為縣不得復用恩家之貧為郡不得復選勢族之老又王侯識未堪務不應強仕須合冠而啓封能政而議爵且帝子未官人誰為賤但宜詳置賓友選擇正人亦何必列長史參軍別駕從事然後為貴哉又世有先後業有難易明帝能令其兒不匹光武之子馬貴人能使其家不比陰后之族盛矣哉此於後世不可忘也至當輿抑碎首之忿陛殿延辟戟之威此亦復不可忘也內外之政實不可雜若妃主為人請官者其人宜終身不得為官若請罪者亦終身不得赦罪凡天下所須者才而才誠難知也有深居而言寡則蘊學而無由知有卑處而事隔則懷奇而無由進或復見忌於親故或亦遭讒於貴黨其欲致車右而動御席語天下而辨治亂焉可得哉漫言舉賢則斯人固未得矣宜使世之所稱通經達史辨詞精數吏能將謀偏術小道者使獵纓危膝博求其用制內外官與官之遠近及仕之類令各以所能而造其室降情以誘之卑身以安之然後察其擢脣䀛樹頰胲動精神發意氣語之所至意之所執不過數四間不亦盡可知哉若忠孝廉清之比強正惇柔之倫難以檢格立不可須臾定宜使鄉部求其行守宰其能竟皆見之於選貴呈之於相主然後處其職宜定其位用如此故應愚鄙盡捐賢明悉舉矣又俗好以毀沈人不察其所以致毀以譽進人不知測其所以致譽毀徒皆鄙則宜擢其毀者譽黨悉庸則宜退其譽者如此則毀譽不妄善惡分矣又既謂之才則不宜以階級限不應以年齒齊凡貴者好疑人少不知其少於人矣老者亦輕人少不知其不及少矣自釋氏流教其來有源淵檢精測固非深矣舒引容潤既亦廣矣然習慧者日替其修束誡者月繁其過遂至糜散錦帛侈飾車從復假粗醫術託雜卜數延姝滿室置酒浹堂寄夫託妻者不無殺子乞兒者繼有而猶倚靈假像背親傲君欺廢疾老震損宮邑是乃外刑之所不容戮內教之所不悔罪而橫天地之間莫不糾察人不得然豈其鬼歟今宜申嚴佛律裨重國令其疵惡顯著者悉皆罷遣除則隨其藝行各為之條使禪義經誦人能其一食不過蔬衣不出布若應更度者則令先習義行本其神心必能草腐人天竦精以往者雖侯王家子亦不宜拘凡鬼道惑衆妖巫破俗觸木而言怪者不可數寓采而稱神者非可算其原本是亂男女合飲食因之而以祈祝從之而以報請是亂不誅為害未息凡一苑始立一神初興淫風輒以之而甚今修隄以北置園百里峻山以右居靈十房糜財敗俗其可稱限又針藥之術世寡復修診脈之伎人鮮能達民因是益徵於鬼遂棄於醫重令耗惑不反死天復半今大醫宜男女習教在所應遣使受業如此故當愈於媚神之愚微正湊理之敝矣凡無世不有言事末時不有令下然而升平不至昏危是繼何哉蓋設令之本非實也又病言不出於謀臣事不便於貴黨輕者抵訾呵駭重者死壓窮擯故西京有方調之誅東郡有黨錮之戮陛下若欲申常令循未典則群臣在焉若欲改舊章興王道則微臣存矣敢昧死以陳唯陛下察之宋書周朗傳時普責百官讜言朗上書又略見通典十四廣弘明集六又略見魏書劉駿傳以為周殷啓報羊希書羊生足下豈當適使人進哉何卿才之更茂也宅生結意可復佳耳屬華比綵何更工邪視已反覆慰亦無已觀諸紙上方審卿復逢知己動以何術而能每降恩明豈不為足下欣邪然更憂不知卿死所處耳夫胸奴之不誅有日皇居之亡辱舊矣天下孰不憤心悲腸以忿胡人之患靡衣偷食以望國家之師自智士鉗口雄人蓄氣不得議圖邊之事者良淹歲紀今天子以炎軒之德冢輔以姬呂之賢故赫然發怒將以胸奴釁旗惻然動仁欲使餘氓被惠及取士之令朝發宰士暮登英豪調兵之調夕行主公旦升雄俊延賢人者固非一日況復加此焉夫天下之士砥行磨名欲不辱其志氣運奇蓄異將進善於所天非但有建國之謀不及安民之論不與至反以孝潔生議於鄉曲忠烈起謗於君寀身不絓王臣之籙名不廁通人之班顛倒國門湮銷丘里者自數十年以往豈一人哉若吾身無他伎而出值明君變官望主歲增恩賞竟不能柔心飾帶取重左右校於向士則榮已多料於今識則笑亦廣而足下方復廣吾以馳志之時求豫以安邊之術何足下不知言也若以賢未登則今之登賢如此以才應進則吾之非才若是豈可欲以殞海之鬐望鼓鰓於豎鱗之肆墜風之羽覬振翮於軒毳之間其不能具陪淥水並負青天可無待於明見若乃闕奇謀深智之術無悅主狎俗之能亦不可復稍為卿説但觀以上國再毀之臣望府二逐之吏當復是天下才否此皆足下所親知吾雖疲𤕠亦嘗聽君子之餘論豈敢忘之凡士之置身有三耳一則雲戶岫寢欒危桂榮秣芝浮霜翦松沈雪憐肌蓄髓氣愛魂非但士石侯卿腐鴆梁錦實乃佇意天后睨目羽人次則刳心掃智剖命驅生橫議於雲臺之下切辭於宣室之上衍王德而批民患進貞白而鴆姦猜委玉人而齊聲禮揭金出而烹勍寇使車軌一風甸道共德令功日濟而己無迹道日富而君難名致諸侯斂手天子改觀其未則饜飴而出望旃而入結冤兩宮之下鼓袖六王之間俯眉脅肩言天下之道德瞋目扼腕陳從橫於四海理有泰則止而進調覺忤則反而還間耳違官交造頓罷捐慕遺憂夷毀銷譽呼吸以補其氣繕嚼以輔其生凡此三者皆志士仁人之所行非吾之所能也若吾幸病不及死役不至身蓬藜既滿方杜長者之轍穀稼是咨自絶世豪之顧塵生床帷苔積階月又簷中山木時華月深池上海草歲榮日蔓且室間軒左幸有陳書十篋席隅奧右頗得宿酒數壼按絃拭徽讎方校石時復陳局露初奠爵星晚歡然不覺是羲軒後也近春田三頃秋園五畦若此無災山裝可具侯振飲之罷俟封勒之畢當敬觀邠酆肅尋伊鄗傍眺燕隴邪履遼衛𧠙我周之軫迹弔他賢之憂天當其少涉未休此欲但理實詭固物好交加或徵勢而笑其言或觀謀而害其意夫楊朱以此猶見嗤於梁人況才減陽子之器物甚魏君之意者哉若如漢宗之言李廣此固許天下之有才又知天下之時非也豈若黨巷閭里之間忌見貞士之遭遇便謂是臧獲庸人之徒耳士固願呈心於其主露奇於所歸卿相末事也若廣者何用侯為至乃復有致竭於為亂之日被訕於害正之徒心奇而無由露事直而變為枉豈不痛哉豈不痛哉若足不可謂冠負日月籍踐淵海心支身首無不通照今復出入燕河交關姬衛整笏振豪已議於帷筵之上提鞭鳴劍復呵於軍場之間身超每深恩之所集心動必明主之所亮可不直議正身輔人君之過誤明目張膽謀軍家之得失操志勇之將薦俊正之士此乃足下之所以報也不爾便擐甲修戈徘徊左右衛君王之身當馬首之鏑關必固之壘交死進之戰使身分而主豫寇滅而兵全此亦報之次也如是則繫胸奴於北闕無日矣亡但默默窺寵而坐謂子有心敢書薄意宋書周朗傳元嘉二十七年江夏王義恭出鎮彭城府主簿羊希從行與朗書戲之勸令獻進奇策朗報書
