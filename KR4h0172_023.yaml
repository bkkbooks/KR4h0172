body:
  text: 何承天與宗居士書論釋慧琳白黑論即均善論近得賢從中郎書說足下勤西方法事賢者志其大豈以萬劫為奢但恨短生無以測冥靈耳冶城慧琳道人作白黑論乃為衆僧所排擯賴蒙值明主善救得免波羅夷耳既作比丘乃不應明此白徒亦何為不言足下試尋二家誰為長者吾甚昧然望有以佳悟何承天白弘明集三答宗居士書釋均善難前送均善論竝咨求雅旨來答周至及以為茲理興喪宜明不可但處以可否之閒吾雖不能一切依附亦不甚執偏見但求夜光於巨海正自未得耳以為佛經者善九流之別家雜以道墨慈悲愛施與中國不異大人君子仁為己任心無憶念且以形像彩飾將諧常人耳目其為糜損尚微其所弘益或著是以兼而存之至於好事者遂以為超孔越老唯此為貴斯未能求立言之本而眩惑於末說者也知其言者當俟忘言之人若唯取信天堂地獄之應因緣不滅之驗抑情菲食盡勤禮拜庶幾廕羅帳之蓋升彌鐙之座淳于生所以大謔也論云衆聖老莊皆云有神明復何以斷其不如佛言答曰明有禮樂幽有鬼神聖王所以為教初不昧其有也若果有來生報應周孔寧當緘默而無片言邪若夫嬰兒之臨坑凡人為之駭怛聖者豈獨不仁哉又云人形至粗人神實妙以形從神豈得齊終答曰形神相資古人譬以薪火薪弊火微薪盡火滅雖有其妙豈能獨得又云心之所感崩城隕露白虹貫日太白入昴氣禁之醫冷暖輒應專誠妙感以受身更生七寶之土何為不可哉答曰崩城隕露貫日入昴不明來生之譬非今論所宜引也又見水火之禁冀其能生七寶之鄉猶觀大冶銷金冀其能自陶鑄終不能亦可知也又曰有諦無諦此唱居然甚安自古千變萬化有俄然皆已空矣當其盛有之時豈不常有必空之實愚者不知其理唯見其有答曰如論云當其盛有之時已有必空之實然則即物常空空物為一矣今空有未殊而賢愚異稱何哉昔之所謂道者於形為無形於事為無事恬漠沖粹養志怡神豈獨愛欲未除宿緣是畏唯見其有豈復是過以此嗤齊侯猶五十步笑百步耳又云舟壑潛謝佛經所謂見在不住誠能明之則物我常虛答曰潛謝不住豈非自生入死自有入無之謂乎故其言曰有駭形而無損心有旦宅而無憤死賈生亦云化為異物又何足患此達乎死生之變者也而區區去就在生慮死心繫無量志生天堂吾黨之常虛異於是焉又云神光靈變及無量之壽皆由誠信幽奇故映其明今沒於邪見理固天隔答曰今亦不從慢化者求其光明但求之於誠信者耳尋釋迦之教以善權救物若果應驗若斯何為不見其靈變以曉邪見之徒豈獨不愛數十百萬之說而吝俄頃神光徒為化聲之辨竟無明於真智終年疲疫而不知所歸豈不哀哉又云內懷虔仰故禮拜悔罪達夫無常故情無所吝委妻子而為施豈不邀於百倍答曰繁巧以興事未若除貪欲而息競遵戒以洗悔未若翦榮冀以全朴況乃誘所尚以祈利忘天屬以要譽謂之無邀吾不信也又云泥洹以無樂為樂法身以無身為身若誠能餐仰則耽逸稍除獲利於無利矣答曰泥洹以離苦為樂法身以接苦為身所以使餐仰之徒不能自絶耳果歸於無利勤者何獲而云獲於無利邪此乃形神俱盡之證恐非雅論所應明言也又云欲此道者可謂有欲於無欲矣至若啓導粗近者有影響之實亦猶于公以仁活致封嚴氏以好殺致誅厲妙行以希天堂謹五戒以遠地獄雖有欲於可欲實踐日損之塗此亦西行而求郢何患其不至答曰謂粗近為啓導比報應於影響不亦善乎但影響所因必稱形聲尋常之形安得八萬由旬之影乎所滯若有欲於無欲猶是常滯於所欲夫耳目殊司工藝異業末技所存慮信不竝是以金石克諧泰山不能呈其高鴻鵠方集冥秋不能傳其旨而欲以有欲成無欲希望就日損雖云西行去郢茲遠如之何又云若身死神滅是物之真性但當與周孔竝力致教何為誑以不滅欺以佛理使燒祝髮膚絶其牉合以傷盡性之美答曰華戎自有不同何者中國之人稟氣清和含仁抱義故周孔明性習之教外國之徒受性剛強貪欲忿戾故釋氏嚴五戒之科來論所謂聖無常心就物之性者也懲暴之戒莫苦乎地獄誘善之勸莫美乎天堂將盡殘害之根非中庸之謂周孔則不然順其天性去其甚泰淫盜著於五刑酒辜明於周誥春田不圍澤見生不忍死五犯三驅釣而不綱是以仁愛普洽澤及豚魚嘉禮有常俎老者得食肉春耕秋收蠶織以時三靈格思百神咸秩方彼之所為者豈不弘哉又甄供灌之賞嚴疑法之罰述蒱宰之問為勸化之本演焄蒿之答明來生之驗袨服盱衡而矜斯說者其處心亦悍矣論又稱耆陀尸梨之屬神理風操不在琳比丘後足下既明常人不能料度近事今何以了其勝否於百年之前數千里之外邪若琳比丘者僧貌而天虛似夫深識真僞殊不肯忌經護師崇飾巧說吾以是敬之孫興公論云竺法護之淵達于法蘭之純博足下欲比中土何士也及楚英之修仁寺笮融之賙行饉寧復有清真風操乎昔在東邑有道含沙門自吳中來深見勸譬甚有懇誠因留三宿相為說練形澄神之緣罪福起滅之驗皆有條貫吾拱聽讜言申旦忘寢退以為士所以立身揚名著信行道者實賴周孔之教子路稱聞之而未之能行唯恐有聞吾所行者多矣何據捨此而務彼又尋稱情立文之制知來生之為奢究終身不已之哀悟受形之難再稱聖人我師周公豈欺我哉緣足下情篤故具陳始末想耆舊大智誨人不倦於此未默耳前已遣取明佛論遲尋至冀或朗然於心何承天白弘明集三答宗居士書重告竝省大論置陳如項籍既足下以賤漢祖況弱士乎證譬堅明文詞淵富誠欲廣其利澤施及凡民深知君子之用心也足下方欲影響以神其教故宜緘默成人之美但當謂外國之事或非中華所務是以有前言耳果今中外宜同余則陋矣敢謝不敏雖然猶有所懷夫明天地之性者不致惑於迂怪識盛衰之徑者不役心於理表儻令雅論不因善權篤誨皆由情發豈非通人之蔽哉未緣言對聊以代面何承天白弘明集三答顏光祿敬覽芳訊研復淵旨區別三才步驗精粹宣演道心褒賞施士貫綜幽明推誠及物行之於己則美敷之於教則弘殆無所聞退尋嘉誨之來將欲令參觀斗極復迷反徑思或昧然未全曉洽故復重申本懷足下所謂共成三才者是必合德之稱上哲之人亦何為其然夫立人之道取諸仁義惻隱為仁者之表恥惡為義心之端牛山之木翦性於䥸斧恬漠之想汨慮於利害誠宜滋其萌蘖援其善心遂乃存而不算得無過與又云議三才者無取於氓隸言衆生者亦何濫於聖智既已聞命猶未知二塗當以何為判將伊顏下麗寧喬札上附企望不倦以祛未了必令兩籍俱舉宮和符合豈不盡善又曰大德曰生有萬之所同同於所方萬豈得生之可異非謂不然人生雖均被大德不可謂之衆生譬聖人雖同稟五常不可謂之衆人奚取於不異之生必宜為衆哉來告云人則役物以為養物則見役以養人大判如此便是顧同鄙議至於情嗜不禁害生慘物所謂甚者泰者聖人固已去之又云以道為心者或不劑此而止請問不止者將自己不殺邪令受教咸同邪若自己不殺取足市鄽故是遠庖廚意必欲推之於編戶吾見雅論之不可立矣又云若同草木便當煙盡精靈在天將何憑以立夫神魄惚恍遊魂為變發揚悽愴亦於何不之仲由屈於知死賜也失於所問不更受形前論之所明言所憑之方請附夫子之對及施報之道必然之符當謂于氏高門俟積善之慶博陽不伐膺公侯之祚何關於後身乎又云經世恆談施者勿憶士子服義惠而弗有誠哉斯言微恨設報以要惠說徒之所先悅報而為惠舉世之常務疑經受纍劫之罪勤施獲積倍之報不似吾黨之為道者是以怏怏耳知欲引之上濟亦甚所不惜但丈夫處實者頗陋前識之華故不為也若乃施非周急惠存功譽揆諸高明亦有恥乎此吾率其恆心久而不化內慚璩子未暇有所誚也何承天白弘明集四重答顏光祿吾少信管見老而彌篤既言之難云將湮腐方寸故願憑流揚以託鱗融厚故意垂懷惠以重釋稽證周明華辭博贍夫良玉時玷賤夫指其瑕望舒抱魄野人睨其缺豈伊好辨未獲云已復進請益之問庶以研盡所滯來告云三才之論故當本諸三畫三畫既陳中稱君德所以神致太上崇一元首若如論旨以三畫為三才則初擬地爻三議天位然而遁世無悶非厚載之目君子乾乾非蒼蒼之稱果兩儀罔託亦何取於立人但爻在中和宜應蓄德耳又云惻隱窮博愛之量恥惡盡祐直之方則為上仁上義便是計體仁義者為三才尋又云喬札未獲上附尹顏宜其下麗則黃裳之人其猶弗及雖賾之旨高下無準故惑者未悟也夫陰陽陶氣剛柔賦性圓首方足容貌匪殊惻隱恥惡悠悠皆是但參體二儀必舉仁義為端取知欲限以名器慎其所假遂令惠人潔士比性於毛群庶幾之賢同氣於介族立象之意豈其然哉又云已均被同衆復何諱衆同故當殊其特靈不應異其得生夫特靈之神既異於衆得生之理何嘗暫同生本於理而理異焉同衆之生名將安附若執此生名必使從衆則混成之物亦將在例邪又云謹為垣防猶患踰盜況乃罔不設備以充侈志方開所泰何議志甚足下始云皇聖設候物之教謹順時之經將以反漸息泰今復以方開所泰為難未詳此將難鄙議將譏聖人也又云市庖之外豈無御養神農所書中散所述何必以封刳為稟和爓瀹為翼善夫禋瘞繭栗宗社三牲膮膷豆俎以供賓客七十之老俟肉而飽豈得唯陳列草石取備上藥而已吾所憂不立者非謂洪論難持退嫌此事不可頓去於世耳又云天下寧有無形之有顧此唯疑宜見正定尋來旨似不嫌有鬼當謂鬼宜有質得無惑天竺之書說鬼別為生類故邪昔人以鬼神為教乃列於典經布在方策鄭喬吳札亦以為然是以雲和六變實降天神龍門九成人鬼咸格足下雅秉周禮近忽此義方詰無形之有為支離之辨乎又云後身著戒可不敬與慈護之人深見此數未詳所謂慈護者誰氏之子若據外書報應之說皆吾所謂權教者耳凡講求至理曾不析以聖言多採譎怪以相扶翼得無似以水濟水邪又云物無妄然必以類感常善以救善亦從之勢猶影表不慮自來斯言果然則類感之物輕重必侔影表之勢修短有度致飾土木不發慈愍之心順時搜狩未根慘虐之性天宮華樂焉賞而上升地獄幽苦奚罰而淪陷唱言窮軒輊立法無衡石一至於此且阿保傅愛慎及溷腴良庖提刀情怵介族彼聖人者明竝日月化關三統若令報應必符亦何妨於教而緘扃羲唐之紀埋閉周孔之世肇結網罟興纍億之罪仍制牲牢開長夜之罰遺彼天廚甘此芻豢曾無拯溺之仁橫成納隍之酷其為不然宜𥳑淵慮若謂窮神之智猶有所不盡雖高情愛奇想亦未至於侮聖也足下論仁義則云情之者少利之者多言施惠則許其遺賢忘報在情既少孰能遺賢利之者多曷云忘報若能推樂施之士以期欲仁之疇演忘報之意引向義之心則義實在斯求仁不遠至於濟有生之類入無死之地慶周兆物尊冠百神斯旨弘誕非本論所及無乃秦師將遁行人言肆乎豈其相迫居吾語子聖人在上不與百神爭長有始有卒焉得無死之地夫辨章幽明研精庶物反初結繩終繁文教性以道率故絶親譽之名範圍造化無傷博愛之量以畋以漁養兼賢鄙三品之獲實充賓庖金石發華笙籥協節醉酒飽德介茲萬年處者弘日新之業仕者敷先王之教誠著明君澤被萬物龍章表觀鳴玉節趨斯亦堯孔之樂地也及其不遇考槃阿㵎以善其身殺雞為黍聊寄懷抱或負鼎割烹揚隆名於長世或屠羊鼓刀陵高志於浮雲此又君子之處心也何必陋積善之延祚希無驗於來世生背當年之真歡徒疲役而靡歸繫風捕影非中庸之美慕夷眩妖違通人之致蹲膜揖讓終不竝立竊願吾子捨兼而遵一也及蜀梁二叔甘人驛胥之譬非本義所斷故不復具云弘明集四為謝晦檄京邑王室多故禍難荐臻營陽失德自絶宗廟盧陵王構鬩有本屢被猜嫌且居喪失禮遐邇所具積怨犯上自貽非道群后釋位爰登聖明亂之未乂職有所係案車騎大將軍王弘侍中王曇首謬蒙時私叨竊權要弘於永初之始實荷不世之恩元嘉之讓自謂任遇浮淺進誣先皇委誠之寄退長嫌隙異同之端曇首往因使下訪以今上起居不能光揚令德彰於朝聽其言多誣故不具說王華賊亡之餘賞擢之次先帝常見訪逮庶有一分可取而華稟性凶猜多所忍害曩者縱人入城託疾辭事此都士庶咸所聞知以其所啓及上手答示宗叔獻又令宣告徐傅二公及周糾使下又令見咨云欲自攬政事求離任還都竝令曇首具述此意又惠觀道人說外人告華及到彥之謀反不謂無之城內東將數日之內操戈相待華說數為秋當所譖常不自安凡此諸事豈有忠誠冥契若此者邪自以父亡道側情事異人外絶酒醴而宵飲是恣靦貌凡厥士庶誰不側目又常歎宰相頓有數人是何憤憤規總威權不顧國典保祐皇家者罹屠戮之誅效勤社稷者致殲夷之禍搢紳之徒孰不慷慨遂矯違詔旨遣到彥之蕭欣之輕舟見襲即日監利左尉露檄衆軍已至揚子雖以不武忝荷蕃任國家艱難悲憤兼集若使小人得志君子道消凡百有殄瘁之哀蒼生深橫流之懼輒糾勒義徒繕治舟甲舳艫亙川駟介蔽野武夫鷙勇人百其誠今遣南蠻司馬寧遠將軍庾登之統參軍事建武將軍建平太守安泰宣威將軍昭弘宗參軍事宣威將軍王紹之等精鋭一萬前鋒致討南蠻參軍振武將軍魏像統參軍事宣威將軍陳珍虎旅二千參軍事建威將軍新興太守賀愔甲卒三千相係取道南蠻參軍振威將軍郭卓鐵騎二千水步齊舉大軍三萬駱驛電邁行冠軍將軍竟陵內史河東太守謝遁建威將軍南平太守謝世猷驍勇一萬留守江陵分命參軍長寧太守竇應期步騎五千直出義陽司馬建威將軍行南義陽太守周超之統軍司馬振武將軍胡崇之精悍一萬北出高陽長兼行參軍寧遠將軍朱淡之步騎五千西出雁塞同討劉粹竝趨襄陽奇兵尚速指景齊奮諸賢竝同國恩情兼義烈今誠志士忘身之日義夫著績之秋見機而動望風而不待勗宋書謝晦傳
