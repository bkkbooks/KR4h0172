body:
  text: 謝惠連雪賦歲將暮時既昏寒風積愁雲繁梁王不悅遊於兔園乃置旨酒命賓友召鄒生延枚叟相如末至居客之右俄而微霰零密雪下王乃歌北風於衛詩詠南山於周雅授簡於司馬大夫曰抽子祕思騁子妍辭侔色揣稱為寡人賦之相如於是避席而起逡巡而揖曰臣聞雪宮建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黃竹曹風以麻衣比色楚謠以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於陰德雪之時義遠矣哉請言其始若乃玄律窮嚴氣升焦溪涸湯谷凝火井滅溫泉冰沸潭無湧炎風不興北戶墐扉裸壤垂繒於是河海生雲朔漠飛沙連氛纍靄掩日韜霞霰淅瀝而先集雪紛糅而遂多其為狀也散漫交錯氛氳蕭索藹藹浮浮瀌瀌奕奕聯翩飛灑徘徊委積始緣甍而冒棟終開簾而入隙初便娟於墀廡末縈盈於帷席既因方而為圭亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵似連璐庭列瑤階林挺瓊樹皓鶴奪鮮白鷴失素紈袖慚冶玉顏掩姱若乃積素未虧白日朝鮮爛兮若燭龍銜耀照崑山爾其流滴垂冰緣霤承隅粲兮若馮夷剖蚌列明珠至夫繽紛繁騖之貌皓皔曒潔之儀回散縈積之勢飛聚凝曜之奇固展轉而無窮嗟難得而備知若乃申娛玩之無已夜幽靜而多懷風觸楹而轉響月承幌而通暉酌湘吳之醇酎御狐狢之兼衣對庭鵾之雙舞瞻雲雁之孤飛踐霜雪之交積憐枝葉之相違馳遙思於千里願接手而同歸鄒陽聞之悶然心服有懷妍唱敬接末曲於是乃作而賦積雪之歌歌曰攜佳人兮披重幄援綺衾兮坐芳縟燎薰爐兮炳明燭酌桂酒兮揚清曲又續而為白雪之歌歌曰曲既揚兮酒既陳朱顏酡兮思自親願低帷以昵枕念解珮而褫紳怨年歲之易暮傷後會之無因君寧見階上之白雪豈鮮耀於陽春歌卒王乃尋繹吟玩撫覽扼腕顧謂枚叔起而為亂亂曰白羽雖白質以輕兮白玉雖白空守貞兮未若茲雪因時興滅玄陰凝不昧其潔太陽曜不固其節節豈我名潔豈我貞憑雲升降從風飄零值物賦象任地班形素因遇立污隨染成縱心皓然何慮何營文選藝文類聚二甘賦嘉寒園之麗木美獨有此貞芳質葳蕤而懷風性耿介而凌霜擬夕霞以表色指朝景以齊圓侔萍實乎江介超玉英於崑山傾子節兮湘之區承君玩兮堂之隅濯雨兮冒霜長無絶兮芬敷藝文類聚八十六初學記二十八橘賦園有嘉樹橘柚煌煌圓丹可玩清氣芬芳受以玉盤升君子堂味既滋而事美實厥苞之最良藝文類聚八十六鸂鶒賦覽水禽之萬類信莫麗乎鸂鶒服昭晰之鮮姿糅玄黃之美色命儔旅以翱遊憩川湄而偃息超神王以自得不意虞人之在側網羅幕而雲布摧羽翮於翩翻乖沈浮之諧豫宛羈畜於籠樊藝文類聚九十二白鷺賦有提樊而見獻實振鷺之鮮禽表弗緇之素質挺樂水之奇心藝文類聚九十二雪贊氣遍霜繁年豐雪積彼厲我和爾素子白其德懿矣玩之庭隙權陋瑤臺暫踐盈尺藝文類聚二四海贊九夷六蠻八狄七戎雕鏤異實裳裸殊風致之以德車軌斯同初學記六琴贊嶧陽孤桐裁為鳴琴體兼九絲聲備五音重華載揮以養民心孫登是玩取樂山林藝文類聚四十四初學記十六白羽扇贊惟茲白羽體此皎潔涼齊清風素同冰雪其儀可貴是用玩悅揮之襟袖以御炎熱藝文類聚六十九初學記二十五仙人草贊并序余之中園有仙人草焉春穎其苗夏秀其英秋有真實冬無凋色可謂貫四時而不改者也既嘉其名而美其質染筆作詠庶以攄述云園有嘉草名曰仙人曄曄煒煒莫莫臻臻穎發炎暑苗秀和春寄爾靈質乃植中鄰藝文類聚八十一松贊松惟靈木擬心雲端迹絶玉除形寄青巒子欲我知求之歲寒藝文類聚八十八連珠蓋聞獻技者易忽養德者難致是以子張重趼不獲哀公之祿干木偃息不受文侯之位蓋聞機心難湛不接異類淳德易孚可狎殊方是以高羅舉而雲鳥降海人萃而水禽翔蓋聞春蘭早芳實忌鳴鴂秋菊晚秀無憚繁霜何則榮乎始者易悴貞乎末者難傷是以傅長沙而志沮登金馬而名揚蓋聞修己知足慮得其逸競榮昧進志忘其審是以飲河滿腹而求安愈泰緣木務高而畏下滋甚藝文類聚五十七目針氣之清明雙眸善識唯道是視瞻彼正直藝文類聚十七口針宣納之由實伊樞機唯舌是出馳駟安追差釐千里君子慎微何用口爽信在甘肥藝文類聚十七祭禹廟文謹遣左曹掾奉水土之羞敬薦夏帝之靈咨聖繼天載誕英徽克明克哲知章知微運此宏謨恤彼民憂身勞五嶽形疲九州呱呱弗顧虔虔是欽物貴尺璧我重寸陰乃錫玄圭以告成功虞數既改夏德乃隆臨朝總政巡國觀風淹留稽嶺乃徂行宮恭司皇役敬屬暉融神且略薦乃昭其忠藝文類聚三十八為學生祭周居士文維君陶造化之純元侔先哲之遐蹤體無事於高尚蹈虛素乎中庸不臣天子不事諸侯公辟弗盼王命匪酬窮歡極樂帶索被裘藝文類聚三十七祭古冢文并序東府掘城北塹入丈餘得古冢上無封域不用磚甓以木為槨中有二棺正方兩頭無和明器之屬材瓦銅漆有數十種多異形不可盡識刻木為人長三尺許可有二十餘頭初開見悉是人形以物棖撥之應手灰滅棺上有五銖錢百餘枚水中有甘蔗節及梅李核瓜瓣皆浮出不甚爛壞銘志不存世代不可得而知也公命城者改埋於東岡祭之以豚酒既不知其名字遠近故假為之號曰冥漠君云爾元嘉七年九月十四日司徒御屬領直兵令史統作城録事臨漳令亭侯朱林具豚醪之祭敬薦冥漠君之靈忝總徒旅板築是司窮泉為塹聚壤成基一槨既啓雙棺在茲捨畚悽愴縱鍤漣而芻靈已毀塗車既摧几筵糜腐俎豆傾低盤或梅李盎或醢醯蔗傳餘節瓜表遺犀追惟夫子生自何代曜質幾年潛靈幾載為壽為夭寧顯寧晦銘志湮滅姓氏不傳今誰子後曩誰子先功名美惡如何蔑然百堵皆作十仞斯齊墉不可轉塹不可回黃腸既毀便房已穨循題興念撫俑增哀射聲垂仁廣漢流渥祠骸府阿掩骼城曲仰羡古風為君改卜輪移北隍窀穸東麓壙即新營棺仍舊木合葬非古周公所存敬遵昔義還祔雙魂酒以兩壺牲以特豚幽靈髣佛歆我犧樽嗚呼哀哉文選藝文類聚四十御覽五百二十六月賦陳王初喪應劉端憂多暇緑苔生閣芳塵凝榭悄焉疚懷不怡中夜乃清蘭路肅桂苑騰吹寒山弭蓋秋阪臨濬壑而怨遙登崇岫而傷遠於時斜漢左界北陸南躔白露曖空素月流天沈吟齊章殷勤陳篇抽毫進牘以命仲宣仲宣跪而稱曰臣東鄙幽介長自丘樊昧道懵學孤奉明恩臣聞沈潛既義高明既經日以陽德月以陰靈擅扶光於東沼嗣若英於西冥引玄兔於帝臺集素娥於后庭朒朓警闕朏魄示沖順辰通燭從星澤風增華台室揚采軒宮委照而吳業昌淪精而漢道融若夫氣霽地表雲斂天末洞庭始波木葉微脫菊散芳於山椒雁流哀於江瀨升清質之悠悠降澄輝之藹藹列宿掩縟長河韜映柔祇雪凝圓靈水鏡連觀霜縞周除冰淨君王乃厭晨歡樂宵宴收妙舞弛清縣去燭房即月殿芳酒登鳴琴薦若乃涼夜自凄風篁成韻親懿莫從羈孤遞進聆皋禽之夕聞聽朔管之秋引於是絃桐練響音容選和徘徊房露惆悵陽阿聲林虛籟淪池滅波情紆軫其何託訴皓月而長歌歌曰美人邁兮音塵闕隔千里兮共明月臨風歎兮將焉歇川路長兮不可越歌響未終餘景就畢滿堂變容回遑如失又稱歌曰月既沒兮露欲晞歲方晏兮無與歸佳期可以還微霜霑人衣陳王曰善乃命執事獻壽羞璧敬佩玉音復之無斁文選十三藝文類聚一曲池賦北山兮黛柏南溪兮頳石頳岸兮若虹黛樹兮如畫暮雲兮十里朝霞兮千尺步東池兮夜未久臥西窗兮月向山引一息於魂內擾百緒於眼前藝文類聚九赤鸚鵡賦應詔徒觀其柔儀所踐頳藻所挺華景夕映容光晦鮮慧性昭和天機自曉審國音於寰中達方聲於遐表及其雲移霞峙霰委雪翻陸離翬漸容裔鴻軒躍林飛岫煥若輕電溢煙門集場棲圃曄若夭桃被玉園至於氣淳體淨霧下崖沈月圖光於緑水雲寫影於青林遡還風而聳翮霑清露而調音藝文類聚九十一初學記三十禎流覬域祥發鵬溟初學記六舞馬賦應詔天子馭三光總萬宇挹雲經之留憲裁河書之遺矩是以德澤上昭天而下漏泉符瑞之慶咸屬榮懷之應必躔月晷呈祥乾維效氣賦景河房承靈天駟陵原郊而漸影躍采淵而泳質辭水空而南傃去輪臺而東洎乘玉塞而歸寶奄芝庭而獻祕及其養安騏校進駕龍涓輝大馭於國皂賁上襄於帝間超益野而踰緑地軼蘭池而轢紫燕五王晦其術孫氏懵其玄東門豈或狀西河不能傳既秣芑以均性又佩蘅以崇躅卷雄神於綺文蓄奔容於帷燭蘊籋雲之鋭景戢追電之逸足方疊鎔於丹鎬亦聯規於朱駮觀其雙璧應範三封中圖玄骨滿燕室虛陽理竟潛策紆汗飛赭沫流朱至於肆夏已升采齊既薦始徘徊而龍俯終沃若而鸞盼迎調露於飛鍾赴承雲於驚箭寫秦坰之弭塵狀吳門之曳練窮虞庭之蹈蹀究遺野之環袨若夫跖實之態未卷凌遠之氣方攄歷岱野而過碣石跨滄流而軼姑餘朝送日於西坂夕歸風於北都尋瓊宮於倏瞬望銀臺於須臾若乃日宣重光德星昭衍國稱梁岱佇蹕史言壇場望踐鄗上之瑞彰江間之禎闡榮鏡之運既臻會昌之曆已辨感五繇之程符鑒群后之薦典聖主將有事於東嶽禮也於是順斗極乘次躔戒懸日於昭旦命月題於上年騑騑翼翼泛修風而浮慶煙肅肅雍雍引八神而詔九仙下齊郊而掩配林集嬴里而降祊田蒲軒次巘瑄璧承巒金檢茲發玉牒斯刊盛節之義洽升中之禮殫億兆悅精祇歡聆萬歲於曾岫燭神光於紫壇是以擊轅之蹈撫埃之舞相與而歌曰聳朝蓋兮泛晨霞靈之來兮雲漢華山有壽兮松有茂祚神極兮貺皇家然後悟聖朝之績號慶榮之烈比盛乎天地爭明乎日月茂實冠於胥庭鴻名邁於勛發業底於告成道臻乎報謁巍巍乎蕩蕩乎民無得而稱焉宋書謝莊傳河南獻舞馬詔群臣為賦又見藝文類聚九十三初學記二十九雜言詠雪火洲滅日壑清龍關沙蒸河徼雲驚晷未沉而井閟宇方霾而海溟始葐蒀以蕤轉終徘徊而煙曳狀素鏡之晨光寫金波之夜晣藝文類聚二山夜憂吟庭光盡山明歸流風乘軒卷明月緣河飛澗鳥鳴兮夜蟬清橘露靡兮蕙煙輕凌別浦兮值泉躍經喬林兮遇猿驚南皋別鶴佇行漢東鄰孤管入青天沉痾白髮共急日朝露過隟詎賒年年去兮髮不還金膏玉液豈留顏回舲拓繩戶收棹掩荊關藝文類聚七懷園引鴻飛從萬里飛飛河岱起辛勤越霜露聯翩泝江汜去舊國違舊鄉舊海悠且長回首瞻東路延翮向秋方登楚都入楚關楚地蕭瑟楚山寒歲去冰未已春來雁不還風肅幌兮露濡庭漢水初緑柳葉青朱光藹藹雲英英離禽喈喈又晨鳴菊有秀兮松有蕤憂來年去容髮衰流陰逝景不可追臨堂危坐悵欲悲試託意兮向芳蓀心綿綿兮屬荒樊想緑蘋兮既冒沼念幽蘭兮已盈園夭桃晨暮發春鶯旦夕喧青苔蕪石路宿草塵蓬門藝文類聚六十五詔泰始元年改元大赦詔高祖武皇帝德洞四瀛化綿九服太祖文皇帝以大明定基世祖孝武皇帝以下武寧亂日月所照梯山航海風雨所均削衽襲帶所以業固盛漢聲溢隆周子業凶嚚自天忍悖成性人面獸心見於齠日反道敗德著自比年其狎侮五常怠棄三正矯誣上天毒流下國實開闢所未有書契所未聞再罹遏密而無一日之哀齊斬在躬方深北里之樂虎兕難匣憑河必彰遂誅滅上宰窮舋逆之酷虐害國輔究孥戮之刑子鸞同生以昔憾殄殪敬猷兄弟以睚眥殲夷徵逼義陽將加屠膾陵辱戚藩檟楚妃主奪立左右竊子置儲肆酗於朝宣淫於國事穢東陵行汙飛走積舋罔極日月滋深比遂圖犯玄宮志窺題湊將肆梟獍之禍騁商頓之心又欲鴆毒崇憲虐加諸父事均宮閫聲遍國都鴟梟小豎莫不寵昵朝廷忠誠必加戮挫收掩之旨虓虎結轍掠奪之使白刃相望百僚危氣首領無有全地萬姓崩心妻子不復相保所以鬼哭山鳴星鉤血降神器殆於馭索景祚危於綴冕朕假寐凝憂泣血待旦慮大宋之基於焉而泯武文之業將墜於淵賴七廟之靈藉八百之慶巨猾斯殄鴻沴時褰皇綱絶而復紐天緯缺而更張猥以寡薄屬承乾統上緝三光之重俯顧庶民之艱業業矜矜若履冰谷思與億兆同此維新可大赦天下改景和元年為泰始元年賜民爵二級鰥寡孤獨不能自存者穀人五斛逋租宿債勿復收犯鄉論清議贓污淫盜並悉洗除長徒之身特賜原遣亡官失爵禁錮舊勞一依舊典其昏制謬封並皆刊削宋書明帝紀案南史謝莊傳明帝定亂使為赦詔傳詔立待詔成其文甚工
