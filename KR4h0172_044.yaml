body:
  text: 袁淑秋晴賦是月也聲晷合朝夜分霆收耀虹戢文炎都褰埃旻㝢滌氛曳悲泉之凝霧轉絶垠之嚴雲藝文類聚三又初學記三引兩條正情賦解蘊麝之芳衾陳玉柱之鳴箏文選江淹別賦注又江淹望荊山詩注桐賦越衆木之薰狥勝雜樹之藻縟信爽幹以弱枝實裏素而表緑若乃根荑條茂迹曠心沖貞觀於曾山之陽抽景於少澤之東被籍兮煙霞懷珮兮星虹儀丹丘之瑞羽棲清都之仙宮藝文類聚八十八謝中丞章竊惟此職昭贊實預損益必須兼威正刺骨窮文使權家勳族不敢藉強而侮物戚門右姓不得稱雄以掩衆昔傅咸治職臣僚戢懼孫寶移疾卿尹皆怠御覽二百二十六懸法象魏先政甸衛文選陸倕石闕銘注防禦索虜議臣聞函車之獸離山必斃絶波之鱗宕流則枯羯寇遺醜趨致畿甸蟻萃螽集聞已崩殪天險巖曠地限深遐故全魏戢其圖盛晉輟其議情屈力殫氣挫勇竭諒不虞於來臨本無怵於能濟矣乃者燮定攜遠阻違授律由將有弛拙故士少鬭志圍潰之衆匪寇傾淪攻制之師空自班散濟西徑騎急戰蹴旅淮上訓卒簡備靡旗是由綏整寡衷戎昭多昧遂使潞子入患伊川來擾紛殄姬風泯毒禹績騰書有渭陰之迫懸烽均咸陽之警然而切揣虛實伏匿先彰校索技能譎詭既顯綿地千里彌行阻深表裏躓硋後先介逼捨陵衍之習競湍沙之利今虹見萍生土膏泉動津陸陷溢痁禍洊興芻藁已單米粟莫係水㝢襟帶進必傾霣河隘扁固退亦墮滅所謂棲烏於烈火之上養魚於叢棘之中或謂損緩江右寬繕淮內竊謂拯扼閩城舊史為允棄遠涼土前言稱非限此要荒猶弗委割況聯被京國咫尺神甸數州摧掃列邑殲痍山淵反覆草木塗地今丘賦千乘井笇萬集肩摩倍於長安締袂百於臨淄什一而籍實慊氓願履畝以稅既協農和戶競戰心人含鋭志皆欲贏糧請奮釋緯乘城謂宜懸金鑄印要果壯之士重幣甘辭招摧決之將舉薦板築之下抽登臺皂之閒賞之以焚書報之以相爵俄而昭才賀闕異能閒至戎貪而無謀肆而不整迷乎向背之次謬於合散之宜犯軍志之極害觸兵家之甚諱咸畜憤矣僉策戰矣稱願影從謠言緡命宜選敢悍數千騖行潛掩偃旗裹甲鉗馬銜枚檜稽而起晨壓未陳旌譟亂舉火鼓四臨使景不暇移塵不及起無不禽鎩獸讋冰解霧散掃洗噍類漂鹵浮山如有決罦漏網逡窠逗穴命淮汝戈船遏其還徑兗部徑卒梗其歸塗必翦元凶懸首麾下乃將隻輪不反戰轊無旋矣於是信臣騰威武士繕力緹組接陰鞞柝聯響若其僞遁羸張出沒無際楚言漢旆顯默如神固已日月蔽虧川谷蕩貿負塞殘孽阻山燼黨收險竊命憑城借一則當因威席卷乘機芟勦汴泗秀士星流電燭徐阜嚴兵雨湊雲集蹶亂桑溪之北搖潰瀚海以南絶其心根勿使能植銜索之枯幾何不蠹是由涸澤而漁焚林而狩若浚風之舞輕籜杲日之拂浮霜既而尉洽荷掠之餘望弔網悲之鬼然後天行樞運猋舉烟升青蓋西巡翠華東幸經啓州野滌一軫策俾高闕再勒燕然復銘方乃奠山沈河創禮輯策闡耀炎昊之遺則貫軼商夏之舊文今衆賈拳勇而將術疏怯意者稔泰日積承平歲久邑無驚赴之急家緩餽戰之勤闕閲訓之禮簡參屬之飾且亦薦採之法庸未蔇歟若乃邦造里選榷論深切躬擐盡幽斬帶尋遠設有沈明能照俊偉自宣誠感泉雨流通金石氣懾飛賁知窮苴起審邪正順逆之數達昏明損益之宜能睽合民心愚睿物性登丹墀而敷策躡青蒲而揚謀上說辰鑒下弭素言足以安民紓國救災恤患則宜拔過寵貴之上褒升戚舊之右別其旗章榮其班祿出得專譽使不稟命降席折節同廣武之請設壇致禮均淮陰之授必有要盟之功竊符之捷夷裔暴很內外侮棄始附之衆分茷無序蠱以威利勢必攜離首順之徒靡然自及今淶繹故典瀍土纓緌翦焉幽播折首凶狡是猶眇者願明痿之思步動商遄會功終易感劫晉在於善覘全鄭實寄良諜多縱反閒汩惑心耳發險易之前抵興喪之術衝其猜伏拂其嫌嗜汩以連率之貴餌以析壤之資罄筆端之用展辭鋒之鋭振辨則堅圍易解馳羽而巖邑易傾必府鬲土崩枝幹瓦裂故燕樂相悔項范交疑矣或乃言約功深事邇應廣齊圉反駕趙養還君盡輿誦之道畢能事之效臣幸得出內層禁游息明代澤與身泰恩隨年行無以逢迎昌運潤飾鴻法今塗有遺鏃蠆未息蜂敢思涼識少酬閎施但坐幕既乏昭文免胄不能致果竊觀都護之邊論屬國之兵謨終鼂之抗辭杜耿之言事咸云及經之棘猶闕上笇燭郛之敬裁收下策自恥懦木智不綜微敢露昧見無會昭採宋書袁淑傳與始興王濬書袁司直之視館敢寓書於上國之宮尹日者猥枉泉賦降委弊邑弊邑敬事是遑無或違二懼非郊贈之禮覲饗之資不虞君王惠之於是也是有懵焉弗圖旦夕發咫尺之記籍左右而請以為胥授失旨爰速先幣曾是附庸臣委末學孤聞者如之何勿疑且亦聞之前志曰七年之中一與一奪義士猶或非之況密邇旬次何其裒益之亟也藉恐二三諸侯有以觀大國之政是用敢布腹心弊室弱生砥節清廉好是潔直以不邪之故而貧聞天下寧有昧夫嗟金者哉不腆供賦束馬先璧以俟命唯執事所以圖之宋書袁淑傳與何尚之書昨遣修問承丈人已晦志山田雖曰年禮宜遵亦事難斯貴俾疏班邴魏通美於前策龔貢山衛淪慚乎曩篇規逮休告雪滌素懷冀尋幽之歡畢闕棲玄之適但淑逸操偏迥野性瞢滯果茲沖寂必沈樂忘歸然而已議塗聞者謂丈人徽明未耗譽業方籍儻能屈事康道降節殉務舍南瀕之操淑此行永決矣望眷有積約日無誤宋書何尚之傳游新亭曲水詩序離榭修幕陵隧坡阜鑣容旆綵裛野麗雲御覽三百五十八真隱傳鬼谷先生不知何許人也隱居韜智居鬼谷山因以為稱蘇秦張儀師之遂立功名先生遺書責之曰若二君豈不見河邊之樹乎僕御折其枝波浪蕩其根上無徑尺之陰身被數尺之痕此木豈與天地有仇怨所居然也子不見嵩岱之松柏華霍之檀桐乎上枝干於青雲下根通於三泉千秋萬歲不受斧斤之患此木豈與天地有骨肉哉蓋所居然也藝文類聚三十六御覽五百十竝引真隱傳弔古文賈誼發憤於湘江長卿愁悉於園邑彥真因文以悲出伯喈衒史而求入文舉疏誕以殃速德祖精密而禍及夫然不患思之貧無苦識之淺士以伐能見斥女以驕色貽遣以往古為鏡鑑以未來為針艾書余言於子紳亦何勞乎蓍蔡藝文類聚四十雞九錫文維神雀元年歲在辛酉八月己酉朔十三日丁酉帝顓頊遣征西大將軍下雉公王鳳西中郎將白門侯扁鵲咨爾浚雞山子維君天姿英茂乘機晨鳴雖風雨之如晦抗不已之奇聲今以君為使持節金西蠻校尉西河太守以揚州之會稽封君為會稽公以前浚雞山為湯沐邑君其祗承豫命使西海之水如帶浚雞之山如礪國以永存爰及苗裔藝文類聚九十一引袁淑誹諧記勸進箋浚山侍郎丁鴻舍人鳧亭男梁鴻郎中蘇鵠死罪伏惟君德著朝野勳加鵷鷟故天王鳳皇特錫位封今鳳鵲等在柏外願時拜受不勝欣豫之情謹詣棲下以聞同上驢山公九錫文若乃三軍陸邁糧運艱難謀臣停算武夫吟歎爾乃長鳴上黨慷慨應官崎嶇千里荷囊致餐用捷大勳歷世不刊斯實爾之功也音隨時興晨夜不默仰契玄象俯協漏刻應更長鳴毫分不忒雖挈壼著稱未足比德斯復爾之智也若乃六合昏晦三辰幽冥猶憶天時用不廢聲斯又爾之明也青脊隆身長頰廣額修尾後垂巨耳雙磔斯又爾之形也嘉麥既熟實須精麵負磨回衡迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾有濟師旅之勳而加之以衆能是用遣中大夫閭丘騾加爾使銜勒大鴻臚斑腳大將軍宮亭侯以揚州之廬江江州之廬陵吳國之桐廬合浦之珠廬封爾為驢山公藝文類聚九十四初學記二十九御覽九百一引袁淑誹諧集大蘭王九錫文大亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豨冊命大蘭王曰咨惟君稟太陰之沈精摽群形於玄質體肥腯而洪茂長無心以遊逸資豢養於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏葉隆當時名垂於世此君之美也白蹢彰於周詩涉波應乎隆象歌詠垂於人口經千載而流響此君之德也君相與野遊唯君為雄顧群數百自西徂東俯噴沫則成霧仰奮鬣則生風猛毒必噬有敵必攻長驅直突陳無全鋒此君之勇也初學記二十九御覽九百三常山王九命文及至圖身失所羈靮人間馴纓服制惟意所牽登楹而遨抱梁而眠拾托遺餘恣口所便初學記二十九御覽九百十臨終與兄顗書史公才識可嘉足懋先基矣南齊書袁彖傳彖小字史公臨終啓臣義奉大宋策名兩畢今便歸魂墳壟永就山丘南史袁粲傳與釋道明書稱釋寶亮頃見亮公非常人也比日聞所未聞不覺歲之將暮珠生合浦魏人取以照車璧在邯鄲秦王請以華國天下之寶當與天下共之非復上人貴州所宜專也高僧傳人妙德先生傳有妙德先生陳國人也氣志淵虛姿神清映性孝履順棲沖業簡有舜之遺風先生幼夙多疾性疏懶無所營尚然九流百氏之言雕龍談天之藝皆泛識其大歸而不以成名家貧嘗仕非其好也混其聲迹晦其心用故深交或忤俗察罔識所處席門常掩三徑裁通雖揚子寂漠嚴叟沈冥不是過也修道遂志終無得而稱焉又嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂唯國君穿井而汲獨得無恙國人既竝狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不必具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水宋書袁粲傳南史二十六託為道人通公駮顧歡夷夏論白日停光恆星隱照誕降之應事在老先似非人關方炳斯瑞又老莊周孔有可存者依日末光馮釋遺法盜牛竊善反以成蠹檢究源流終異吾黨之為道耳西域之記佛經之說俗以膝行為禮不慕蹲坐為恭道以三繞為虔不尚踞傲為肅豈專戎土爰亦茲方襄童謁帝膝行而進趙王見周三環而止今佛法在華乘者常安戒善行交蹈者恆通文王造周太伯創吳革化戎夷不因舊俗豈若舟車理無代用佛法垂化或因或革清信之士容衣不改息心之人服貌必變變本從道不遵彼俗教風自殊無患其亂孔老釋迦其人或同觀方設教其道必異孔老治世為本釋氏出世為宗發軫既殊其歸亦異符合之唱自由異臆說又仙化以變形為上泥洹以陶神為先變形者白首還緇而未能無死陶神者使塵惑日損湛然常存泥洹之道無死之地乖詭若此何謂其同齊書顧歡傳南史顧歡傳
