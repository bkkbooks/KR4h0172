body:
  text: 江夏王義恭答詔愍雷次宗雷次宗不救所疾甚可痛念其幽棲窮藪自寡聖朝克己復禮始終若一伏惟天慈弘被亦垂矜愍宋書雷次宗傳答誡勒臣雖未能臨瀚海濟居延庶免劉仲奔逃之恥宋書江夏王義恭傳初虜深入上慮義恭不能固彭城備加誡勒義恭答又見南史十三答詔問何尚之致仕事尚之清忠貞固歷事唯允雖年在縣車而體尚充壯未相申許下情所同宋書何尚之傳薦沈劭啓盱眙太守劉顯真求自解説劭往蒞任有政績彰於民聽若重授盱眙足為良二千石宋書自序謝賜金梁鞍啓賜臣供御金梁橋鞍制作精巧宜副龍駟聖慈下逮猥垂光錫初學記二十二御覽三百五十八謝敕賜華林園櫻桃啓手敕猥賜華林櫻桃為樹則多陰為果則先孰故種之於聽事之前有蟬鳴焉顧命黏取以弄藝文類聚八十六初學記二十八謝敕賚華林園柿啓敕旨垂賚華林園柿出自神苑滋味殊絶藝文類聚八十六御覽九百七十一謝賜交州檳榔啓奉賜交州所獻檳榔味殊常品塗遠蒟醬御覽九百七十一啓事恩旨賜臣犀鏤竹節如意目所未覩北堂書鈔一百三十四垂賜金鏤虎魄茱萸囊七寶樹裝絹裏副之七寶枝裝玉眼明囊北堂書鈔一百三十六御覽七百四聖恩優重猥賜華纓玉笏珍冠飾首琛皮耀握非臣朽薄所宜服受初學記二十六御覽六百四十五又六百九十二詔旨以赦日所刺綾紋綿布袍放生古具袍垂重賜御覽六百九十二恩旨以犀鏤金錯酒杯盤垂賜御覽七百五十八聖恩賜金銀針七色縷并格一犀棟刷匣副綿布兆珍服寶玩以協嘉辰御覽八百三十賜臣金獸袍珍製巧飾洪恩覃被賜臣息伯禽柳屋二間御覽一百八十一與朱修之書義宣反道叛恩自陷極逆大義滅親古今同準無將之誅猶或囚殺況醜文悖志宣灼遐邇鋒指絳闕兵纏近郊舋逼憂深臣主盰食賴朝略震明祖宗靈慶罪人斯得七廟弗隳司刑定罰典辟攸在而皇慈逮下愍其愚迷抑法申情屢奏不省人神悚遑省心震惕義宣自絶於天理無容受社稷之慮臣子責深便宜專行大戮以紓國難但加諸斧鉞有傷聖仁示以弘恩使自為所上全天德下一洪憲臨書悲慨不復多云宋書南郡王義宣傳大司馬江夏王義恭諸公王公八座與荊州刺史朱修之書書未達修之至江陵已於獄盡焉與王玄謨書聞因敗為成臂上金瘡得非金印之徵也宋書王玄謨傳義恭以為碻磝不可守召玄謨還為魏軍所追大破之流矢中臂義恭與書又見南史十六與南郡王義宣書頃聞之道路云二魯背叛致之有由謂不然之言絶於智者之耳忽見來表將興晉陽之甲驚愕駭惋未譬所由若主幼臣強政移冢宰或時昏下縱在上畏逼然後賢藩忠構覩難赴機未聞聖主御世百辟順軌稱兵於言興之初扶危於既安之日以此取濟竊為大弟憂之昔歲二凶構逆四海同奮弟協宣忠孝奉戴明主元功盛德既已昭著皇朝欽嘉又亦優渥丞相位極人臣江左罕授一門兩王舉世希有表倍推誠彰於見事出納之宜唯意所欲裒升進益方省後命一旦棄之可謂愚也吾等荷先帝慈育得及人群思報厚恩昊天罔極竭力盡誠猶懼無補奈何妄聽邪説輕造禍難國靡流言據歸愆於二叔世無鼂錯仍襲轍於七藩棄漢蒼之令範遵齊冏之敗迹往時仲堪假兵靈寶旋害其族孝伯授之劉牢忠誠踵皆曩代之成事當今之殷鑒也藏質少無美行弟所具悉憑恃未戚並有微勤承乏推遷遂超倫伍藉西楚強力圖濟其私凶謀若果恐非復池中物魯宗父子世為國冤太祖方弘遐略故爽等均雍齒之封令據有五州虎兕出於匣是須為劉淵耳徐遺寶是垣護之婦弟前因護之歸於吾苦求北出不樂遠西近磐桓湖陸示遣劉雍其意可見雍是徐沖舅適有密信誓倒戈自虜侵境以來公私雕斃安以撫之庶可寧靜弟復隨而擾亂吾恐邊鄙皆為禾黍宜遠尋高祖創業艱難近念家國比者禍舋時息兵戈共安社稷責躬謝過誅除險佞追保前勳傳美竹帛昔梁孝悔罪景帝垂恩阜質改過肅宗降澤忠焉之誨聊希往言禍福之機明者是察主上神武英斷群策如林忠臣發憤虎士投袂雄騎布野舳艫蓋川吾以不才忝權節鉞總督群師首戒戎先指晨電舉式清南服所以積行緩期冀弟不遠而悟如其遂溺姦説者天實為之臨書慨悶不識次第宋書南郡王義宣傳昔桓玄借兵於仲堪有似今日宋書臧質傳詐進元凶劭策賊諱小年未習軍旅遠來疲斃宜以逸待之今遠出梁山則京都空弱東軍乘虛容能為患若分力兩赴則兵散勢離不如養鋭待期坐而觀釁宋書元凶劭傳義慮義兵倉卒船舫陋小不宜水戰乃進策云云劭善其義丹徒宮集敘昭化景俗玄教凝神文選王融曲水詩序注嘉禾甘露頌并上表臣聞居高聽卑上帝之功天且弗違聖王之德故能影響二儀甄陶萬有鑒觀今古採驗圖緯未有道闕化虧而禎物著明者也自皇運受終辰曜交和是以卉木表靈山淵效寶伏惟陛下體乾統極休符襲逮若乃鳳儀西郊龍見東邑海酋獻改緇之羽河祗開俟清之源三代象德不能過也有幽必闡無遠弗屆重譯歲至休瑞月臻前者躬藉南畝嘉穀仍植神明之應在斯尤盛四海既穆五民樂業思述汾陽經始靈囿蘭陵甫樹嘉露頻流板築初就祥穟加積太平之符於是乎在臣以寡立承乏槐鉉沐浴芳津預覩冥慶不勝抃儛之情謹上嘉禾甘露頌一篇不足稱揚美烈追用悚汗其頌曰二象攸分三靈樂主齊應合從在今猶古天道誰親唯仁斯輔皇功帝績理冠區宇四民均極我后體茲惟機惟神敬昭文思九族既睦萬邦允釐德以位敘道致雍熙於穆不已顯允東儲生知夙睿嶽茂淵虛因心則哲令問弘敷繼徽下武儷景辰居軒制合宮漢興未央矧伊聖朝九有已康率由舊典思燭前王乃造陵霄遂作景陽有藹景陽天淵之涘清暑爽立雲堂時起植類斯育動類斯止極望江波遍對嶽畤化德惟達休瑞惟懋誕降嘉種呈祥初構甘露春凝禎穟秋秀於今匪烈嗣歲仍富昔在放勳曆莢數朝降及重華倚扇清庖鑠矣皇慶比物競昭倫彼典策被此風謠資臣六蔽任兼兩司既恧仲袞又慚鄭緇豈忘衡泌樂道明時敢述休祉愧闕令辭宋書符瑞志下元嘉二十四年七月嘉禾旅生華林園及景陽山園丞梅道念以聞太尉江夏王義恭上表華林四瑞桐樹甘露贊遠延鳳翮遙集鸞步惠潤何廣霑我萌庶初學記二十八傷劉道産啓故輔國將軍劉道産患背癰疾遂不救道産自鎮漢南境接凶寇政績既著威懷兼舉年時猶可方宣其用奄至殞沒傷怨特深伏惟聖懷愍惜兼至宋書劉道産傳與江夏王義恭書宗居士不救所病其清履肥素終始可嘉為之惻愴不能已已宋書宗炳傳上表遜位臣幼荷國靈爵遇踰等陛下推恩陛睦親以隆堂棣愛忘其鄙寵授遂崇任總內外位兼台輔不能正身率下以肅庶僚昵近失所漸不自覺致令毀譽違實賞罰謬加由臣才弱任重以及傾撓今雖罪人即戮王猷載靜養舋貽垢實由於臣鞠躬栗悚若角溪壑有何心顏而安斯寵輒解所職待罪私第宋書彭城王義康傳歲飢平糶議東土災荒人凋穀踊富商畜米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆敕使糶貨為制平價此所謂常道行於百代權宜用於一時也又緣淮歲豐邑地沃壤麥既已登黍粟行就可折其估賦成就交市三吳飢人即以貸給使強壯轉運以贍老弱奉表自陳臣聞博陸毗漢獲疑宣后昌國翼燕見猜惠王常謂異姓震王嫌隙易構葭莩淳戚昭亮可期臣雖庸儒少希忠謹值巨逆滔天忘家徇國雖曆算有歸微績不樹竭誠盡愚貫之幽顯而微疑莫監積毀日聞投杼之聲紛紜溢聽諒緣姦臣交亂成是貝錦夫澆俗之季少貞節之臣冰霜競至靡後雕之本並寢處凶年甘榮偽朝皆纓冕之所棄投畀之所取至乃位超昔寵任參大政惡直醜勳忘生邪説疑惑明主誣罔視聽又南從郡僚勞不足紀橫叨天功以為己力同斃相扇圖傾宗社臧質去歲忠節勳高古賢魯爽協同大義志契金石此等猜毀必欲禍陷昔汲黯尚存劉安寢志孔父既逝華督縱逆臣雖不武績著艱難復肆讒狡規見誘召宗祀之危綴旒非所臣託體皇基連暉日月王室顛墜咎在微躬敢忘抵鼠之忌甘受犯墉之責輒徵召甲卒分命衆藩使忠勤申憤義夫效力戮此凶醜謝愆闕廷則進不負七廟之靈退無愧二朝之遇臨表感愧辭不自宣宋書南郡王義宣傳與張鏡書論儒釋佛教以罪福因果有若影響聖言明審令人寒心然自上古帝皇文武周孔典謨訓誥靡不周備未有述三世顯敘報應者也彼衆聖皆窮理盡性照曉物緣何得忍視陷溺莫肯援接曾無一言示其津徑且釣而不綱弋不射宿博碩肥腯上帝是享以此觀之蓋所難了想二三子揚摧而陳使劃然有證社其惑焉弘明集十二譙王與張新安論孔釋書又載張新安答譙王書列於晉習鑿齒後鄭道子前蓋以為晉之嗣譙王也其實非也劉義宣封竟陵王改封南譙王又改封南郡王固辭譙王即義宣矣張新安者張鏡也僧佑未經考出答詰讓南第昔屬天興求將吏驅使臣答曰伍那可得若能擊賊者可入隊當時蓋戲言耳都不復憶後天興道上通辭乞位追存往為者不忍食言呼視見其形容粗健堪充驅使脫爾使監禮兼隊副比用人雖取勞舊亦參用有氣幹者謹條牒人名上呈下人欲嫁者猶未有處宋書元凶劭傳上遣閹人奚承祖讓劭劭答詐為文帝詔魯秀謀反汝可平明守關率衆入宋書元凶劭傳共月二十一日夜詐上詔魏劉義隆傳作劭又詐義隆敕云魯秀謀反汝明可守關將兵入討也即位下書徐湛之江湛弒逆無狀吾勒兵入殿已無所及號惋崩衄肝心破裂今罪人斯得元凶克殄卜世靈祚永享無窮思與億兆覃茲更始可大赦天下改嘉三十年為太初元年文武並賜位二等諸科一依丁卯宋書元凶劭傳後魏書劉義隆傳下臧敦等書臧敦等無因自駭急便竄逸迷昧過甚良可怪歎質國戚勳臣忠誠篤亮方當顯位贊翼京輦而子弟波迸傷其乃懷可遣宣譬令還咸復本位宋書臧質傳與沈璞疏卿嘗有速藻舊宮何其淹邪想行就爾宋書自序重與沈璞教卿沈思淹日向聊相敦還白裴然遂兼紙翰昔曹植有言下筆成章良謂逸才贍藻誇其辭説以今況之方知其信執省躊躇三復不已吾遠慚楚元門申白之賓近愧梁孝庭列板馬之客欣恧交至諒唯深矣薄因未牘以代一面宋書自序璞嘗作舊宮賦久而未畢與璞疏璞因事陳答辭義可觀濬重教上言開漕谷湖所統吳興郡襟帶重山地多汙澤泉流歸集疏決遲壅時雨未過已至漂沒或方春輟耕或開秋沈稼田家徒苦防遏無方彼邦奧區地沃民阜一歲稱稔則穰被京城時或水潦則數郡為災頃年以來儉多豐寡雖賑賚周給傾耗國儲公私之斃方在未已州民姚嶠比通便宜以為二吳晉陵義興四郡同注太湖而松江滬瀆壅噎不利故處處涌溢浸漬成災欲從武康紵溪開漕谷湖直出海口一百餘里穿渠浛必無閡滯自去踐行量度二十許載去十一年大水已詣前刺史臣義康欲陳此計即遣主簿盛曇泰隨嶠周行互生疑難議遂寢息既事關大利宜加研盡登遣議曹從事史虞長孫與吳興太守孔山士同共履行準望地勢格評高下其川源由歷莫不踐校圖畫形便加笇考如所較量決謂可立尋四郡四患非獨吳興若此浛獲通列邦蒙益不有暫勞無由永晏然興創事大圖始當難今欲且開小漕觀試流勢輒差烏程武康東遷三縣近民即時營作若宜更增廣尋更列言昔鄭國敵將史起卑忠一開其説萬世為利嶠之所建雖則芻蕘如或非妄庶幾可立宋書二凶傳與主簿顧邁孔道存書沈璞淹思踰歲卿研慮數旬瓌麗之美信同在昔向聊問之而還答纍翰辭藻豔逸致慰良多既欣股肱備此髦楚還慚豫躬無德而稱復裁少字宣志於璞聊因尺紙使卿等具知厥心宋書自序與沈璞書狡虜狂凶自送近服偽將即斃酋長傷殘實天威所喪卿諸人忠勇之效也吾式遏無素致境蕪民瘠負乘之愧允當其責近乞退謝愆不蒙垂許故以報卿宋書自序答太子劭書奉令伏深惶怖啓此事多日今始來問當是有感發之者未測源由耳計臨賀故當不應翻覆言語自生寒熱也此姥由來挾兩端難可孤保正爾自問臨賀冀得審實也其若見問當作依違答之天興先署佞人府位不審監上當無此簿領耳急宜撻之殿下已見王未宜依此具令嚴自躬上啓聞彼人若為不已正可保其餘命或是大慶之漸宋書元凶劭傳南史十四與孝武書聞弟忽起狂檄阻兵反噬縉紳憤歎義夫激怒古來陵上內侮誰不夷滅弟洞覽墳籍豈不斯具今主上天縱英聖靈武宏發自登宸極威澤兼宣人懷甘死之志物競舍生之節弟蒙眷遇著自少長東宮之歡其來如昨而信惑姦邪忘茲恩友此之不義人鬼同疾今水步諸軍悉已備辦上親御六師太保又秉鉞臨統吾與烏羊相尋即道所以淹霆緩電者猶冀弟迷而知返耳故略示懷言不盡意主上聖恩每厚法師今在殿內住想弟欲知消息故及宋書元凶劭傳劭使濬與世祖書烏羊者南平王鑠法師世祖世子小名也與元凶劭書船故未至今晚期當於此下物令畢願速敕謝賜出船艦尼己入臺願與之明日決也臣猶謂車駕應出此不爾無以鎮物情宋書二凶傳劭將敗濬勸劭入海輦珍寶繒帛下船劭書云云尼即嚴道育也
