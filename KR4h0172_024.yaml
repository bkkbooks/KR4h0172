body:
  text: 何何承天報應問西方說報應其枝末雖明而根本常昧其言奢而寡要其譬迂而無徵乖背五經故見棄於先聖誘掖近情故得信於季俗夫欲知日月之行故假察於琁璣將申幽冥之信宜取符於見事故鑑燧懸而水火降雨宿離而風雲作斯皆遠由近驗幽以顯著者也夫鵝之為禽浮清池咀春草眾生蠢動弗之犯也而庖人執焉鮮有得免刀俎者燕翻翔求食唯飛蟲是甘而人皆愛之雖巢幕而不懼非直鵝燕也群生萬有往往如之是知殺生者無惡報為福者無善應所以為訓者如彼所以示世者如此余甚惑之若謂燕非蟲不甘故罪所不及民食芻豢奚獨嬰辜若謂禽豕無知而人識經教斯則未有經教之時畋漁網罟亦無罪也無故以科法入中國乃所以為民陷穽也彼仁人者豈其然哉故余謂佛經但是假設權教勸人為善耳無關實敘是以聖人作制推德翳物我將我享實膺天祐固獲三品賓庖豫焉若乃見生不忍死聞聲不食肉固君子之所務也竊願高明更加三思廣弘明集二十荅向歆問祖無服父有服嫁孫女向歆問何承天曰父有伯母慘女服小功祖尊統一家年末可得嫁孫女不何荅曰吾謂祖為婚主女身又小功服不嫌於婚鄭尚書曰祖為婚主女父不與婚事意謂可婚周續之曰禮己雖小功可以冠娶妻則女身雖有服謂出門無嫌也伯母義服而祖為家主于禮可通徐野民曰禮許變通記所稱父大功者當非有祖之家又公羊傳云不以父命辭王父命推附名例義在尊無二上容或可通理邪通典六十荅江氏問次孫持重江氏問甲兒先亡甲後亡甲嫡孫傳重未及中祥嫡孫又亡有次孫今當應服三年不何承天荅曰甲既有孫不得無服三年者謂次孫宜持重也但次孫先以制齊縗今得便易服當須中祥乃服練居堊室耳昔有問范宣云人有二兒大兒無子小兒有子疑於傳重宣荅小兒之子應服三年亦粗可依通典八十八通裴難荀論大功嫁妹婚禮吉而非樂貴不失時元康中有犯喪者為憲司所糾都無降服大功嫁女之彈彼豈輕犯周制重犯功服邪固於禮自通不應致譏耳足下謂下殤小功不可娶足以包降在大功不可嫁夫徹樂興嗣親之感繼燭發離別之悲唱行重於和從受禮輕於納聘既有一等之差本服周者雖不得娶何嫌得嫁邪若本降為大功不可嫁者大功降為小功亦不可娶豈獨下殤小功而已乎斯不然矣通典六十渾天象論詳尋前說因觀渾儀研求其意有以悟天形正圓而水居其半地中高外卑水周其下言四方者東曰暘谷日之所出西曰濛汜日之所入莊子又云北溟有魚化而為鳥將徙於南溟斯亦古之遺記四方皆水證也四方皆水謂之四海凡五行相生水生於金是故百川發源皆自山出由高趣下歸注於海日為陽精光耀炎熾一夜入水所經焦竭百川歸注足以相補故旱不為減浸不為益徑天之數蕃說得之宋書天文志一隋書天文志上開元占經一周天三百六十五度三百四分之七十五天常西轉一日一夜過周一度南北二極相去一百一十六度三百四分度之六十五彊即天徑也黃道衺帶赤道春分交於奎七度秋分交於軫十五度冬至斗十四度半彊夏至井十六度半從北極扶天而南五十五度彊則居天四維之中最高處也即天頂也其下則地中也隋書天文志上開元占經一安邊論并上表伏見北藩上事虜犯青兗天慈降鑑矜此黎元博逮群策經綸戎政臣以愚陋預聞訪及竊尋獫狁告難爰自上古有周之盛南仲出車漢氏方隆衛霍宣力雖飲馬瀚海揚旍祁連事難役繁天下騷動委輸負海貲及舟車凶狡倔強未肯受弱得失報復裁不相補宣帝末年值其乖亂推亡固存始獲稽服自晉喪中原戎狄侵擾百餘年間未暇以北虜為念大宋啟阼兩燿靈武而懷德畏威用自款納陛下臨御以來羈縻遵養十餘年中貢譯不絕去歲三王出鎮思振遠圖獸心易駭遂生猜懼背違信約深搆攜隙貪禍恣毒無因自反恐烽燧之警必自此始臣素庸懦才不經武率其管窺謹撰安邊論意及淺末懼無可採若得詢之朝列辨覈同異庶或開引群慮研盡眾謀短長畢陳當否可見其論曰漢世言備匈奴之策不過二科武夫盡征伐之謀儒生講和親之約課其所言互有遠志加塞漠之外胡敵掣肘必未能摧鋒引日規自開張當由往年冀土之民附化者眾二州臨境三王出藩經略既張宏圖將舉士女延望華夷慕義故昧於小利且自矜侈外示餘力內堅偽眾今若務存遵養許其自新雖未可羈致北闕猶足鎮靜邊境然和親事重當盡廟笇誠非愚短所能究言若追蹤衛霍瀚海之志時事不等致功亦殊寇雖習戰來久又全據燕趙跨帶秦魏山河之險終古如一自非大田淮泗內實青徐使民有贏儲野有積穀然後分命方召總率虎旅精卒十萬使一舉盪夷則不足稍勤王師以勞天下何以言之今遺黎習亂志在偷安非皆恥為左衽遠慕冠冕徒以殘害剝辱視息無寄故繈負歸國先後相尋虜既不能校勝循理攻城略地而輕兵掩襲急在驅殘是其所以速怨召禍滅亡之日今若遣軍追討報其侵暴大翦幽冀屠城破邑則聖朝愛育黎元方濟之以道若但欲撫其歸附伐罪弔民則駿馬奔走不肯來征徒興巨費無損於彼復奇兵深入殺敵破軍苟陵患未盡則困獸思鬭報復之役將遂無已斯秦漢之末策輪臺之所悔也安邊固守於計為長臣以安邊之計備在史策李牧言其端嚴尤申其要大略舉矣曹孫之霸才均智敵江淮之間不居各數百里魏捨合肥退保新城吳城江陵移民南涘濡須之戍家停羨溪及襄陽之屯民夷散雜晉宣王以為宜徙沔南以實水北曹爽不許果亡柤中此皆前代之殷鑒也何者斥堠之郊非畜牧之所轉戰之地非耕桑之邑故堅壁清野以禦其來整甲繕兵以乘其敝雖時有通否而勢有強弱保民全境不出此塗要而歸之有四一曰移遠就近二曰浚復城隍三曰纂偶車牛四曰計丁課仗良守疆其土田驍帥振其風略蒐獵宣其號令俎豆訓其廉恥縣爵以縻之設禁以威之徭稅有程寬猛相濟比及十載民知義方然後𥳑將授奇揚旌雲朔風卷河冀電埽嵩恆燕弧折卻代馬摧足秦首斬其右臂吳蹄絕其左肩銘功於燕然之阿饗徒於金微之曲寇雖亂亡有徵昧弱易取若天時人事或未盡符抑銳俟機宜審其算若邊戍未增星居布野勤惰異教貧富殊資疆埸之民多懷彼此虜在去就不根本業難可驅率易在振蕩又狡虜之性食肉衣皮以馳騁為儀容以游獵為南畝非有車輿之安宮室之衛櫛風沐雨不以為勞露宿草寢維其常性勝則競利敗不羞走彼來或驟而此已奔疲且今春踰濟既獲其利乘勝忸忕未虞天誅比及秋末容更送死猋騎蟻聚輕兵烏集竝踐禾稼焚爇閭井雖邊將多略未審何以禦之若盛師連屯廢農必眾馳車奔馹起役必遲散金行賞損費必大換土客戍怨曠必繁孰若因民所居竝脩農戰無動眾之勞有扞衛之實其為利害優劣相懸也一曰移遠就近以實內地今青兗舊民及冀州新附在界首者二三萬家此寇之資也今悉可內徙青州民移東萊平昌北海諸郡兗州冀州人移太山以南南至下邳左洙右沂田良野沃西阻蘭陵北阨大峴四塞之內其號險固民性重遷闇於圖始無虜之時喜生咨怨今新被鈔掠餘懼未息若曉示安危居以樂土宜其歌抃就路視遷如歸二曰浚復城隍以增阻防舊秋冬收斂民人入保所以警備暴客使防衛有素也古之城池處處皆有今雖頹毀猶可脩治粗計戶數量其所容新徙之家悉著城內假其經用為之閭伍納稼築場還在一處婦子守家長吏為帥丁夫匹婦春夏佃牧秋冬入保寇至之時一城千室堪戰之士不下二千其餘羸弱猶能登陴鼓譟十則圍之兵家舊說戰士二千足抗群虜二萬矣三曰纂偶車牛以飭戎械計千家之資不下五百耦牛為車五百兩參合鉤連以衛其眾設使城不可固平行趨險賊所不能干既以族居易可檢括號令先明民知夙戒有急徵發信宿可聚四曰計丁課仗勿使有闕千家之邑戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之於庫出行請以自衛弓榦利鐵民不辦得者官以漸充之數年之內軍用粗備矣臣聞軍國異容施於封畿之內兵農竝脩在於疆埸之表攻守之宜皆因其習銓其怯勇山陵川陸之形寒暑溫涼之氣各由本性易則害生是故戍申作刺怨起及瓜今若以荊吳銳師遠屯清濟功費既重詹怨亦深以臣料之未若即用彼眾之易也管子治齊寄令在民商君為秦設以耕戰終能申威定霸行其志業非苟任強實由有數梁用武卒其邦自滅齊用技擊厥眾亦離漢魏以來茲制漸絕蒐田非復先王之禮治兵徒逞耳目之欲有急之日民不知戰至乃廣延賞募奉以厚秩發遽奔救天下騷然方伯刺史拱手坐聽自無經略唯望朝廷遣軍此皆忘戰之害不教之失也今移民實內浚治城隍族居聚處村里比次課其騎射通其風俗長吏𥳑試差品能不甲科上第漸就優別明其勳才表言州郡如此則屯部有常不遷其業內護老弱外通宦塗朋曹素定同憂等樂情由習親蓺因事箸晝戰見皃足以相識夜戰聞聲足以相救斯教戰之一隅先哲之遺術也論者必以古城荒毀難可脩復今不謂頓便加功整麗如舊但欲先定民居營其閭術墉壑存者因而即之其有毀缺權時柵斷足以禦彼輕兵防遏游騎假以旬時漸就完立車牛之賦課仗之宜攻守所資軍國之要今因民所利導而率之耕農之器為府庫之寶田蠶之氓兼扞城之用千家之宰總倍旅之兵萬戶之都具全軍之眾兵強而敵不戒國富而民不勞比於優復隊伍坐食廩糧者不可同年而校矣今承平來久邊令弛縱弓簳利鐵既不都斷往歲棄甲垂二十年課其所住理應消壞謂宜申明舊科嚴加禁塞諸商賈往來幢隊挾藏者皆以軍法治之又界上嚴立關候杜廢閒蹊城保之境諸所課仗竝加雕鐫別造程式若有遺鏃亡刃及私為竊盜者皆可立驗於事為長又鉅野湖澤廣大南通洙泗北連青齊有舊縣城正在澤內宜立式脩復舊堵利其埭遏給輕艦百艘寇若入境引艦出戰左右隨宜應接據其師津毀其航漕此以利制車運我所長亦禦敵之要也宋書何承天傳又見通典一百九十六論魏文帝以洛京宗廟未成祠武帝於建始殿案禮將營宮室宗廟為先庶人無廟故祭於寢帝者行之非禮甚矣宋書禮志三論蜀習隆向允請立諸葛廟于沔陽周禮凡有功者祭於大烝故後代遵之以元勳配饗充等曾不是式禪又從之竝非禮也宋書禮志四論旄頭戰國竝爭師旅數出懸烏之設務察風祲宜是秦矣宋書禮志五論吳朝設樂世咸傳吳朝無雅樂宋書樂志一或云今之神絃孫氏以為宗廟登哥也同上達性論夫兩儀既位帝王參之宇中莫尊焉天以陰陽分地以剛柔用人以仁義立人非天地不生天地非人不靈三才同體相須而成者也故能稟氣清和神明特達情綜古今智周萬物妙思窮幽賾制作侔造化歸仁與能是為君長撫養黎元助天宣德日月淑清四靈來格祥風協律玉燭揚輝九穀芻豢陸產水育酸鹹百品備其膳羞棟宇舟車銷金合士絲紵玄黃供其器服文以禮樂娛以八音庇物殖生罔不備設夫民用儉則易足易足則力有餘力有餘則情志泰樂治之心於是生焉事𥳑則不擾不擾則神明靈神明靈則謀慮審濟治之務於是成焉故天地以儉素訓民乾坤以易𥳑示物所以訓示慇懃若此之篤也安得與夫飛沈蠉蠕竝為眾生哉若夫眾生者取之有時用之有道行火俟風暴畋漁候豺獺祭所以順天時也大夫不麛卵庶人不數罟行葦作歌宵魚垂化所以愛人用也庖廚不邇五豝是翼殷后改祝孔釣不網所以明仁道也至於生必有死形斃神散猶春榮秋落四時代換奚有於更受形哉詩云愷悌君子求福不回言弘道之在己也三后在天言精靈之升遐也若乃內懷嗜欲外憚權教慮深方生施而望報在昔先師未之或言余固不敏罔知請事焉矣弘明集四藝文類聚二十二三代樂序正德大豫二舞蓋出於二容樂然則其聲節有古之遺音焉通典一百四十七御覽五百七十四新厤敘夫厤數之術若心所不達雖復通人前識無救其為敝也是以多歷年歲猶未能有定四分於天出三百年而盈一日積世不悟徒云建厤之本必先立元假言讖緯遂關治亂此之為蔽亦已甚矣劉歆三統法尤復疏闊方於四分六千餘年又益一日揚雄心惑其說采為太玄班固謂之最密著於漢志司馬彪因曰自太初元年始用三統厤施行百有餘年曾不憶劉歆之生不逮太初二三君子言厤幾乎不知而妄言者歟元和中穀城門候劉洪始悟四分於天疏闊更以五百八十九為紀法百四十五為斗分而造乾象法又制遲疾厤以步月行方於太初四分轉精密矣續漢律厤志下注補又見宋書厤志上釋奠頌乃昔孔顏夢周希虞自天由美異代同符經修講治研幾識理道貴崇業隆尊尚齒初學記十四社頌并序余以永初三年八月大社聊為此文社實陰祇稷惟穀元率育萬類協靈昊乾霸德方將世號共工厥有才子實曰句龍稱物平賦百姓熙雍唐堯救災決河流江棄亦播植作乂萬邦克配二祀以報勤庸勤庸伊何厚載生民倉廩既實神節斯因人亦有言因物思人矧乃大德功被陶鈞乃家乃國是奉是遵豈伊百世萬代不泯烝哉帝王肈建皇極體國經野設官分職峨峨二社列幹比殖歲云其秋晷漏均程牲牢既潔嘉薦惟馨藝文類聚三十九初學記十三御覽五百三十二白鳩頌并上表謹攷尋先典稽之前志王德所覃物以應顯是以玄扈之鳳昭帝軒之鴻烈酆宮之雀徵姬文之徽祚伏惟陛下重光嗣服永言祖武洽惠和於地絡燭皇明於天區故能九服混心萬邦含愛員神降祥方祇薦裕休珍雜沓景瑞畢臻去七月上旬時在昧旦黃暉洞照宇宙開朗徽風協律甘液灑津雖朱晃瑰瑋於運衡榮光圖靈於河紀蔑以尚茲臣不量卑懵竊慕擊壤有作相杵成謳近又豫白鳩之觀目翫奇偉心懽盛烈謹獻頌一篇野思古拙意及庸陋不足以發揮清英敷讚幽旨瞻前顧後亦各其志謹冒以聞其白鳩頌曰三極協情五靈會性理感冥符道實玄聖於赫有皇光天配命朝景升躔八維同映休祥載臻榮光播慶宇宙照爛日月光華陶山練澤是生柔嘉回尨表粹離穗合柯翩翩者鳩亦皎其暉理翮台領揚鮮帝畿匪仁莫集匪德莫歸暮從儀鳳棲閣廕闈烝哉明后昧旦乾乾惟德之崇其峻如山惟澤之瞻其潤如淵禮樂四達頌聲遐宣窮髮納貢九譯導言伊昔唐萌愛逢慶祚余生既辰而年之暮提心命耋式歌王度晨晞永風夕漱甘露思樂靈臺不遐有固宋書符瑞志下元嘉十八年八月庚午會稽山陰商世寶獲白鳩眼足竝赤揚州刺史始興王濬以獻太子率更令何承天上表天讚軒轅改物以經天人容成造厤大撓創辰龍集有次星紀乃分初學記一地讚九州攸同時維禹跡爰及後代疆分里析貢則屢遷名猶不易初學記五
