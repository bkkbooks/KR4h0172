body:
  text: 吐谷渾慕瑰請更授章策表大宋應運四海宅心臣亡兄阿豺慕義天朝款情素著去年七月五日謁者董湛至宣傳明詔顯授榮爵而臣私門不幸亡兄見背臣以懦弱負荷後任然天恩所報本在臣門若更反覆懼停信命輒拜受寵任奉遵上旨伏願詳處更授章策宋書吐谷渾傳上魏太武帝表臣誠庸弱敢竭情款俘禽僭逆獻捷王府爵秩雖崇而土不增廓車旗既飾而財不周賞願垂鑒察亮其單款臣頃接寇逆疆境之人為賊所抄流轉東下今皇化混一求還鄉土乞佛曰連窟略寒張華等三人家弱在此分乖可愍願竝敕遣使恩洽遐荒存亡感戴魏書吐谷渾傳慕瑰討擒赫連定送之京師策拜西秦王慕瑰表上表求入越巂若不自固者欲率部曲入龍涸越巂門宋書吐谷渾傳奉表謝罪臣聞生成之德含氣同係而榮悴殊途遭遇異兆至於恩降自然誠無答謝夫以狂聖道隔猶存克念之誠況君親莫二不期自感者哉每思自竭奉遵光訓丹誠未諒大謗已臻梁州刺史甄法護誣臣遣司馬飛龍擾亂西蜀諸所譖引言非一事長塗萬里無路自明風塵之聲日有滋甚與其逆生寧就清滅文武同憤制不自由遣參軍姚道賢齎書詣梁州刺史蕭思話尋續又遣詣臺歸罪道賢至西城為守兵所殺行李蔽擁日月莫照法護恇擾望風奔逃臣即回軍秋毫無犯權留少守以俟會通其後數旬官軍尋至守兵單弱懼不自免續遣輕兵共相迎接值秦流民懷土及本行將既旋不容禁制由臣約防無素以致斯闕臣本歷代守蕃世荷殊寵王化始基順天委命要名期義不在今日豈可假託妖妄毀敗成功如此之形灼然易見仰恃聖明必垂鑒察但臣微心不達迹違忠順至乃聲聞朝廷勞煩師旅負辱之深罪當誅責遠隔遐荒告謝無地謹遣兼長史齊亮聽命有司竝奉送所授第十一符策伏待天旨宋書氐胡傳元嘉十年上晉安帝表上天降禍四海分崩靈曜擁於南裔蒼生沒於醜虜陛下纍聖重光道邁周漢純風所被八表宅心臣雖被髮邊徼才非時俊謬為河右遺黎推為盟主臣之先人世荷恩寵雖歷夷嶮執義不回傾首朝陽乃心王室去冬益州刺史朱齡石遣使詣臣始具朝廷休問承車騎將軍劉裕秣馬揮戈以中原為事可謂天贊大晉篤生英輔臣聞少康之興大夏光武之復漢業皆奮劍而起衆無一旅猶能成配天之功著車攻之詠陛下據全楚之地擁荊揚之鋭而可垂拱晏然棄二京以資戎虜若六軍北軫剋復有期臣請率河西戎卒為晉右翼前驅晉書載記沮渠蒙遜傳又十六國春秋九十四上魏太武帝表伏惟陛下天縱睿聖德超百王陶育齊於二儀洪基隆於三代然鍾運多難九服紛擾神旗暫擁車書未同上靈降祐祚歸有道純風一鼓殊方革面群生幸甚率土齊欣臣誠弱才效無可録幸遇重光思竭力命自欣投老得覩盛化冀終餘年憑倚皇極前後奉表貢使相望去者杳然寂無旋返未審津塗寇險竟不仰達為天朝高遠未蒙齒録屏營戰灼無地自措往年侍郎郭祗等還奉被詔書三接之恩始隆萬里之心有賴今極難之餘開泰唯始誘勸既加引納彌篤老臣見存遐外無棄仰荷愷悌之仁俯蹈康哉之詠然商胡後至奉公卿書援引曆數安危之機厲以竇融知命之美顧惟情願實深悚惕何者臣不自揆遠託大蔭庶微誠上宣天鑒下降若萬國來庭百辟陛賀高蹈先至之端獨步知機之首但世難尚殷情願未遂章表頻修滯懷不暢許身於國款誠莫表致惑群后貽慮公卿辭旨紛紜抑引重沓不在同獎之例未達拱辰之心延首一隅低回四極臣歷觀符瑞候察天時未有過於皇魏踰於陛下加以靈啓聖姿幼登天位美詠俟於成康道化踰於文景方將振神綱以掩六合灑玄澤以潤八荒況在秦隴荼炭之餘直是老臣盡效之會魏書沮渠蒙遜傳神麚中遣尚書郎宗舒左常侍高猛朝貢上表又見十六國春秋九十四上疏於禿髮利鹿孤臣前遣奚念具披誠款而聖旨未昭復徵臣弟拿臣竊以為苟有誠信則子不為輕若其不信則弟不為重今寇難未夷不獲奉詔願陛下亮之十六國春秋九十四下書省繇務農孤以虛薄猥忝時運未能弘闡大猷戡蕩群孽使桃蟲鼓翼東京封豕蒸涉西裔戎車屢動干戈未戢農失三時之業百姓戶不粒食可蠲省百徭專功南畝明設科條務盡地方晉書載記沮渠蒙遜傳又十六國春秋九十四下書伐禿髮傉檀古先哲王應期撥亂者莫不經略八表然後光闡純風孤雖智非靖難職在濟時而狡虜傉檀鴟峙舊京毒加夷夏東苑之戮酷甚長平邊城之禍害深玁狁每念蒼生之無辜是以不遑啓處身披甲胄體倦風塵雖傾其巢穴傉檀猶未授首傉檀弟文支追項伯歸漢之義據彼重藩請為臣妾自西平以南連城繼順惟傉檀窮獸守死樂都四支既落命豈久全五緯之會已應清一之期無賒方散馬金山黎元永逸可露布遠近咸使聞知晉書載記沮渠蒙遜傳又十六國春秋九十四下書大赦孤庶憑祖廟之靈乾坤之祐濟否剝之運會拯遺黎之荼蓼上望掃清氛穢下冀保寧家福而太后不豫涉歲彌增將刑戮枉濫衆有怨乎賦役繁重時不堪乎群望不潔神所譴乎內省諸身未知罪之攸在可大赦殊死已下晉書載記沮渠蒙遜傳又十六國春秋九十六又下書大赦頃自春大旱害及時苗碧原青野倏為枯壤將刑政失中下有冤獄乎役賦繁重上天所譴乎內省多缺孤之罪也書不云乎百姓有過罪豫一人可大赦境內殊死已下晉書載記沮渠蒙遜傳又十六國春秋九十四下書伐乞伏暮末乞伏暮末頻年失信終日言笑要當一舉勦其巢穴十六國春秋九十四下令尊禮劉昞祕書郎中劉彥明學冠當時道光區內可授玄處先生之號拜以三老之禮築陸沈觀於西苑以居之躬往禮焉十六國春秋九十四下令求賢養老乞言晉文納輿人之誦所以能招禮英奇致時雍之美況孤寡德智不經遠而可不思聞讜言以自鏡哉內外臣僚其各搜揚賢雋廣進芻蕘以匡孤不逮晉書載記沮渠蒙遜傳又十六國春秋九十四襲位上表臣聞功以濟物為高非竹帛無以述德名以當實為美非諡號無以休終先臣蒙遜西復涼城澤憺崑裔芟夷群㬥清灑區夏暨運終有道備大宋之宗臣爵班九服享惟永之丕祚功名昭著克固貞節考終由正而請名之路無階懿跡雖弘而述敘之美有缺臣子痛感咸用不安謹按諡法克定禍亂曰武善聞周達曰宣先臣廓清河外勳光天府標榜稱迹實兼斯義輒上諡為武宣王若允天聽垂之史筆則幽顯荷榮始終無恨宋書大且渠蒙遜傳又十六國春秋九十五遣使求除授表臣國纍葉偏受殊恩文武良輔世蒙朝爵行冠軍將軍右賢王餘紀等十一人忠勤宜在顯進伏願垂愍竝聽賜除仍以行冠軍將軍右賢王餘紀為冠軍將軍以行征虜將軍左賢王餘昆行征虜將軍餘暈竝為征虜將軍以行輔國將軍餘都餘乂竝為輔國將軍以行龍驤將軍沐襟餘爵竝為龍驤將軍以行寧朔將軍餘流靡貴竝為寧朔將軍以行建武將軍于西餘婁竝為建武將軍宋書百濟國傳上魏獻文帝表臣建國東極豺狼隔路雖世承靈化莫由奉藩瞻望雲闕馳情罔極涼風微應伏惟皇帝陛下協和天休不勝係仰之情謹遣私署冠軍駙馬都尉弗斯侯長史餘禮龍驤將軍帶方太守司馬張茂等投舫波阻搜徑玄津託命自然之運遣進萬一之誠冀神祇垂感皇靈洪覆克達天庭宣暢臣志雖旦聞夕沒永無餘恨臣與高句麗源出夫餘先世之時篤崇舊款其祖釗輕廢鄰好親率士衆陵踐臣境臣祖須整旅電邁應機馳擊矢石暫交梟斬釗首自爾以來莫敢南顧自馮氏數終餘燼奔竄醜類漸盛遂見陵逼構怨連禍三十餘載財殫力竭轉自孱踧若天慈曲矜遠及無外速遣一將來救臣國當奉送鄙女執掃後官并遣子弟牧圉外廄尺壤匹夫不敢自有今璉有罪國自魚肉大臣彊族戮殺無已罪盈惡積民庶崩離是滅亡之期假手之秋也且馮族士馬有鳥畜之戀樂浪諸郡懷首丘之心天威一舉有征無戰臣雖不敏志效畢力當率所統承風響應且高麗不義逆詐非一外慕隗囂藩卑之辭內懷凶禍豕突之行或南通劉氏或北約蠕蠕共相脣齒謀陵王略昔唐堯至聖致罰丹水孟常稱仁不捨塗詈涓流之水宜早壅塞今若不取將貽後悔去庚辰年後臣西界小石山北國海中見尸十餘竝得衣器鞍勒視之非高麗之物後聞乃是王人來降臣國長蛇隔路以沈於海雖未委當深懷僨恚昔宋戮申舟楚莊徒跣鷂撮放鳩信陵不食克敵建名美隆無已夫以區區偏鄙猶慕萬代之信況陛下合氣天地勢傾山海豈令小豎跨塞天逵今上所得鞍一以為實驗魏書百濟國傳延興二年其王餘慶遣使上表遣使上表封國偏遠作藩於外自昔祖禰躬擐甲胄跋涉山川不遑寧處東征毛人五十五國西服衆夷六十六國渡平海北九十五國王道融泰廓土遐畿纍葉朝宗不愆於歲臣雖下愚忝胤先緒驅率所統歸崇天極道遙百濟裝治船舫而句驪無道圖欲見吞掠抄邊隸虔劉不已每致稽滯以失良風雖曰進路或通或不臣亡考濟實忿寇讎壅塞天路控弦百萬義聲感激方欲大舉奄喪父兄使垂成之功不獲一簣居在諒暗不動兵甲是以偃息未捷至今欲練甲治兵申父兄之志義士虎賁文武效功白刃交前亦所不顧若以帝德覆載摧此彊敵克靖方難無替前功竊自假開府儀同三司其餘咸假授以勸忠節宋書倭國傳升明二年遣使奉表伏承聖王信重三寶興立塔寺周滿國界城郭莊嚴清淨無穢四衢交通廣博平坦臺殿羅列狀若衆山莊嚴微妙猶如天宮聖王出時四兵見足導從無數以為守衛都人士女麗服光飾市廛豐富珍賄無量王法清整無相侵奪學徒遊集三乘競進敷演正法雲布雨潤四海流通萬國交會長江眇漫清淨深廣有生咸資莫能銷穢陰陽調和災厲不行誰有斯美大宋揚都聖王無倫臨覆上國有大慈悲子育萬物平等忍辱怨親莫二濟乏周窮無所藏積靡不照達如日之明無不受樂猶如淨月宰輔賢良群臣貞潔盡忠奉主心無異想伏惟皇帝是我真主臣是訶羅陀國王名曰堅鎧今敬稽首聖王足下惟願大王知我此心久矣非適今也山海阻遠無緣自達今故遣使表此丹誠所遣二人一名毗紉一名婆田令到天子足下堅鎧微蔑誰能知者是故今遣二人表此微心此情既果雖死猶生仰惟大國藩守曠遠我即邊方藩守之一上國臣民普蒙慈澤願垂恩逮等彼僕臣臣國先時人衆殷盛不為諸國所見陵迫今轉衰弱鄰國競侵伏願聖王遠垂覆護竝市易往反不為禁閉若見哀念願時遣還令此諸國不見輕侮亦令大王名聲普聞扶危救弱正是今日今遣二人是臣同心有所宣啓誠實可信願敕廣州時遣舶還不令所在有所陵奪願自今以後賜年年奉使今奉微物願垂哀納宋書夷蠻傳西南夷阿羅陀國元嘉七年遣使奉表常勝天子陛下諸佛世尊常樂安隱三達六通為世間道是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山村邑聚落次第羅匝城廓館宇如忉利天宮宮殿高廣樓閣莊嚴四兵具足能伏怨敵國土豐樂無諸患難奉承先王正法治化人民良善慶無不利處雪山陰雪水流注百川洋溢八味清淨周匝屈曲順趣大海一切衆生咸得受用於諸國土殊勝第一是名震旦大宋揚都承嗣常勝大王之業德合天心仁廕四海聖智周備化無不順雖人是天護世降生功德寶藏大悲救世為我尊主常勝天子是故至誠五體敬禮呵羅單國王毗沙跋摩稽首問訊宋書夷蠻傳元嘉十年又上表大吉天子足下離淫怒癡哀愍群生想好具足天龍神等恭敬供養世尊威德身光明照如水中月如日初闕閒自蒙普照十方其白如雪亦如月光清淨如華顏色照耀威儀殊勝諸天龍神之所恭敬以正奉寶梵行衆僧莊嚴國土人民熾盛安隱快樂城閣高峻如乾他山衆多勇士守護此城樓閣莊嚴道巷平正箸種種衣猶如天服於一切國為最殊勝吉揚州城無憂天主愍念群生安樂民人律儀清淨慈心深廣正法治化供養三寶名稱遠至一切竝聞民人樂見如月初生譬如梵王世界之主一切人天恭敬作禮呵羅單跋摩以頂禮足猶如現前以體布地如殿陛道供養恭敬如奉世尊以頂著地曲躬問訊忝承先業嘉慶無量忽為惡子所見爭奪遂失本國今唯一心歸誠天子以自存命今遣毗紉問訊大家意欲自往歸誠宣訴復畏大海風波不達今命得存亦由毗紉此人忠志其恩難報此是大家國今為惡子所奪而見驅擯意頗忿惋規欲雪復伏願大家聽毗紉買諸鎧仗袍襖及馬願為料理毗紉使得時還前遣闍邪仙婆羅訶蒙大家厚賜悉惡子奪去啓大家使知今奉薄獻願垂納受宋書夷蠻傳毗沙跋摩為子所篡奪十三年又上表遣使奉表謹白大宋明主雖山海殊隔而音信時通伏承皇帝道德高遠覆載同於天地明照齊乎日月四海之外無往不伏方國諸王莫不遣信奉獻以表歸德之誠或泛海三年陸行千日畏威懷德無遠不至我先王以來唯以修德為正不嚴而治奉事三寶道濟天下欣人為善慶若在己欲與天子共弘正法以度難化故託四道人遣二白衣送牙臺像以為信誓信還願垂音告宋書夷蠻傳元嘉五年宋國大主大吉天子足下敬禮一切種智安隱天人師降伏四魔成等正覺轉尊法輪度脫衆生教化已周入於涅槃舍利流布起無量塔衆寶莊嚴如須彌山經法流布如日照明無量淨僧猶如列宿國界廣大民人衆多宮殿城郭如忉利天宮名大宋揚州大國大吉天子安處其中紹繼先聖王有四海閻浮提內莫不來服悉以茲水普飲一切我雖在遠亦霑靈潤是以雖隔巨海常遙臣屬願照至誠垂哀納受若蒙聽許當年遣信若有所須惟命是獻伏願信受不生異想今遣使至佛大阤婆副使葛抵奉宣微誠稽首敬禮大吉天子足下阤婆所啓願見信受諸有所請惟願賜聽今奉微物以表微心宋書夷蠻傳元嘉十二年伏聞彼國據江傍海山川周固衆妙悉備莊嚴清淨猶如化城宮殿莊嚴街巷平坦人民充滿歡娛安樂聖王出遊四海隨從聖明仁愛不害衆生萬邦歸仰國富如海國中衆生奉順正法大王仁聖化之以道慈施群生無所遺惜帝修淨戒軌道不及無上法船濟諸沈溺群僚百官受樂無怨諸天擁護萬神侍衛天魔降伏莫不歸化王身莊嚴如日初出仁澤普潤猶如大雪聖賢承業如日月天於彼真丹最為殊勝臣之所住名迦毗河東際於海其城四邊悉紫紺石首羅天護令國安隱國王相承未嘗斷絶國中人民率皆修善諸國來集共遵道法諸寺舍中皆七寶形像衆妙供具如先王法臣自修檢不犯道禁臣名月愛棄世王種惟願大王聖體和善群臣百官悉自安隱今以此國群臣吏民山川珍寶一切歸屬五體歸誠大王足下山海遐隔無由朝覲宗仰之至遣使下承使主父名天魔悉達使主名尼阤達此人由來良善忠信是故今遣奉使表誠大王若有所須珍奇異物悉當奉送此之境土便是王國王之法令治國善道悉當承用願二國信使往來不絶此反使還願賜一使具宣聖命備敕所宜款至之誠望不空反所白如是願加哀愍奉獻金剛指鐶摩勒金鐶諸寶物赤白鸚鵡各一頭宋書夷蠻傳元嘉五年
