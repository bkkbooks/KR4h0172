body:
  text: 鮑照蕪城賦濔迆平原南馳蒼梧漲海北走紫塞鴈門柂以漕渠軸以崑岡重關復江之奧四會五達之莊當昔全盛之時車掛轊人駕肩廛閈撲地歌吹沸天孳貨鹽田鏟利銅山才力雄富士馬精妍故能侈秦法佚周令劃崇墉刳濬洫圖修世以休命是以板築雉堞之殷井幹烽櫓之勤格高五嶽袤廣三墳崒若斷岸矗似長雲製磁石以禦衝糊赬壤以飛文觀基扃之固護將萬祀而一君出入三代五百餘載竟瓜割而豆分澤葵依井荒葛罥塗壇羅虺蜮階鬭麇鼯木魅山鬼野鼠城狐風嘷雨嘯昏見晨趨饑鷹礪吻寒鴟嚇雛伏暴藏虎乳血餐膚崩榛塞路崢嶸古馗白楊早落塞草前衰稜稜霜氣朿朿風威孤蓬自振驚沙坐飛灌莽杳而無際叢薄紛其相依通池既已夷峻隅又已頽直視千里外唯見起黃埃凝思寂聽心傷已摧若夫藻扃黼帳歌堂舞閣之基璇淵碧樹弋林釣渚之館吳蔡齊秦之聲魚龍爵馬之玩皆薰歇燼滅光沉響絶東都妙姬南國佳人蕙心紈質玉貌絳脣莫不埋魂幽石委骨窮塵豈憶同輦之愈樂離宮之苦辛哉天道如何吞恨者多抽琴命操為蕪城之歌歌曰邊風起兮城上寒井徑滅兮丘隴殘千齡兮萬代共盡兮何言遊思賦雲徑兮海衝上潮兮送風秋水兮駕浦涼煙兮冒江暮氣起兮遠岸黑陽精滅兮天際紅波沄沄兮無底山森森兮萬重平隰兮亘岸通川兮瀉壑仰盡兮天經俯窮兮地絡望波際兮曇曇眺雲間兮灼灼乃江南之斷山信海上之飛鶴指煙霞而問鄉窺林嶼而訪泊撫身事而識苦念親愛而知樂苦與樂其何言悼人生之長役捨堂宇之密親坐江潭而為客對蒹葭之遂黃視零露之方白鴻晨驚以響湍泉夜下而鳴石結中洲之雲蘿託綿思於遙夕瞻荊吳之遠山望邯鄲之長陌塞風馳兮邊草飛胡沙起兮鴈揚翮雖燕越之異心在禽鳥而同戚悵收情而抆淚遣繁悲而自抑此日中其幾時彼月滿而將蝕生無患於不老奚引憂以自逼物因節以卷舒道與運而升息賤賣卜以當壚隱我耕而子織誠愛秦王之奇勇不願絶筋而稱力已矣哉使豫章生而可知夫何異乎叢棘傷逝賦晨登南山望美中阿露團秋槿風卷寒蘿悽愴傷心悲如之何盡若窮煙離若剪絃如影滅地猶星殞天棄華宇於明世閉金扃於下泉永山河以自畢眇千齡而弗旋思一言於向時邈衆代於古年逝稍遠而變體浸幽明而改時覽篇迹之如旦婉遺意而在茲忽若謂其不然自惆悵而驚疑循堂廡而下降歷幃戶而升基服委襟而褫帶器蒙管而韜絲志存業而遺績身先物而長辭豈重歡而可覯追前感之無期寒往暑來而不窮哀極樂反而有終燧已遷而禮革月既逾而慶通心微微而就遠跡離離而絶容白日藹而回陰閨館寂而深重冀憑靈於前物佇美目乎房櫳徒望思以永久邈歸來其何從結單心於暮條掩行淚於晨風念沉悼而誰劇獨嬰哀於逝躬草忌霜而逼秋人惡老而逼衰誠衰耄之可忌或甘願而志違彼一息之短景乃纍恨之長暉尋平生之好醜成黃塵之是非將滅耶而尚在何有去而無歸惟桃李之零落生有促而非夭觀龜鵠之千祀年能富而情少反靈質於二塗亂感悅於雙抱日月飄而不留命倏忽而誰保譬明隙之在梁如風露之停草髮迎憂而送華貌先悴而收藻共甘苦其幾人曾無得而偕老拂埃琴而抽思啓陳書而遐討自古來而有之夫何怨乎天道觀漏賦并序客有觀於漏者退而歎曰夫及遠者箭也而定遠非箭之功為生者我也而制生非我之情故自箭而為心不可憑者絃因生以觀我不可恃者年憑其不可恃故以悲哉況乎沉華密遠輕波潛耗而感神嬰慮者又自外而傷壽以是思生生亦勤矣乃為賦云佩流歎於馳年纓華思於奔月結蘭苕以望楚弄參差以歌越撫凝肌於遷滯鑑雕容於髣佛景有墜而易昏憂無方而難歇歷玫階而升隩訪金壺之盈闕觀騰波之吞寫視驚箭之登沒箭既沒而復登波長瀉而弗歸注沉穴而海漏射懸塗而電飛墐戶牖而知天掩雲霧而測暉創百齡於纖隱積千里於空微彼崢崢而行溢此冉冉而逾衰撫寸心而未改指分光而永違昔傷矢之奔禽聞虛弦之顛仆徒嬰刃而知懼豈潛機之能覺惟生經之靃靡亦悲長而歡促橫證古而秉心抱空意其如玉波沉沉而東注日滔滔而西屬落繁馨於纖草殞豐華於喬木對昃離而後歌據窮蹊而方哭雖接薪之更傳寧絶明之還續貫古今而并念信寡易而多難時不留乎激矢生乃急於走丸既河源之莫壅又吹波而助瀾神怵迥而多慮心𨍜𨎹而鮮歡望天涯而佇念擢雄劍而長歎嗟生民之永迷躬與後而皆恤死零落而無二生差池之非一理幽分於化前算冥定於天秩與艾骨而招病猶刳腸而興疾情殊用而俱盡事離方而同失聊弭志以高歌順煙雨而沉逸於是隨秋鴻而泛渚逐春燕而登梁進賦詩而展念退陳酒以排傷物不可以兩大時無得而雙昌薰晚華而後落槿早秀而前亡姑屏憂以愈思樂茲情於寸光從江河之紆直委天地之圓方漏盈兮漏虛長無絶兮芬芳芙蓉賦感衣裳於楚賦詠憂思於陳詩訪群英之豔絶標高名於澤芝會春陂乎夕張搴芙蓉而水嬉抽我襟之桂蘭點子吻之瑜辭選群芳之徽號抱茲性之清芬稟若華之驚絶單蓲陽之妙手測淲池之光潔爍彤輝之明媚粲雕霞之繁悅顧椒丘而非偶豈園桃而能埒彪炳以蒨藻翠景而紅波青房兮規接紫的兮圓羅樹妖遙之弱幹散菡萏之輕荷上星光而倒景下龍鱗而隱波戲錦鱗而夕映曜繡羽以晨過結遊童之湘吹起榜妾之江歌備日月之溫麗非盛明而謂何若乃當融風之暄蕩承暑雨之平渥被瑤塘之周流繞金渠之屈曲排積霧而楊芬鏡洞泉而含緑葉折水以為珠條集露而成玉潤蓬山之瓊膏輝蔥河之銀燭冠五華於仙草超四照於靈木雜衆姿於開卷閲群貌於昏明無長袖之容止信不笑之空城森紫葉以上擢紛湘蕊而下傾根雖割而琯徹柯既解而絲縈感盛衰之可懷質始終而常清故其為芳也綢繆其為媚也奔發對粧則色姝比蘭則香越泛明綵於宵波飛澄華於曉月陋荊姬之朱顏笑夏女之光髮恨狎世而貽賤徒愛存而賞沒雖凌群以擅奇終從歲而零歇園葵賦風暖凌開土冒泉動游塵曝日鳴雉依隴主人拂黃冠拭藜杖布蔬種平圻壤通畔修直膏畝夷敞白莖紫蒂豚耳鴨掌溝東陌西行三畦兩既區既鉏乃露乃映句萌欲伸叢芽將散爾乃晨露夕陰霏雲四委沉雷遠震飛雨輕灑徐未及晞疾而不靡柔莩爰秀剛甲以解稚葉萍布弱陰競抽萋萋翼翼沃沃油油下葳蕤而被徑上參差而覆疇承朝陽之麗景得傾柯之所投仕非魯相有不拔之利賓惟二仲無逸馬之憂顧堇荼而莫偶豈蘋藻之薦羞若乃鄰老談稼女嫗歸桑拂此葦席炊彼穄粱甃壺援醢曲瓢卷漿乃羹乃瀹堆鼎盈筐甘旨蒨脆柔滑芬芳消淋逐水潤胃調腸於是既飫徹盤投筯回小人之腹為君子之慮近觀物運遠訪師聖聲數後彰律理前定烏非黔黑鶴豈浴淨彼圓行而方止固得之於天性伊冬箑而夏裘無雙功而並盛蕩然任心樂道安命春風夕來秋日晨映獨酌南軒擁琴孤聽篇章間作以歌以詠魚深沉而鳥高飛孰知美色之為正舞鶴賦散幽經以驗物偉胎化之仙禽鍾浮曠之藻質抱清迥之明心指蓬壺而翻翰望崑閬而揚音匝日域以回騖窮天步而高尋踐神區其既遠積靈祀而方多精含丹而星耀頂凝紫而煙華引圓吭之纖婉頓修趾之鴻姱疊霜毛而弄影振玉羽而臨霞朝戲於芝田夕飲乎瑤池厭江海而遊澤掩雲羅而見羈去帝鄉之岑寂歸人寰之喧卑歲崢嶸而催暮心惆悵而哀離於是窮陰殺節急景凋年涼沙振野箕風動天嚴嚴苦霧皎皎悲泉冰塞長河雪滿群山既而氛昏夜歇景物澄廓星翻漢回曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼唳清響於丹墀舞飛容於金閣始連軒以鳳蹌終宛轉而龍躍躑躅徘徊振迅騰摧驚身蓬集矯翅雪飛離網別赴合渚相依將興中止若往而歸颯沓矜顧遷延遲暮逸翮後塵翱翥先路指會規翔臨歧矩步態有遺妍貌無停趣奔機逗節角睞分形揚翹緩騖並翼連聲輕迹凌亂浮影交橫衆變繁姿參差洊密煙交霧凝若無毛質風去雨還不可談悉既散魂而蕩目迷不知其所之忽星離而雲羅整神容而自持仰天居之崇絶更惆惕而驚思當是時也燕姬色沮巴僮心恥巾拂兩停九劍雙止雖邯鄲其敢倫豈陽阿之能擬入衛國而乘軒出吳都而傾市守馴養於千齡結長悲於萬里野鵝賦并序有獻野鵝於臨川王世子愍其樊縶命為之賦其辭曰集陳之隼以自遠而稱神栖漢之雀乃出幽而見珍此璅禽其何取亦廁景而承仁捨水澤之歡逸對鍾鼓之悲辛豈狥利而輕命將感愛而投身入長羅之逼脅恨高繳之樊縈邈辭朋而別偶超煙鶩而風行跨日月而遙逝忽瞻國而望城踐菲迹於瑤塗升弱羽於丹庭瞰東西之繡戶眺左右之金扃貌纖殺而含悴心翻越而慚驚若墜淵而墮谷恍不知其所寧惟君囿之珍麗實妙物之所殷翔海澤之輕鷗巢天宿之鳴鶉鶡程材於梟猛翬薦體之雕文既敷容以照景亦選翮以排雲雖居物以成偶終在我以非群望征雲而延悼顧委翼而自傷無青雀之銜命乏赤鴈之嘉祥空穢君之園池徒慚君之稻粱願引身而剪迹抱末志而幽藏於是流歲遂遠慘節方崇雲纏海岱風拂崤潼飛雲馳霰飄沙舞蓬視清池之初涸望緑林之始空立菰蒲之寒渚託隻影而為雙宛拔啄而掩眥悲結悵而滿胸處朝晝而雖念假外見而遷排涉修夜之長寂信專思而知哀風梢梢而過樹月蒼蒼而照臺冰依岸而早結霜託草而先摧斂雙翮於水裔翹孤趾於林隈情無方而雨集事有限而星乖在俄頃而猶悼矧窮生之所懷聞宿世之高賢澤無微而不均育草木而明義愛禽鳥而昭仁全殞卵而來鳳放乳麑而感麟雖陋生於萬物若沙漠之一塵苟全軀而畢命庶魂報以自申尺蠖賦智哉尺蠖觀機而作申非向厚屈非向薄當靜泉渟遇躁風驚起軒軀以曠跨伏纍氣而併形冰炭弗觸鋒刃靡忤逢嶮蹙蹐值夷舒步忌好退之見猜哀必進而為蠹每驤首以瞰途常佇景而翻路故身不豫託地無前期動靜必觀於物消息各隨乎時從方而應何慮何思是以軍算慕其權國容擬其變高賢圖之以隱淪智士以之而藏見笑靈蛇之久蟄羞龍德之方戰理害道而為尤事傷生而感賤苟見義而守勇豈專取於弦箭飛蛾賦仙鼠伺暗飛蛾候明均靈舛化詭欲齊生觀齊生而欲詭各會性以憑方陵燋煙之浮景赴熙焰之明光拔身幽草下畢命在此堂本輕死以邀得雖糜爛其何傷豈學山南之文豹避雲霧而巖藏為柳令謝驃騎表臣言伏承詔書加臣驃騎將軍餘如故顧循空薄屢墜成命仰當天寵伏抱慚灼臣素陋人本絶分望適野謝山川之志輟耕無鴻鵠之歎宦希鄉部富期農牧夙當昌朝早值恩洽天綱紛橫皇曆歸聖左輪不殷良馬未汗功半下列爵超上賞奮迹騰光參駕龍服翰起雲飛拂翼虹路雖曩之脫駕拖紫捨擔丹轂方之微臣彼安足齒齊此而歸懼塵王度況遂頻煩重彰濫越伏願天德曲成資始令終雨露之惠自華及殞特屈慈獎降申愚固則綢繆之施復踰造物不勝感躍惶駭之情謹拜表以聞解褐謝侍郎表臣照言臣孤門賤生操無炯迹鶉棲草澤情不及官不悟天明廣矚騰滯援沉觀光幽節聞道朝年榮多身限思非終報臣云云謝秣陵令表臣照言即日被尚書召以臣為秣陵令臣負插下農執羈末皂情有局塗志無遠立遘命逢天得汙官牒不悟恩澤無窮謬當獎試用謝刀筆猥承宰職豈是暗懦所能克任今便祗召違離省闥係戀罔極不勝下情謹拜表以聞謝隨恩被原表臣言即日被曹宣命元統內外五刑以下浩澤蕩汰臣亦預焉得從漢律故謬之辨暗遭周典肆眚之科大喜卒至非願所圖魚愕雞睨且悚且慚臣誠下愚不達義方然君尊臣泰豈同犬馬且常侍臣淵穆疏草即臣所作助人為恭猶加敬憶自己率禮寧敢慢忘由臣悴賤可悔可誣曾參殺人臣豈無過寢病幽栖無援朝列身孤節卑易成論硋幸大明臨下仁道育物澤洎翾走臣覃末慶然古人有言楊者易生之木也一人植之十人拔之無生楊矣何則植之者難拔之者易況臣一植之功不立衆拔之過屢至同彼風霜異此貞脆書稱天秩有禮易載神福在謙臣之謙禮理謝福秩仰銜俯愧行歎坐戚即欲顛沛拜恩下庭但臣病久柴羸不堪冒涉小得趨馳星駕登路不勝荷佩之誠謹上疏以聞侍郎上疏臣言臣北州衰淪身地孤賤衆善必達百行無一生丁昌運自比人曹操乏端概業謝成迹徂年空往瑣心靡述褫轡投簪於斯終志束菜負薪期與相畢安此定命忝彼公朝不悟乾羅廣收圓明兼覽雕瓠飾笙備雲和之品潢汙流藻充金鼎之實鎩羽暴鱗復見翻躍枯楊寒炭遂起煙華未識微躬猥能及此未知陋生何以為報祗奉恩命憂愧增灼不勝感荷屏營之情謹詣閣拜疏以聞謝解禁止臣言被宣令解臣禁止天光鄭重不可勝逢飛走知感矧臣人類臣聞獲過于神或憑尸祝以請得罪於君可因左右而謝臣自惟孤賤盜幸榮級暗澀大誼猖狂世禮奇非阮籍無保持之助才愧馮衍有𨍜𨎹之困自非聖朝超然覽臣於視聽之外則今日渥澤更成妄遭來辰萎葉終先朝草小人歲暮知能何報徒厚恩華憂懼歎息不任下情謹詣拜疏以聞侍郎滿辭閣臣言臣所居職限滿今便收迹金閨雲路從茲自遠鮪𩷏沉藏方絶光景祗戀遲回結涕濡泗臣嚚機窮賤情嗜踳昧身弱涓氂地幽井谷本應守業墾疁剿芿牧雞圈豕以給征賦而幼性猖狂因頑慕勇釋擔受書廢耕學文畫虎既敗學步無成反拙歸跂還陋燕雀日晏途繞塊然自喪加以無良根孤伎薄既同馮衍負困之纍復抱相如痟渴之疾志逐運離事與衰合束馬埋輪絶遊息世宿福餘慶爰遘聖明煦蒸霜霰莩甲雲露得從下走叨迹人行操勒負羈班榮扈隸矜愚訓短哀宥弗及奉此而歸足以沒齒雖摩肌髮無報天德更冀營魂遠能結草不勝感戀之情謹詣闕拜疏奉辭以聞轉常侍上疏臣言即日被中曹板轉臣為左常侍臣自惟常人觸事無可謬被拔擢實為光榮臣既無髣佛上報殊絶之恩有分每豐其過前後輕重輒得原恕獎以君子之方赦其不間教訓大愆不責矜澤必加是臣所以夙夜自念知遭遇之至深至厚也未冀未望便荷今榮欣喜感悅不敢僞讓庶保終始身命為初不勝下情謹詣閣拜疏謝以聞征北世子誕育上疏臣等言臣聞本枝無疆布諸前典衆多彌貴信之華封故德積則慶深業昌則祚廣伏承王子以中氣正月鍾靈納和誕躬紫閣膺祚朱紱弧矢夙陳圭璋攸覿雲光麗輝巖澤昭采嘉祥爰孚柔顏載睟凡在氓隸莫不抃悅臣霑恩踰物慶倍自中不勝殊歡溢喜謹奉表以聞皇孫誕育上疏兼郎中令侍郎臣等言伏承東儲積慶皇孫誕育國啓昌期民迎福運臺禁稱祉井廬相賀伏惟聖懷載深鴻悆不任下情謹詣閣上疏以聞
