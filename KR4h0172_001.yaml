body:
  text: 武帝除冶士制有無故自殘傷者補冶士實由政刑煩苛民不堪命可除此條宋書武帝紀下矯晉安帝詔劉毅包藏禍心構逆南夏藩混助亂志肆姦宄賴宰輔玄鑒撫機挫鋭凶黨即戮社稷乂安夫好生之德所因者本肆眚覃仁實資玄澤況事興大憝禍自元凶其大赦天下唯劉毅不在其例竝增文武位一等孝順忠義隱滯遺逸必令聞達晉書安帝紀八年九月己卯太尉劉裕害右將軍兗州刺史劉藩尚書左僕射謝混庚辰裕矯詔矯安帝遺詔唯我有晉誕膺明命業隆九有光宅四海朕以不德屬當多難幸賴宰輔拯厥顛覆仍恃保祐克黜禍亂遂冕旒辰極混一六合方憑阿衡惟新洪業而遘疾大漸將遂弗興仰惟祖宗靈命親賢是荷咨爾大司馬琅邪王體自先皇明德光懋屬惟儲二衆望攸集其君臨晉邦奉係宗祀允執其中燮和天下闡揚末誥無廢我高祖之景命晉書恭帝紀安帝崩劉俗矯稱詔即位詔夫世代迭興承天統極雖遭遇異塗因革殊事若乃功濟區宇道振生民興廢所階異世一揆朕以寡薄屬當艱運藉否終之期因士民之功用獲拯溺匡世撥亂安國寧民業未半古功參曩烈晉氏以多難仍遘曆運已移欽若前王憲章令軌用集大命於朕躬惟德匪嗣辭不獲申遂祗順三靈饗茲景祚燔柴於南郊受終於文祖猥當與能之期爰集樂推之運嘉祚肇開隆慶惟始思俾休嘉惠茲兆庶其大赦天下改晉元熙二年為永初元年賜民爵二級鰥寡孤獨不能自存者人穀五斛逋租宿債勿復收其有犯鄉論清議贓汙淫盜一皆蕩滌洗除與之更始長徒之身特皆原遣亡官失爵禁錮奪勞一依舊準宋書武帝紀下降封晉世名臣後裔詔夫微禹之感歎深後昆盛德必祀道隆百世晉氏封爵咸隨運改至於德參微管勳濟蒼生愛人懷樹猶或勿翦雖在異代義無泯絶降殺之儀一依前典可降始興公封始興縣公廬陵公封柴桑縣公各千戶始安公封荔浦縣侯長沙公封醴陵縣侯康樂公可即封縣侯各五百戶以奉晉故丞相王導太傅謝安大將軍溫嶠大司馬陶侃車騎將軍謝玄之祀其宣力義熙豫同艱難者一依本秩無所減降宋書武帝紀下又略見南史宋本紀一封功臣詔夫銘功紀勞有國之要典慎終追舊在心之所隆自大業創基十有七載世路迍邅戎車歲動自東徂西靡有寧日實賴將帥心竭心文武盡效寧內拓外迄用有成威靈遠著寇逆消蕩遂當揖讓之禮猥饗天人之祚念功簡勞無忘鑒寐凡厥誠勤宜同國慶其酬賞復除之科以時論舉戰亡之身厚加復贈宋書武帝紀下追封劉穆之等詔故侍中司徒南昌侯劉穆之深謀遠猷肇基王迹勳造大業誠實匪躬今理運維新蕃屏竝肇感事懷人實深悽悼可進南康郡公邑三千戶故在將軍青州刺史王鎮惡荊郢之捷剋翦放命北伐之勳參迹方叔念勤惟績無忘厥心可進龍陽縣侯增邑千五百戶宋書劉穆之傳高祖受禪思佐命元勳下詔下劉遵考詔遵考服屬之親國戚未遠宗室無多宜蒙寵爵可營浦縣侯食邑五百戶以本號為彭城沛三郡太守宋書劉遵考傳高祖初即位下詔封佐命功臣徐羡之等詔散騎常侍尚書僕射鎮軍將軍丹陽尹徐羡之監江州刺史華容侯王弘散騎常侍護軍將軍作唐男檀濟中書令領太子詹事傅亮侍中中領軍謝晦前左將軍江州刺史宜陽侯檀韶使持節雍梁南北秦四州荊州之河北諸軍事後將軍雍州刺史關中侯趙倫之使持節督北徐兗青三州諸軍事征虜將軍北徐州刺史南城男劉懷慎散騎常侍領太子左衛率新淦侯王仲德前冠軍將軍北青州刺史安南男血彌左衛將軍灄陽男劉粹使持節南蠻校尉佷山子到彥之西中郎司馬南郡宜陽侯張劭參西中郎將軍事建將威軍河東太守資中侯沈林子等或忠規遠謀扶贊洪業或肆勤樹績弘濟艱難經始圖終勳烈惟茂竝宜與國同休饗茲大賚羡之可封南昌縣公弘可華容縣公道濟可改封永修縣公亮可建城縣公晦可武昌縣公食邑各二千戶韶可更增邑二千五百戶仲德可增邑二千二百戶懷慎彥之各進爵為侯粹改封建安縣侯竝增邑為千戶倫之可封霄城縣侯食邑千戶劭可封臨沮縣伯林子可封漢壽縣伯食邑六百戶開國之制率遵舊章宋書徐羡之傳上初即位思佐命之功下詔下高句驪王高璉等詔使持節都督營州諸軍事征東將軍高句驪王樂浪公璉使持節督百濟諸軍事鎮東將軍百濟王映竝執義海外遠修貢職惟新告始宜荷國休璉可征東大將軍映可鎮東大將軍持節都督王公如故宋書東夷高句驪傳高祖踐阼下詔下褚叔度詔夫賞不遺勤則勞臣增勸爵必疇庸故在功咸達叔度南北征討常管戎要西夏不虔誠著嶺表可封番禺縣男食邑四百戶宋書褚叔度傳高祖受命下詔遣大使巡行詔古之王者巡狩省方躬覽民物搜揚幽隱拯災恤患用能風澤遐被遠至邇安朕以寡暗道謝前哲因受終之期託兆庶之上鑒寐屬慮思求民瘼才弱事艱若無津濟夕惕永念心馳遐域可遣大使分行四方旌賢舉善問所疾苦其有獄訟虧濫政刑乖愆傷化擾治未允民聽者皆當具以事聞萬事之宜無失厥中畼朝廷乃眷之旨宣下民雍隔之情宋書武帝紀下增俸詔百官事殷俸薄祿不代耕雖國儲未豐要令公私周濟諸供納昔減半者可悉復舊六軍見祿粗可不在此例其餘官寮或自本俸素少者亦疇量增之宋書武帝紀下定刑詔往者軍國務殷事有權制劫科峻重施之一時今王道維新政和法簡可一除之還遵舊條反叛淫盜三犯補冶士本謂一事三犯終無悛革主者頃多并數衆事合而為三甚違立制之旨普更申明宋書武帝紀下復彭沛下邳詔彭沛下邳三郡首事所基情義繾綣事由情獎古今所同彭城桑梓本鄉加隆攸在優復之制宜同豐沛其沛郡下邳可復租布三十年宋書武帝紀下又略見南史宋本紀一肆赦詔朕承曆受終猥饗天命荷積善之祚藉士民之功率由令範先后祗嚴宣訓七廟肇建情敬無違加以儲宮備禮皇基彌固國慶家禮爰集旬日豈豫一人獨荷茲慶其見刑罪無輕重可悉原赦限百日以今為始先因軍事所發奴僮各還本主若死亡及勳勞破免亦依限還直宋書武帝紀下灑掃前世諸陵墓詔晉世帝后及藩王諸陵守衛宜便置格其名賢先哲見優前代或立德著節或寧亂庇民墳塋未遠竝宜灑掃主者具條以聞宋書武帝紀下下衆官詔主者處案雖多所咨詳若衆官命議宜令明審自頃或總稱參詳於文漫略自今有厝意者皆當指名其人所見不同依舊繼啓宋書武帝紀下停冬使詔諸處冬使或遣或不事役宜省可悉停唯元正大慶不在其例郡縣遣冬使詣州及都督府亦停之宋書武帝紀下慶冬使或遣不役宜省今可悉停唯元正大慶不得廢耳郡縣冬使詣州及都督府者亦宜同停宋書禮志一下除廣詔祕書監徐廣學優行謹歷位恭肅可中散大夫宋書徐廣傳除淫祠詔淫祠惑民費財前典所絶可竝下在所除諸房廟其先賢及以勳德立祠者不在此例宋書武帝紀下定刑詔杖罰雖有舊科然職務殷碎推坐相尋若皆有其實則體所不堪文行而已又非設罰之意可籌量粗為中否之格宋書武帝紀下除連坐法詔兵制峻重務在得宜役身死叛輒考傍親流遷彌廣未見其極遂令冠帶之倫淪陷非所宜革以弘泰去其密科自今犯罪充兵合舉戶從役者便付營押領其有戶統及謫止一身者不得復侵濫服親以相連染宋書武帝紀下下倭國詔倭讚萬里修貢遠誠宜甄可賜除授宋書倭國傳推恩外戚詔推恩之禮在情所同故內樹宗子外崇后屬爰自漢魏咸遵斯典外祖趙光祿蕭光祿名器雖隆茅土未建竝宜追封開國縣侯食邑五百戶宋書孝穆趙后傳詔報孔琳之小人難可檢御司空無所問餘如奏宋書孔琳之傳原刑詔刑罰無輕重悉皆原降宋書武帝紀下分立南豫州詔豫州南臨江滸北接河洛民荒境曠轉輸艱遠撫蒞之宜各有其使淮西諸郡可立為豫州自淮以東為南豫州以豫州刺史彭城王義康為南豫州刺史征虜將軍劉粹為豫州刺史宋書武帝紀下封徐湛之詔永興公主一門嫡長早罹辛苦外孫湛之特所鍾愛且致節之胤情實兼常可封枝江縣侯食邑五百戶宋書徐湛之傳下沈林子詔軍國多務內外須才前鎮西咨議建威將軍河東太守沈林子不得遂其情事可輔國將軍起宋書自序林子遭母憂還東葬乘輿躬幸信使相望葬畢即下詔恤沈林子詔故輔國將軍沈林子器懷真密忠績允著才志未遂傷悼在懷可追贈征虜將軍宋書自序此詔末有句云有司率常典也似非詔中語俟再審定詔少府少府前歲所封諸洲蘆荻可開以利民藝文類聚八十二停省縣尉詔百里之任總歸官長縣尉實效甚微其貴不少二品縣可置一尉而已餘悉停省御覽二百七十詔答鄭鮮之勞足下勤至吾初不擇日疾甚下手詔朝廷不須復有別府宰相帶揚州可置甲士千人若大臣中任要宜有爪牙以備不祥人者可以臺見隊給之有征討悉配以臺見軍隊行還復舊後世若有幼主朝事一委宰相母后不煩臨朝仗既不許入臺殿門要重人可詳給班劍宋書武帝紀下南史宋本紀一敕孫季高大軍十二月之交必破妖虜卿今時當至廣州傾其巢穴令賊奔走之日無所歸投宋書武帝紀上敕裴松之裴松之廊廟之才不宜久尸邊務今召為世子洗馬與殷景仁同可令知之宋書裴松之傳既克洛陽高祖敕敕諸公慰視沈林子其至性過人卿等數視之宋書自序上以林子孝性不欲使器泣減損逼與人省日夕撫忍敕諸公即位告天策皇帝臣裕敢用玄牡昭告皇天后帝晉帝以卜世告終曆數有歸欽若景運以命於裕夫樹君宰世天下為公德充帝王樂推攸集越俶唐虞降暨漢魏靡不以上哲格文祖元勳陟帝位故能大拯黔首垂訓無窮晉自東遷四維不振宰輔憑依為日已久難棘隆安禍成元興遂至帝主遷播宗祀堙滅裕雖地非齊晉衆無一旅仰憤時難俯悼橫流投袂一援則皇祀克復及危而能持顛而能扶姦究具殲僭僞必滅誠興廢有期否終有數至於大造晉室撥亂濟民因藉時來實尸其重加以殊俗慕義重譯來庭正朔所暨咸服聲教至乃三靈垂象山川告祥人神協祉歲月滋著是以群公卿士億兆夷人僉曰皇靈降鑒於上晉朝款誠於下天命不可以久淹宸極不可以暫曠遂逼群議恭茲大禮猥以寡德託於兆民之上雖仰畏天威略是小節顧探永懷祗懼若霣敬簡元辰升壇受禪告類上帝用酬萬國之情克隆天保永祚於有宋惟明靈是饗宋書武帝紀下又禮志三萬國之情作萬國之嘉望又見南史宋本紀一追尊皇考策維永初元年七月皇帝謹遣某官某奉策上皇考尊號曰孝穆皇帝仰惟聖靈邈焉徂遠昔有周丕崇祚興昌季其在魏晉亦申情禮所以聿追來孝所因者本謹稽式上代考諸諸令準稱謂既極情典攸遂所以仰順天人俯穆率土在心遠慕庶云有慰通典七十二追尊先后策維年月朔皇帝謹遣某官某奉策上皇妣尊號曰孝穆皇后伏維皇妣資坤厚之性體母儀之德等美姜嫄齊列任姒訓穆中閨化流自遠膺曆運期饗茲天位謹依前典敬奉大禮仰慕聖善之愛俯增蓼莪之思通典七十二入京城令預是彭沛饗人赴義者竝可依劉主簿宋書劉鍾傳義旗將建高祖版劉鍾為郡主簿明日從入京城將向京邑祖令云徵戴顒等令前大尉參軍戴顒辟士韋玄秉操幽遁守志不渝宜加旌引以弘進退竝可散騎侍郎在通直宋書戴顒傳宋國初建下令不起答王弘彈謝靈運令靈運免官而已餘如奏端右肅正風軌誠副所期豈拘常儀自今為永制宋書王弘傳夕彈靈運殺力人桂興淫其嬖妾并彈中丞王準之不舉下令答受相國宋公九錫令孤以寡薄負荷殊重守位奉藩危溢是懼朝恩隆泰委美推功遂方軌齊晉擬議國典雖亮誠守分十稔於今而成命弗回百辟胥暨內外庶僚敦勉周至藉運來之功參休明之迹乘菲薄之資同盛德之事鑒寐永言未知攸託隆祚之始思覃斯慶其赦國內殊死以下今月二十三日昧爽以前悉皆原宥鰥寡孤獨不能自存者人賜粟五斛府州刑罪亦同蕩然其餘詳依舊準宋書武帝紀中義熙十四年六月下書辟宗炳等吾忝大寵思延賢彥而兔罝潛處考槃未臻側席丘園良增虛佇南陽宗炳雁門周續之竝植操幽棲無悶巾褐可下辟召以禮屈之宋書宗炳傳至江陵下書夫去斃拯民必存簡恕捨網修綱雖煩易理江荊雕殘刑政多闕頃年事故綏撫未周遂令百姓疲匱歲月滋甚財傷役困慮不幸生凋殘之餘而不減舊刻剝徵求不循政道宰蒞之司或非良幹未能菲躬儉苟求盈給積習生常漸不知改近因戎役來涉二州踐境親民愈見其瘼思欲振其所急恤其所苦凡租稅調役悉宜以見戶為正州郡縣屯田池塞諸非軍國所資利入守宰者今一切除之州郡縣吏皆依尚書定制實戶置臺調癸卯梓材庚子皮毛可悉停省別量所出巴陵均折度支依舊兵運原五歲刑已下凡所質録賊家餘口亦悉原放宋書武帝紀中江陵平加領南蠻校尉下書此州積斃事故相仍民疲田蕪杼軸空匱加以舊章乖昧事役頻苦童耋奪養老稚服戎空戶從役或越紼應召每永懷民瘼宵分忘寢誠宜蠲除苛政弘茲簡惠庶令凋風斃政與事而新寧一之化成於朞月荊雍二州西局蠻府吏及軍人年十二以還六十以上及扶養孤幼單丁大艱悉使遣之窮獨不能存者給其長賑府州久勤將吏依勞銓序并除今年租稅宋書武帝紀中世子鎮徐袞二州下書吾倡大義首自本州克復皇祚遂建勳烈外夷勍敵內清姦軌皆邦人州黨竭誠盡力之效也情若風霜義貫金石今當奉辭西旆有事關河弱嗣叨蒙復忝今授情事纏綿可謂深矣頃軍國務殷刑辟未息眷言懷之能不多歎其犯罪繫五歲以還可一原遣文武勞滿未蒙榮轉者便隨班序報宋書武帝紀中賜沈林子書頻再破賊慶快無譬既屢摧破想不復久爾宋書自序姚鸞精兵守檢林子銜枚夜襲即屠其城劓鸞而坑其衆高祖賜書請恤孟龍符表故龍驤將軍廣川太守孟龍符忠勇果毅隕身王事宜蒙甄表以顯貞節聖恩嘉悼寵贈方州龍符投袂義初前驅效命推鋒三捷每為衆先及西劋桓歆北殄索虜朝議爵賞未及施行會今北伐復統前旅臨朐之戰氣冠三軍於時逆徒實繁控弦掩澤龍符匹馬電躍所向摧靡奮戈深入知死弗吝賊超奔遁依險鳥聚大軍因勢方軌長驅考其庸績豫參濟不竊謂宜班爵土以褎勳烈宋書孟懷玉附傳土斷表臣聞先王制治九土攸序分境畫疆各安其居在昔盛世人無遷業故井田之制三代以隆秦革斯政漢遂不改富彊兼并於是為斃然九服弗擾所託成舊在漢西京大遷田景之族以實關中即以三輔為鄉閭不復係之於齊楚自永嘉播越爰託淮海朝有匡復之算民懷思本之心經略之圖日不暇給是以寧民綏治猶有未遑及至大司馬桓溫以民無定本傷治為深庚戍土斷以一其業於時財阜國豐實由於此自茲迄今彌歷年載畫一之制漸用頽弛雜居流寓閭伍弗修王化所以未純民瘼所以猶在臣荷重任恥責實深自非改調解張無以濟治夫人情滯常難與慮始所謂父母之邦以為桑梓者誠以生焉終焉敬愛所託耳今所居纍世墳壟成行敬恭之誠豈不與事而至請準庚戍土斷之科庶子本所弘稍與事著然後率之以仁義鼓之以威武超大江而跨黃河撫九州而復舊土則戀本之志乃速申於當年在始暫勤要終所以能易伏惟陛下垂矜萬民憐其所失永懷鴻雁之詩思隆中興之業既委臣以國重期臣以寧濟若所啓合允請付外施行宋書武帝紀中又見通典三請恤孫季高表孫季高嶺南之勳已蒙褎贈臣更思維慮循稔惡一紀據有全城若令根木未拔投奔有所招合餘燼猶能為虞縣師遠討方勤廟算而季高泛海萬里投命洪流波激電邁指日遄至遂奄定南海覆其巢窟使循進退靡依輕舟遠迸曾不旬月妖凶殲殄蕩滌之功實庸為大往年所贈猶為未優愚謂宜更贈一州即其本號庶令忠勳不湮勞臣增厲宋書孫處傳處字季高沈田子戰功表參征虜軍事振武將軍扶風太守沈田子率領徑鋭背城電激身先士卒勇冠戎陳奮寡對衆所向必摧自辰及未斬馘千數泓喪旗棄衆奔還霸西咸陽空盡義徒四合清蕩餘燼勢在跂踵宋書自序請褒贈王鎮惡表故安西司馬征虜將軍王鎮惡志節亮直機略明舉自策名州府屢著誠績荊南遘釁勢據上流難興彊蕃憂兼內侮鎮惡輕舟先邁神兵電臨旰食之虞一朝霧散及王師西伐有事中原長驅洛陽肅清湖陝入渭之捷指麾無前遂廓定咸陽俘執僞后克成之效莫與為疇實扞城所寄國之方召也近北虜遊魂寇掠渭北統率衆軍曜威撲討賊既還奔還次涇上故龍驤將軍沈田子忽發狂易奄加刃害忠勳未究受禍不圖痛惜兼至惋悼無已伏惟聖懷為之傷惻田子狂悖即已備憲鎮惡誠著艱難勳參前烈殊績未酬宜蒙追寵願敕有司議其褎贈宋書王鎮惡傳言靈瑞表沙門釋法義於嵩廟所石壇下得玉璧三十二枚黃金一餅符彩潤潔河南太守毛修之以靈嶽降瑞送諸神府孫嚴宋書進寶器表閒者平長安獲張衡所作儀土圭歷代寶器謹遣奉送歸之天府御覽二引義熙起居注十四年相國表表情由權奪文選齊竟陵文宣王行狀注引晉起居注宋公表董司乘方過實引罰同上上言乞正封賞昔天禍皇室巨狡縱篡臣等義惟舊隸豫蒙國恩仰契信順之符俯厲人臣之憤雖社稷之靈抑亦事由衆濟其翼獎忠勤之佐文武畢力之士敷執在己之謙用虧國體之大輒攝衆軍先上同謀起義始平宋口廣陵二城臣及撫軍將軍毅等二百七十二人并後赴義出都緣道大戰所餘一千五百六十六人又輔國將軍長民故給事中王元德等十人合一千八百四十八人乞正封賞其西征衆軍須論集續上宋書武帝紀上平桓玄上言白武陵王遵箋粲等備位大臣所懷必盡執憲不允自應據理陳欣而橫興怨忿歸咎有司宜加裁當以清風軌宋書武帝上褚粲等役使官人為御史所糾謝箋言辭憤怨高祖與大將軍武陵王遵箋竝免官與臧燾書頃學尚廢弛後進穨業衡門之內清風輟響良由戎車屢警禮樂中息浮夫近志情與事染豈可不敷崇墳籍敦厲風尚此境人士子姪如林明發搜訪想聞令軌然荊玉含寶要俟開瑩幽蘭懷馨事資扇發獨習寡悟義著周典今經師不遠而赴業無聞非唯志學者鮮或是勸誘未至邪想復弘之宋書臧燾傳高祖鎮京口與燾書與劉毅書吾往習擊妖賊曉其變態新獲奸利其鋒不可輕宜須裝嚴畢與弟同舉宋書武帝紀上吾往與妖賊戰曉其變態今修船垂畢將居前朴之剋平之日上流之任皆以相委晉書劉毅傳盧循乘勝而進毅將軍率軍南北征因與毅書函書付朱齡石衆軍悉從外水取成都臧熹朱枚於中水取廣漢使羸弱乘高艦十餘由內水向黃虎宋書朱齡石傳義熙九年伐蜀高祖別有函書全封付齡石署函邊曰至白帝乃開又見南史十六與韓延之書文思事意遠近所知去秋遣康之送還司馬君者推至公之極也而了無愧心久絶表疏此是天地所不容吾受命西征止其父子而已彼土僑舊為之驅迫一無所問往年郤僧施謝邵任集之等交搆積歲專為劉毅規謀所以至此今卿諸人一時逼迫本無纖釁吾虛懷期物自有由來今在近路是諸賢濟身之日若大軍相臨交鋒接刃蘭艾雜揉或恐不分故白此意并可示同懷諸人晉書司馬休之傳案宋書與此小異今別載於後文思事源遠近所知去秋遣康之送還司馬軍者推至公之極也而了不遜愧又無表疏文思經正不反此是天地之不容吾受命西討止其父子而已彼土僑舊為所驅逼一無所問往年郤僧施謝邵任集之等交搆積歲專為劉毅謀主所以至此卿等諸人一時逼迫本無纖釁吾處懷期物自有由來今在近路正是諸人歸身之日若大軍登道交鋒接刃蘭艾吾誠不分故具示意并示同懷諸人宋書武帝紀中與驃騎道憐書謝景仁殞逝悲痛摧割不能自勝汝聞問惋愕亦不可堪其器體淹中情寄實重方欲與之共康時務一旦至此痛惜兼深往矣奈何當復奈何宋書謝景仁傳移檄京邑夫治亂相因理不常泰狡焉肆虐或值聖明自我大晉陽九屢搆隆安以來難結皇室忠臣碎於虎口貞良斃於豺狼逆臣桓玄陵虐人鬼阻兵荊郢肆暴都邑天未忘難凶力繁興踰年之間遂傾皇祚主上播越流幸非所神器沈淪七廟毀墜夏后之罹浞豷有漢之遭莽卓方之於玄未足為喻自玄篡逆於今歷年亢旱彌時民無生氣加以士庶疲於轉輸文武困於造築父子乖離室家分散豈唯大東有杼軸之悲摽梅有傾筐之塈而已哉仰觀天文府察人事此而能久孰有可亡凡在有心誰不扼腕裕等所以叩心泣血不遑啓處者也是故夕寐宵興援獎忠烈潛搆崎嶇險過履虎輔國將軍劉毅廣武將軍何無忌鎮北主簿孟昶兗州主簿魏詠之寧遠將軍劉道規龍驤將軍劉藩振威將軍檀憑之等忠烈斷金精貫白日荷戈奮袂志在畢命益州刺史毛璩萬里齊契掃定荊楚江州刺史郭昶之奉迎主上宮於尋陽鎮北參軍王元德等竝率部曲保據石頭揚武將軍諸葛長民收集義士已據歷陽征虜參軍庾頤之等潛相連結以為內應同力協規所在蜂起即日斬僞徐州刺史安城王修青州刺史弘首義衆既集文武爭先咸謂不有一統則事無日輯裕辭不獲已遂總軍要庶上憑祖宗之靈下罄義夫之力翦馘逋逆蕩清京輦公侯諸君或世樹忠貞或身荷爵寵而竝俯眉猾豎自效莫由顧瞻周道寧不弔乎今日之舉良其會也裕以虛薄才非古人接勢於已踐之機受任於既穨之運丹誠未宣感慨憤躍望霄漢以永懷眄山川以增厲授檄之口神馳賊廷宋書武帝紀上又見南史宋本紀一署廷尉寺門有犯張廷尉家者軍法論南史張邵傳邵父敞先為尚書日答事微謬降為廷尉卿及宋武帝討桓玄命署寺門紀功鼎文沸秦洛伏大漢鼎録兵法太白熒惑一南一北為死喪開元占經二十一引宋武兵法
