body:
  text: 竺道生答王衛軍書究尋謝永嘉論都無閒然有同似若妙善不能不以為欣檀越難旨甚要切想尋必佳通耳且聊試略取論意以伸欣悅之懷以為苟若不知焉能有信然則由教而信非不知也但資彼之知理在我表資彼可以至我庸得無功於日進未是我知何由有分於入照豈不以見理於外非復全昧知不自中未為能照邪廣弘明集二十一喻疑夫應而不寂感之者至感有精粗應亦不一影響理也若以方期之非徒乖其圓乃亦喪其方故以備聞之悟喻其所疑疑非膏肓庶必為治若治所不至喻復其如之何竝可詳覽往喻昔漢室中興孝明之世無盡之照始得輝光此壤於二五之照當是像法之初自爾已來西域名人安侯之徒相繼而至大化文言漸得淵照邊俗陶其鄙倍漢末魏初廣陵彭城二相出家竝能任持大照尋味之賢始有講次而恢之以格義迂之以配說下至法祖孟詳法行康會之徒撰集諸經宣暢幽旨粗得充允視聽暨今附文求旨義不遠宗言不乖實起之於亡師及至苻并龜茲三王來朝持法之宗亦竝與經俱集究摩羅法師至自龜茲持律三藏集自罽賓禪師徒衆尋亦竝集關中洋洋十數年中當是大法後興興之盛也睿才常人鄙而得廁對宗匠陶譯玄典法言無日不聞聞之無要不記故敢依準所聞寄之紙墨以宣所懷什公云大教興世五十餘年言無不實實無不益益而為言無非教也實而為稱無非寶也寶以如意為喻教以正失為體若能體其隨宜之旨則言無不深若守其一照則惑無不至今此世界以雜為名則知本自離薄本自離薄則易為風波風波易以動不淳易為離易動易離故大聖隨宜而進進之不以一途三乘雜化由之而起三藏袪其染滯般若除其虛妄法華開一究竟泥洹闡其實化此三津開照照無匱矣但優劣在乎人深淺在其悟任分而行無所臧否前五百年也此五百年中得道者多不得者少以多言之故曰正法後五百年唯相是非執競盈路得道者少不得者多亦以多目之名為像法像而非真失之由人由人之失乃有非跋真言斧戟實化無擇起於胸中不救出自脣吻三十六國小乘人也此釁流於秦地慧導之徒遂不復信大品既蒙什公入關開託真照般若之明復得輝光末俗朗茲實化尋出法華開方便門令一實究竟廣其津途欣樂之家景仰沐浴真復不知老之將至而曇樂道人以偏執之見而復非之自畢幽途永不可誨今大般泥洹經法顯道人遠尋真本於天竺得之持至揚都大集京師義學之僧百餘人禪師執本參而譯之詳而出之此經云泥洹不滅佛有真我一切衆生皆有佛性皆有佛性學得成佛佛有真我故聖鏡特宗而為衆聖中王泥洹永存為應照之本大化不泯真本存焉而復致疑安於漸照而排跋真誨任其偏執而自幽不救其可如乎此正是法華開佛知見開佛知見今始可悟金以瑩明顯發可如而復非之大化之由而有此心經言闡提真不虛也此大法三門皆有成證昔朱士行既襲真式以大法為己任於雒陽中講小品亦往往不通乃出流沙尋求大法既至于填果得真本即遣弟子十人送至雒陽出為晉音未發之閒彼土小乘學者乃以聞王云漢地沙門乃以婆羅門書惑亂真言王為地主若不折之斷絶大法聾盲漢地王之咎也王即不聽時朱士行乃求燒經為證王亦從其所求積薪十車於殿階下以火焚之士行臨階而發誠誓若漢地大化應流布者經當不燒若其不應命也如何言已投之火即為滅不損一字遂得有此法華正本於于填大國輝光重壤踊出空中而得流此此大般泥洹經既出之後而有嫌其文不便而更改之人情小惑有慧祐道人私以正本雇人寫之容書之家忽然火起三十餘家一時蕩然寫經人於灰火之中求銅鐵器物忽見所寫經本在火不燒及其所寫一紙陌外亦燒字亦無損餘諸巾紙寫經竹筒皆為灰燼此三經者如什公所言是大化三門無極真體皆有神驗無所疑也什公時雖未有大般泥洹文已有法身經明佛法身即是泥洹與今所出若合符契此公若得聞此佛有真我一切衆生皆有佛性便當應如白日朗其胸襟甘露潤其四體無所疑也何以知之每至苦問佛之真主亦復虛妄積功纍德誰為不惑之本或時有言佛若虛妄誰為真者若是虛妄積功纍德誰為其主如其所探今言佛有真業衆生有真性雖未見其經證明評量意便為不乖而亦曾問此土先有經言一切衆生皆當作佛此當云何答言法華開佛知見亦可皆有為佛性若有佛性復何為不得皆作佛邪但此法華所明明其唯有佛乘無二無三不明一切衆生皆當作佛皆當作佛我未見之亦不抑言無也若得聞此正言真是會其心府故知聞之必深信受同吾之肆學正法者小可虛其襟帶更聽往喻如三十六國著小乘者亦復自以為日月之明無以進於己也而大心寥朗乃能鄙其狂而偏執自貽重罪慧導之非大品而尊重三藏亦不自以為照不周也曇樂之非法華憑陵其氣自以為是天下悠悠唯己一人言其意亦無所與讓今疑大般泥洹者遠而求之正當以一切衆生皆有佛性為不通真照真照自可照其虛妄真復何須其照一切衆生既有僞矣別有真性為不變之本所以陶練既精真性乃發恆以大慧之明除其虛妄虛妄既盡法身獨存為應化之本應其所化能成之緣一人不度吾終不捨此義始驗復何為疑邪若於真性法身而復致疑者恐此邪心無處不惑佛之真我尚復生疑亦可不信佛有正覺之照而為一切種智也般若之明自是照虛妄之神器復何與佛之真我法身常存一切皆有佛之真性真性存焉學不越涯成不乖本乎而欲以真照無虛言言而亦無佛我亦無泥洹是邪見也但知執此照惑之明不知無惑之性非其照也為欲以此誣罔天下天下之人何可誣也所以遂不關默而驟明此照者是借一肆之上而有鑠金之說一市之中而言有虎者三易惑之徒則將為之所染皆為不救之物亦不得已而言之豈其好明人罪邪實是蝮蛇螫手不得不斬幸有深識者體其不默之旨未深入者尋而悟之以求自清之路如其已不可喻吾復其如之何釋藏跡五水讚大王惠澤所感遂使枯石生泉釋藏輦五又百四大涅槃經序大般涅槃者蓋是法身之玄堂正覺之實稱衆經之淵鏡萬流之宗極其為體也妙存有物之表周流無窮之內任運而動見機而赴任運而動則乘虛照以御物寄言蹄以通化見機而赴則應萬形而為像即群情而設教至乃形充十方而心不易慮教彌天下情不在已廁流塵蟻而弗下彌蓋群聖而不高功濟萬化而不恃明踰萬旦而不居渾然與太虛同量泯然與法性為一夫法性以至極為體至極則歸於無變所以生滅不能遷其常生滅不能遷其常故其常不動非樂不能虧其樂故其樂無窮或我生於謬想非我起於因假因假存於名數故至我越名數而非無越名數而非無故能居自在之聖位而非我不能變非淨生於虛淨故真淨水鏡於萬法水鏡於萬法故非淨不能渝是以斯經解章敘常樂我淨為宗義之林開究玄致為涅槃之源用能闡祕藏於未聞啓靈管以通照拯四重之瘭疽拔無閒之疣贅闡祕藏則暢群識之情審妙義之在已啓靈管則悟玄光之潛映神珠之在體然四重無閒誹謗方等斯乃衆患之㽳痟瘡疣之甚者故大涅槃以無瘡疣為義名斯經以大涅槃為宗目宗目舉則明統攝於衆妙言約而義備義名立則照三乘之優劣至極之有在然冥化無膚妙契無言任之沖境則理不虛運是以此經開誠言為教本廣衆喻以會義建護法以涉初覩祕藏以窮源暢千載之固滯散靈鷲之餘疑至於理微幽蟠微於微者則諸菩薩弘郢匠之功曠舟船之濟清難雲構翻覆周密由使幽途融垣宗歸豁然是故誦其文而不疲語其義而不倦甘其味而無足餐其音而不厭始可謂微言興詠於真丹高韻初唱於赤縣梵音震響於聾俗真俗巨曜於今日而寡聞之士偏執之流不量愚見敢評大聖無涯之典遂使是非興於爭論譏謗生於快心先覺不能返其迷衆聖莫能移其志方將沈斃八邪之網長淪九流之淵不亦哀哉天竺沙門曇摩讖者中天竺人婆羅門種天懷秀拔領鑒明邃機辨清勝內外兼綜將乘運流化先至燉煌停止數載大沮渠河西王者至德潛著建隆王業雖形處萬機每思弘大道為法城塹會開定西夏斯經與讖自遠而至自非至感先期孰有若茲之遇哉讖既達此以立始十年歲次大梁十月二十三日河西王勸請令譯讖手執梵文口宣秦言其人神情既鋭而為法殷重臨譯敬慎殆無遺隱搜研本正務存經旨唯恨梵本分離殘闕未備耳余以庸淺預遭斯運夙夜感戢欣遇良深聊試標位敘其宗格豈謂必然窺其宏要者哉此經梵本正文三萬五千偈於此方言數減百萬言今數出者一萬餘偈如來去世後人不量愚淺抄略此經分作數分隨意增損雜以世語緣使違失本正如乳之投水下章言案當有脫誤雖然猶勝餘經足滿千倍佛涅槃後初四十年此經於閻浮提宣通流布大明於世四十年後隱沒於地至正法欲滅餘八十年乃得行世雨大法雨自是已後尋復隱沒至於千載像教之末雖有此經人情薄淡無心敬信遂使群邪競辨曠塞玄路當知遺法將滅之相釋藏跡八阿毗曇毗婆沙論序毗婆沙者蓋是三藏之指歸九部之司南司南既準則群迷革正指歸既定則邪輪輟駕自釋迦遷暉六百餘載時北天竺有五百應真以為靈燭久潛神炬落耀含生昏喪重夢方始雖前勝迦旃延撰阿毗曇以拯穨運而後進之賢尋其宗致儒墨競構是非紛如故乃澄神玄觀搜簡法相造毗婆沙抑止衆說或即其殊辨或標之銓評理致淵曠文略豔博使西域勝達之士莫不資之以鏡心鑒之以朗識而冥瀾潛灑將洽殊方然理不虛運弘之由人大沮渠河西王者天懷遐廓標誠沖寄雖迹纏紛務而神棲玄境用能丘壑廊廟館第林野是使淵叟投竿巖逸來庭息心升堂玄容入室誠詣既著理感不期有沙門道泰才敏自天沖氣疏朗博關奇趣遠參異言往以漢土方等既備幽宗粗暢其所未練唯三藏九部故杖策冒險爰至蔥西綜覽梵文義承高旨并獲其梵本十萬餘偈既達涼境王即欲令宣譯然懼環中之固將或未盡所以側席虛襟企矚明勝時有天竺沙門浮陀跋摩周流敷化會至涼境其人開悟淵博神懷深邃研味鑽仰逾不可測遂以乙丑之歲四月中旬於涼城內苑間豫宮寺請令傳譯理味沙門智嵩道朗等三百餘人考文詳義務存本旨除煩即實質而不野王親屢回御駕陶其幽趣使文當理詣片言有寄至丁卯歲七月上旬都訖通一百卷會涼城覆沒淪湮遐境所出經本零落殆盡今涼王信向發中探練幽趣故每至新異希仰奇聞其年歲首更寫已出本六十卷令送至宋臺宣布未聞庶令日新之美敞於當時福祚之興垂於來葉挻以微緣豫參聽末欣遇之誠竊不自默粗列時事以貽來哲釋藏宮一又跡十駮顧道士夷夏論并書余端夏有隙亡事忽景披顧生之論昭如發蒙見辨異同之原明是非之趣辭豐義顯文華情奧每研讀忘倦慰若萱草真所謂洪筆之君子有懷之作也然則察其指歸疑笑良多譬猶盲子採珠懷赤菽而反以為獲寶聾賓聽樂聞驢鳴而悅用為知音斯蓋吾子夷夏之談以為得理其乖甚焉見論引道經益有昧如昔老氏著述文指五千其餘淆雜竝淫謬之說也而別稱道經從何而出既非老氏所創寧為真典庶更三思儻袪其惑論云孔老非佛誰則當之道則佛也佛則道也以斯言之殆迷厥津故經云摩訶迦葉彼稱老子光淨童子彼名仲尼將知老氏非佛其亦明矣實猶吾子見理未弘故有所固執然則老氏仲尼佛之所遣且宣德示物禍福而後佛教流焉然夫大道難遵小成易習自往古而致歎非來今之所慨矣老氏著文五千而穿鑿者衆或述妖妄以回人心或傳淫虐以振物性故為善者寡染惡者多矣僕謂搢紳之飾罄折之恭殞葬之禮斯蓋大道廢之時也仁義所以生孝敬所以出矣智欲方起情僞日滋聖人因禁之以禮教制之以法度故禮者忠信之薄取亂之首也既失無為而尚有為寧足加哉夫翦髮之容狐蹲之敬永沈之俗僕謂華色之不足吝貨財之不可守亦已信矣老氏謂五色所以令人目盲多藏必之後失故乃翦髮玄服損財去世讓之至也是以泰伯無德孔父嘉焉斯其類矣夫胡跪始自天竺而四方從之天竺天地之中佛教所出者也斯乃大法之整肅至教之齊嚴吾子比之狐蹲厥理奚徵故夫凶鬼助惡強魔毀正子之謂矣譬猶持瓢以減江海側掌以蔽日月不能損江海之泉掩日月之明也至夫太古之初物性猶淳無假禮教而能緝正弗施刑罰而能自治死則葬之中野不封不樹喪至無期哀至便哭斯乃上古之淳風良足效焉子欲非之其義何取又道佛二教喻之舟車夫有識聞之莫不莞爾而笑僕謂天道弗言聖人無心是以道由人弘非道弘人然則聖人神鑒靡所不通智照寧有不周而云指其專一不能兼濟譬猶靈暉朝覯稱物納照時風夕灑程形賦音故形殊則音異物異則照殊日不為異物而殊照風不為殊形而異音將知其日一也其風一也稟之者不同耳吾子以為舟車之喻義將焉允然夫大教無私至德弗偏化物共旨導人俱致在戎狄以均響處胡漢而同音聖人寧復分地殊教隔寓異風豈有夷邪寧有夏邪昔公明儀為牛彈清角之操伏食如故非牛不聞不合其耳也轉為蚊虻孤犢之聲於是奮耳掉尾蹀躞而聽之今吾子所聞者蓋蚊虻之音也夷夏之別斯旨何在又云下棄妻孥上廢宗祀嗜欲之物皆以禮伸孝敬之典獨以法屈夫道俗有晦明之殊內外有語默之別至於宗廟享祀禘祫皇考然則孝敬之至世莫加焉若乃烟香夕臺韻法晨宮禮拜懺悔祈請無輟上逮歷劫親屬下至一切蒼生若斯孝慈之弘大非愚瞽之所測也夫國資民為本君恃民而立國之所以寧民之力也推如來談似為空設又云刻船桑門守株道士空爭大小互相彈射披撫華論深釋久滯尋文求義於何允歸夫外道淫奔彌齡積紀沈晦弗遷淪惑寧反遊涉墟鄉泛越鄽落公因聖術私行淫亂得道如之何斯可恥昔齊人好獵家貧犬鹿窮年馳騁不獲一獸於是退而歸耕今吾子有知歸耕得算又云大道既隱小成互起辨訥相傾孰與正之夫正道難毀邪理易退譬若輕羽在高遇風則飛細石在谷逢流則轉唯泰山不為飄風所動磐石不為疾流所回是以梅李見霜而落葉松柏歲寒之不凋信矣夫淫妖之術觸正便挫子為大道誰為小成想更論之然後取辨若夫顏回見東野之馭測其將敗子貢觀邾魯之風審其必亡子何無知若斯之甚故標愚智之別撰賢鄙之殊聊舉一隅示子望能三反又云泥洹仙化各是一術佛號正真道稱正一一歸無死真會無生無生之教賒無死之教切斯蓋吾子聰辨能言鄙夫蔑以如之然則泥洹滅度之說著乎正典仙化入道之唱理將安附老子云生生之厚必之死地又云天地所以長久者以其不自生也夫忘生者生存存生者必死子死道將屆故謂之切其殊切乎諺曰指南為北自謂不惑指西為東自謂不蒙子以必死為將生其何反如之故潛居斷糧以修仙術僕聞老氏有五味之戒而無絶穀之訓矣是以蟬蛾不食君子誰重蛙蟒穴藏聖人何貴且自古聖賢莫不歸終吾子獨云不死何斯濫乎故舜有蒼梧之墳禹有會稽之陵周公有改葬之篇仲尼有兩楹之夢曾參有啓足之辭顏回有不幸之歎子不聞乎豈謬也哉昔者有人未見麒麟問常見者曰麟何類乎答曰麟如麟也問者曰若嘗見麟則不問也而云麟如麟何邪答云麟麇身牛尾鹿蹄馬背問者乃曉然而悟今吾子欲見麟邪將不見告又云道經簡而幽幽則妙門難見僕謂老教指乎五千過斯已外非復真籍而道文重顯愈深疑怪多是虛託妍辭空稱麗句譬周人懷鼠以貿璞鄭子觀之而且退斯之謂矣尋此而言將何克允又云殘忍剛愎則師佛為長慈柔虛受則服道為至矣故老子云強梁者不得其死吾將以為學文故人所以敷行誡籍顯著文教將為愚瞽之故非為賢哲之施矣違之者必凶順之者必吉夫強梁剛愎之人下愚之類也大教慈愍方便為之將非虛邪學文邪慈柔虛受僕謂宜空談今學道反之陳黃書以為真典佩紫録以為妙術士女無分閨門混亂或服食以祈年長或淫姣以為瘳疾慈柔之論於焉何託又道迹密而微利用在己故老子云吾所以有大患者為吾有身也及吾無身吾又有何患老氏以身為大患吾子以軀為長保何其乖之多也夫後身而身先外身而身存惟云在已未知此談以何為辨又云婁羅之辨各出彼俗自相領解猶蟲喧鳥聒何足述效僕謂餌辛者不知辛之為辛而無羡於甜香悅臭者不覺臭之為臭而弗耽椒蘭猶吾子淪好淫僞寧有想於大法夫聖教妙通至道淵博既不得謂之為有亦不得謂之為無無彼我之義竝異同之說矣夫言猶射也若筈之離弦非悔恨所及子將慎言乎而云蟲喧鳥聒意則何依近者孫子猖狂顯行無道妖淫喪禮殘逆廢義賢士同志而已愚夫輒為回心姦儔盈室惡侶填門墟邑有痛切之悲路陌有羅苦之怨夫天道損盈鬼神福謙然後自招淪喪弘明集七戎華論折顧道士夷夏論昔維摩者內乘高路功亮事外龍隱人閒志揚淵海神灑十方理正天下故乃跡臨西土協同幽唱若語其靈變也則能令乾坤倒覆促延任意若語其真照也則忘慮而幽凝言絶者也如此之人可謂居士未見君稱居士之意也君今七慢之嶽未摧五欲之谷未填慧陽之日未曜無明之雲未晴永冥之風未息夜遊之迷未旋君既解猶常品而山號居士乎貧道遙餐器量知君未堪斯據然此雖大法之淺號而亦未易當矣省君夷夏論意亦具照來心貧道踐學天壇希囑茲況而此所論者才無玩文之麗識無鑒幽之效照無寸光澤無露潤萬塗所闕有何義哉而復內秉茫思獲心暗計輕弄筆墨仰卜聖旨或混道佛合同或論深淺為異或說神邦優劣或毀清正賓實夫苦李繁子而枝折欒大謬唱而受梟此皆是上世之成制後賢之遠匠矣今將示君道佛之名義異也夫佛者是正靈之別號道者是百路之都名老子者是一方之哲佛據萬神之宗道則以仙為貴佛用漏盡為研仙道有千歲之壽漏盡有無窮之靈無窮之靈故妙絶杳然千歲之壽故乘龍御雲御雲乘龍者生死之道也杳然之靈者常樂永淨也若斯者故能璇璣竝應跡臨王城宮疏繞闕細委重軒故放彼萬國誓越三空龍飛華館整駕道場於是初則唱於鹿苑次則集於天宮中則播於靈鷲後則扇於熙連故乃巨光遐照白日寢暉華軒四蓋梵駕天垂九天齊歌群仙悟機敢預有緣莫不雲會歸焉唯有周皇邊霸道心未興是以如來使普賢威行西路三賢竝導東都故經云大士迦葉者老子其人也故以詭教五千翼匠周世化緣既盡回歸天竺故有背關西引之邈華人因之作化胡經也致令寡見之衆詠其華焉君未詳幽旨輒唱老佛一人乎聞大聖現儒林之宗便使周孔莊老斯皆是佛若然者君亦可即老子邪便當五道群品無非是佛斯則是何言歟真謂夸父逐日必渴死者也君言夷夏論者東有驪濟之醜西有羌戎之流北有亂頭披髮南有翦髮文身姬孔施禮於中故有夷夏之別戎華者東盡於虛境西則窮於幽鄉北則弔於冥表南則極乎牢閰如來扇化中土故有戎華之異也君責以中夏之性效西戎之法者子出自井坂之淵未見江湖之望矣如娙曰佛據天地之中而清導十方故知天竺之土是中國也周孔有雅正之制如來有超俗之憲雅正制故有異於四夷超俗憲故不同於周孔制四夷故八方推德憲加周孔故老子還西老子還西故生其群戎四夷推德故踰增其迷夫正禮叵易真法莫移正禮叵易故泰伯則於吳越而整服真法莫移故佛教則東流而無改緣整服故令裸壤玩裳法無改故使漢賢落髮玩裳故使形逼中夏落髮故使仰齊西風形逼中夏故使山藏而空慢遠齊西風故使近見者莫不信也若謂聖軌無定應隨方異者泰伯亦可裸步江東君今亦可未服裳也故雖復方類不同聖法莫異君言義將安取者謂取正道也於是道指洞玄為正佛以空空為宗老以太虛為奧佛以即事而淵老以自然而化佛以緣合而生道以符章為妙佛以講導為精太虛為奧故有中無無矣即事而淵故觸物斯奧矣自然而化故霄堂莫登矣緣合而生故尊位可升矣符章為妙故道無靈神矣講導為精故研尋聖心矣有中無無故道則非大也觸物斯奧故聖路遐曠也霄堂莫登故云云徒勞也尊位可升故智士亡身也道無靈神故傾顏何求也研尋聖心故沙門雲興也爾乃故知道經則少而淺佛經則廣而深道經則鮮而穢佛經則弘而清道經則濁而漏佛經則素而貞道經則近而暗佛經則遠而明君染服改素實參高風也首冠黃巾者卑鄙之相也皮革苫頂者莫非華風也販符賣籙者天下邪俗也博頰扣齒者倒惑之至也反縛伏地者地獄之貌也符章合氣者姦狡之窮也斯則明暗已顯真僞已彰君可整率匹侶徊涉清衢貧道雅德內顧同奉聖真豈有惡乎想必不逆允於往示耳弘明集七
