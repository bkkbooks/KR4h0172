body:
  text: 建安王休仁禮敬太子生母議禮云妾既不得體君班秩視子為序母以子貴經著明文內外致敬貴妃誠如慶緒議天子姬嬪不容通音介於外雖義可致虔不應有箋表宋書禮志二泰始二年九月有司奏皇太子所生陳貴妃禮秩既同儲君未詳宮臣及朝臣竝有敬否妃主在內相見又應何儀博士王慶緒議云云尚書令建安王休仁議詔可參議皇太子車服天子之子與士齒讓達於辟雍無生而貴者也既命而尊禮同上公周制五等車服相涉公降王者一等而已王以金路賜同姓諸侯象及革木以賜異姓侯伯在朝卿士亦準斯禮案如此制則東宮應乘金路自晉元過江禮儀疏舛王公以下車服卑雜唯有東宮禮秩崇異上次辰極下絶侯王而皇太子乘石山安車義不見經事無所出禮所謂金玉路者正以金玉飾路諸末耳左右前後同以漆畫秦改周輅制為金根通以金薄周匝四面漢魏二晉因循莫改逮於大明始備五輅金玉二制竝類金根造次瞻覩殆無差別若錫之東儲於禮嫌重非所以崇峻陛級表示等威且春秋之義降下以兩臣子之義宜從謙約謂東宮車服宜降天子二等驂駕四馬乘象輅降龍碧旗九葉進不斥尊退不逼下沿古酌時於禮為衷宋書禮志五泰始四年五月尚書令建安王休仁參議詔可又隋書禮儀五引宋起居注文有刪節且多異同故別載於後天子之元子士也故齒胄於辟雍欲使知教而後尊不得生而貴矣既命之後禮同上公故天子賜之金輅但滅旗章為等級象及革木賜異姓諸侯在朝卿士亦準斯例此則皇太子及帝子王者通得乘之自晉過江王公以下車服卑雜唯有太子禮秩崇異又乘山石安車義不經見事無所出隋書禮儀志五引宋起居注泰始四年尚書令建安王休仁議與殷琰書君本文弱素無武幹是遠近所悉且名器清顯不應復有分外希覬近者之事當是劫於凶豎不能守節今大軍長驅已造城下勢孤援絶禍敗交至顧昔情款猶有惻然聖上垂天地之仁開不世之澤好生惡殺遐邇所聞顧琛王曇生等皆軍敗迸走披草乞活尚蒙恩恕晏處私門今神鋒所臨前無橫陳況窮城弱衆殘傷之餘而欲自固乎若開門歸順自可不失富貴將佐小大竝保榮爵何故苟困士民自求齏膾身膏斧鑊妻息并盡老兄垂白東市受刑邪幸自思之信言不爽有如皎日宋書殷琰傳與袁粲褚淵劉秉書夫治政任賢宜親疏相輔得其經緯則結繩可及失其規矩則危亡可期漢承戰國之餘傷周室衰殄立磐石之宗而致七國之亂魏革漢典創於前失遂使諸王絶朝聘之禮是以根疏葉枯政移異族今宗室衰微自昔未有泰寧之世足以為譬孤子恭枝皇族預關興毀雖欲忘言其可得乎高祖武皇帝升睿三光滌紛四表太祖文皇帝欽明冠古資乾承麻秉鉞西服鳴鑾東京搜賢選能納奇賞異孝武皇帝岐嶷天縱先機雷發陵波靜亂宏業中興儲嗣不腆遂貽禍難於時建安王以家難頻遘宜立長主明皇帝恢朗淵懿仁潤含遠奉戴南面允合天人而太尉以年長居卑怨心形色柳欣慰等規行不軌事迹披猖驃騎以忤顏失旨應對不順在蕃刻削怨結人鬼先帝明於號令豈枉法為親二王之釁實自由己但司徒巴陵王勞謙為國中流事難有不世之勳奉時如天事況猶父非唯令友信為國器唐叔之忠而受管蔡之罪親戚哀憤行路嗟歎王地籍光潔德厭民望竝無寸罪受斃讒邪先帝穆於友于留心親戚去昔事平之後面受詔誨禮則君臣樂則兄弟升級賜賞動不移年撫忍孜孜恆如不足豈容一旦鬩牆致此禍害良有由也先帝寢疾彌年體疲膳少雖神照無虧而慮有失德補闕拾遺責在左右於時出入臥內唯有運長道隆群結無狀因疾遘禍見上不和知無瘳拯慮晏駕之日長王作輔奪其寵柄不得自專是以內假帝旨外託朝議諛辭詭貌萬類千端升進姦回屠斥賢哲外矯天則內誣人鬼是以星紀違常義望失度昔魏顆擇命春秋笑之秦穆殉良詩有明刺臣子之節得失必書不及匡諫猶以為罪交閒蒼蠅驅扇禍戮爵以貨重才由貧輕先帝舊人無罪黜落薦致鄉親遍布朝省諂諛親狎者飛榮玉除靜立貞粹者柴門生草事先關已雖非必行若不咨詢雖是必抑海內遠近人誰不知未解執事不加斧鉞遂致先帝有殺弟之名醜聲遺於君父格以古義豈得為忠先帝崩殂若無天地理痛常情便應赴泣但兄弟枉酷已陷讒細孤子已下復觸姦機是以望陵墳而摧裂想鑾旗而抽慟雖復才違寄寵而地屬負荷顧命之辰曾不見及分崩之際詔出兩豎天誘其衷得居乎外若受制群邪則玉石同碎矣以宇宙之基一旦受制卑瑣劉氏家國使小人處分終古以來未有斯酷昔石顯曹節方今為優而望之仲舉由以致斃至於遭逢醜慝豈有古今者乎諸賢胄籍冠冕世歷忠貞位非恩樹勳豈寵結憂國勤王社稷之鎮豈可含縱讒凶坐觀傾覆自惟宋室未殞得以推移者正內賴諸賢防勒姦軌外有孤子跨據中流而人非金石何能支久使一虧落則本根莫庇當今主上沖幼宜明典章征虜之鎮不見慰省逆旅往來尚有顧眄骨肉何讎逼使離隔禽獸之心橫生疑二經由此者每加約截同惡相求有若市賈以孤子知其情狀恆恐以此乘之鉗勒州郡過見防禦近遣西南二使統內宣傳不容恐懼即遣啓并有別書若以孤子有過便應鳴鼓見伐如其不爾宜令各有所歸與殺不辜憲有常辟三公之使無罪而斬鄙雖不肖天子之季父卑小主者敢不如是乎孤子承奉今上如事先朝夙夜恭謹散心雲日晦望表驛相從江衢有何虧違頓至於此既已甘心其可再乎如往來所說以孤子納士為尤此輩懼其身罪豈為國許在昔四豪列國公子猶博引廣納門客三千況孤子位居鼎司捍衛畿甸且今與昔異咸所知也狡虜陵掠江淮侵逼主上年稚宗室衰微邪僭用命親賢結舌疆場嬰塗炭之苦征夫有勤役之勞瓜時不代齊有致禍況長淮戍卒歷年思怨不務拓遠強邊而先事國君親戚以此求心何事非亂又以繕治盆壘復致囂聲自晉宋之災積貯百萬孤子到鎮曾不數千里且修城池整郭邑為治常理復何足致嫌邪若以中流清蕩則任農夫不應實力彊兵作鎮姑孰俱防寇害豈得獨嫌於此昔成王之明而為流言致惑若使金縢不開則周公無以自保樂毅歸趙不忍謀燕況孤子禮則君臣恩猶父子者乎所以枕戈泣血祗以兄弟之讎爾觀其不逞之意豈可限量設使遂其虐志諸君欲安坐得乎脣亡齒寒理不難見桂蠹必除人邪必翦枉突徙薪何勞多力望便執録二豎以謝冤魂則先帝不失順悌之名宋世無枉筆之史此州地居形要路枕九江控弦跨馬越關而至重氣輕死排藪競出練甲照水總戈成林劋此纖隸何患不克但千鈞之弩不為鼷鼠發機欲使薰蕕內辨晉陽外息爾功有所歸不亦可乎便當投命有司謝罪天闕同奉溫清齊心庶事伊霍之任非君而誰周召之職頗以自許左提右挈無愧故人昔平勃剛斷産祿蚤誅張溫趑趄文臺扼腕事之樞機得失俄頃往車今轍庶無惑焉近持此意申之沈攸其憤難不解諸王致此既知禍原鋭然奮發蓄兵厲卒以俟同舉張興世發都日受制凶黨揚帆直逝遂不見遇孤子近遣信申述姦禍方大惆惋追恨前迷比者信使每申勤款王奐佐郢兵權在握厥督屠枉朝野嗟痛猶父之怨寧可與之比肩孤子此舉增其慷慨義之所勸其應猶響諸君或未得此意故先告懷徙倚一隅遲及委問孤子哀疾尪毀窮盡無日庶規史鰌死不忘本臨紙荒哽言不詮第宋書桂陽王休範傳移檄東土討孔覬等蓋聞釁集有兆禍至無門倚伏之來實惟人致故囂述貪亂終殄宗祀昌憲構氛旋潤斧鉞斯則昭章牒炯戒今古者也自國步時艱三綱道盡神歇靈繹璿業綴旒皇上仁雄集瑞英睿應曆鳳儀熛升龍輝電舉蕩穢紫樞不俟鳴條之誓凝政中寓不肆漂杵之威是以墜維再造虧天重構幽明裁紀標配斯光而群凶恣虐協扇童孺蕞爾東垂復淪醜迹邪回從慝蜂動蟻附聖圖霆發神威四臨羽驛所屆義旅雲屬欃鉞所麾逆徒冰泮勝負之效皎然已顯司徒建安王英猷冠世董率元戎驃騎山陽王風略夙昭撫厲中陳或振霜江蠡或騰焱荊河金甲燭天庭囂聲震海浦前將軍吳興太守張永東南標秀協寶戎機建威將軍沈懷明鎮東中兵參軍劉亮武衛軍壽寂之霜鋭五千熊騰虎步龍驤將軍王穆之龍驤將軍頓生鐵騎連群風驅電邁右軍將軍齊王射聲校尉姚道和樓艦千艘覆川蓋泛左軍垣恭祖步兵校尉杜幼文𤕠從僕射全景文員外散騎侍郎孫超之竝率虎旅駱驛雲赴殿中將軍杜敬真殿中將軍陸攸之建武將軍吳喜甲楯一萬分趣義興豫猥承人乏總司戎統聳劍東馳申憤海曲噴氣則白日盡晦刷馬則清江倒流以此伐叛何勍不勦以此柔服何順不懷愍彼群迷弗辨堯桀螳黽微命擬雷霆之衝已枯之葉當霜飆之隊尺豎所為寒心匹婦所為歎息夫因禍提慶資敗為成前監不忘後事明筮若能相率歸順投兵效款則福鍾當年祉覃來裔孰知身轘宗屠鬼餧魂泣者哉詳鏡安危自求多福宋書孔覬傳泰始二年孔覬擁子房起兵休若董統東討諸軍事移檄東土上言山湖之禁山湖之禁雖有舊科民俗相因替而不奉熂山封水保為家利自頃以來穨弛日甚富強者兼嶺而占貧弱者薪蘇無託至漁采之地亦又如茲斯實害治之深斃為政所宜去絶損益舊條更申恆制宋書羊玄保傳大明初揚州刺史西陽王子尚上言傳檄京師陽六數艱雲雷相襲高皇受曆時乘雲轡頓於促路文祖定祥係昭睿化翦於中年二凶縱禍三綱理滅宗王俯首姑息逆朝枕戈無聞偷榮有秩孝武皇帝釋位泣血糾義人紂投袂戎首親戮鯨鯢九服還輝兩儀更造而窮旻不惠棄離萬國皇運重替嗣主荒淫孤以不才任居藩長大懼宗稷殲覆待日故招徒楚郢飛徼京甸志遵前典黜幽陟明庶七廟復安海昏有紹豈圖宋未悔禍弒亂奄臻遂矯害明茂篡竊天寶反道效尤蔑我皇德干我昭穆寡我兄弟恣鴟梟之心蹈倫穎之志覆移鼎祚誣罔天人藐孤同氣猶有十三聖靈何辜而當乏饗昔隆周弛御晉鄭是依盛漢中陵居章抗節支曲輕屬猶或忘軀況孤忝惟臣子情地兼切號感一隅心與事痛是用飲血衽金誓復宗祀今遣輔國將軍咨議頒中直兵孫沖之龍驤將軍陳紹宗率螭虎之士組甲二萬沿流電發徑取白下龍驤將軍領中直兵嶭常寶建威將軍領中直兵沈懷寶長戟萬刃羽騎千群徑出南州直造朱雀寧朔將軍咨議領中直兵陶亮龍驤將軍焦度總中黃之旅梟雄三萬風掩江介雲臨石頭建威將軍張冽龍驤將軍何休明提育獲之徒徑捍之卒邪趨金陵北指閶闔龍驤將軍張係伯龍驤將軍陳慶勒輕鋭五千彊弩一萬飛鋒班瀆齊會西明冠軍將軍尋陽內史鄧琬撮湘雍之兵勇敢四萬授律總威飆集京邑征虜將府司馬張悅蒼兕千艘水軍五萬大董群校絡繹繼道冠軍將軍豫章內史劉衍寧朔將軍武昌太守劉弼寧朔將軍西陽太守謝稚建威將軍領中直兵晉熙太守閻湛之皆掃境勝兵薦誠請效後將軍郢州刺史安陸王子綏懷恩纏慕鞠旅先晨冠軍將軍湘州刺史邵陵王子元席帆陵波整衆遄至前將軍荊州刺史臨海王子頊練甲陝西獻徒萬數輔國將軍冠軍長史長沙內史何惠文見拔先皇誠深投袂冠軍將軍雍州刺史袁顗不謀同契雷發漢南建武將軍順陽太守劉道憲懷忠抱慨不遠三千梁益青徐兗豫吳會皆密介歸誠誓為表裏孤親總蒸徒十有餘萬白羽咽川霜鋒照野金聲振谷鳴鼙聒天凡諸將帥皆忠無匿情智無遺計果幹剛鷙譎略多奇水陸長驅數道竝進發舟踰險背水爭先以此衆戰孰能斯禦推此義鋭滄海可垔諸君或荷寵前朝感恩舊日或奕世貞淳見危授命而逼迫寇手效節莫由今大軍密邇形援已接見幾而作豈俟終日便宜轉禍趣福因變立功夫旦奭與三監竝時金霍與上官共主邪正粈雜何世無之但績亮則名播姦騁則道消耳紀季入齊陳平歸漢身尊譽遠明誓是裒成範全規殷監匪遠若玩咎惟休告舍罔悟則誅及五族有殄無遺軍科爵賞信如皎日巫山既燎芝艾共烟幸遵良塗無守毀轍檄到宣告咸使聞知宋書鄧琬傳案荀道林為子勛記室參軍此檄當是道林所作
