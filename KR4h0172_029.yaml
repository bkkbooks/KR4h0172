body:
  text: 荀伯子上表論先朝封爵臣聞咎繇亡嗣臧文以為深歎伯氏奪邑管仲所以稱仁功高可百世不泯濫賞無得崇朝故太傅巨平侯羊祜明德通賢國之宗主勳參佐命功成平吳而後嗣闕然蒸嘗莫寄漢以肅何元功故絶世輒繼愚謂巨平之封宜同酇國故太尉廣陵公陳淮黨翼賊倫禍加淮南因逆為利竊饗大邦值西朝政刑失裁中興復因而不奪今王道維新豈可不大判臧否謂廣陵之國宜在削除故太保衛瓘本爵蕭陽縣公既被橫害乃進茅士始贈蘭陵又轉江夏中朝名臣多非理終瓘功德無殊而獨受偏賞謂宜罷其郡復邑蕭陽以正國章則與奪有倫善惡分矣晉書荀勖傳宋書荀伯子傳遷尚書祠部郎義熙九年上表上表言零陵王宜在陳留王上伏見百官位次陳留王在零陵王上臣愚竊以為疑昔武王剋殷封神農之後於焦黃帝之後於祝帝堯之後於薊帝舜之後於陳夏後於杞殷後於宋杞陳竝為列國而薊祝焦無聞焉斯則褎崇所承優於遠代之顯驗也是以春秋次序諸侯宋居杞陳之上考之近世事亦有徵晉太始元年詔賜山陽公劉康子弟一人爵關內侯衛公姬署宋孔紹子一人駙馬都尉又太始三年太常上博士劉喜等議稱衛公署於大晉在三恪之數應降稱侯臣以零陵王位宜在陳留王之上陳留王宜降爵為公宋書荀伯子傳元嘉五年上表又見通典七十四作上疏奏劾何尚之左衛將軍何尚之公事每罩笠有虧體制建野笠于公門棄華傘而不御御覽七百二引宋元嘉十年起居注御史中丞荀伯子奏難裴松之大功嫁妹議本不謂父可而兄反不可今所疑謂父兄及女身竝不可耳案禮小功之初不妨嫁子其末則可以娶妻下殤之小功則不可今所本是周服故也今降在大功亦本是周服何得復於降殺之內以行婚姻之禮邪禮云大功之末可以嫁子者自是論本服耳所以不明降在大功一可者正以下殤之小功是以包之也若謂降與不降必其不殊者其兄出後姊妹出適便再降為小功矣請問居此小功服在始亦可即以嫁子乎三月卒哭又可以娶妻乎奚獨慈於下殤而薄於出降之甚邪通典六十答何承天問為人後為所後父服何承天問曰婦人夫先亡無男有女已出嫁婦人亡後未周宗族之家乃以兒繼其後今既更制廬杖未知當及亡月一周便練為取出後日為制服之始荀伯子答曰出後晚異於聞喪晚稅服也應以亡月為周不以出後日為制服之始假使甲有婦及男女甲死甲兒持重服已練甲兒復死甲弟乙方以子景後甲景以為伯持周年服訖便更制二十五月服甲婦女不合先景除服何容持三周服邪難者或疑若使甲服將除而景始出後景便是服斬旬日而除意謂若服將訖宜待除服方出後耳不可使甲婦女四周服也通典九十七何重問出適之女周而除心制既過即吉之後而來繼之弟不為喪始門庭凶素靈筵未毀舛錯深淺豈稱人情今謂宜待除服為後是也今問不待除者耳若不服其殘月便當如知喪晚特一人未即吉二條何者為安荀重答曰意謂出後未及練者宜服其殘月以亡月為周若將服竟出後宜延待服竟至於去廬即練綅縞從輕此自降殺以漸所謂送死有已復生有節非明出後始為喪主也又謂為人後者在練則練在綅則綅何疑服旬便除然謂此語不通設使甲死其婦女持服已再周甲弟乙持二子從遠還始聞喪以其長子景後甲景弟丁為伯父追周服景以出後之故更綅縞旬日除所為深淺舛錯不是過也譬如知喪晚特一人未即吉此又所疑也凡出後晚異知晚也既已制本服今日月已過無緣更居再周若甲之婦女無事不吉而來繼之子門庭凶素此婦女無容避此凶居別卜吉宅又不可使婦女歌於內而繼子哭於外謂應服其殘月通典九十七答司馬操難為人後為所後父服論難曰為人後者奉亡事存如所生不異盡禮於彼而致降於此答曰同所生者謂出後及所養耳不謂垂除而追責使同也設使所繼者是絶服之親而繼父有兄弟喪未周豈可悉追制伯叔周服乎故知及喪則同已死則異若本服大功之親雖數十載之後猶追為稅服至於出後之子在三年之外便不為繼父追服明既往不可得周也難曰乙子景今來後甲既不可與其弟丁同稅周服又不可制居綅縞旬日而除既為甲子而反不如丁豈有處三年之地而絶於一日之哀乎答曰謂景應先稅周服畢然後可出後耳設使甲死已三十年乙將景丁從絶域還始聞甲喪豈可使景丁二子同稅周服然後議出後之事乎若猶使景居重甲婦女平吉已來或是朝市改易豈可方納一孝居喪乎雖復三十年而丁猶稅服景不可以反不如丁得不待稅服畢乎設使周公更生不能易此言也通典九十七奏劾顏延之求田問舍前賢所鄙延之惟利是視輕冒陳聞依傍詔恩拒捍餘直垂及周年猶不畢了昧利苟得無所顧忌延之昔坐事屏厈復蒙抽進而曾不悛革怨誹無已交游闒茸沈迷麴糱橫興譏謗詆毀朝士仰竊遺榮增憤薄之性私恃顧眄成彊梁之心外示寡求內懷奔競干祿祈遷不知極已預宴班觴肆罵上席山海含容每為遵養愛棄雕蟲未忍遐棄而驕放不節日月彌著臣聞聲問過情孟軻所恥況聲非外來問由已出雖心智薄劣而高自比擬客氣虛張曾無愧畏豈可復弼亮五教增曜台階請以延之訟田不實妄干天聽以彊凌弱免所居官宋書顏延之傳延之坐啓買人田不肯還直尚書左丞荀赤松奏詔可奏藉田儀注藉田儀注皇帝冠通天冠朱紘青介幘衣青妙袍侍中陪乘奉車郎秉轡案漢輿服志曰通天冠乘輿常服也若斯豈可以常服降千畝邪禮記曰昔者天子為藉千畝冕而朱紘躬秉耒鄭玄注周官司服異服同冕尊故也時服雖變冕制不改又潘嶽藉田賦云常伯陪乘太僕秉轡推此輿駕藉田宜冠冕璪十二瑬朱紘黑介幘衣青妙袍常伯陪乘太僕秉轡宜改儀注一遵二禮以為定儀宋書禮志五大明四年正月尚書左丞荀萬秋奏續秋令服色議伏尋幘非古者冠冕之服禮無其文案蔡雍獨斷云幘是古卑賤供事不冠人所服又董仲舒止雨書曰其執事皆赤幘知竝不冠之服也漢元始用衆臣率從故司馬彪輿服志曰尚書幘名曰納言迎氣五郊各如其色從章服也自茲相承迄于有晉大宋受命禮制因循斯既歷代成準謂宜仍舊宋書禮志二元嘉六年六月太廟送神議古之事尸與今之事禮其義一也周禮尸出送于廟門拜尸不顧詩云鐘鼓送尸則送神之義其來久矣記曰迎牲而不迎尸別嫌也尸在門外則疑於臣入廟中則全於君君在門外則疑於君入廟則全於君是故不出者明君臣之義宋書禮志四元嘉六年七月博士荀萬秋議郊廟樂議案禮祭天地有樂者為降神也故易曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考周官曰作樂於圜丘之上天神皆降作樂於方澤之中地祗皆出又曰乃奏黃鐘哥大呂舞雲門以祀天神乃奏大簇哥應鐘舞咸池以祀地祗由斯而言以樂祭天地其來尚矣今郊享闕樂竊以為疑祭統曰夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜此周道也至漢奏五行魏舞咸熙皆以用享爰逮晉氏泰始之初傅玄作晉郊廟哥詩三十二篇太康中荀蕃受詔成父勖業定金石四縣用之郊廟是則相承郊廟有樂之證也今廟祠登哥雖奏而象舞未陳懼闕備禮夫聖王經世異代同風雖損益或殊降殺迭運未嘗不執古御今同規合矩方茲休明在辰文物大備禮儀遺逸罔不具舉而況出祗降神輟樂於郊祭昭德報功有闕於廟享謂郊廟宜設備樂宋書樂志一孝建二年九月甲午有司奏前殿中郎荀萬秋議又見通典一百四十七永陽侯劉升子服制議南面君國繼體承家雖則佩觿未闕成德君父名正臣子不容服殤故云臣不殤君子不殤父推此則知旁親故依殤制東平沖王已經前議若升仕朝列則為大成故鄱陽哀王追贈太常親戚不降愚謂下殤以上身居封爵宜同成人年在無服之殤以登官為斷今永陽國臣自應全服至於旁親宜從殤禮宋書禮志二通典八十二大明五年七月左丞荀萬秋等參議與友人蕭斌書魯軌頑鈍馬楚粗狂亡人之中惟王慧龍及韓延之可為深憚不意儒生儒夫乃令老子訝之魏書王慧龍傳又北史三十五辭侍中表臣志幹短弱歷著出處值皇塗隆泰身荷恩榮階牒推遷日月頻積失在叨餮患不自量而奉聞今授固守愚心者竊惟殊次之寵必歸器望喉脣之任非才莫居三省諸躬無以克荷豈可苟順甘榮不知進退上虧朝舉下貽身咎求之公私未見其可顧涯審分誠難庶幾踰方越序易以誡懼所以俯仰周偟無地寧處若惠澤廣流蘭艾同潤回改前旨賜以降階雖實不敏敢忘循命臣忤違之愆既已屢積寧當徒尚浮采塵黷天聽丹情悾款仰希照察宋書殷景仁傳少帝即位入補侍中纍表辭讓又固陳改除黃門侍郎章太后生母蘇氏喪禮議至德之感靈啓厥祥文母俔天實熙皇祚主上聿遵先典號極徽崇以貴之義禮盡於此蘇夫人階緣戚屬情以事深寒泉之思實感聖懷明詔爰發詢求厥中謹尋漢氏推恩加爵於時承秦之弊儒術蔑如自君作故罔或前典懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞於無私奉天統者每屈情以申制所以作孚萬國貽則後昆臣豫蒙博逮謹露庸短宋書殷景仁傳文殊像贊文殊淵睿式昭厥聲探玄發暉登道懷英琅琅三達如日之明亹亹神通在變伊形將廓恆沙陶鑄群生真風幽曖干祀彌靈思媚哲宗寤言祗誠絶塵孤栖祝想太冥廣弘明集十六文殊師利贊并序文殊師利者是遊方菩薩因離垢之言而有斯自非厥號所先也原夫稱謂之生蓋至道興其貌何者虛引之性彰於立德軌世之表聞於童真廉俗之風移則感時之訓興故云濡首又以法王子為名焉夫欲窮其淵致者必先存其深大終古邈矣豈言像之所極難算之劫功高積塵悠悠遐曠焉可為言請略敘其流若人之始出也爰自帝胄尊號法王無上之心兆於獨悟發中之感無不由他近一遇正覺而靈珠內映玄景未移遂超登道位於是深根永搆於沖壤豐條翼神柯而同茂慈悲之氣與惠風俱扇三達之明與日月竝曜具體而微固以功侔法身矣若乃天機將運即神通為館宇圓應密會以不疾為影跡斯其所以動不離寂而彌綸宇宙倏忽無常境而名冠遊方者也世尊興出乃援躍進之明顯潛德於香林因慶雲而西徂復龍見於茲剎法輸既轉則玄音屢唱對明淵極輒畼發深言道映開士故諸佛美其稱體絶塵俗故濯纓者高其跡非夫合和以挺作吸沖氣而為靈舒重霄以回蔭吐德音而流聲亦孰能與於此哉將欲搖蕩群生之性宅至柔之主開宏基於一簣廓恆沙而為宇若然而不悅文殊之風則未達無窮之量長笑於方寸之寂矣自世尊泥洹幾將千祀流光移蔭復與昔而升降由是冥懷宗極者感悲長津之喪源懼風日之潛損遂共表容金石繼以文頌人思自盡庶雲露以增潤今之所遇蓋是數滅百年有鐵輪王王閰浮提號曰阿育仰規逸軌擬而像焉雖真宰不存於形而靈位若有主雖幽司不以情求而感至斯應神變之異屢革民聽因險悟時信有自來矣意以為接頽薄之運實由冥維之功通夫昏否之俗固非一理所弘是以託想之賢祗誠攸寄思紐將絶之緒引毫心以標位乃遠摸元匠像天所像感來自衷不覺欣然同詠眇眇童真弱齡啓蒙含英吐秀登玄履峰神以道王體以沖通浪化遊方乃軌高蹤流光遺映爰暨茲隆思對淵匠靖一惟恭虐襟絶代庶落塵封廣弘明集十六與子姪書夫生之修短咸有定分定分之外不可以智力求但當於所稟之中順而勿率耳吾少嬰羸患事鍾養疾為性好間志栖物表故雖在童樨之年已懷遠迹之意暨于弱冠遂託業廬山逮事釋和尚于時師友淵源務訓弘道外慕等夷內懷悱發於是洗氣神明玩心墳典勉志勤躬夜以繼日爰有山水之好悟言之歡實足以通理輔性成夫亹亹之業樂以忘憂不知朝日之晏矣自遊道餐風二十餘載淵匠既傾良朋凋索續以釁逆違天備嘗荼蓼疇昔誠願頓盡一朝心慮荒散情意衰損故遂與汝曹歸耕壟畔山居谷飲人理久絶日月不處忽復十年犬馬之齒已踰知命崦嵫將迫前塗幾何實遠想尚子五嶽之舉近謝居室瑣瑣之勤及今耄未至惛衰不及頓尚可厲志於所期縱心於所託棲誠來生之津梁專氣暮年之攝養玩歲日於良辰偷餘樂於將除在心所期盡於此矣汝等年各成長冠娶己畢修惜衡泌吾復何憂但願守全所志以保令終耳自今以往家事大小一勿見關子平之言可以為法宋書雷次宗傳與子姪書以言所守答袁悠問袁悠問雷次宗曰喪服大夫為貴臣貴妾緦何以便為庶母無服又案檀弓云悼公之母死哀公為之齊縗有若曰諸侯為妄齊縗禮歟鄭注云妾之費者為之緦耳左傳云晉少姜卒明年正月既葬齊使晏平仲請繼室叔向對曰寡君以在縗絰之中案此諸侯為妾便有服也次宗答曰大夫為貴妾緦案注貴妾姪娣也夫姪娣實貴而大夫尊輕故不得不服至於餘妾出自凡庶故不服又天子諸侯一降旁親豈容滕妾更為服也鄭注喪服無服是也又注檀弓哀公為悼公母齊縗云妾之貴者為之緦耳此注謂諸侯為貴妾緦既與所注喪服相違且諸侯庶子母卒無服皆以父所不服亦不敢服未喻檀弓注云何以服言諸侯為貴妾緦邪左傳所言云少姜之卒有縗絰之言者是春秋之時諸侯淫侈至於甚者乃為齊縗此蓋當時之弊事非周公之明典也通典九十二答蔡廓問蔡廓問雷次宗云禮稱唯主喪不除恐此正施於嫡傳重者耳按漢蕭太傳云主喪獨謂子也又案王肅云斬衰之喪未葬直云主喪不除而王舉重為言明正謂孝子不變餘皆除也今世人為妻亦不除主喪將宜除邪雷次宗曰不言三年而云主喪是不必唯施子孫也吉凶異道不得相干殯柩尚在豈可辨冕臨奠夫主妻喪以本重故也謂不宜除通典一百三甥姪夫謂吾姑者吾謂之姪此名獨從姑發姑與伯叔於昆弟之子其名宜同姑以女子有行事殊伯叔故獨制姪名而字偏從女如舅與從母為親不異而言謂吾舅者吾謂之甥亦猶自舅而制也名發於舅字亦從男故姪字有女明不及伯叔甥字有男見不及從母是以周服篇無姪字小功篇無甥名也通典六十八吳都賦巖巖船艫泛泛楊舟雍河桀跱風駭雲浮堅壁金城狀若高樓推折天波橫截流江北堂書鈔一百三十七引兩條御覽七百七十金玉星煩明當霞聚纖絺細越青箋白紵名練奪乎樂浪英葛先乎三輔御覽八百二十引夏侯闢國吳都賦知弼字闢國爾其遐域則虯窟蒸雲龍洞引電浮石乘流鯉獸口見神州城隆高鴻重巒大風駭其穴浮雲出其端北堂書鈔一百五十八
