body:
  text: 庾亮之皇子出後告廟議案禮大事則告祖禰小事則特告禰今皇子出嗣宜告禰廟宋書禮志四孝建三年五月太常丞庾亮之議國子為生母求除太夫人議母以子貴雖春秋明義古今異制因革不同自頃代以來所生蒙榮唯有諸王既是王者之嬪御故宜見尊於蕃國若功高勳重列為公侯亦有拜太夫人之禮凡此皆朝恩曲降非國之所求子男妾母未有前比宋書禮志二孝建三年八月有司奏雲杜國解稱國子檀和之所生親王求除太夫人檢無國子除太夫人先例法又無科下禮官議正太常丞庾蔚之議詔可喪遇閏議禮正月存親故有忌日之感四時既變人情亦已衰故有二祥之殺是則祥忌皆以周月為議而閏亡者明年必無其月不可以無其月而不祥忌故必宜用閏所附之月閏月附正公羊明義故班固以閏九月為後九月月名既不殊天時亦不異若用閏之後月則春夏永革節侯亦舛設有人以閏臘月亡者若用閏後月為祥忌則祥忌應在後年正月祥涉三載既失周期之義冬亡而春忌又乖致感之本譬人年末三十日亡明年末月小若去年二十九日親尚存則應用後年正朝為忌此必不然若其不然則閏亡者亦可知也通閏並用閏附於正而正不假閏得周便祚何待於閏且祥忌異月亦非禮意宋書禮志二大明元年二月太常丞庾蔚之議又見通典一百太子妃喪不舉祭議禮所以有喪廢祭由祭必有樂皇太子以元嫡之重故主上服妃不以尊降既正服大功愚謂不應祭有故三公行事是得祭之辰非今之比卿卒猶不繹況於太子妃乎宋書禮志四大明五年十月有司奏今月八日蒸祠二廟公卿行事有皇太子獻妃服前太常丞庾蔚之議晉陵王無後廟祭議既葬三日國臣從權制除而釋靈筵猶存朔望及期忌諸臣宜還臨哭變服衣帢使上卿主祭王既未有後又無三年服者期親服除之而國尚存便宜立廟為國之始祖服除之日神主暫祔食祖廟諸王不得祖天子宜祔從祖國廟還居新廟之室未有嗣之前四時饗薦當使上卿主之宋書禮志四大明六年十月太常丞庾蔚之議又見通典五十二四時講武獻牲議和所言是搜狩不失其時此禮久廢今時和表晏講武教人又虔供乾豆先薦二廟禮情俱允社主土神司空土官故祭社使司空行事太廟宜使上公參議搜狩之禮四時異議禮有損益時代不同今既無復四方之祭三殺之儀曠廢來久禽獲牲物面傷翦毛未成禽不獻太宰令謁者擇上殺奉送先薦廟社二廟依舊以太尉行事宋書禮志四大明七年二月兼太丞庾蔚之議晉陵國廟祭議緦不祭者據主為言也晉陵雖未有嗣宜依有嗣致服依闕祭之限衡陽為族伯緦麻則應祭三月宋書禮志四大明七年十一月太常丞庾蔚之議婚禮不賀議按禮文及鄭注是親友聞主人有吉事故遣人送酒肉以賀之但婚有嗣親之感故不斥注主人以賀婚唯云為有客而已今上禮既所為者婚亦不得都無慶辭彪之議為允通典五十九庾蔚之議晉惠懷廟次爾時愍帝尚在關中元帝為晉王立廟猶以愍帝為主故上至潁川為六代懷景二帝雖非昭穆之正數而不合毀是以見位餘八也通典五十一兄弟昭穆大夫士尊不相絶故必宗嫡而立宗承別子之嫡謂之宗子收族合食糾正一宗者也故特加齊縗三月之服至四小宗則服無所加唯昆弟之為人後姊妹雖出一降而已曾子問宗子為士庶子為大夫以上牲祭於宗子之家鄭云貴祿重宗也小記庶子不祭禰者明其宗也至諸侯尊絶大夫不得以太牢祭卿大夫之家是以經無諸侯為宗服文則知諸侯奪宗各自祭不復就宗祭也又諸侯別子封為國君亦得各祭四代何以知其然諸侯既不就祭人子不可終身不得享其祖考居然別祭四代或疑神不兩享舉魯鄭祭文祖厲足塞矣余以弟祿卑於兄不得兩祭虞以為可兩祭由於父非諸侯又未善也通典五十一緦不祭殷庾釋文句甚允但未統立言大意記所明重其已與神交而不終外喪尸殯不在此可得少申其事故大夫之祭鼎俎既陳籩豆既設內喪小功緦麻外喪齊縗以下行特為已與神父故隨輕重各有所行又云士之所以異緦不祭者加大夫有小功緦麻皆廢故鄭云然則士不得成禮者十一也又云所於死者服則祭者言所異於末與神交時有此則內外之喪通廢士卑故也言有始末義統有本尋禮者多斷取義不辨已與神交之異故申之云通典五十二公除祭公除是公家除其喪服以從公家之吉事若公家無齋禁則其受弔臨靈及私常著喪服豈得輒釋凶服以執吉祭乎徐藻乃云外喪公除雖停殯可吉祭恐此非祖禰之所享也兄弟別居便為外喪未葬公除而可以蒸嘗未之聞也通典五十二周喪迎婦拜時俗既流弊故以拜時代三日推其始意當是貪得從省以赴吉歲若周大功之喪既葬不可迎已拜之婦則與始婚不異非其旨也通典五十九周服降小功嫁娶禮云下殤之小功則不可而不云再降之小功則知再降之小功可以娶通典六十降服嫁女昔為禮記略解已通此議大功重而嫁輕小功輕而娶重故大功之末可以嫁小功之末可以娶也所以然者下殤小功本周親者以其殤折之痛既人情所哀不可以娶長殤大功鄰於成人大功接於齊縗周親之內於情差重冠嫁之事可同於成人之大功故不言長殤大功之不嫁也通典六十四孤四孤之父母是事硋不得存養其子豈不欲子之活推父母之情豈不欲與人為後而苟使其子不存邪如此則與父命後人亦何異既為人後何必戴其姓神不歆非類蓋舍己族而取他人之族為後若己族無所取而養他子者生得養己之老死奉其先祀神有靈化豈不嘉其功乎唯所養之父自有後而本宗絶嗣者便當還其本宗祀服所養父母依繼父齊衰周若二家俱無後則宜停所養家依為人後服其本親例降一等有子以後其父未有後之間別立室以祀之是也通典六十九天子為庶祖母服公羊明母以子貴者明妾貴賤若無嫡子則妾之子為先立又子既得立則母隨貴豈謂可得與嫡同邪成風稱夫人非禮之正穀梁己自為通小記云大夫降其庶子其孫不降其父此謂凡庶子故鄭玄云祖不厭孫耳非謂承祖之重而可得申其私服也庶子為後不得服其母以廢祭故也則己卒己子亦不得服庶祖母可知矣小記言妾子不代祭穀梁傳言於子祭於孫止此所明凡妾非謂有加崇之禮者也古今異禮三代殊制漢魏以來既加庶以尊號徽旗章服為天下小君與嫡不異故可得重服而廟祭傳祀六代耳非古有其議也通典八十一天子立庶子為太子薨服王堪以為拜為太子則全同嫡正王接據庶子為後為其母緦庶名不去故雖為太子猶應與衆子同天子不為服可謂兩失其衷嘗試言之按喪服傳通經長子三年言以正體乎上又將所傳重明二義兼足乃得加至三年今拜為太子則是將所傳重寧得猶與衆庶子同其無服乎天子諸侯絶傍周今拜庶子為太子不容得以尊降之既非正嫡但無加崇耳自宜伸其本服一周庶子為後不得全與嫡同庶名何由得去己服祖曾與嫡不異是與嫡同者也祖曾為己服無加崇是與嫡異者也天子諸侯大夫不以尊降又與衆子不同矣通典八十一天子為母黨服禮父所不服子不敢服嫡子為妻之父母服則天子諸侯亦服妻之父母可知也妻之父母猶服況母之父母乎通典八十一公主為其母服公主為其母應周何以言之在室有餘尊之厭服不得過大功故服母及兄弟不得有異既出無厭故為母得周所以知既出則無厭者禮尊降出降親疏不異尊降唯不及其嫡耳至於厭降唯子而已在室父在為母周既出服母與父同是故知既出則無厭也又正尊不報禮之大例而女子適人父報以周使其移重於夫族推旁親也以此推之出則無則理據益明通典八十一諸王子所生母嫁為慈母服母出無相鞠養便為無母不必限其母亡譙王所命不為乖禮此子自宜依慈母如母之服按晉朝諸王用士禮則應附父任為母之條凡慈母以功勤致服本無天屬之愛寧有心喪之文乎通典八十一晉譙王恬問范寧妾有二子而出嫁君命他妾兼子為其母所命妾今亡子當有服不故云童子行服馬融以童為未成人鄭玄以為未成人之稱並不明下至幾歲戴德以童子當室十五至十九譙周云十四已下不堪麻則不記云十五成童舞象耳豈是經所云童子當室者邪按禮稱童子參差不一以事推之則大小可知矣愚謂當室與族人為禮若是八歲已上及禮之人以其當室故令與成人同昔射慈以為未八歲者服其近屬布深衣或合禮意通典八十一皇后親為皇后服與天子有服既為之斬縗與王后有服則宜齊縗周也雖婦亦宜以有服為斷應如孔恢議通典八十一晉孝后崩庾家訪服孔恢云庾家男女宜齊縗庾家諸婦今服周諸侯公卿妻為皇后服服問云君為天子三年夫人如外宗之為君按鄭玄注云外宗君外親之婦也其夫與諸侯為兄弟服斬妻從服周諸侯為天子服斬夫人亦從服周按王蕭注云外宗外女之嫁於卿大夫者也為君服周今鄭王雖小異而同謂夫服君斬縗故妻從服周耳未聞王妃服后與不雜記云外宗為君夫人猶內宗也鄭注皆謂嫁於國中者也為君服斬縗夫人齊縗不敢以其親服服至尊外宗謂姑姊之女舅之女及從母皆是也內宗五屬之親也其無服而嫁於諸臣者從為夫之君按先儒皆以有親服之故成以君臣之服琅琊王妃者是司馬道子妻於孝武定后本娣姒小功之服王者絶旁親故宜成以臣妾齊縗之周通典八十一晉泰元中琅琊王納妃裁登車而定后凶禍至即依在途遭喪改服即位哭藩國臣為皇后服經但云諸侯大夫為天子而不及后則知后無服也若有服則當連言且云時接見乎天子益知后不在其例矣弘據引大夫之制不成禮者凡后之喪在其數以明后必有服蔚之按記云士之所以異緦不祭鄭氏云然則士不得成禮諸侯之士亦不服天子及后而亦不成禮明不成禮不必為服止以君有天不及后之喪以宜隨例致哀故亦同廢祭耳通典八十一晉恭皇后崩東海國臣弘據刺問禮官故云皇太子降服今唯太子從君所服皇子公子則無厭降通典八十二諸王持重為所生母服庶子為後為所生服緦此禮之正文近遂為三年失之甚也按晉樂安王所生母喪議者謂小功孝武詔令大功乃合餘尊之義但餘尊之厭不言為後者也即今猶皆三年通典八十二諸王出後降所生母服晉簡文愛其膝下之慕不尋為後移天之重通典八十二為諸王殤服嗣子之體不以成人為義故經有諸侯嫡子之殤服臣子不殤君父宮臣得服斬耳自餘親自依其本服記云能執干戈以死社稷則以成人服之先儒又夫年未二十而冠婚及為大夫者皆不為殤至若諸侯繼體象賢君臨一事過大夫遠矣而可反殤之乎通典八十二王侯庶子殤服臣以義服故所從極於三年經舉重服必從則輕不從可知也若從服世子之殤亦可從服嫡婦豈其然乎唯小君非從故與君同通典八十二五服昔賀循以為夫服緣情而制故情降則服輕既虞哀心有殺是故以細代粗以齊代斬耳若猶斬之則非所謂殺也若謂以斬縗命章便謂受猶猶斬者則疏縗之受復可得猶用疏布乎是知斬疏之名本生於始死之服以名其喪耳不謂終其日月皆不變也通典八十七重服按禮鄭注曰用恩則父重用義則祖重父之與祖各有一重之義故聖人制禮服祖以至親之服而傳同謂之至尊也已承二重之後而長子正體於上將傳宗廟之重然後可報之以斬故傳記皆據祖而言也若繼禰便得為長子斬則不應云不繼祖喪服傳及大傳皆云不繼祖以明庶子雖繼禰而不繼祖則不服長子斬也賀氏要記云庶子父雖歿猶不為長子三年以己不繼祖也是亦明己身繼祖乃得為長子斬也既義由於繼祖則不必須云及禰或者疑祖之言是道庶子之長故此記特言不繼祖與禰以明據庶子言之也通典八十八孫為庶祖持重祖庶父嫡已承父統而不謂之繼祖則祖誰當祭之所謂繼是承其後為之祭故云傳重而服之斬若杜琬所言祖父俱嫡乃是繼曾祖耳祖雖非嫡而是己之所承執祭傳統豈得不以重服服之乎已服祖以斬故祖亦服已以周長子之服義則不同要須己身承祖禰之正乃得為長子斬不繼祖與禰是明庶子不繼祖禰故不得為長子斬非據子之身若據長子身不得云不繼禰也必須身承祖禰之正乃得服長子斬者以尊加卑異於卑加尊也劉智分此不繼祖與禰之言以為庶子不繼禰故其長子繼祖書記未有此連言之比且庶子不繼禰其子居然不繼祖矣通典八十八
