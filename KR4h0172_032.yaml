body:
  text: 謝靈運謝封康樂公表昔強氐暴虐恃僭歷紀既噬五都志吞六合遂陷沒西河傾覆南漢凌籍紀郢跨越淮泗於時策畫惟疑地險已謝咸懼君臣同泯有生無餘亡祖奉國威靈董符戎重盡心所事剋黜禍亂功參盤鼎胙土南服逮至臣身值遭泰路日月改暉榮落代運輸稅唐化生幸無已不悟天道下濟鴻均曲成乃眷遐績式是興徵分虎鈕龜復顯茅土鳴玉拖紱班景元勳澤洽往德恩覃來胤永維先蹤遠感崩結豈臣尪弱所當忝承臣聞至公無私甄善則一皇恩遠被殊代可侔是以信陵之賢簡在高祖之心望諸之道復獲隆漢之封觀史歎古欽茲盛美豈謂榮渥近霑微躬傾宗殞元心識其會酬恩答厚罔知所由藝文類聚五十一詣闕自理表臣自抱疾歸山於今三載居非郊郭事乖人間幽棲窮巖外緣兩絶守分養命庶畢餘年忽於去月二十八日得會稽太守臣顗二十七日疏云比日異論噂誻此雖相了百姓不許寂默今微為其防披疏駭惋不解所由便星言奔馳歸骨陛下及經山陰防衛彰赫彭排馬槍斷截衢巷偵邏縱橫戈甲竟道不知微臣罪為何事及見覬雖曰見亮而裝防如此唯有罔懼臣昔忝近侍豫蒙天恩若其罪迹炳明文字有證非但顯戮司敗以正國典普天之下自無容身之地今虛聲為罪何酷如之夫自古讒謗聖賢不免然致謗之來要有由趣或輕死重氣結黨聚群或勇冠鄉邦劍客馳逐未聞俎豆之學欲為逆節之罪山棲之士而構陵上之舋今影迹無端假謗空設終古之酷未之或有匪吝其生實悲其痛誠復內省不疚而抱理莫申是以牽曳疾病束骸歸款仰憑陛下天鑒曲臨則死之日猶生之年也臣憂怖彌日羸疾發動尸存恍惚不知所陳宋書謝靈運傳上書勸伐河北自中原喪亂百有餘年流離寇戎湮沒殊類先帝聰明神武哀濟群生將欲蕩定趙魏大同文軌使久凋反於正化偏俗歸於華風運謝事乖理違願絶仰德抱悲恨存生盡況陵塋未幾凶虜伺隙預在有識誰不憤歎而景平執事並非其才且遘紛京師豈慮託付遂使孤城窮陷莫肯拯赴忠烈囚朔漠綿河三千翻為寇有晚遣鎮戍皆先朝之所開拓一旦淪亡此國恥宜雪被於近事者也又北境自染逆虜窮苦備罹徵調賦斂靡有止已所求不獲輒致誅殞身禍家破闔門比屋此亦仁者所為傷心者也咸云西虜舍末遠師隴外東虜乘虛呼可掩襲西軍既反得據關中長圍咸陽還路已絶雖遣救援停住河東遂乃遠討大城欲為首尾而西寇深山重阻根本自固徒棄巢窟未足相拯師老於外國虛於內時來之會莫復過此觀兵耀威實在茲日若相持未已或生事變忽值新起之衆則異於今苟乖其時難為經略雖兵食倍多則萬全無必矣又歷觀前代類以兼弱為本古今聖德未之或殊豈不以天時人事理數相得興亡之度定期居然故古人云既見天殃又見人災乃可以謀昔魏氏之強平定荊冀乃乘袁劉之弱晉氏之盛拓開吳蜀亦因葛陸之衰此皆前世成事著於史策者也自羌平之後天下亦謂虜當俱滅長驅滑臺席卷下城奪氣喪魄指日就盡但長安違律潼關失守用緩天誅假延歲月日來至今十有二載是謂一紀曩有前言況五胡代數齊世虜期餘命盡於來年自相攻伐兩取其困卞莊之形驗之今役仰望聖澤有若飢渴注心南雲為日已久來蘇之冀實歸聖明此而弗乘後則未兆即日府藏誠無兼儲然凡造大事待國富兵強不必乘會於我為易則在得時器械既充衆力粗足方於前後乃當有優常議損益久證冀州口數百萬有餘田賦之沃著自貢典先才經創基趾猶存澄流引源桑麻蔽野強富之實昭然可知為國長久之計孰若一往之費邪或懲關西之敗而謂河北難守二境形勢表裏不同關西雜居種類不一昔在前漢屯軍霸上通火甘泉況乃遠戍之軍值新故交代之際者乎河北悉是舊戶差無雜人連嶺判阻三關作隘若遊騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破鼂錯興言胸奴慢侮賈誼憤歎方於今日皆為賒矣晉武中主耳值孫皓虐亂天祚其德亦由巨平奉策荀賈折謀故能業崇當年區宇一統況今升下聰明聖哲天下歸仁文德與武功並震霜威共素風俱舉協以宰輔賢明諸王美令嶽牧宣烈虎臣盈朝而天威遠命亦何敵不滅矧伊頑虜假日而已哉伏惟深機志務久定神謨臣卑賤側陋竄景巖穴實仰希太平之道傾覩岱宗之封雖乏相如之筆庶免史談之憤以此謝病京師萬無恨矣久欲上陳懼在觸罝蒙賜恩假暫違禁省消渴十年常慮朝露抱此愚志昧死以聞宋書謝靈運傳與廬陵王義真箋會境既豐山水是以江左嘉遁並多居之但季世慕榮幽棲者寡或復才為時求弗獲從志至若王弘之拂衣歸耕踰歷三紀孔淳之隱約窮岫自始迄今阮萬齡辭事就間纂戎先業浙河之外栖遲山澤如斯而已既遠同羲唐亦激貪厲競殿下愛素好古常若布衣每意昔聞虛想巖穴若遣一介有以相存真可謂千載盛美也宋書王弘之傳又南史二十四與弟書聞惡溪道中九十九里有五十九灘王右軍遊此惡道歎其奇絶遂書突星瀨於石答弟書前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海御覽九百四十二答范光祿書辱告慰企晚寒體中勝常靈運腳諸疾比春更甚憂慮故人有情信如來告企詠之結實成飢渴山澗幽阻音塵闊絶忽見諸讚歎慰良多可謂俗外之詠尋覽三復味玩增懷輒奉和如別雖辭不足觀然意寄盡此從弟惠連後進文悟衰宗之美亦有一首並以遠呈承祇洹法業日茂隨喜何極六梁徽緣竊望不絶即時經始招提在所住山南南簷臨澗北戶背巖以此息心當無所忝邪平生緬然臨紙纍歎敬惜為先繼以音告儻值行李輒復承問並廣弘明集十五答王衛軍問辨宗論書靈運白一悟理質以經誥可謂俗文之談然書不盡意亦前世格言幽僻無事聊與同行道人共求其衷猥辱高難詞徵理析莫不精究尋覽彌日欣若暫對輒復更伸前論雖不辨酬釋來問且以示懷耳海嶠岨迥披示無期臨白增懷眷歎良深靈運再拜廣弘明集十八答綱琳二法師書披覽雙難欣若暫對藻豐論博蔚然滿目可謂勝人之口然未厭於心聊伸前意無由言對執筆長懷謝靈運和南廣弘明集十八晉書武帝紀論世祖受命禎祥屢臻苛慝不作萬國欣戴遠至近安德足以彰天啓其運民樂其功矣反古之道當以美事為先今五等罔刑勿由王制反諸禮律未能是正而采擇嬪媛不徇華門者昔武王伐紂歸傾宮之女不可助紂為虐而世祖平晧納吳妓五千是同晧之弊婦人之封六國亂政如追贈外曾祖母違古之道凡此非事並見前書誠有玷於徽猷史氏所不敢蔽也御覽九十六辨宗論同遊諸道人並業心神道求解言外余枕疾務寡頗多暇日聊申繇來之意庶定求宗之悟釋氏之論聖道雖遠積學能至纍盡鑑生不應漸悟孔氏之論聖道既妙雖顏殆庶體無鑒周理歸一極有新論道士以為寂鑒微妙不容階級積學無限何為自絶今去釋氏之漸悟而取其能至去孔氏之殆庶而取其一極一極異漸悟能至非殆庶故理之所去雖合各取然其離孔釋遠矣余謂二談救物之言道家之唱得意之説敢以折中自許竊謂新論為然聊答下意遲有所悟已下並廣弘明集十八答法勗問法勗問敬覽清論明宗極雖微而一悟頓了雖欣新剖竊有所疑夫明達者以體理絶欲悠悠者以迷惑嬰纍絶欲本乎見理嬰纍繇於乖宗何以言之經云新學者離般若便如失明者無導是為懷理蕩患於茲顯矣若涉求未漸於大宗希仰猶纍於塵垢則永劫劬勞期果緬邈既懷猶豫伏遲嘉訓初答道與俗反理不相關故因權以通之權雖是假旨在非假智雖是真能為非真非真不傷真本在於濟物非假不遂假濟物則反本如此之劫無為空勤期果有如皎日勗再問案論孔釋其道既同救物之假亦不容異而神道之域雖賢也孔子所不誨實相之妙雖愚也釋氏所必教然則二聖建言何乖背之甚哉再答二教不同者隨方應物所化地異也大而挍之華民易於見理難於受教故閉其纍學而開其一極夷人易於受教難於見理故閉其頓了而開其漸悟漸悟雖可至昧頓了之實一極雖知寄絶纍學之冀良由華人悟理無漸而誣道無學夷人悟理有學而誣道有漸是故權實雖同其用各異昔向子期以儒道為一應吉甫謂孔老可齊皆欲窺宗而況真實者乎勗三問重尋答以華夷有險易之性故二聖敷異同之教重方附俗可謂美矣然淵極朗鑒作則於上愚民蒙昧伏從於下故作則宜審其政伏從必是其宗令孔廢聖學之路而釋開漸悟之徑筌蹄既已紛錯群黎何由歸真三答冬夏異性資春秋為始末晝夜殊用緣辰暮以往復況至精之理豈可徑接至粗之人是故傍漸悟者所以密造頓解倚孔教者所以潛成學聖學聖不出六經六經而得頓解不見三藏而以三藏果筌蹄歷然何疑紛錯魚兔既獲群黎以濟答僧維問僧維問承新論法師以宗極微妙不容階級使夫學者窮有之極自然之無有若符契何須言無也若資無以盡有者焉得不謂之漸悟邪初答夫纍既未盡無不可得盡纍之弊始可得無耳纍盡則無誠如符契將除其纍要須傍教在有之時學而非悟悟在有表託學以至但階級教愚之談一悟得意之論矣維再問論云悟在有表得不以漸使夫涉學希宗當日進其明不若使明不日進與不言同若日進其明者得非漸悟乎再答夫明非漸至信由教發何以言之由教而信則有日進之功非漸所明則無入照之分然向道善心起損纍出垢伏伏似無同善似惡乖此所務不俱非心本無纍至夫一悟萬滯同盡耳維三問答云由教而信則有日進之功非漸所明則無入照之分夫尊教而推宗者雖不永用當推之時豈可不暫令無邪若許其暫合猶自賢於不合非漸如何三答暫者假也真者常也假知無常常知無假今豈可以假知之暫而侵常知之真哉今暫合賢於不合誠如來言竊有微證巫臣諫莊王之言物賒於己故理為情先及納夏姬之時已交於物故情居理上情理雲互物己相傾亦中智之率任也若以諫日為悟豈容納時之惑邪且南為聖也北為愚也背北向南非停北之謂向南背北非至南之稱然向南可以至南背北非是停北非是停北故愚可去矣可以至南故悟可得矣答慧驎問慧驎演僧維問當假知之一合與真知同異初答與真知異驎再問以何為異再答假知者纍伏故理暫為用用暫在理不恆其知真知者照寂故理常為用用常在理故永為真知驎三問纍不自除故求理以除纍今假知之一合理實在心在心而纍不去將何以去之乎三答纍起因心心觸成纍纍恆觸者心日昏教為用者心日伏伏纍彌久至於滅纍然滅之時在纍伏之後也伏纍滅纍貌同實異不可不察滅纍之體物我同忘有無一觀伏纍之狀他己異情空實殊見殊實空異己他者入於滯矣一無有同我物者出於照也答驎維問驎維問三世長於百年三千廣於赤縣四部多於戶口七寶妙於石沙此亦方有小大故化有遠近得不謂之然乎初答事理不同恆成四端自有小大各得其宜亦有賢愚違方而處所謂世同時異物是人非譬割雞之政亦有牛刀佩璽而聽豈皆唐虞今謂言遊體盡於武城長世皆覃於天下未之聞也且俱稱妙覺而國土精粗不可以精粗國土而言聖有優劣景迹之應本非所徵矣維再問論曰或道廣而事狹或事是而人非今不可以事之大小而格道之粗妙誠哉斯言但所疑不在此耳設令周孔實未盡極以之應世故自居宗此自是世去聖遠未足明極夫降妙數階以接群粗則粗者所不測然數階之妙非極妙之謂推此而言撫世者於粗為妙然於妙猶粗矣以妙求粗則無往不盡以粗求妙則莫覩其源無往不盡故謂之窮理莫覩其源故仰之彌高今豈可就顏氏所崇而同之極妙邪再答今不藉顏所推而謂之為極但謂顏為庶幾則孔知幾矣且許禹昌言孔非本談以堯則天體無是同同體至極豈計有之小大邪維三問凡世人所不測而又昌言者皆可以為聖邪三答夫昌言賢者尚許其賢昌言聖者豈得反非聖邪日用不知百姓之迷蒙唯佛究盡實相之崇高今欲以崇高之相而令迷蒙所知未之有也苟所不知焉得不以昌言為信既以釋昌為是何以孔昌為非邪答法綱問竺法綱問敬披高論探研宗極妙判權實存旨儒道遺教孔釋昌言折中允然新論可謂激流導源瑩拂發揮矣詳復答勗維之問或謂因權以通為學而非悟爾為玄句徒設無關於胸情焉竊所未安何以言之夫道形天隔幾二險絶學不漸宗曾無髣佛馳騁有端思不出位神崖曷由而登機峰何從而超哉若勤務於有而坐體於無者譬猶揮豪鍾張之則功侔羿養之能不然明矣蓋同有非甚礙尚不可以玩此而善彼豈況乎有無之至背而反得以相通者邪又云纍既未盡無不可得盡纍之弊始可得無耳論曰夫膏肓大道摧輈玄路莫尚於封有之纍也蓋有不能袪有袪有者必無未有先盡有纍然後得無也就如所言纍盡則無爾為纍之自去實不無待實不無待則不能不無故無無貴矣如彼重暗自晞無假火日無假火日則不能不設亦明無尚焉落等級而奇頓悟將於是乎躓矣暇任之餘幸思嘉釋答曰來難云同有非甚礙尚不可以玩此而善彼豈況乎有無之至背而反得以相通者邪此是拘於所習以生此疑耳夫專玩筆札者自可不工於弧矢弧矢既工復玩筆札者何為不兼哉若封有而不向宗自是封者之失造無而去滯何為不可得背借不兼之有以詰能兼之無非惟鍾胡愧射於更李羿養慚書於羅趙觸類之躓始充巧歷之歎今請循其本夫憑無以伏有伏久則有忘伏時不能知知則不復辨是以坐忘日損之談近出老莊數緣而滅經有舊説如此豈纍之自去實無之所濟且明為晦新功在火日但火日不稱功於幽暗般若不言惠於愚蠢耳推此而往詎俟多云答慧琳問釋慧琳問云三復精議辨㦎二家斟酌儒道實有懷於論矣至於去釋漸悟遺孔殆庶蒙竊惑焉釋云有漸故是自形者有漸孔之無漸亦是自道者無漸何以知其然邪中人可以語上久習可以移性孔氏之訓也一合於道場非十地之所階釋家之唱也如此漸絶文論二聖詳言豈獨夷束於教華拘於理將恐斥離之辨辭長於新論乎勗道人難云絶欲由於體理當謂日損者以理自悟也論曰道與俗反本不相關故因權以通之物濟則反本問曰權之所假習心者亦終以為慮乎為曉悟之日與經之空理都自反邪若其永背空談翻為末説若始終相扶可循教而至不答維驎假知中殊為藻豔但與立論有違假者以旋迷喪理不以鑽火致惑苟南向可以造越背北可以棄燕信燕北越南矣慮空可以洗心捐有可以袪纍亦有愚而空聖矣如此但當勤般若以日忘瞻郢路而驟進復何憂於失所乎將恐一悟之唱更躓於南北之譬邪答曰孔雖曰語上而云聖無階級釋雖曰一合而云物有佛性物有佛性其道有歸所疑者漸教聖無階級其理可貴所疑者殆庶豈二聖異塗將地使之然斥離之歎始是有在辭長之論無乃角弓邪難云若其永背空談翻與末説若始終相扶可循教而至可謂公孫之辭辨者之囿矣夫智為權本權為智用今取聖之意則智即經之辭則權傍權以為檢故三乘咸蹄筌既意以歸宗故般若為魚兔良由民多愚也故教迂矣若人皆得意亦何貴於攝悟假知之論旨明在有者能為達理之諫是為交賒相傾非悟道之謂與其立論有何相違燕北越南有愚空聖其理既當頗獲於心矣若勤者日忘瞻者驟進亦實如來言但勤未是得瞻未是至當其此時可謂向宗既得既至可謂一悟將無同轡來馳而云異轍邪並廣弘明集十八答王衛軍問論曰由教而信有日進之功非漸所明無入照之分問曰由教而信而無入照之分則是暗信聖人若暗信聖人理不關心政可無非聖之尤何由有日進之功答曰顏子體二未及於照則向善己上莫非暗信但教有可由之理我有求理之志故曰關心賜以之二回以之十豈直免尤而已實有日進之功論曰暫者假也真者常也假知無常常知無假又曰假知纍伏理暫為用用暫在理不恆其知問曰暫知為假知者則非不知矣但見理尚淺未能常用耳雖不得與真知等照然寧無入照之分邪若暫知未是見理豈得云理暫為用又不知以何稱知答曰不知而稱知者正以假知得名耳假者為名非暫知如何不恆其用豈常之謂既非常用所以交賒相傾故諫人則言政理悅己則犯所知若以諫時為照豈有悅時之犯故知言理者浮談犯知者沈惑推此而判自聖已下無淺深之照然中人之性有崇替之心矣論曰教為用者心日伏伏纍彌久至於滅纍問曰教為用而纍伏為云何伏邪若都未見理專心暗信當其專心惟信而已謂此為纍伏者此是慮不能並屬此則彼廢耳非為理纍相權能使纍伏也凡厥心數孰不皆然如此之伏根本未異一倚一伏循環無已雖復彌久纍何由滅答曰纍伏者屬此則廢彼實如來告凡厥心數孰不皆然亦如來旨更恨不就學人設言而以恆物為譏耳譬如藥驗者疾易痊理妙者吝可洗洗吝豈復循環疾痊安能起滅則事不侔居然已辨但無漏之功故資世俗之善善心雖在五品之數能出三界之外矣平叔所謂冬日之陰輔嗣亦云遠不必攜聊借此語以況入無果無阻隔已上並廣弘明集十八
