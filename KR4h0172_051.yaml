body:
  text: 范義恭殷祭議依永初三年例須再周之外殷祭尋祭再周來二年三月若以四月殷則猶在禫內通典五十孝建元年十一月領曹郎范義議參議殷祭永初三年九月十日奏傅亮議權制即吉御世宜爾宗廟大禮宜依古典則是皇宋開代成準謂博士徐宏太常丞朱膺之議用來年十月殷祠為允宋書禮志三孝建元年十二月郎中周景遠參議詔可天子為皇后父服議權事變禮五服俱革緦麻輕制不容獨異謂至尊既已公除至三月竟不復有除釋之義宋書禮志二孝建三年三月前祠部郎中周景遠議太子妃喪不舉祭議案禮緦不祭大功廢祠理不俟言今皇太子故妃既未山塋未從權制則應依禮廢蒸嘗至尊以大功之服於禮不得親奉非有故之謂亦不使公卿行事宋書禮志四大明五年十月領軍長史周景遠議殷祠議按禮記云天子祫禘祫嘗祫蒸依如禮文則夏秋冬三時皆殷不唯用冬夏也晉義熙初僕射安國啓議自泰和四年相承殷祭皆用冬夏安國又啓永和十年至今五十餘年用三十月輒殷祠博士徐乾據禮難安國乾又引晉咸康六年七月殷祠是不專用冬夏於時晉朝雖不從乾議然乾據禮及咸康故事安國無以奪之今若以來四月未得殷祠遷用孟秋於禮無違宋書禮志三大明七年二月領軍長史周景遠議又見通典五十郊祠灌獻議按周禮大宗伯佐王保國以吉禮事鬼神祗禋祀昊天則今太常是也以郊天大常亞獻又周禮外宗云王后不與則贊宗伯鄭玄云后不與祭宗伯攝其事又說云君執圭瓚祼尸大宗伯執璋瓚亞獻中代以來后不廟祭則應依大宗伯攝亞獻也而今以太尉亞獻鄭注禮月令云三王右司馬無太尉太尉秦官也蓋世代彌久宗廟崇敬攝后事重故以上公亞獻又議履時之思情深於霜露室戶之感有懷於容聲不知神之所在求之不以一處鄭注儀禮有司云天子諸侯祭於祊而繹繹又祭也今廟祠闕送神之祼將移祭於祊繹明在於留神未得而殺禮郊廟祭殊故灌送有異宋書禮志三孝建二年正月太學博士王祀之議殷祭議虞禮云中月而禫是月也吉祭猶未配謂二十七月既禫祭當四時之祭月則未以妃配哀未忘也推此而言未禫不得祭也又春秋閔公二年吉禘於莊公鄭玄云閔公心懼於難務自尊成以厭其禍凡二十二月而除喪又不禫明禫內不得禘也按王肅等言於魏朝云今權宜存古禮俟畢三人舊說三年喪畢遇禘則禘遇祫則祫鄭玄云禘以孟夏祫以孟秋今相承用十月如宏所上公羊之文如為有疑亦以魯閔設服因言喪之紀制爾何必全許素冠可吉禘縱公羊異說官以禮為正亦求量宜宋書禮志三孝建元年十二月太常丞朱膺之議又見通典五十郊祠灌獻議按周禮大宗伯使掌典禮以事神為上職總祭祀而昊天為首今太常即宗伯也又袁山松漢百官志云郊祀之事太尉掌亞獻光祿掌三獻太常每祭祀先奏其禮儀及行事掌贊天子無掌獻事如儀志漢亞獻之事專由上可不由秩宗貴官也今宗廟太尉亞獻光祿三獻則漢儀也又賀循制太尉由東南道升壇明此官必預郊祭古禮雖由宗伯然世有因革上司亞獻漢儀所行愚謂郊祀禮重宜同宗廟且太常既掌贊天子事不容兼又尋灌事禮記曰祭求諸陰陽之義也殷人先求諸陽樂三闋然後迎牲則殷人後灌也周人先求諸陰灌用鬯達於淵泉既灌然後迎牲則周人先灌也此謂廟祭非謂郊祠按周禮天官凡祭祀贊王祼將之事鄭注云祼灌也唯人道宗廟有灌天地大神至尊不灌而郊未始有灌於禮未詳淵儒注義炳然明審謂今之有灌相承為失則宜無灌宋書禮志三孝建二年太常丞朱膺之議皇后為父服議凡云公除非全除之稱今朝臣私服亦有公除猶自窮其本制膺之云晉武拜陵不遂反服此時是權制既除衰麻不可以重制耳與公除不同愚謂皇后除心制日宜如舊反服未公除時服以申創巨之情宋書禮志二孝建三年三月太常丞朱膺之議皇子出後告廟議有事告廟蓋國之常典今皇子出紹事非常均愚以為宜告賀循云古禮異廟唯謁一室是也既皆共廟而闕於諸帝於情未安謂循言為允宜在皆告宋書禮志四孝建三年五月祠部朱膺之議國子為生母求除太夫人議子不得爵父母而春秋有母以子貴當謂傳國君母本先公嬪媵所因藉有由故也始封之身所不得同若殊績重勳恩所特錫時或有之不由司存所議宋書禮志二孝建三年八月有司奏雲杜國解稱國子檀和之所生親王求除太夫人祠部郎中朱膺之議王子出後告廟臨軒議南豐王嗣爵封已絶聖恩重矜特詔口繼茅土復申義同始封為之告廟臨軒宋書禮志四大明元年六月詔以前太子步兵校尉祗男歆紹南豐王朗祠郎朱膺之議皇后為父服議詳尋禮文心喪不應再禫皇代考驗己為定制元嘉季年禍難深酷聖心天至喪紀過哀是以出適公主還同在室即情變禮非革舊章今皇后二月晦宜依元嘉十九年制釋素即吉以文帝元嘉十五皇太子妃祖父右光祿大夫殷和喪變除之禮儀同皇后宋書禮志二大明二年正月領曹郎朱膺之議郊祀遇雨議按先儒論郊其議不一周禮有冬至日圜丘之祭月令孟春有祈穀於上帝鄭氏說圜丘祀昊天上帝以帝嚳配所謂禘也祈穀祀五精之帝以后稷配所謂郊也二祭異時其神不同諸儒云圜丘之祭以后稷配取其所在名之曰郊以形體言之謂之圜丘名雖有二其實一祭晉武捨鄭而從諸儒是以郊用冬至日既以至日理無常辛然則晉代中原不用辛日郊如除禪議也江左以來皆用正月當以傳云三王之郊各以其正晉不改正朔行夏之時故因以首歲不以冬日皆用上辛近代成典也夫祭之禮過時不舉今在孟春郊時未過值雨遷日於禮無違既以告日而以事不從禋祀重敬謂宜便告高堂隆云九日南郊十日北郊是為北郊可不以辛也宋書禮志三大明二年正月曹郎朱膺之議殷祭章后廟議閟宮之祀高堂隆趙怡竝云周人祫歲俱祫祭之魏晉二代取則奉薦名儒達禮無相譏非不愆不忘率由舊章愚謂同王燮之孫緬議宋書禮志四大明二年二月祠部朱膺之議天子為皇后父服議尊卑殊制輕重有級五服雖同降厭則異禮天子止降旁親外舅緦麻本在服例但衰絰不可以臨朝饗故有公除之議雖釋麻襲冕尚有緦麻月之制愚謂至尊服三月既竟猶宜除釋宋書禮志二通典八十皇后為父服議吉凶異容情禮相稱皇后一月之限雖過二功之服已釋哀喪所極莫深於尸柩親見之重不可以無服按周禮為兄弟既除喪以及其葬也反服其服輕喪雖除猶齊衰以臨葬舉輕明重則其禮可知也愚謂王右光祿祖葬之日皇后宜反齊衰宋書禮志二通典八十又議喪禮即遠變除漸輕情與日殺服隨時改權禮既行服制已變豈容終除之日而更重服也案晉泰始三年武帝以朞除之月欲反重服拜陵頻詔勤勤思申棘心於時朝議譬執亦遂不果愚謂皇后終除之日不宜還著重服直當釋除布素而已宋書禮志二通典八十與吳喜書知統戎旅已次近路卿所在著名今日何為立忠於彼邪想便倒戈共受河山之賞宋書吳喜傳喜東討至永世得庾業劉延熙書送尋陽子房檄文與喜書云云皇子出後告廟議禮無皇子出後告廟明文晉太康四年封北海王實紹廣漢殤王後告於太廟漢初帝各異廟故告不必同自漢明帝以來乃共堂各室魏晉依之今既共堂若獨告一室而闕諸室則於情未安宋書禮志四孝建三年五月太學博士傳休議閏月周忌議尋三禮喪遇閏月數者數閏歲數者沒閏閏在朞內故也鄱陽哀王去年閏三月薨月次節物則定四月之分應以今年四月末為祥晉元明二帝竝以閏二月崩以閏後月祥先代成準則是今比宋書禮志二大明元年二月有司又奏太常鄱陽哀王去年閏三月十八日薨今為何月末祥除下禮官議正博士傅休議國子為生母求除太夫人議春秋母以子貴王雖為妾是和之所生案五等之例鄭伯許男同號夫人國子體例王合如國所生宋書禮志二孝建三年八月有司奏雲牡國解國子檀和之所生親王求除太夫人檢無國子除太夫人先例法又無科下禮官議正太學博士孫豁之議
