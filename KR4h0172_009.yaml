body:
  text: 明帝與劉勔張興世蕭道成詔暴吳喜罪吳喜出自卑寒少被驅使利口任詐輕狡萬端自元嘉以來便充刀筆小役賣弄威恩苟取物情處處交結皆為黨與衆中常以正直為詞而內實阿媚每仗計數運其佞巧甘言説色曲以事人不忠不平彰於觸事從來作諸署主意所不協者覓罪委頓之以示清直而餘人恣意為非一不檢問故甚得物情昔大明中黟歙二縣有亡命數千人攻破縣邑殺害官長劉子向在會稽再遣為主帥領三千精甲水陸討伐再往失利孝武以喜將數十人至二縣説誘群賊賊即歸降詭數幻惑乃能如此故每豫驅馳窮諸狡慝及泰始初東征止有三百人直造三吳凡再經薄戰而自破岡以東至十郡無不清蕩百姓聞吳河東來便望風自退若非積取三吳人情何以得弭伏如此其統軍寬慢無章放恣諸將無所裁檢故部曲為之致力觀其意趣止在賊平之後應力為國計喜初東征發都指天畫地云得劉子房即當屏除袁標等皆加斬戮使略無生口既平之後緩兵施恩納罪人之貨誘諸賊帥令各逃藏受賄得物不可稱紀聽諸賊帥假稱為降而擁衛子房遂得生歸朝廷收羅群逆皆作爪牙撫接優密過於義士推此意正是聞南賊大盛殷孝祖戰亡人情大惡慮逆徒得志規以自免喜善為姦變每以計數自將於朝廷時三吳首獻慶捷於南賊則不殺其黨頗著陰誠當云東人惟怯望風自散皆是彼無處分非其苦相逼迫保全子房及顧琛等足表丹誠進退二塗可以無患南賊未平唯以軍糧為急西南及北道斷不通東土新平商運稀簡朝廷乃至鬻官賣爵以救災困斗斛收斂猶有不充喜任赭圻軍主者頓偷一百三十斛米初不問罪諸軍主皆云宜治喜不獲正止與三十鞭又不責備凡所曲意類皆如此喜至荊州公私殷富錢物無復孑遺喜乘兵威之盛誅求推檢凡所課責既無定科又嚴令驅蹙皆使立辨所使之人莫非姦猾因公行私迫脅在所人官之物侵竊過半納資請託不知厭己西難既殄便應還朝而解故槃停託云扞蜀實由貨易交關事未回展又遣人人蠻矯詔慰勞賧伐所得一以入私又遣部下將吏兼因土地富人往襄陽或蜀漢屬託郡縣侵官害民興生求利千端萬緒從西還大艑小艒爰及草舫錢米布絹無船不滿自喜以下逮至小將人人重載莫不兼資喜本小人多被使役經由水陸州郡殆遍所至之處輒結物情妄竊善稱聲滿天下密懷姦惡人莫之和喜軍中諸將非幼便賊惟云賊何須殺但取之必得其用雖復羸弱亦言健兒可惜天下未平但令以功贖罪處遇料理反勝勞人此輩所感唯喜莫云恩由朝廷凶惡不革恆出醜聲勞人義士相與歎息並云我等不愛牲命繫擒此賊朝廷不肯殺去反與我齊今天下若更有賊我不復能擊也此等既隨喜行多無功效或隱在衆後或在幔屋中眠賊既破散與勞人同受爵賞既被詰問辭白百端云此輩既見原宥擊賊有功那得不依例加賞褚淵往南選諸將卒喜為軍中經為賊者就淵求官倍於義士淵以喜最前獻捷名位己通又為統副難相違拒是以得官受賞反多義人義人雖忿喜不平又懷其寬弛往歲竺超之聞四方反叛人情畏賊無敢求為朝廷行者乃慨然攘步隨喜出征為其軍副身經臨敵自東還失喜意説超之多酒不堪驅使遂相委棄高敬祖年雖少宿氣力實健其有處分為軍中所稱喜薄其衰老云無所施正以二人忠清與己異行超之為人乃多飲酒計喜軍中主帥豈無飲酒者特是不利超之故以酒致言耳敬祖既無餘事直云年老託為乞郡潛相遣斥其餘主帥並貪濁諂媚之流皆提攜東西不相離捨喜聞天壤間有罪人死應繫者必啓以入軍皆得官爵厚被處遇應入死之人緣己得活非唯得活又復如意人非木石何能不感設令吾攻喜門此輩誰不致力但是喜不敢生心耳喜軍中人皆是喜身爪牙豈關於國喜自得軍號以來多置吏佐是人加板無復限極為兄弟子姪及其同堂群從乞東名縣連城四五皆灼然巧盜侵官奪私亡命罪人州郡不得討崎嶇蔽匿必也黨護臺州符旨殆不復行船車牛犢應為公家所假借者託之於喜吏司便不敢問他縣奴婢入界便略百姓牛犢輒牽殺噉州郡應及役者並人喜家喜兄茹公等悉下取錢盈村滿里諸吳姻親就人間徵求無復紀極百姓嗷然人人悉苦喜具知此初不禁呵索惠子罪不甚江悆既已被恩得免憲辟小小忤意輒加刑斬張悅賊中大帥逼迫歸降沈攸之録付喜云殺活當由朝廷將帥征伐既有常體自應執歸之有司喜即便打鎖解襦與箸對膝圍棋仍造重義私惠招物觸事如斯張靈度凶愚小人背叛之首喜在西輒恕其罪私將下都與之周旋情若同體狼子野心獨懷毒性遂與柳欣尉等謀立劉禕吾使喜録之而喜密報令去去未得遠為建康所録喜背國親惡乃至於是初從西反圖兼右丞貪因事物以行私詐吾患其諂曲抑而不許從此怨懟意用不平喜西救汝陰縱肆兵將掠暴居民姦人婦女逼奪雞犬虜略縱橫緣路官長莫敢呵問脫誤有縛録一人喜輒大怒百姓呼嗟人人失望近段佛榮求還乃欲用喜代之西人聞其當來皆欲叛走云吳軍人中皆是生劫若作刺史吾等豈有活路既無他計正當叛投虜耳夫伐罪弔民用清國道豈有殘虐無辜剝奪為務害政妨國罔上附下罪舋若此而可久容臧文仲有云見有善於其君如孝子之養父母見有惡於君若鷹鸇之逐鳥雀耿弇不以賊遺君父前史以為美談而喜軍中五千人皆親經反逆攜養左右豈有奉上之心喜意志張大每稱漢高魏武本是何人近忽通啓求解軍任乞中散大夫喜是何人乃敢作此舉止且當今邊疆未寧正是喜輸蹄領之日若以自處之宜當節儉廉慎靜掃閉門不與外物交關專心奉上何得以其蜼螭高自比擬當是自顧愆舋事宣遐邇又見壽寂之流徙施修林被擊物惡傷類內懷憂恐故興此計圖欲自安朝廷之士及大臣藩鎮喜殆無所畏者畏者唯我一人耳人生修短不可豫量若我壽百年世間無喜何所虧損若使吾四月中疾患不得治力天下豈可有喜一人尋喜心迹不可奉守文之主豈可遭國家間隙有可乘之會邪世人多云時可畏國國政嚴歷觀有天下御億兆仗威齊衆何代不然故上古象刑民淳不犯後聖懲偽易以黥墨唐堯至仁不赦四凶之罪漢高大度而急三傑之誅且太公為治先華士之刑宣尼作宰肆少正之戮自昔力安社稷功濟蒼生班劍引前笳鼓陪後不能保此者歷代無數養之以福十分有一耳至若喜之深罪其得免乎夫富之與貴雖以功績致之必由道德守之故善始者未足稱奇令終者乃可重耳凡置官養士本在利國當其為利愛之如赤子及其為害畏之若仇讎豈暇遠尋初功而應忍受終敝耳將之為甲譬如餌藥當人羸冷資散石以全身及熱勢發動去堅積以止患豈憶始時之益不計後日之損存前者之賞抑當今之罰非忘其功勢不獲已耳喜罪釁山積志意難容雖有功效不足自補交為國患焉得不除且欲防微杜漸憂在未萌不欲方幅露其罪惡明當嚴詔切之令自為其所卿諸人將相大臣股肱所寄賞罰事重應與卿等論之卿意並謂云何宋書吳喜傳帝將賜喜死先一日與劉勔張與世齊王詔賜王景文死手詔與卿周旋欲全卿門戶故有此處分宋書王景文傳上疾篤乃遣使送藥賜景文死遺詔朕自臨御億兆仍屬戎寇雖每存弘化而惠弗覃遠軍國凋斃刑訟未息今大漸維危載深矜歎可緩徭優調去繁就約因改之宜詳有簡衷務以愛民為先以宣朕遺意宋書明帝紀崇接道猛法師詔猛法師風道多濟朕素賓友可月給錢三萬令史四人白簿吏二十人車及步輿各一乘乘輿至客省高僧傳猛西涼州人東遊建業上東安寺續開講席明帝深相崇接追崇江夏王義恭令書故中書監太宰領太尉録尚書事江夏王道性淵深睿鑒通遠樹聲列藩宣風鉉德位隆姬輔任屬負圖勤勞國家方熙託付之重盡心毗導永融雍穆之化而凶醜忌威奄加冤害夷戮有暴殯穸無聞憤達幽明痛貫朝野朕蒙險在難含哀莫申幸賴宗祐之靈克篡祈天之祚仰惟勳戚震動於厥心昔梁王徵庸警蹕備禮東平好善黃屋在廷況公德猷弘懋彝典未殊者哉可追崇使持節侍中都督中外諸軍事丞相領太尉中書監録尚書事王如故給九旒鸞輅虎賁班劍百人前後部羽葆鼓吹轀輬車宋書江夏王義恭傳太宗定亂令書云云加擢路休之等令書太皇太后蚤垂愛遇沿情即事同於天屬前車騎咨議參軍路休之前丹陽丞路茂之崇憲密戚蚤延榮貴並懷所勳宜殊恆飾休之可黃門侍郎領步兵校尉茂之可中書侍郎宋書文帝路淑媛傳太宗廢幼主欲悅路太后之心乃下令書恤柳元景令故侍中尚書令驃騎大將軍巴東郡開國公新除開府儀同三司南豫州刺史元景風度弘簡體局深沈正義亮時恭素範物幽明道盡則首贊孝圖盛運開曆則毗燮皇化方任孚漢輔業懋殷衡而蜂豺肆濫顯加禍毒冤動勳烈悲深朝貫朕承七廟之靈纂臨實業情典既申痛悼彌軫宜崇賁徽册以旌忠懿可追贈使持節都督南豫江三州諸軍事太尉侍中刺史國公如故給班劍三十人羽葆鼓吹一部諡曰忠烈公宋書柳元景傳招集舊僧令先帝建中興及新安諸寺所以長世垂範弘宣盛化頃遇昏虐法像殘毀師徒奔迸甚以矜懷妙訓淵謨有扶名教可招集舊僧普各還本並使材官隨宜修復宋書天竺迦毗黎國傳前廢帝毀廢新安寺驅斥僧徒尋又毀天寶諸寺太宗定亂下令宣旨永喜王子仁汝一家門戶不建幾覆社稷天未亡宋景命集我上流迷愚相扇四海同惡若非我修德御天下三祖基業一朝墜地汝輩便應淪於異族之手我昔兄弟近二十人零落相繼存者無幾唯司徒年長令德作輔皇家門戶所憑唯我與司徒二人而已尚未能厭百姓姦心餘諸王亦未堪贊治我惟有太子一人司徒世子年又幼弱桂陽巴陵並未有繼體正賴汝輩兄弟相倚為強庶使天下不敢窺覘王室汝輩始十餘歲裁知俯仰當今諸舍細弱殆不免人輕陵若非我為主劉氏不辨今日汝諸兄沖眇為群凶所逼誤遂與百姓還圖骨肉於汝在心不得無愧即日西海就寧恩化方始方今處汝湘州汝年漸長足知善惡當每思刻厲奉朝廷為心爵秩自然與年俱進我垂猶子之情著於萬物汝亦當知好憶我敕旨宋書永嘉王子仁傳太宗遣主書趙扶公宣旨未幾以建安王休仁言賜死與始安王休仁書此段殊得蘇侯兄弟力宋書始安王休仁傳初行與蘇侯神緒為兄弟及事平太宗與休仁書與巴陵王休若書孝建大明中汝敢行此邪宋書巴陵王休若傳休若輒殺典籤夏寶期上大怒與休若書報巴陵王休若吾與驃騎南山射雉驃騎馬驚與直閣夏文秀馬相踏文秀墜地驃騎失鞚馬驚觸松樹墜地落硎中時頓悶不識人故馳報弟宋書晉平王休祐傳上既殺休祐時巴陵王休若在江陵其日即馳信報休若與桂陽王休範書外聞有一師姓徐名紹之狀如狂病自云為塗步郎所使去三月中忽云神語道巴陵王應作天子汝使巴陵王密知之於是師便訪覓休若左右人不能得東宮典書姓何者相識數去來師解神語東宮典書具道神語東宮典書答云我識巴陵聞一左右當為汝向道數日東宮典書復來語師云我已為汝語巴陵左右道因達巴陵巴陵具知云莫聲但聽又頃者史官奏文占侯頗云休若應挾異端神道芒昧乃不可全信然前後相準略亦不無髣佛且帖肆間自大明以來有若好之謠於今未止詔若百重章句皆配以美辭美事諸不逞之徒咸云必是休若休若且知道路有異音里恭有若好之遙在西已奇懼致王敬先吐猖狂之言近休祐休仁被誅休若彌不自安又左右多是不相當負罪之徒恆説以道路之言即動之相與唱云萬民之心屬在休若感激其意尋休若從來心迹殊有可嫌劉亮問高次祖汝一應識此人當給休若休若在東縱恣群下無本末還朝被貶爵位小退次祖被亮使歸過問訊大泣語次祖云我東行是一段功在郡橫為群小輩過失大被貶降我實憤怨不解劉輔國何意不作次祖啓云劉輔國蒙朝廷生成之恩豈容有此理推此已是有奇意吾使諸王在蕃正令優遊而已本不以武事而休若在西廣召弓馬健兒都不啓聞不戾道明等昔親為賊罪應萬死休若至西大信遇之乃潛將往不啓京吾知汝意謂休若處奉因事事何如心迹既不復可測因其還朝在第與書事事詰誚於內許密自引分狀如暴疾致故差得於其名位及見子悉得全也休若既是汝弟使其狼心得申者汝得守冶城邊作太尉公邪非但事關計亦於汝甚切汝可密白荀太妃令知宋書巴陵王休若傳休若既死上與驃騎大將軍桂陽王休範書報書鄭修容有兄喪令成服汝可令汝內人知之再報休祐休範二家內人知也彧報淳化閣帖一
